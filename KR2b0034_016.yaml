body:
  text: 通鑑續編卷十三元陳桱撰丙午欽宗皇帝靖康元年金天㑹四年春正月詔中外臣庶實封言得失金人入相濬州梁方平之師潰于黎陽金人遂濟河方平帥禁旅屯於黎陽河北岸金將逹呼布奄至河南守橋者望見金兵旗幟燒斷橋纜金兵未得濟既而方平師潰奔還河北河東路制置副使何灌帥兵二萬退保滑州聞方平潰亦棄師歸宋師在河南者無一人敢拒己巳金人遂取小舟以濟凡五日騎兵方絶步兵猶未渡也旋渡旋行無復隊伍金人笑曰南朝可謂無人若以一二千人守河我豈得渡哉庚午金師取滑州詔罷內外官司局所凡一百五處以蔡攸為太上皇帝行宫使宇文粹中為副使太上將東幸也以吳敏知樞密院事李梲同知院事王黼有罪永州安置行至雍丘盜殺之開封尹聶昌有怨于黼遣人殺之也李彥伏誅朱勔有罪放歸田里自勔以花石取媚而州郡被其害者踰二十年勔積官至寧逺軍節度使居第蘇州其園池擬禁籞服飾器用上僣乘輿聲熖熏灼東南部刺史郡守多出其門監司郡吏朔望皆拜庭下邪人穢夫候門奴事自直祕閣至殿學士如欲可得不附者旋踵罷去時謂東南小朝廷帝末年益親任之居中白事傳達上㫖大略如內侍進見不避宫嬪一門盡為顯官騶僕亦至金紫天下為之扼腕至是放歸田里凡由勔得官者皆罷以李綱為東京留守李梲副之金斡爾雅布濟河宰執議請帝暫幸襄鄧以避敵鋒吳敏曰京師百萬生靈奈何棄之臣願留守以救一城行營參謀官李綱曰道君皇帝挈宗社以授陛下委而去之可乎帝默然白時中謂都城不可守綱曰天下城池豈有如都城者且宗廟社稷百官萬民所在捨此欲何之今日之計當整飭軍馬固結民心相與堅守以待勤王之師帝問誰可將者綱言朝廷以髙爵厚祿崇養大臣蓋將知用之於有事之日也白時中李邦彥等雖書生未必兵然藉其位號撫將士以抗敵鋒乃其職也時中勃然曰李綱莫能將兵否綱曰陛下不以臣庸懦儻使治兵願以死報乃以綱為留守道君皇帝幸亳州庚午道君皇帝如亳以避敵於是百官多遁初童貫在陜西募長大少年號勝捷軍幾萬人以為親軍環列第舍及自太原還京適上皇南幸貫即以是軍自隨上皇過浮橋衛士攀望號慟貫惟恐行不速使親軍射之中矢而踣者百餘人道路流涕蔡京亦盡室南行為自全之計以李綱為尚書右丞兼親征行營使綱既受留守之命復為帝力陳不可出幸之意且言明皇聞潼關失守即時幸蜀宗廟朝廷毁于賊手今四方之兵不日雲集奈何輕舉以蹈明皇之覆轍乎㑹內侍奏中宫已行帝色變倉卒降御榻曰朕不能留矣綱泣拜以死邀之帝顧綱曰朕今為卿留治兵禦敵之事専責之卿令勿致疏虞綱皇恐受命宰臣猶請出幸不已帝從之綱趨朝則禁衛擐甲乘輿已駕矣綱急呼禁衛曰爾等願守宗社乎願從幸乎皆曰願死守綱入見言于帝曰陛下已許臣留復戒行何也今六軍父子妻孥皆在都城願以死守萬一中道散歸陛下孰與為衛敵兵已逼知乘輿未逺以健馬來追何以禦之帝感悟遂止禁衛六軍聞之無不悅者拜伏呼萬歲乃命綱為右丞兼行營使以便宜從事綱治守戰之具數日而畢白時中免以李邦彥為太宰張邦昌為少宰趙野王孝迪為門下中書侍郎蔡懋為尚書左丞遣使督諸道兵入援金斡里雅布圍京師詔張邦昌奉康王構為質于金以請平斡里雅布取滑州即遣吳孝民至汴以詔書問納張㲄事令執送童貫談稹詹度而以黃河為界納質奉貢癸酉斡里雅布抵汴城據牟駝岡聞道君皇帝內禪而城中有備欲退師帝召羣臣議之李邦彥力請割地請和李綱以為擊之便帝竟從邦彥計命虞部員外郎鄭望之及髙世則使其軍縋城而出未至軍遇金使吳孝民因與偕還孝民至言曰上皇朝事已往不必計今少帝與金别立誓書結好仍遣親王宰相詣軍前可也帝因求大臣可使者李綱請行帝不許而命李梲綱曰安危在此一舉臣恐李梲怯懦誤國事也不聽是夜金人來攻宣澤門李綱敗之斬獲百餘人至旦始退甲戌命李梲使金軍梲至斡里雅布盛兵南向坐梲北面再拜膝行而前恐怖喪膽失其所言斡里雅布謂曰汝家京城破在頃刻所以斂兵不攻者徒以少帝之故欲存趙氏宗社我恩大矣今若欲議和當輸犒師之物金五百萬兩銀五千萬兩牛馬萬頭表段百萬匹尊金帝為伯父歸燕雲之人在漢者割中山太原河間三鎮之地而以宰相親王為質送大軍過河乃退耳因出事目一紙付梲而遣還梲等唯唯不敢措一言遂與金使蕭三寶努耶律忠王汭等偕來索賂要質凡金人所為要求皆郭藥師教之也梲至李邦彥等勸帝從之帝乃避殿減膳括借都城金銀倡優家財得金二十萬兩銀四百萬兩而民間已空李綱言金人所需金幣竭天下且不足况都城乎三鎮國之屏蔽割之何以立國至於遣質即宰相當往親王不當往若遣辨士姑與之議所以可不可者宿留數日大兵四集彼孤軍深入雖不得所欲亦將速歸此時而與之盟則不敢輕中國而和可久也李邦彥等言都城破在旦夕尚何有三鎮而金幣之數又不足較帝默然綱不能奪因求去帝慰論之曰卿第出治兵此事當徐圖之綱退則誓書已成稱伯大金國皇帝姪宋國皇帝金幣割地遣質更盟一依其言遣沈晦以誓書先往并持三鎮地圖示之庚辰以張邦昌為計議使奉康王搆往金軍為質以求成初邦昌與邦彥等力主和議不意身自為質及行乃邀帝署御批無變割地議帝不許康王與邦昌乘筏渡壕自午至夜分始達金營康王道君皇帝第九子韋賢妃所生也以唐恪同知樞密院事李綱敗金人于通津景陽門乙亥金兵攻通津景陽等門李綱親督戰募死士縋城而下自卯至酉斬其將校十餘殺其衆數千何灌力戰而死道君皇帝幸鎮江府以路允迪簽書樞密院事金師退次于孟陽斡里雅布從康王之請解圍退師也馬忠敗金人于順天門外金騎大掠於城下都統制馬忠以京西募兵適至擊金人敗之于順天門金師遂收斂為一西路稍通援兵得達路允迪如河東金尼瑪哈軍种師道帥涇原秦鳯之師入援以師道同知樞密院事為京畿河北河東宣撫使初朝廷聞金師南下以師道為制置使得便宜檄兵食師道時致仕居南山豹林谷聞命即東過熙河姚古之子平仲有步騎七千師道遂與之俱赴汴至洛聞斡里雅布屯京城下或止勿行曰敵勢方鋭願少駐汜水以謀萬全師道曰吾兵少若遲回不進形見情露秪取辱焉今鼓行而前彼安能測我虛實都人知吾來士氣自振何憂敵哉揭榜沿道言种少保領西兵百萬來遂抵京西趨汴水南徑逼敵營金人懼徙寨稍北斂逰騎但守牟駝岡增壘自衛時師道年髙天下稱為老种帝聞其至喜甚開安上門命李綱迎勞師道入見帝問曰今日之事卿意如何對曰女真不知兵豈有孤軍深入人境而能善其歸乎帝曰業已講好矣對曰臣以軍旅之事事陛下餘非所敢知也遂拜同知宣撫使統四方勤王兵及前後軍以姚平仲為都統制師道時被病命母拜許肩輿入朝金使王汭在廷頡頏望見師道拜跪稍如禮帝顧笑曰彼為卿故也師道詣緩給金幣于金使彼惰歸扼而殱諸河計之上也李邦彥不從梁師成有罪貶為彰化節度副使行至八角鎮死師成晚年益通賄謝人士入錢數百萬以獻頌上書為名令赴廷試唱第之日侍於帝前囁嚅升降之師成貌若不能言然隂鷙遇間即發王黼嘗為鄆王楷隂畫奪宗之計師成力保護太子得不動搖及太上皇帝東幸嬖臣多從以避罪師成自以舊恩留京師太學生陳東布衣張汭歷數其罪惡遂貶令開封吏護送至貶所行次八角鎮縊殺之以暴死聞二月詔姚平仲帥師襲金營不克而逃金人復圍京師時朝廷日輸金幣于金而金人需求不已日肆侵犯四方勤王之師漸至李綱言金人貪婪無厭兵力日甚其勢非用師不可且敵兵號六萬而吾勤王之師集城下者已二十餘萬彼以孤軍入重地猶虎豹自投陷穽中當以計取之不必與角一旦之力若扼河津絶餉道分兵復畿北諸邑而以重兵臨敵營堅壁勿戰俟其食盡力疲然後以一檄取誓書復三鎮縱其北歸半渡而擊之此必勝之計也帝深然之約日舉事种氏姚氏皆素為山西巨室兩家子弟各不相下平仲父古方以熙河兵入援平仲慮功名獨歸种氏因以士不得速戰為言帝聞之以語李綱綱主其議令城下兵緩急聽平仲節度帝日遣使趣師道戰師道欲俟其弟師中至因奏言過春分乃可擊時相距才八日帝以為緩平仲請先期擊之二月丁酉朔平仲帥步騎萬人夜斫敵營欲生擒斡里雅布取康王以歸夜半帝遣中使傳㫖諭李綱曰姚平仲已舉事卿速援之平仲方發金候吏覺之斡里雅布兵迎擊平仲兵敗懼誅亡去金師復圍汴城㑹李綱率諸將旦出封丘門遂戰于幕天坡以神臂弓射之金人少却罷李綱以謝金人斡里雅布遣王汭來問舉兵之故李邦彥語之曰用兵乃李綱姚平仲耳非朝廷意也因罷綱以謝廢親征行營司金斡里雅布使王汭來斡里雅布召宋使者詰責用兵違誓之故張邦昌恐懼涕泣康王不為動金人異之乃使王汭來請更以他王為質而以兵送鄭望之等於尼瑪哈營宇文虛中如金師虛中聞汴京急馳歸收合散卒得東南兵二萬人以便宜令李邈領之次于汴河上從門外及姚平仲失利援兵西來者皆潰虛中縋而入京帝欲遣人奉使辨劫營非朝廷意大臣皆不欲行虛中承命慨然而往太學生陳東及都人上書乞復用李綱詔復以綱為尚書右丞充京城防禦使辛丑太學生陳東等及都民數萬人上書于宣德門言李綱奮不顧身任天下之重所謂社稷之臣也白時中李邦彥張邦昌趙野王孝迪蔡懋李梲庸謬忌嫉不恤國計所謂社稷之賊今邦彥等疾惡綱恐其成功罷綱正墮金人之計乞復用綱而斥邦彥等㑹邦彥入朝衆數其罪而罵且欲毆之邦彥疾驅得免吳敏傳宣令退衆莫肯去方舁登聞鼓撾壞之喧呼動地殿帥王宗濋恐生變奏帝勉從之帝乃遣耿南仲號於衆曰已得㫖宣綱矣內侍朱拱之宣綱後期衆臠而磔之并殺內侍數十人知開封府王時雍麾之不退帝顧户部尚書聶昌俾出諭㫖諸生始退乃復綱右丞充京城四壁防禦使既而都人又言願見种師道詔趣師道入城彈壓師道乘車而至衆褰簾視之曰果我公也相麾聲喏而散明日詔誅士民殺內侍為首者禁伏闕上書王時雍欲盡致太學諸生于獄人人惴恐㑹朝廷將用楊時為祭酒遣聶昌詣學宣諭然後定吳敏欲弭謗議奏東為太學録先是蔡懋禁不得輒施矢石將士積憤綱令能殺敵者厚賞衆皆奮躍金人懼稍稍引去除元祐黨籍學術之禁追封范仲淹魏國公贈司馬光太師廢苑囿宫觀可以與民者以楊時為國子祭酒時自邇英殿說書遷右諫議大夫兼侍講知無不言然不見聽及太學生留李綱吳敏乞用時以靖太學因召對時言諸生忠於朝廷非有他意但擇老成有行誼者為之長二則將自定帝曰無以逾卿遂用之金斡里雅布使王汭來宇文虛中冒鋒鏑至金營露坐風埃自己至申金人注矢露刃周匝圍之久乃得見康王次日侍王至金幕府見斡里雅布辭語不遜禮節倨傲抵暮遣王汭隨虛中入城要越王及李邦彥吳敏李綱并駙馬曹晟等與金銀騾馬之類且欲御筆書定三鎮界方退軍虛中還帝止許以肅王代質更以肅王樞為質于金康王構還以徐處仁為中書侍郎宇文虛中僉書樞密院事蔡懋罷宇文虛中復如金師帝以金師未退令虛中再往下斡里雅布固要三鎮虛中泣不言斡里雅布變色虛中曰太宗殿在太原上皇祖陵在保州詎忍割棄金人必欲得之虛中還復命帝許割三鎮載書稱伯姪命虛來中復往斡里雅布使王汭以太原中山河間三鎮之地畀金人斡里雅布退師北去京師圍解金斡里雅布既得三鎮且知京師有備遂不俟金幣數足遣韓光裔來告辭退師北去肅王從之京師解嚴种師道請乘其半濟擊之帝不許師道曰異日必為國患御史中丞吕好問進言于帝曰金人得志益輕中國秋冬必傾國復來禦敵之備當速講求不聽赦戊申赦天下且詔諭士民自今庶事並遵用祖宗舊制凡蠧國害民之事一切寢罷復罷宰執兼神霄玉清萬夀宫使李邦彥免邦彥居位無所建明惟與白時中張邦昌趙野王孝迪蔡懋李梲等阿順趨諂而已都人目為浪子宰相至是陳東上書請斥之遂免以張邦昌為太宰吳敏為少宰李綱知樞密院事耿南仲李梲為尚書左右丞宇文粹中罷姚古种師中折彥質等帥師入援詔古等追送金師熙河帥姚古秦鳯帥种師中府州帥折彥質等各以兵勤王凡十餘兵萬人至汴城下而斡里雅布已退李綱請詔古等以追送之且戒俟其間可擊則擊將士踴躍而去种師道罷中丞許翰言師道名將沉毅有謀山西士卒咸信服之不可使解兵柄帝謂其老難用翰曰秦始皇老王剪而用李信兵辱于楚漢宣帝老趙充國而卒能成金城之功自吕望以來以老將收功者難一二數以古揆今師道雖老可用也帝不納翰又言金人此去存亡所係當令一大創使失利去則中原可保四夷可服不然將來再舉必有不救之患宜起師要擊之帝亦不聽金尼瑪哈入威勝軍隆德府遂次于澤州尼瑪哈攻太原悉破諸縣獨城中以張孝純固守不下乃於城外矢石不及之地築城繯繞分人防守使內外不相通及聞斡里雅布和乃遣人來求賂宰臣以勤王之兵大集拘其使而不與賂尼瑪哈怒乃分兵趣汴京折可求劉光世軍皆為所敗平陽府義兵亦叛導金師入南北關知威勝軍李植以城降之乙卯攻下隆慶府知府張確死焉丁巳攻澤州下之治開邊罪貶蔡京為祕書監分司南京童貫為左衛上將軍蔡攸為太中大夫以陳東之言也時三人皆從太上行梁方平伏誅王孝迪罷以聶昌為東南發運使未行而罷初道君皇帝南幸童貫髙俅等以兵扈從既行聞都城受圍乃止東南郵傳及勤王之師道路籍籍言貫等為變朝議以聶昌為發運使往圖之李綱曰使昌所圖果成震驚太上此憂在陛下萬一不果是數人者挾太上於東南求劍南一道陛下將何以處之莫若罷昌之行請於太上去此數人自可不勞而定帝從之召姚古等師還宰臣咎李綱盡遣城下兵追敵乃急徴還諸將諸將已遣追及斡里雅布於邢趙間聞命無不扼腕此綱力爭復則將士解體矣三月李梲免張邦昌免議者以邦昌私於敵故尼瑪哈復至社稷之賊也遂免以徐處仁為太宰唐恪為中書侍郎何㮚為尚書右丞許翰同知樞密院事帝召處仁問割三鎮是否處仁對曰國不競亦甚且定武陛下之潛藩不當棄與吳敏議合敏薦處仁可相遂拜太宰時進見者多論宣和間事恪言于帝曰革弊當以漸宜擇今日之所急者先之而言者不顧大體至毛舉前事以快一時之憤豈不傷太上道君之心哉京攸貫黼之徒既從竄斥姑可已矣他日邊事既定然後白太上請下一詔與天下共棄之誰曰不可帝曰卿論甚善為朕作詔書以此意布告在位因賜東宮舊書萬卷宇文虛中免言者劾其議和之罪出知青州以种師道為河南河東路宣諭使屯滑州李綱以三鎮為不可與金乃詔師道為宣諭使屯滑州而實無兵自隨師道請合關河卒屯滄衛孟滑以備金人再至朝論以大敵甫退不宜勞師示弱乃止詔金人叛盟遣姚古种師中帥師往援三鎮古復隆德府威勝軍師中追斡里雅布至北鄙而還詔金人要盟終不可保今尼瑪哈深入南陷隆德先敗元約朕夙夜追咎已黜罷元主和議李邦彥奉使許地李梲李鄴鄭望之等其太原中山河間三鎮保塞陵寢所在誓當固守於是命姚古總兵援太原師中援中山河間或謂師中自磁相而北金人若下太行則勢不能自還此段凝師于河上比也時大臣立議矛盾樞密主破敵而三省令護送出之師中渡河即上言尼瑪哈已至澤州臣欲由邢相間捷出上黨搗其不意當可以逞朝廷疑不用斡里雅布至中山河間三鎮皆固守不下師中因進兵以逼之關斡里雅布乃出境姚古以兵復隆德威勝扼南北詔李綱迎道君皇帝于南京時用事者言太上將復辟于鎮江人情危駭既而太上皇后先還或謂后將由端門直入禁中內侍輩頗政勸帝嚴備帝不從既而太上還至南京以書問改革事之故且召吳敏李綱綱請往綱至具道皇帝聖孝思慕欲以天下養之意請陛下早還京師太上因及行宫止遞角等事綱曰當時恐金人知行宫所在非有他也方艱難時兩宫隔絶朝廷應副行宫亦豈能無不至者在聖度燭之耳因言皇帝每得詰問之詔輒憂懼不食臣竊譬之家長出而彊冦至子弟之任家事者不得不從宜措置長者但當以其能保田園大計而慰勞之茍誅及細故則為子弟者何所逃其責耶皇帝傳位之初陛下巡幸適當大敵入攻為宗社計庶事不得不小有更革陛下回鑾臣謂宜有以大慰皇帝之心勿問細故可也太上感悟出玉帶金魚象簡賜綱曰行宫人得卿來皆喜以此示朕意卿可便服之且曰卿扞守宗社有大功若能調和父子間使無疑阻當遂書青史垂名萬世綱感泣再拜綱還具道太上意帝始喜釋金尼瑪哈還雲中留尼楚赫圍太原尼瑪哈還雲中令尼楚赫將兵以圍太原尼楚赫為鎖城法以困城中自是內外不通籍朱勔家田至三十萬畝他物稱是蔡京有罪貶為崇信軍節度副使夏四月夏人陷天德雲內武州及河東八館鎮威城金烏舍襲取之先是尼瑪哈遣撒拇使夏許割天德雲內金肅河清四軍及武州等八館之地約攻麟州以牽河東之勢夏人遂由金肅河清渡河取天德雲內武州河東八館之地因攻鎮威城兵馬監押朱昭力戰而敗乃盡殺其妻子納尸井中復率士搏戰死之城遂陷既而金將烏舍以數萬騎陽為出獵掩至天德逼逐夏人悉奪有其地夏人請和金人執其使道君皇帝至京師居于龍德宫太上將至宰執進迎奉儀注耿南仲議欲屏太上左右車駕乃進李綱言如此是示之以疑也天下之理誠與疑明與暗而已自誠明而推之可至於堯舜自疑暗而推之其患有不可勝言者耿南仲不以堯舜之道輔陛下乃暗而多疑南仲怫然曰臣適見左司諫陳公輔乃為李綱結士民伏闕者乞下御史置對上愕然綱曰臣與南仲所論國事也南仲乃為此言臣何敢復有所辨因求去立子諶為皇太子以耿南仲為門下侍郎置春秋博士置詳議司于尚書省討論祖宗法制以革敝政從吳敏之請也趙野免童貫有罪郴州安置以种師道為太尉同知樞密院事河北河東宣撫使復以詩賦取士禁用莊老及王安石字說朱勔有罪循州安置召河南處士尹焞至京師賜號和靖處士遣還洛人尹焞師事程頤紹聖初嘗應舉發䇿有誅元祐諸臣議焞曰噫尚可以干祿乎哉不對而出告頤曰焞不復應進士舉矣頤曰子有母在焞歸告其母陳母曰吾知汝以善養不知汝以祿養頤聞之曰賢哉母也於是終身不就舉聚徒洛中非弔喪問疾不出户士大夫宗仰之种師道薦焞德行召至京師不欲留賜號和靖處士遣還户部尚書梅執禮侍郎邵溥中丞吕好問中書舍人胡安國合奏留之不報五月罷王安石配享孔子猶從祀廟廷國子祭酒楊時致仕國子祭酒楊時上言蔡京用事二十年蠧國害民幾危宗社人所切齒而論其罪者莫知其所本也蓋京以繼述神宗為名實挾王安石以圖身利故推尊安石加以王爵配享孔子廟廷今日之禍實安石有以啓之謹按安石挾管商之術飾六藝以文姦言變亂祖宗法度當時司馬光已言其為害當見於數十年之後今日之事若合符契其著為邪說以塗學者耳目而敗壞其心術者不可縷數伏望追奪王爵明詔中外毁去配享之像使邪說淫辭不為學者之惑疏上詔罷安石配享降居從祀之列時諸生習用王氏學以取科第者已數十年不復知其非忽聞楊時目為邪說羣論籍籍於是中丞陳過庭諫議大夫馮澥上疏詆時乃罷時祭酒時因乞罷諫職詔改給事中時力辭遂以徽猷閣待制致仕時居諌垣九十日凡所論列皆切於世道而其大者則闢王氏排和議論三鎮不可棄云詔种師中進師救太原至殺熊嶺及金和尼戰敗績死之太原圍不解詔种師中由井陘道出師與姚古掎角師中進次平定軍乘勝復夀陽榆次等縣留屯真定時尼瑪哈還雲中留兵分就畜牧覘者以為將遁告于朝許翰信之數遣使趣師中出戰責以逗撓師中歎曰逗撓兵家大戮也吾結髮從軍今老矣忍受此為罪乎即日辦嚴約姚古及張灝俱進輜重賞犒之物皆不暇從行五月辛未抵夀陽之石坑為金將完顔和尼所襲五戰三勝回趍榆次至殺熊嶺去太原百里姚古將兵至威勝統制官焦安節妄傳尼瑪哈將至古衆驚潰故與灝皆失期不至師中兵飢甚敵知之悉衆攻右軍右軍潰而前軍亦奔師中獨以麾下死戰自卯至已士卒發神臂弓射退金人而賞賚不及皆憤怨散去所留才百人師中身被四創力疾鬬死師中老成持重為時名將既死諸軍無不奪氣姚古及金巴爾斯戰于隆州谷敗績罷詳議司六月詔諌官極論闕失右正言崔鶠上疏曰數十年來王公卿相皆自蔡京出要使一門生死則一門生用一故吏逐則一故吏來更持政柄無一人立異無一人害己者此京之本謀也諫議大夫馮澥近入章曰士無異論太學之盛也澥尚敢為此姦言乎王安石除異己之人著三經之說以取士天下靡然雷同陵夷至于大亂此無異論之效也京又以學校之法馭士人如軍法之馭卒伍一有異論纍及學官若蘇軾黃庭堅之文范鎮沈括之雜說悉以嚴刑重賞禁其收藏其苛錮多士固已密矣而澥猶以為太學之盛欺罔不已甚乎原京與澥罪乃天地否泰所係國家治亂由之以分不可忽也仁宗英宗選敦朴敢言之士以遺子孫安石日為流俗一切逐去司馬光復起而用之元祐之治天下安於泰山及章惇蔡京倡為紹述之論以欺人主紹述一道德而天下一於諂佞紹述同風俗而天下同於欺罔紹述理財而公私竭紹述造士而人材哀紹述開邊而塞塵犯闕矣元符應詔上書者數千人京遣腹心考定之同已為正異己為邪澥與京同者也故列於正京之術破壞天下於兹極矣尚忍使其餘蠧破壞耶京姦邪之計大類王莽而朋黨之衆則又過之願斬之以謝天下种師道罷以李綱為河南河東路宣撫使劉韐為副使以救太原時金兵退道君皇帝還京上下恬然置邊事於不問李綱獨以為憂數上備邊禦敵之䇿不見聽用每有謀議復為耿南仲等所沮及姚古种師中敗潰太原圍益急南仲等請割三鎮以賂金綱言祖宗之地不可棄帝從綱議欲遣將援太原南仲進曰欲援太原非綱不可乃以綱為宣撫使劉韐副之以代种師道又以解潛為陜西制置副使以代姚古綱言臣書生實不知兵在圍城中不得已為陛下料理兵事今使為大帥恐誤國事因拜辭不許退而移疾乞致仕章十餘上亦不允臺諫言綱不可去朝廷帝以其為大臣遊說斥之或謂綱曰公知所以逺行之意乎此非為邊事欲緣此以去公則都人無辭耳公不起上怒且不測奈何許翰復書杜郵二字以遺綱綱不得已受命帝手書裴度傳以賜之宣撫司兵僅萬二千人庶事未集綱乞展行期御批以為遷延拒命趣召數四綱入對帝曰卿為朕巡邊便可還朝綱曰臣之行無復還理臣以愚直不容於朝使既行之後進而死敵臣之願也萬一朝廷執議不堅臣當求去陛下宜察臣孤忠以全君臣之義上為之感動行次懷州綱以二萬人分為五軍以備禦請銀絹于朝各百萬僅得二十萬欲啓行而不能帝遣使趣之綱行至軍遣解潛屯威勝劉韐屯遼州王以寧屯汾州范瓊屯南北關皆去太原五驛約以三道並進會于城下劉韐兵先進金人禦之韐敗績解潛與金人戰于南關王以寧以十七萬衆戰于汾州皆敗路允迪免貶左司諫陳公輔監合州酒務公輔居職敢言耿南仲指為李綱之黨公輔因自列且辭位復陳三事一言李綱書生不知軍旅遣援太原乃為大臣所陷後必敗事時宰怒其言斥監合州酒務焉天狗星隕有聲如雷有星孛于紫微髙麗遣使稱藩于金金以保州畀之髙麗王楷遣使奉表稱藩一依事遼之禮金遣髙伯淑報之且以保州與焉自是朝貢不絶金以斡里雅布為副元帥秋七月除元符上書邪等之禁竄蔡京于儋州行至潭州死其子孫二十三人分竄逺地遇赦不許量移詔下十日京死于潭州年八十京天資凶譎舞智御人在人主前顓狙伺為固位計始終一說謂當越拘孿之俗竭四海九州之力以自奉帝亦知其姦屢敗屢起且擇京不合者執政以柅之京每聞將退輒入見祈哀蒲伏叩頭無復亷恥見利忘義至於兄弟父子自為秦越暮年即家為府營進之徒舉集其門輸貨僮𨽻皆得美官棄紀綱法度為虛器根株連結牢不河破卒致宗社之禍雖以謫死人猶以不及正刑以謝天下為恨竄蔡攸于雷州童貫于吉陽軍童貫趙良嗣伏誅于貶所詔數貫大罪命御史張徴迹其所至蒞斬之於是御史胡舜陟論良嗣結成邊患敗契丹百年之好使金人侵陵禍及中國乞戮之市詔廣西轉運副使李升之即所雄至斬之梟其首徙妻子于萬安軍徴追貫及于南斬之函首赴闕梟于都市貫握兵二十年權傾一時奔走期㑹過于制敕嘗有論其過者詔方劭往察劭一動一息貫悉偵得之先密以白且陷以他事劭反得罪遂死貫狀魁梧偉瞻視頤下生鬚千數皮骨徑如鐡不類閹人有度量能疏財後宫自妃嬪已下皆獻餉結納左右婦寺譽言日聞寵煽翕赫庭户雜還成市嶽牧輔弼多出其門厮養僕圉官諸使者至數百輩窮姦稔禍開邊隙以覆宗社流毒四海死不足以償責金初立省院寺監等官初金太祖用漢官賞左企弓等因置中書省樞密院于廣寧而其國用事者未改女直官號至是舍音斡布當國勸金主用漢官制度遂立省寺府司一如唐宋矣八月復以种師道為宣撫使召李綱還綱行至懷州有詔罷减所起兵且日促解太原之圍時諸將皆承受御畫事皆專達宣撫司徒有節制之名實不稟命綱具論之不報㑹以議和詔止綱進兵綱即乞罷乃代還金尼瑪哈斡里雅布分道南侵斡里雅布解汴圍而還也所輸金帛未足三鎮又背盟固守會金使蕭仲恭來使朝廷以肅王為彼所質亦留仲恭以相當於是踰月不遣其副趙倫懼不得歸乃詐以情告于館伴邢倞曰金有耶律伊都者領契丹兵甚衆二於金人願歸大國可結之以舊圖斡里雅布及尼瑪哈執政以仲恭伊都皆遼貴戚臣而用事于金當有亡國之戚信之乃以蠟書命仲恭致之伊都使為內應仲恭素謹願無反覆心還見斡里雅布即以蠟九書獻之斡里雅布以聞于金主麟府帥折可求又言遼梁王雅里在西夏之北欲結宋以復怨于金吳敏勸帝致書梁王由河東之麟府亦為尼瑪哈所得復以聞於是金主以尼瑪哈為左副元帥斡里雅布為右副元帥分道伐宋而使楊天吉王汭持二帥書來責背盟構叛之事且索金幣三鎮及上金主尊號獻車輅儀物等庚戌尼州瑪哈發雲中癸丑斡里雅布發保張思正及金人戰于文水敗績死者數萬人折可求師潰于子夏山於是威勝軍隆德府汾晉澤降民皆渡河南奔州縣皆空金人遂乘勝攻太原王雲如金遣王雲使金國許以三鎮賦入之數又使馬識逺劉岑李若水分使其軍許翰罷翰主用兵而吳敏耿南仲欲和論議不合罷知亳州徐處仁吳敏免敏主和議處仁欲用兵議論不合爭于上前處仁怒擲筆中敏面鼻額為黑唐恪耿南仲聶昌欲排去二人而代之位諷中丞李回論之於是俱罷以唐恪為少宰何㮚為中書侍郎陳過庭為尚書右丞聶昌同知樞密院事李回僉書院事吳敏以聶昌猛厲可使助已自衡州召知開封府不數月拜同知入謝即陳扞禦之䇿曰三關四鎮國家藩籬也聞欲以畀敵一朝渝盟何以制之願勿輕與而檄天下兵集都畿堅城守以遏其衝簡禁旅以備出擊壅河流以斷歸路前有堅城後有大河徑兵四面而至彼或南下墮吾網中矣臣願激合勇義之士設伏開關出其不意掃其營以報帝壯之命提舉守禦得以便宜行事九月金尼瑪哈入太原執張孝純以歸尼瑪哈乘勝急攻太原知府張孝純力竭不能支城遂陷執孝純以去副總管王稟通判方笈皆死之安置吳敏于涪州敏初因蔡京進用言事者論其芘京父子故貶种師閔及斡里雅布戰于井陘敗績金人遂入天威軍真定府蔡攸蔡翛朱勔伏誅言者論攸興燕山之役禍及天下驕奢淫佚載籍所無於是遣使即三人所至斬之以王㝢為尚書右丞李綱罷貶中書舍人劉珏胡安國于逺州安國初為太學博士蔡京惡其異已㑹安國舉永州布衣王繪鄧璋遺逸京以二人乃范純仁鄒浩之客置獄推治安國坐除名張商英相始得復官帝即位召赴京師入對言明君以務學為急聖學以正心為要語甚剴切日昃始退耿南仲聞其言而惡之力間于帝帝不為動中丞許翰入見帝謂曰卿識胡安國否翰對曰自蔡京得政士大夫無不受其籠絡超然逺迹不為所汚如安國者實鮮遂除中書舍人及言者論李綱專主戰議喪師費財罷知揚州舍人劉珏當制謂綱勇於報國吏部侍郎馬澥言珏為綱遊說珏坐貶安國封還詞頭且論澥越職論事耿南仲大怒何㮚從而擠之遂出知通州安國在省一月多在告之日及出必有所論列或曰事之小者盍姑置之安國曰事之大者無不起於細微今以小事為不必言至於大事又不敢言是無時可言也人服其論以知大名府趙野兼北道都總管知河南府王襄兼西道都總管知鄧州張叔夜兼南道都總管知應天府胡直孺兼東道都總管何㮚請分天下二十三路為四道建三京及鄧州為都總管府分總四道兵事得專决財得專用官得辟置於是四方勤玉之兵大集唐恪耿南仲聶昌信和議相與謀曰方繼好息民而調發不已使金人聞之奈何亟檄止之令勿前於是諸軍皆反斾而去黃諤浮海如金議和金師日逼唐恪耿南仲專主和議遣諤由海道往以議之夏人陷西安州冬十月安置提舉洞霄宫李綱于建昌軍金索多入汾州知州張克戩死之貶御史中丞吕好問為吏部侍郎好問纍言時政帝深嚮納金師之退也大臣不復顧慮武備益弛好問言金人得志益輕中國秋冬必復大來禦敵之備當速講求不報金人復至大臣不知所出遣使講解好問請亟集滄滑邢相之戍以遏奔衝而列勤王之師于畿邑以衛京城疏入不省金人陷真定攻中山上下震駭廷臣狐疑相顧猶以和議為辭好問率臺屬劾大臣畏懦誤國坐貶知袁州帝閔其忠下遷吏部侍郎集從官于尚書省議三鎮棄守王雲至真定使從吏李裕先還言金人不復來求地但索五輅尊號且須康王至軍乃議和帝悉從之先遣車輅往而命馮澥副康王使金軍王未行而車輅至長垣金人却之王遂不行既而雲還言金人中變今必欲得三鎮不然則進兵取汴都中外駭震乃詔集從官于尚書省議三鎮棄守百官多請割與金人以紆國禍何㮚曰三鎮國之根本奈何一旦棄之且金人無信割亦來不割亦來唐恪耿南仲等力主割地㮚論辨不已因曰河北之民皆吾赤子棄地則并其民棄之為民父母而棄其子可乎帝曰善种師道罷以范訥為河北河東路宣撫使師道未至太原而城已陷乃巡邊師道次河陽遇王汭揣敵必大舉亟上疏請幸長安以避其鋒大臣以為怯召還而卒以馮澥知樞密院事詔太常禮官集議金主尊號王㝢免命㝢副康王軍使斡爾雅布㝢辭故也十一月夏人陷懷德軍金尼瑪哈復入威勝軍隆德府澤州尼瑪哈自太原趨汴所至皆降詔河北河東京畿清野令流民得占官舍寺觀以居禁京師民以浮言相動者金尼瑪哈至河外折彥質帥師禦之而潰金人遂渡孟津西京留守王襄棄城走城降于金尼瑪哈至河外宣撫副使折彥質以兵十二萬拒之夾河而軍尼瑪哈曰南軍亦衆與之戰勝負未可知不若加以虛聲遂取戰擊之違旦甲戌彥質之衆皆潰乙亥金和尼師衆先渡孟津尼瑪哈從之至河陽知府燕瑛棄城去至河南留守王襄亦走金遂入之於是永安軍鄭州皆降詔康王構復如金師至磁州民殺副使王雲王乃還次于相州遣刑部尚書王雲布副康王使斡里雅軍許割三鎮奉衮冕玉輅尊金主為皇叔且上尊號十八字王由滑濬至磁州守臣宗澤迎謁曰肅王一去不返今敵又詭辭以致大王其兵已迫復去何益願王勿行先是王雲奉使過磁相勸兩郡撤近城民舍運粟入保為清野之計民怨之及是次磁會康王出謁嘉應神祠雲在後民遮道諫王曰肅王已為金人所留王不宜北去厲聲指雲曰清野之人真姦賊也王出廟行民譟河執雲殺之王見事勢洶洶居之不安會斡里雅布軍濟克懷州遊奕日至磁城下蹤跡王所在知相州汪伯彥亟以帛書請王如相服櫜鞬部兵以迎於河上王遂行至相勞伯彥曰他日見上當首以京兆薦公由是受知議者以為是役雲不死王必至金無復還理矣初相州湯隂人嶽飛少負氣節家貧力學尤好左氏春秋孫吳兵法有神力能挽弓三百斤弩八石劉韐宣撫真定募敢戰士飛與焉屢擒劇賊至是因劉浩以見王以為承信郎馮澥李若水如金尼瑪哈軍尼瑪哈自洛遣人來言欲盡得河北諸郡畫河為界於是京師戒嚴遣馮澥李若水使之行至中牟守河兵相驚以金兵至左右謀取間道去澥問何如若水曰戍兵畏敵而潰奈何效之今正有死耳敢言退者斬衆乃定既行若水屢附奏言和議必不可諧乞申飭守備及見尼瑪哈議多不從罷何㮚為開封尹㮚主戰守與唐恪耿南仲不合故罷以陳過庭為中書侍郎孫傅為尚書右丞傅為兵部尚書上書乞復祖宗法度帝問之傅對曰祖宗法惠民熙豐法惠國崇觀法惠姦時謂名言孫傅使成忠郎郭京選六甲正兵以禦金人初孫傅因讀丘濬感事詩有郭京楊適劉無忌之語於市人中訪得無忌於龍衛中得京好事者言京能施六甲法可以生擒金二將而掃蕩無餘其法用七千七百七十七人朝廷深信不疑命以官賜以金帛數萬使自募兵無問伎藝能否但擇年命合六甲者所得皆市井游惰旬日而足敵攻益急京談笑自如云擇日出兵三百可致太平直襲擊至隂山乃止孫傅何㮚尤尊信傾心待之或上書於傅曰自古未聞以此成功者正或聽之姑少付以兵俟有尺寸功乃稍進任今委之太過懼必為國家羞傅怒曰京殆為時而生敵中瑣微無不知者幸君與傳言若告他人將坐沮師之罪揖使出又有劉孝竭等募衆或稱六丁力士或稱北斗神兵或稱天關大將大率效京所為識者危之京嘗曰非至危急吾師不出李回之師潰于河上回以萬騎防河衆潰而歸金斡里雅布使楊天吉來議疆界詔耿南仲如河東斡里雅布軍聶昌如河北尼瑪哈軍許以兩河畀之昌為絳民所殺南仲至衛遂奔相州斡里雅布使楊天吉王汭薩里穆爾等來責金幣及割地帝許以畫河為界命耿南仲往報南仲以老辭改命聶昌昌以親辭陳過庭曰主憂臣辱願效死帝為揮涕太息而怒南仲及昌乃即命南仲出河東昌出河北昌言兩河之人忠勇萬一為所執死不瞑目矣行至絳絳人果堅壁拒之昌持詔抵城下縋而登鈐轄趙子清麾衆殺昌抉其目而臠之初南仲為東宫官十年自謂首當柄用而吳敏李綱越次進位在已上心不能平故每事異議力沮戰守與吳幵堅請割地以成和好故朝廷戰守之備皆罷致金師日逼至是與金使王汭偕行至衛州衛鄉兵欲殺汭汭脫去南仲遂走相州以帝㫖喻康王盡取河北兵入衛京師因連署募兵榜揭之人情始安以孫傅同知樞密院事曹輔簽書院事以范致虛為陜西五路宣撫使督勤王兵入援金斡里雅布之師次于京城下斡里雅布自真定趨汴二十日至城下屯于劉家寺時援兵皆為唐恪耿南仲遣還無一人至者城中唯衛士及弓箭手七萬人乃以萬人分作五軍備緩急救護命姚友仲辛承宗分領之以五萬七千人分四壁守禦京畿遣使以蠟書間行出關召兵又約康王及河北守將來援多為邏兵所獲唐恪計無所出密言於帝曰唐自天寶而後屢失而復興者以天子在外可以號召四方也今宜舉景德故事留太子居守而西幸洛連據秦雍領天下親征以圖興復帝將從之開封尹何㮚入見引蘇軾所論謂周之失計未有如東遷之甚者帝翻然而改以足頓地曰今當以死守社稷李回免南道都總管張叔夜帥師入衛叔夜聞召即日自將中軍令子伯奮將前軍仲熊將後軍合二萬餘人與金師轉戰而前己丑至都帝御南薰門見之軍容甚整入對言其鋒甚鋭願如明皇之避祿山暫詣襄陽以圖幸雍帝不答金斡里雅布使劉晏來詔三省官名悉依元豐舊制以何㮚為門下侍郎閏月唐恪免恪從帝巡城為都人遮擊䇿馬得脫遂臥家求去御史胡舜陟劾恪知慮不能經畫邊事但長於交結內侍今國勢日蹙誠不可以備位乃罷以何㮚為尚書右僕射金尼瑪哈之師次于京城下癸巳尼瑪哈至屯于青城馮澥以金蕭慶來金人攻城日急尼瑪哈使馮澥與蕭慶等來邀帝㑹盟帝不許以馮澥為尚書左丞張叔夜簽書樞密院事金人入懷州知州霍安國死之馮澥曹輔如金師求成金人不許殿前副都指揮使王宗濋與金人戰于城下敗死金人攻南壁張叔夜范瓊分兵禦之遙見金兵甚衆皆奔還自相蹈籍死者以千數乃遣間使召諸道兵兵無至者城中唯衛士三萬又什失其七因時挑戰以示敢敵金人復來請親王詔越王往將行而尼瑪哈以兵來迓王乃止於是金人宣言失信攻城益急詔遣馮澥曹輔與宗室仲溫士諦如尼瑪哈斡爾雅布兩軍以請和尼瑪哈不許金斡里雅布使劉晏來趣親王宰相出盟也詔康王構為河北兵馬大元帥帥師入衛殿中侍御史胡唐老言康王奉使至磁而為士民所留乃天意也乞就拜為大元帥俾率天下兵入援何㮚以為然密草詔藁上之帝令募死士得秦仔劉定等四人遣持蠟詔如相州拜王為河北兵馬大元帥知中山府陳遘為元帥汪伯彥宗澤為副元帥使速領兵入衛仔至相州於頂髮中出詔王讀之嗚咽兵民感動何㮚孫傅使郭京出擊金師京敗走金人遂入京師壬子金人攻通津宣化門范瓊以千人出戰渡河冰裂沒者五百人自是士氣益挫甲寅大雨雪連日夜不止何㮚數趣郭京出師京徙期再三丙辰京用六甲法盡令守禦人下城毋得竊窺因大啓宣化門出攻金師京與張叔夜坐城樓上金兵分四翼譟而前京兵敗退走墮死於護龍河填尸皆滿城門急閉京據白叔夜曰須自下作法因下城引餘衆南遁金師遂登城衆皆披靡四壁兵皆潰金人焚南黃諸門統制姚仲友死於亂兵統制何慶言陳克禮中書舍人髙振力戰與其家人皆被害京城遂陷衛士入都亭驛執金使劉晏殺之軍民數萬斧左掖門求見天子帝御樓諭遣之衛士長蔣宣帥其衆數百欲邀乘輿犯圍而出左右奔竄獨孫傅梅執禮吕好問侍宣抗聲曰國事至此皆宰相信任姦臣不用直言所致孫傅訶之宣以語侵傅好問譬曉之曰若屬忘家族欲冒重圍衛上以出誠忠義然乘輿將駕必甲乘無缺而後動詎可輕耶宣詘服曰尚書真知軍情麾其徒退何㮚欲親率都民巷戰金人宣言議和退師乃止何㮚奉濟王栩如金師以請平帝聞金人欲和而退丁巳命何㮚及濟王栩使其軍以請成尼瑪哈斡里雅布曰自古有南即有北不可相無也今之所議期在割地而已帝如金師戊午何㮚還言金人欲邀上皇出郊帝曰上皇驚憂而疾必欲之出朕當親往辛酉帝如青城尼瑪哈軍奉表請降十二月金蕭慶入居于尚書省康王構開大元師府于相州遂帥師入衛次于東平十二月壬戌朔康王開元帥府于相州有兵萬人分為五軍而進乙亥王發相州丙子渡河未知所向汪伯彥曰非出北門濟子城不可王從之丁丑次于大名宗澤以二千人與金人力戰破其三十餘寨履冰渡河見王曰京城受圍日久入援不可緩王納之既而知信德府梁揚祖以三千人至張俊苗傅楊沂中田師中等皆在麾下兵威稍振㑹帝遣曹輔齎蠟詔至云金人登城不下方議和好可屯兵近甸毋動汪伯彥等皆信之宗澤獨曰金人狡譎是欲欵我師耳君父之望入援何啻飢渴宜急引軍直趨澶淵次第進壘以解京城之圍萬一敵有異謀則吾兵已在城下汪伯彥等難之勸王遣澤先行王乃命澤趣澶淵自是澤不得預帥府事矣耿南仲汪伯彥請移軍東平從之庚寅次東平帝至自青城癸亥帝還京甲子金遣使來索金一千萬錠銀二千萬錠帛一千萬匹於是大括金銀定京師米價勸糶以賑民縱民伐紫筠館花木以為薪詔陳過庭劉韐如兩河割地以畀金人范致虛㑹師入援潰子鄧州陜西宣撫使范致虛聞汴京圍急㑹西道總管王襄陜西節制使錢蓋之師凡十萬入援至潁昌聞汴京破襄蓋遁去致虛獨與西道副總管孫昭逺環慶帥王似熙河帥王倚帥步騎號二十萬命馬祐昌統之以趨汴以僧趙宗印為參議官致虛將大軍遵陸宗印將舟師趨西京宗印又以僧為一軍號尊勝隊童行為一軍號淨勝隊致虛勇而無謀委已以聽于宗印宗印徒大言實未嘗知兵師出武關至鄧州千秋鎮金將羅索以精騎衛之不戰而潰死者過半王似王倚孫昭逺等留陜府致虛收餘兵入潼關金定牛頭稅法每牛一具賦粟五斗其制以牛三頭為一具故又謂之牛具稅丁未二年五月髙宗皇帝構建炎元年金天會五年西遼康國元年夏正德元年春正月辛卯朔帝朝太上皇帝于延福宫詔兩河民降金民不從陳過庭至兩河民堅守不奉詔兼旬止得石州甲午詔兩河民開門出降民猶不肯詔孫傅輔太子監國帝復如金師吏部侍郎李若水死之庚子金人索金銀急且遣使再邀帝至營帝有難色何㮚及吏部侍郎李若水以為無虞勸帝行帝乃命孫傅輔太子監國而與何㮚李若水等復如青城唐恪聞之曰一之為甚其可再乎帝至金營金人逼帝易服若水抱持而哭指尼瑪哈痛詈金人曳若水出擊之敗面氣結仆于地衆皆散留鐡騎十餘守視尼瑪哈令曰必使李侍郎無恙若水絶不食或勉之曰事無可為者公昨雖言國相無怒心今日順從明日富貴矣若水嘆曰天無二日若水寧有二主哉其僕亦慰解之曰公父母春秋髙若少屈冀得一歸覲若水叱之曰吾不復顧家矣忠臣事君有死無二然吾親老汝歸勿遽言令兄弟徐言之可也後旬日尼瑪哈召計事若水因歷數而罵之尼瑪哈令擁之去若水反顧罵益甚至郊壇下若水謂其僕謝寧曰我為國死職耳奈併纍若屬何又罵不絶口監軍檛破其唇噀血罵愈切至以刃裂頸斷舌而死年三十五寧歸具言其狀金人亦相與言曰遼國之亡死義者十數南朝惟李侍郎一人河東割地使劉韐自經于金師劉韐至金營金人館之僧舍其僕射韓正謂之曰國相知君今用君矣韐曰偷生以事二姓有死不為也正曰軍中議立異姓欲以君為正代得以家屬行與其徒死不若北去取富貴韐仰天大呼曰有是乎歸書片紙曰金人不以豫為有罪而以豫為可用夫貞女不事二夫忠臣不事二君况主辱臣死以順為正者妾婦之道此豫所以必死也使親信持歸報其子子羽等即沐浴更衣酌巵酒而縊金人嘆其忠瘞之寺西岡上遍題窗壁以識其處凡八十日乃就斂顔色如玉宗澤敗金人于衛州澤自大名至開德與金人十三戰皆捷遂以書勸康王橄諸道兵會京城又移書北道總管趙野河東北路宣撫范訥知興仁府曽楙合兵入援三人皆以澤為狂不答澤遂以孤軍進至衛南度所將寡不深入不能成功先驅云前有敵營澤揮衆直前與戰敗之轉戰而東敵益生兵至澤將王孝忠戰死前後皆敵壘澤下令曰今日進退等死不可不死中求生士卒知必死無不一當百斬首數千金人大敗退却數十里澤計敵衆十倍今一戰而却勢必復來使悉其鐡騎夜襲吾軍則危矣乃暮徙其營金人夜至得空營大驚自是憚澤不敢復出兵澤出其不意遣兵過大河襲擊敗之太學生徐揆上書乞請帝還宫金人取而殺之西遼建都于和斯西遼主引兵東還行二十日得善地遂建都城號和斯鄂爾多改元康國以蕭額哩哷為都元帥率騎七萬東征以青牛白馬祭天誓衆興復額哩哷行萬餘里無所得牛馬多死勒兵而歸西遼主曰皇天弗順數也奈之何哉二月道君太上皇帝及太上皇后諸妃諸王公主駙馬都尉如金師帝自如青城都人日出迎駕而尼瑪哈留之不遣其知樞密院事劉彥宗請復立趙氏金主不許竟廢帝及太上皇帝為庶人丙寅金人塹南薰門路人心大恐已而金人遣吳幵莫儔持文書入城令推立異姓堪為人主者惟何㮚李若水毋得預議孫傅大慟曰吾惟知吾君可帝中國爾茍立異姓吾當死之上表金人請立趙氏不許丁卯金人邀太上皇至青城面議且以內侍鄧述所具諸王皇孫妃主名盡取之上皇即與太上皇后同如青城鄆王楷及諸妃公主駙馬及六宫有位號者皆從獨元祐皇后孟氏以廢居私第獲免丁卯上皇至金軍皇后太子如金師孫傅從之金人復令以上皇命召皇后太子孫傅留太子不遣統制吳革欲以所募士微服衛太子潰圍而出傅不從而密謀匿之民間别求狀類宦者二人殺之并斬十數死囚持首送之紿金人曰宦者欲竊太子出都人爭鬬殺傷誤中太子因帥兵討定斬其為亂者以獻茍不已則以死繼之越五日無肯承其事者吳幵莫儔督脅甚急范瓊恐變生以危言讋衛士遂擁皇后太子共車而出傅曰吾為太子傅當同死生金人雖不吾索吾當與之俱行求見三帥面責之庶或萬一可濟傅寓皇城司其子求省叱之曰使汝勿來而竟來耶吾已分死國雖汝百輩來何為揮使速去子亦泣曰大人以身殉國兒尚何言遂以留守事付王時雍辛未從太子出百官軍吏奔隨太子號哭太子亦呼云百姓救我哭聲震天至南薰門范瓊力止傅金守門者曰所欲得太子留守何預傅曰我宋之大臣且太子之傅也當死從遂宿門下不還金人召之以去金人大索金幣户部尚書梅執禮侍郎陳知質程振給事中安秩死之時金帥邀索金帛每曰和議已定但所需滿數則奉天子還闕梅執禮陳知質程振安秩皆主根索四人哀民力已因相與謀曰金人所欲無藝極雖銅鐡亦不能給盍以軍法結罪儻窒其求而宦者挾宿怨語金師曰城中百萬户所取未百一但許民持金銀換米麥當有出者已而果然金帥怒呼四人責之執禮等曰天子蒙塵臣民皆願致死雖肝腦不計於金銀何有哉顧比屋枵空無以塞命耳金帥問官長何在振恐執禮獲罪遽前曰皆官長也金帥怒先取其副胡舜陟胡唐老姚舜明王俁各杖之百執禮猶為之請俄遣還將及營門呼四人下馬檛殺之而梟其首士庶聞者莫不隕涕憤歎康王構帥師次于濟州王有衆八萬分屯濟濮諸州髙陽關路安撫使黃潛善總管楊惟忠亦以部兵數千至東平王遣真定總管王淵以三千人入衛宗廟金人聞之遣甲士及中書舍人張徴齎蠟詔自汴京至命王以兵付副帥而還京王問計於左右後軍統制張俊曰此金人詐謀耳今大王居外此天授豈可徒往因請進兵王遂如濟州金人遣吳幵莫儔入京集百官議立異姓執簽書樞密院事張叔夜御史中丞秦檜以去金帥遣翰林承㫖吳幵吏部尚書莫儔入城推立異姓幵儔召百官議衆莫敢出聲相視久之計無所出乃曰今日當勉强應命舉在軍前一人吏部尚書權留守王時雍問於幵儔二人徵言敵意在張邦昌時雍未以為然適尚書員外郎宋齊愈至自金營衆問金人意所主齊愈取片紙書張邦昌三字示之時雍乃决遂以邦昌姓名入議狀張叔夜不肯署狀且曰今日之事有死而已因移書金帥請立天子以從民望金人執置軍中太常寺簿張浚開封士曹趙鼎司門員外郎胡寅皆逃入太學中不書名唐恪既書名仰藥而死已而王時雍復集百官詣祕書省至即閉省門以兵環之俾范瓊諭衆以立邦昌意衆唯唯有太學生難之瓊恐沮衆厲聲折之遣歸學舍時雍先署狀以率百官御史馬伸獨言于衆曰吾曹職為爭臣豈容坐視不吐一辭以存趙氏乃與御史吳給約御史中丞秦檜共為議狀於金帥極言異姓不可立願復嗣君以安四方且論邦昌當上皇時専事宴游黨附權姦蠧國亂政社稷傾危實由邦昌金人怒執檜去吳幵莫儔持狀詣軍前邦昌入居尚書省三月金人立張邦昌為楚帝宣贊舍人吳革死之金人勸進邦昌始欲引决或曰相公不前死城外今欲塗炭一城耶適金人奉冊寶至丁酉邦昌北向拜舞受冊即位號大楚遂升文德殿設位御床西受賀遣閣門傳令勿拜王時雍率百官遽拜之邦昌但東面拱立閣門宣贊舍人吳革恥屈節異姓率內親事官數百人皆先殺其妻子焚所居舉義金水門外范瓊詐與合謀令悉棄兵仗乃從後襲之殺百餘人捕革併其子皆殺之又擒斬十餘人是日風霾日暈無光百官慘沮邦昌亦變色唯吳幵莫儔范瓊等欣然以為有佐命功邦昌心不安拜官皆加權字以時雍權知樞密院事領尚書省吳幵權同知樞密院事莫儔權簽書樞密院事吕好問權領門下省徐秉哲權領中書省邦昌見百官稱豫手詔曰手書雖不改元而百官文移必去年號獨吕好問所行文書稱靖康二年百官猶未以帝禮事邦昌唯王時雍每言事邦昌前稱臣啓陛下邦昌斥之時雍又勸邦昌坐紫宸垂拱殿以見金使吕好問曰宫省故吏驟見御正衙必將憤駭變且不測奈何邦昌乃止王時雍復議肆赦吕好問曰四壁之外皆非我有將誰赦耶乃止赦城中而選郎官為四方密諭使已而金人將還邦昌詣營祖之服柘袍張紅蓋所過設香按起居王時雍吳幵莫儔皆從士庶觀者無不感愴黃潛喜聞邦昌已立勸康王駐軍宿州謀渡江左王不許金斡里雅布自汴北還道君太上皇帝及太上皇后如金庚子斡里雅布以上皇太后與親王皇孫駙馬公主妃嬪及康王母韋賢妃康王夫人邢氏等北去張邦昌率百官遙辭於南薰門衆慟哭有仆絶者夏四月金尼瑪哈自汴北還帝及皇后太子如金四月庚申朔尼瑪哈退師以帝后太子妃嬪宗室及何㮚孫傅張叔夜司馬朴秦檜等北還凡法駕鹵簿皇后以下車輅鹵簿冠服禮器法物大樂教坊樂器祭器八寶九鼎圭璧渾天儀銅人刻漏古器祕閣三館書天下州府圖及官吏內人內侍伎藝工匠倡優府庫畜積為之一空宗澤在衛聞二帝北行即提軍趨滑走黎陽至大名欲徑度河據金人歸路邀還二帝而勤王之兵卒無至者遂不果初斡里雅布之北還也以尼瑪哈在太原其勢未合恐宋勤王之師有以乘之既退之後為宋計者宜為逺謀而乃上下遽爾相慶以為無復可虞矣於是迎上皇於東南散西兵於關陜勤王之師盡歸諸道堅守之詔遍告多方拘尼瑪哈之使忽李綱种師道之言曽不數月再致金師大原真定咽喉已塞而猶議三鎮棄守之利害故金人嘗語宋使曰待汝家議論定時我已渡河矣蓋當是時廟堂之相方鎮之將皆出於童蔡王梁之門無可以繫天下之望者如李邦彥張邦昌吳敏徐處仁唐恪聶昌耿南仲唯以割地請和為言未聞有出一計與之抗者是以金人之來如破竹然及圍城逾月外援不至竟以妖術取敗吁可怪哉金人圍中山知府陳遘為其下所殺城遂降中山為金人所圍者半藏外無援師汴京既陷知府陳遘盡括城中兵力戰部將沙振不悅懷刃入府刺遘殺之家人殱焉振出帳下卒執而捽裂之城中無主乃開門出降金師入城見遘尸曰忠臣也斂而葬之張邦昌尊哲宗廢后孟氏為元祐皇后入居禁中垂簾聽政遣使奉迎康王構于濟州吕好問謂張邦昌曰相公真欲立邪抑姑塞敵意而徐為之圖也邦昌曰是何言也好問曰相公知中國人情所向乎特畏女真兵威耳女真若去能保如今日乎大元帥在外元祐皇后在內此殆天意盍亟還政可轉禍為福且省中非人臣所處宜寓直殿廬毋令衛士夾陛敵所遺袍帶非戎人在傍弛勿服車駕未還所下文書不當稱聖㫖既而金人謀以五千騎取康王好問聞之即遣人以書白王曰大王之兵度能擊則邀擊不然則宜逺避及金人還議留兵以衛邦昌好問曰南北異宜恐北兵不習風土必不相安金人曰留一貝勒統之可也好問曰貝勒貴人有如觸發致疾則負罪益深金人乃不留兵而去好問復言于邦昌曰為今計者當迎元祐皇后請康王早正大位庶獲保全會御史馬伸具書請邦昌速奉迎康王同院無肯連名者伸獨持以往極陳逆順利害邦昌讀其書氣沮癸亥邦昌乃尊元祐皇后為宋太后入御延福宫而遣人至濟州訪康王好問又謂邦昌曰天命人心皆歸康王相公先遣人推戴則功無在相公右者若撫機不發他人聲罪致討悔可追耶邦昌乃復遣謝克家往奉迎王時雍曰夫騎虎者勢不得下所宜熟慮他日噬臍悔無及已徐秉哲從旁贊之邦昌不聽克家至濟州勸進王不許張俊曰大王皇帝親弟人心所歸當早正大位既而邦昌又遣蔣師愈等持書詣濟州自陳所以勉循金人推戴者欲權宜一時以紓國難耳非敢有他也王復書與之而諭宗澤等以為邦昌受僞命之人義當誅討然慮事出權宜未可輕動合移師近都按甲觀變澤復書謂邦昌篡亂蹤跡已無可疑今二聖諸王悉渡河而北惟大王在濟天意可知宜亟行天討興復社稷不可不斷吕好問亦遣人來言曰大王不自立恐有不當立而立者王然之丁卯邦昌又遣謝克家及王舅忠州防禦使韋淵奉大宋受命之寶于濟州戊辰邦昌手書上延福宫太后尊號曰元祐皇后入居禁中垂簾聽政以俟復辟以馮澥為奉迎使皇后亦使衛尉卿孟忠厚持書奉迎副都指揮使郭仲荀將所部兵扈衛御營前軍統制張俊將所部兵逆于道邦昌自稱權尚書左僕射率在京百官勸進于康王而退居于資善堂謝克家至濟州王慟哭受之命克家還京辨儀物甲戊皇后命太常少卿汪藻草手書告中外俾康王嗣統其略曰歷年二百人不知兵傳世九君世無失德雖舉族有北轅之釁而敷天同左袒之心乃眷賢王越居舊服漢家之厄十世宜光武之中興獻公之子九人惟重耳之尚在兹乃天意夫豈人謀濟州父老詣軍門言州四旁望見城中火光屬天請王即皇帝位㑹宗澤及權應天府朱勝非來言南京乃藝祖興王之地取四方中漕運尤易請幸之以圖大計王遂决意趨應天府庚辰王發濟州郡延副總管劉光世自陜州來會王以光世為五軍都提舉辛巳西道都總管王襄宣撫司統制官韓世忠知應天府朱勝非皆以師至癸未王至應天乙酉邦昌見王伏地慟哭請死王撫慰之王時雍等奉乘輿服御至羣臣勸進者益衆王命築壇于府門之左五月康王構即皇帝位于應天府大赦改元五月庚寅朔王登壇受命畢慟哭遙謝二帝遂即位于應天府治改元建炎大赦常赦所不原者咸赦之張邦昌及應于金國之人一切不問惟蔡京童貫朱勔李彥孟昌齡梁師成談稹子孫更不收叙仍敕刑部不得報赦文于河東河北陜之蒲解蓋懼金也是日元祐皇后在東京撤簾以黃潛善為中書侍郎汪伯彥同知樞密院事遙尊靖康皇帝為孝慈淵聖皇帝尊哲宗廢后孟氏為元祐太后作景靈宫于江寧府以張邦昌為太保奉國軍節度使同安郡王五日一赴都堂參决大事遙尊生母賢妃韋氏為宣和皇后遙立嘉國夫人邢氏為皇后耿南仲免召李綱為尚書右僕射綱再貶寧江金兵復至淵聖悟和議之非召綱為開封尹行次長沙被命即帥湖南勤王之師入援未至而京城失守至是召拜右相趣赴行在所中丞顔岐奏曰張邦昌為金人所喜雖已為三公郡王宜更加同平章事增重其禮李綱為金人所惡雖已命相宜及其未至罷之章五上帝曰如朕之立恐亦非金人所喜岐語塞而退岐猶遣人封其章示綱覬沮其至右諫議大夫范宗尹論綱名浮于實有震主之威帝不聽汪伯彥黃潛善自謂有攀附之勞擬必為相及召綱于外二人不悅遂與綱忤綱行至太平上疏曰興衰撥亂之主非英哲不足以當之惟其英故用心剛足以蒞大事而不為小故之所搖惟其哲故見善明足以任君子而不為小人之所間馮澥免以吕好問為尚書右丞元祐太后遣好問奉手書詣應天帝勞之曰宗廟獲全卿之力也拜右丞兼門下侍郎後李綱以羣臣在圍城中不能執節欲悉按其罪好問曰王業艱難政宜含垢繩以王法懼者衆矣綱乃止立御營司以黃潛善兼御營使汪伯彥兼副使時王淵楊惟忠以河北兵劉光世以陜西兵張俊苗傳以帥府及羣道兵皆在行朝不相統一乃置御營司主行幸總齊軍政命潛善伯彥領之而以王淵為都統制劉光世提舉一行事務韓世忠為左軍統制張俊為前軍統制而以楊惟忠主管殿前司公事王時雍有罪黃州安置論靖康王和誤國奉使割地罪安置李邦彥吳敏蔡懋李梲宇文虛中耿南仲鄭望之李鄴等于逺州加張邦昌太傅詔以邦昌知幾達變勳在王室如文彥博故事一月兩赴都堂議大事詔修正宣仁聖烈皇后事跡追貶蔡確蔡卞邢恕蔡懋等官詔史官辨宣仁聖烈皇后誣謗遂追貶之道君太上皇帝至燕山以宗澤知襄陽府澤見帝應天帝欲留任之黃潛善等沮焉故出安置監察御史張所于江州靖康中所以蠟書冒圍募河北兵士民得書喜曰朝廷棄我猶有一張察院能拔而用之應募者凡十七萬人由是所之聲震河北帝即位遣所按視陵寢所還上言曰河東河北天下之根本昨者誤用姦臣之謀始割三鎮繼割兩河其民怨入骨髓至今無不扼掔若因而用之則可藉以守否則兩河兵民無所係望陛下之事去矣且請帝亟還京城因具言有五利奉宗廟保陵寢一也慰安人心二也繫四海之望三也釋河北割地之疑四也早有定處而一意於邊防五也夫國之安危在乎兵之强弱與將相之賢不肖而不在乎都之遷與不遷也誠使兵弱而將士不肖雖曰渡江而南安能自保帝欲以其事付所㑹所言黃潛善姦邪不可用恐害新政潛善引去帝留之乃貶所官安置江州詔成都京兆襄陽荆南江寧府鄧揚州儲資糧修城壘以待巡幸以周望為二聖通問使如河北金師詔王襄趙野永邵州安置論勤王稽緩罪也金羅索入解絳慈隰石州河中府金達蘭入密州金逹呼入單州廣信軍六月以仲湜嗣濮王嗣王仲理北行以黃潛善為門下侍郎李綱至行在固辭相位不許六月己未朔李綱至入對涕泗交集帝為動容因奏曰金人不道専以詐謀取勝中國不悟一切墮其計中賴天命未改陛下總師于外為天下臣民之所惟戴內修外攘還二聖而撫萬邦責在陛下與宰相臣自視缺然不足以副陛下委任之意乞追寢成命且臣在道顔岐嘗封示論臣章謂臣為金人所惡不當為相帝命岐奉祠出范宗尹知舒州綱猶力辭帝曰朕知卿忠義智略久矣其勿辭綱頓首泣謝且言昔唐明皇欲相姚崇崇以十事要說皆中一時之病今臣亦以十事仰干天聽陛下度其可行者賜之施行臣乃敢受命一曰議國是謂中國之御四夷能守而後可戰能戰而後可和而靖康之末皆失之今欲戰則不足欲和則不可莫若先自治専以守為䇿俟吾政事修士氣振然後可議大舉二曰議巡幸謂車駕不可不一到京師見宗廟以慰都人之心度未可居則為巡幸之計以天下形勢而觀長安為上襄陽次之建康又次之皆當詔有司預為之備三曰議赦令謂祖宗登極赦令皆有常式前日赦書乃以張邦昌僞赦為法如赦惡逆及罪廢官盡復官職皆泛濫不可行宜悉改正以法四曰議僭逆謂張邦昌為國大臣不能臨難死節而挾金人之勢易姓改號宜正典刑垂戒萬世五曰議僞命謂國家更大變鮮仗節死義之士而受僞官以屈膝於其庭者不可勝數昔肅宗平賊汚僞命者以六等定罪宜倣之以勵士風六曰議戰謂軍政久廢士氣怯惰宜一新紀律信賞必罰以作其氣七曰議守謂敵情狡獪勢必復來宜於沿河江淮措置控禦以扼其衝八曰議本政謂政出多門紀綱紊亂宜一歸之於中書則朝廷尊九曰議久任謂靖康間進退大臣太速功效蔑著宜慎擇而久任之以責成功十曰議修德謂上始膺天命宜益修孝悌恭儉以副四海之望而致中興翌日班綱議于朝惟僣逆僞命二事留中不下治僣逆罪安置張邦昌于潭州貶放其黨有差李綱以所議僭逆僞命二事留中言于帝曰二事乃今日政刑之大者邦昌當道君朝在政府者十年淵聖即位首擢為相方國家禍難金人為易姓之謀邦昌如能以死守節推明天下戴宋之義以感動其心敵人未必不悔禍而存趙氏而邦昌方以為得計偃然正位號處宫禁擅降僞詔以止四方勤王之師及知天下之不與不得已乃請元祐太后垂簾聽政而議奉迎邦昌僣逆始末如此而議者不同臣請以春秋之法斷之夫都城之人德邦昌者謂因其立而得生且免重科金銀之擾元帥府恕邦昌者謂其不待征討而遣使奉迎若天下之憤疾邦昌者則謂其建號易姓而奉迎特出於不得已都城德之元帥府恕之私也天下幩疾之公也春秋之法人臣無將將而必誅趙盾不討賊則書以弒君今邦昌已僣位號敵退而止勤王之師非特將與不討賦而已劉盆子以漢宗室為赤眉所立其後以十萬衆降光武但待之不死邦昌以臣易君罪大於盆子不得已而自歸朝廷既不正其罪又尊崇之此何理也陛下欲建中興之業而尊崇僣逆之臣以示四方其誰不解體又僞命臣僚一切置而不問何以厲天下士大夫之節時執政中有議不同者帝召黃潛善等語之潛善主邦昌甚力帝顔吕好問曰卿昨在圍城中知其故以為何如好問附潛善持兩端曰邦昌僣竊位號人所共知既已自歸唯陛下裁處綱言邦昌僣逆豈可使之在朝廷使道路指目之曰此亦一天子哉因泣拜曰臣不可與邦昌同列當以笏擊之陛下必欲用邦昌第罷臣帝頗感動汪伯彥乃曰李綱氣直臣等所不及癸亥乃降御批曰邦昌僣逆理合誅夷原其初心出於迫脅可特與免貸乃責授昭化軍節度副使潭州安置并安置受僞命臣僚王時雍吳幵莫儔李擢孫覿干髙永全栁歸州而顔博文王紹以下論罪有差贈劉韐為資政殿大學士李若水為觀文殿學士詔諸路訪死節之臣以聞李綱言近世士大夫寡亷恥不知君臣之義靖康之禍能仗節死義者在內惟李若水在外惟霍安國願加贈恤帝從其請遂贈安國延康殿學士劉韐等皆贈官仍詔有死節者諸路詢訪以聞以李綱兼御營使甲子帝謂綱曰卿昨爭張邦昌事內侍輩皆涕泗卿今可以受命矣綱拜謝有㫖兼充御營使入對言曰今國勢不逮靖康間逺甚然而可為者陛下英斷于上羣臣輯睦于下庶幾靖康之弊可革而中興可圖然非有規模而知先後緩急之序則不能以成功夫外禦强敵內銷盜賊修軍政變士風裕邦財寬民力改弊法省冗官誠號令以感人心信賞罰以作士氣擇帥臣以任方面選監司郡守以奉行新政俟吾所以自治者政事已修然後可以問罪金人迎還二聖此謂規模也至於所當急而先者則在於料理河北河東蓋河北河東者國之屏蔽也料理稍就然後中原可保而東南可安今河東所失者恆代太原澤潞汾晉餘郡猶存也河北所失者不過真定懷衛濬四州而已其餘二十餘郡皆為朝廷守兩路士民兵將所以戴宋者其心甚堅皆推豪傑以為首領多者數萬少者亦不下萬人朝廷不因此時置司遣使以大慰撫之分兵以援其危急臣恐糧盡力疲坐受金人之困雖懷忠義之心援兵不至危迫無告必且憤怨朝廷金人因得撫而用之皆精略兵也莫若於河北置招撫司河東置經制司擇有材者為之使宣諭天子恩德所以不忍棄兩河於敵國之意有能全一州復一郡者以為節度防禦團練使如唐方鎮之制使自為守非惟絶其從敵之心又可務資其禦敵之力使朝廷永無北顧之憂最今日之先也帝善其言問誰可任者綱以張所及傅亮薦馬皇子敷生大赦皇子生故事當肆赦李綱言陛下登極曠蕩之恩獨遺河北河東而不及勤王之師天下觖望夫兩河為朝廷堅守而赦令不及人皆謂已棄之何以慰忠臣義士之心勤王之師在道路半年擐甲荷戈冒犯霜露雖未效用亦已勞矣加以疾病死亡恩恤不及後有急難何以使人乎願因今赦廣示德意帝從之於是人情翕然間有捷書至者金人圍守諸郡之兵往往引去矣還元祐黨籍人官爵詔陜西山東諸路帥臣團結軍民互相應援李綱立軍法五人為伍伍長以牌書同伍四人姓名二十五人為甲甲正以牌書伍長五人姓名百人為隊隊將以牌書甲正四人姓名五百人為部部將以牌書隊將正副十人姓名二千五百人為軍統制官以牌書部長正副十人姓名命招置新軍及御營司並依此法團結有所呼召使令按牌以遣綱又申明軍政合更改者數十條多施行之以汪伯彥知樞密院事以傅雱為二聖通問使如河東金師黃潛善白遣宣義郎傅雱為祈請使李綱曰堯舜之道孝弟而已矣但今日之事正當枕戈嘗膽內修外攘使刑政修而中國强則二帝不俟迎請而自歸不然雖冠蓋相望卑辭厚禮恐亦無益今所遣使但當奉表通問兩宫致思慕之意可也帝從之遂命綱草表以雱為二聖通問使奉表以往且致書于尼瑪哈立沿河沿淮沿江帥府几十有九府要郡三十九次要郡三十八帥府兼都總管守臣兼鈴轄都監總置軍九十六萬七千五百人别置水軍七十七將造舟江淮諸路川郡置賞功司李綱請三省樞密院置賞功司受賂乞取者行軍法遇敵逃潰因而為盜賊者誅及家屬以張慤同知樞密院事兼措置户部財用初慤為計度都轉運使帝為大元帥募諸道兵勤王慤飛挽踵道建議印給鹽鈔以便商旅不閲旬得緡錢五十萬以佐軍帝即位以為户部尚書至是拜同知兼措置户部財用建言三河之民怨敵深入骨髓恨不殱珍其類以報國家之仇請依唐人澤潞步兵雄邊子弟遺意募民聨以什伍而寓兵于農使合力抗敵謂之巡社其法精詳詔集為書行之吕好問免詔封為東萊郡侯侍御史王賓論好問嘗汚僞命不可以立新朝帝曰邦昌僣號之初好問募人齎帛書具道京師內外之事金人甫退又遣人勸進考其心迹非他人比也好問自慙力乞退罷且言邦昌僣號之時臣若閉門潔身實不為難徒以世被國恩所以受賢者之責冒圍齎書於陛下疏入除資政殿學士知宣州封東萊郡侯卒淵聖皇帝渡白溝僉書樞密院事張叔夜死之叔夜從淵聖北行在道中不食粟唯時飲湯至白溝河御卒者曰過河界矣叔夜矍然起仰天大呼扼吭而以宗澤為東京留守澤纍表請帝還京師不報澤在襄陽會金人有割地之謀澤上疏曰天下者太祖之天下陛下當兢兢業業思傳之萬世奈何遽議割河之東西又議割陜之蒲解乎自金人再至朝廷未嘗命一將出一師但聞姦邪之臣朝進一言以告和暮入一說以乞盟終至二聖北遷宗社蒙恥臣意陛下赫然震怒大明黜陟以再造王室今即位四十日矣未聞有大號令但見刑部指揮云不得謄播赦文於河之東西陜之蒲解者是禠天下忠義之氣而自絶其民也臣雖駑怯當躬胃矢石為諸將先得捐軀報國恩足矣帝覽其言而壯之開封尹闕李綱言綏復舊都非澤不可乃以為東京留守知開封府時敵騎留屯河上金鼓之聲日夕相聞而京城樓櫓盡廢兵民雜居盜賊縱橫人情洶洶澤威望素著既至首捕誅舍賊者數人下令曰為盜賊者贓無輕重並從軍法由是盜賊屏息因撫循軍民修治樓櫓屢出師以挫敵有王善者河東巨冦也擁衆七千萬車萬乘欲據京城澤單騎馳至善營泣喟之曰朝廷當危雖之時使有如公一二輩豈復有敵患乎今日乃汝立功之秋不可失也善感泣曰敢不效力遂解甲降又有楊進者號沒角牛衆三十萬丁進王再興李貴王大郎等擁衆各數萬往來京西准南河南北侵掠為患澤遣人諭以禍福悉招降之上疏請帝還京俄有詔荆襄江淮悉備巡幸澤又上疏言開封物價市肆斬同平時將士農民商旅士大夫之懷忠義者莫不願陛下亟歸京師以慰人心其唱為異議者非為陛下忠謀不過如張邦昌輩隂與金人為地耳既而金人遣使以使僞楚為名至開封澤曰此名為使而實覘我也拘其人乞斬之有詔所拘金使延置别館澤奏曰國家永平二百年不識兵革以敵國欺謾為可憑信不置疑不惟不嚴攻討之計其有實欲賈勇思敵所愾之人士大夫不以為狂則以為妄致有前日之禍張邦昌虛耿南仲所為陛下所親見也今金人假使僞楚來覘實臣愚乞斬之以破其姦而陛下惑於人言令遷置别館優加禮遇臣愚不敢奉詔以彰國弱帝乃手札諭澤竟縱遣之真定懷衛間敵兵甚盛方密修戰具為入攻之計而將相大臣恬不為慮不修武備澤以為憂乃渡河約諸將共議事宜以圗收復而於京城四壁各置使以領招集之兵造戰車千二百乘又據形勢立堅壁二十四所於城外駐兵數萬澤往來按試之又沿河鱗次為連珠寨連結河東河北山水寨忠義民兵於是陜西京東西諸路人馬咸願聽澤節制澤又開五丈河以通西北商旅京畿瀕河七十二里命十六縣分守之守禦之備既具纍表請帝還京而帝用黃潛善計决意幸東南不報秉義郎嶽飛犯法將刑澤一見竒之曰此將材也會金人攻汜水澤以五百騎授飛使立功贖罪飛遂大敗金人而還升飛為統制而謂之曰爾智勇材藝古良將不能過然好野戰非萬全計因授飛陳圖飛曰陳而後戰兵法之常運用之妙存乎一心澤是其言飛由此知名金右副元帥斡里雅布卒斡里雅布又名宗望詔陜西河北京東西路募兵入衛以張所為河北西路招撫使所以王彥為都統制嶽飛為統領賜內府錢百萬給空名告身千餘道以京西卒三千自衛將佐官屬許自辟置一切以便宜從事所入對條上利害且乞置司北京俟措置有緒乃渡河河北轉運副使張益謙附黃潛善意奏所置司北京非是且言自置招撫司河北盜賊愈熾而民間苦擾不若罷之專以其事付帥司李綱言張所今留京師招集將佐尚未及行益謙何以知其擾河北民無所歸聚而為盜豈由置司乃有盜賊乎而益謙非理沮抑如此必有使之者上乃命益謙分析命下樞密院汪伯彥猶用其奏詰責招撫司李綱與伯彥力爭伯彥語塞所招徠豪傑擢王彥為都統制於是河北賊丁順楊進等皆赴招撫司以降時嶽飛上書言勤王之師日集宜乘敵怠而擊之黃潛善汪伯彥輩不能承聖意恢復奉車駕日益南恐不足繫中原之望願陛下乘敵勢未固親率六軍北渡則將士作氣中原可復坐越職言事奪官歸詣所所以飛充中軍統領問之曰爾能敵幾何飛曰勇不足恃用兵在先定謀欒枝曳柴以敗荆莫敖采樵以致絞皆謀定也所矍然曰君殆非行伍中人飛因說所曰國家都汴恃河北以為固茍馮據要衝峙列重鎮一城受圍則諸城或撓或救金人不能窺河南而京師根本之地固矣招撫誠能提兵壓境飛唯命是從所大喜借補飛武經郎造戰車于京東西路李綱奏步兵不足以勝騎騎兵不足以勝車請以車制頒京東西製造而教閲之括買官民馬勸出財助國以錢蓋為陜西經制使秋七月以王􅊛為河東經制使傅亮為副使詔諸路忠義巡社𨽻安撫司淵聖皇帝至燕山尚書右僕射何㮚不食卒㮚至燕仰天大慟不食而卒年三十九詔奉元祐太后如東南帝從汪伯彥黃潛善言將幸揚州以避敵詔副都指揮使郭仲荀奉元祐太后先行六宫及衛士家屬皆從己未發京師以許翰為尚書右丞右諫議大夫宋齊愈有罪棄市齊愈附于黃潛善汪伯彥上疏論李綱募兵買馬括財三事之非不報擬章將再上其鄉人嫌齊愈者竊其草示綱時方論僣逆附僞之罪而齊愈實書邦昌姓名以示衆者於是逮齊愈于獄齊愈不承獄吏曰王尚書輩所坐不輕然但遷嶺南大練第承不過踰嶺爾齊愈引伏遂命戮于東市詔議幸南陽以范致虛知鄧州李綱言車駕巡幸之所關中為上襄陽次之建康為下陛下縱未能行上策猶當且適襄鄧示不忘故都以係天下之心不然中原非復我有車駕還闕無期天下之勢遂傾不復振矣帝乃諭兩京以還都之意讀者皆感泣既而有詔欲幸東南避敵綱極言其不可且曰自古中興之主起於西北則足以據中原而有東南起於東南則不能以復中原而有西北蓋天下精兵健馬皆在西北一旦委中原而棄之豈惟金人將乘間以擾內地盜賊亦將蜂起為亂跨州連邑陛下雖欲還閥不可得矣況欲治兵勝敵以歸二聖哉夫南陽光武之所興有髙山峻嶺可以控扼有寬城平野可以屯兵西鄰關陜可以召將士東達江淮可以運榖粟南通荆湖巴蜀可以取財貨北距三都可以遣救援暫議駐蹕乃還汴都䇿無出於此者今乘舟順流而適東南固甚安便苐恐一失中原則東南不能必其無事雖欲退保一隅不可得也况常降詔許留中原人心悅服奈何詔墨未乾遽失大信於天下帝乃許幸南陽以范致虛知鄧州修城池繕宫室輸錢榖以實之而汪伯彥黃潛善隂主揚州之議或謂綱曰外論洶洶咸謂東幸已決綱曰國之存亡於是焉分吾當以去就爭之遣使迎奉太廟神主赴行在所帝將幸揚州遣使迎奉太廟神主于汴京罷四道都總管曹勛以太上皇帝手書至自金太上既渡河十餘日謂管幹龍德宫曹勛曰我夢四日並出此中原爭立之象不知中原之民尚肯推戴康王否因出御衣絹半臂親書其領中曰便可即真來救父母又諭勛曰如見康王苐言有清中原之策悉舉而行之毋以我為念康王夫人邢氏聞勛南還亦脫所御金環使內侍持付勛曰幸為我白大王願如此環得早相見也勛遂間行至南京以御衣進入帝泣以示輔臣勛因建議募死士入海至金國東境奉二帝由海道歸執政難之出勛于外盜史斌稱帝于興州八月勝捷軍校陳通作亂于杭州執帥臣葉夢得詔以錢伯言知杭州帥淮浙兵討之以李綱黃潛善為尚書左右僕射兼御營使張慤兼御營副使一日綱侍帝論及靖康時事帝曰淵聖勤於政事省覽章奏至終夜不寐然卒致播遷何也綱對曰人主之職在知人進君子退小人則大功可成否則衡石程書無益也因勉帝以明恕盡人言恭儉足國用英果斷大事帝皆嘉納之綱所論諫其言切直帝初傾心聽受至是惑於黃潛善汪伯彥之言往往留中不報更號元祐太后為隆祐太后尚書省言元字犯后祖諱請易以所居宫名從之罷河東經制使司召副使傅亮還行在所李綱乞避位不許有㫖令東京留守宗澤節制傅亮軍即日渡河亮言措置未就而渡河恐誤國事李綱言招撫經制二司臣所建明而張所傅亮又臣所薦用今黃潛善汪伯彥沮所亮所以沮臣臣每鑒靖康大臣不和之失事未嘗不與潛善伯彥議而後行而二人設心如此願陛下虛心觀之帝不納竟罷經制司召亮赴行在李綱言聖意必欲罷亮乞以御筆付黃潛善施行臣得乞身歸田里綱退而亮罷綱乃再疏求去帝曰卿所爭細事胡乃爾綱言方今人材以將帥為急恐非小事臣昨議遷幸與潛善伯彥異宜為所嫉然臣東南人豈不願陛下東下為安便哉顧一去中原後患有不可勝言者願陛下以宗社為心以生靈為意以二聖未還為念勿以臣去而改其議臣雖去左右不敢一日忘陛下泣辭而退或曰公決於進退於義得矣如讒者何綱曰吾知盡事君之道不可則全進退之節患禍非所恤也李綱罷侍御史張浚劾綱以私意殺侍從且論其買馬招軍之罪黃潛善汪伯彥等復力排綱請帝去之遂罷綱提舉洞霄宫几在相位七十七日綱罷而招撫經制司廢車駕遂東幸兩河郡縣相繼淪陷几綱所規畫軍民之政一切廢格金兵益熾關輔殘毁中原盜賊蜂起而國不可為矣殺前太學録陳東布衣歐陽徹東辭官歸丹陽帝即位五日遣使召之東至南京未得對會李綱罷相乃上書乞留綱而罷黃潛善汪伯彥不報又上疏請帝親征以還二聖治諸將不進兵之罪以作士氣卓駕宜還京師勿幸金陵又不報潛善方揭示綱請幸金陵舊奏東言綱在中途不知事體宜以後說為正必速罷潛善輩會撫州布衣歐陽徹徒步詣南京伏闕上書極詆用事大臣潛善遽以語激怒帝言不亟誅將復鼓衆伏闕書獨下潛善所府尹孟庾召東議事東請食而行手書區處家事字畫如平時已而授其從者曰我死爾歸致此于吾親食已如厠吏有難色東笑曰我陳東也畏死即不敢言已言肯逃死乎吏曰吾亦知公安敢相迫頃之東具冠帶出别同邸乃與徹同斬于市四明李猷贖二尸瘞之東初未識綱特以國故至為之死識與不識皆為流涕許翰罷李綱之罷也翰言綱忠義英發捨之無以佐中興今罷綱臣留無益力求去帝不許及陳東得罪翰謂所親曰吾與東皆爭李綱者東戮于市吾在廟堂可乎乃為東徹著哀辭而入上章求罷遂提舉洞霄宫金以鄂爾多為右副元帥鄂爾多太祖子也一名宗輔九月詔擇日巡幸淮甸黃潛善汪伯彥力請幸東南㑹金人攻河陽汜水軍許景衡以建康天險可據請幸之遂詔擇日巡幸淮甸命淮浙沿海諸州增修城壁招訓民兵以備海道又命揚州守臣吕頤浩繕修城池遣徽猷閣待制孟忠厚迎奉太廟神主赴揚州罷買馬封皇子敷為魏國公以王圭為河北招撫判官安置招撫使張所于嶺南宗澤復上表請帝還京師不報王彥渡河大敗金人于新鄉進次大行金人圍之彥師潰走保共城張所使彥帥嶽飛等十一將凡七千人渡河至新鄉金兵盛彥不敢進嶽飛獨引所部鏖戰奪其纛而舞諸軍爭奮遂復新鄉明日又戰于侯兆川飛身被十餘創會食盡詣彥壁乞糧彥不許飛乃引兵益北與金人戰于太行山擒其將拓跋耶烏居數日又與敵遇飛單騎持丈八鐵鎗刺殺其將黑風大王金人敗走飛知彥不悅已遂率所部復歸宗澤澤復以為統制彥以屢勝因傳檄州郡金人以為大軍至率騎數萬薄彥壘圍之數匝彥以衆寡不敵潰圍出走太行諸將各散去彥獨保共城西山復遣腹心結兩河豪傑圗再舉金人購求彥急彥慮變夜寢屢遷其部曲覺之相率刺面作赤心報國誓殺金人八字以示無他意彥益感勵撫愛士卒與同甘苦未幾兩河響應忠義民兵首領傅選孟德劉澤焦文通等皆附之衆十餘萬綿亘數百里皆受彥約束金人患之召其首領俾以大兵破彥壘首領跪而泣曰王都統寨堅如鐡石未易圗也金人乃間遣騎兵撓彥糧道彥勒兵待之斬獲甚衆募民入資授官盜趙萬陷常州鎮江府罷諸路經制招撫使張邦昌伏誅初邦昌僣居禁中華國靖恭夫人李氏數以果實奉邦昌邦昌亦厚答之一夕邦昌被酒李氏擁之曰大家事已至此尚何言因以赭色半臂加邦昌身掖入福寧殿夜飾養女陳氏以進及邦昌還東府李氏私遂之語斥乘輿至是事聞下李氏于獄詞伏詔馬伸如潭數邦昌之罪睗死并誅王時雍等金棟摩入河間府雄州達蘭入祁保州永寧順安軍自是兩河州郡多屬金矣冬十月帝如揚州諜者言金人欲犯江浙詔暫駐淮甸捍禦稍定即還京闕有敢妄議惑衆沮巡幸者許告而罪之不告者斬宗澤上疏諫曰京師天下腹心不可棄也昔景德間契丹冦澶淵王欽若江南人勸幸金陵陳堯叟閬中人勸幸成都惟冦凖毅然請親征卒用成功因條上五事其一言黃潛善汪伯彥贊南幸之非澤前後建議輒為黃汪所抑二人每見澤奏至皆笑以為狂於是帝決意幸揚州十月丁巳朔帝登舟時兩河雖多陷于金而其民懷宋恩所在結為紅巾出攻城邑皆用建炎年號金人畏而引去者衆及聞帝南幸由是解體隆祐太后至揚州罷帥府要郡次要郡及新軍水軍以王淵為杭州制置盜賊使以劉光世為滁和濠州江寧府招捉盜賊制置使苗傅為御營使司都統制帝至揚州王淵誘趙萬誅之金徙太上皇帝淵聖皇帝于大定府大定金中京也十一月竄提舉洞霄宫李綱于鄂州盜張遇陷池州以王倫為金國通問使倫旦之族孫也家貧無行為任俠往來京洛間數犯法幸免至是選能專對者使金問二帝起居乃假倫刑部侍郎充大金通問使閣門舍人朱辨副之至雲中見尼瑪哈議事時金方大舉南下倫邀說百端尼瑪哈不聽使就館守之以兵有商人陳忠密語倫以二帝在黃龍府倫辨乃以金遺忠往黃龍潛通意由是二帝始知康王即位以張慤為中書侍郎顔岐許景衡為尚書左右丞郭三益同知樞密院事權知密州趙野棄城走軍校杜彥據州追野殺之十二月王淵入杭州執陳通誅之金尼瑪哈鄂爾多烏珠羅索分道南侵西京留守孫昭逺帥師南走河東經制使王􅊛自同州帥師入蜀金人取淄青趙濬滑同華汝州金聞帝如揚州遂起燕京等八路民兵命將分道南伐尼瑪哈自雲中下太行由河陽渡以攻河南至汜水關孫昭逺南走鄂爾多取淄青趙州烏珠自燕山由滄洲渡河以攻山東且分兵趣淮南將謀侵汴宗澤聞之命劉衍趨滑州劉達趨鄭州以分其勢戒諸將保護河梁以俟大兵之集烏珠遂不敢向汴夜斷河梁而去羅索自同州渡河以攻陜西於是鄂爾多取濬滑色哩取同華汝遂破潼關王􅊛遂自同州帥師入蜀避之盜丁進降于宗澤通鑑續編卷十三
