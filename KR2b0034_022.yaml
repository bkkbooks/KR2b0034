body:
  text: 通鑑續編卷十九元陳桱撰乙卯寧宗皇帝慶元元年金明昌六年春正月以李沐為右正言二月趙汝愚罷韓侂胄欲逐汝愚而難其名謀于京鏜鏜曰彼宗姓也誣以謀危社稷則一網打盡矣侂胄然之以秘書監李沐嘗有怨于汝愚引為右正言使奏汝愚以同姓居相位将不利于社稷乞罷其政以尊安天位杜塞姦源是日汝愚出浙江亭待罪詔宣押赴都堂治事沐又上䟽論之乞罷宣押乃以觀文殿大學士出知福州汝愚既去朝廷大權悉歸于侂胄矣貶知福州趙汝愚提舉洞霄宫罷兵部侍郎章頴知臨安府徐誼國子祭酒李祥博士楊簡謝深甫等論汝愚冒居相位今既罷免不當以書殿隆名帥藩閫重寄乞令奉祠省咎從之李祥言去嵗國遭大戚中外洶洶留正棄相位而去官僚㡬欲解散軍民皆将為亂兩宫隔絶國喪無主汝愚以樞臣獨不避殞身滅族之禍奉太皇太后命翊陛下以登九五勛勞著于社稷精忠貫于天地乃卒受黯黮而去天下後世其謂何章頴徐誼楊簡亦抗論留汝愚李沐劾為黨皆斥之三月丙戌朔日有食之夏四月安置大府寺丞吕祖儉于韶州祖儉上書訴趙汝愚之忠併論朱熹老儒彭龜年舊學李祥老成不當罷斥韓侂胄怒有㫖祖儉朋比罔上送韶州安置中書舎人鄧馹繳奏祖儉不當貶不從樓鑰因進讀論及侂胄語人曰復有論救祖儉者當處以新州衆乃不敢言或謂侂胄曰自趙丞相去天下已切齒今又投祖儉瘴鄉不幸或死則怨益重侂胄悟改送吉州祖儉嘗曰因世變有所摧折失其素履者固不足言因世變而意氣有所加者亦私心也竟死吉州以余端禮為右丞相鄭僑叅知政事京鏜知樞密院事謝深甫僉書院事竄太學生楊宏中等六人于五百里外宏中與周端朝張衜林仲麟蒋傳徐範等六人伏闕上書言去嵗人情驚疑變在朝夕當時假非汝愚出死力定大議雖百李沐罔知攸濟當國家多難汝愚位樞府秉兵柄指揮操縱何向不可不以此時為利今上下安恬乃獨有異志乎章頴李祥楊簡發於中激力辨其非即遭斥逐今李沐自知邪正不兩立思欲盡覆正人以便其私必託朋黨以罔陛下之聽恐君子小人消長之機於此一判則靖康巳然之驗何可再見伏願陛下念汝愚之忠勤察祥簡之非黨灼李沐之回邪竄李沐以謝天下還祥簡以收士心䟽上韓侂胄大怒内批宏中等妄亂上書扇揺國是悉送五百里外編管天下號為六君子焉以李沐為右諫議大夫劉徳秀為右正言五月金命左丞相𤓰爾佳清臣行省事于臨潢府以伐北鄙阻䪁等部詔戒百官朋比六月劉徳秀乞考核真偽以辨邪正從之遂罷國子祭酒陳伸國子司業汪逵國子正陳武博士孫元卿太學博士袁燮自程顥程頥以先王之道淑諸後進其徒楊時尹焞傳其緒言由是羅從彦李侗朱熹張栻力行致知以求深造其域流俗之人不便之遂有道學之名隂以攻詆及韓侂胄怨趙汝愚朱熹以其從㳺者皆知名士欲盡去之而不可悉誣以罪或謂之曰凡相與異者皆道學之人若以道學目之則有何罪當名曰偽學其言以貪黷放肆乃人真情亷潔好脩皆偽情耳復隂䟽朱熹門下姓名授之由是有偽學之目善類皆不自安矣至是右正言劉徳秀上言邪正之辨無過於真與偽而已彼口道先王言而行如市人所不為在興王之所必斥也昔孝宗垂意䂓恢首務核實凡真偽之徒言行相違者未嘗不深知其姦臣願陛下以孝宗為法考核真偽以辨邪正詔下其章由是孫元卿袁燮陳武皆罷陳伸汪逵入劄子辨之徳秀以伸逵為狂言亦被斥徳秀甞宦長沙不為張栻之徒所禮及居朝覬内除而留正語著作佐郎范仲黼曰若留徳秀班行朝廷無安靖之理徳秀故怨二人既而吏部郎官糜師旦復建言請考核真偽遷左司員外郎又有張貴模指論太極圖亦被賞擢陳伸顯之孫醇徳碩學為時所尊蒞政皆可師法與人未嘗有競及偽學之論起凡七上章辨之竟以是去焉加韓侂胄保寧軍節度使提舉萬夀觀何澹乞風厲學者専師孔孟從之中丞何澹素有怨于周必大及趙汝愚韓侂胄引之以成偽學之禁澹遂上言専門之學流而為偽空虚短拙文詐沽名乞風厲學者専師孔孟不得自相標榜詔以其章榜示朝堂澹尋又上䟽論在朝之臣大臣既熟知其邪正之迹然亦不敢白發以招報復之禍望明詔大臣去其所當去者冬十月以子恭為安定郡王十一月安置提舉洞霄宫趙汝愚于永州汝愚行至衡州暴卒韓侂冑忌汝愚必欲寘之死以息人言由是何澹劾汝愚落其觀文殿大學士及宫觀監察御史胡紘遂上言汝愚倡引偽徒謀為不軌乘龍授鼎假夢爲符因條奏其十不遜且及徐誼詔責汝愚寧逺軍節度副使永州安置誼恵州團練副使南安軍安置葉適亦奉祠時汪義端當制遂用漢誅劉屈氂唐戮李林甫事示欲殺之之意廸功郎趙師召亦上書乞斬汝愚帝不從汝愚怡然就道謂諸子曰觀侂胄之意必欲殺我我死汝曹尚可免也明年正月行至衡州病作衡守錢鍪承侂胄密諭窘辱百端汝愚遂暴薨天下聞而寃之訃聞有㫖追復元官許歸葬中書舎人呉宗旦繳還復官之命汝愚學務有用常以司馬光富弼韓琦范仲淹自期凡平昔所聞於師友如張栻朱熹吕祖謙汪應辰王十朋胡銓李燾林光朝之言欲次第行之未果而罷政當孝宗崩光宗疾汝愚奮不顧身定大計于頃刻收召明德之士以輔新政其功可謂盛矣卒為侂胄所搆斥死遐荒而宋之陵夷馴致于不可為惜哉初汝愚嘗夢孝宗授以湯鼎背負白龍升天後翼嘉王以素服即位盖其驗也李沐胡紘遂用為罪云徐誼為汝愚所器凡有政務多咨訪之誼随事禆助不避形迹怨者始衆又嘗勸汝愚早退及豫防侂胄之姦是以侂胄怨之金𤓰爾佳清臣免以右丞相完顔襄行省事于臨潢清臣至臨潢令伊喇敏完顔安國為左右翼分領前隊自選精兵一萬以當後隊進至哈拉河前隊攻栲栳濼諸營下其十四回迎清臣屬部薩察掩其所獲清臣遣人責其賧罰北凖布由是叛去大肆侵掠金主遣使免清臣以襄代之襄至臨潢遣布薩揆等進兵大鹽濼攻其諸營伊喇都等為鴻吉哩部兵所敗死之十二月以朱熹為煥章閣待制熹辭從之金平章政事完顔守貞罷守貞剛直明亮通習典故凡論對必傅經義時金有國七十年禮樂刑政因遼宋舊制金主欲更定修正為一代法其儀式條約多守貞裁訂故明昌之治號稱清明又好接引善類以列朝廷為胥持國所忌罷去丙辰二年金承安元年春正月以余端禮為左丞相京鏜為右丞相謝深甫參知政事鄭僑知樞密院事何澹同知院事夏四月余端禮罷時韓侂胄擅權屏斥正士端禮欝欝不愜志稱疾求罷以何澹參知政事葉翥僉書樞密院事罷禮部侍郎倪思初翥要思列疏論偽學思不從韓侂胄遂薦翥而罷思金初行區種法五月賜禮部進士鄒應龍以下四百九十九人及第出身是嵗葉翥倪思知貢舉劉徳秀奏言偽學之魁以匹夫竊人主之柄鼓動天下故文風未能丕變乞将語録之𩔖盡行除毁故是科取士稍涉義理者悉見黜落六經語孟中庸大學之書為世大禁矣以張釡為尚左郎官淮西總領張釡上言邇者偽學盛行賴陛下聖明斥罷天下皆洗心滌慮不敢復為前日之習願明詔在位之臣上下堅守勿變毋使偽言偽行乘間而入以壞既定之䂓模乃除釡尚左郎官作華文閣蔵孝宗御集也秋七月加韓侂胄開府儀同三司萬壽觀使罷殿中侍御史黄黼中書舎人汪義端引唐李林甫故事以偽學之黨皆名士欲盡除之一時號為君子無不斥罷太皇太后聞之以語帝乃詔臺諫給舎論奏毋及舊事務在平正以副朕建中之意詔下韓侂胄及其黨皆怒劉徳秀遂與御史張伯垓姚愈等上䟽言自今舊姦宿惡或滋長不悛臣等不言則誤陛下之進用言之則礙今日之御札若俟其敗壞國事如前日而後進言則徒有噬臍之悔三者皆無一而可望下臣章播告中外令舊姦知朝廷紀綱尚在不至放肆帝從之乃詔改不必更及舊事為不必専及舊事自是侂胄與其黨攻治正士愈急矣黄黼上言治道在黜首惡而任其賢使才者不失其職而不才者無所憾故仁宗嘗曰朕不欲留人過失於心此皇極之道也黼竟被罷而以姚愈代之八月胡紘乞住進擬偽學之黨從之太常少卿胡紘上書言比年以来偽學猖獗圖為不軌動搖上皇詆誣聖徳㡬至大亂賴二三大臣臺諫出死力而排之故元惡殞命羣邪屏迹自御筆有救偏建中之説或者誤認天意急於奉承倡為調停之議取前日偽學之姦黨次第用之以冀幸其他日不相報復往者建中靖國之事可以為戒陛下何未悟也宜令退伏田里循省愆咎遂詔偽學之黨宰執權住進擬自是學禁愈急九月嗣濮王士歆卒冬十月召陳賈為兵部侍郎以其嘗擊朱熹也十二月罷祕閣脩撰致仕朱熹官竄處士蔡元定于道州臺諫皆韓侂冑所引無不迎合其意以攻偽學為言然憚清議未有誦言攻熹者胡紘獨草䟽将論之㑹改太常少卿不果及沈繼祖上䟽追論程頥之罪侂胄薦為御史紘即以䟽草授之繼祖遂誣論朱熹十罪且言熹剽竊張載程頥之餘論以喫菜事魔之妖術簧鼓後進張浮駕誕私立品題收召四方無行義之徒以益其黨與飱麤食淡衣裒帶博或㑹徒於廣信鵞湖之寺或呈身於長沙敬簡之堂潜形匿迹如鬼如魅乞禠熹職罷祠其徒蔡元定佐熹為妖乞送别州編管詔熹落職罷祠竄元定于道州已而選人余嚞上書乞斬熹以絶偽學謝深甫抵其書于地語同列曰朱元晦蔡元定不過自相講明耳果何罪乎事乃止元定生而頴異父發博覽羣書以程氏語録邵氏經世張氏正蒙授元定曰此孔孟正脉也元定深涵其義既長辨析益精登建陽西山絶頂腹飢啖薺以讀書聞熹名往師之熹叩其學大驚曰此吾老友也不當在弟子列遂與對榻講論諸經奥義每至夜分四方來學者熹必俾先從元定質正焉尤袤楊萬里交薦于朝召之不起築室西山将為終焉之計㑹偽學偽黨之論起元定曰吾其不免乎及聞貶不辭家即就道熹與從游者數百人餞别蕭寺中坐客興歎有泣下者熹微視元定不異平時因喟然曰友朋相愛之情李通不挫之志可謂兩得矣衆謂宜緩行元定曰獲罪于天天可逃乎杖屨同其子沉行三千里脚為流血無㡬微見言面至春陵逺近来學者日衆州士子莫不趍席下以聽講說愛元定者謂宜謝生徒元定曰彼以學來何忍拒之若有禍患亦非閉門塞竇所能避也貽書訓諸子曰獨行不媿影獨寢不媿衾勿以吾得罪故遂懈其志在道逾年忽一日謂沉曰可謝客吾欲安靜以還造化舊物閲三日卒元定於書無所不讀於事無所不究義理洞見大原下至圖書禮樂制度無不精妙熹䟽釋四書及傳易詩編通鑑綱目皆與元定往復參訂唘蒙一書則屬元定起藁熹嘗曰造化微妙惟深於理者能識之吾與季通言而不厭也著洪範解大衍詳說律吕新書皆行于世學者尊之曰西山先生丁巳三年金承安二年春正月鄭僑罷二月詔偽學之黨勿除在内差遣從邵褎然之言也尋復有論三十年來偽學顯行場屋之權盡歸其黨乞詔大臣審察其所學而後除從之夏四月以不祛爲嗣濮王閏六月貶觀文殿大學士留正爲光禄卿居之邵州韓侂胄憾正都堂之辱諷右正言劉三傑論正四大罪其首云招引偽學以危社稷詔正落職罷祠論者不已張釡言之尤力遂責之秋八月金尚書右丞胥持國有罪致仕持國為金主信任與李妃筦擅朝政張復亨張嘉貞張光庭張巖叟張翰趙樞髙元甫傅汝梅裴元郭郛十人皆趍走其門俱為御史臺官人戯謂之胥門十哲至是為言者所論持國致仕十人皆外補九月以劉三傑為右正言遂詔監司帥守薦舉改官勿用偽學之人朝散大夫劉三傑免䘮入對言前日偽黨今變而為逆黨防之不可不至韓侂胄大喜即日除三傑右正言而詔監司帥守薦舉改官並於奏牘前甘結聲說非偽學之人㑹鄉試進士漕司前期取家状必令書以不是偽學五字撫州推官柴中行獨申漕司云自幼習易讀程氏易傳未委是與不是偽學如以為偽不願考校士論壮之髙麗王晧以其弟晫權國事金復以胥持國為參知政事冬十一月太皇太后呉氏崩十二月籍偽學罷吏部侍郎黄由知緜州王沇上䟽乞置偽學之籍仍自今曽受偽學舉薦闗陞及刑法亷吏自代之人並令省部籍記姓名與閒慢差遣從之於是偽學逆黨得罪著籍者趙汝愚留正周必大王藺四人為之首朱熹徐誼彭龜年陳傅良薛叔似章頴鄭湜樓鑰林大中黄由黄黼何異孫逢吉劉光祖吕祖儉葉適楊萬里項安世沈有開曽三聘游仲鴻呉獵李祥楊簡趙汝讜趙汝談陳峴范仲黼汪逵孫元卿袁爕陳武田澹黄度張體仁蔡幼學黄灝周南呉柔勝李直王厚之孟浩趙鞏白炎震皇甫斌危仲壬張致逺楊宏中周端朝張衜林仲麟蒋傅徐範蔡元定吕祖泰凡五十九人黄由上言人主不可待天下以黨與不必置籍以示不廣殿中侍御史張巖劾由阿附罷之而擢沇爲利州路轉運判官戊午四年金承安三年春正月以葉翥同知樞密院事三月葬憲聖慈烈皇后夏五月加韓侂胄少傅封豫國公賜玉帶許佩服詔禁偽學右諫議大夫姚愈復上言近世行險僥倖之徒倡為道學之名權臣力主其説結為死黨願下明詔播告天下於是命直學士院髙文虎草詔曰向者權臣擅朝偽邪朋比協肆姦宄包藏禍心賴天之靈宗廟之福朕獲奉慈訓膺受内禪隂謀壞散國勢復安嘉與士大夫厲精更始凡曰滛朋比徳㡬其自新而歴載臻兹弗迪厥化締交合盟窺伺間隙毁譽舛午流言間發以傾國是而惑衆心甚至竊附於元祐之衆賢而不思實類乎紹聖之姦黨國家秉徳康寧不汝瑕殄今惟自作弗靖意者漸于流俗之失弗可復反歟将狃於國之深恩而罰有弗及歟何其未能洗濯以稱朕意也朕既深詔二三大臣與夫侍從言議之官益維持正論以明示天下矣諭告所抵宜各改視回聽毋復借疑似之說以惑亂世俗若其遂非不悔怙終不悛邦有常刑必罰毋赦布告天下毋忽詔既下韓侂胄大喜即遷文虎愈於要職以丁逢為軍器監四川都大茶馬丁逢入對極論元祐建中調停之害且引蘇轍任伯雨之言為證京鏜何澹時附韓侂胄専主偽學之事深恱逢言即薦為軍器監秋七月葉翥罷八月以謝深甫知樞密院事許及之同知院事及之為吏部尚書謟事韓侂胄無所不至居二年不遷見侂胄流涕叙其知遇之意衰遲之狀不覺屈膝侂胄惻然憐之故有是命育太祖十世孫與愿于宫中帝子兖沖恵王埈卒未有皇嗣京鏜等請擇宗室子育之詔育燕懿王徳昭後與愿于宫中年六嵗矣以趙師􅋷爲工部侍郎師􅋷附韓侂胄得知臨安府甚有能聲侂胄生日百官争貢珍異師􅋷最後至出小合曰願獻少果核侑觴唘之乃粟金蒲桃小架上綴大珠百餘顆衆慙沮侂胄有愛妾張譚王陳四人皆封郡夫人其次有名位者又十人或獻北珠冠四枚於侂胄以遺四夫人其十人亦欲之未有以應也師􅋷聞之亟市北珠製十冠以獻十人者喜為求遷官拜工部侍郎侂胄甞過南園山荘顧竹籬草舎謂師􅋷曰此真田舎間氣象但欠犬吠鷄鳴耳俄聞犬嘷叢薄視之乃師􅋷也侂胄大笑聞者莫不鄙之冬十月金造承安寳貨時銀每錠以五十兩其直百貫民間或有截鑿之者價随以低昂遂改鑄銀名承安寳貨一兩至十兩分五等每兩折錢二貫公私同見錢用未㡬寳貨多雜以銅錫寖不能行燕京閉肆迺罷之金大賚北鄙將士授官者至萬一千人己未五年金承安四年春正月奪紹熈從臣彭龜年曽三聘官初趙汝愚定䇿時樞密院直省官蔡璉從旁竊聽因而漏言汝愚竄之既而逃還臨安韓侂胄聞之乃使璉誣告汝愚定䇿時有異謀及具列賔僚所言凡七十餘紙詔下大理捕鞫彭龜年曽三聘沈有開葉適項安世等以實其事中書舎人范仲藝謂侂胄曰章惇蔡確之權不為不盛然而至今得罪于清議者以同文獄故耳相公胡為蹈之侂胄曰某初無此心京鏜劉徳秀實主其議事得已張釡劉三傑張巖程松等論之不己詔累經赦宥宜免然猶奪龜年三聘官而擢璉進義副尉二月放前起居舎人劉光祖于房州光祖撰涪州學記謂學之大者明聖人之道以修其身而世方以道為偽小者治文章以達其志而時方以文為病好惡出於一時是非定於萬世諫議大夫張釡劾光祖佐逆不成蓄憤懷姦和附偽學欺世罔上詔落職房州居住吏部尚書胡紘免三月金立王晫為髙麗國王夏五月行統天厯秋七月吏部尚書劉徳秀免八月帝始朝太上皇帝于壽康宫帝始率群臣詣壽康宫上壽初見太上皇成禮而還明日羣臣以過宫上壽禮成奉表稱賀詔進宰執官九月加韓侂胄少師封平原郡王冬十二月嗣濮王不祛卒庚申六年金承安五年春閏二月以京鏜謝深甫為左右丞相何澹知樞密院事復留正少保觀文殿大學士致仕三月前祕閣脩撰朱熹卒熹登第五十年仕于外者僅九考立朝才四十六日家故貧少依父友劉子羽寓建之崇安後徙建陽之考亭諸生自逺至者豆飯藜羮率與之共往往稱貨於人以給用非其道義則一介不取也時攻偽學日急士之繩趍尺歩稍以儒自名者無所容其身從游之士特立不顧者屏伏丘壑依阿巽懦者更名它師過門不入甚至變易衣冠狎游市肆以自别其非黨而熹日與諸生講學不休或勸其謝遣生徒者笑而不答疾且革正坐整衣冠就枕而卒年七十一將葬右正言施康年言四方偽徒聚于信上欲送偽師之葬㑹聚之間非妄談時人短長則繆議時政得失望令守臣約束從之熹所著有易本義唘蒙蓍卦考誤詩集傳大學中庸章句或問論語孟子集註太極圖通書西銘解楚詞集註辨證韓文攷異所編次有論孟集議孟子指要中庸輯略孝經刋誤小學書通鑑綱目宋名臣言行録家禮近思録河南程氏遺書伊洛淵源録儀禮經傳通解其門人不可稱計其最知名者曰黄榦李燔張洽陳淳李方子黄灝蔡沉輔廣榦之言曰道之正統待人而後傳自周以來任傳道之責者不過數人而能使斯道章章較著者一二人而止耳由孔子而後曽子子思得其微至孟子而始著由孟子而後周程張子繼其絶至熹而始著衆以為知言榦初見熹夜不設榻不解帶熹語人曰直卿志堅思苦與之處甚有益因妻以女及熹病革以深衣及所著書授榦與之訣曰吾道之託在此吾無憾矣熹歿榦弟子日盛編禮著書講論經理朝夕不倦仕終朝奉郎燔初見熹熹告以曽子𢎞毅之語且曰致逺固以毅而任重貴乎𢎞也燔因以𢎞名其齋凡諸生未達者熹先令訪燔俟其所發乃從熹折衷之諸生畏服熹語人曰燔進學可畏處事不苟它日任斯道者必燔也燔甞曰凡人不必待仕宦有位為職事方為功業但随力到處有以及物即㓛業也居家講道學者宗之仕終直華文閣洽從熹學自六經傳注而下皆究其指歸至於諸子百家山經地志老子浮圖之說無所不讀熹嘉其篤志謂黄榦曰所望以永斯道之傳者二三君也洽自少用力於敬平居不異常人至義所當為則勇不可奪著春秋集註地理沿革表行于世仕終直寳章閣淳少習舉子業林宗臣見而竒之謂曰此非聖賢事業也因授以近思録淳讀之遂盡棄其業而學焉及熹至漳淳請受教為學益力熹語人曰吾南來喜得陳淳由是所聞皆要切語及熹歿淳追思之痛自裁抑無書不讀無物不格日積月累義理貫通洞見條緒恬退自守名播天下多所著述仕終安溪主簿方子端謹純篤初見熹熹謂曰觀公為人自是寡過但寛大中要規矩和緩中要果決方子遂以果名其齋居家竟日危坐未甞傾側對賔客一語不妄發嘗曰吾於問學雖未能周盡然幸於大本有見處此心常覺泰然不為物欲所漬耳灝性行端飭以孝友稱廣淳謹勤恪嘗著四書纂䟽詩傳童子問以發明師㫖沉元定子也著書傳安定郡王子恭卒夏四月以不璺為嗣濮王六月乙酉朔日有食之太上皇后李氏崩許及之以母喪去位秋七月以陳自强僉書樞密院事初自强嘗為韓侂胄童子師及侂胄當國自强入都待銓欲見之無以自通僦居主人出入侂胄家為入言之一日侂胄召自强比至則從官畢集侂冑設褥于堂延自强升坐再拜次召從官同坐從官踧踖莫敢居上者侂胄徐曰陳先生老儒汨没可念明日從官交薦其才即除太學録未踰嵗三遷為祕書郎既入館即改右正言月餘拜諫議大夫遂為中丞旬日登樞府自强以選人意圖諸州學官不自意遽至大用遂委身諂附侂胄焉八月太上皇帝崩光宗幼有令聞嚮用儒雅及即位之初總權綱屏嬖倖薄賦緩刑有可觀者及宫闈妬悍閹寺交搆驚憂致疾孝養遂怠孝宗之業衰焉京鏜卒鏜初與韓侂胄友善因得大用遂一變素守奉行侂胄風㫖唯謹時附益以成其姦又薦劉徳秀居言路以排擊善類侂胄之謀多自鏜發之攅慈懿皇后于臨安府南山之脩吉寺九月婺州處士吕祖泰上書乞斬韓侂胄詔配祖泰于欽州牢城祖泰夷簡五世孫也性䟽達尚誼論事無所忌諱時御史施康年林宷劾周必大首倡偽徒私植黨與帝将降詔貶必大為少保祖泰聞之而憤乃撃登聞鼓上書論韓侂胄有無君之心請誅之以防禍亂其畧曰道學自古所恃以為國也丞相汝愚今之有大勲勞者也立偽學之禁逐汝愚之黨是将空陛下之國而陛下不知悟耶陳自强侂胄童稺之師躐致宰輔陛下舊學之臣彭龜年等今安在耶蘇師旦平江之吏胥周筠韓氏之厮役人人知之今師旦以潜邸随龍而得節鉞筠以皇后親屬而得大官不知陛下在潜邸時果識師旦乎椒房之親果有筠乎侂胄之徒自尊大而卑陵朝廷一至於此願亟誅侂胄師旦周筠而逐罷自强之徒故大臣在者獨周必大可用宜以代其任不然事将不測書出中外大駭侂胄怒尋有㫖吕祖泰挾私上書語言狂妄拘管連州右諫議大夫程松與祖泰狎友懼曰人知我素與逰其謂我與聞乎乃獨奏言祖泰有當誅之罪且其上書必有教之者今縱不殺猶當杖黥竄之逺方殿中侍御史陳讜亦以為言乃杖祖泰一百配欽州牢城收管祖泰上書自期必死冀以身悟朝廷了無懼色既至府尹為好語誘之曰誰教汝共為章汝試言之吾且置汝祖泰笑曰公何問之愚也吾固知必死而可受教於人且與人議之乎尹曰汝病風喪心耶祖泰曰以吾勸之若今之附韓氏得美官者乃病風喪心耳命謝深甫朝獻景靈宫嗣濮王不璺朝饗太廟冬十月加韓侂胄太傅十一月以與愿為福州觀察使更名曮皇后韓氏崩十二月葬永崇陵攅恭淑皇后于臨安府之廣教僧寺加殿前副都指揮使呉曦太尉辛酉嘉泰元年金泰和元年是嵗西遼亡春二月貶少傅致仕周必大為少保從施康年言也三月臨安大火四日乃滅秋七月何澹罷時呉曦自以世守西蜀為國藩屏而身留行都不得如志乃以賄賂宰輔䂓求還蜀陳自强為之言于韓侂冑侂胄許之曦賂偶不及澹澹持不可侂胄怒曰始以君肯相就黜偽學汲引至此今顧立異遂罷奉祠澹急於榮進阿附侂胄斥逐善類賢士為空士論罪之大旱以陳自强參知政事張釡僉書樞密院事以呉曦為興州都統制兼知興州曦至興州因譛副都統制王大節罷之由是兵權悉歸于曦異志遂成矣八月張釡罷以張巖參知政事程松同知樞密院事巖附侂胄以嚴道學之禁自小官不四年至政府松諂侂胄尤甚自知錢塘縣不二年為諫議大夫滿嵗未遷意殊怏怏乃獻一妾於侂胄名之曰松壽侂胄曰奈何與大諫同名松曰欲使疵賤姓名常蒙記憶耳遂同知樞府奈曼襲西遼滅之西遼主珠勒呼獵奈曼王庫楚類汗伏兵八千擒之而據其位遂襲遼衣冠尊珠勒呼為太上皇朝夕問起居珠勒呼尋死遼祀始絶壬戍二年金泰和二年春正月以蘇師旦兼樞密都承㫖師旦平江府書佐也韓侂胄為平江府兵馬鈐轄師旦以筆吏事之侂胄愛其辨慧竄名姓于嘉王邸吏士内遂以潛邸随龍恩入官云二月追復趙汝愚資政殿學士偽學之禍雖本於韓侂胄欲去異巳以快所私然實京鏜創謀而何澹劉徳秀胡紘成之及鏜死三人亦罷侂胄厭前事之乖戾欲稍更改以消中外之議㑹張孝伯謂侂胄曰不弛黨禁恐後不免報復之禍籍田令陳景思侂胄之姻也亦謂侂胄勿為巳甚侂胄然之遂復汝愚官而偽黨之禁寖解貶斥者漸還故職矣禁私史夏五月甲辰朔日有食之秋七月以子覿為安定郡王八月以袁說友同知樞密院事作寳謨閣蔵光宗御集也九月太師嗣秀王伯圭卒伯圭謙謹不以近屬自居每入見帝行家人禮宴私隆洽伯圭執臣禮愈恭冬十月追復朱熹煥章閣待制十一月以陳自强知樞密院事許及之參知政事十二月立貴妃楊氏為皇后后不知何許人或云㑹稽少以姿容選入宫忘其姓氏帝即位進封媫妤有㑹稽楊次山者后自言是其兄因姓楊氏韓后崩后時為貴妃與曹美人俱有寵中宫未知所屬韓侂胄以后頗渉書史知古今性警敏任權術而曹美人柔順勸帝立曹氏帝不從由是后與侂胄有怨次山自是貴顯矣加韓侂胄太師先是監恵民局夏允中上書請依文彦博故事以侂胄平章軍國重事侂胄聞之陽辭乞致仕詔不許而罷允中至是進位太師時侂胄既弛黨禁因以勢利蠱士大夫之心薛叔似辛棄疾陳謙等皆起廢進用於是名士久斥者往往損晩節以䂓榮進矣政府樞密臺諫侍從皆出侂胄之門莫不傾心阿附而蘇師旦周筠預聞國政羣小滿朝勢焰熏灼閏月封福州觀察使曮爲衛國公癸亥三年金泰和三年春正月謝深甫罷深甫力求罷政帝曰卿能為朕守法度惜名器不可以言去深甫固請乃許之張巖罷帝臨太學以袁說友參知政事傅伯壽僉書樞密院事伯壽辭不拜二月以費士寅僉書樞密院事夏四月己亥朔日有食之五月以陳自強為右丞相時韓侂胄専權凡所欲爲宰執惕息不敢為異自强至印空名勅劄授之惟所欲為宰執不預知也言路扼塞每月舉論二三常事而已謂之月課或問之則愧謝曰聊以塞責藉手耳加以包苴盛行自强尤貪鄙四方致書餽必題其緘云某物若干并獻凡書題無并字則不開縱子弟親戚闗通貨賄仕進干請必諧價而後予都城嘗火自强所貯一夕煨燼侂胄首遺之萬緡執政列郡聞之莫不有助不數月得六十萬緡遂倍所失之數甞語人曰自強惟一死以報師王每稱侂胄為恩主恩父蘇師旦為叔堂吏史達祖為兄侂胄姦宄専國自强表裏之功為多以許及之知樞密院事秋七月命殿前司造戰艦八月增置襄陽騎軍九月袁說友罷冬十月以費士寅參知政事張孝伯同知樞密院事金貶奉御阿嚕岱為彰徳府判官金主自即位即為北鄙凖布等部所擾無嵗不興師討伐兵連禍結士卒塗炭府蔵空匱國勢日弱羣盗蜂起賦斂日繁民不堪命懼宋人乗其隙乃命聚糧増戍於東南境上且禁襄陽𣙜場宋人聞之乃嚴設守禦韓侂胄遂有北伐之謀市馬厲兵習戰造艦奉御阿嚕岱使還言於金主以為師期有日金主以其生事笞五十而貶之十一月安定郡王子覿卒甲子四年金泰和四年春正月浙東安撫使辛棄疾入朝時有勸韓侂胄立盖世功名以自固者侂胄然之恢復之議遂起聚財募卒出封椿庫黄金萬兩以待賞功命呉曦練兵西蜀既而安豐守臣厲仲方言淮北流民咸願歸附而浙東安撫使辛棄疾入見言金國必亂必亡願属元老大臣預備兵為倉卒應變之計侂胄大喜鄭挺鄭友龍等又附和其說侂胄用師之意益銳矣髙麗王晫卒子韺立二月金命州郡無學者並建置之三月臨安大火詔百官陳時政闕失夏四月許及之罷以張孝伯參知政事錢象祖同知樞密院事五月追封岳飛為鄂王秋八月張孝伯罷冬十月以張巖參知政事十一月以伯栩為安定郡王十二月以陳自强兼國用使費士寅張巖兼同知國用事韓侂胄議恢復陳自强請遵孝宗典故剏國用司總覈内外財用掊克民財州郡騷動焉乙丑開禧元年金泰和五年春三月費士寅罷韓侂胄欲以士寅鎮興元以圖恢復士寅固辭遂罷師入鞏州師入鞏州來逺鎮唐州得諜者言宋屯兵鄂岳将謀北伐金主命樞密院移文于宋依誓約撤新兵毋縱入境夏四月以錢象祖參知政事劉德秀僉書樞密院事以李奕為鎮江都統皇甫斌為江陵副都統兼知襄陽府武學生華岳上書諫用兵唘釁竄岳于建寧府韓侂胄銳意恢復岳上書諫朝廷未宜用兵恐唘邊釁且乞斬侂胄蘇師旦周筠以謝天下侂胄大怒下岳大理編管建寧五月詔以衛國公曮為皇子進封榮王金以布薩揆為宣撫使㑹兵于河南金主聞宋將見伐召諸大臣問之皆曰宋敗衂之餘自救不暇恐不敢畔盟完顔匡獨曰彼取先世開寳天禧紀元豈忘中國者哉金主然之乃命平章布薩揆宣撫㑹兵于汴以備宋戚拱復漣水縣六月金人復取之以程松為四川制置使秋七月詔韓侂胄平章軍國重事班丞相上三日一朝赴都堂治事陳自强援文彦博故事乞令侂胄平章軍國重事侍御史鄧友龍等繼以為請詔從之於是三省印並納其第侂胄遂置機速房於私第以圖恢復權勢日盛至假作御筆升黜将帥事闗機要未嘗奏禀人莫敢言以蘇師旦為安逺軍節度使領閤門事韓侂胄恢復之議皆師旦發之以韓侂胄兼國用使八月金罷河南宣撫使司布薩揆至汴移文責宋敗盟宋三省樞密院荅言邊臣生事已行貶黜所置兵亦巳抽去揆信之㑹宋殿前副都指揮使郭倪濠州守将田俊邁誘虹縣民蘇貴等為間言於揆曰宋之増戍本虞它盗及聞行臺之建益畏讋不敢去備且兵皆白丁自裹糧糒窮蹙饑疫死者甚衆揆益弛備以其言白于金主時金羣臣皆勸先舉金主曰南北和好四十餘年民不知兵不可及聞揆言遂命罷宣撫司及新置兵以郭倪為鎮江都統兼知揚州九月劉徳秀罷陳景俊如金韓侂胄欲審敵虚實故遣景俊往賀正旦以丘崈為江淮宣撫使崈辭不拜韓侂胄聞金命布薩揆宣撫河南乃以崈應之初侂冑以北伐之議示崈崈曰中原淪陷且百年在我固不可一日而忘然兵凶戰危若首倡非常之舉兵交勝負未可知則首事之禍其誰任之必有夸誕貪進之人攘臂僥倖萬一宜亟斥絶不然必誤國矣侂胄不納至是崈手書切諫曰金人未有意敗盟當示大體宜申警軍實使吾常有勝勢若釁自彼作我有詞矣因力辭不拜侂胄不恱大旱師襲比陽殺金阿里哈索多師焚黄澗獲金髙顥冬十二月金趙之傑來金使太常卿趙之傑来賀正旦入見韓侂胄以其禮倨請帝還内從之丙寅二年金泰和六年天夏襄宗安全應天元年䝉古太祖法唘運聖武皇帝元年春正月師入薩滿谷獲金果囉三月以陳伸為京湖宣撫使伸遂致仕伸為吏部尚書以韓侂胄當國恒不樂欲去及北伐之議起上書切諫侂胄故首以藩閫命伸遂致仕以程松為四川宣撫使呉曦為副使韓侂胄期以四月分道進兵故有是命曦由是得總兵馬財賦之政松将東軍三萬駐興元曦将西軍六萬駐河池松至益昌欲以執政禮見曦責其庭參曦聞之及境而還松用東西軍一千八百自衛曦抽摘以去松殊不悟其變陳景俊還自金景俊還金主諭之曰大定初世宗許宋世為姪國朕遵守至今豈意爾國屢犯我邉以此遣大臣宣撫河南及得爾國公移朕即罷司而爾國侵擾益甚羣臣以渝盟為言朕惟和好嵗久委曲涵容恐姪宋皇帝或未詳知卿歸國當具言之景俊還以告陳自强自强戒勿言由是用兵益決金更定比保法以五家為鄰五鄰為保以相檢察城郭則置坊正村社則置里正以按比户口催督賦稅勸課農桑又設主首以佐里正錢象祖罷韓侂胄銳意用兵象祖執不可遂以懷姦避事奪二官信州居住夏四月以薛叔似為湖北京西宣撫使鄧友龍為兩淮宣撫使郭倪兼山東京東路招撫使趙淳兼京西北路招撫使皇甫斌兼副使呉曦兼陜西河東路招撫使下納粟補官之令遣衛卒戍淮東追貶秦檜贈諡論檜主和誤國之罪奪王爵降封衛國公改諡繆厲復泗州及新息襃信潁上虹縣金命其平章政事布薩揆領行省事㑹兵于汴以宋渝盟也呉曦謀反獻階成和鳳四州于金以求封曦久蓄異謀及得志與其從弟晛及徐景望趙富米脩之董鎮共為反謀隂遣其客姚淮源獻闗外階成和鳳四州于金求封蜀王五月王大節帥師復蔡州不克而潰以伐金詔四方及告于天地廟社韓侂胄請帝降内批云北敵世讎乆稽報復爰遵先志決䇿討除宜頒詔書明示海内翌日乃下北伐之詔畧曰天道好還中國有必伸之理人心效順匹夫無不報之仇維兹金國猶託要盟朘生靈之資奉溪壑之欲迹其不恭姑置含忍軍入塞而公肆創殘使來庭而敢為桀驁洎行李之繼遣復慢詞之見加含垢納汚在人情而已極聲罪致討属有隙之可乗兵出有名師直為壮言乎逺言乎近孰無忠義之心為人子為人臣當念祖宗之憤直學士院李壁之詞也初兵部侍郎葉適輪對嘗言甘弱而幸安者衰改弱而就强者興侂胄聞而喜之以為直學士院欲藉其草詔以動中外而適以疾辭職乃改命壁越六日以伐金告于天地廟社金以布薩揆完顔匡為左右副元帥金以宋畔盟告于天地廟社以揆匡為副元帥遣兵分守要害而命彰徳守臣䕶韓琦墳凡宋宗族所居有司提控之李爽帥師圍夀州郭倬李汝翼田俊邁㑹師圍宿州敗績金人執俊邁皇甫斌敗績于唐州秦世輔之師潰于城固縣詔以太祖十世孫均為沂靖恵王柄嗣柄孝宗孫而魏惠憲王愷之子也均之父曰希瞿六月李爽敗績于夀州鄧友龍免以丘崈為兩淮宣撫使韓侂胄以師出無功免友龍而以崈代之駐揚州崈至鎮部署諸将悉以三衙江上軍分守江淮要害於是王大節郭倬李汝翼皇甫斌李爽等皆坐貶田琳復壽春府秋七月蘇師旦有罪韶州安置韓侂胄聞師屢敗始覺為蘇師旦所誤一夕招李壁飲酒酣語及師旦始謀事壁微摘其過以覘之因極言師旦怙勢招權使眀公負謗非竄謫此人不足以謝天下侂胄然之翌日罷師旦官籍其家旬日除名韶州安置以張巖知樞密院事李壁參知政事夏李安全廢其主純佑而自立安全崇宗孫越王仁友子也純佑未㡬死戚春敗績于邳州九月金富察貞取和尚原冬十月金人分道來侵赫舎哩執中圍楚州布薩揆分兵為九道南下揆以兵三萬出潁夀完顔匡以兵二萬五千出唐鄧赫舍哩子仁以兵三萬出渦口赫舍哩執中以兵二萬出清河口完顔充以兵一萬出陳倉富察貞以兵一萬出成紀完顔綱以兵一萬出臨潭舒穆嚕仲温以兵五千出鹽川完顔鱗以兵五千出來逺丙子執中自清河口渡淮遂圍楚州朝廷始懼十一月詔郭杲帥師次于真州以援兩淮以丘崈僉書樞密院事督視江淮軍馬金人攻淮南日急或勸崈棄廬和州為守江計崈曰棄淮則與敵共長江之險吾當與淮南俱存亡乃益増兵防守金完顔匡入光化棗陽襄陽軍随州金布薩揆渡淮入安豐軍遂圍和州揆引兵至淮遣人密測淮水惟入疊灘可渉即遣鄂屯驤揚兵下蔡聲言欲渡宋将何汝勵姚公佐以為誠然悉衆屯花靨以備之揆乃遣賽不等潛師渡八疊駐于南岸揆麾大軍直壓宋陣宋師不虞其至遂皆潰走自相蹂踐死者不可勝計揆遂奪潁口下安豐軍及霍丘縣進圍和州屯于瓦梁河以控真揚諸州之衝乃整軍列騎張旗幟於沿江上下於是江表大震以陳謙為湖北京西宣撫副使金赫舍哩子仁入滁州金完顔匡圍徳安府金富察貞入西和州十二月入成州金赫舎哩子仁入真州州之士民大潰知鎮江府宇文紹節亟具舟濟逃者大有所全自是淮西縣鎮皆沒于金呉曦焚河池退保青野原曦既遣姚淮源如金因持重按兵河池韓侂胄日夜望其進兵使者相繼曦恐謀泄乃遣兵攻秦隴與金人力戰以堅侂胄之心金人許封之約以若按兵閉境不為異同使其師東下無西顧之憂則全蜀之地卿所素有當加封冊一依康王故事更能順流東下助為犄角則旄麾所指盡以相付因命完顔綱經畧之綱進兵水洛訪得曦族人呉端署為水洛城廵檢使遣之報曦曦得報意動以程松在興元未敢發詐稱杖殺端而隂遣使送欵于綱及富察貞破和尚原湫池堡西和州曦将王喜等方力戰曦忽傳令退保黒谷軍遂潰貞入成州曦因焚河池退壁青野原金人無復顧慮關陜大震轉運判官陳咸言曦反程松不之信也金赫舎哩子仁侵六合郭倪遣師救之戰于胥浦橋敗績倪棄揚州走金完顔充入大散關呉曦還興州時興州都統制毋思以重兵守闗呉曦聞金兵至因撤驀闗之戍金人由版閘谷遶出關後思孤軍不能支關遂陷丘崈遣使如金師議和金布薩揆從之遂還師下蔡和州圍解揆欲與宋通和罷兵購得韓琦五世孫元靖遣之渡淮丘崈獲之詰所以來之故元靖言兩國交兵北朝皆謂韓太師意今相州宗族墳墓皆不可保故来依太師耳崈使畢其說始露講解之意崈密使人獲送北歸俾扣其實既而元靖回得金行省幅紙崈以聞于朝韓侂胄方以師出屢敗悔其前謀輸家財二十萬以助軍而諭崈募人持書幣赴敵營議和崈乃遣劉祐持書於揆願講好息兵揆曰稱臣割地獻首禍之臣乃可崈以上聞帝諭崈使歸罪邊將崈乃復遣王文采往言用兵乃蘇師旦鄧友龍皇甫斌等所為非朝廷意今三人皆已貶黜揆曰侂胄若無意用兵師旦等豈敢専擅文采還崈復遣文采及林拱宋顯相繼以往因許還其准北流移人及今年嵗幣揆始許之崈聞于朝朝廷乃以報書令陳壁往焉壁至揆遂自和州還師次于下蔡於是金人在淮南者皆去惟留一軍守濠州金立呉曦為蜀國王大散闗既破曦乃退壁興州之置口完顔綱遣張仔㑹曦于置口曦且言願附金之情仔請曦告身為報曦盡出以付仔仍獻階州遂自置口還興州綱乃以金主命遣假太倉使馬良顯持詔書金印立曦為蜀國王曦密受之翌日召幙屬諭意言東南失守車駕幸四明今宜從權濟事王翼楊騤之抗言曰如此則相公忠孝八十年門戸一朝掃地盡矣曦曰吾意巳決即遣郭澄奉表獻蜀地圖及呉氏譜牒于金薛叔似陳謙免以吳獵為湖北京西路宣撫使知江陵府叔似素以功業自期及臨事絶無可稱屬郡多陷故坐免程松自興元逃歸金烏雅綽哈攻鳯州松求援于呉曦曦始言當發三千騎往松信不疑及曦受金詔宣言金使者欲得階成和鳯四州以和馳書諷松使去松尚未悟其變會報金兵至民大奔松亟趣米倉山而遁自閬州順流至重慶猶遺書乞贐禮于曦稱為蜀王曦遣使以匣封致餽松望見匣疑為劍也大恐即急走使者追與之乃金寳也松受而兼程出峽西向掩淚曰吾今始獲保頭顱矣蒙古太祖皇帝即位于鄂諾河初天后阿倫果斡寡居屢有光明照其腹一乳三子長曰布古哈塔吉次曰博克多薩勒濟固季曰勃端察爾其後子孫蕃衍不相統攝各自為部曰哈塔錦曰沙卜珠曰竒雅喇又謂之扎拉氏居于烏桓之北與輝和爾奈曼九姓回鶻故城和林接壤世奉貢于遼金而總𨽻于逹旦烈祖諱伊蘇克依勃端察爾之九世孫也攻塔塔爾部獲其部長特穆津還次于特哩衮盤陀山而生子烈祖因以特穆津名之是為太祖皇帝烈祖卒太祖皇帝年㓜其部衆多歸于族人泰楚特部泰楚特合七部人凡三萬攻之太祖皇帝與其母諤楞太后率部人為十三翼大戰于都爾本兆蘇之野泰楚特等敗去太祖皇帝因得少安時泰楚特部地廣民衆而無紀律其下謀曰特穆津衣人以己衣乘人以己馬真吾主也因悉歸太祖皇帝泰楚特部遂微既而太祖皇帝為塔爾巴哈台所執其部人蘇勒庫實勒們釋太祖皇帝且命子齊拉衮委質焉未幾塔塔爾部叛金太祖皇帝自鄂諾河帥衆會金師同滅之以功授太祖皇帝為綽克圖嚕猶中國之招討使也太祖皇帝以克埒奈曼二部强盛事之甚謹奈曼反侵掠之太祖皇帝求援于伊爾濟部伊爾濟殺其使太祖皇帝怒與戰于圖滿盤陀山伊爾濟大敗太祖皇帝還居于塔哩珠之野諸部為克埒所敗者多歸焉已而克埒王汗暴戮其族王汗之弟額爾克哈喇不能堪叛歸奈曼部共立伊納克齊為汗以兵敗王汗盡取其衆王汗出走太祖皇帝以其與烈祖有好自吉魯爾河迎之會于圖喇河結為父子因攻黙爾竒斯温都爾二部掠其貲財以給王汗王汗部衆亦稍有歸者太祖皇帝遂與共攻奈曼部博囉汗戰于赫辰巴納盡取其衆王汗漸强因害太祖皇帝之得人欲圖太祖皇帝太祖皇帝辭去次于薩里川而王汗移居于圖喇河王汗之子伊勒哈等率衆至為奈曼部所掠王汗復遣人告太祖皇帝攻奈曼以報之太祖皇帝即遣博爾濟博爾歡穆呼哩齊拉衮四人將兵赴之遂盡奪其所掠歸于王汗太祖皇帝復與母弟楚齊格爾攻奈曼大敗其衆而還奈曼部因是衰弱太祖皇帝乃會王汗于薩里川布朗吉爾崖復率衆攻泰楚特部大戰于鄂諾河泰楚特部長杭呼敗走於是鴻吉哩等五部會盟將攻太祖皇帝及王汗太祖皇帝迎戰于保喇川大敗之而王汗之弟扎實甘布等怨王汗殘忍逃降奈曼王汗以衆居于哈巴爾哈雅山太祖皇帝居于察察爾山塔塔爾部與鴻吉哩等七部亦怨楚齊格爾侵掠會于犍河共立扎木哈克部長為楚勒汗將攻太祖皇帝太祖皇帝率衆與諸部戰于哈里雅爾台和囉噶之野敗之楚勒汗遁去鴻吉哩部遂降于太祖皇帝自王汗為下所逐太祖皇帝奉之五年而益勤金泰和二年秋奈曼博囉汗率六部之衆攻太祖皇帝及王汗太祖皇帝與戰于滿之野㑹大雪奈曼軍潰而去冬太祖皇帝居于阿卜薩竒爾台實喇山王汗居于必里克沙陀中太祖皇帝求婚于王汗王汗不許由是太祖皇帝踈之楚勒汗聞之往説王汗之子伊勒哈言太祖皇帝將行不利于王汗伊勒哈信之遂以兵焚太祖皇帝牧地泰和三年王汗與伊勒哈謀遣使詐以定婚召太祖皇帝太祖皇帝以為誠然而往王汗之牧馬人竒徹勒與弟巴圖知其謀以告太祖皇帝太祖皇帝乃止而帥衆與王汗戰于哈喇沁之野王汗屢敗矢中伊勒哈之頰乃歛兵大祖皇帝次于阿爾古訥有騎四千六百因循喀爾喀河而進至董阿澤遣阿里哈致言于王汗曰昔汝珠爾汗謂汝奪其兄呼爾察和斯必瑠汗之位而肆殺戮于昆弟故逼汝于哈拉衮之隘汝窮迫無計以百騎來依我先人我先人偕汝以雪耻備厯險阻以破其國珠爾汗僅以身免走死河西我先人盡以其土地人民歸汝結為諳達故我事汝如父嗣爾汝有窮厄我盡心以救恤使汝得至于今我何負於汝而欲加害於我哉王汗大慚欲止伊勒哈不肯曰彼能勝我聴取我國若我勝彼當亦取其國耳因進兵太祖皇帝與穆呼哩博爾濟博爾歡齊拉衮飲水于班珠爾河誓必報其讐遂大會屬部于鄂諾河源而進撃王汗于寮察爾温都山大敗之王汗與伊勒哈以數騎逸至納沁烏蘇河奈曼部人執王汗殺之伊勒哈奔西夏亦為人所殺克埒遂亡太祖皇帝以竒徹勒巴圖有功命為千户賜號達爾罕因大獵于特黙格川宣布號令而還奈曼迪延汗遣伊克鼐爾告于洪果部長阿嚕哈斯曰近聞東方有稱王者日月在天了然可知世豈有二主哉君能益吾右翼奪其􅓡矢乎阿嚕哈斯遣人以其言告于太祖皇帝具以所部附之泰和四年春太祖皇帝大㑹屬部于特黙格川謀攻奈曼以呼必哩哲伯二人為前鋒與奈曼迪延汗黙爾竒斯部長托克托克埒部長阿林台實衛喇特部長呼圖克伯竒并扎木哈克都爾本塔塔爾哈塔錦薩勒珠特部戰于阿勒台迪延汗敗死諸部悉潰太祖皇帝益以盛强泰和五年遂攻西夏破拉伊哩寨及羅索城大掠而還至是大㑹諸部長于鄂諾河之源建九遊白旗遂自號為青吉斯汗先是金主遣衛王允濟往靖州受太祖皇帝之貢允濟奇太祖皇帝狀貌歸言于金主請以事除之金主不許太祖皇帝聞而憾之蒙古滅奈曼執博囉汗以歸丁夘三年金泰和七年年太祖皇帝二春正月丘崈罷詔張巖督視江淮軍馬金布薩揆退師朝廷遂不復慮崈上䟽乞遺書金帥以成前議且言金人既指韓侂胄為元謀若遺書宜蹔免繋銜侂胄大怒罷崈奉祠以陳自强兼樞密使呉曦反稱蜀王于興州曦即治所為行宫改元置百官僣用乗輿服飾遣董鎮至成都治宫殿欲徙居之議行削髪左袵之令奉表稱謝于金分其所統兵十萬為統帥遣禄祁等戍萬州泛舟下嘉陵江聲言約金人夾攻襄陽下黄榜於成都潼川利州䕫州四路以興州為興徳府召随軍轉運使安丙為丞相長史權行都省事丙度不得脫徒死無益乃陽與而隂圖之曦又召權大安軍楊震仲震仲不屈飲藥而死其他名士如陳咸自髠其髪史次秦自瞽其目者甚衆金布薩揆有疾命左丞相完顔宗浩兼都元帥行省事于汴以代之二月以楊輔為四川制置使呉曦以輔知遂寧府輔遂棄成都如遂寧知成都府楊輔嘗言呉曦必反及程松逃歸朝廷乃密詔授輔制置使許以便宜從事詔至人皆勸以倡義輔自以不習兵事且内郡無兵可用於是遷延不發曦乃移輔知遂寧府輔遂以印授通判韓植而去以知建康府葉適為江淮制置使適上言三國孫氏嘗以江北守江自南唐以來始失之乞兼節制江北諸州詔從之時羽檄旁午而適治事如平時軍湏皆從官給民以不擾其防守皆盡其法度焉金平章政事布薩揆卒于下蔡揆為政多惠人樂為用號名将相四川轉運安丙誅呉曦傳首臨安監四川總領所興州合江倉楊巨源謀討曦乃隂與曦将張林朱邦寧及忠義士朱福等深相結眉州人程夢錫知之以告四川宣撫使司随軍轉運安丙丙時稱疾未視事乃属夢錫以書致巨源且召之巨源至丙號哭曰目前兵将我所知不能奮起必得豪傑乃滅此賊巨源曰非先生不足以主此事非巨源不足以了此事㑹興州中軍正将李好義亦結軍士李貴進士楊君玉李坤辰李彪等數十人謀誅曦好義曰此事誓死報國救四蜀生靈但曦死後若無威望者鎮撫恐一變未息一變復生欲奉安丙主事使坤辰來邀巨源與㑹巨源往與約還報丙丙大喜始出視事君玉與白子申共草密詔畧曰惟干戈省厥躬既昧聖賢之戒雖犬馬識其主爾乃甘仇敵之臣邦有常刑罪在不赦二月乙亥未旦好義帥其徒七十四人入偽宫時偽宫門洞開好義大呼而入曰奉朝廷密詔于楊輔以安長史為宣撫令我誅反賊敢抗者夷其族曦衛兵千餘聞有詔皆棄梃而走巨源持詔乗馬自稱奉使入内戸曦唘戸欲逸李貴即前執之刃中曦頰曦反撲貴仆于地好義急呼王换斧其腰曦始縱貴貴遂斫其首馳告丙宣詔軍民拜舞聲動天地持曦首撫定城中市不易肆盡收曦黨殺之衆推丙權四川宣撫使巨源權參賛軍事丙陳曦所以反及矯制平賊便宜賞㓛狀上䟽自劾待罪函曦首級及違制法物與曦所受金人詔印送朝廷曦僣立凡四十一日金遣术虎髙琪奉册於曦未至曦已誅矣先是韓侂胄聞曦反大懼與曦書云𫝊聞不一深以為疑或以權宜割地姑為保全蜀之計此亦棑難解紛之舉萬一虚傳果或有之更望深慮若恩自上出増光前烈豈不美歟蓋将許其王封也且召知鎮江府宇文紹節問計紹節云安丙非附賊者必能討逆侂胄乃密以帛書諭丙云若能殺曦當不次推賞書皆未達而誅曦露布已聞朝廷大喜曦首至臨安獻于廟社梟之市三日詔誅曦妻子家屬徙嶺南奪曦父挺官爵遷曦祖璘子孫出蜀存其廟祀焉方信孺如金師韓侂胄募可以報使于金帥府者近臣以蕭山縣丞方信孺薦遂以信孺為奉使金國通謝國信所參議官侂胄召至都堂命以使事信孺曰開釁自我金人設問首謀當何詞以荅之侂胄矍然信孺遂持張巖書以行三月安丙使劉昌國復階州李好義復西和州張林李簡復成州張翼復鳳州孫忠銳復大散關楊巨源李好義謂安丙曰曦死敵破膽矣闗外四州為蜀要害盍乗勢復取之不然必為後患好義又曰西和乃腹心之地西和下則三州可不戰而復願得馬歩千人死士二百齎十日糧可濟丙從之於是好義進兵次于獨頭嶺會忠義及民兵夾撃金人死者蔽路七日至西和人人樂死前無留敵金將完顔欽遁去好義整衆而入軍民歡呼迎拜好義籍府庫以歸于官欲乗勝徑取秦隴宣撫司不許士氣皆沮已而成階鳳州大散闗皆復以楊輔為四川宣撫使知成都府安丙為副使知沔州許奕為四川宣諭使呉曦既誅安丙趣楊輔還成都沔州即興州以呉曦反故更名治程松棄蜀罪澧州安置金以完顔匡為左副元帥夏四月以陳侗為湖北京西宣撫使知江陵府侗伸弟也有吏材所至以恵政聞金以赫舎哩子仁為右副元帥召楊輔還以呉獵為四川制置使以錢象祖參知政事金人復入大散關太皇太后謝氏崩五月李好義襲秦州圍皂角堡金珠格髙琪來戰好義敗績好義還為呉曦将王喜所毒而卒六月林拱辰如金通謝也安丙殺宣撫司參議官楊巨源初呉曦誅奬諭詔至興州巨源謂人曰詔命一字不及巨源疑有以蔽其功者俄報王喜授節度使而巨源與通判心益不平乃愬功于朝或謂安丙曰巨源謀亂丙令喜鞫其黨皆抵罪時巨源方與金人戰于鳳州之長橋而敗丙密使興元都統制彭輅收巨源械送閬州獄至大安龍尾灘丙使將校樊世顯殺之忠義士聞者莫不扼腕流涕大旱蝗蝗飛蔽天食浙西豆粟皆盡秋七月以不儔為嗣濮王九月金左丞相兼都元帥完顔宗浩卒于汴貶國信所參謀官方信孺于臨江軍信孺至濠州赫舍哩子仁要以五事曰稱臣割地還俘獲罪首謀増嵗幣止信孺獄中露刃環守之絶其薪水信孺曰反俘歸幣可也縳送首謀自古無之稱藩割地則非臣子所敢言子仁怒曰若不望生還耶信孺曰吾將命出國門時已置生死度外矣子仁遣之至汴見完顔宗浩出就傳舎宗浩使将命者來堅持五說信孺辯對不少屈宗浩授以報書曰和與戰俟再至決之信孺還詔侍從兩省臺諫官議所以復命衆議還俘獲罪首謀増嵗幣五萬朝廷從之復遣信孺往信孺至汴宗浩猶執初議信孺曰五事已從其三而猶不我聽不過再交兵耳宗浩見其忠􅈤乃曰割地之議姑寝但稱藩不從當以叔為伯嵗幣外别犒師可也信孺固執不許宗浩乃密為定約遣信孺還信孺至臨安朝廷以林拱辰為通謝使與信孺持國書誓草及許通謝百萬緡信孺至汴宗浩變前說怒信孺不曲折建白遽以誓書來有誅戮禁錮之語信孺不為動将命者曰此事非犒軍可了别出事目以示之信孺曰嵗幣不可再増故代以通謝錢今得此求彼吾有隕首而已㑹興州遣師復大散闗宗浩益疑之乃遣信孺還復書于張巖曰若能稱臣即以江淮之間取中為界欲世為子國即盡割大江為界且斬元謀姦臣函首以獻及添嵗幣五萬兩疋犒軍銀一千萬兩方可議和好信孺還致其書韓侂胄問之信孺言敵所欲者五事一割兩淮二増嵗幣三索歸正人四犒軍銀五不敢言侂胄固問之信孺徐曰欲得太師頭耳侂胄大怒奪信孺三官臨江軍居住信孺三使金師以口舌折强敵敵人計屈情見雖未即和然已有成說及貶人皆惜之葬成肅皇后以趙淳爲江淮制置使張巖免韓侂胄以和議未成欲復出師乃以淳鎮江淮而免張巖巖開督府凡九月費耗縣官錢三百七十萬緡而無成㓛王柟如金師持書赴完顔匡師所在柟倫之孫也蒙古取夏斡羅垓城冬十一月史彌逺殺韓侂胄于玉津園詔暴侂胄罪惡于中外自兵興以來蜀口漢淮之民死於兵戈者不可勝計公私之力大屈而侂胄以金人欲罪首謀乃復銳意出師中外憂懼然皆畏侂胄莫敢言者禮部侍郎兼資善堂翊善史彌逺入對因力陳危迫之勢請誅侂胄以安邦皇后楊氏素怨侂胄因使皇子榮王曮具䟽言侂胄再唘兵端将不利於社稷帝不荅后從旁力賛之帝猶未許后恐事泄諸命其兄楊次山擇羣臣可任者與共圖之帝始允可次山遂語彌逺彌逺得密㫖以錢象祖嘗諌用兵見忤侂胄乃先白象祖象祖許之象祖以告李壁彌逺自懐中出御筆批云韓侂胄久任國柄輕唘兵端使南北生靈枉罹凶害可罷平章軍國事陳自强阿附充位可罷右丞相日下出國門象植欲奏審壁謂事留恐泄乃巳彌逺令主管殿前司公事夏震以兵三百防䕶翌日侂胄入朝至太廟前夏震呵止于途從者皆散震以兵擁侂胄至玉津園側殛殺之復命于彌逺及象祖二人乃入宫以誅侂胄事上聞帝未之信三日猶以為未死後審其果然遂下詔暴侂胄罪惡于中外盖其謀始于彌逺而成于皇后及楊次山帝初無意也論功進彌逺為禮部尚書加震福州觀察使侂胄専政十四年宰執侍從臺諫藩閫皆其門廡之人天子孤立于上威行宫省權震宇内嘗鑿山為沼下瞰太廟出入宫闈無有度限顔棫草制以為得聖之清易祓撰荅詔以元聖褒之四方投獻者謂伊霍亘奭不足以擬其勲余嚞請加九錫趙師􅋷乞置平原郡王府官属侂胄當之不辭其嬖妾張譚王陳皆封郡國夫人號四夫人每内宴則與妃嬪雜坐恃勢驕倨掖庭皆畏之及籍其家多乗輿服御之飾其僭紊極矣陳自强有罪免韓侂胄既死錢象祖探懐中堂帖授自强曰有㫖丞相罷政自强即上馬顧曰望大參保全明日奪其三官永州居住遣使誅蘇師旦于韶州治韓侂胄黨與安置鄧友龍等于嶺南貶李壁張巖許及之葉適薛叔似等官秩有差鄧友龍循州郭倪梅州郭僎連州並除名安置以衛涇僉書樞密院事立榮王曮為皇太子更名幬赦十二月以丘崈為江淮制置大使知建康府罷山東京東京西路招撫司以錢象祖為右丞相兼樞密使衛涇雷孝友參知政事史彌逺同知樞密院事林大中僉書院事初韓侂胄欲内交於大中大中不許而上書極論其姦因辭官屏居時事不挂於口侂胄當國或勸其通書以免禍者大中曰福不可求而得禍可懼而免耶不許凡十二年而復起金翰林直學士陳大任進所脩遼史金戸部籍今年境内民數户七百六十八萬四千四百三十八口四千五百八十一萬六千七十九此金版籍之極盛也戊辰嘉定元年金泰和八年年太祖皇帝三春正月王柟還自汴柟至汴請依靖康正月請和故事世為伯姪之國増嵗幣為三十萬犒軍錢三百萬貫蘇師旦等俟和議定後當函首以獻完顔匡具以柟言奏于金主金主命匡移書索韓侂胄首以贖淮南地改犒軍錢為銀三百萬兩㑹錢象祖移書金帥府喻以誅韓侂胄事柟未之知也一日匡問柟曰韓侂胄貴顯㡬年矣柟曰十餘年矣平章重事才二年耳匡曰今欲去此人可乎柟曰主上英斷去之何難匡顧之而笑和議始決遣柟持書求函侂胄首以贖淮南安定郡王伯栩卒以史彌逺知樞密院事許奕如金師二月追復趙汝愚觀文殿大學士諡忠定三月復秦檜爵諡以韓侂胄蘇師旦首畀金人先是右諫議大夫葉時殿中侍御史黄疇若御史章燮余崇龜等上書乞梟侂胄首于兩淮以謝天下不報及王柟還以是為請詔百官議吏部尚書樓鑰曰和議重事待此而决姦宄已斃之首又何足惜遂命臨安府令副将尹明斵棺取首詔梟之兩淮仍諭諸路以函首畀金之事遂以侂胄及師旦二人之首付王柟送金師以易淮陜之地臨安府大火火凡四日焚官舎二十區民舎五萬八千九十七家城内外亘十餘里死者甚衆城中盧舎什去其七官多僦舟以居民訛言相驚已賴因而縱火為姦夏四月安置陳自强于雷州六月金人來歸大散關及濠州王柟以韓侂胄蘇師旦首至金金主御應天門備黄麾立仗受之竿二首并懸二人畫像于通衢俾百姓縱觀然後漆而蔵于軍器庫遂命完顔匡等罷兵更元帥府為樞密院遣使歸大散關及濠州于宋衛涇罷鄒應龍如金賀生辰也林大中卒以史彌逺兼參知政事秋七月召丘崈同知樞密院事未至而卒崈儀狀魁傑機神英悟嘗慷慨曰生無以報國死願為猛將以滅敵其忠義盖天性也八月以婁機同知樞密院事樓鑰僉書院事鑰持論堅正忤韓侂胄意奉祠累年機初為太常少卿侂胄開邉機曰恢復之名非不美今人才難得財力未裕萬一兵連禍結奈何鄧友龍曰不逐此人則異議無所回遂斥外及入樞府時干戈甫定信使往來機禆賛之㓛為多尤惜名器守法度進退人物直言可否不市私恩不避嫌怨許奕及金完顔侃來奕至金金主荅誓書遣侃為宋諭成使來報九月及金平完顔侃既入見乃下詔以和議成諭天下冬十月以錢象祖史彌逺為左右丞相雷孝友知樞密院事樓鑰同知院事婁機參知政事彌逺既相召用正人故老釐正紹熈誣史褒贈偽學黨人朝廷賴之小康以伯柷為安定郡王十一月史彌逺以母喪去位金主璟卒衛王永濟立永濟小字興勝世宗第七子也金主感𠻳疾甚篤念已無子而諸叔兄弟多在以永濟柔弱無智能欲傳位焉㑹永濟自武定入朝遂留不遣金主殂元妃李氏黄門李新喜與平章政事完顔匡定䇿奉永濟即位章宗承世宗治平之後正禮樂備刑法定官制典章文物粲然可觀然婢寵擅朝䟽忌宗室傳授非人金源自此衰矣贈趙汝愚太師沂國公十二月錢象祖罷蒙古滅黙爾竒斯部阿爾拉部降于蒙古己巳二年金衛紹王永濟大安元年太祖皇帝四年春正月以樓鑰參知政事章良能同知樞密院事宇文紹節僉書院事輝和爾國降于蒙古輝和爾王伊都呼聞蒙古盛强遣使至蒙古議和㑹蒙古遣阿里雅爾鼐等至伊都呼大喜即使布格蘇等至蒙古謝請率其衆為臣子太祖皇帝大恱遣使謝之伊都呼復奉珍寳方物以獻情好遂篤既而伊都呼朝太祖皇帝于結連河請尚公主太祖皇帝許之因列伊都呼于諸子中為第王云輝和爾唐之髙昌也夏四月金主永濟殺章宗元妃李氏初章宗遺詔内人有娠者二人生男則立為儲貳平章政事布薩端承金主意奏先帝承御賈氏當以十一月免乳今已逾期范氏産期合在正月今醫稱胎形已失范氏願削髪為尼金主乃以章宗内人范氏損其遺腹詔中外而殺元妃李氏承御賈氏以布薩端為右丞相五月起復史彌逺為右丞相蒙古入夏靈州夏主安全降太祖皇帝入靈州夏主安全降獻女為好夏自是益衰秋八月以安丙為四川制置大使兼知興元府罷宣撫司詔皇太子更名詢冬十二月賜煥章閣待制朱熹諡曰文從考㓛郎官劉彌正之議也蒙古侵金庚午三年金大安二年年夏皇建元年太祖皇帝五夏六月丁巳朔日有食之金主立其子胙王從恪為太子秋八月夏人寇金葭州夏自天㑹初與金議和八十餘年未嘗交兵及為蒙古所攻求救于金金主新立不能出師夏人怨之遂侵葭州金慶山奴撃敗之而去冬十二月婁機罷機立朝能正言好稱奨人才不遺寸長訪問賢能䟽列姓名及其可用之實以備采取至是以老罷金禁傳説邊事蒙古太祖皇帝怨金主之嘗欲害己也數以兵侵掠金西北之境其勢漸盛國人皇皇遂禁百姓不得傳說邊事蒙古侵金桓昌撫州通鑑續編卷十九
