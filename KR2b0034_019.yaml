body:
  text: 通鑑續編卷十六元陳桱撰戊午八年金天眷元年春正月戊子朔帝在建康府張守罷考功員外郎樓炤上䟽言今日之計當思古人量力之言察兵家知己之計力可以保淮南則以淮南為屏蔽權都建康漸圖恢復力未可以保淮南則因長江為險阻權都吳㑹以養國力於是帝議還臨安張守言建康自六朝為帝王都氣象雄偉且據都㑹以經理中原依其險阻以捍禦强敵陛下席未及暖今又巡幸百司六軍有勤動之苦民力邦用有煩費之憂願少安於此以繫中原民心趙鼎不可守遂求去以胡世將為四川安撫制置使金班女直小字金主所製也遂謂古新所製為大字二月帝如臨安府胡安國進春秋傳詔加安國寳文閣直學士自王安石廢春秋不列於學官安國謂先聖手所筆削之書天下事物無不備於此乃傳心之要典也而人主不得聞講說學士不得相傳習亂倫滅理用夏變夷殆由乎此因潜心二十餘年著春秋傳以成其志至是上之帝謂深得聖人之㫖詔進一官命未下而卒帝至臨安府自是定都矣一日内侍移竹栽入内趙鼎見之責曰艮嶽花石之擾皆出汝曹今欲蹈前轍耶因奏其事帝改容謝之又有户部官進錢入宫者鼎召至相府切責之翌日問帝曰某人獻錢耶帝曰朕求之也鼎曰其人不當獻陛下不當求遂黜其人於逺郡三月以仲儡為嗣濮王以劉大中叅知政事王庶為樞宻副使以秦檜為尚書右僕射兼樞宻使初張浚嘗與趙鼎論人才浚極稱檜善鼎曰此人得志吾軰無所措足矣浚不以為然故引檜共政方知其闇不復再薦檜因憾之及鼎再相檜在樞府一惟鼎言是從鼎由是深信之言檜可大任於帝而不知為檜所賣也檜既相制下朝士相賀獨吏部侍郎晏敦復有憂色曰姦人相矣聞者皆以其言為過陳與義罷時朝廷議與金和趙鼎言人多謂中原有可圖之勢宜便進兵恐他時咎今日之失機與義曰若和議成豈不賢於用兵帝然之至是以疾出知湖州金以韓昉為翰林學士夏四月詔王庶視師江淮五月王倫及金烏凌阿思謀來倫至㑹寧見金主首謝廢劉豫次致使指㑹達蘭自河南還言於金主請以廢齊舊地與宋金主命羣臣議鄂特本力言不可東京留守完顔宗雋曰我以地與宋宋必徳我完顔宗憲折之曰我俘宋人父兄怨非一日若復資以土地是助仇讐也何徳之有勿與便時富勒呼位在鄂特本上達蘭宗儁附之由是富勒呼執議以河南陜西地與宋遂遣倫及其太原少尹烏凌阿思謀太常少卿石慶來議事將至帝命吏部侍郎魏矼館伴之矼以為御史時嘗言和議之非不可奉詔因備論敵情之不可信秦檜曰公以智料敵檜以誠待敵矼曰第恐敵不以誠待相公爾檜乃改命吳表臣思謀等至臨安入見帝謂輔臣曰先帝梓宫果有還期雖待三二年尚庻幾惟是太后春秋髙朕旦夕思念欲早相見此所以不憚屈已冀和議之速成也檜曰屈已議和此人主之孝也見主卑屈懐憤不平此人臣之忠也帝曰雖然有備無患使和議可成邊備亦不可弛朝臣多言其不可者帝怒趙鼎曰陛下於金人有不共天之讐今屈已請和不憚為之者以梓宫及母后耳羣臣憤懣之辭出於愛君不可以為罪陛下宜諭之曰講和非吾意以親故不得已為之但得梓宫及母后還敵雖渝盟吾無憾焉帝從其言羣議遂息金以經義詞賦兩科取士六月賜衍聖公孔玠衢州田以奉先聖祠事凡五頃時玠僑寓於衢也王庻自淮南還庻素有威嚴及視師坐壇上自大將已下悉以戎服歩由轅門庭趨受命拜賜而出岳飛自鄂州與庻書曰今歳若不舉兵當納節請閒矣庻甚壯之以張宗顔知廬州徙劉錡屯鎮江秋七月以王倫為奉迎梓宫使如金秦檜請復遣倫如金定和議及申問諱日左正言辛次膺以國耻未雪義難講好凡七上疏力諫不報乃以母疾求補外詔從之八月金始頒行官制金以所都㑹寧為上京改遼上京臨潢府為北京㑹寧即海古勒地金之舊土也安春水實源於此故名金源初稱為内地至是升為上京會寧府改遼上京為北京而東京遼陽西京大同南京大興中京大定府則仍舊云九月金改燕京樞密院為行臺尚書省冬十月劉大中罷大中與趙鼎不主和議秦檜忌之薦蕭振為侍御史振入臺即劾大中罷之鼎曰振意不在大中也振亦謂人曰趙丞相不待論當自為去就也趙鼎罷初中書舎人潘良貴以户部侍郎向子諲奏事久叱之退帝欲抵良貴罪中丞常同為之辨帝欲併遂同鼎奏子諲雖無罪而同與良貴不宜逐帝不從命下給事中張致逺謂不應以一子諲出二佳士不書黄帝怒顧鼎曰固知致逺必繳駁鼎問何也帝曰與諸人善蓋已有先入之言由是不樂於鼎秦檜繼留身奏事及出鼎問帝何言檜曰上無他恐丞相不樂耳既而御筆除宗子璩節度使封國公鼎奏建國公雖未正名天下皆知陛下有子社稷大計也在今禮數不得不異所以繫人心不使之二三而惑也帝曰姑徐之秦檜復留身不去不知所言㑹殿中侍御史張戒論給事中勾濤濤言戒之擊臣乃趙鼎意因詆鼎結臺諌及諸將帝聞益疑鼎乃引疾求罷且言劉大中持正論為章惇蔡京之黨所嫉臣議論出處與大中同大中去臣何可留乃出知紹興府入辭言於帝曰臣去後必有以孝弟之說脅制陛下者將行檜率執政餞之鼎不為禮一揖而去檜益憾之鼎自再相無所施為或以為言鼎曰今日之事如人患羸當静以養之若復攻砭必傷元氣矣後王庻入對帝曰趙鼎兩為相於國有大功再贊親征皆能决勝又鎮撫建康回鑾無虞他人所不及也以勾龍如淵為御史中丞先是宰執入見秦檜獨留身言臣僚畏首尾多持兩端此不足與斷大事若陛下决欲講和乞專與臣議勿許羣臣預帝曰朕獨委卿檜曰臣恐未便望陛下更思三日容臣别奏又三日檜復留身奏事帝意欲和甚堅檜猶以為未也復進前說又三日檜復留身奏事如初知帝意不移乃始出文字乞决和議勿許羣臣預遂排趙鼎劉大中而一意議和然猶以羣臣為患中書舍人勾龍如淵為檜謀曰相公為天下大計而邪説横起盍不擇人為臺諫使盡擊去則事定矣檜大喜即擢如淵為中丞劾異議者卒成檜志王倫及金使張通古來言歸河南陜西之地倫至金金主以其右司侍郎張通古僉書宣徽院事蕭哲為江南詔諭使許歸河南地與倫偕來通古至泗州要所過州縣迎以臣禮至臨安要帝待以客禮秦檜未見國書疑為封冊欲帝屈已以受之帝曰朕嗣守太祖太宗基業豈可受金人封冊於是朝論籍籍楊沂中解潜韓世良相率見檜曰軍民洶洶若之何退又白之臺諫中丞勾龍如淵詣都堂與檜議召倫責之曰公為使通兩國好凡事當於彼中反覆論定安有同使至而後議者倫泣曰倫渉萬死一生徃來虎口者數四今日中丞乃責倫如此檜等共解之曰中丞無他亦欲激公了此事耳倫曰此則不敢不勉如淵謂檜曰但取金書納之禁中則禮不行而事定給事中樓炤亦舉諒隂三年事以告檜遂以檜攝冢宰詣館受書而倫亦以計說通古通古從之檜至館見通古受其書通古欲百官備禮檜使省吏朝服導從以書納於禁中人情始安通古入見言先歸河南地徐議餘事先是王倫使金從趙鼎受使指鼎言問禮數則答以君臣之分已定問地界則答以大河為界二事使者之大指或不從則已倫受命而行至是倫還有詔諭江南之名帝歎息謂王庻曰使五日前得此報趙鼎豈可去耶知平江府向子諲致仕金詔諭使至平江子諲不肯拜金詔乃乞致仕且言和議之非秦檜許之韓世忠乞奏事行在所不許初秦檜主和議命世忠移屯鎮江世忠言金人詭詐恐以計緩我師乞留此軍蔽遮江淮因力論和議之非願效死節率先迎敵若不勝從之未晚章十數上皆慷慨激切且請單騎詣闕靣奏帝不許及張通古來以詔諭為名世忠四上䟽言不可從願舉兵决戰兵勢最重處臣請當之且言金人欲以劉豫相待舉國士大夫盡為陪臣恐人心離散士氣凋沮不報及張通古還世忠伏兵洪澤鎮將邀殺之以壊和議不克而罷十一月以孫近叅知政事詔侍從臺諫詳奏和金得失樞密院編修官胡銓乞斬秦檜詔貶銓監廣州都鹽倉禮部侍郎兼直學士院曾開當草國書辨視體製非是論之不聽遂請罷改兼侍講秦檜以温言慰之曰主上虚執政以待開曰儒者所爭在義茍為非義髙爵厚禄弗顧也願聞所以事敵之禮檜曰若髙麗之於本朝耳開曰主上以盛徳登大位臣民之所推戴列聖之所聽聞公當強兵富國尊主芘民奈何自卑辱至此非開所聞也復引古誼以折之檜大怒曰侍郎知故事檜獨不知也開又詣都堂問計果安出檜曰聖意已定尚何言公自取大名而去如檜但欲濟國事耳然猶慮羣言乃詔金國遣使入境欲朕屈已受和在朝侍從臺諫其詳思條奏和好得失於是從官曽開張燾晏敦復魏矼李彌遜尹焞梁汝嘉樓炤蘇符薛徽言御史方廷實館職胡珵朱松張擴凌景夏常明范如圭馮時可許忻趙雍皆極言不可和提舉杭州洞霄宫李綱亦上䟽言朝廷使王倫使金國奉迎梓宫徃返屢矣今倫之歸與金使偕乃以詔諭江南為名不著國號而曰江南不云通問而曰詔諭此何禮也臣在逺方不知其曲折然以愚意料之敵為此名以遣使其邀求有五必降詔書欲陛下屈體降禮以聽受一也必有赦文欲朝廷宣布頒示郡縣二也必立約束欲陛下奉藩稱臣稟其號令三也必求我賂廣其數目使我坐困四也必求割地以江南為界五也此五者朝廷從其一則大事去矣金人變詐不測貪惏無厭縱使聽其詔令奉藩稱臣其志猶未巳必繼有號召或使親迎梓宫或使單車入覲或使移易將相或使改革政事或竭取賦稅或朘削土宇從之則無有紀極一不從則前功盡廢反為兵端以謂權時之冝聽其邀求可無後悔者非愚則誣也䟽入不省胡銓抗䟽言曰臣謹按王倫本一狎邪小人市井無頼頃縁宰臣無識遂舉以使敵專務詐誕欺罔天聽驟得羙官天下之人切齒唾罵今者無故誘致敵使以詔諭江南為名是欲臣妾我也是欲劉豫我也夫天下者祖宗之天下也陛下所居之位祖宗之位也奈何以祖宗之天下為金人之天下以祖宗之位為金人藩臣之位陛下一屈膝則祖宗廟社之靈不安其所祖宗數百年之赤子盡為敵有朝廷宰執盡為陪臣天下士大夫皆當裂冠毁冕變易服色異時貪婪無厭之求安知不加我以無禮如劉豫也哉今倫之議曰我一屈膝則梓宫可還太后可復淵聖可歸中原可得嗚呼自變故以來主和議者誰不以此說㗖陛下哉然而卒無一騐則彼之情偽已可知矣而陛下尚不覺悟竭民膏血而不恤忘國大讎而不報含垢忍耻舉天下而臣之甘心焉就令彼决可和盡如倫議天下後世謂陛下何如主况其人變詐百出而倫又以姦邪濟之梓宫决不可還太后决不可復淵聖决不可歸中原决不可得而此膝一屈不可復伸國勢凌夷不可復振可為痛哭流涕長太息矣今内而百官外而軍民萬口一談皆欲食倫之肉謗議洶洶陛下不聞正恐一旦變作禍且不測臣竊謂不斬王倫國之存亡未可知也雖然倫不足道也秦檜以腹心大臣而亦為之陛下有堯舜之資檜不能致君如唐虞而欲導陛下如石晉孔子曰管仲相桓公一匡天下矣夫管仲覇者之佐耳尚能成九合之功而為衣裳之會秦檜大國之相也反舎中興之美而為事仇之舉則檜也不惟陛下之罪人實管仲之罪人矣孫近傅會檜議遂得叅政天下望治有如饑渴而近伴食中書漫不敢可否事檜曰可和近亦曰可和檜曰天子當拜近亦曰當拜臣甞至政事堂三發問而近不答但曰已令臺諫侍從議矣嗚呼參贊大政徒取充位如此有如敵騎長驅尚能折衝禦侮耶臣竊謂檜近亦可斬也臣備員樞屬義不與檜等共戴天區區之心願斷三人頭竿之藁街然後覊留敵使責以無禮徐興問罪之師則三軍之士不戰而氣自倍不然臣有赴東海而死寧能處小朝廷求活耶書上檜以銓狂妄凶悖皷衆刼持詔除名編管昭州仍降詔播告中外給舎臺諫及朝臣多救之者檜迫於公論翌日改銓監廣州都鹽倉宜興進士吳師古鋟其書於木金人募其書千金朝士陳剛中以啓事賀銓之謫師古坐流袁州剛中謫知䖍州安逺縣皆死焉晏敦復謂人曰頃言檜姦諸君不以為然今方專國便敢爾他日何所不至耶王庻罷庻屢言和議非是不聽因乞免僉書和議文字且累䟽求罷秦檜從之十二月以李光叅知政事牓諭及金通和秦檜既定和議將揭牓以吏部尚書李光有人望欲籍之同押牓以息浮議乃請於帝而用之光既受命遂於尚書省牓諭金國使來盡割河南陜西故地通好於我許還梓宫及母兄親族餘無需索以韓肖胄僉書樞宻院事充金國奉表報謝使以施廷臣為侍御史莫將為起居郎不敢拜監察御史施廷臣司農丞莫將附秦檜抗章力贊和議檜擢用之朝論大駭吏部尚書張燾率侍郎晏敦復上䟽切諫於是二人皆不敢受命檜患之使樓炤諭以美官燾終不易前論作慈寧宫以皇太后韋氏將還命作宫以待之己未九年金天眷二年春正月大赦以金國通和大赦河南新復州軍直學士院樓炤草赦文略曰乃上穹悔禍之期而大金報許和之約割河南之境土歸我輿圖戢宇内之干戈用全民命張浚在永州上䟽言燕雲之舉其鑒不逺敵自宣和以來挾詐反覆傾我國家蓋非可結以恩信事以仁義者借令敵中有故上下紛雜天屬盡歸河南遂復我必徳其厚賜謹守信誓數年之後人情益解士氣漸消彼或内變既平指瑕造釁肆無厭之欲發難從之請其將何辭以對顧事理可憂又有甚於此者陛下積意兵政將士漸孚一旦北靣事讐聽其號令比肩遣使接武求盟小大將帥孰不解體陛下方經理河南而有之臣知其無與赴功而共守者也蓋自堯舜以來人主奄有天下非兵無以立國未聞委質于人可以削平禍難逺而石晉近而叛豫著人耳目歴歴可想戰國之時楚懐王入覲於秦一徃不返逮今千載之下為之痛心由辨之不早也漢髙祖知項羽之寡恩少義其和不可恃故雖再敗固陵甘心不悔兹二事者足為今之戒矣前後凡五上䟽皆不報岳飛在鄂州聞金將歸河南地上言金人不可信和好不可恃相臣謀國不臧恐貽後世譏秦檜銜之及赦至鄂岳飛又上䟽力陳和議之非至有願定謀於全勝期収地於兩河唾手燕雲終欲復讎而報國誓心天地尚令稽首以稱藩之語䟽入秦檜益怒遂成讎隙吳璘在熙州其幕客擬為賀表璘愀然曰在朝廷休兵息民誠天下慶璘等叨竊不能宣國威靈亦可愧矣但當待罪稱謝可也知廣州連南夫監明州比較務楊煒皆上書極言和議之失秦檜深怒之以王倫同僉書樞密院事充奉護梓宫迎請皇太后及割地界使遣判大宗正事士㒟兵部侍郎張燾詣河南修奉陵寢初史館校勘范如圭以秦檜力建和議以書責檜曲學倍師忘讎辱國之罪且曰公不喪心病狂奈何為此必遺臭萬年矣及金人歸河南地檜方自以為功如圭入對言兩京之版圖既入則九廟八陵瞻望咫尺今朝陵之使未遣何以慰神靈萃民志乎帝泫然曰非卿不聞此言即日遣士㒟等徃檜以如圭不先白已益怒如圭遂謁告去以尹焞提舉萬壽觀兼侍講焞固辭不拜先是資善堂翊善朱震疾亟薦焞自代帝慘然曰楊時物故胡安國與震又亡朕痛惜之趙鼎曰尹焞問學淵源可以繼震乃除焞太常少卿兼崇政殿説書至是改命焞以和議為非固辭不拜加岳飛開府儀同三司飛固辭不許和議成例加爵賞飛力辭言今日之事可危而不可安可憂而不可賀可訓兵飭士謹備不虞而不可論功行賞取笑敵人三詔不受帝温言奬諭之飛乃受命以王倫為東京留守以吳玠為四川宣撫使玠與金人對壘且十年常苦逺餉勞民屢汰冗員節浮費益治屯田至是議和帝以玠功髙授開府儀同三司四川宣撫使陜西階成等州皆聽節制遣内侍奉手札以賜至則玠病甚扶掖聽命初賜内侍藍安石諡宦者有諡自安石始也二月以周聿為陜西宣諭使方庭實為三京宣諭使庭實至西京先朝陵寢見永昌而下皆遇發掘而泰陵至暴露庭實解衣覆之歸以白帝秦檜怒之以李綱為湖南安撫大使張浚為福建安撫大使以郭浩為陜西宣諭使三月封和州防禦使璩為崇國公聽讀於資善堂王倫至汴金人以三京及陜西河南地歸之王倫至汴見烏珠交割地界得東西南三京壽春府宿亳曹單州及陜西京西諸州之地烏珠遂自祁州渡河而還移行臺於大名府以樓炤僉書樞宻院事夏人陷府州夏四月命樓炤宣諭陜西諸路以孟庾為西京留守路允迪為南京留守五月鄜延副將李世輔自夏來歸賜名顯忠綏徳青澗人李世輔自唐以來世襲蘇尾九族巡撿世輔年十七隨父永竒出入行陣金人犯鄜延經畧王庻募間者世輔應募與張琦俱徃有敵人夜宿陶穴顯忠縋陶穴中得十七人皆殺之取首二級馬二匹餘馬悉折其足庻大竒之補充隊將由是知名遷副將金人䧟延安授永竒父子官永竒聚泣曰我宋臣也世襲國恩乃為彼用耶會劉豫令世輔帥馬軍赴東京永竒宻戒之曰汝若得乗機即歸本朝無以我故貳其志事成我亦不朽矣世輔至東京劉麟喜之授南路鈴轄乃宻遣其客雷燦以蠟書赴行在及豫廢鳥珠以萬騎馳獵淮上與世輔獨立馬圍場間世輔戒吳俊徃探淮水可渡馬處欲執烏珠歸宋俊還世輔馳問之為竹刺傷馬而止烏珠授世輔知同州世輔至鄜省父永竒教世輔曰同州入南山乃金人徃來驛路汝可於此擒其將渡洛渭由商虢歸朝第報我知我當以兵取延安而歸世輔赴同州即遣黄士成等持書由蜀至吳報歸朝事金薩里罕來同州世輔以計執之馳出城至洛河舟船後期不得渡與追騎屢戰皆㨗世輔憇髙原望追騎益多與薩里罕折箭為誓不得殺同州人及害我骨肉薩里罕許之遂推之下山崖追兵争救得免世輔携老幼長驅而北至鄜城縣急遣人告永竒永竒即挈家岀城至馬翅谷口為金人所及家屬二百口皆遇害世輔僅以二十六人奔夏國夏人問其故世輔泣具言父母妻子之亡切齒疾首恨不即死願得二十萬人生擒薩里罕取陜西五路歸於夏世輔亦得報不共戴天之讎夏主曰爾能立功則不靳借兵時有酋豪號青靣夜义者久為夏國患乃令世輔圖之世輔以三千騎晝夜疾馳奄至其帳擒之而還夏主大恱即出二十萬騎以文臣王樞武臣􅗹吪為陜西招撫使世輔為延安招撫使是年二月也世輔至延安總管趙惟清大呼曰鄜延今復歸宋已有赦書世輔取赦文觀之因與官屬列拜大哭乃以舊部八百餘騎徃見王樞􅗹吪諭之曰世輔已得延安府見講和赦書招撫可以本部軍歸國􅗹吪不從曰初經畧乞兵來取陜西今既到此乃令我歸耶世輔知勢不可乃出刀斫􅗹吪不及擒王樞縳之夏人以鐵鷂子軍來世輔以所部拒之馳揮䨇刀所向披靡夏兵大潰殺死蹂踐無慮萬人獲馬四萬匹世輔揭牓招兵毎得一人予馬一匹旬日間得驍勇少壯者萬人乃擒害其父母弟姪者斬於東市行至鄜州有馬歩軍四萬餘吳玠遣張振撫諭之曰兩國見議和好不可生事世輔遂見玠於河池玠遣詣樓炤於長安炤承制以為䕶國軍承宣使樞密行府前軍都統制送之行在世輔乃率部下三千南來帝撫勞再三賜名顯忠六月皇后邢氏崩於金之五國城夏國主乾順卒子仁孝立吳玠卒玠善讀史凡徃事可師者録置座右積久墻牖皆格言也用兵本孫吳務逺畧不求近小利故能保必勝御下嚴而有恩虚心請受雖身為大將卒伍最下者得以情逹故士樂為之死選用將佐視勞能為髙下先後不以親故權貴撓之卒年四十七自富平之敗金人專意圖蜀微玠身當其衝無蜀久矣故西人思之為作廟以奉焉竄澧州推官韓紃於循州上書論講和非計也以孟庾兼東京留守士㒟還自河南貶兵部侍郎張燾知成都府士㒟至鄂岳飛請以輕騎從洒掃實欲觀釁以伐謀秦檜白止之士㒟出蔡潁河南百姓歡迎夾道以喜以泣曰久隔王化不圖今日復為宋民遂入柏城披歴榛莾隨宜葺治禮畢而還詔封士㒟齊安郡王張燾奏䟽曰金人之禍上及山陵雖殄滅之未足以雪此耻復此讎也因極言必不可恃和盟而忘復讎之大事帝問諸陵寢如何燾不對唯言萬世不可忘此賊帝黯然秦檜患之出燾知成都府樓炤承制以楊政為熙河經略使吳璘為秦鳯經略使屯興元以保蜀郭浩為鄜延經略使屯延安以守陜東京留守王倫如金金人執之烏珠言於金主曰達蘭富勒呼主割河南與宋必有陰謀今宋使在汴勿令踰境倫聞之即遣介具言於朝㑹孟庾至汴倫即解留鑰將使指赴金國議事行至中山㑹達蘭等反金人執之秋七月以胡世將兼權主管四川宣撫司事於河池金富勒呼等謀反伏誅金宋國王富勒呼自以太宗長子䟦扈尤甚兖國王宗雋為左丞相復附之達蘭方持兵柄遂相與謀反事覺富勒呼宗雋皆伏誅以達蘭屬尊釋不問出為行臺左丞相居燕京金以烏珠為都元帥金以杜充為行臺右丞相樓炤還自鳯翔八月金達蘭等復謀反伏誅金魯國王達蘭至燕愈驕肆不法復與翼王呼蘭等謀反事覺金主且疑達蘭與宋隂結故主割地遂命誅之達蘭南走追而殺之於祁州其黨皆死蘇符如金賀正旦也冬十月金徙王倫於河間遣副使藍公佐還倫見金主於御子林致使指金主不答而令其翰林待制耶律紹文為宣勘官問倫知達蘭罪否倫對不知又問無一言及歳幣反求割地汝但知有元帥豈知有上國耶倫曰比蕭哲以國書許歸梓宫太母及河南地天下皆知上國㝷海上之盟與民休息使人奉使通好兩圍耳紹文復曰卿留雲中已無還期及貸之還曾無以報反間貳我君臣耶乃遣副使藍公佐還議歳貢正朔誓命等事及索河東北士民之在南者而徙倫拘於河間以待報命之至嗣濮王仲儡卒十二月李光罷光初謂可因和為自治之計故署榜不辭及秦檜議撤淮南守備奪諸將兵權光始極言金人心多反覆和不可恃備不可撤秦檜惡之光復折檜於帝前曰觀檜之意是欲壅蔽陛下耳目盗弄國權懐姦誤國不可不察檜大怒光遂求去庚申十年金天眷三年夏仁宗仁孝大慶元年春正月以莫將為迎䕶梓宫奉迎兩宫使提舉臨安府洞霄宫李綱卒綱薨於福州年五十八綱負天下之望以一身用舎為社稷生民安危身雖在外知無不言雖不見用而心未嘗少變為相僅七十日而其忠誠義氣凜然動乎逺邇每使者至金金人必問李綱趙鼎安否其為逺人所畏服如此使得畢力殫慮於靖康建炎間莫或撓之二帝何至於北行而宋亦豈至為南渡之偏安耶惜哉二月以劉錡為東京副留守李顯忠為南京副留守夏四月金蜀國公尼楚赫卒韓肖胄罷五月作敷文閣奉安徽宗御製也金人分道南侵烏珠至東京留守孟庾以城降之河南州縣皆復為金烏珠以歸地於宋為非計而張通古又以宋置戌河南言於鄂特本請及宋部置本未定當議収復鄂特本然之及達蘭誅烏珠遂與鄂特定謀集國中兵於祁州金主乃如燕京命烏珠自黎陽趨汴薩里罕出河中趨陜西聶哷攻山東李成攻河南於是烏珠與孔彦舟趙榮酈瓊等攻汴孟庾降烏珠入居龍徳宫遣兵攻河南州縣皆降之金冊李仁孝為夏國王金烏禄侵南京留守路允迪以城降之葛王烏禄太祖之孫許王鄂爾多之子也金李成侵西京留守李利用棄城走金薩里罕取永興軍陜西州縣皆降之金烏禄圍順昌府劉錡敗之六月烏珠來戰錡復大敗之烏珠走還汴順昌圍解劉錡赴東京率所部王彦八字軍三萬七千人及殿司卒三千為四萬人自臨安泝江絶淮至渦口方食忽暴風㧞坐帳錡曰此賊兆也主暴兵即下令兼程而進聞金人敗盟南下錡與將佐捨舟陸行先趨三百里至順昌城中諜報東京已降知府陳䂓見錡問計錡曰城中有糧則能與君共守䂓曰有米數萬斛錡曰可矣乃與䂓議歛兵入城為守禦計時八字軍以將駐於汴皆携孥以行至是錡召諸將問計諸將以東京已䧟皆曰金兵不可敵也請以精銳遮老穉順流還江南錡曰吾本赴官留司今東京為金所䧟幸吾全軍至此有城可守奈何棄之吾意决矣敢言去者斬惟部將許清奮曰太尉奉命副守汴京軍士扶携老幼而來今避而走易耳然欲棄父母妻子則不忍欲與偕行則敵翼而攻何所逃之不如相與努力一戰於死中求生也議與錡合錡喜乃鑿舟沉之示無去意寘家寺中積薪於門戒守者曰脫有不利即焚吾家母辱敵手也分命諸將守諸門明斥候募土人為間探於是軍士皆奮男子備戰守婦人礪刀劒争呼躍曰平時人欺我八字軍今日當與國家破賊立功時守備一無可恃錡於城上躬自督厲取劉豫時所造癡車以輪轅埋城上又撤民户扉周匝蔽之城外有民居數千家悉焚之凡六日粗畢而金游兵已渉潁河至城下五月壬寅金人圍城錡預於城下設伏擒敵將阿哈等二人詰之云韓將軍營白沙窩距城三十里錡夜遣千餘人擊之連戰殺敵頗衆既而金三路都統葛王烏禄以兵三萬與龍虎大王合而薄城錡令開諸門金人疑不敢近初錡傅城築羊馬垣穴垣為門至是與許清軰蔽垣為陣金人縱矢皆自垣端軼著於城或止中垣上錡用破敵弓翼以神臂强弩自城上或垣門射敵無不中者敵稍却復以歩兵邀擊溺河死者不可勝計破其鐵騎數千時順昌圍已四日金兵益盛乃移砦於李村錡遣閻充募壯士五百夜斫其營是夕天欲雨電光四起見辮髮者輙殱之金兵退十五里錡復募百人徃或請䘖枚錡笑曰無以枚也命折竹為噐如市井兒以為戱者人持一以為號直犯金營電所燭則皆奮擊電止則匿不動敵衆大亂百人者聞吹噐聲即聚金人益不能測於是終夜自戰積屍盈野退軍老婆灣烏珠在汴聞之即索靴上馬與孔彦舟酈瓊趙榮等帥十萬衆來援過淮寧留一宿治戰具備糗糧不七日至順冒錡㑹諸將問計或言今已屢㨗冝乗此勢具舟全軍而歸陳䂓曰朝廷養兵十五年正為緩急之用况已挫敵鋒軍聲稍振雖衆寡不敵然有進無退錡曰府公文人猶誓死守况汝曹耶且敵營甚邇而烏珠又來吾軍一動彼躡其後則前功俱廢使敵侵軼兩淮震驚江浙則平生報國之志反成誤國之罪衆皆感動思奮曰惟太尉命錡募得曹成二人諭之曰遣汝作間事㨗重賞第如我言敵必不殺汝今置汝綽路騎中汝遇敵則佯墜馬為敵所得敵帥問我何如人則曰太平邊帥子喜聲伎朝廷以兩國講好使守東京圖逸樂耳已而二人果遇敵被執烏珠問之對如前烏珠喜曰此城易破耳即置鵝車砲具不用而械成等還錡壬子烏珠至城下責諸將䘮師衆皆曰南朝用兵非昔之比元帥臨城自見錡遣耿訓以書約戰烏珠怒曰劉錡何敢與我戰以吾力破汝城直用靴尖趯倒耳耿訓曰太尉非但請與太子戰且謂太子必不敢濟河願獻浮橋五所濟而大戰烏珠曰諾乃下令明日府治㑹食遲明錡果為五浮橋於潁河上敵由之以濟錡遣人毒潁上流及草中戒軍士雖渴死毋得飲於河飲者夷其族敵用長勝軍嚴陣以待諸將各居一部時大暑敵逺來疲弊錡士氣閒暇敵晝夜不解甲錡軍皆畨休敵人馬饑渴食水草者輙病徃徃困乏方晨氣清凉錡按兵不動逮未申時敵力疲氣索忽遣數百人出西門接戰俄遣數千人出南門戒令勿喊但以銳斧犯之統制官趙樽韓直身中數矢戰不肯已士殊死戰入其陣刃斧亂下敵大敗是夕大雨平地水深尺餘乙卯烏珠拔營去錡遣追之死者數萬方大戰時烏珠被白袍乘甲馬以牙兵三千督戰兵皆重鎧甲號鐡浮圖戴鐵兠牟周匝綴長簷三人為伍貫以韋索毎進一歩即用拒馬擁之進一歩拒馬亦進退不可却官軍以搶標去兠牟大斧斷其臂碎其首敵又以鐡騎分左右翼號柺子馬皆女直為之號長勝軍專以攻堅戰酣然後用之自用兵以來所向無前至是亦為錡軍所殺自辰至申敵敗遽以拒馬木障之少休城上皷聲不絶乃出飯羹坐餉戰士如平時敵披靡不敢近食已撤拒馬木深入斫敵又大破之棄屍斃馬血肉枕藉車旗噐甲積如山阜烏珠平日所恃以為強者十損七八至陳州數諸將之罪韓常以下皆鞭之遂擁衆還汴是役也錡雖以寡禦衆而能以逸待勞故能成功既而洪皓自金宻奏順昌之㨗金人震恐䘮魄燕之重寳珍噐悉徙而北意欲捐燕以南棄之故議者謂是時諸將恊心分路追討則烏珠可擒汴京可復而王師亟還自失機會良可惜也吴璘使李師顔敗金人於扶風拔之薩里罕自長安趨鳯翔陜右諸軍隔在敵後逺近震恐時揚政在鞏郭浩在鄜延惟吳璘隨胡世將在河池世將急召諸將議惟涇原帥田晟與楊政同至參謀官孫渥言河池不可守欲退保仙人關璘厲聲折之曰懦語沮軍可斬也璘請以百口保破敵世將壯之指所居帳曰世將誓死於此乃命田晟以三千人迎敵璘亦遣姚仲拒敵於石壁敗之金呼雅以三千騎衝璘軍璘使統制李師顔以驍騎擊走之遂㧞扶風獲三將及女直百十七人薩里罕怒甚自戰百通坊姚仲力戰破之岳飛將牛臯敗金人於京西郭浩使鄭建充敗金人於醴州拔之樓炤以父䘮去位王彦敗金薩里罕於青谿嶺薩里罕走還鳯翔詔齊安郡王士㒟主奉濮王祠事使李若虚諭岳飛班師飛遣將分布經畧而自率軍長驅以闞中原將發宻奏曰今欲恢復必先正國本以安人心然復不常厥居以示無忘復讎之志因遣兵東援劉錡西援郭浩而秦檜力主和議奏遣司農少卿李若虚詣飛軍諭指班師飛奏金人銳氣沮䘮而我豪傑向風士卒用命時不再來機難輕失不可韓世忠使王勝成閔大敗金人於淮陽軍岳飛及金人戰於蔡州敗之復其城閏月張俊使宋超敗金人於朱家村胡世將使田晟大敗金人於涇州岳飛使張憲敗金韓常於潁昌復潁昌及淮寧府岳飛使郝晸敗金人於鄭州復其城知河南府李興復汝州遂敗金人於河清復伊陽等八縣李成遁去韓世忠使王勝復海州金人來救勝大敗之王徳復宿州遂會張俊於城父金烏禄及酈瓊棄亳州遁去俊入亳留二日而還次於壽春俊遣王徳援潁昌兵還就檄徳復宿州徳倍道自壽春馳至蘄縣與金遊騎遇遂入城偃旗卧皷游騎引去徳因潜師趨宿州夜半薄金營金人阻汴水邀戰徳䇿馬先濟歩騎從之遥謂金人曰吾與爾大小百戰雖名王貴帥莫不靡碎爾何為者金將遂投兵降守將馬秦猶閉門固守徳叱其子順先登秦遂降宿州平徳乗勝趨亳州與俊㑹於城父時酈瓊與葛王烏禄在亳聞徳至曰夜叉未易當也即引衆去徳入亳州請於俊曰今兵威已振請乗勢進取俊不從而還初徳以十六騎徑入隆徳府縳金守臣姚太師以獻於朝欽宗問狀姚對曰臣就縳時止見一夜叉耳由是人呼為王夜叉安置秘書少監趙鼎於潮州秦檜機穽深險外和而中異惡鼎居越偪已諷中丞王次翁司諌謝祖信等論鼎嘗受張邦昌偽命遂徙鼎泉州鼎自泉還復上書言時政檜忌其復用又諷次翁等論其乾没都督府錢十七萬緡詔降官為秘書少監分司西京興化軍居住次翁及右諌議大夫何鑄論之不已乃貶清逺軍節度副使潮州安置秋七月岳飛使張應㑹李興復永興軍以王次翁參知政事秦檜薦次翁為中丞故凡可以為檜地者無不力為之及金人敗盟帝下詔罪狀烏珠次翁懼檜得罪因奏曰前日國是初無主議事有小變則更用他相後來者未必賢而排黜異黨紛紛累月不能定願陛下以為至戒帝深然之檜由是益安據其位公論不能撼搖矣檜徳其言遂引同列岳飛大敗金烏珠於郾城飛留大軍於潁昌命諸將分道出戰自以輕騎駐郾城兵勢甚銳烏珠大懼㑹諸帥欲併力一戰飛聞之曰金人伎窮矣乃日出挑戰且罵之烏珠怒合龍虎大王蓋天大王及韓常之兵逼郾城飛遣子雲領騎兵直貫其陣戒之曰不勝先斬汝雲與金人戰凡數十合金屍布野烏珠以拐子馬萬五千來飛戒歩卒以麻札刀入陣勿仰視第斫馬足柺子馬相連一馬仆二馬不能行飛軍奮擊遂大破之烏珠大慟曰自海上起兵皆以此勝今已矣因復益兵而前飛自以四十騎突戰敗之以楊沂中為淮北宣撫副使劉錡為判官金烏珠侵潁昌岳飛使王貴敗之烏珠既敗於郾城憤甚合師十二萬次於臨潁楊再興以三百騎遇之於小商橋驟與之戰殺二千餘人及萬户薩巴千户百人再興死之獲其尸焚焉得箭鏃二升飛痛惜之張憲繼至復戰烏珠夜遁追奔十五里中原大振飛謂子雲曰賊屢敗必還攻潁昌汝宜速援王貴既而烏珠果至貴將游奕雲將背嵬戰於城西雲以騎兵八百挺前决戰歩卒張左右翼繼之殺烏珠壻夏金吾烏珠引兵還汴岳飛使梁興渡河㑹太行忠義兩河豪傑敗金人於垣曲又敗之於沁水遂復懐衛州太行道絶斷金人山東河北之道金人大恐岳飛大敗金烏珠於朱仙鎮烏珠走還汴飛遣使脩治諸陵飛進軍朱仙距汴京四十五里與烏珠對壘而陣遣背嵬騎五百奮擊大破之烏珠還汴飛檄陵臺令行視諸陵葺治之而還岳飛奉詔班師遂自郾城還鄂州金復取潁昌淮寧府蔡鄭州飛固辭職不許梁興㑹太行忠義社及兩河豪傑等帥衆歸岳飛由是金人動息山川險要飛皆得其實中原盡磁相澤潞晉汾隰衛之境皆期日興兵與官軍㑹其所揭旗以岳為號父老百姓争挽車牽牛載糗糧以饋義軍頂盆焚香迎候者充滿道路自燕以南金人號令不行烏珠欲僉軍以抗飛河北無一人應者乃嘆曰自我起北方以來未有如今日之挫衂金烏凌阿思謀素驍勇桀黠亦不能制其下但諭之曰毋輕動俟岳家軍來即降金將王鎮崔慶李覬崔虎華旺等皆率所部降飛金龍虎大王之將竒徹等亦宻受飛旗榜自其國來降金韓常亦欲以衆五萬内附飛大喜語其下曰直抵黄龍府與諸君痛飲爾因上奏興等過河人心願歸朝廷金兵累敗烏珠等皆令老少北去正中興之機而秦檜方欲畫淮以北與金為和諷臺臣請諸將班師且知飛志銳不可回上言飛孤軍不可久留乞速召還於是飛一日奉十二金字牌飛憤惋泣下東靣再拜曰十年之力廢於一旦乃自郾城引兵還民遮馬慟哭訴曰我等戴香盆運糧草以迎官軍金人皆知之相公去我軰無噍類矣飛亦悲泣取詔示之曰吾不得擅留哭聲震野飛留五日以待民徙從而南者如市飛亟奏以漢上六郡閒田處之初烏珠敗於朱仙欲棄汴而去有書生叩馬曰太子毋走岳少保且退矣烏珠曰岳少保以五百騎破吾十萬京城日夜望其來何謂可守生曰自古未有權臣在内而大將能立功於外者岳少保且不免况欲成功乎烏珠悟遂留不去及飛還烏珠遣兵追之不及而河南新復府州皆復為金有飛至鄂力請解兵柄不許已而入覲帝問之飛拜謝而已八月以張九成喻樗陳剛中凌景夏樊光逺毛叔度元盥七人謗訕和議貶官有差秦檜之謀也九成從楊時學紹興初舉進士對䇿直言無隠且曰禍亂之作天所以開聖人也願陛下以剛大為心無以驚憂自沮前世中興之主大抵以剛徳為尚去䜛節慾逺佞防姦皆中興之本也今閭巷之人皆知有父兄妻子之樂陛下貴為天子冬不得温夏不得凊昏無所定晨無所省感時遇物悽惋於心可不思所以還二聖之車乎擢寘首選及為刑部侍郎㑹金人議和九成言於趙鼎曰金實厭兵而張虚聲以撼中國耳因陳十事云彼誠能從吾所言則與之和使權在朝廷鼎罷相檜誘之曰且成檜此事九成曰九成胡為異議特不可輕易以茍安耳檜曰立朝湏優游委曲九成曰未有枉已而能直人者帝問以和議九成對曰敵情多詐不可不察檜尤惡之楊沂中之師潰於宿州遂自壽春渡淮而還金人屠宿州九月使李易諭韓世忠罷兵還鎮金人復入西京知府李興出走以郭浩知金州節制陜西河東軍馬冬十月金薩里罕取慶陽府河東經略使王忠植死之忠植本河東歩佛山忠義人以復石代等十一州功授河東路經略安撫使及薩里罕犯慶陽知府宋萬年以城降胡世將檄忠植以所部赴陜西㑹合行次延安叛將趙惟清執忠植送於薩里罕薩里罕使諭城降忠植至慶陽城下大呼曰我太行忠義也為金人所執使來招降願將士勿負朝廷堅守城壁薩里罕怒詰之忠植披襟曰當速殺我遂遇害十一月金封孔子後璠為衍聖公時金主方興禮樂立孔子廟於上京求孔子後得四十九代孫承奉郎璠遂封之十二月金以阿里布薩里罕為左右副元帥金始置屯田軍於中原金旣復取河南猶慮中原士民懐貳始創屯田軍凡女直奚契丹之人皆自本部徙居中州與百姓雜處計其户口授以官田使自播種春秋量給其衣若遇出師始給錢米凡屯田之所自燕南至淮隴之北俱有之皆築壘於村落間辛酉十一年金皇統元年春正月金烏珠入壽春府遂渡淮入廬州烏珠自敗後留屯京亳出入許鄭之間簽兩河軍與舊部凡十餘萬以謀再舉及聞秦檜召諸軍還乃攻䧟夀春遂渡淮入廬州而進詔楊沂中帥師赴淮西岳飛進師江州金主初服衮冕二月王徳復和州金烏珠退師昭關德又敗之遂復昭關烏珠自合肥趨歴陽游騎至江張俊議分軍守南岸王徳曰淮者江之蔽也棄淮不守是謂唇亡齒寒也敵數千里逺來餉道决不繼及其未濟急擊之可以奪氣若遲之使少安則淮非吾有矣固請而行即渡采石俊督軍繼之宿於江中徳白明旦當㑹食歴陽已而夜拔和州晨迎俊入烏珠退保昭關㝷復來争和州俊擊敗之既而徳又敗韓常於含山縣東又敗烏珠於昭關復含山及昭關金人來爭徳復敗之詔韓世忠帥師援淮西楊沂中劉錡及金烏珠戰於柘臯大敗之遂復廬州初烏珠攻廬州詔劉錡自太平州援之錡渡江與張俊楊沂中㑹而廬已䧟錡乃與關師古據東關之險以遏敵衝引兵出青溪兩戰皆㨗烏珠以柘臯地坦平利於用騎因駐師錡進兵與烏珠夾石梁河而陣河通巢湖廣二丈錡命曵薪疊橋湏臾而成遣甲士數隊踰橋卧槍而坐㑹夜大雨錡遣人㑹合張俊楊沂中之師翌日沂中王徳田師中張子葢之軍俱至惟俊後期錡與諸將分軍為三並進渡河以擊之師中欲俟俊至徳曰事當機㑹何待宣撫也即與錡上馬先迎敵沂中繼之烏珠以鐡騎十萬分為兩隅夾道而陣徳曰敵右陣堅我當先擊之揮軍渡河首犯其鋒一將被甲躍馬而出徳引弓一發而斃乗勝大呼馳擊諸軍皷噪從之金人以拐子馬兩翼而進徳率衆鏖戰沂中曰敵恃弓矢吾有以屈之使萬人持長斧如墻而進敵遂大敗徳與錡等追之又敗於東山敵望見驚曰此順昌旗幟也即退走保於紫金山是役也失將士九百人金人死者以萬計既而烏珠復親帥兵逆戰於店歩沂中等又敗之乗勝逐北遂復廬州金命致仕官至三品者給半俸金改封道君皇帝為天水郡王淵聖皇帝為天水郡公故遼主延禧為豫王金主親祀孔子戊午金主親祭孔子廟北靣再拜退謂侍臣曰朕幼年游佚不知志學歳月逾邁深以為悔孔子雖無位其道可尊使萬世景仰大凡為善不可不勉自是頗讀尚書論語及五代遼史諸書或以夜繼焉一日宴羣臣於瑶池殿適烏珠遣使奏㨗侍臣多進詩賀金主覽之曰太平之世當尚文物自古致治皆由是也又嘗謂侍臣曰朕觀貞觀政要見其君臣議論大可䂓法韓昉對曰皆由太宗温顔訪問房杜軰竭忠盡誠其書雖簡足以為法金主又曰周成王何如主昉對曰古之賢君金主曰成王雖賢亦周公輔佐之力後世疑周公殺其兄以朕觀之為社稷大計亦不當非也張俊楊沂中劉錡奉詔班師三月金人取濠州俊使沂中救之敗績遂皆帥師還鎮張俊楊沂中劉錡奉詔班師乃棄淮西而歸㑹金人圍濠濠守王進告急俊乃復邀沂中錡㑹於黄連埠同徃援之距濠六十里而濠南城已䧟俊召諸將謀之錡謂沂中曰何以處此沂中曰戰爾錡曰本來救濠今濠已失進無所依人懐歸心勝氣已索此危道也不若退師據險俟其去為後圖諸將皆曰善三帥鼎足而營或言敵兵已去錡謂俊曰敵得城而遽退必有謀也宜嚴兵備之俊不聽且欲自以為功命錡無徃而令沂中與王徳將神勇歩騎六萬直趨濠州列陣未定烟起城中金人伏騎萬餘分兩翼出沂中顧徳曰何如徳曰徳小將安敢預事沂中以䇿麾軍曰那回諸軍以為令其走也遂潰而南無復紀律金人追之死者甚衆韓世忠帥師至城下亦不利而退沂中遂入滁州俊軍自宣化渡江錡時軍藕塘方食俊遽至曰敵兵已近柰何錡曰楊宣撫兵安在俊曰已失利還矣錡謂俊毋恐錡請以歩卒禦之宣撫試觀焉錡麾下皆曰兩大帥軍已渡我軍何苦獨戰錡曰順昌孤城旁無赤子之助吾提兵不滿二萬猶足取勝况今得地利又有銳兵耶遂設三覆以待俄而俊至曰諜者妄也乃戚方殿後之軍耳乃還岳飛帥師救廬州不及遂還舒州飛奏金人舉國南來巢穴必虚若長驅京洛以擣之彼必奔命可坐而弊帝不從飛復恐帝怠於退敵乃奏臣如擣虚勢必得利若以敵方在邇未暇逺圖欲乞親至蘄黄以議攻郤帝乃詔飛㑹師蘄黄飛至廬而城已䧟遂還兵舒州以俟命金烏珠自渦口渡淮北去張俊還師建康劉錡還師太平楊沂中還師臨安夏四月孫近罷以韓世忠張俊為樞宻使岳飛為副使秦檜力主和議恐諸將難制欲盡收其兵權給事中范同獻計於檜請除韓世忠張俊岳飛樞府則兵柄自解檜喜乃宻奏柘臯之㨗召三將赴行在論功行賞於是世忠俊皆入朝飛至獨後檜用王次翁計俟之七日既至遂拜世忠俊樞宻使飛為副使並宣押赴樞府治事而進范同為翰林學士世忠在楚州十餘年兵僅三萬金人不敢犯檜至是以其軍儲錢米百萬緡石歸於國罷三宣撫司以其兵𨽻御前張俊知秦檜欲罷兵首請以所部𨽻御前且力賛和議秦檜深喜之遂罷三宣撫司以其兵𨽻御前遇出師臨時取旨五月置兩淮江東西湖廣京西四道總領軍馬錢糧官自張俊以趙開總領四川財賦掌措置移運應辦諸軍錢糧至是收三大將兵權以其兵分屯諸處乃置三總領所以朝臣為之仍𢃄専一報發御前軍馬文字遂預聞軍政其後鎮江諸軍錢糧淮東掌之鄂州荆南江州諸軍錢糧湖廣掌之建康池州諸軍錢糧淮西掌之與四川總領凡四所而江東西京西二道則廢詔張俊岳飛如楚州巡視邊防俊至楚州以海州城不可守毁之遷其民統韓世忠軍還鎮江惟背嵬一軍赴行在金太師領三省事鄂特本卒鄂特本天㑹初即當國事議禮制度興學選士治厯明時皆鄂特本啓之六月以秦檜為尚書左僕射兼樞宻使罷劉光世兵以為萬壽觀使光世㝷卒光世在諸將中最先進律身不嚴馭軍無法不肯為國任事嘗入對言願竭力以報國他日史官書臣功第一帝曰卿不可徒為空言當見之行事方之韓世忠岳飛不逮逺矣張俊岳飛還自楚州秋七月以范同參知政事罷淮北宣撫判官劉錡錡自順昌之㨗驟貴張俊楊沂中嫉之至是二人言於朝曰淮西之役岳飛不赴援劉錡戰不力秦檜信之遂罷錡兵命知荆南府張俊如鎮江措置軍務八月立祚徳廟於臨安祀晉趙武及程嬰公孫杵臼韓厥也罷知温州王居正居正立朝累與秦檜忤且力辨王安石父子學行之非自兵部侍郎出知温州居正知不為檜所容以目疾請祠杜門言不及時事客至談論經史而已檜猶忌之諷中丞何鑄劾居正為趙鼎汲引欺世盗名奪職奉祠居正之學根据六經楊時噐之出所著三經義解示居正曰吾舉其端子成吾志居正感厲首尾十載為詩書周禮辨學三十九卷與時書同進二書行天下遂不復言王氏學岳飛罷初飛在諸將中年最少以列校拔起累立顯功張俊不能平飛屈已下之幕中輕銳教飛勿苦降意飛不聽及同如楚州俊以韓世忠屢抗論和議忤秦檜意欲與飛分背嵬軍飛義不肯俊弗悅俊又欲修楚州城為備飛曰當戮力以圖恢復豈可為退保計俊變色㑹世忠軍吏景著與總領胡紡言二樞宻若分世忠軍恐至生事紡上之朝檜捕著下大理將以扇摇誣世忠飛馳書告以檜意世忠見帝自明俊於是大憾飛遂倡言飛議棄山陽且宻以飛報世忠事告檜檜大怒先是飛以恢復為己任不肯附和議嘗讀檜奏至徳無常師主善為師之語恚曰君臣大倫根於天性大臣而忍面欺其主耶烏珠遺檜書曰汝朝夕以和請而岳飛方為河北圖必殺飛始可和檜亦以飛不死終梗和議已必及禍故力謀殺之遂諷中丞何鑄侍御史羅汝楫諫議大夫万俟卨等交章論飛奉㫖援淮西至舒蘄而不進及與張俊按兵淮上又欲棄山陽而不守遂罷為萬壽觀使奉朝請九月吳璘復秦州楊政復隴州郭浩復華陜州詔班師遂皆還鎮吳璘拔秦州聞金統軍罕扎與蘇卜實合兵五萬屯劉家圏請於胡世將而擊之世將問䇿安出璘曰有新立疊陣法毎戰以長鎗居前坐不得起次最强弓次强弩跪膝以俟次神臂弓約賊相搏至百歩内則神臂先發七十歩強弓併發次陣如之見陣以拒馬為限鐡鈎相連俟其傷則更代之遇更代則以皷為節騎兩翼以蔽於前陣成而騎退謂之疊陣諸將始猶竊議曰吾軍其殱於此乎璘曰此古束伍令也軍法有之諸君不識耳得車戰餘意無出於此戰士心定則能持滿敵雖銳不能當也時罕扎蘇卜實據險自固前臨峻嶺後控臘家城謂璘必不敢輕犯先一日璘㑹諸將問所以攻姚仲曰戰於山上則勝璘然之及請戰敵皆笑夜半璘遣姚仲王彦銜枚截坡約二將上嶺而後發火二將至嶺寂無人聲軍已畢列萬炬齊發敵駭愕曰吾事敗矣蘇卜實善謀罕扎善戰二將異議璘先以兵挑之罕扎果出鏖戰璘以疊陣法更休迭戰輕裘肥馬亟麾之士殊死鬭金人大敗降者萬人罕扎走保臘家城璘圍而攻之城垂破朝廷方主和議以驛書詔班師時璘㧞秦州其勢方張陜西河東首領爭來附之而楊政拔隴州及破岐下諸屯郭浩復華州入陜州矣詔至璘即自臘家城引兵還河池浩還延安政還鞏胡世將惟浩歎而已莫將還自金詔以劉光逺為金國通問使烏珠欲議和縱莫將南還以道意秦檜請遣光逺徃冬十月金人入楚泗州劉光逺還自金詔以魏良臣為金國稟議使烏珠遣光逺還要重使㑹議秦檜奏遣良臣徃下萬壽觀使岳飛於大理獄秦檜必欲殺飛乃與張俊謀宻誘飛部曲能告飛事者優以重賞卒無應者俊聞飛甞欲斬統制王貴又嘗杖之乃誘貴告飛貴不肯曰為大將寧免以賞罰用人茍以為怨將不勝其怨俊因劫以私事貴懼而從之檜又聞飛統制王俊善告訐號鵰兒以姦貪屢為張憲所抑使人諭之王俊即許諾於是檜俊謀以張憲王貴王俊皆飛部將使其徒自相攻發因以及飛父子庶帝不疑俊時在鎮江乃自為狀付王俊妄言副都統制張憲謀據襄陽還飛兵柄令告王貴使貴執憲赴鎭江行樞宻府鞫之憲未至俊預為獄以待之屬吏王應求白俊以為樞院無推勘法俊不聽親行鞫鍊使憲自誣謂得飛子雲手書命憲營還兵計憲被掠無完膚竟不伏俊手自具獄成告檜械憲至行在下大理寺獄檜奏召飛父子證憲事帝曰刑所以止亂勿妄追證動摇人心檜矯詔遣使召飛父子使者至飛第飛笑曰皇天后土可表此心遂與雲就大理獄檜命中丞何鑄大理卿周三畏鞫之鑄引飛至庭詰其反狀飛裂裳以背示鑄有舊湼盡忠報國四大字深入膚理既而閱實俱無驗鑄察其寃白之檜檜曰此上意也鑄曰鑄豈區區為一岳飛者彊敵未滅無故戮一大將失士卒心非社稷之長計檜語塞乃改命諌議大夫万俟卨卨素與飛有怨遂誣飛令于鵬孫革致書張憲王貴令虚申探報以動朝廷雲與憲書令措置使飛還軍且云其書已焚飛坐繫兩月無可證者或教卨以臺章所指淮西逗遛事為言卨喜白檜簿録飛家取所賜御札與徃來道塗日月皆可考乃収其御札送官藏之以滅迹卨又使于鵬孫革等證飛受詔逗遛命評事元龜年取行軍時日雜定之傅㑹其獄大理卿薛仁輔寺丞李若樸何彦猷皆言飛無辜判宗正寺士㒟請以百口保飛無它且曰中原未靖禍及忠義是忘二聖不欲復中原也皆不聽韓世忠心不平詣檜詰其實檜曰飛子雲與張憲書雖不明其事體莫須有世忠曰莫須有三字何以服天下韓世忠罷世忠深以和議為不然及魏良臣使金世忠諌曰中原士民淪於死亡其間豪傑莫不延頸以俟弔民伐罪之師自此與和日月侵㝷人情銷弱國勢委靡誰復振之北使之來乞與面議復抗䟽言秦檜誤國之罪檜諷言官論之帝不聽而世忠連䟽乞罷遂罷為醴泉觀使封福國公尋進封咸安郡王世忠自是杜門謝客絶口不言兵時跨驢擕酒從一二奚童縱游西湖以自樂澹然自如若未嘗有權位者平時將佐罕得見其靣十餘年而卒世忠性戇直勇敢忠義事關廟社必流涕極言與秦檜同在政府一揖之外未嘗與談嗜義輕財持軍嚴整與士卒同甘苦器仗䂓畫莫不精絶金人取濠州邵隆復商虢陜州十一月范同罷秦檜惡之也安置提舉洞霄宫李光於藤州秦檜忌光諷中丞万俟卨論光隂懐怨望與孫近朋比也魏良臣及金蕭毅來烏珠以蕭毅邢具瞻為審議使與良臣偕來議以淮水為界求割唐鄧二州歳幣銀絹各二十五萬及金平畫淮水中流為疆以唐鄧二州畀之蕭毅入見帝悉從其所請命宰執及議誓撰文官告祭天地宗廟社稷立盟書約以淮水中流為疆割唐鄧二州畀之休兵息民各守境土詔川陜宣撫司毋出兵生事招納叛亡以何鑄僉書樞宻院事充金國報謝進誓表使表略曰臣構言今來畫疆合以淮水中流為界西有唐鄧州割屬上國自鄧州西四十里并南四十里為界屬鄧州其四十里外並西南盡屬光化軍為弊邑沿邊州城既蒙恩造許備藩方世世子孫謹守臣節每年皇帝生辰并正旦遣使稱賀不絶歳貢銀絹二十五萬兩匹自壬戍年為首每春季差人般送至泗州交納有渝此盟明神是殛墜命亡氏踣其國家臣今既進誓表伏望上國早降誓詔庻使弊邑永有慿焉鑄至汴見烏珠遂如㑹寧詔周聿莫將鄭剛中分畫京西唐鄧陜西地界以畀金人金既與宋畫界其壤地東極濟喇敏呼爾哈諸野人之境北自扶餘路之北三千餘里和囉和屯穆昆地為邊右旋入秦州富勒呼所浚界壕而西經臨潢金山跨慶桓撫昌净州之北出天山外包東勝接西夏踰黄河復西歴葭州及米脂寨出臨洮府㑹州積石之外與生𦍑相錯復自積石諸山之南左折而東逾洮州越鹽州堡循渭至大散關北並山入京兆絡商州南以唐鄧州西南四十里取淮之中流與宋為界凡十九路散府九節鎮三十六防禦郡二十二刺史郡七十三軍十有六縣六百三十二建五京置十四總管府亦云盛矣宋既失中原陜右於金東畫長淮西割商秦之半以大散關為界其所存者兩浙兩淮江東西湖南北四蜀福建廣東西十五路而京西南路止有襄陽一府陜西路止有階成和鳯四州凡有府州軍監一百八十五縣七百三其羈縻之州不預焉秦檜殺萬壽觀使岳飛於大理寺獄歳已暮而飛獄不成一日秦檜手書小紙付獄即報飛死矣年三十九雲與張憲皆棄於市于鵬等從坐者六人籍飛家貲徙之嶺南於是薛仁輔李若樸何彦猷皆被黜布衣劉元升上書訟飛寃下大理獄死凡傅成其獄者皆進秩洪皓在金以蠟書奏言金人所畏服者惟飛至以父呼之及聞其死諸將酌酒相賀云飛事親孝家無姬侍吳玠素服飛願與交驩乃飾名姝遺之飛曰主上宵旰豈大將安樂時耶却不受玠益敬服帝欲為飛營第飛辭曰金人未滅何以家為或問天下何時太平飛曰文臣不愛錢武臣不惜死天下太平矣卒有取民麻一縷以束芻者立斬以徇卒夜宿民開門願納無敢入者軍號凍死不折屋餓死不鹵掠卒有疾飛躬為調藥諸將逺戍飛遣妻問勞其家死事者哭之而育其孤或以子婚其女凡有頒犒均給軍吏秋毫不私善以少擊衆欲有所舉盡召諸統制與謀謀定而後戰故有勝無敗猝遇敵不動故敵為之語曰撼山易撼岳家軍難張俊嘗問用兵之術飛曰仁信智勇嚴闕一不可飛好賢禮士覧經史雅歌投壺恂恂如書生毎辭官必曰將士効力飛何功之有然忠憤激烈議論持正不挫於人卒以此得禍葢飛與檜勢不並存者也壬戍十二年金皇統二年西遼仁宗夷列紹興元年春正月張俊還自鎮江金衍聖公孔璠卒子拯嗣二月進封建國公瑗為普安郡王何鑄還自金初蕭毅至行在帝曰朕有天下而養不及親徽宗無及矣今立信誓明言歸我太后朕不耻和不然朕不憚用兵及何鑄徃使帝召至内殿諭之曰朕北望庭闈無淚可揮卿見金主當曰慈親之在上國一老人耳在本國則所繫甚重以至誠說之庻彼有感鑄至金首以太后為請金主曰先朝業已如此豈可輙改曹勛再三懇請金主乃許之遂遣鑄還許歸徽宗之䘮及帝母韋氏金改封劉豫為曹王三月放判大宗正寺齊安郡王士㒟於建州以其救岳飛秦檜惡之也四川宣撫副使胡世將卒夏四月䇿進士於射殿賜陳誠之秦熺等及第秦檜無子取妻兄王煥孽子熺養之至是進士南省擢為第一檜以為嫌故以誠之為首而熺次之誠之之䇿專主和議云以孟忠厚為迎䕶梓宫禮儀使王次翁為奉迎兩宫禮儀使金使劉筈來金遣左宣徽使劉筈以衮冕圭冊冊帝為大宋皇帝且許歸徽宗及鄭后邢后之䘮與帝母韋氏金主立其子濟安為太子金自太宗及金主皆自安班貝勒即帝位至是始正名位定制度焉脩臨安府學為太學五月以鄭剛中為川陜宣撫副使置司利州沈昭逺如金賀金主生辰也初置𣙜場於盱眙其後又置於光州棗陽安豐軍金亦置場於沿邊州郡金主燕羣臣於五雲樓金主自去年荒於酒諌者輙飲以酒曰知卿等意明日當戒然未嘗止也至是燕羣臣於五雲樓盡醉乃罷六月安置提舉臨安府洞霄宫王庻於道州秦檜意也以吳璘為階成岷鳯四州經畧使秋七月竄福州判官胡銓於新州秦檜諷司諫羅汝楫論銓飾非横議故竄同郡王廷珪以詩贈行坐流辰州以死八月何鑄罷秦檜以鑄不傅㑹岳飛之獄怨之諷万俟卨論其過欲竄諸嶺表帝不許遂出知徽州以万俟卨參知政事充金國報謝使皇太后韋氏至自金居於慈寧宫后有智慮初聞金人許還三梓宫后恐其反覆呼役者畢集然後起櫕時方暑金人憚行后慮有他變乃陽稱疾湏秋凉進發已而稱貸於金使得黄金三千兩以犒其衆由是途中無虞鄭剛中以商秦之半畀金人棄方山和尚二原以大散關為界徽宗皇帝顯肅皇后鄭氏及懿節皇后邢氏之䘮至自金帝易緦服奉安於龍徳别宫九月以孟忠厚為樞宻使充攅宫總䕶使大赦加秦檜太師封魏國公以和好成也以王次翁充金國報謝使以郭浩為金房開逹四州經畧安撫使楊愿如金始賀正旦也金置𣙜場於夀鄧州鳯翔府冬十月葬徽宗及顯肅皇后於永固陵以懿節皇后祔之尋改曰永祐以程克俊僉書樞宻院事進封秦檜為秦魏兩國公辭不拜以太后回鑾推恩也檜以封兩國與蔡京同故辭十一月貶何鑄為祕書少監以其援岳飛也張俊有罪免初俊賛秦檜成和議約盡罷諸將獨以兵權歸俊及諸將已罷和議已定而俊居位無求去之意檜諷臺臣江邈論之俊乃求去遂以靜江寧武靜海軍節度使充醴泉觀使進封清河郡王奉朝請十餘年而卒俊握兵最早屢立戰功帝於諸將中眷注特厚然忌劉錡附秦檜殺岳飛為世所鄙薄徽猷閣待制致仕尹焞卒焞質直𢎞毅實體力行程頤嘗以魯許之且曰我死而不失其正者尹氏子也詔祕書少監秦熺脩建炎以來日厯秦檜自知不為士論所與乃乞以子熺領國史自檜再相凡詔書章䟽稍及檜者率更易焚棄因以太后北還為己功自頌其事使著作郎王楊英周執羔上之孟忠厚罷忠厚始以外戚貴顯然能避權勢不以私干朝廷秦檜忠厚之僚婿也未嘗親附世以此重之至是山陵畢檜諷臺諫引故事外戚不預政罷之十二月金太子濟安卒西遼感天后蕭氏卒子伊立立籍民十八歳以上者得八萬四千五百癸亥十三年金皇統三年春二月作景靈宫於臨安初東京奉先之制太廟以奉神主歳五享之宗室諸王行事朔祭而月薦新則太常卿行事景靈宫以奉塑像歳四孟皇帝親享帝后大忌則宰相率百官行香后妃繼之遇郊祀明堂大禮則先期二日帝親詣景靈宫行朝享禮至是羣臣乞擇爽塏之地倣景靈宫舊䂓隨宜建置俟告成有日迎還晬容奉安新廟庻幾四孟躬行獻禮用副罔極之思帝從之乃築三殿聖祖居前宣祖至諸帝居中元天大聖后與諸后居後殿凡上元寒食七夕及帝后忌辰用道釋作法事三月築太社太稷壇築圜丘夏四月頒郷飲酒儀於諸州閏月立貴妃吳氏為皇后后開封人年十四選入王邸帝既即位后嘗以戎服侍左右習書史善翰墨寵遇日隆累進貴妃帝憐邢后在金虚中宫以待其還至是秦檜累表請立后皇太后亦以為言帝從之王次翁罷時秦檜當國凡居政府者莫不以微忤斥始終不貳於檜者惟次翁一人而已五月金初立太廟社稷六月程克俊罷秋八月行人洪皓張邵朱弁還自金自建炎以來奉使如金被拘囚者三十餘人至是以和議成許使人還餘皆物故惟三人得歸已而金人懼為已患遣人追之七騎及淮而皓等已在舟中矣皓居冷山距㑹寜二百里地苦寒穴居百餘家陳王烏舍聚落也烏舎敬皓使教其子或二年不給食嘗大雪薪盡以馬矢然火煨麵食之或獻取蜀䇿烏舎持以問皓皓力折之烏舎銳意南侵曰孰謂海大我力可乾但不能使天地相拍耳皓復辯之烏舍怒曰汝作和事官而口硬如此謂我不能殺汝耶皓曰自分當死顧大國無受殺行人之名願投之水以墜淵為辭可也烏舍義之而止和議將成烏舍問所議十事皓條析甚至烏舍曰汝性直不誑我乃與如燕及烏珠殺烏舎黨與皆死獨皓與異議得免屢因諜者宻奏敵情且力言和議非計乞興師進擊每遇貴族名家子姓流落於北者盡力拯救之嘗求得韋太后書遣李微持歸帝大喜曰朕不知太后寧否幾二十年雖遣使百軰不如此一書初宇文虚中薦皓於金主欲以為翰林直學士皓力辭因欲逃歸請於韓昉乞就真定大名居止以自養昉知其情乃以為中京留守判官皓迄不就職留金十五年而還入對内殿求郡飬母帝曰卿忠貫日月志不忘君雖蘇武不能過豈可捨朕去耶皓退見秦檜語連日不止曰張和公金人所憚乃不得用錢塘暫居而景靈宫太廟皆極土木之華豈非示無中原意乎檜不懌謂皓子适曰尊公信有忠節得上眷但官職如讀書速則易終而無味湏如黄鍾大吕乃可遂除皓徽猷閣直學士提舉萬壽觀復以論事忤檜出知饒州邵被囚於柞山踰年達蘭送於劉豫使用之邵見豫長揖而已又呼豫為殿院責以君臣大義詞氣俱厲豫怒械於獄久之復送於金枸之燕山僧寺從者皆莫知所之邵又以書言於金曰劉豫挾大國之勢日夜南侵不勝則首䑕兩端勝則如養鷹飽則颺去終非大國之利金人徙之㑹寧及還入見除祕閣修撰主管佑神觀司諌詹大方論其使事無成改台州崇道觀弁副王倫使金既就館守之以兵紹興二年金遣宇文虚中至雲中言和議可成當遣一人詣元帥府受書還虚中欲弁與倫探䇿决去留弁曰吾來固自分必死豈應今日覬幸先歸願正使受書歸報天子成兩國之好蚤申四海之養於兩宫則吾雖暴骨外國猶生之年也倫將歸弁謂曰古之使者有節以為信今無節有印印亦信也願留之使弁得抱以死死不腐矣倫觧以授弁弁受而懐之卧起與俱金人迫弁仕劉豫且訹之曰此南歸之漸弁曰豫汝國賊吾嘗恨不食其肉又忍北靣臣之吾有死爾金人怒絶其餼遺以困之弁固拒驛門忍饑待盡誓不為屈金人感動致禮如初久之復欲易其官弁曰自古兵交使在其間言可從從之不可從則囚之殺之何必易其官吾官受之本朝有死而已誓不易以辱吾君也且移書於耶律紹文曰上國之威命朝以至則夕以死夕以至則朝以死又以書訣洪皓曰殺行人非細事吾曹遭之命也要當舍生以全義耳乃具酒召被掠士夫飲半酣語之曰已得近郊某寺地一旦畢命報國諸公幸瘞我其處題其上曰有宋通問副使朱公之墓於我幸矣衆皆泣下莫能仰視弁談笑自若曰此臣子之常諸君何悲也及尼瑪哈死弁宻䟽金國虚實曰此不可失之時也遣李發間行歸報王倫還以弁奉送徽宗大行之文為獻其辭有曰歎馬角之未生䰟消雪窖攀龍髯而莫逮淚灑氷天帝讀之感泣官其親屬五人謂丞相張浚曰弁歸日當以禁林處之及還入見便殿弁謝且曰陛下與金人講和上返梓宫次迎太母又其次則憐赤子之無辜此皆知時知幾之明然時運而徃或難固執幾動有變宜鑑未兆盟可守而詭詐之心宜嘿以待之兵可息而銷弭之術宜詳以講之金人以黷武為至徳以茍安為太平虐民而不恤民廣地而不廣徳此皆天助中興之勢若時與幾陛下既知於始願圖厥終帝曰善弁以金國所得六朝御容及宣和御書畫為獻秦檜惡其言敵情奏以初補官易宣教郎直祕閣而卒遣江邈奉迎累朝神御於温州九月宗室左朝奉大夫子偁卒詔普安郡王瑗解官持服冬十月奉安累朝神御於景靈宫十一月有事於圜丘赦十二月癸未朔日食不見金使完顔曄來賀正旦也初營田於關外建祕書省求遺書通鑑續編卷十六
