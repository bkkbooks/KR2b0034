body:
  text: 通鑑續編卷五元陳桱撰戊戌真宗皇帝咸平元年契丹統和十六年春正月有星孛于營室詔求直言甲申彗出營室北吕端言彗出之應當在齊魯分帝曰朕以天下為憂豈直一方邪甲午詔求直言避殿減膳釋杖罪以下之囚丁酉彗滅三月詔知貢舉官親屬别試于有司夏四月遣使按吏民逋負于天下悉除之於是除逋欠一千餘萬釋囚三千餘人始用三司判官王欽若之言也五月戊午朔日有食之冬十月丙戌朔日有食之吕端李至溫仲舒夏侯嶠罷端器量寬恕知大體帝深重之每見其入對肅然拱揖不以名呼又以端姿儀瓌大宫庭陛峻特令梓人為納陛焉以疾罷相以張齊賢李沆平章事向敏中參知政事楊礪宋湜為樞密副使齊賢慷慨有大略每以致君為志嘗從容為言皇王之道而推本其所以然且云臣受陛下非常恩故以非常報帝曰朕以為皇王之道非有迹但庶事適治道則近之矣帝嘗問沆以治道所宜先沆對曰不用浮薄新進喜事之人此最為先帝問其人沆對曰如梅詢曽致堯輩是矣帝又語及唐人樹黨遂使王室微弱蓋姦邪難辨耳沆對曰佞言似忠姦言似信至如盧杞蒙蔽德宗李勉以為真姦邪是也帝曰姦邪之迹雖曰難辨久之自敗帝一夕遣使持手詔欲以劉美人為貴妃沆對使者引燭焚詔附奏曰但道臣沆以為不可其議遂寢帝嘗以沆無密奏謂之曰人皆有密啓卿獨無何也對曰臣待罪宰相公事則公言之何用密啓夫人臣有密啓者非讒即佞臣常惡之豈可效尤十一月契丹册王誦為髙麗國王契丹裕恱耶律休格卒休格智略宏逺料敵如神每戰勝讓功諸將故士卒樂為之用身更百戰未嘗殺一無辜鎮燕十有七年省賦役恤孤寡戒戍兵無犯宋境雖馬牛逸于北者悉還之逺近向化邊境以寧己亥二年契丹統和十七年夏六月曹彬卒彬疾帝臨問因詢以契丹事宜彬對曰太祖英武定天下猶委經營和好帝曰此事朕當屈節為天下蒼生然須執綱紀存大體即久逺之利也又問以後事對曰臣無事可言臣子璨瑋材器可取臣若內舉皆堪為將帝問其優劣對曰璨不如瑋及薨帝哭之彬性仁敏和厚在朝廷未嘗言人過失伐蜀唐秋毫無所取位兼將相不以等威自異遇士大夫於途必引車避之不名下吏每白事必冠而後見居官奉入給宗族無餘積平蜀還太祖從容問官吏善否彬曰軍政之外非臣所聞也君子謂仁恕清慎能保功名守法度彬為宋良將第一秋七月初給外任官職田以官莊逺年逃田充之以王顯為樞密使以楊徽之夏侯嶠吕文仲為翰林侍讀學士邢昺為翰林侍講學士初置侍讀學士侍講學士也尋詔昺與杜鎬舒雅孫奭李慕清崔渥佺等校定周禮儀禮孝經論語爾雅公羊穀梁春秋傳八月楊礪卒礪卒帝謂侍臣曰礪介直清苦何遽亡也即冒雨臨其喪礪居委巷中車駕不能入帝為步進九月契丹樞密使耶律色珍卒色珍有經國材明敏忠慎國人重之冬十月契丹主侵瀛州康昭裔宋順死之十一月帝自將禦契丹十二月次于大名府契丹主大舉南伐十月次瀛州與宋師戰康昭裔宋順皆敗死喪失器械無算遂次遂城臨水列陳以待宋師遂城城小無備衆情危懼守將楊延昭業子也集衆登陴固守以俟援至會大寒汲水灌城上旦悉為氷堅滑不可上契丹兵不能登乃引去掠祁趙邢洺州時鎮定髙陽關行營都部署傅潛擁步騎八萬屯中山畏懦不進閉營自守將校請戰者則醜言詈之朝廷間道遣使督潛出兵合擊潛不聽范廷召忿因詬潛曰公恇怯乃不如一嫗爾鈐轄張昭允又屢勸之潛不得已乃分騎八千付廷召等令逆擊于髙陽關仍許出師為援十一月帝親禦之戊午次澶州以王超等督先鋒示以戰圖甲子次大名府躬御鎧甲於中軍契丹攻威虜軍不克庚子三年契丹統和十八年春正月帝在大名府契丹主侵河間康保裔死之契丹師還范廷召追敗之于莫州范廷召等與契丹兵力戰而傅潛援師不至契丹掠德棣渡河湊淄齊諸將告急于潛潛不遣兵而抑有功者不以聞帝知之大怒詔并代都部署髙瓊等分屯冀邢州而召潛還流之房州以葛霸代其任既而契丹犯河間髙陽關副都部署康保裔與戰敗死契丹知帝親征乃引還范廷召追敗之宋湜卒于師帝至自大名益州戍卒作亂奉王均為帥都巡檢使劉紹榮死之知州牛冕棄城走均遂陷漢州以雷有終為川峽招安使帥師討之初神衛卒戍益州以都虞侯王均董福分二指揮以領之福御衆有法部下皆優足均縱其下飲博軍裝亦以給費及帝幸河朔兵馬鈐轄符昭夀與知益州牛冕大閲于東郊蜀人趨觀之二軍衣服鮮弊不等均衆由是慚憤益州知州與鈐轄二廨並禁旅為牙隊嵗除冕以酒肴犒部士而昭夀驕恣侵虐軍士怨之冕亦寬弛無政衆心不附正月朔旦神衛卒趙延順等八人為亂遂殺昭夀是日益州官吏方賀正旦聞變皆奔竄冕與轉運使張適縋城而去惟都巡檢使劉紹榮冒刃格鬭衆寡不敵莫能成功叛卒尚未有主欲奉紹榮紹榮攝弓矢罵曰我本燕人棄鄉土歸本朝豈能與爾等同逆可亟見殺我終不負朝廷也衆未敢動監軍王澤與都虞侯王均適至乃謂均曰汝所部為亂盍自往招安均既往叛卒即擁之為主紹榮自經死均遂僭號大蜀改元化順署置官稱設貢舉以張鍇為謀主三日均率衆攻陷漢州進寇綿州不下趨劎州為知州李士衡所敗還保益州朝廷聞之以户部使雷有終為川峽招安捉賊使李惠石普李守倫並為招安巡儉使給步騎八千往招討之上官正李繼昌髙繼勳王阮孫正辭等皆𨽻焉知蜀州楊懷忠會師討益州懷忠聞王均作亂即調鄉丁會十一路巡檢兵討之乙卯懷忠入益州焚城北門至三井橋與均黨魯麻胡戰自晨至晡凡數合懷忠不利而退乞師于嘉眉等七州二月懷忠合諸州兵復攻益州敗之乘勝逐賊至州南十五里寨于雞鳴原以俟王師均亦閉城東門以自固二月王顯罷以周瑩玉繼英知樞密院事王旦同知院事雷有終敗績于益州有終等至益州令石普先復漢州進壁升仙橋賊出攻寨有終擊走之丁卯均開城偽遁有終與上官正石普帥兵徑入因分剽民財部伍不肅賊閉關發伏布牀榻于路口官軍不得出因為所殺有終等緣堞而墜得免李惠死焉官軍退保漢州益州城中民皆奔迸四出復為賊黨分騎追殺或囚縶之支解族誅以恐衆又脅四民之少壯者為兵先刺手背次髠首次黥面給軍裝令乘城與舊賊黨相間有終署榜招之至則署其衣袂釋焉日數百人宴羣臣于後苑二月晦宴羣臣賞花習射于苑中帝作仲春賞花釣魚詩儒臣皆賦盡歡而罷自是設宴賦詩遂為永制三月戊寅朔日有食之䇿貢士于崇政殿擢第者千八百餘人其間有晉天福中隨計者較藝之詳推恩之廣未之有也帝連三日臨軒初無倦色以梁鼎制置陜西青白鹽事初解州池鹽通商販易鼎請官自鬻朝廷是其議故用之鼎至解池禁止商販官運赴鄜延環慶等州公私大擾冬十月雷有終入益州王均走死四月賊由升仙橋分路攻王師有終帥兵逆擊大敗之均單騎還城遂撤橋塞門王師進至清逺江為梁而渡有終與石普屯於城北分遣將校攻城三面賊出戰屢敗然王師每薄城輒會雨城滑不能上有終命為洞屋以進均亦對設敵樓以相拒有終遣卒焚樓賊由是消沮九月均復築月城以自固有終令卒蒙氊秉燧以火悉焚其望櫓機石先遣東西南三寨鼓譟齊進攻之有終普分主洞屋而前遂入城大敗之均夜與其黨二萬餘南出萬里橋門突圍而遁有終疑有伏遣人縱火城中詰朝執嘗受偽署者數百人悉焚殺之時謂寃酷均既走度合水尾由廣都略陵榮趨富順監所過斷橋塞路焚倉庫而去有終遣楊懷忠追之十月均至富順其將校以筏渡江趨戎瀘蠻境懷忠及之大敗其衆因張旗鳴鼙入城均方在監署中與蠻酋飲其黨多醉不能枝梧均乃縊死懷忠取均首及僭偽法物旗旌甲馬甚衆禽其黨六千餘人逆徒殲焉均本戇愚嘗言官軍若至我當先路出迎自陳被脅之狀張鍇聞之擇軍中子弟署寄班以防守均令不得與人接見官軍至均不與聞自事起至敗所守止一城而已詔進有終懷忠等秩而流牛冕及張適於儋連州以翰林學士王欽若知制誥梁皓往安撫之十一月張齊賢免齊賢與李沆不相得日南至帝御朝元殿受朝而齊賢被酒失儀遂坐免辛丑四年契丹統和十九年春二月詔羣臣子弟補京官者試一經詔舉賢良方正直言敢諫者分川峽為益利梓夔州四路以吕蒙正向敏中平章事行儀天厯司天少監史序所撰也王化基罷以王旦參知政事馮拯陳堯叟同知樞密院事初旦為翰林學士嘗奏事退帝目送之曰為朕致太平者必此人也由是決意用之夏四月回鶻來貢回鶻可汗祿勝貢玉勒鞍名馬寶器願以兵助討李繼遷以王欽若參知政事五月以大同軍留後桑贊領河西軍節度使六月汰冗吏天下凡汰冗吏十九萬五千八百二人選曹為清詔賜九經于州縣學校及聚徒講誦之所契丹主册其后蕭氏為齊天皇后秋九月趙保吉陷清逺軍保吉復擾邊麟府副部署曹璨邀其輜重于栁撥川殺獲甚衆九月保吉復攻破定州懷逺縣及堡靜永州清逺軍保吉勢益張大冬十月契丹主侵遂城王顯敗之契丹主南伐朝廷聞之以王顯為鎮定髙陽關三路都部署王超副之十月甲寅契丹主至遂城顯與戰大敗之戮二萬餘人契丹主進次滿城而還以西涼府六谷首領潘羅支為靈州西面都巡檢使知鎮戎軍李繼和言潘羅支願戮力討李繼遷請授以刺史仍給廪祿經略使張齊賢又請封為六谷王兼招討使帝以問宰相皆曰羅支已為酋帥授刺史太輕未領節鎮加王爵非順招討使號不可假外夷乃授都巡檢使會西涼使至言六谷分左右廂左廂副使折逋遊龍鉢實參潘羅支軍事宜授以官乃以遊龍鉢領宥州刺史壬寅五年契丹統和二十年春三月趙保吉陷靈州知州裴濟死之保吉大集蕃部攻陷靈州以為西平府而居之知州裴濟死焉初保吉兵衆日盛有圖朔方之意朝廷困於飛挽中外咸以為靈州乃必爭之地茍失之則緣邊諸郡皆不可保帝惑之李沆曰繼遷未死靈州非朝廷有也莫若遣使密召州將使部分軍民空壘而歸如此則關右之民息肩矣帝不從及城陷始悔之夏六月趙保吉寇麟州知州衛居實大敗之周瑩罷秋七月甲午朔日有食之九月召終南山隱士种放為左司諫直昭文館咸平初放母卒帝詔賜以粟帛緡錢四年張齊賢言放隱居三十年孝行純至可厲風俗簡朴退靜無謝古人帝遣召之放不起齊賢復以為言下詔褒美遣使召之放辭不允乃詣京師九月戊申對于崇政殿賜坐與語詢以民政邊事放對曰明王之治愛民而已惟徐而化之餘皆不對即日授左司諫直昭文館放固讓不許賜緋衣銀魚犀帶象簡昭慶坊第宅一區加帷帳什物銀器五百兩錢三十萬御製五言詩寵之時召對焉明年固請還山許之遷起居舍人命館閣官宴餞于瓊林苑帝賜詩三章放既還帝遣使撫問圖其林泉居處趣令入覲以曹宗夀為歸義軍節度使沙州大將曹宗夀殺其節度使曹延祿自知留後遣使入貢方物詔授宗夀本軍節度使冬十月向敏中免薛居正之子惟吉既死其孫安上不肖有詔不許貿易居第敏中違詔質之會惟吉妻柴氏以已無所出而早寡盡攜其貨産欲改適張齊賢安上訴其事柴遂誣敏中嘗求娶已不許以是隂芘安上帝以問敏中敏中言臣近喪妻不復議昏未嘗求娶柴氏帝置不問柴又伐登聞鼓訟之遂下御史臺按問因併得敏中質宅之狀時鹽鐵使王嗣宗忌敏中會入對上言敏中議娶王承衍女弟密約已定但未納采耳帝詢諸王氏得其實以敏中前言為妄罷知永興軍而右僕射判永興軍張齊賢亦坐柴事責授太常卿分司于洛癸卯六年契丹統和二十一年春二月加潘羅支朔方節度使羅支遣蕃官吳福聖臘來貢表言感朝廷恩信憤繼遷倔強已集騎兵六萬乞會王師收復靈州帝曰繼遷常在地斤三山之東每來寇邊及官軍出則已遁去使六谷部族近塞捍禦與官軍合亦國家之利也詔許之故有是命夏四月趙保吉寇洪德寨蕃將慶香敗之王繼忠及契丹耶律諾衮戰于望都敗績契丹執繼忠以歸契丹遣南府宰相耶律諾衮南京統軍使蕭達林南伐至定州之望都髙陽關副都部署王繼忠與大將王超桑贊等帥兵赴之至康村與諾衮等戰自日昳至乙夜敵勢少却遲明復戰繼忠陳東偏為敵所乘斷餉道超贊皆畏縮退師繼忠獨與麾下躍馬馳赴服飾稍異契丹識之圍數十重士皆殊死戰且戰且行旁西山而北至白城力不能支遂就擒見契丹主于炭山蕭太后知繼忠才賢授户部使繼忠因言南北通好之利契丹主然之復以張詠知益州帝以詠前在蜀治政優異復自永興徙知益州詠剛方自任威惠並行政績益著下詔褒美且令巡撫使謝濤傳旨諭詠曰得卿在蜀朕無西顧之憂矣趙保吉陷西涼府丁惟清死之潘羅支會蕃部救西涼五月保吉敗死子德明嗣保吉攻西涼陷之知府丁惟清沒焉潘羅支集六谷蕃部合擊保吉保吉為流矢所中自度孤危且死屬其子德明必歸宋曰一表不聽則再請雖纍百表不得請勿止也遂死年四十二德明嗣位年二十三矣尊保吉曰應運法天神智仁聖至道廣德光孝皇帝墓號裕陵遣使告哀于契丹契丹贈繼遷尚書令環慶邊臣以德明初立乞降詔撫之帝乃賜德明詔令審圖去就知鎮戎軍曹瑋上言繼遷擅河南地二十年兵不解甲使中國有西顧之憂今其國危子弱不即捕滅後更強盛不可制矣願假臣精兵出其不意擒德明送闕下復河西為郡縣此其時也帝欲以恩致德明不報以寇準為三司使陳恕罷恕久領三司帝初即位常命條具中外錢穀以聞恕久不進屢詔趣之恕對曰陛下富於春秋若知府庫充實恐生侈心是以不敢進也帝嘉之至是以疾固求館殿之職帝曰卿求一人可代者聽卿去耳恕薦準焉準檢尋恕前後改革興立之事類以為册及其所出榜别用新板躬至恕第請判押恕亦不讓一一押之自是計使無不循其舊貫恕精于吏理深刻少恩人不敢干以私掌利柄十餘年強力幹事胥吏畏服秋九月吕蒙正罷蒙正以疾力辭乃拜太子太師萊國公宋自有天下三居相位者蒙正趙普耳侍御史田錫卒錫居諫署盡言不諱封疏五十二奏悉焚之曰直諫臣職也豈可藏副以賣直邪及卒帝惻然曰田錫直臣也天何奪之速耶除天下逋租蠲物八萬三千釋繫囚四千二百六人甲辰景德元年契丹統和二十二年春三月白王太后李氏崩夏六月宥罪侯趙保忠卒秋七月李沆卒時西北用兵或至旰食參知政事王旦歎曰我輩安得坐致太平優遊無事邪沆曰少有憂勤足為警戒他日四方寧謐朝廷未必無事旦以為不然沆又日取四方水旱盜賊奏之旦以為細事不足煩帝聽沆曰人主少年當使知四方艱難不然血氣方剛不留意於聲色犬馬則土木甲兵禱祠之事作矣吾老不及見此參政他日之憂也丁謂與寇準善準屢以謂才薦于沆沆不用準問之沆曰顧其為人可使之在人上乎凖曰如謂者相公終能抑之使在人下乎沆笑曰他日後悔當思吾言沆又嘗言居重位實無補惟中外所陳利害一切報罷之此少以報國爾朝廷防制纖悉備具或徇所陳請行一事即所傷多矣陸象先所謂庸人耰之是已憸人茍一時之進豈念厲民邪沆常讀論語或問之沆曰沆為宰相如論語中節用而愛人使民以時尚未能行聖人之言終身誦之可也及薨帝驚慟謂左右曰沆為大臣忠良純厚終始如一豈意不享遐夀邪沆性直諒內行修謹居位慎密不求聲譽遵法度識大體人莫能干以私公退終日危坐未嘗跛倚治第封丘門內廳事前僅容旋馬或言其太隘沆笑曰居第當傳子孫此為宰相廳事誠隘為大祝奉禮廳事則已寬矣以畢士安參知政事契丹册李德昭為西平王德昭即德明也趙保吉故黨戕潘羅支于者龍族李繼遷既死其黨迷般囑及日逋吉羅丹二部亡歸者龍族欲隂圖潘羅支以復讎乃會部人攻者龍者龍族人多降之潘羅支聞者龍族急率百餘騎赴援二族與者龍降人定謀戕之于帳六谷諸豪共立潘羅支之弟厮鐸督為首領八月以畢士安寇準平章事王繼英為樞密使馮拯陳堯叟僉書樞密院事初畢士安既拜參知政事入謝帝曰未也行且相卿士安頓首帝曰朕倚卿以輔相豈特今日然時方多事求與卿同進者其誰可對曰宰相者必有其器乃可居其位臣駑朽實不足以勝任三司使寇準兼資忠義善斷大事宰相才也帝曰聞其好剛使氣對曰準方正慷慨有大節忘身徇國秉道疾邪此其素所蓄積朝臣罕出其右者第不為流俗所喜今天下之民雖蒙休德涵養安逸而西北跳梁為邊境患若準者正所宜用也帝曰然當藉卿宿德鎮之準既相疾惡守正小人日思所以傾之士安每為申辨帝始不疑閏九月契丹主侵定州遂次于望都契丹主奉其太后南下命統軍使蕭達林攻威虜順安軍北平寨保州皆不利乃與契丹主合衆攻定州王超拒于唐河契丹遂駐師陽城淀號二十萬然每與宋師遇戰小却即引去徜佯無鬭志寇準聞之曰是狃我也請練師命將簡鋭捷據要害以備之以參知政事王欽若判天雄府兼都部署會降將王繼忠以書詣莫州部署石普言契丹欲講和普以聞于朝朝臣皆以為不可信畢士安請羈縻之漸許其平帝曰敵悍如此恐不可保士安曰臣嘗得契丹降人言其雖深入屢挫不甚得志隂欲引去又恥無名且彼寧不畏人乘虛覆其巢穴此請殆不妄繼忠之奏臣請任之於是帝手詔諭繼忠曰朕豈欲窮兵惟思息戰如許通和即當遣使葬明德皇后冬十月以厮鐸督為朔方節度使曹利用如契丹十月髙繼祖擊敗契丹數萬騎於岢嵐軍李延渥力拒契丹于瀛州又敗之契丹主欲還羣臣不可復令王繼忠附奏議和意欲宋先遣使帝乃遣崇儀副使曹利用奉書詣契丹軍蕭太后見之欲求關南地利用備言其地乃前朝事不敢聞命太后不從作龍圖閣閣在會慶殿西偏北連禁中閣東曰資政殿西曰述古殿閣上奉太宗御製文集及典籍圖畫寶瑞之物與夫宗正所進屬籍初置待制以杜鎬戚綸為之十一月契丹主侵澶州帝自將禦之十一月契丹敗宋師于洺州破德清軍冀州遂次于澶淵北邉書告急一夕五至中外震駭寇準不發飲笑自如帝聞之大駭以問準準對曰陛下欲了此不過五日耳願帝幸澶州同列懼欲退準止之令候駕起帝難之欲還內準曰陛下入則臣不得見大事去矣請毋還而行畢士安力勸帝如準所請帝乃議親征召羣臣問方略王欽若臨江人也請幸金陵陳堯叟閬州人也請幸成都帝以問準準心知二人之謀乃陽若不知者曰誰為陛下畫此䇿罪可誅也陛下神武將臣協和若大駕親征敵當自遁不然出竒以撓其謀堅守以老其師勞佚之勢我得勝算矣奈何棄廟社欲幸楚蜀逺地所在人心崩潰敵乘勢深入天下可復保耶帝乃決計幸澶州庚午發汴京畢士安寇準王欽若皆從司天言日抱珥黃氣充塞宜不戰而却十二月庚辰朔日有食之帝次于澶州暨契丹平帝在道適苦寒左右進貂裘帝却之曰將士皆然朕安用此邪王繼忠數馳奏請和帝曰繼忠言雖可信然河氷已合且敵情多詐不可不備壬申契丹兵直犯前軍西陳未接戰蕭達林出按視地形時威武軍頭張瓌守牀子弩弩撼機發矢中達林死焉契丹主大懼欲引去而宋師數十萬方至由是和議益決丙子帝至澶州南城望見契丹軍勢甚盛衆請駐蹕寇準固請曰陛下不過河則人心益危敵氣未懾非所以取威決勝也且王超領徑兵屯中山以扼其吭李繼隆石保吉分大陳以扼其左右肘四方征鎮赴援者日至何疑而不進衆議皆懼準力爭之不決出遇殿前都指揮使髙瓊于屏間謂曰太尉受國恩今日有以報乎對曰瓊武人願效死準乃復入瓊隨立庭下準厲聲曰陛下不以臣言為然盍試問瓊等瓊即仰奏曰寇準言是準曰機不可失宜趣駕瓊即麾衛士進輦帝遂渡河御北城門樓逺近望見御蓋踴躍歡呼聲聞數十里契丹相視不能成列帝悉以軍事付寇準凖承制専決號令明肅士卒畏悅已而契丹數千騎來薄城下詔士卒迎擊斬獲大半乃引去帝還行宫留準居北城上徐使人視準何為準方與知制誥楊億飲博歌謔歡呼帝喜曰準如是吾復何憂戊寅曹利用自契丹還言契丹欲得關南地帝曰所言歸地事極無名若必邀求朕當決戰若欲貨財漢以玉帛賜單于有故事則宜許之準不欲賂之以貨財且欲邀其稱臣及獻幽薊之地因畫䇿以進曰如此則可保百年無事不然數十年後戎且生心矣帝方厭兵特欲羈縻不絶乃曰數十年當有捍禦之者吾不忍生靈重困姑聽其和可也準尚未許十二月庚辰朔契丹遣飛龍使韓杞持書來請盟準欲不從會有譖準幸兵以自取重者準不得已乃許其成復遣曹利用如契丹軍議嵗幣帝曰必不得已雖百萬亦可準聞之召利用至幄謂曰雖有敕旨汝所許過三十萬吾斬汝矣利用至契丹軍蕭太后以無還地之意謂利用曰晉德我畀我關南周世宗取之今宜見還也利用曰晉人以地畀契丹周人取之我朝不知也若嵗求金帛以佐軍尚不知帝意可否割地之請我不敢以聞契丹政事舍人髙正始遽前曰我引衆以來圖復故地若止得金帛而歸吾愧吾國人矣利用曰子盍為契丹熟計使契丹用子言恐連兵結釁不得而息非國利也契丹猶覬關南遣其監門衛大將軍姚柬之持書復議帝不許而去利用竟以銀幣三十萬兩匹成約而還甲申契丹使姚柬之來獻御衣食物乙酉帝御行營南樓觀河遂宴從官及柬之等丙戌放河南北強壯歸農遣監西京左藏庫李繼昌持誓書如契丹軍稱其太后為叔母歲輸銀十萬兩絹二十萬匹詔諸將勿出兵邀其歸路丁亥遣使安集河北流民瘞暴骸契丹遣其閣門使丁振持誓書來以兄禮事帝兩軍解嚴庚寅契丹主引兵歸壬辰赦河北諸州及兵過所死罪以下甲午帝發澶州自是南北弭兵寇準之力也帝至自澶州契丹太后賜其大丞相韓德昌姓耶律氏進封晉王德昌即德讓也乙巳二年契丹統和二十三年春正月大赦正月庚戌朔以契丹講和大赦天下放散河北諸州強壯歸農令有司市耕牛給之罷諸路行營合鎮定兩路為一省北面部署鈐轄都監使臣二百九十餘員河北戍兵十之五緣邊三之一置霸州安肅軍𣙜場詔緣邊得契丹馬牛悉縱還之禁入其境掠奪弛邊民鐵禁葺河北城池招流亡廣儲畜由是河北民得安業皆畢士安之謀也契丹主歸次燕京大享將士班賞有差以李允則馬知節孫全照楊延昭知雄定鎮保州畢士安請按邊要選守將易置之故有是命它所擇任各當其才置國信司以與契丹通和則吉凶軍嘉慶弔之使嵗月相繼置國信司專主之領以宦者云二月孫僅如契丹賀其太后生辰也夏四月以王欽若為資政殿學士欽若與寇準不協纍表願解政事特置資政殿學士授之而罷其政以馮拯參知政事六月達旦國九部致貢于契丹以楊億為翰林學士億清忠耿亮博覽強記典章法度為時取正文章精密有規裁當時學者宗之尤喜誨誘後進因以成名者甚衆然剛介寡合王欽若等惡之趙德明遣使乞降詔許之德明以父遺命再遣使歸順帝遣夏居厚持詔答之因命河西諸蕃部族各守疆場秋七月復置賢良方正等六科以舉士賢良方正等三科久不行至是畢士安請復之仍增置為六科曰賢良方正能直言極諫科博通墳典明於教化科才識兼茂明於體用科詳明吏理可使從政科識洞韜略運籌帷幄科軍謀宏逺材任邊寄科以待京朝官之被舉及被應選之士歸幣于契丹自是嵗以為常冬十月韓國華如契丹賀正旦也畢士安卒士安晨朝至崇政殿廬暴疾作帝步出臨視已不能言詔內侍以肩輿送歸第薨世謂士安之德端方沈雅嚴正公亮人所難及十一月契丹使阿里來賀承天節也十二月以王欽若為資政殿大學士始置大學士為欽若也契丹使和卓及博諾來契丹主使其太保和卓太后使其太師博諾來賀正旦也周漸如契丹賀契丹主生辰也初詔致仕官給半俸唐制致仕者非特敕則不給俸國初循之至是始有此詔丙午三年契丹統和二十四年春二月以宋州為應天府以太祖舊藩也王繼英卒寇準罷準為相用人不以次同列頗不悅它日又除官同列目吏持例簿以進準曰宰相所以進賢退不肖也若用例一吏職耳自澶淵還頗自矜其功雖帝亦以此待準甚厚王欽若深嫉之一日會朝準先退帝目送之欽若因進曰陛下敬準為其有社稷功耶帝曰然欽若曰澶淵之役陛下不以為恥而謂準有社稷功何也帝愕然曰何故欽若曰城下之盟春秋恥之澶淵之舉是城下之盟也以萬乘之貴而為城下之盟其何恥如之帝愀然不悅欽若曰陛下聞博乎博者輸錢欲盡乃罄所有出之謂之孤注陛下寇準之孤注也斯亦危矣由是帝顧準寖衰竟罷為刑部尚書出知陕州初張詠在成都聞準入相謂僚屬曰寇公竒材惜學術不足爾及準知陕詠適自成都還準嚴供帳大為具以待詠將别準送之郊問曰何以教準詠徐曰霍光傳不可不讀也準莫諭其意歸取光傳讀之至不學無術笑曰此張公謂我矣以王旦平章事趙安仁參知政事旦拜相帝謂之曰寇準多許人官以為已恩卿當戒之旦謝不敢以王欽若陳堯叟知樞密院事韓崇訓馬知節簽署院事置常平倉于諸州詔京東西河北東陕西江南淮南兩浙皆立常平倉計户多寡量留上供錢自三二千貫至一二萬貫令轉運使司每州擇清幹官主之領於司農寺嵗夏秋視市價量增以糴糶三年以上不糶即回充糧廩易以新粟其後荆湖川陜廣南悉置焉以丁謂為三司使林特為副使謂機敏有智謀憸狡過人在三司案牘繁委吏久難解者謂一言判之衆皆釋然特尤善附會而有心計南平王黎桓卒子龍廷嗣桓死中子龍鉞立龍鉞兄龍全劫庫財而遁其弟龍廷殺龍鉞而自立龍廷兄明護率扶闌寨攻戰連月知廣州凌䇿言桓諸子爭立衆心離叛請發本道兵平之帝以桓素修職貢豈宜伐喪不許而以邵曄為緣海安撫使令譬曉之煜至廣上雍州至交址水陸及控制宜州山川等圖帝曰祖宗闢土廣大唯當慎守不必貪無用之地苦勞兵力命遵前詔安撫不得擅興秋九月趙德明降冬十月以德明為定難軍節度使封西平王德明復遣牙將劉仁勗奉誓表請載盟府且言父有遺命帝嘉之乃以左右班都知張崇貴等充使授德明檢校太師兼侍中充定難軍節度使封西平王賜賚甚厚給奉如內地因責子弟入質德明謂非先世故事不遣惟獻駝馬以謝恩而已沙州曹宗夀致貢于契丹丁未四年契丹統和二十五年春正月帝如西京帝次永安鎮素服詣諸陵詔置永安縣及三陵副使都監二月己巳至洛陽命祭周六廟甲戌幸上清宫録白居易後利用為河南府助教賜酺三日帝御五鳯樓觀之召父老五百人賜飲樓下作太祖神御殿于西京復置武成王廟及國子監三月帝至自西京契丹城遼西為中京大定府大定秦為遼西郡漢為新安平縣漢末步奚居之幅貟千里多大山深谷險阻足以自固唐初置饒樂都督府契丹主嘗過七金山土河之濵南望雲氣有郛郭樓闕之狀因議建都擇良工於燕薊倣臨潢置宫掖樓閣府庫市肆廊廡郛郭實之以漢户號曰中京夏四月皇后郭氏崩五月丙申朔日有食之增置孔子守塋户凡二千户王中正言聖祖降于其家汀州黥卒王捷自言于南康遇道人姓趙氏授以小鐶神劒蓋司命真君也宦者劉承圭以其事聞賜捷名中正是年五月十三日真君降于中正家之新堂是為聖祖而祥瑞之事起矣六月葬莊穆皇后秋七月交州黎龍廷來貢詔以為靜海軍節度使交址郡王賜名至忠邵煜譬曉黎明護以朝廷威德明護懼即奉龍廷主軍事龍廷自稱節度使開明王言于煜欲通貢奉煜令削去偽官龍廷遂稱權安南靜海軍留後遣使入貢帝賜龍廷九經及佛氏書而授以爵命且贈黎桓為南越王八月以杜鎬為龍圖閣直學士鎬博聞強記每得異書必手疏本末以聞眷遇甚厚始置是職以鎬為之韓崇訓罷三司使丁謂上景德會計録自乾德中諸州支度經費外凡金帛悉送闕下於是利歸公上而條禁文簿漸為精密吏不得售其姦太宗尤留意財用淳化初詔準漢制上計之法每歲三司具見管金銀錢帛軍儲等簿以聞每歲天下緡錢總入至一萬五千八十五萬一百而出亦相近之至是丁謂著會計録以獻因條經費及吉凶大禮已往者以備參較優詔奬之冬十二月有年淮蔡間麥斗十錢米斛二百錢初詔禮部糊名考校舉人戊申大中祥符元年契丹統和二十六年春正月有天書見于承天門之鴟尾大赦改元帝深以澶州城下之盟為辱居常怏怏不樂王欽若度帝厭兵因謬進曰陛下以兵取幽薊乃可滌恥帝曰河朔生靈始免兵革朕安能為此可思其次欽若曰惟有封禪泰山可以鎮服四海誇示外國然自古封禪當得天瑞希世絶倫之事然後可爾既而又曰天瑞安可必得前代蓋有以人力為之者惟人主深信而崇奉之以明示天下則與天瑞無異也帝沈思曰王旦得無不可乎欽若曰臣喻以聖意宜無不可欽若乃乘間為旦言旦黽勉從之帝尚尤豫莫與籌之者會幸祕閣驟問杜鎬曰古所謂河出圖洛出書果何事耶鎬老儒不測上旨漫應之曰此聖人以神道設教耳帝由此意決遂召王旦飲歡甚賜以尊酒曰此酒極佳歸與妻孥共之既歸發封則皆美珠也旦悟帝旨自是不敢有異議而封禪之事成矣正月乙丑有黃帛曳左承天門南鴟尾上守門卒塗榮以聞帝因謂羣臣曰朕去年十一月二十七日夜將半方就寢忽室中光曜見神人星冠絳衣告曰來月三日宜於正殿建黃籙道場一月將降天書大中祥符三篇朕竦然起對已復無見命筆識之自十二月朔即齋戒於朝元殿建道場以佇神貺適覩皇城司奏左承天門屋南角有黃帛曳鴟尾上帛長二丈計緘物如書卷纒以青縷三道封處有字隱隱蓋神人所謂天降之書也王旦等皆再拜稱賀帝即步至承天門瞻望再拜遣二內臣升屋奉之以下王旦跪奉而進帝再拜受之親奉安輿導至道場付陳堯叟啓封帛上有文曰趙受命興于宋付于眘居其器守于正世七百九九定緘書甚密抉以利刀方啓帝跪受復授陳堯叟讀之其書黃字三幅詞類洪範老子道德經始言帝能以至孝至道紹世次諭以清淨簡儉終述世祚延永之意讀訖帝復跪奉韞以所緘帛盛以金匱王旦等稱賀於殿之北廡丙寅羣臣入賀于崇政殿賜宴帝與輔臣皆蔬食遣官奏告天地宗廟社稷丁卯有司設大次于朝元殿之西廊黃麾仗宫縣登歌文武官陪列帝服鞾袍升殿酌獻三清天書禮畢步導入內是日紫雲見如龍鳯覆宫殿戊辰大赦改元羣臣加恩賜京師酺改左承天門為承天祥符分遣中使六人錫邊臣宴欽若之計既行陳堯叟陳彭年丁謂杜鎬益以經義附和而天下爭言祥瑞矣獨龍圖閣待制孫奭言于帝曰以臣愚所聞天何言哉豈有書也帝默然夏四月詔以十月有事于泰山以王旦兼封禪大禮使三月甲戌兖州父老千二百人詣闕請封禪丁卯兖州并諸路進士等八百四十人復詣闕以請壬午王旦等率文武將校蕃夷耆夀僧道二萬四千三百七十餘人詣闕請東封不允表五上帝意未決召三司使丁謂問以經費謂對曰大計有餘議乃定四月甲午詔以十月有事于泰山遣官告天地宗廟嶽瀆諸祠命翰林太常詳定儀注以王旦為封禪大禮使王欽若趙安仁為封禪經度制置使馮拯陳堯叟分掌禮儀丁謂等計度糧草既而契丹遣使請嵗幣外别假錢幣王旦曰東封近彼以此探朝廷意耳帝曰何以答之旦曰止當以微物而輕之乃於嵗給三十萬物內各借三萬仍諭次年額內除之契丹得之大慙天書復見于功德閣以王欽若趙安仁並判兖州五月泰山醴泉出王欽若至乾封上言泰山醴泉出錫山蒼龍見置天書儀衛及扶侍使置天書儀衛使副扶侍使副都監夾侍等職凡有大禮即命宰職近臣兼之禮畢罷六月得天書于泰山羣臣遂上帝尊號王欽若言六月乙未泰山西南垂小山上有紅紫雲氣漸成華蓋至地而散其日木工董祚於醴泉亭北見黃素帛曳林木上有字不能識言于皇城使王居正居正見其上有御名以告欽若欽若具威儀奉導至社首跪授中使馳捧詣闕帝御崇正殿趣召羣臣曰朕五月丙子夜復夢向者神人言來月上旬當賜天書于泰山宜齋戒祇受朕雖荷降告未敢宣露惟密諭王欽若等凡有祥異即上聞朕今得其奏果與夢協上天眷佑惟懼不稱王旦等曰陛下至德動天感應昭著臣等不勝大慶再拜稱賀壬寅乃迎導天書奉安于含芳園之正殿帝齋戒備法駕詣殿再拜受之授陳堯叟啓封其文曰汝崇孝奉吾育民廣福錫爾嘉瑞黎庶咸知祕守斯言善解吾意國祚延永夀歷遐嵗讀訖復奉以升殿既而雲五色見少頃黃雲如鳯駐殿上帝再拜祥瑞圖示百僚於是羣臣表上尊號曰崇文廣武儀天尊道寶應章感聖明仁孝皇帝作昭應宫以奉天書初帝議即宫城乾地營昭應宫以奉天書左右有諫者帝召三司使丁謂問之謂對曰陛下有天下之富建一宫奉上帝且所以祈皇嗣也羣臣有沮陛下者願以此諭之已而王旦密疏諫帝如謂所對答之旦不敢復言乃以謂兼修昭應宫使宦者劉承規副之秋九月以天書告于太廟王欽若獻芝草八千本趙安仁獻五色金玉丹紫芝八千七百餘本諸州上芝草嘉禾瑞木三脊茅等不可稱紀九月令有司勿奏大辟案甲子奉天書告于太廟悉陳諸瑞物於仗內已乃以天書置于朝元殿建道場扶侍使上香庭中奏法曲將行禮詣幄殿酌獻訖奉以玉輅中設几褥夾侍立旁周以黃麾仗前後部鼓吹道門威儀扶侍使以下前導自是凡舉大禮皆如之且製行殿供物定儀仗凡千六百人冬十月帝封泰山禪社首大赦九月乙酉帝習封禪儀于崇德殿十月辛卯車駕發京師扶侍使以玉輅載天書先道丁未至乾符縣奉髙宫齋于穆清殿戊申王欽若等獻太山芝草三萬八千餘本庚戌備法駕至山門黃雲覆輦道經險峻降輦步進鹵簿儀衛列于山下辛亥享昊天上帝於圜臺陳天書于左以太祖太宗配帝衮冕奠獻以寧王元偓亞獻舒王元稱終獻命羣臣享五方帝及諸神于山下封祀壇帝飲福酒攝中書令王旦跪稱曰天賜皇帝太一神䇿周而復始永綏兆人三獻畢封金玉匱王旦奉玉匱置于石䃭攝太尉馮拯奉金匱以降將作監領徒封䃭帝登圜臺閲視訖還御幄宰臣率從官稱賀山下傳呼萬嵗聲動山谷即日仗還奉髙宫百官奉迎于谷口帝復齋于穆清殿壬子禪祭皇地祗于社首山如封祀儀禮畢還次奉髙宫日重輪五色雲是癸丑帝被衮冕御封禪壇上之夀昌殿受羣臣朝賀大赦天下常赦所不原者咸赦除之文武並進秩令開封府及所過州軍考送服勤詞學經明行修舉人其懷才抱器淪于下位及髙年不仕德行可稱者所在以聞賜天下酺三日改乾封縣為奉符縣大宴穆清殿又宴泰山父老于殿門賜以時服茶帛甲寅發奉符次于太平驛改奉髙宫為會真宫詔王旦撰封祀壇頌王欽若撰社首頌陳堯叟撰朝覲壇頌十一月帝如曲阜謁孔子加諡為玄聖文宣王十一月戊午帝幸曲阜縣謁文宣王廟鞾袍再拜幸叔梁紇堂近臣分奠七十二弟子遂幸孔林加諡孔子曰玄聖文宣王遣官祭以太牢追封孔子父叔梁紇齊國公母顔氏魯國太夫人妻幵官氏鄆國夫人賜錢三十萬帛三百匹以四十六世孫聖佑為奉禮郎主祀事追諡齊太公望為昭烈武成王立廟青州追諡周文公旦為文憲王立廟曲阜帝至自泰山有年諸路米斗七八錢契丹蕭托雲伐甘州回鶻降之巳酉二年契丹統和二十七年夏五月詔追封玄聖文宣王廟配享從祀者為公侯伯詔封兖公顔回為兖國公費侯閔損以下九人為郡公郕伯曽參以下六十二人為侯命兩制以上文臣為贊又封先儒左丘明等十九人為伯加號聖祖為司命天尊以王中正為左武衛將軍秋七月以昭應宫為玉清昭應宫冬十月詔天下州軍作天慶觀詔以正月三日為天慶節命天下立觀以答神貺十二月契丹太后蕭氏卒承天皇太后自中京還臨潢行柴册禮事畢遂南幸未至燕而殂遣使告哀于宋夏髙麗諡曰聖神宣獻皇后后北府宰相思溫之女明達治體聞善必從故羣臣咸竭其忠習知軍政凡有大役親御戎車指麾三軍賞罰信明將士用命契丹主遵其教訓遂為盛王罷賢良方正直言極諫等科上封事者言兩漢賢良多因災變以詢訪闕政今國家受瑞建封不當復設遂詔罷制舉庚戌三年契丹統和二十八年春正月王隨王儒如契丹弔祭也二月契丹使蕭和卓來致太后遺物也契丹使蕭實喇來謝弔祭也遣使如契丹會葬也交州李公藴逐其節度使黎至忠而殺之自稱留後三月詔以公藴為靜海軍節度使封交址郡王至忠年少苛虐國人不附大校李公藴尤為至忠親任嘗令以黎為姓是年逐至忠出城而殺之併夷其兄弟自稱留後遣使貢奉帝曰黎桓不義而得之公藴又效尤焉雖可惡也然蠻俗何足責哉其用桓故事授以官爵賜之器幣故有是命夏四月契丹賜其大丞相耶律德昌名曰隆運契丹主既葬太后因賜德昌名曰隆運賜宅及陪葬地于后陵之旁五月契丹蕭托雲伐甘州回鶻俘肅州之民而還托雲破肅州盡俘其民修土隗口故城以實之髙麗康肇弒其君誦而立誦兄詢髙麗西京留守康肇弒誦立詢契丹主謂羣臣曰康肇弒君誦而立詢因而相之大逆也宜發兵問其罪羣臣皆曰可國舅詳衮蕭迪里曰國家連嵗征討士卒抏弊况陛下在諒隂年穀不登創痍未復島夷小國城壘完固勝不為武萬一失利恐貽後悔不如遣一介之使往問其故彼若伏罪則已不然俟陛下服除嵗豐舉兵未晚也不聽秋七月以杜鎬為龍圖閣學士始置是職也八月詔明年春有事于汾隂河中府進士薛南及父老僧道千二百人列狀請祠后土于汾隂帝不許寧王元偓率文武官三上表以請帝從之以王旦兼汾隂大禮使王欽若為禮儀使陳堯叟為經度制置使儀同封禪旱將有事汾隂而嵗旱龍圖閣待制孫奭上疏陳不可者十事且曰陛下才畢東封又議西幸非先王卜征五年重謹之意今國家土木之工纍年不息水旱作沴飢饉居多乃欲勞民事神神其享之乎不聽九月契丹册李德昭為夏國王冬十一月陜州河清契丹主伐髙麗執康肇誅之王詢出奔平州契丹主伐髙麗先遣髙正韓杞宣問王詢十月詢遣使奉表乞罷師不許十一月乙酉契丹軍渡鴨淥江康肇帥衆禦之戰敗退保銅州契丹進擊肇分兵為三一營于州西據三水之會肇居其中一營于近州之山一附城而營契丹先鋒耶律博諾率詳衮耶律達魯擊破三水寨擒肇及副將李立追亡數十里獲所棄糧餉鎧仗不可勝計會契丹主軍至斬首三萬餘級銅霍貴寧等州皆降都統蕭巴雅爾復敗髙麗于古達嶺王詢遣使上表請朝許之遂禁軍士俘掠以馬保佑為開京留守旺布副之遣伊林將騎兵一千送保佑赴京髙麗守將卓思正殺契丹使者韓喜孫等十人帥兵出拒保佑不得入而還契丹主遣伊林將兵擊之思正出奔西京契丹兵圍之五日不克契丹主次于城外王詢使其禮部郎中渤海托實請降羣臣議皆謂宜納之耶律質曰詢一戰而敗遽求納欵此詐耳納之恐墮其計宜待彼勢窮力屈未晚也契丹主乃使蕭巴雅爾進攻開京遇髙麗兵敗之王詢棄城走平州契丹遂焚開京宫室府庫民廬俱盡至清江而還契丹師既行諸降城復叛至貴州南峻嶺谷大雨連日馬駝皆疲甲仗多失霽乃得渡鴨渌江十二月陜州河復清集賢校理晏殊獻頌夏州飢西夏管內飢趙德明表求粟百萬朝議不知所出或言德明新納誓而敢違請以詔書責之王旦請敕有司具粟百萬于京師而詔德明來取德明得詔曰朝廷有人遂止辛亥四年契丹統和二十九年春二月帝祭后土于汾隂大赦正月乙酉帝習祀后土儀丁酉奉天書發京師二月壬子出潼關渡渭河遣近臣祠西嶽癸丑次河中府丁巳至寶鼎縣奉祗宫己未瀵泉湧有光如燭辛酉祀后土地祗禮同東封配以太祖太宗是夜月重輪還奉祗宫命作大寧宫壬戌大赦天下常赦不原者咸赦除之文武進秩建寶鼎縣為慶成軍賜天下酺三日大宴羣臣於穆清殿而還初將祀汾隂龍圖閣待制孫奭上疏諫曰今之姦臣以先帝嘗停封禪故贊陛下以繼承先志先帝欲北平幽朔西取繼遷則未嘗獻一謀畫一䇿而乃卑辭厚幣求和于契丹蹙國縻爵姑息於保吉謂主辱臣死為空言以誣下罔上為己任是陛下以祖宗艱難之業為姦臣僥幸之資此臣所以長嘆痛惜也時羣臣爭奏祥瑞奭上言方今野雕山鹿並形奏簡秋旱冬雷率皆稱賀將以欺上天則上天不可欺將以愚下民則下民不可愚將以惑後世則後世不可惑夫國將興聽于民將亡聽于神陛下何為而不思也帝嘉其忠而不能從三月帝過洛陽遂謁永昌陵夏四月帝至自汾隂召陜州隱士魏野不至野嗜吟咏不求聞達居陜州之東郊手植竹樹清泉環繞旁對雲山景趣幽絶為草堂彈琴其中好事者多載酒肴從之遊嘯咏終日野每著紗帽白衣見客出則跨白驢為詩精苦有唐人風格帝自汾隂還次陜州遣使召之不起乃命工圖其所居觀之契丹大丞相耶律隆運卒隆運重厚饒智略明治體喜建功立事輔政三十年國以之治強五月詔州城作孔子廟秋七月馮拯罷九月以向敏中為五嶽奉册使十月帝御朝元殿發五嶽册壬子五年契丹開泰元年夏四月以向敏中平章事舊時相出鎮州郡不以吏事為意寇準雖有重名所至終日遊宴張齊賢倜儻任情惟敏中盡心民事帝由是有復用之意使還遂拜為相髙麗王詢乞降于契丹髙麗王詢遣蔡忠順奉表如契丹乞稱臣如故契丹主命詢親朝詢復以疾為辭初契丹伐髙麗取其地築六城曰興鐵通龍龜郭州皆在女真鴨淥江東及髙麗臣服復以賜之至是契丹主怒詢不朝命復取六州地於是有女真人知髙麗事者進言以為自開京東馬行七日有大寨廣若開京凡旁邑所貢珍異皆在焉其勝羅等州之南亦有二寨所積如之若大軍自女真北渡鴨渌江並大河而上至郭州與大路會髙麗可取也五月賜杭州隱士林逋粟帛逋力學性恬淡好古不趨榮利家貧衣食不足晏如也結廬杭州西湖之孤山二十年足不及城市帝聞其名賜以粟帛其後逋為墓於廬側將死賦詩有茂陵他日求遺藁猶喜曽無封禪書之句賜諡和靖先生秋八月丙申朔日有食之作五嶽觀以奉五嶽後改曰會靈九月趙安仁罷為王欽若所搆也以王欽若陳堯叟為樞密使丁謂參知政事馬知節為樞密副使時天下乂安王欽若丁謂導帝以封祀眷遇日隆欽若自以深達道教多所建明而謂附會之與陳彭年劉承圭等搜講墜典大修宫宇以林特有心計使為三司使以幹財利時人目為五鬼王旦欲諫則業已同之欲去則上遇之厚追思李沆之先識歎曰李文靖真聖人也欽若狀貌短小項有附疣時目為癭相性傾巧敢為矯誕然智數過人每朝廷有興作能委曲遷就以中帝意以是有寵知節以衆方競言祥瑞深不然之每言于帝曰天下雖安不可忘戰去兵也冬十月帝言聖祖降于延恩殿帝語輔臣曰朕夢先降神人傳玉皇之命云先令汝祖趙玄朗授汝天書今令再見汝如唐朝恭奉玄元皇帝可也翌日復夢神人傳天尊言吾座西斜設六位以候是日即於延恩殿設道場五鼓一籌先聞異香頃之黃光滿殿蔽燈燭覩靈仙儀衛九天司命天尊至朕再拜殿下俄黃霧起須叟霧散由西陛升見侍從在東陛天尊就坐有六人揖天尊而後坐朕欲拜六人天尊止令揖命朕前曰吾人皇九人中一人也是趙之始祖再降乃軒轅黃帝凡世所知少典之子非也毋感電夢天人生於夀丘陵唐時奉玉帝命七月一日下降總治下方主趙氏之族今已百年皇帝善為撫育蒼生無怠前志即離座乘雲而去王旦等皆再拜稱賀帝即命旦等至延恩殿厯觀臨降之所遂詔告天下肆赦加恩命丁謂及李宗諤陳彭年率禮官等修崇奉儀注閏月上聖祖尊號閏月己巳上九天司命保生天尊尊號曰聖祖上靈髙道九天司命保生天尊大帝聖母懿號曰元天大聖后遂加太廟六室尊號立先天降聖節遣官就南郊設昊天及四位告之丙子羣臣上帝尊號曰崇文廣武感天尊道應真佑德上聖欽明仁孝皇帝作景靈宫太極觀于夀丘奉聖祖聖母也且詔天下天慶觀並增建聖祖殿而製二舞文曰發祥流慶武曰降真觀德云十一月享玉皇于朝元殿以王旦兼玉清昭應宫使作景靈宫于京師改諡孔子為至聖文宣王以玄字犯聖祖諱也契丹改幽都府為析津府十二月立德妃劉氏為皇后后父通為虎捷都指揮使太平興國中從征太原道卒后在襁褓而孤鞠于外氏善播鼗蜀人龔美者以鍛銀為業攜之至京師得入襄王邸帝即位自美人進位德妃性警敏曉書史由是専寵後宫郭后崩帝欲立之翰林學士李迪言妃起於寒微不可以母天下帝不從帝欲得翰林學士楊億草制使丁謂喻旨億難之因請三代丁謂曰勉為此不憂不富貴億曰如此富貴亦非所願也乃命他學士焉后既立以無宗族因以龔美為兄改其姓為劉氏聞李迪之諫大恨之后能記憶每聞朝廷事輒言其本末帝退朝閲天下封奏多至中夜后皆預聞宫闈事有問輒援引故實以對帝深重之由是漸干外政癸丑六年契丹開泰二年春正月置玉牒所修屬籍也三月以丁謂兼迎奉聖像使詔於建安軍鑄玉皇聖祖太祖太宗尊像至是成以丁謂為迎奉使夏五月奉安聖像於玉清昭應宫秋七月除農器稅八月詔明年有事于太清宫以王旦兼大禮使亳州官吏父老三千三百人詣闕請謁太清宫帝許之詔以來春親謁遂命旦兼亳州太清宫大禮使丁謂兼奉祀經度使孫奭上言陛下事事慕效唐明皇豈以明皇為令德之主耶帝曰東封祀汾謁陵寢享老子非始于明皇開元禮今世所循用不可以天寶之亂而非其禮作解疑論以示羣臣焉上老子尊號加號太上老君混元上德皇帝十二月戊午朔日有食之獻天書于朝元殿十一月判亳州丁謂獻芝草三萬七千本十二月扶侍使趙安仁等上奉天書車輅鼓吹儀仗壬申獻天書于朝元殿遂告玉清昭應宫甲寅七年契丹開泰三年春正月帝謁老子于亳州太清宫正月壬寅車駕奉天書發京師丙午次奉元宫判亳州丁謂獻白鹿一芝九萬五千本戊申王旦上混元上德皇帝册寶己酉朝謁太清宫是夜月重輪曲赦亳州及車駕所經流以下罪升亳州為集慶軍節度改奉元宫為明道宫賜酺三日遂詣亳城西朝拜聖祖新殿以應天府為南京作鴻慶宫于應天府奉安太祖太宗聖像二月帝至自亳州大赦辛酉帝至自亳辛未享太廟壬申恭謝天地大赦天下夏四月以曹賢順為歸義軍節度使沙州曹宗夀死子賢順自為留後奉貢請命于朝故有是命沙州自宗夀以來通使契丹五月以王旦兼兖州景靈宫朝修使天書刻玉使王欽若為同天書刻玉使六月王欽若陳堯叟馬知節免知節素薄欽若之為人遇事未嘗少屈欽若不悅會瀘州都巡檢王懷信等上平蠻功欽若久不決知節因面詆其短爭於帝前帝召王旦質之亘至欽若猶譁不已知節流涕曰願與欽若同下御史府旦叱欽若使退帝大怒命付獄旦從容曰欽若等當黜未知坐以何罪帝曰忿爭無禮旦曰陛下奄有天下使大臣坐忿爭無禮之罪或聞外國無以威逺帝曰卿意如何旦曰願至中書召欽若等宣示陛下含容之意且戒約之俟少間罷未晚也帝曰非卿言朕固難忍遂如旦議月餘始罷欽若知節併及堯叟欽若仍為刻玉副使以寇準為樞密使契丹伐髙麗契丹連嵗遣中丞耶律資忠使髙麗取六州舊地髙麗不從乃遣國舅詳衮蕭迪里討之秋七月以王嗣宗曹利用為樞密副使八月以向敏中兼景靈宫使髙麗來貢髙麗為契丹所阻不通中國者纍年至是復遣其御事工部侍郎尹證古入貢詔登州置館于海次以待之冬十一月玉清昭應宫成初議營宫料功須二十五年修宫使丁謂令以夜繼晝每繪一壁給二燭故七年而成凡二千六百一十楹製度宏麗屋宇少有不中程式雖金碧已具劉承圭必令毁而更造有司莫敢較其費十二月作元符觀户部獻天下民數户九百五萬五千七百二十九口二千一百九十七萬六千九百六十五折惟昌卒以其弟惟忠知府州事乙卯八年契丹開泰四年春正月帝詣玉清昭應宫上玉皇大天帝聖號大赦正月壬午朔謁玉清昭應宫奉表上玉皇聖號曰太上開天執符御厯含真體道玉皇大天帝遂以所摹刻天書玉版奉安于寶符閣帝容立侍其側還御崇德殿受賀大赦命刻玉使日赴殿行香副使已下日蒞事焉帝製誓文刻石置于閣下又製欽承寶訓述以示中外二月加楚王元佐天䇿上將軍興元牧賜劒履上殿詔書不名夏四月寇準罷準以三司使林特附會邪險惡之每事沮抑帝以特能幹財利以佐興造聞之不悅謂王旦曰準剛忿如昔旦曰準好人懷惠又欲人畏威皆大臣所當避而準不能此其所以短也非至仁之主孰能容之然竟以與林特忿爭罷初準數短旦于帝而旦専稱準帝謂旦曰卿雖稱其美彼専談卿惡旦曰理固當然臣在相位久政事缺失必多準對陛下無隱益見其忠直此臣所以重準也帝由是益賢旦中書有事送密院事違詔格準以上聞旦被責第拜謝堂吏皆被罰不踰月密院有事送中書亦違詔格堂吏欣然呈旦旦令送還密院而已準大慚謝及罷準托人語旦求為使相旦驚曰將相之任豈可求耶吾不受私請也準深憾之已而除準武勝軍節度使同平章事判河南府準入見謝曰非陛下知臣安能至此帝具道旦所以薦者準愧歎以為不可及準至鎮生辰造山棚大宴又服用僭侈為人所奏帝怒謂旦曰寇準每事欲效朕可乎旦徐對曰準誠賢能無如騃何帝意解曰然此正是其騃爾遂不問以王欽若陳堯叟為樞密使五月契丹伐髙麗蕭迪里伐髙麗無功而還契丹主復命樞密使耶律世良帥師伐之六月己酉朔日有食之秋九月吐蕃唃厮囉請伐夏州不許唃厮囉吐蕃贊普之裔生於髙昌磨榆國年十二河州羌何郎業賢竒其貌攜之歸吐蕃置于􅼑心城大姓聳昌厮均又徙諸移公城欲於河州立文法於是宗哥城僧李立遵邈川大首領溫逋竒掠取唃厮囉如廓州尊立之部族寖盛乃徙居宗哥立遵自為論逋佐之論逋者國相也立遵貪而喜殺國人不附會與涇原鈐轄曹瑋戰于三都谷而敗復襲西涼府亦不利衆益怨之唃厮囉遂與立遵不協徙居邈川以溫逋奇為論逋有勝兵六七萬而立遵自居宗哥屢表請贊普之號朝議以贊普乃戎王也立遵位在唃厮囉下不宜妄授止命為保順軍節度使唃厮囉與西夏接壤每以兵抗趙德明以希朝廷賜豫至是唃厮囉始立文法聚衆數十萬上表請討平夏以自效帝以戎人多詐或生他變命周文質監涇原軍曹瑋知秦州以備之王嗣宗罷知陳州張詠卒詠卒遺表言不當造宫觀竭天下之財傷生民之命此皆賊臣丁謂誑惑陛下乞斬謂頭置國門以謝天下然後斬詠頭置丁氏之門以謝謂帝歎其忠冬十一月种放卒放自還山後數朝京師封岱祀汾莫不預焉帝眷遇有加勞餞備至人或嘲放出處之迹放不答祿賜既豐晚節頗飾輿服廣置良田于長安至強市爭訟門人族屬因依倚恣橫王嗣宗守京兆放嘗乘醉慢罵之嗣宗遂條上其不法事極其醜詆目放為魑魅會赦恩而止放不自安徙居嵩山天封觀側帝聞之詔內侍就興唐觀基起第賜之然猶往來終南按視田畝每行必給驛乘在道或親詬驛吏規算糧具之直時議寖薄之嘗陪曲宴帝令羣臣賦詩杜鎬誦北山移文以譏放放不之愧及卒帝甚嗟悼親製文遣內侍祭之特贈工部尚書丙辰九年契丹開泰五年春正月以丁謂兼會靈觀使契丹大敗髙麗于郭州耶律世良蕭屈烈與髙麗戰于郭州西破之斬首數萬獲其輜重而還二月詔皇子夀春郡王受益就學于資善堂以張士遜崔遵度為王友士遜一日謁王旦稱皇子學書有法旦曰公為王友職止於是耶士遜愧謝受益司寢李氏所生皇后養為己子與淑妃楊氏同撫育之夏五月以向敏中兼宫觀慶成使六月蝗飛翳空京畿大蝗帝遣人至郊得死蝗以獻帝信之以示大臣明日執政遂袖死蝗進曰蝗盡死矣請示于朝率百官賀王旦獨不可後數日方奏事飛蝗忽蔽天帝顧旦曰使百官方賀而蝗如此豈不為天下笑耶帝以頻歲旱蝗問翰林學士李迪曰旱蝗荐臻將何以濟迪請發內藏庫以佐國用則賦斂寬民不勞矣帝曰朕欲用李士衡代馬元方為三司使俟其至當出金帛數百萬借之迪曰天子於財無內外願下詔賜之以示恩德何必曰借帝悅迪又言陛下土木之役過甚蝗旱之災殆天意以警陛下也帝深然之旱秋八月曹瑋敗吐蕃于伏羌九月丁謂陳堯叟免以陳彭年王曽張知白參知政事張旻任中正為樞密副使彭年附王欽若以成天書羣祀之事詳練儀典雖前世未有者必推引依據以成就之衆伏其該辨帝甚寵遇之及李宗諤楊億相繼罷彭年獨任翰林事務叢委形神皆耗舉止失措至家人有不記其名者一日謁王旦旦辭不見向敏中為持所上文字示之旦暝目不覽曰是不過興建符瑞圖進取耳及視之果然詔罷諸營建帝以旱蝗停京城工役禁舉樂罷秋宴督諸路捕蝗遂罷諸營造禁天下貢瑞物甲寅得雨蝗散戊辰青州飛蝗赴海死積海岸百餘里詔民能賑貧者官之詔民有出私廩振貧乏者三千石至八千石第授助教文學及上佐丁巳天禧元年契丹開泰六年春正月帝詣玉清昭應宫上玉皇及聖祖寶册大赦正月辛丑朔改元詣玉清昭應宫薦獻上玉皇大天帝寶册衮服壬寅上聖祖寶册己酉上太廟諡册庚戌享六室辛亥謝天地于南郊大赦御天安殿受册號乙卯宰相讀天書於天安殿壬戌詔以四月旦日為天祥節命王旦為兖州太極觀奉上册寶使二月進封李公藴為南平郡王陳彭年卒彭年敏給強記尤好儀制沿革刑名之學然性姦諂時號九尾狐夏五月以王旦為太尉侍中五日一至中書旦固讓許之旦素羸多疾連年求解機務不許至是拜太尉侍中五日一赴起居入中書遇軍國重事不限時日入預參決旦愈畏避上疏求退固辭新命又託同列奏曰帝重違其意止加封邑契丹蕭和卓伐髙麗不克而還秋八月以王欽若平章事帝久欲相欽若王旦曰欽若遭逢陛下恩禮已隆且乞留之樞密兩府亦均臣見祖宗朝未嘗有南人當國者雖古稱立賢無方然須賢士乃可臣為宰相不敢沮抑人此亦公議也乃止及旦疾欽若遂相欽若語人曰為王子明遲我十年作宰相九月王曽免王欽若方挾符瑞以固寵位隂排異已者會有詔以曽為會靈觀使曽以推欽若帝疑曽自異不悅會曽市賀皇后家舊第其家未徙曽令人舁土置門外賀氏訴于朝遂罷以李迪參知政事馬知節知樞密院事曹利用任中正周起同知院事太尉侍中王旦卒旦為首相會天下無事慎守祖宗法度無所變改帝久益信言無不從凡大臣有所奏請必問曰王旦以為如何旦與人寡言笑及奏事羣臣異同旦徐一言以定居家貧客恆滿堂察可與言及素知名者數月後召與語詢訪四方利病或使疏其言而獻之觀才之所長密籍其名不復與之相見遇有差除必先密疏四三人姓名以請所用者帝以筆點之同列不知爭有所用惟旦奏入無不俞允丁謂因是數譖其専而莫知其故也旦凡薦人人未嘗知諫議大夫張師德兩詣旦門不得見意為人所毁以告向敏中敏中從容為旦言之旦曰旦處安得有毁人者但師德後進待我薄耳及議知制誥旦曰可惜張師德敏中問之旦曰纍於上前言師德名家子有士行不意兩及吾門狀元及第榮進素定但當靜以守之爾若復奔競使無階而入者當如何也張士遜轉運江西見旦求教旦曰朝廷𣙜利至矣士遜遵其言不求羡利人稱士遜識大體薛奎發運江淮辭行旦無他語但云東南民力竭矣奎退歎曰真宰相之言也內臣劉承圭以忠謹得幸病且死求為節度使帝語旦曰承圭待此以暝目旦執不可曰他日求為樞密使此其階也遂止自是內臣不過留後旦任事久人有謗之者輒引咎不辨至人有過失雖人主盛怒可辨者辨之必得而後已及疾甚引對滋福殿帝曰朕方以大事託卿而卿疾如此因命皇子出拜旦皇恐走避皇子隨而拜之旦言皇子盛德必任陛下事因薦可為大臣者十餘人復力求避位帝覩其形瘁閔之乃以太尉兼侍中領玉清昭應宫使給宰相半俸帝謂之曰卿今疾亟萬一有不諱朕以天下付之誰乎旦謝曰知臣莫若君惟明主擇之固問之旦舉笏曰以臣之愚莫如寇準帝曰準性剛褊更思其次旦曰他人臣所不知也因辭退疾益篤帝親臨問手自調藥并薯蕷粥賜之遣內侍問者日至三四及薨帝痛悼不已張旻罷飢戊午二年契丹開泰七年春二月進封夀安郡王受益為升王夏閏四月馬知節罷作祥源觀五月契丹以張儉為政事令儉端慤不事外飾為雲州幕官故事車駕經行長吏當有所獻契丹主獵雲中節度使進曰臣境無他産惟幕僚張儉一代之寶願以為獻先是契丹主夢四人侍側賜食人二口及聞儉名始悟因召見容止朴野訪及世務占奏三十餘事皆合上旨由是眷注日隆竟至為相六月以曹利用知樞密院事秋八月立升王受益為皇太子更名禎赦冬十月契丹蕭巴雅爾伐髙麗十二月戰于茶陀二河契丹師敗績張知白罷己未三年契丹開泰八年春正月契丹册曹順為燉煌郡王曹順即曹賢順也二月契丹以王繼忠為南院樞密使三月戊午朔日有食之判永興軍寇準得天書于乾佑山詔迎入禁中巡檢朱能所造也中外咸識其詐帝獨信之迎入禁中魯宗道孫奭知能所為咸諫不聽準由是得召用矣夏六月王欽若免商州捕得道士譙文易畜禁書能以術使六丁六甲神自言嘗出入欽若家得欽若所遺詩帝問欽若欽若謝罪遂免以寇準平章事丁謂參知政事謂因準稱譽得致通顯雖同列而事之甚謹嘗會食中書羹汚準鬚謂起徐拂之準笑曰參政國之大臣乃為官長拂鬚耶謂大慚恨遂成讎隙秋七月羣臣上帝尊號大赦以天書再見也八月大會道釋于天安殿凡萬三千八十六人冬十一月帝朝景靈宫享太廟祀天地于圜丘大赦己巳帝謁景靈宫庚午享太廟辛未祀天地于圜丘大赦天下加恩文武自是每三嵗行禮宫廟圜丘必同舉為永制向敏中寇準並加僕射麻下帝謂翰林學士李昌武曰朕自即位以來未嘗除左僕射今命敏中應甚喜也賀客必多卿往觀之勿言朕意也昌武往候敏中敏中方謝客門闌悄然及見賀之具敘禮命之異敏中但唯唯卒無一言既退使人瞷其庖中亦寂無一人明日昌武入對具以白上上大笑曰向敏中大耐官職十二月以曹利用丁謂為樞密使任中正周起為副使髙麗乞貢方物于契丹契丹許之庚申四年契丹開泰九年春正月以曹瑋僉書樞密院事瑋沈勇有謀馭軍嚴明自少捍禦西陲熟知羌情每以竒計用兵所向克捷善撫士卒能綏懷邊人羌戎畏懷之三月帝有疾不視朝三月向敏中卒敏中性端厚愷悌多智知人善處繁劇時以重德目之帝深倚信雖老恆疾不得謝事而薨夏四月兩月並見于西南復以楊億為翰林學士億去翰林六年而復入是歲卒髙麗求成于契丹契丹許之王詢上表請稱藩納貢如故事且歸所拘人珠埒哩契丹遣使報許之六月寇準罷時帝得風疾事多決于皇后寇準李迪以為憂一日準請間曰皇太子人所屬望願陛下思宗廟之重傳以神器擇方正大臣羽翼之丁謂錢惟演佞人也不可以輔少主帝然之準密令楊億草表請太子監國且欲援億輔政已而準被酒漏言丁謂聞之日即日上體平朝廷何以處此李迪曰太子監國古制也何不可之有準竟以是罷為太子太傅封萊國公秋七月以李迪平章事馮拯為樞密使迪時兼太子賓客制下固辭帝不允會皇太子見帝拜曰陛下用賔客為相敢謝帝顧謂迪曰尚可辭耶迪乃受命以丁謂平章事內侍周懷政伏誅貶太子太傅寇準知相州入內副都知周懷政失寵懼誅素附寇準以帝疾而準罷因謀奉帝為太上皇而傳位太子殺丁謂而復相準客省使楊崇勳內殿承制楊懷吉以其謀告丁謂謂即微服夜乘犢車挾崇勳詣曹利用計議明日以聞詔命曹瑋訊之懷政具服帝怒甚欲責及太子羣臣莫敢言李迪從容奏曰陛下有幾子乃欲如是帝悟乃止誅懷政丁謂與皇后謀遂貶寇準為太常卿知相州而罷翰林學士盛度樞密直學士王曙他日帝問左右曰吾目中何久不見寇準羣臣畏謂威莫敢對八月以任中正王曽參知政事錢惟演為樞密副使周起曹瑋罷貶知相州寇準為道州司馬丁謂請再貶凖帝意欲謫諸江淮間謂退竟除道州司馬同僚莫敢言王曽獨以帝語質之謂顧曰居停主人勿復言蓋指曽嘗以第舍假凖也九月帝疾瘳冬十一月李迪丁謂罷翌日詔謂復視事翰林學士劉筠請罷從之丁謂擅權用事至除吏不以聞迪憤然謂同列曰迪起布衣至宰相有以報國死猶不恨安能附權幸為自安計耶會議二府皆進秩兼東宫官迪以為不可謂又欲引林特為樞副迪復沮之謂積怒既而謂加門下侍郎兼太子太傅迪加尚書左丞依前兼太子少傅故事宰相無為左丞者及入對于長春殿內出制書置榻前帝謂輔臣曰此卿等兼東宫官制也迪進曰東宫官屬不當增置臣不敢受命丁謂罔上弄權私林特錢惟演而嫉寇準特子殺人事寢不治準無罪逺謫惟演以皇后兄美姻家使預朝政曹利用馮拯相為朋黨臣願與謂俱罷付御史臺劾正帝怒留制不下左遷迪户部侍郎知鄆州謂户部尚書知河南府明日謂入謝帝詰所爭狀謂對曰非臣敢爭乃迪詈臣爾願復留遂賜坐左右欲設墩謂顧曰有旨復平章事乃更以杌進遂自出傳口詔復入中書視事時翰林學士劉筠已草迪謂同罷制既而謂復留命别草制筠不奉詔乃更召學士晏殊草之筠自院出遇殊於樞密院南門殊皇愧側面不敢與揖謂既復位益擅權専恣筠曰姦人用事安可一日居此力請補外遂知廬州筠初為楊億所識拔景德以來竟與億同居文翰之府時人號為楊劉詔太子決事于資善堂詔自今軍國大事仍舊親決餘皆委皇太子同宰相樞密等參議引決太子固讓不允進丁謂太子少師馮拯少傅曹利用少保十二月太子開資善堂親政皇后裁決于內而丁謂用事中外以為憂王曽謂錢惟演曰太子幼非中宫不能立中宫非倚太子則人心亦不附后若加恩太子則太子安太子安則劉氏安矣惟演乘間言之后深納焉以馮拯平章事作天章閣藏御集也十二月帝有疾辛酉五年契丹太平元年春正月帝疾瘳以張士遜為樞密副使二月以孔聖佑襲封文宣公秋七月甲戌朔日有食之九月吐蕃唃厮囉來降冬十一月貶王欽若為司農卿分司南京欽若在河南有疾表乞就醫京師丁謂使人紿之曰上甚思一見君也欽若信之即輿疾至京謂因言欽若擅去官守無人臣禮故貶契丹立梁王宗真為太子宗真字雅布濟小字濟古爾宫人蕭訥木錦所生齊天皇后蕭氏無子取而養之愛同已出訥木錦不恱焉髙麗致貢于契丹壬戌乾興元年契丹太平二年春二月羣臣上帝尊號帝崩于延慶殿皇太子即位尊皇后為皇太后權處分軍國事淑妃楊氏為皇太妃帝崩王曽奉遺詔入殿廬草制命皇后權處分軍國事輔太子聽政丁謂欲去權字曽曰皇帝沖年太后臨朝斯已國家否運稱權猶足示後且增減制書有法表則之地先欲亂之耶謂遂止太子即位年十三矣尊皇后為皇太后淑妃為太妃兩府定議太后與帝五日一御承明殿垂簾聽政太后坐右帝居左丁謂欲擅權不欲同列與聞機政潛結入內押班雷允恭密請太后降手書云帝朔望見羣臣大事則太后召對輔臣決之非大事則令允恭傳奏禁中畫可以下學士草制辭允恭先持示謂閲訖乃進王曽曰兩宮異處而柄歸宦官禍端兆矣於是允恭恃勢専恣而丁謂權傾中外衆莫敢抗獨王曽正色立朝時倚為重赦薛貽廓如契丹告哀也夏四月薛由如契丹告即位也貶故相寇準為雷州司户參軍李迪為衡州團練副使丁謂怨準而太后憾迪之嘗諫立已也遂誣以朋黨貶之凡與二人親善者皆逐故曹瑋亦謫知萊州學士呈制草謂改曰當醜徒干紀之際屬先帝違豫之初罹此震驚遂致沈劇且使人迫迪行或語謂曰迪若貶死公如士論何謂曰異日諸生記事不過曰天下惜之而已謂必欲令二人死遣中使齎敕就賜以錦囊貯劍揭于馬前至道州準即行因閲圖經見州東南去海岸十里歎曰吾少時嘗有詩云到海只十里過山應萬重人生得喪豈偶然耶在雷踰年病薨六月契丹使耶律僧隱等來契丹使都點檢耶律僧隱充祭奠使林牙蕭日新充太后弔慰使金吾耶律錫林充弔慰使復為飯三京僧數萬人內侍雷允恭伏誅丁謂任中正免丁謂為山陵使雷允恭為都監判司天監邢中和言于允恭曰今山陵止百步法宜子孫類汝州秦王墳允恭曰何不就之中和曰恐下有石與水耳允恭曰上無他子若如秦王墳何不可中和曰山陵事重踏行覆按動經月日恐不及七月之期耳允恭曰第移就上穴我走馬入見太后言之允恭素貴橫人不敢違即改穿上穴入白其事后曰此大事何輕易如此允恭曰使先帝宜子孫何為不可后意不然曰出與山陵使議可否允恭出與丁謂言之謂唯唯而已允恭入奏曰山陵使亦無異議矣乃命夏守恩領工徒數萬穿地土石相半繼之以水衆議日喧懼不能成功中作而罷奏請待命謂芘允恭依違不決內侍毛昌違自陵下還以其事奏之詔問謂謂始請遣使按視既而咸請復用舊地乃詔馮拯曹利用等就謂第議遣王曽覆視曽還請獨對因言謂包藏禍心令允恭移皇堂於絶地太后大驚怒甚欲併誅謂馮拯進曰謂固有罪然帝新即位亟誅大臣駭天下耳目謂豈有逆謀哉第失奏耳后怒稍解遂止誅允恭等越二日太后召宰相諭曰丁謂為宰輔乃與宦者交通因出謂嘗託允恭令後苑匠所造金酒器及允恭嘗干求管勾皇城司并三司衙司狀因曰謂前附允恭奏事皆言已與卿等定議故皆可之且營奉先帝陵寢而擅有遷易幾誤大事馮拯等對曰自先帝登遐政事皆謂與允恭同議稱得聖旨禁中臣等莫辨虛實賴聖神察其姦此宗社之福也任中正獨進曰謂被先帝顧託雖有罪請如律議功王曽曰謂以不忠得罪宗廟尚可議耶乃降授謂太子少保分司西京中正為太子賔客出知鄆州故事黜宰相皆降制時欲亟行止令拯等即殿廬召舍人草詞仍榜朝堂布諭天下以拯為山陵使秋七月以王曽平章事吕夷簡魯宗道參知政事錢惟演為樞密使曽方嚴持重每進見言利害事審而中理多所薦拔尤惡僥幸帝嘗問曽曰比臣僚請對多求進者曽對曰惟陛下抑奔競而崇恬靜庶幾有難進易退之人矣初真宗封岱祀汾兩過洛陽皆幸吕蒙正第謂之曰卿諸子孰可用蒙正對曰諸子皆不足用有姪夷簡任潁州推官宰相材也夷簡由是進用纍擢知開封府嚴辨有聲帝識其姓名于屏風將大任之不果而崩太后知真宗眷注遂擢居政府宗道嘗為右正言論列無所畏避真宗嘗書殿壁曰魯直蓋思念之也及入中書太后嘗問曰唐武后何如主宗道對曰唐之罪人也幾危社禝太后默然丁謂有罪貶為崖州司户參軍初女道士劉德妙嘗以巫師出入謂家謂敗逮繫德妙內侍鞫之德妙具言謂嘗教之曰汝所為不過巫事不若託老君以言禍福足以動人於是即謂家説神像夜醮于園中雷允恭數至請禱及真宗崩引入禁中又因穿地得龜蛇令德妙持入內紿言出其家山洞中仍復教云上即問若所事何知為老君第云相公非凡人當知之謂又作頌題曰混元皇帝賜德妙語涉妖誕遂貶謂崖州司户參軍籍其家得四方賂遺不可勝紀謂赴崖州道出雷州寇準使人以一蒸羊逆諸境上謂請與準相見準固辭之準聞家僮謀欲報仇乃杜門使羣僮縱博毋得出俟謂行逺乃已謂機敏有智謀憸狡過人文字纍數千百言一覽輒誦尤善為詩至於圖畫博奕音律無不洞曉每休沐會賔友盡陳之聽人人自便而謂從容應接於其間莫能出其意者祥符天禧間營宫觀奏祥瑞多謂與王欽若發之及居崖州専事浮屠因果之説家寓西京嘗為書自克責敘國厚恩戒家人毋輒怨望遣人致于洛守劉曄祈付其家戒使者伺曄會衆僚時違之曄得書不敢私即以上聞太后與帝見之感惻遂徙雷州亦出於揣摩也八月帝及皇太后初同御承明殿垂簾聽政從王曽之議也冬十月契丹使耶律僧隱來賀即位也葬永定陵以天書殉十一月錢惟演罷初惟演見丁謂當國權勢薰灼因附之與為婚姻寇準之斥惟演有力焉及序樞密使題名獨刋去準名曰逆準削而不書御史中丞蔡齊言于帝曰寇準忠義聞天下社稷之臣也豈可為姦黨所誣哉帝遽令磨去之丁謂得罪惟演慮將及已因擠謂以自解馮拯以是惡其為人上言惟演以妹妻太后兄劉美則是外戚姻家不可與機政以廢祖宗之法請罷之乃以保大節度使知河陽府踰年入朝意圖執政御史鞠詠上疏論之太后遣內侍持奏示惟演惟演猶顧望不行詠語右司諫劉隨曰若相惟演當取白麻廷毁之惟演始亟去惟演出於勳貴文辭清麗名與楊億劉筠相上下於書無所不讀尤喜奬勵後進嘗曰吾平生不足者惟不得於黃紙上押字耳故切切求入中書為時議所鄙吐蕃李立遵來附以張知白為樞密副使初賜兖州學田判國子監孫奭上言知兖州日建立學舍以延生徒至數百人臣雖以俸贍之然常不給乞給田十頃以為學糧從之諸州給學田始此以孫奭馮元兼侍講王曽以帝初即位宜近儒者乃請御崇政殿西閣召侍講孫奭馮元講論語帝在經筵或左右瞻矚及容體不正奭即拱立不講由是帝每竦然聽之十二月髙麗王詢卒子欽立加馮拯昭文館大學士監修國史王曽集賢殿大學士自是上相必加昭文監史次相加集賢若上相罷免則以次而升如除三相則分監修國史於次相云通鑑續編卷五
