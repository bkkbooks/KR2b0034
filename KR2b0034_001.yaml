body:
  text: 命皇子及軍機大臣訂正通鑑綱目續編諭朕披閲御批通鑑綱目續編內周禮發明張時泰廣義於遼金元事多有議論偏謬及肆行詆毁者通鑑一書關係前代治亂興衰之迹至綱目祖述麟經筆削惟嚴為萬世公道所在不可涉偏私試問孔子春秋內有一語如發明廣義之肆口嫚罵所云乎向命儒臣編纂通鑑輯覽其中書法體例有關大一統之義者均經朕親加訂正頒示天下如內中國而外夷狄此作史之常例顧以中國之人載中國之事若司馬光朱子義例森嚴亦不過欲辨明正統未有肆行嫚罵者朕于通鑑輯覽內存𢎞光年號且將唐王桂王事蹟附録于後又諭存楊維禎正統辨使天下後世曉然於春秋之義實為大公至正無一毫偏倚之見至於東夷西戎南蠻北狄因地而名與江南河北山左關右可異孟子云舜為東夷之人文王為西夷之人此無可諱亦不必諱但以中外過為軒輊逞其一偏之見妄肆譏訕無論桀犬之吠固屬無當即區别統系昭示來許亦並不在乎此也况前史載南北朝相稱互行詆毁此皆當日各為其主或故為此訕笑之詞至史筆係千秋定論豈可騁私臆而廢公道乎夫厯代興亡前鍳不逺人主之道惟在敬天勤民兢兢業業以綿億萬載之丕基所謂天難諶命靡常常厥德保厥位誠不在乎區區口舌爭之若主中國而不能守如宋徽欽之稱臣稱姪於金以致陵夷南渡不久宗社為墟即使史官記載曲為掩飾亦何補耶所有通鑑綱目續編一書其遼金元三朝人名地名本應按照新定正史一體更正至發明廣義內三朝時事不可更易外其議論詆毁之處著交諸皇子及軍機大臣量為刪潤以符孔子春秋體例仍令粘簽進呈候朕閲定並將此諭冠之編首交武英殿照改本更正後發交直省督撫各一部令各照本抽改將此通諭中外知之特諭
