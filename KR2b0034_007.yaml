body:
  text: 通鑑續編卷四元陳桱撰己卯宋太宗皇帝太平興國四年遼乾亨元年是嵗宋滅北漢混一中原春正月潘美帥師侵漢帝議伐漢曹彬曰以國家兵甲精鋭翦太原之孤壘如摧枯拉朽爾帝意遂决乃以潘美為北路都招討使帥崔彥進李漢瓊劉遇曹翰米信田重進分道伐漢又以郭進為太原石嶺關都部署以斷燕薊援師遼遣達瑪長夀來言曰何名而伐漢也帝曰河東逆命所當問罪若北朝不援和約如故不然惟有戰耳以石熙載簽書樞密院事張思訓獻所製渾儀司天監學生巴中人張思訓本唐李淳風梁令瓉之法創作渾儀以獻日月行度成于自然不假人運尤為精妙焉帝命置于文明殿東南鼓樓下擢思訓為渾儀丞二月帝自將侵漢遼耶律舒救漢三月郭進敗遼師于白馬嶺漢主求救于遼遼主遣南府宰相耶律舒為都統兾王迪里為監軍帥師赴之三月乙未至白馬嶺與郭進遇舒欲阻澗以待後軍迪里不從渡澗迎戰未成列進薄之遼師大敗迪里等皆死會耶律色珍兵至進引師退舒得免夏四月以石熙載為樞密副使師圍太原五月漢主劉繼元降詔封為彭城郡公潘美等屢敗漢兵進築長連城以圍太原矢石交下如雨漢外援不至餉道又絶城中大懼四月庚午帝至督戰益急城無完堞帝慮其城陷殺傷者衆手詔諭漢主降使者至城守陴者不納帝怒親督諸將衛士進薄城下列陳于前蹲甲交射矢集城上如蝟毛五月壬午漢指揮使郭萬超踰城出降漢主親信之臣多亡城中危急帝復手詔諭漢主速降當保終始貴富詔雖入城而諸將鋭攻不可遏帝猶慮城陷害良民麾兵少却癸未夜漢主遣客省使李勳奉表乞降帝詔許之因至城北張樂宴從臣於城臺甲申漢主率官屬縞衣紗帽待罪臺下帝賜以襲衣玉帶召使升臺漢主叩首謝罪帝釋之己丑授特進檢校太師右衛上將軍封彭城郡公賜賚甚厚命祠部郎中劉保勛知太原府折御卿亦攻取嵐憲州岢嵐軍凡得州十縣四十户十三萬五千二百二十帝作平晉詩命從臣和又授漢相李揮以下官有差漢劉繼文奔遼遼封為彭城郡王帝發太原六月遂伐遼圍幽州秋七月及遼耶律休格戰于高梁河敗績乃還帝既滅漢欲乘勝取幽薊諸將以師罷餉匱不欲行崔翰獨曰所當乘者勢也不可失者時也取之易帝意遂决五月庚子發太原六月丁卯次東易州遼刺史劉宇以城降留千兵守之戊辰次涿州遼判官劉厚德以城降庚午次幽州城南遼將耶律希達軍于城北帝攻走之壬申命宋偓崔彥進劉遇孟𤣥哲分兵四面攻城圍之三周以潘美知幽州行府事遼將多降七月遼順州薊州皆降耶律學古時守燕悉力禦之不能支城中大懼遼主遣耶律休格救幽癸未帝與遼將耶律舒大戰于髙梁河舒敗將遁休格兵適至與耶律色珍分左右翼以進復戰帝大敗死者萬餘人帝引師南還休格追至涿州帝急乘驢車走免喪其資械不可勝計庚寅命孟𤣥哲屯定州崔彥進屯關南劉廷翰李漢瓊屯真定而還自是遼好遂絶帝至自范陽帝還汴以石守信劉遇從軍失律貶之八月皇子武功郡王德昭自殺德昭從帝攻太原軍中嘗夜驚不知帝所在有謀奉德昭者帝聞不悅及還汴故久不行太原之賞德昭以為言帝大怒曰待汝自為之賞未晚也德昭退而自刎帝聞之驚悔往抱其尸大哭曰癡兒何至此耶追封魏王諡曰懿子五人九月劉廷翰等大敗遼師于遂城遼主遣南京留守燕王韓匡嗣與耶律舒耶律休格伐宋報圍燕之役軍于遂城西方陳宋師請降匡嗣欲納之休格曰彼氣甚鋭疑誘我也可整衆待之匡嗣不聽俄而宋將劉廷翰崔彥進李漢瓊等分道前後合擊遼師大潰死者萬計匡嗣棄旗鼓遁去餘衆走易州獨休格整兵而戰宋師乃退遼主怒匡嗣將誅之蕭后力救得免以休格為南面大王總戍南兵以楊業為代州刺史漢建雄節度使楊業善戰號楊無敵帝聞其名召見以其老于邊事拜代州刺史遼人忌之望見旌旗輒引去冬十月進封齊王廷美為秦王論平漢功也庚辰五年遼乾亨二年春正月以程羽為文明殿學士羽自知成都還帝欲優以清職乃改端明為文明殿授羽學士專備顧問二月定差役法分民户為九等上四等充役下五等免從京西轉運使程能之請也三月衛國公劉鋹卒鋹有口辨帝之將伐北漢也宴近臣于禁中鋹進言曰朝廷威靈及逺四方僣僞之主今日盡在坐中旦夕平太原劉繼元又至臣率先來朝願得執梃為諸國降王長帝大笑及卒帝輟朝三日贈太師追封南越王潘美敗遼師于鴈門殺其將蕭卓羅秋七月交州亂詔孫全興帥師討之交址丁部領及其子璉相繼死璉弟璿嗣為節度年尚幼大將黎桓幽璿别館而代領其衆帝聞之以孫全興張濬崔亮劉澄賈湜王僎並為部署將兵討之全興濬亮由雍州澄湜僎由廉州進桓聞之遣使為丁璿上表求襲位帝不許冬十月遼主圍瓦橋十一月帝自將禦之次于大名遼師退乃還遼主自將圍瓦橋關宋師陳于水南耶律休格帥精騎渡水而戰宋師大敗休格追至莫州十一月帝自將禦之癸丑關南諸將與戰大破之戊午帝次大名諸軍復戰于莫州敗績㑹遼主引去帝欲遂取幽州李昉力陳其未可乃詔曹翰部署諸將而還十二月遼以耶律休格為裕恱定難留後李繼筠卒弟繼捧嗣辛巳六年遼乾亨三年春三月皇子興元尹德芳卒贈中書令岐王諡康惠子三人詔諸路轉運使祭官吏賢否以聞罷交州師孫全興棄市三月交州行營破賊于白藤江口獲戰艦二百知雍州侯仁寶死之㑹炎瘴軍士多死轉運使許仲宣以聞詔班師斬劉澄賈湜于軍徵孫全興棄市髙昌來貢夏六月薛居正卒居正因服丹砂遇毒方奏事疾作遽掖歸中書已不能言但指廡間儲水器而已左右取水至不能飲偃閣中吐氣如烟焰輿歸私第薨居正輔相十八年寬簡不察衆論賢之歸義節度使敦煌郡王曹元忠卒子延祿嗣秋九月乙未朔日有食之以田錫為左拾遺錫好言時務既居諌職上疏獻軍國要機者一朝廷大體者四以議平漢之功駕馭戎臣為要機而大體之一乞修德以來逺宜罷交州之師其二言今諌官不聞廷爭給事中不聞封駁左右史不聞升陛軒記言動御史不敢彈奏中書舍人未嘗訪以政事集賢院雖有書籍而無職官祕書省雖有職官而無圖籍臣願陛下擇才任人使各司其局職業修舉則威儀自嚴其三言邇者㝢縣平寧京師富庶軍營馬監靡不恢崇佛寺道宫悉皆輪奐又加闢西苑廣御池而尚書省湫隘尤甚郎曹無本局尚書無聽事九寺三監寓天街之兩廊貢院就武成王廟是豈太平之制度耶臣願陛下别修省寺用列職官其四言按獄官令枷杻鉗鎖皆有定式未聞以鐵為枷也昔唐太宗觀明堂圗見五臟皆麗于背遂减徒刑况隆平之時將措刑不用于法所無去之可也疏入優詔褒答賜錢五十萬以趙普為司徒兼侍中普奉朝請鬱鬱不得志者纍年至是如京時柴禹錫及趙鎔楊守一俱以嘗給事晉邸得幸告秦王廷美驕恣將有陰謀竊發帝疑以問普普因言願備樞軸以察姦變且自陳曰臣忝舊臣為權幸所沮遂備道預聞昭憲太后顧託及前朝上表自訴等事帝於宫中訪普前表得之因召見謂曰人誰無過朕不待五十已知四十九年非矣乃拜普司徒兼侍中封梁國公置京朝官差遣院舊制京朝官屬吏部國初以來皆出中書至是詔中書舍人郭贄等考校勞績品量材器以中書所下闕員引對而授之謂之差遣院以石熙載為樞密使冬十一月楚昭輔罷壬午七年遼乾亨四年春三月癸巳朔日有食之貶秦王廷美為西京留守初昭憲太后遺命太祖傳位于帝意欲帝傳之廷美以及德昭故帝即位之初命廷美尹開封而德昭德恭等皆稱皇子及德昭不得其死德芳相繼夭沒廷美始不自安柴禹錫因上變以搖之而帝意不決召趙普諭以太后遺㫖普對曰太祖已誤陛下豈容再誤廷美遂得罪舒州上𤣥石石有白文曰丙子年出趙號二十一帝夏四月以竇稱郭贄參知政事初帝尹開封稱為判官以推官賈琰佞諛于坐叱之曰賈氏子巧言令色豈不愧于心哉衆皆失色帝因重稱之直至是謂稱曰賞卿之叱賈琰也以柴禹錫為樞密副使楊守一為樞密都承㫖賞上秦王廷美之變也盧多遜免趙普復相多遜心不自安普屢諷令引退而多遜貪固權位不能決會普廉得多遜嘗遣堂吏趙白交通秦王事帝大怒下詔數其罪責授守兵部尚書罷秦王廷美官流盧多遜于崖州多遜既免越二日下御史獄命翰林承㫖李昉學士扈蒙衛尉卿崔仁兾御史滕中正等雜治之多遜具伏纍遣中書守當官趙白以機事密告廷美且云願宫車晏駕盡力事大王廷美亦遣小吏樊德明報多遜云承㫖言正㑹我意因遺之弓箭多遜受之獄上帝詔文武集議太子太師王溥等七十四人奏廷美多遜咀咒顧望大逆不道宜正刑章詔削奪多遜官爵流崖州并徙其家屬朞親于逺裔趙白樊德明閻密王繼勳趙懷祿閻懷忠等悉斬于都門外廷美勒歸私第復其子為皇姪女落皇女公主之號沈倫罷坐與盧多遜同列不能覺察降授工部尚書五月崔彥進敗遼師于唐興定難留後李繼捧來歸銀夏綏宥之地夏州自李思恭以來未嘗親朝中國至是繼捧率其族入朝帝甚嘉之賜賚甚厚繼捧陳其諸父昆弟多相懟怨乞納其境內夏綏銀宥四州留京居之帝為遣使如夏州護緦麻已上親赴闕四州既來歸疆土幾復漢唐之舊其未入職方者燕雲十六州耳貶秦王廷美為涪陵縣公房州安置趙普又以廷美居西京非便諷知開封府李符上言廷美不悔過而怨望乞徙逺郡以防他變詔降封廷美為涪陵縣公房州安置以閻彥進知房州袁廓通判州事以伺察之普又恐符言泄乃坐符他事流之春州潘美敗遼師于鴈門折御卿敗遼師于新澤六月定難都知蕃落使李繼遷入于地斤澤以叛繼遷繼捧族弟也四世祖思忠嘗從兄思恭討黃巢戰沒贈宥州刺史曽祖仁顔唐銀州防禦使祖彞景父光儼皆嗣防禦使于晉周之世繼遷生而有齒勇悍多智開寶七年授定難軍管內都知蕃落使留居銀州聞宋使者至發緦麻親赴汴乃詐言乳母死出葬于郊遂與其黨數十人奔入地斤澤出其祖像以示戎人戎人拜泣從者日衆澤距夏州東北三百里遼主侵滿城秋九月遼主賢卒于焦山子梁王隆緒立尊母蕭氏為太后治國事以韓德讓為政事令兼樞密使總衛兵遼主幸雲州行至焦山有疾命南院樞密使韓德讓南院大王耶律色珍奉遺詔立長子梁王隆緒而殂隆緒小字文殊努生十二年矣既嗣位是為昭聖皇帝國事皆决于太后蕭氏后以德讓總宿衛兼政事令南院大王博果濟總領山西諸州事北院大王裕悅休格為南面行軍都統同政事門下平章事景宗任人不疑信賞必罰唯竭國力以助河東破軍殺將而不能救其亡為不知權云冬十月竇稱卒行乾元厯冬官正吳昭素所造也十一月以李繼捧為彰德軍節度使以繼捧鎮彰德復官其兄弟十二人帝嘗問繼捧曰汝在夏州用何道以制諸部對曰羌人鷙悍但羈縻而已非能制也十一月戊午朔日有食之髙麗王胄卒弟治立癸未八年契丹聖宗隆緒統和元年春正月曹彬罷以王顯弭德超為樞密副使酒坊使弭德超有寵于帝覬代樞密使曹彬之位乃自鎮州乘傳以急變聞于帝曰彬秉政久得士心將為不利且誣以事為徵帝信之乃出彬為天平節度使而以顯德超並為副使二月戊午朔日有食之以宋琪參知政事遼以耶律休格為南京留守休格均戍兵立更休法勸農桑修武備邊境大治三月置諸王府翊善及侍講夏四月弭德超有罪流于瓊州德超以不得樞密使怨望居常怏怏一日詬王顯柴禹錫曰我言國家大事有安社稷功止得錢許大官汝等何人反在吾上我實恥之言頗侵帝顯奏之詔鞫問德超具伏遂奪官秩禁錮瓊州而死帝始悟曹彬之誣待之加厚帝作戒辭頒于羣臣五月交州將黎桓逐其留後丁璿而代之桓自稱留後遣使來貢并上丁璿讓表詔諭桓送璿母子赴闕不聽河決滑州河源在西蕃朵甘斯南鄙四山之間有泉近百泓匯為一登髙望之若星宿布列故彼人呼為星宿海流出復東瀦曰哈喇海東出曰齊必勒河合呼蘭伊爾齊二水北流為九渡河其水猶清騎可渡也貫山中行出西戎之都㑹曰庫濟曰克特者合納琳河所謂細黃河也水流已濁繞昆侖之南折而東注合竒爾瑪勒河復繞昆侖之北自貴德西寧之境下積石經河州過臨洮合洮河東北流至蘭州始入中國北繞朔方北郡上郡而東經三受降城豐東勝州折而南出龍門過河中抵潼關東出三門集津為孟津過虎牢而後奔放平壤吞納小水以百數勢益雄大無崇山巨磯以防之旁激奔潰不遵禹蹟故虎牢以東距海口二三千里恆被其害自漢以降每以為憂周顯德初大决東平之楊劉乾德以來决者不一是年大决滑州之韓村泛澶濮曹濟東南入于淮壞民田廬舍東南流至彭城界而入海詔發丁夫塞之六月以王顯為樞密使顯既拜帝語之曰卿世家本儒少遭兵亂失學今典機務無暇博覽羣書能熟讀軍戒三篇亦可免于面牆因取賜之遼復國號曰契丹六月遼主有事于太廟遂率羣臣上太后尊號曰承天皇太后羣臣亦上遼主尊號曰天輔皇帝大赦改元統和復國號曰契丹兖州父老請封禪帝不許泰山父老及瑕丘等七縣民詣闕請東封不許厚賜而遣之秋七月郭贄免以李昉參知政事贄嘗因論事奏曰臣遭不次之遇誓以愚直上報帝曰愚直何益于事贄對曰雖然猶勝姦邪至是以入對宿酲未解出知荆南府八月石熙載罷命中書樞密修時政記溪錦叙富四州蠻來附冬十月趙普罷普罷為武勝軍節度使帝作詩餞之賜宴長春殿普奉詩泣曰陛下賜臣詩當刻石與臣朽骨同葬泉下帝為之動容翌日帝謂宰相曰普有功國家朕昔與游今齒髮衰矣不欲煩以樞務擇善地以處之因詩以導意普感激泣下朕亦為之墮淚宋琪對曰昨日普至中書執御詩涕泣謂臣曰此生餘年無階上答庶希來世得效犬馬力臣昨聞普言今復聞宣諭君臣始終可謂兩全十一月以宋琪李昉平章事李穆吕蒙正李至參知政事張齊賢王沔同簽書樞密院事帝謂琪等曰世之治亂在賞當其功罰當其罪即無不治謂為飾喜怒之具即無不亂卿等慎之又謂蒙正曰凡士未達見當世之務戾于理者則怏怏于心及列于位得以獻可替否當盡其所藴言雖未必盡中亦當僉議而更之俾協于道朕固不以崇高自恃使人不敢言也蒙正初入朝堂有朝士指之曰此子亦參政邪蒙正陽為不聞而過之同列不能平詰其姓名蒙正遽止之曰若一知其姓名則終身不能忘不若弗知之為愈也時人服其量以吕文仲為翰林侍讀王著為侍書帝勤于讀書自己至申然後釋卷詔史館修太平御覽一千卷日進三卷宋琪以勞瘁為諌帝曰開卷有益不為勞也朕欲周嵗讀遍是書耳遂命文仲著侍讀與書每暇日則問文仲以經義著以筆法葛湍以字學是嵗江河漢睢穀洛瀍澗水溢甲申雍熙元年契丹統和二年春正月詔求遺書帝謂侍臣曰教化之本治亂之原茍無書籍何以取法今三館所貯遺佚尚多乃詔募中外有以書來上及三百卷當議甄録酬奬餘第卷帙之數等級優賜不願送官者借其本寫之由是四方之書間出矣帝弟涪陵縣公廷美卒于房州廷美至房州憂悸成疾薨年三十八追封為涪王諡曰悼以其子德恭德隆為刺史廷美之得罪趙普為之也李穆卒穆質厚忠恪謹言慎行所為純至無有矯飾帝聞其卒哭謂侍臣曰穆國之良臣朕方倚用遽爾淪沒非穆之不幸乃朕之不幸也三月以楊延慶等為知州帝選守臣得延慶等十餘人命之因謂宰相曰刺史之任最為親民茍非其人民受其禍昔秦彭守穎州教化大行境內多瑞宋琪曰秦彭一郡守政善而天應之若此况君天下者乎夏四月泰山父老詣闕請封禪許之五月乾元文明殿災六月詔罷封禪帝既詔以十一月二十一日有事于泰山命翰林學士扈蒙等詳定儀注矣五月丁丑乾元文明二殿災詔求直言遣使案察淮浙蜀廣獄訟而罷封禪詔州縣官上書言事附驛以聞冬十月賜華山隱士陳摶號希夷先生太平興國中摶兩入朝帝待之甚厚至是復來見帝謂宰臣曰搏獨善其身不干勢利所謂方外之士也遣中使送至中書宋琪等從容問曰先生得𤣥默修養之道可以教人乎摶曰摶山野之人于時無用亦不知神仙黃白之事吐納養生之理非有方術可傳假令白日冲天亦何益于世今聖上龍顔秀異有天人之表博達古今深究治亂真有道仁聖之主也正君臣協心同德興化致治之秋勤行修煉無出于此琪等以其語白帝帝益重之詔賜號希夷先生放還華山尋卒尹憲襲李繼遷于地斤澤走之獲其母妻而還知夏州尹憲襲繼遷大破之斬首五百級繼遷與其弟繼冲遁去憲獲其母妻俘千四百帳而還繼遷復娶豪族轉徙無常漸以強大西人以李氏世著恩德多往歸之十一月有事于南郊大赦帝將郊祀秦再思上書願勿肆赦因引諸葛亮相蜀數十年不赦之事以為證帝以問趙普普對曰聖朝開創以來具存彜訓三年郊祀即覃恩宥所謂其仁如天堯舜之道劉備偏據一方何足師法帝從普言十二月徙封淮海國王錢俶為漢南國王立德妃李氏為皇后后淄州刺史處耘之女也賜京師大酺三日詔曰王者賜酺推恩與衆共樂所以表升平之盛事契億兆之歡心纍朝以來此事久廢蓋逢多故莫舉舊章今四海混同萬民康泰嚴禋始畢慶澤均行宜令士庶共慶休明可賜酺三日至期帝御丹鳳樓觀酺召侍臣賜飲自樓前至朱雀門張樂作山車旱船往來御道又集開封諸縣及諸軍樂人列于通衢音樂雜發觀者溢道遷市肆百貨于道之左右召畿甸耆老列坐樓下賜以酒食明日宴羣臣于尚書省獻歌詩頌賦者數十人乙酉二年契丹統和三年春二月交州來貢李繼遷誘殺都巡檢使曹光實于葭蘆川遂襲銀州據之三月宴貢士于瓊林苑帝親試禮部貢士四百九十七人于崇政殿始分三甲錫宴于瓊林苑進士及第第一人授節度推官寵之以詩遂為定制帝謂侍臣曰朕親選多士殆忘飢渴召見臨問觀其才伎而用之庶田無遺賢而朝廷多君子爾復慮禮部取舍不當再試不中格者多獲中選夏四月宴羣臣于後苑先是帝召宰相近臣賞花于後苑謂之曰春風暄和萬物暢茂四方無事朕以天下之樂為樂宜令侍從詞臣賦詩至是詔輔臣三司使翰林樞密直學士尚書省四品兩省五品以上三館學士宴于後苑賞花釣魚張樂賜飲命羣臣賦詩因習射水心殿賞花曲宴自此始置明法科秋八月遣使按問刑獄察官吏勤惰于諸州九月楚王元佐有罪廢為庶人元佐帝長子少聰警貌類帝帝鍾愛之涪陵縣公廷美之遷房州元佐力救焉廷美既死元佐遂發狂疾至以小過操梃刃傷侍人疾少間帝為赦天下㑹重九召諸王宴射苑中元佐以新瘥不預及諸王宴歸暮過元佐元佐恚曰若等侍上宴我獨不預是棄我也因發忿被酒夜縱火焚其宫帝大之怒詔廢為庶人均州安置宋琪率百官三上表請留京師帝許之行至黃山召還居于南宫右羽林統軍周保權卒韓國華如髙麗時議用兵契丹以髙麗與之接壤數為所侵命國華齎詔諭令發兵西㑹高麗獷悍恃險未即奉詔國華諭以威德始俯伏聽命冬十二月庚子朔日有食之宋琪柴禹錫免初帝詔廣宫城柴禹錫有别第在表識內上言願易官邸帝不悅禹錫乃陰結琪欲因之以請盧多遜舊第琪為白帝帝益鄙之廣南轉運使王延範琪妻髙氏親也將謀不軌知廣州徐休復密奏之帝因琪禹錫入對問延範何如人琪禹錫未知其端盛言延範強明忠幹帝意其交通不欲暴其狀詔琪詼諧無大臣體罷守刑部尚書降禹錫為左驍衛大將軍延範及其黨與皆伏誅南康軍大雨雪江水冰雪厚三尺江水冰合可勝重載丙戌三年契丹統和四年春正月曹彬米信潘美帥師伐契丹賀懷浦將兵屯三交好議邊事與其子知雄州令圖上言契丹主少母后專政寵幸用事請乘其釁以取燕薊帝然之以曹彬為幽州道行營前軍馬步水陸都部署崔彥進副之米信為西北道都部署杜彥圭副之出雄州田重進為定州路都部署出飛狐潘美為雲應朔等州都部署楊業副之出鴈門李至罷二月李繼遷降于契丹契丹以為定難節度使都督夏州諸軍事繼冲為副使三月曹彬克契丹固安及涿州彬敗契丹兵于固安南克其城進攻涿州取之殺其將貨斯復㑹米信敗其師新城田重進敗契丹于飛狐靈丘重進攻飛狐連敗契丹之師獲其招安使大鵬翼等于是飛狐守將吕行德舉城降以其縣為飛狐軍遂進圍靈丘降之潘美克契丹寰朔應雲州潘美自西陘入與契丹兵遇追至寰州破之其刺史趙彥章以城降美進圍朔州節度副使趙希贊舉城降美遂攻應雲州皆克其城岐國公陳洪進卒夏四月田重進克契丹蔚州重進屢敗契丹之師進至蔚州其牙校李存璋殺其大將以城降五月曹彬及契丹耶律休格戰于岐溝敗績初諸將陛辭帝謂曰潘美但先趣雲朔卿等以十萬衆聲言取幽州且持重緩行不得貪利彼聞大兵至必悉衆救范陽不暇援山後矣及彬等乘勝而前所至克捷兵勢大振每奏書聞帝訝其進軍之速彬既次涿契丹南京留守耶律休格以兵少不敢出戰夜則令輕騎掠其單弱以脅餘衆晝則以精鋭張其勢設伏林莽以絶宋糧道彬居涿旬日以食盡退師雄州以援餽餉帝聞之曰豈有敵人在前反退軍以援芻糧失䇿之甚也亟遣使止彬勿前急引師緣白溝河與米信㑹時彬部下諸將聞美重進纍建功而已握重兵不能有所攻取謀議蜂起彬不得已乃復裹糧與米信復趨涿州休格聞之以輕兵薄宋師伺其蓐食則擊離伍單出者且戰且却由是宋師自救不暇結方陳塹地兩邊而行軍渴乏井漉淖而飲凡四日始得至涿時方炎暑士卒困乏糧又將盡㑹契丹主與其太后自駝羅口東將大兵應援賜休格旗鼓雙寬印以督將士而自攻涿州復之彬信失勢休格因出大兵逆戰于歧溝關宋師敗績冒雨而退無復行伍夜渡拒馬河休格引精騎追及溺死者不可勝計彬信南趨易州休格引兵復至宋師方瀕沙河而爨聞之驚潰死者過半沙河為之不流棄戈甲如丘山知幽州行府事劉保勳死之休格請乘宋弱略地至河為界太后不從引兵還燕收宋尸為京觀封休格為宋國王而歸帝聞之召彬信及崔彥進等還令田重進屯定州潘美還代州徙雲應朔寰四州吏民及吐谷渾部族分置河東京西帝謂張齊賢等曰卿等共睹朕自今復作如此事否契丹耶律色珍復取蔚寰州契丹諸路兵馬都統耶律色珍將兵十萬至定安西宋先鋒將賀令圖遇之敗績南奔色珍追及戰于五臺死者數萬人明日攻蔚州宋師救之色珍遣都監耶律德濟伏兵險厄以待城中兵聞救至突出色珍與德濟前後夾擊宋師大奔色珍追至飛狐宋師又敗死者二萬遂取蔚州令圖與潘美復帥師往救與色珍戰于飛狐宋師敗績於是宋師在渾源應州者皆棄城走色珍乘勝入寰州殺守城吏卒千餘遼太后以殺敵過當命建佛事飯僧萬人于上京開龍寺楊業及契丹耶律色珍戰于陳家谷敗績死之契丹復取雲應朔州及諸城潘美既敗于飛狐乃引兵護雲應寰朔四州內徙吏民南還至朔州狼牙村聞耶律色珍已入寰州兵勢甚盛楊業欲避其鋒護軍王侁等不可謂業曰君侯素號無敵今見敵逗撓不戰得非有他志乎業曰業非避死蓋時有未利徒殺士卒而功不立今君責業以不死當為諸公先將行泣謂美曰此行必不利業太原降將分當死上不之殺寵以連帥授之兵柄非縱敵不擊蓋欲伺其便以立尺寸功報國家耳今諸君責業避敵敢尚自愛乎因指陳家谷口曰諸君幸於此張步兵強弩以相援也業轉戰當至此可夾擊之不然無遺類矣美遂與侁帥麾下陳于谷口色珍聞業且至遣副部署蕭達蘭伏兵于路業至色珍擁衆為戰勢業麾幟而進色珍佯敗伏兵四起色珍還兵前戰業大敗退趨狼牙村侁自寅至己不得業報使人登托邏臺望之又無所見以為契丹敗走欲爭其功即領兵離谷口美不能制乃緣交河西南而進行二十里聞業敗即麾兵却走賀懷浦敗沒業且戰且行自午至暮果至谷口望見無人拊膺大慟乃再率麾下力戰身被數十創士卒殆盡猶手刃數十人馬重傷不能進匿深林中耶律希達望見袍影射之業墮馬被擒其子延玉死焉業因太息曰上遇我厚期討敵捍邊以報而反為姦臣所迫致王師敗績何面目求活耶乃不食三日死業既敗麾下尚百餘人業謂曰汝等各有父母妻子與我俱死無益也可走還報天子衆感激遂皆戰無一生還者於是守雲應朔等州及諸城將吏聞業死悉棄城走色珍盡復取之事聞帝深痛惜詔贈業太尉而除侁名六月戊戌朔日有食之以辛仲甫參知政事秋七月貶曹彬崔彥進米信為諸衛將軍治其違詔失律罪也以張齊賢知代州帝以楊業死訪近臣可知代州者齊賢請行乃命之令與部署潘美同領緣邊兵馬八月以王沔張宏為樞密副使冬十月以黎桓為靜海軍節度使桓復上表求王領節鎮朝廷懲孫全興之敗許之丁氏由是遂亡十二月劉廷讓及契丹主戰于君子館敗績契丹誘執賀令圖以歸遂陷邢深德州而去十一月契丹主及蕭太后大帥衆南下以耶律休格為先鋒都統十二月休格敗宋師入望都宋瀛州部署劉廷讓帥師數萬並海而北與李敬相合兵將趨燕休格聞之先以兵扼要害而逆戰于君子館天方盛寒宋士卒皆不能彀弓弩㑹契丹主兵大至乃圍廷讓數重廷讓時先分精兵屬李繼隆為後援而繼隆退保樂夀于是廷讓力不敵一軍盡沒以數騎脫身南走李敬源楊重進皆死之先是休格諜紿賀令圖曰我獲罪本國旦夕願歸南朝令圖信之私遺以重錦十兩及廷讓敗休格宣言願得見雄州賀使君令圖意其來降欲擅其功即引麾下數十騎逆之既至帳下休格據牀罵曰汝常好經度邊事乃今送死來耶令左右殺其從騎而執之自是河朔戍兵無復鬭志契丹乘勝長驅而南遂陷深邢德三州殺官吏俘士民所在輦金帛而去魏博之北民尤苦焉帝聞之下詔自悔而釋敗潰將士之罪且蠲河北逋租給復三年張齊賢大敗契丹于土鐙堡契丹自湖口薄代州城神衛都校馬正以所部列南門外衆寡不敵代州副部署盧漢贇畏懦保壁自固齊賢選廂軍二千出正之右誓衆感慨無不一當百契丹遂却先是齊賢遣使期潘美以師㑹戰使為契丹所執齊賢以師期既漏且虞美衆為契丹所乘既而美使至云師出并州至北井得密詔東師敗績于君子館并之全軍不許出戰已還州矣是時契丹兵塞川齊賢曰敵知美之來而不知美之退乃閉美使密室中夜發兵二百人持一幟負一束芻距州西南三十里列幟然芻契丹兵遙見火光中有旗幟意謂并師至駭而北走齊賢先伏步卒二千於土鐙寨掩擊大敗之殺其國舅詳衮塔喇噶宫使蕭逹哩斬首數百獲馬二千器械無算以劉繼元為保康節度使李繼遷請昏于契丹契丹以耶律襄女歸之繼遷率五百騎欵契丹境言願婚大國永作藩輔契丹以王子帳節度使耶律襄女號義成公主歸之丁亥四年契丹統和五年春二月改封漢南國王錢俶為許王詔改封俶南陽國王俶固讓國王之封乃改封許王三月安守忠及李繼遷戰于王亭敗績夏四月張宏免以趙昌言為樞密副使時河朔用兵宏循默守位而御史中丞趙昌言多條上邊事乃免宏而以昌言代之五月遣使市馬于諸路國子博士李覺上言乞於軍伍中取牝馬而孳息之增蓄駒將卒之月給俟其納馬即止是貨不出中國而馬增倍矣由是牧馬頗蕃焉以李繼捧為崇信軍節度使李繼遷數冦邊或疑繼捧泄朝中事於繼遷乃出之崇信徙其弟克憲為道州防禦使遣克文歸博州戊子端拱元年契丹統和六年春正月帝耕藉田赦詔除耕地于朝陽門七里外祀先農如南郊禮以后稷配遂親耕藉田數十步乃止還御丹鳳樓大赦改元百官內外並加恩賜民年七十以上爵一級二月改補闕拾遺為司諫正言徙錢俶為鄧王食邑九萬七千户食實封一萬六千九百户以李繼捧為感德軍節度使李昉罷布衣翟穎性險誕與知制誥胡旦狎旦為作大言使穎上之旦為穎改姓名曰馬周以為唐馬周復出也于是穎擊登聞鼓訟昉居宰相位當北方有事之時不為邊備徒知賦詩宴樂帝由是厭昉及籍田禮畢遂罷為右僕射昉和厚多恕在位小心醇謹每有求進用者雖知其材可取必正色絶之已而擢用或不足用必和顔溫語待之子弟問其故昉曰用賢人主之事若受其請是市私恩也故峻絶之使恩歸于上若不用者既失所望又無善辭取怨之道也以趙普為太保兼侍中吕蒙正平章事王沔參知政事張宏為樞密副使楊守一簽書樞密院事帝欲相吕蒙正以其新進藉趙普舊德為之表率㑹普以籍田入朝帝遂留為太保兼侍中謂之曰卿勿以位髙自縱勿以權勢自驕但能謹法度舉賢能明賞罰弭愛憎何憂不治卿勿面從古人耻其君不如堯舜卿其念哉普頓首謝拜蒙正中書侍郎同平章事監修國史蒙正質厚寬簡有重望以正道自持遇事敢言每論時政有未允者必固稱不可帝嘉其無隱普開國元老蒙正以後進歷官一紀遂同相位普雅重之趙昌言有罪貶為崇信軍節度行軍司馬昌言與鹽鐵副使陳象輿知制誥胡旦度支副使董儼善日夕會語京師為之語曰陳三更董半夜旦既為翟穎作大言頴方以訟罷李昉二人益相得穎益肆誕毁斥時政上書自薦且歷舉所善數十人為公輔期昌言為內應事覺穎流海島旦貶團練副使昌言責為崇信行軍司馬象輿儼皆罷夏五月作祕閣于崇文院詔就崇文院中堂建祕閣以三館書籍真本并內出古畫墨迹等藏之以吏部侍郎李至兼祕書監至每與李昉王化基觀書閣下帝必遣使賜宴且命三館學士皆預焉賜李繼捧姓名曰趙保忠復以為定難軍節度使李繼遷侵擾日甚趙普請復命繼捧鎮夏州帝召見加賜而遣焉且謂曰若能令繼遷歸欵當授以官也內侍侯莫陳利用有罪賜死商州利用以變幻之術得幸于帝驕恣不法居處服御僣擬乘輿趙普按其十罪力請誅之帝曰豈有萬乘之主不能庇一人乎普曰陛下不誅則亂天下法法可惜此一豎子何足惜哉帝不得已賜死商州秋八月太師尚書令兼中書令鄧王錢俶卒俶薨輟朝七日御正衙備禮追封為秦國王諡忠懿命中使護喪葬洛陽自鏐至俶世有吳越而俶任太師尚書令兼中書令者四十年為天下兵馬大元帥者三十五年既以地歸朝四徙大國善始令終窮極富貴福履之盛近代無比然自奉甚儉素好書善吟性謙和未嘗忤物世以是重之七子皆貴顯九月楊守一卒契丹主復取涿州冬十一月遂陷祁州九月契丹主攻涿州破之宋師引還城遂降十月克沙堆驛十一月破長城宋士卒潰圍南走契丹主邀擊之殺獲殆盡因攻滿城祁州及新樂皆拔之十二月以李繼遷為銀州刺史李繼捧上言繼遷悔過歸欵詔授繼遷銀州刺史充洛苑使然實無降心也契丹初置貢舉放髙第一人己丑二年契丹統和七年春正月契丹主陷易州而去契丹主克易州遷其民于燕京而還二月作方田夏四月不雨五月戊戌遣使決獄于諸州是夕雨秋七月以張齊賢為樞密副使張遜簽書樞密院事彗出東井八月丙辰赦是夕彗滅彗出東井帝避正殿减常膳八月丙辰大赦是夕彗不見詔曰朕以身為犧牲焚于烈火亦未足以答謝天譴當與卿等審刑政之闕失稼穡之艱難恤物安人以祈𤣥祐尹繼倫大敗契丹耶律休格于徐河朝廷聞契丹復至遣李繼隆發鎮定兵萬餘護送糧餽數千乘趨威虜契丹耶律休格聞之帥精騎數萬邀諸途北面緣邊都巡檢使尹繼倫適領兵徼巡路遇之休格不顧而南繼倫曰寇蔑視我耳彼南出捷還則乘勝而驅我北去不捷亦且泄怒于我將無遺類矣為今日計但當卷甲銜枚以躡之彼鋭氣前驅不虞我之至力戰而勝足以自樹縱死猶不失為忠義豈可泯然而死為異地鬼乎衆皆憤激從命繼倫令秣馬俟夜人持短兵潜躡其後行數十里至唐州徐河天未明休格去大軍四五里㑹食訖將戰繼隆方陳于前以待繼倫從後急擊殺契丹一大將衆皆驚潰休格方食失箸為短兵中其臂創甚乘善馬先遁餘衆引去契丹為之奪氣平居相戒曰當避黑面大王以繼倫面黑故也自是邊境兵以息焉庚寅淳化元年契丹統和八年春正月趙普致仕普自再相帝每優禮之免朝謁止日赴中書視事有大政則召對至是以疾力求致仕許之授太保兼中書令西京留守將發帝幸其第詔貸江州義門陳競粟初陳宜都王叔明五世孫唐右補缺兼生祕書少監京京生鹽官令褒褒生髙安丞灌灌孫伯宣避地江州之德安嘗以著作佐郎召不起伯宣生江州長史崇自兼至崇未嘗分異崇益置田園為家法戒子孫擇羣從掌其事建書堂教誨之唐僖宗詔旌其門南唐又為之立義門免其徭役崇子江州司户衮衮子奉禮郎昉昉之世同居長幼凡七百口不畜僕妾上下姻睦人無間言每食必羣坐廣堂未成人者别為一席有犬百餘共一牢食一犬不至羣犬亦皆不食建書樓于别墅延四方之士肄業者多依焉鄉里率化爭訟稀少唐亡州上其事詔仍舊免其徭役昉弟子鴻鴻弟競競之世子姓益衆常苦乏食至是知州康戬言于帝詔本州每嵗貸粟二千石其後競死從弟旭止受貸粟之半云省嗇而食可以及秋成屬嵗歉粟貴或勸旭全受而糶之可邀善價旭曰朝廷以旭家羣從千口軫其乏食貸以公粟豈可見利忘義耶帝聞深加歎奬旭後世守家法久而不墜二月置昭文史館集賢院于禁中因唐制也昭文館集賢院大學士監修國史皆以宰相兼之夏五月鑄淳化元寶錢帝親書錢文作真草行三體自是每改元必更鑄以年號為文冬十二月契丹封李繼遷為夏國王不雨辛卯二年契丹統和九年春正月不雨蝗三月雨時連嵗旱蝗是年尤甚禱雩無應帝手詔宰相曰朕將自焚以答天譴翌日大雨蝗盡死辛仲甫罷閏二月辛未朔日有食之夏四月以張齊賢陳恕參知政事張遜溫仲舒寇準為樞密副使恕有心計為鹽鐵使帝深器之親題柱曰真鹽鐵陳恕初準為樞密直學士嘗奏事殿中語不合帝怒起準輒引帝衣請復坐事決乃退帝嘉之曰朕得寇準猶文皇之得魏徵也及旱蝗帝召近臣問以得失衆以天數對凖曰洪範天人之際應若影響大旱之證蓋刑有所不平也帝怒起入禁中頃之復召準問以不平狀準曰願召二府至臣即言之二府至凖乃言曰頃者祖吉王淮皆侮法受賕吉贓少乃伏誅淮以參政沔之弟盜主守財至千萬止杖之仍復其官非不平而何帝以問沔沔頓首謝于是切責沔而以準為可大任遂有是命焉張宏罷五月初置諸路提㸃刑獄秋七月李繼遷降詔以為銀州觀察使賜姓名曰趙保吉繼遷與趙保忠戰于安慶澤繼遷中流矢遁去轉攻夏州保忠乞師禦之乃遣翟守素帥兵往援守素至繼遷乃歸欵奉表謝罪故有是命且以其子德明為管內蕃落使行軍司馬繼遷既受詔即以誥命獻于契丹秋九月吕䝉正罷王沔陳恕免䝉正為首相以寬簡居位政事多決于沔沔聰察善敷奏有適時材用然性苛刻不以至誠待人進退非允人胥怨之又素與張齊賢陳恕不叶及二人參知政事沔不自安慮僚屬有以中書舊事告齊賢恕者㑹司諌王禹稱上言自今宰相樞密不得于本㕔見客許於都堂延接以杜私請沔喜即奏行之左正言謝泌以為如此是疑大臣以私也疏駁之帝追還前詔沔遂罷沔見帝涕泣不願離左右未幾鬚鬢皆白時帝怒户部使樊知古所部不治恕聞密以語之覬其修舉知古訴于帝帝怒恕漏言亦坐免㑹度支判官宋沆伏閣奏疏請立太子帝怒貶沆而沆乃䝉正妻族也故罷為吏部尚書三日之間連罷三相因有奏毁者帝語之曰蒙正有大臣體沔甚明敏毁者慙而止以李昉張齊賢平章事賈黃中李沆參知政事王顯免以張遜知樞密院事溫仲舒寇準同知院事知樞密院事同知樞密院事自三人始冬十月趙保忠降于契丹契丹封為西平王復姓名曰李繼捧彭城郡公劉繼元卒贈中書令追封彭城郡王是嵗大旱壬辰三年契丹統和十年春二月乙丑朔日有食之三月詔試舉人自今糊名考校京師大蝗翳日夏五月己酉遣使決獄于諸州是夕雨六月置常平倉于京師時穀價太賤帝遣使臣於京城四門增價糴以貯之命曰常平俟嵗飢則减價糶與貧民遂為永制秋七月太師魏國公趙普卒普薨年七十一帝聞之震悼謂近臣曰普能斷大事盡忠國家真社稷臣也普性深沉有岸谷剛毅果斷雖多忌克而能以天下事為己任故其當揆惟義之從偃武修文慎罰薄斂以立宏規於後世其功大矣少習吏事寡學術及相太祖勸以讀書遂不釋卷每歸私第闔户啓篋取書誦之竟日及次日臨政處决如流既薨家人發篋取書視之則論語二十篇也陳橋之事普實定策事定之後未嘗以勳舊自伐亦難能矣獨廷美盧多遜之獄大為太宗盛德之纍君子惜之八月宴羣臣于新祕閣召終南隱士种放不至洛陽人种放沉默好學父翊卒與母俱隱終南豹林谷之東明峰結草為廬僅庇風雨以講習為業從學者衆資以養母母亦樂道薄滋味放得辟穀術别為堂於峯頂盡日望雲危坐每山水暴漲道路阻隔糗糧乏絶止食芋栗性嗜酒嘗種秫自釀每曰空山清寂聊以養和因號雲溪醉侯幅巾短褐負琴携壺泝長流坐盤石採山藥以助飲往往連日值月夕或至宵分自豹林至州郭七十里徒步與樵人往返著蒙書及嗣禹說表孟子上下篇太一祠録人頗稱之多為歌詩自稱退士作傳以述其志轉運使宋惟幹言其才行詔使召之其母恚曰常勸汝勿聚徒講學身既隱矣何用文為果為人知而不得安處我將棄汝深入窮山矣放乃稱疾不起其母盡取其筆硯焚之與放轉居窮僻人迹罕至帝嘉其節命所在時加存問焉冬十一月闍婆來貢闍婆國在南海中自宋元嘉中朝貢中國後絶不通至是其王穆羅茶遣陀湛來貢且云中國有真主故來耳契丹伐髙麗契丹遣東京留守蕭恆德伐髙麗髙麗王治遣朴良柔奉表請罪契丹主詔取女直鴨淥江東數百里地賜之置磨勘院帝慮中外官吏清濁混淆莫能甄别命官考課號曰磨勘院癸巳四年契丹統和十一年春二月己未朔日有食之改磨勘為審官院金部貟外郎謝泌言磨勘不出於典訓故也掌審京朝官其幕職州縣官則别置考課院主之封黎桓為交址郡王靑城民王小波作亂初蜀亡其府庫之積悉輸汴京自後任事者競起功利于常賦外更置博買務禁商賈不得私市布帛蜀地土狹民稠耕稼不足以給由是兼并者益糴賤販貴以規利青城民王小波因聚衆為亂且曰吾疾貧富不均今為汝均之貧者爭附遂攻青城掠彭山殺縣令齊元振旁邑響應焉夏五月以張洎錢若水為翰林學士帝謂侍臣曰學士之職親切貴重非他官可比朕常恨不得為之六月張齊賢免初王延德與朱貽業同僚欲求補郡貽業與李沆有姻婭託之以請沆為之言于張齊賢齊賢以聞帝以延德嘗事晉邸怒其不自陳而干祈執政召見詰責延德貽業皆諱不以實對齊賢不欲纍沆遂坐免張遜冦準免遜與準不協一日準與溫仲舒並轡晚歸有狂民迎馬首拜呼萬嵗街使王賔與遜雅相厚善因奏民迎準拜呼萬嵗準自辨實與仲舒同行蓋遜令賓獨奏斥臣辭氣甚厲因互發其私帝惡之乃左降遜為右領軍衛將軍出準知青州準既罷帝念之不置語左右曰冦準在青州樂乎左右揣帝意且復召用因對曰陛下思準不少忘聞準日縱酒未知亦念陛下否帝默然以柴禹錫知樞密院事吕端參知政事劉昌言同知樞密院事置銀臺通進司主視章奏案牘以稽出入𨽻門下蓋給事中之職也秋七月置諸路茶鹽制置使帝觀欹器翰林學士蘇易簡直禁中以水試欹器小黃門密奏焉帝召問之易簡曰江南徐遊所造者即取至便殿帝親試之嗟賞再三易簡進曰臣聞日中則昃月滿則虧器盈則覆物盛則衰願陛下持盈守成慎終如始帝納之八月丙午朔日有食之冬十月分天下州縣為十道是年三月復置三司使而罷鹽鐵户部度支三使判三司魏羽請依唐制分天下郡縣為十道曰河南河東關西劒南淮南江南東西兩浙東西廣南以京東為左計京西為右計魏羽為左計使董儼為右計使中分十道以𨽻焉而各道則署判官以領其事李昉賈黃中李沆溫仲舒罷以吕蒙正平章事蘇易簡趙昌言參知政事趙鎔向敏中同知樞密院事蒙正嘗因召對論及征伐帝曰朕比年征討蓋為民除暴茍好功黷武則天下之人熸亡盡矣蒙正對曰治國之要在內修政事則逺人來歸自致安靜帝然之易簡在翰林八年眷遇異常帝嘗飛白書玉堂之署四字以賜之欲遵舊制使天下稔其名望而後正位台輔易簡以親老急於進用因亟言時政得失遂入政府敏中明辨有才略時西北用兵樞機之任專主謀議凡二邊道路斥堠走集之所敏中莫不周知帝器之以陳恕為三司總計度使以恕為總計度使判左右計事凡議論計度並令恕參預恕以官司各建政令互出難以經久周太后符氏卒趙保吉冦環州轉運副使鄭仁寶議禁鹽池用困保吉保吉遂帥邊人四十二族寇掠環州邊將多為所敗以陳靖為京西勸農使未行而罷帝務興農事詔有司議均田法太常博士陳靖乞先命大臣兼屯田制置令京東西檢責荒地及逃民産籍之募民耕作賜以牛種室器俟田成然後量授田度地均稅約井田之利為定以頒行天下帝乃以靖為勸農使皇甫選何亮副之選等言其功難成陳恕亦以為不可遂出靖知婺州而罷其法冬十二月王小波死其黨李順陷蜀卭州永康軍西川都巡檢使張玘與小波戰于江原縣死之小波亦中流矢死其黨推小波妻弟李順為帥寇掠州縣衆至數十萬甲申五年契丹統和十二年春正月李順陷成都知府郭載出奔梓州詔以宦者王繼恩為兩川招安使帥師討之李順攻陷漢彭州乘勝攻成都轉運使樊知古知府郭載及官屬斬關出奔梓州順入城據之僣號大蜀王遣其黨四出攻劫州縣兩川大振帝議遣大臣撫諭趙昌言獨請發兵急討無使滋蔓帝從之趙保吉寇靈州以李繼隆為河西都部署帥師討之保吉徙綏州民于平夏部將髙文岯等因衆不樂反攻敗之保吉復圍堡寨掠居民焚積聚遂攻靈州詔李繼隆帥師討之饑時大饑民持杖相率投劵富室取其粟坐強盜死者甚衆知蔡州張榮獨取為首者杖脊餘悉從杖以其事聞帝感悟下詔褒之乃遣使分詣諸道巡撫帝謂之曰彼皆平民因饑取餱糧以圖活命爾宜悉從末減不可從強盜之科由是全活者甚衆二月李順冦劒州上官正大敗之順遣楊廣寇劒門都監上官正麾下有疲卒數百因勉激以忠義勇氣自倍力戰以守㑹成都監軍宿翰兵至正與之合迎擊賊衆大破之斬馘數萬餘衆三百走還成都順怒其驚衆盡斬之自此沮氣矣時朝廷聞蜀盜甚盛深以棧道為憂正以孤軍力戰以挫賊鋒鋭於是閣道無壅王師得以長驅而進李順寇梓州圍之知梓州張雍聞王小波起即訓練士卒募強勇守城輦綿州金帛以實帑藏命官屬治戎器伐山木為竿銷銅鐘為箭鏑紐布為索守械悉備至是李順遣相里貴帥衆二十一萬圍梓城中兵才三千雍悉智力禦之三月李繼隆入夏州執趙保忠歸于京師保忠聞李繼隆將至先挈其母妻子女壁于野外乃上言與保吉解怨獻馬五十匹乞罷兵帝覽奏立遣中使督繼隆進軍及師壓境保吉因夜襲保忠營欲並其衆保忠方寢聞難作單騎走還城其指揮使趙光嗣閉於别室開門迎繼隆入夏州城獻之繼隆執保忠送汴京待罪帝詰責而釋其罪尋責授右千牛衛上將軍封宥罪侯賜第汴京保忠狀貌雄毅居環列奉朝請常怏怏不自得夏四月詔削趙保吉所賜姓名詔墮夏州城遷其民于綏銀帝以夏州深在沙漠奸雄因之以竊據欲墮其城吕蒙正曰自赫連築城以來頗與關右為患若遂廢之萬世利也遂詔墮之五月王繼恩復成都獲李順誅之其黨張餘寇嘉戎渝涪瀘忠萬開等州陷之四月王繼恩師過綿州賊潰走追殺及溺死者甚衆遂復綿州曹習破賊于老溪復閬州胡正逺復巴州西川行營擊賊于研口寨敗之復劒州五月行營破賊十萬衆斬首三萬級復成都獲李順其黨張餘復攻陷八州都巡檢使盧斌解閬州圍復蓬州詔磔順等八人于鳳翔市降成都府為益州以姚坦為益王府翊善王嘗作假山召僚屬置酒衆皆褒美坦獨俯首王問之坦曰但見血山安得假山王曰何故坦曰州縣督稅上下相急父子兄弟鞭笞苦楚血流滿身此假山皆民租所出非血山而何時帝亦為假山未成聞之亟毁焉王每有過失坦輒正言左右患之教王稱疾帝甚憂之召王乳母入宫問王疾狀乳母曰王本無疾徒以姚坦撿束不得自便耳帝怒曰吾選端士為王僚屬者固欲輔王為善耳今乃如此欲使我逐去正人王年少豈解此也必爾輩教之杖乳母于後園召坦深慰諭之王繼恩救梓州賊乃潰梓州被圍近三月張雍固禦之王繼恩遣石知顒往援賊遂潰去六月契丹行大明厯可汗州刺史賈俊所造也秋七月李繼遷使其弟廷信來朝貢繼遷獻馬謝罪又遣弟廷信入覲且獻馬槖駝帝遣使慰諭之八月以王繼恩為宣政使中書以討蜀寇功欲除繼恩宣徽使帝曰朕讀前代史不欲令宦官預政事宣徽使執政之漸也止可授以他官宰相力言繼恩有大功非此任無足以為賞典帝怒深責相臣命學士張洎錢若水議别立宣政使位昭宣使上以授之以張詠知益州以詠知益州得便宜從事時王繼恩上官正宿翰等總兵討賊漸有成功頓師不進專務飲博剽掠恣橫餘寇匿山谷恃險結集勢復張大州縣多陷詠至以言激正等勉其親行仍盛為供具餞之酒酣舉爵屬軍校曰爾曹蒙國厚恩無以塞責此行當直抵寇壘平蕩醜類若老師曠日即此地還為爾死所矣正由是决行深入大致克捷繼恩御軍無政其下恃功暴橫詠奏請命近臣分屯師旅帝即命樞密直學士張鑑西京作坊使馮守規安撫西川時寇掠之際民多脅從詠移文喻以恩信使各歸田里且曰前日李順脅民為賊今日吾化賊為民不亦可乎有赴訟者詠灼見情僞立為判决人皆厭服嘗曰詢君子得君子詢小人得小人各就其黨詢之則無不審矣其為政恩威並用蜀民畏而愛之初蜀士知向學而不樂仕宦詠察郡人張及李畋張逵者皆有學行為鄉里所稱遂敦勉就舉三人悉登第士由是知勸以趙昌言為川峽馬步軍都部署尋詔次于鳳翔王繼恩在蜀不能戢衆士無鬭志郡縣多叛帝意頗厭兵召昌言謂曰西川本自一國太祖平之今三十年矣昌言知帝指即前畫攻取之䇿帝喜命昌言為川峽五十二州招安行營馬步軍都部署自繼恩以下並受節制昌言既行寇準密奏昌言有反相不宜遣握兵入蜀乃詔昌言駐鳳翔昌言至鳳州留候館不復進上官正敗張餘于雲安五月賊攻䕫州白繼贇大敗之于西津口斬首二萬獲舟千餘六月上官正復破賊于廣安又破賊帥張罕二萬衆于嘉陵江口又破之于合州西方溪髙瓊張旦亦敗賊于陵州七月賊攻眉州不克至是正等大敗張餘于雲安軍復其城九月罷𣙜酤自國初以來諸州置酒務官釀官得利無幾而味醨惡帝知之詔募民自釀而輸官錢以折御卿為永安軍節度使契丹尚父室昉卒昉自保寧以來為相與韓德讓耶律色珍同心輔政務在息民薄賦慎刑由是法度修明國無異議遣使如契丹求成也再遣使往而契丹不許于是募人泛海賂女真及兀惹等部叛之二部不從以襄王元侃為開封尹進封夀王帝在位久儲二未立馮拯等上疏乞早定太子帝怒斥之嶺南中外無敢復言者冦準自鳳翔召還入見帝足創甚自褰衣以示準且曰卿來何緩耶準對曰臣非召不得至京師帝曰朕諸子孰可以付神器者準對曰陛下為天下擇君謀及婦人中官不可也謀及近臣不可也唯陛下擇所以副天下望者帝俯首久之屛左右曰襄王可乎準曰知子莫若父聖慮既以為可願即决定遂以元侃為開封尹進封夀王元侃帝第三子也以寇準參知政事冬十一月宿翰敗張餘于眉州九月西川行營衛紹欽楊瓊屢破賊衆復蜀卭榮等州帝以蜀盜漸平下詔罪已曰朕委任非當燭理不明致彼親民之官不以惠和為政管榷之吏唯用刻削為功撓我蒸民起為狂寇聞者感悅十一月賊攻眉州宿翰敗之契丹令郡邑舉明經茂材異等之士十二月戊寅朔日有食之以陳恕為鹽鐵使總計使果不便乃罷之復以三司兩京十道復歸三部各置使一員以恕為鹽鐵使時帝留意金榖召三司吏李溥等二十七人對于崇政殿詢以計司利害溥等上七十一事詔以四十四事付有司行之其草七事下恕等議可否賜溥等金錢悉補侍禁殿直領其職帝謂宰相曰溥等條奏事頗有所長朕嘗語恕等若文章稽古此輩固不可望若錢榖利病彼自幼至長寢處其中必周知根本卿等但假以顔色引令剖陳必有所益復賜三司錢百萬募吏有能言本司不便者令恕等量事大小以錢賞之錢盡更給恕將立茶法召茶商數十人俾各條利害恕閲之等為三法語副使宋太初曰吾觀下等固滅裂無取上等取利太深此可行于商賈不可行于朝廷惟中等公私皆濟吾裁損之可以經久于是始為三法行之貨財流通恕每便殿奏事帝或未深察必形誚讓恕斂板踧踖退至殿壁負立若無所容俟帝意稍解復進慤執前論終不改易帝以其忠多從之乙未至道元年契丹統和十三年春正月帝觀燈于乾元樓自唐以來常以正月望日為上元七月望日為中元十月朔日為下元三元前後各一夕開坊市門然燈以宴嬉帝罷中下二元然燈而上元之夕益盛是嵗帝御乾元門樓以觀之見京師繁盛因指前朝坊巷省署以諭近臣令拓為通衢長廊遂大設燕張樂帝曰五代之際生靈凋喪周太祖自鄴南歸士庶皆罹剽掠下則火光上則彗孛觀者恐懼當時謂無復太平之日矣朕躬覽庶政萬事粗理每念上天之貺致此繁盛乃知理亂在人司空李昉對曰晉漢之事臣所備經何可與聖朝同日而語今四海清晏民物阜康皆陛下恭勤所致也吕蒙正避席曰乘輿所在士庶走集故繁盛如此臣嘗見都城外不數里飢寒而死者甚衆願陛下親近以及逺蒼生之幸也帝變色不言蒙正侃然復位以趙昌言知鳳翔府契丹韓德威侵邊折御卿敗之于子河汊劉昌言免以錢若水同知樞密院事李繼遷遣使來獻馬二月宿翰等至嘉州獲張餘蜀盜平餘為嘉州軍士所獲宿翰等至嘉州函餘首送于行營其黨由是皆散夏四月吕蒙正柴禹錫蘇易簡罷蒙正在中書帝嘗欲遣人使朔方諭中書選才而可責以事者蒙正以名上帝不許他日三問蒙正三以其人對帝曰卿何執耶蒙正對曰臣非執蓋陛下未諒耳因稱其人可使餘人不及臣不欲用媚道妄隨人主意以害國事同列竦息不敢動帝退謂左右曰蒙正氣量我不如既而卒用其人果稱職及罷相判河南曰引親舊於林園歡宴政尚寬簡委任僚屬事多總裁而已以吕端平章事張洎參知政事趙鎔知樞密院事初帝欲相端或曰端為人糊塗帝曰端小事糊塗大事不糊塗决意用之端居位持重識大體以清簡為務慮與寇準同列而已先正台揆恐準不平乃請參知政事與宰相分日押班知印同升政事堂帝從之遂為故事時同列奏對多有異議惟端罕所建明一日帝手札戒諭自今中書事必經吕端參酌乃得聞奏端愈謙讓不敢當洎博涉經史多知典故巧于將順善持論議為翰林學士帝嘗謂近臣曰張洎富有文藝至今尚苦學江東士人之冠也學士之職清要貴重非他官可比朕嘗恨不得為之甚見寵遇然洎性險詖好攻人短每為寇準規畫準心伏之以兄事焉遂極口談其才故至大任既與準同列奉之愈謹政事一决于準無所參預惟專修時政記甘言善柔而已何承矩敗契丹于雍州開寶皇后宋氏崩后崩遷梓宫于故燕國長公主第權殯于普齊佛舍諡曰孝章皇后貶翰林學士王禹稱知滁州開寶皇后崩羣臣不成服禹稱對客言后嘗母儀天下當遵用舊禮坐謗訕責知滁州禹稱立朝敢言以直躬行道為己任不為流俗所容故屢見擯斥六月以李繼遷為鄜州節度使繼遷不受初李繼遷遣押衙張浦以馬槖駝來獻帝令衛士翹關超乘引強奪槊于後園俾浦等觀且令兵士皆拓兩石弓帝笑問浦曰羌人敢敵否對曰羌部弓弱矢短但見此長巨人則已遁矣况敢敵乎繼遷上表乞禁邊盜掠詔從之至是遣閣門副使馮訥持詔拜繼遷鄜州節度使張浦為鄭州防禦使留京繼遷不受命秋八月立夀王元侃為皇太子更名恆大赦太子既立廟見還宫京師民擁道喜躍曰少年天子也帝聞之不懌召冦準謂曰人心遽歸太子欲置我何地準再拜賀曰此社稷之福也帝悟入語后嬪宫中皆前慶帝喜復出延準飲極醉而罷以尚書左丞李至吏部侍郎李沆並兼太子賓客詔太子以師傅禮事之太子每見至沆必先拜至沆不敢當上表辭謝帝不許九月封牂牁蠻酋龍漢􅚜為歸化王其部凡十一州皆依山險以寇掠為事李繼遷寇清逺軍張延敗之冬十一月召王繼恩還以上官正雷有終並為西川招安使契丹置義倉契丹冊王治為髙麗國王髙麗連嵗奉貢于契丹契丹主遣使冊之王治遂遣其童子十人往習契丹語十二月契丹韓德威侵府州折御卿禦之卒于師詔以其子惟正知府州事韓德威諜知御卿有疾遂帥衆攻府州御卿力疾禦之德威聞其至不敢戰會疾甚母密召之御卿曰世受國恩邊寇未减御卿罪也臨敵棄士卒自便不可死于軍中乃其分耳太夫人無念我忠孝豈兩全言訖泣下翌日卒于師新渾儀成秋官正韓顯符造銅渾儀成詔司天臺置之契丹以韓德讓為大丞相丙申二年契丹統和十四年春二月以李昌齡參知政事帝謂昌齡曰中書政本當進用善良博詢衆議以正道公議臨之即怨謗無由生矣三月髙麗請婚于契丹契丹許之高麗與契丹接壤數被侵擾以受封中國不即臣服之嘗上表求援帝以北鄙甫寧不欲為外夷復開邊隙但賜詔慰撫之髙麗遂與中國絶而附于契丹既受其封事之甚謹因求婚焉契丹以東京留守駙馬蕭恆德女為越國公主許之未成婚而女死夏四月李繼隆等帥師討李繼遷初帝命洛苑使白守榮護送芻粟四十萬于靈州李繼遷邀擊于浦洛河守榮衆潰運餉盡為繼遷所奪帝怒命李繼隆為環慶十州都部署將兵討之㑹四方館使曹璨自河西還言繼遷衆萬餘方圍靈武城中告急使為繼遷所得則頓兵不去矣吕端請發兵由麟府鄜延環慶三道以搗平夏襲其巢穴或云暑涉旱海無水泉糧運艱辛不如靜以待之帝不聽親部分諸將命繼隆出環丁罕出慶范廷召出延王超出夏張守恩出麟州五路進討直趨平夏秋七月冦準免是嵗正月祀南郊中外官皆進秩準素所喜者多得臺省清要官所惡及不相知者即序進之彭惟節馮拯俱為廣州通判惟節素列拯下及是惟節轉屯田貟外郎拯轉虞部貟外郎章奏列銜惟節猶處拯下準怒堂帖戒拯毋亂朝制拯憤上疏極陳準擅權且條上嶺南官吏除拜不平數事帝不懌張洎揣知帝嫉準懼一旦同罷乃奏準退朝誹謗帝益不悅會廣東轉運使康戬上言吕端張洎李昌齡皆準所引端德之洎能曲意承奉而昌齡畏懦不敢與抗故準得以任胸臆亂經制帝始大怒召端等責之端對曰準性剛自任臣等不欲數爭慮傷國體因再拜請罪及準入對帝語及拯事準請自辨帝曰若廷辨失執政體準猶力爭不已又持中書簿論曲直於帝前帝因歎曰鼠雀尚知人意况人乎遂罷知鄧州以丁惟淸知西涼府涼州周回二千里東界原州南界雪山吐谷渾蘭州西界甘州北界吐蕃領姑臧神烏番禾昌松嘉麟五縣戶二萬五千七百三十口十三萬城周回十五里李軌所築久不內屬至是請帥從之八月李繼隆不見冦而還范廷召遇李繼遷于烏白池敗之繼隆以環州道迂乃自青岡峽繞靈武徑趨平夏兵行數日與丁罕合又行十餘日無所見乃引還張守恩遇之不戰而遁王超范廷召遇之于烏白池大小數十戰獲其未幕軍主吃囉指揮使二十七人繼遷遁去超廷召欲進擊諸將失期士卒又困乃亦引還繼遷復令軍主史癿駐槖駝口以阻歸師繼隆遣田敏等力戰敗之諸將乃得濟師大有年丁酉三年契丹統和十五年春正月張洎罷以溫仲舒王化基參知政事李惟清同知樞密院事葬孝章皇后于永昌陵分天下州軍為十五路京東京西河北河東陜西江東江西浙東浙西淮南荆湖福建劒南東劒南西廣南凡十五路各置轉運使三月帝崩于萬嵗樓皇太子即位帝不豫宣政使王繼恩忌太子英明隂與參知政事李昌齡殿前都指揮使李繼勳知制誥胡旦等謀立故太子楚王元佐帝崩皇后令繼恩召吕端議所立端知有變鎖繼恩於書閣使人守之而入后問端曰宫車已晏駕立嗣以長順也今將如何端曰先帝立太子正為今日今始棄天下豈可遽違命有異議耶后默然乃奉太子至福寧殿即位太子既立垂簾引見羣臣端平立殿下不拜請卷簾升殿審視然後降階率羣臣拜焉太宗沈謀英斷儉勤納諫憫農慎刑好學重儒故能削平海內功業炳然遇災知懼過舉能悔是以民窮而不怨兵罷而能戢若夫太祖之崩不踰年而改元涪陵武功之不得其死宋后之不成喪後世不能無譏焉契丹封李繼遷為西平王夏四月尊皇后曰皇太后赦以李至李沆參知政事進封交址郡王黎桓為南平王五月李昌齡有罪貶為忠武軍節度行軍司馬討謀立楚王之罪貶昌齡為司馬降王繼恩為右監門衛將軍均州安置胡旦除名長流潯州李繼勳以使相赴陳州而釋其餘黨立秦國夫人郭氏為皇后后宣徽南院使守文之女太宗為帝聘之至是立焉六月追復涪王廷美為秦王詔諸州勿得獻祥瑞復封兄元佐為楚王錢若水罷秋八月趙鎔李惟清罷以曹彬為樞密使向敏中夏侯嶠為副使以孔世延襲封文宣公雍熙中伐契丹文宣公宜督糧餉溺死於拒馬河延世其子也至是詔襲封焉冬十月葬永熙陵十一月髙麗王治卒姪誦立誦繼立嘗遣兵校徐逺來候朝廷德音不得達而還遂與中國絶十二月追尊太宗賢妃李氏為皇太后帝生母也李繼遷請降以為定難節度使復姓名曰趙保吉通鑑續編卷四
