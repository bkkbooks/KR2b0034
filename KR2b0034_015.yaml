body:
  text: 通鑑續編卷十二元陳桱撰乙未五年遼天慶五年金太祖完顔旻收國元年夏雍寧元年春正月女真完顔阿固達稱皇帝更名旻國號金阿固達既屢勝遼烏竒邁薩哈希卜蘇等率將佐勸其稱帝阿固達不許阿里罕普嘉努尼瑪哈等復曰今大功已建若不稱號無以繫衆心阿固達曰吾將思之烏竒邁等復以為言正月朔遂即皇帝位更名旻且曰遼以賔鐡為號取其堅也賔鐡雖堅終亦變壞惟金不變不壞金之色白完顔色尚白况所居在愛新水之上乎於是國號大金改元收國其國語謂金為愛新故云然晏州夷反以趙遹為瀘南招討使帥師討平之知梅嶺堡髙公老之妻宗女也嘗出金玉器飲晏州夷酋卜漏等漏心艷之㑹瀘帥賈宗諒以斂竹木擾夷部且誣致其酋卜箇旁等罪夷人咸怨漏遂相結因上元張燈襲破梅嶺寨虜公老妻及其器物四出剽掠梓州轉運使趙遹行部昌州聞之倍道趨瀘劾宗諒罷之詔康延魯代宗諒聽遹節制遹隂有専討意兵端益大矣於是詔發陜西軍三萬以遹為招討使遹與别將馬覺張思正分道出期㑹於晏州漏據輪縛大囤其山崛起數百仭林箐深密諸夷為遹敗潰者悉赴之乃壘石為城外樹木柵當道穿坑阱仆巨枿布渠答夾以守障俯瞰官軍矢石所中皆靡碎遹力攻之不能進巡檢种友直所部多思黔土丁習山險而山多猱遹遣土丁捕之伐去蒙密緣崩石挽藤葛而上得猱數十頭束麻作炬灌以膏蠟縛於猱背暮夜復遣士丁負繩梯登崖顛乃縋梯引下人人銜枚挈猱蟻附而上比雞嗚友直等悉力擁刀斧穿箐入及賊柵出火燃炬猱熱狂跳賊廬舍皆茅竹猱竄其上火輒發賊號呼奔撲猱益驚火益熾官軍鼓譟破柵遹望見火麾軍躡雲梯攻其前兩軍相應賊擾亂不復能抗赴火墮崖死者不可勝計斬數千人漏突圍走至輪多囤追獲之晏州平諸夷落皆降拓地環二千里遹為建城寨畫疆畝募人耕種且習戰守號曰勝兵遼使耶律僧嘉努如金議和金主旻不從遼主使僧嘉努持書往議和書斥阿固達名且使為屬國阿固逹遣薩喇復書云若歸叛人阿蘇遷黃龍府於别地然後議之遼耶律鄂爾多帥師次於達嚕噶城金主旻來戰遼師敗績金主自將攻遼黃龍府進薄益州州人走保黃龍取其餘民而去遼遣都統鄂爾多左副統蕭伊實右副統耶律張嘉努都監蕭色佛哷將騎二十萬步卒七萬戍邉且屯田以為持久計金主聞之留羅索尼楚赫守黃龍而自率衆趨達嚕噶城金主登髙望遼兵若連雲灌木狀顧謂左右曰遼兵心二面情怯雖多不足畏遂趨髙阜為陳摩囉歡以右翼先馳遼左軍左軍却左翼出其陳後遼右軍皆力戰羅索尼楚赫衝遼中堅凡九陷陳皆力戰而出尼瑪哈請以中軍助之金鄂特本來往為疑兵摩囉歡已得利擊遼右軍遼兵遂敗金人乘勝追躡至其營㑹日已暮圍之黎明遼軍潰圍出金人逐北至阿嚕岡遼步卒盡殪耕具數千皆為金人所獲以給諸軍是役也遼人本欲屯田且戰且守故併其耕具皆失之童貫使劉法敗夏人於古骨龍貫遣熙河經略使劉法將步騎十五萬出湟州秦鳯經略使劉仲武將兵五萬出㑹州貫以中軍駐蘭州為兩路聲援仲武至清水河築城屯守而還法與夏右廂軍戰於古骨龍大敗之斬首三千餘二月立定王桓為皇太子赦桓帝長子顯恭皇后所生以童貫領六路邉事時永興鄜延環慶秦鳳涇原熙河各置經略安撫司以貫總領之於是西兵之柄皆屬於貫三月遼使耶律張嘉努諭降於金遼主使張嘉努等六人齎書使金猶斥阿固達名冀其速降金主以為書辭慢侮留五人獨遣張嘉努還報書亦斥遼主名夏四月作葆真宫改集賢殿為右文殿置宣和殿學士五月金主拜天射栁金承遼俗凡五月五日七月十五日九月九日行拜天禮禮畢則射栁於毬場遼復使耶律張嘉努如金張嘉努還遼主復遣持書往猶斥金主名金復書亦斥遼主名諭使速降六月作三山河橋蔡京以孟昌齡為都水使者鑿大岯三山創天成聖功二橋調役夫數十萬民不聊生遼使蕭色埒如金金人執之張嘉努還遼主復使蕭色埒往金主以書辭慢留之不遣秋七月戊戌朔日有食之金主以其弟烏竒邁為安班貝勒安班尊大之稱也又以烏古鼐之孫薩哈及舍音為固倫貝勒凡固倫貴稱所謂國相也遼耶律鄂爾多及金人戰於白馬濼遼師敗績八月作明堂初元豐禮官以明堂寓大慶殿别請建立以盡嚴奉而未暇講求至是下詔曰宗祀明堂以配上帝寓於殿寢禮蓋云闕崇寧之初嘗詔建立去古既逺歷代之模無足循襲朕刺經稽古度以九筵分其五室通以八風上圓下方參合先王之制相方視址於寢之南僝工鳩材自我作古以稱朕昭事上帝率見昭考之心宣示圖式於宣政殿且以明堂宜正臨丙方近東以據福德之地乃徙祕書省於宣德門東而以省地營之以蔡京為明堂使開局興工日役萬人嗣濮王仲增卒遼主伐金遼主下詔親征以阿巴為中軍都統張嘉努為都監率蕃漢兵十萬蕭奉先充御營都統諸行營都部署耶律章努副之以精兵二萬為先鋒餘分五部為正軍貴族子弟千人為硬軍扈從百司為護衛軍北出駱駝口以蕭呼圖克為都統柴誼為副將漢步騎三萬南出寧江州自長春州分道而進發數月糧期必滅女真八月有星流出於栁其光照地色赤黃有尾占者以為天子宗廟有喜國家建造宫室之象蔡京帥百官表賀九月金主旻陷遼黃龍府金主攻黃龍府次混同江無舟以渡金主使一人導前乘赭白馬徑涉曰視吾鞭所指而行諸軍隨之水及馬腹既濟使舟人測其渡處深不得其底九月朔遂陷黃龍府而去金主遣蕭色埒還遼金主既陷黃龍乃遣薩喇與色埒還遼書辭曰若歸我叛人阿蘇即當班師以仲御為嗣濮王遼師渡混同江先鋒部署耶律章努反伏誅遼師渡混同江副都統章努與魏國王淳妃弟蕭迪里及其甥蕭延留等謀迎立淳誘將士亡歸上京遣迪里以其謀告淳遼主知之遣駙馬蕭昱帥兵詣廣平淀淳護后妃而使行宫實達爾伊遜持書馳報淳迪里至所淳曰此非細事主上自有諸王當立北南面諸大臣不來而汝言及此何也密令左右拘之有頃伊遜等至備言章努之謀淳即斬迪里等攜其首單騎詣廣平淀待罪遼主遇之如初章努知淳不見聽乃率麾下掠取上京府庫財物至祖州帥其黨告太祖廟數遼主過惡天下土崩及欲立淳之故西至慶州復祀諸廟移檄州縣遂結渤海羣盜至數萬趨廣平犯行宫不克北趨降虜山順國女真阿固齊以三百騎一戰勝之擒其貴族二百餘人並斬以徇其妻子配役繡院或散諸近侍為婢餘得脫者皆奔女真章努詐為使者欲奔女真為邏者所獲縳送行在腰斬於市剖其心以獻祖廟支解其體徇於五路劉仲武王厚帥師伐夏敗績於臧底河仲武厚合涇原鄜延環慶秦鳳之師攻夏臧底河城敗績死者什四五秦鳯第三將全軍萬人皆沒厚懼重賂童貫匿不以聞未幾夏人大掠蕭關而去冬十月召陳顯為宣和殿學士不至十一月髙麗使子弟來就學十二月遼師至圖們都監耶律張嘉努反遼主引還金主旻追之遼師敗績於呼岱巴岡金人聞遼主親征尼瑪哈烏珠等以書至遼陽為卑哀之辭實欲求戰遼主怒下詔有女真作過大軍翦除之語金主聞之乃剺面仰天慟哭曰始與汝等起兵蓋苦契丹殘忍欲自立國今主上親征奈何非人死戰莫能當也不若殺我一族汝等迎降轉禍為福諸軍皆曰事已至此惟命是從金主遂帥師迎敵十一月遼主遣駙馬蕭特默林牙蕭扎拉等將騎兵五萬步卒四十萬親軍七十萬至圖們十二月己亥金主至鴨緑與其臣謀曰遼兵七十萬其鋒不可當吾軍逺來人馬疲乏宜駐于此深溝髙壘以待之乙巳遼都監張嘉努反遼主引兵還丁未金主自以騎兵候遼主軍獲督餉者知遼主西還其下請乘怠擊之金主曰敵來不迎戰去而追之欲以此為勇耶衆皆悚愧請自效金主曰誠欲追敵約齎以往無事餫餉若破敵何求不得衆皆奮躍遂追遼主及於呼岱巴岡金兵止二萬金主曰彼衆我寡兵不可分視其中軍最堅遼主必在焉敗其中軍可以得志使右翼先戰兵數交左翼合而攻之遼兵大潰金兵馳之橫出其中遼師敗死者枕藉相屬百餘里獲輿輦帟幄兵械軍資他寶物馬牛不可稱紀蕭特默焚營而遁金主亦引退初女真無步卒惟騎兵千餘刻小木牌係人馬為號五十人為一隊前二十人重甲持矛戈後三十人輕甲操弓矢每遇敵必二人躍馬而出觀陳之虛實四面結隊而馳擊百步之外弓矢齊發無不中者其分合出入應變周旋人自為戰所以恆勝金瓜爾佳薩哈陷遼開州金主詔曰自破遼兵來降者衆宜加優恤自今諸部官民已降或為軍所俘獲逃遁而還者勿罪仍官其大將且使從宜居處丙申六年遼天慶六年金收國二年春正月遼髙永昌據遼陽以叛東京留守蕭保先嚴酷渤海苦之正月朔夜半有惡少年十餘乘酒執刀踰垣入府刺殺保先户部使大公鼎聞亂即攝留守事與副留守髙清明集遼漢兵千人盡捕其衆斬之撫定其民禆將渤海髙永昌時以兵三十屯八甔口見遼政日衰金兵方强遂覬覦非常誘渤海并戍卒入遼陽據之旬日之間逺近響應有兵八千人因僣號稱隆基元年遼主遣蕭伊遜髙興順招之不從閏月貴德州耶律伊都以廣州渤海叛附於永昌遼主遣蕭罕嘉努張琳討之賜方士林靈素號通真達靈先生溫州人林靈索少從浮屠苦其師笞罵去為道士善妖幻往來淮泗間丐食僧寺僧寺苦之及王老志死王仔昔寵衰帝訪方士於左階道籙徐知常知常以靈素對即召見靈素大言曰天有九霄而神霄為最髙其治曰府神霄玉清王者上帝之長子主南方號長生大帝君陛下是也既下降於世其弟號青華帝君者主東方攝領之義有左元仙伯書罰仙吏禇慧等八百餘官今蔡京即左元仙伯王黼即文華吏盛章王革即園苑寶華吏鄭居中童貫等皆有名而已即禇慧下降也佐帝君之治時劉貴妃方有寵靈素以為九華玉真安妃帝心獨喜其事甚加寵信賜號通真達靈先生賞賚無算靈素本無所能惟稍習五雷法召呼風霆間禱雨有小驗而已以童貫為陜西河北宣撫使劉法帥師伐夏克仁多泉城劉法劉仲武合熙秦之師十萬攻夏仁多泉城城中力守援不至乃降法受而屠之种師道帥師伐夏克臧底城閏月立道學從林靈素之言也尋詔太學辟雍各置內經道德經莊列博士二員二月詔增廣天下學舍詔修御河及廣京城夏四月㑹道士於上清寶籙宫初帝以未得嗣子為念道士劉混康以法籙符水出入禁中建言京城西北隅地協堪輿倘形勢加以少髙當有多男之祥始命為數仭岡阜已而後宫生子漸多帝甚喜始信道教於是蔡攸倡為異聞謂有珠星璧月跨鳯乘龍天書雲篆之符以逢迎之遂竭國家之力以經營土木之工及聞林靈素之言復於景龍門對晨暉門作上清寶籙宫密連禁署宫中山包平地環以佳木清流列諸館舍臺閣多以美材為楹棟不施五彩有自然之勝上下立亭宇不可勝計帝時登皇城下視之由是開景龍門城上作復道通寶籙宫以便齊醮之事金斡魯攻髙永昌殺之遂陷遼東京州縣髙永昌據東京使托卜嘉求援於金且曰願併力以取遼金主使華沙布謂永昌曰同力取遼固可東京近地汝輒據之以僣大號則不可若能歸款當授王爵永昌不從金主乃遣斡魯帥諸軍攻永昌遇遼兵敗之遂取瀋州永昌聞之大懼使伊喇圖喇至金師請去僣號稱藩斡魯知其詐進兵攻之永昌遂殺華沙布等率衆拒金遇於活水金師既濟永昌之軍不戰而却逐北至遼陽城下明日永昌盡率其衆與金戰又大敗遂以五千騎奔長松遼陽人恩勝努仙格執永昌妻子以城降托卜嘉亦執永昌以獻金主命殺之於是遼之東京州縣及南路係遼女真皆降於金金主詔除遼法省賦稅置明安穆琨以斡魯為南路都統烏楞知東京事何執中致仕執中輔政一紀年髙疾甚賜之寬告他日造朝命止赴六參起居退治省事遂以太傅就第朝朔望儀物廪稍一如居位時入見帝曰自相位致為臣數十年無此矣執中對曰昔張士遜亦以舊學際遇用太傅致仕與臣適同帝曰當時恩禮恐未必爾執中頓首謝未幾卒贈太師清源郡王諡正獻執中嘗為端王侍講故終始恩遇不替然無所建明惟以謹畏迎順主意贊飾太平而已詔蔡京三日一朝正公相位總治三省事時人稱為公相五月以鄭居中為少保太宰劉正夫為特進少宰鄧洵武知樞密院事時蔡京大興工役民不聊生變亂法度吏無所師鄭居中每為帝言帝亦惡京専乃拜居中太宰使伺察之又以正夫議論數與京異拜為少宰居中存紀綱守格令抑僥幸振淹滯士論翕然望治六月遼以秦晉國王淳為都元帥秋八月詔天下監司搜訪巖谷之士雖恢詭譎怪自晦者悉以名聞幸蔡京第金薩哈陷遼保州保州本髙麗地薩哈攻之久不克髙麗使謂金曰保州本吾壤土願以見還金主曰爾其自取之而益薩哈兵令無合髙麗至是拔之以薛昻為尚書左丞侯蒙為中書侍郎九月帝詣玉清和陽宫上玉帝徽號赦九月辛卯朔帝奉玉冊玉寶如玉清和陽宫上玉帝尊號曰太上開天執符御厯含真體道昊天玉皇上帝蓋以論者析玉皇大天帝昊天上帝言之不能致一故也又詔天下洞天福地修建宫觀塑造聖像西內成赦京西路加童貫開府儀同三司冬十一月以白時中為尚書右丞十二月遷九鼎於圜像徽調閣初方士王仔昔言九鼎神器不可藏於外乃改帝鼐為隆鼎彤鼎為明鼎阜鼎為順鼎皛鼎為藴鼎魁鼎為建鼎牡鼎為和鼎蒼鼎為育鼎岡鼎為潔鼎唯寶鼎如舊自九成宫徙於天章閣至是又為圜像徽調閣閣上神像左周鼎星君中帝席星君閣下鼎鼐神像各守逐鼎布列帝詣閣奉安明日復詣閣行香百官陪位尋詔九鼎新名乃狂人妄改皆無依據宜復舊名劉正夫致仕正夫由博士入都馴致宰相能迎時上下持祿養權至是以開府儀同三司致仕茂州夷郅永夀內附以其地為夀寧延寧軍丁酉七年遼天慶七年金天輔元年春正月遼春州及遼東渤海叛降於金金舍音陷遼泰州二月封段和譽為大理國王和譽大理國主也㑹道士於上清寶籙宫二月甲子㑹道士二千人於宫詔林靈素諭以帝君降臨事焉策髙麗進士於集英殿賜權適等四人上舍及第改天下天寧萬夀觀為神霄玉清萬夀宫無觀以僧寺充幸上清寶籙宫命林靈素講道經自是每設大齊輒費緍錢數萬謂之千道㑹令士庶入殿聽靈素講經帝為設幄其側靈素據髙座使人於下再拜請問然所言無殊絶者時時雜以捷給嘲詼以資媟笑莫有君臣之禮復令吏民詣宫授神霄祕籙朝士之嗜進者亦靡然趨之三月以宦者童貫權領樞密院夏四月道籙院上章冊帝為教主道君皇帝帝諷道籙院曰朕乃上帝元子為太霄帝君憫中華被金人之教遂懇上帝願為人主令天下歸於正道卿等可上表章冊朕為教主道君皇帝於是羣臣及道籙院上表冊之然止用於教門章疏內而不施於政事升溫州為應道軍為林靈素也五月帝詣玉清和陽宫上地祇徽號詔曰王者父天母地乃者祇率萬邦黎庶强為之名以玉冊玉寶昭告上帝而地祇未有稱謂謹上徽號曰承天效法厚地光大后土皇地祇詣宫上寶冊儀禮一如上帝命蔡攸提舉祕書省并左右街道籙院祭地於方澤改玉清和陽宫為玉清神霄宫六月明堂成進封蔡京為陳魯國公辭不受詔自今季秋大亨親祠明堂如孟月朝獻禮罷有司攝事秋七月置提舉御前人船所時東南監司郡守二廣市舶率有應奉又有不待㫖但送物至都計㑹宦者以獻大率靈壁太湖慈溪武康諸石二浙竒竹異花海錯福建荔枝橄欖龍眼南海椰實登萊文石湖湘文竹四川佳果木皆越海渡江毁橋梁鑿城郭而至植之皆生而異味珍苞則以健步捷走雖甚逺數日即達色香未變也至是蔡京又言陛下無聲色犬馬之奉所尚者山林間物乃人之所棄但有司奉行之過因以致擾願節其浮濫乃請作提舉淮浙人船所命內侍鄧文誥領之欲以便民而擾害如故作定命寶時得于闐大玉踰二尺色如截昉帝乃製為寶文曰範圍天地幽贊神明保合太和萬夀無疆篆以魚蟲制作之工幾於秦璽號曰定命寶合前八寶為九詔以九寶為稱以定命寶為首且曰八寶者國之神器至於定命乃我所自製也八月鄭居中以母喪去位居中與蔡京不相能及居喪京懼其起復以居中王圭之壻乃使蔡確子懋重理定策事以沮之遂追封確清源郡王御製文立石墓前而擢用居中諸子於朝懋即渭也髙麗使蒲馬如金以請保州金人不許金之拔保州也髙麗兵已在城中金人入守髙麗王使蒲馬如金以請之金主曰保州近爾邉境聽爾自取今乃勤我師徒破敵城下不可九月有事於明堂赦遼置怨軍遼主自燕至隂涼河募遼東人為兵使報怨於女真號曰怨軍凡八營募自宜州者曰前宜後宜自錦州者曰前錦後錦自乾自顯曰乾曰顯又有乾顯大營岩州營凡二萬八千餘人屯衛州蒺藜山以渤海鐡州人郭藥師等為帥冬十月乙卯朔初御明堂班朔布政侯蒙罷祭京惡之也十一月命蔡京五日一赴都堂治事起復鄭居中為太宰以余深為特進少宰白時中為中書侍郎十二月以薛昻為門下侍郎下方士王仔昔獄殺之仔昔倨傲而戅帝待以客禮故遇宦侍若僮奴又欲羣道士皆宗已林靈素忌之與宦者馮浩誣以言語怨望下獄死詔天神降於坤寧殿以童貫領樞密院事作萬歲山於京師命户部侍郎孟揆於上清寶籙宫東築山以象餘杭之鳯皇山號曰萬歲周十餘里焉安置祕書丞黃葆光於昭州時大旱帝以為念於是黃葆光上疏言蔡京彊悍自専侈大過制無君臣之分鄭居中余深依違畏避不能任天下之責故致此異疏上不報且欲再上章京權勢震赫舉朝結舌葆光獨出力攻之京懼中以他事貶知昭州立山縣又使言官論其附㑹交結泄漏密語詔揭示其章而竄之遼耶律淳帥師次於蒺藜山金烏楞古來戰淳敗走金人追之遂陷顯乾懿豪徽成川惠等州秦晉國王淳㑹四路兵馬防秋遺金咸州都統烏楞古書議和烏楞古告於金主金主曰歸我行人薩喇及送阿蘇等則和議可成淳軍至蒺藜山烏楞古及知東京事烏楞等進攻顯州遼淵軍帥郭藥師乘夜襲走之烏楞古遂與淳戰淳敗走烏楞古追至阿爾古陂遂拔顯州於是乾懿豪徽成川惠七州皆降之金主旻遣使求封冊於遼遼東鐡州人楊朴言於金主曰自古英雄開國必先求大國封冊金主從之使至遼時遼東路諸州盜賊蜂起掠民自隨以充食樞密院使蕭奉先等以為自此可以弭兵勸遼主許之便戊戌重和元年遼天慶八年金天輔二年春正月受定命寶於大慶殿赦元符上書邪中等人亦得準依無過人例以王黼為尚書左丞黼美風姿有口辨才踈雋而寡學術然多智善佞初為左司諌時張商英為相寖失帝意帝遣使以玉環賜蔡京於杭黼覘知之因數條奏京所行政事并擊商英及京復相德其助已歲中三遷為御史中丞黼欲京専國遂疏何執中二十罪已而改翰林學士㑹京與鄭居中不合黼復內交居中京由是怨之徙為户部尚書將陷以罪黼以智獲免還為學士承㫖遂入政府遼使耶律努格議和於金金主復書曰能以兄事朕歲貢方物歸我中京上京興中府三路州縣以親王公主駙馬大臣子孫為質還我行人及元給信符并宋夏髙麗往復書詔表牒則可以如約遼雙州降於金二月詔馬政浮海如金豫請燕雲之地建隆中女真嘗自其國之蘇州泛海至登州賣馬故道猶存至是有漢人髙藥師者泛海來言女真建國屢破遼師登州守臣王師中以聞詔蔡京童貫共議命師中募人同藥師等齎市馬詔以往不能逹而還帝乃復委童貫選人使之遂遣武義大夫馬政同藥師由海道如金致書於金主曰日出之分實生聖人竊聞征遼屢破勍敵若克遼之後五代時陷入契丹漢地願畀下邑三月遼復使耶律努格如金申前議也夏四月築靖夏及制戎城五月壬午朔日有食之賜方士林靈素號通真達靈元妙先生張虛白為通元冲妙先生帝惑於林靈素之言建宫觀遍天下又造青華正晝臨壇及火龍神劍夜降內宫之事託天神臨降因造帝誥天書雲篆務以惑世欺衆其說妄誕不可究質宦者道士有所不快必託為帝誥則莫不如志尋賜靈素視中大夫出入訶引至與諸王爭道都人稱曰道家兩府其徒美衣玉食者幾二萬人遼使耶律努格如金要以酌中之議金使耶律呼圖克昆如遼呼圖克昆報使悉守前議立元成節時詔以老子生辰為貞元節復以青華帝君八月九日生辰為元成節六月遼使耶律努格如金齎宋夏髙麗書詔表牒往秋七月加鄭居中少傅余深少保鄧洵武特進以西師有功也金使耶律呼圖克昆如遼金主使呼圖克昆與努格如遼免取質子及上京興中府所屬州郡裁減歲幣之數且曰如能以兄事我冊用漢儀可以如約八月加宦者童貫太保遼使耶律努格議冊禮於金遼使努格及托多使金議冊禮至金金主留托多而遣努格還謂曰言如不從勿復遣使掖庭大火自甲夜達曉大雨如傾火益熾凡爇屋五千餘間後苑廣聖宫及宫人所居幾盡焚死者甚衆九月薛昻罷以白時中王黼為門下中書侍郎馮熙載范致虛為尚書左右丞遼使耶律努格如金努格至金復與托多俱還作神霄九鼎帝用方士言鑄神霄九鼎鼎成名曰太極飛雲洞劫之鼎蒼壺祀天貯醇酒之鼎山嶽五神之鼎精明洞淵之鼎天地隂陽之鼎混沌之鼎浮光洞天之鼎靈光晃耀煉神之鼎蒼龜火蛇蟲魚金輪之鼎奉安於上清寶籙宫之神霄殿帝如上清寶籙宫帝如宫度玉清神霄祕籙㑹者八百人時道士有俸每一齊施動獲數十萬每一觀給田亦不下數百千頃貧下之人多買青布幅巾以赴日得一飫餐而襯施錢三百謂之千道㑹作道史用蔡京言集古今道教事為紀志賜名道史鄭居中乞終喪制許之閏月立周恭帝後以為宣義郎詔周柴氏後已封崇義公復立恭帝後以為宣義郎監周陵廟世世為國三恪冬十月置道官道職道官二十六等道職八等有諸殿侍晨校籍授經以擬待制修撰直閣之名馬政以金索多來馬政至金金主與尼瑪哈等共議乃遣索多與政來報使復書曰所請之地今當與大朝夾攻得者有之本朝自取不在分割之議十二月置裕民局遼使耶律努格如金議定冊禮遼大饑乾顯宜錦興中等路斗粟直數縑民削榆皮食之己亥宣和元年遼天慶九年金天輔三年春正月詔更號佛為大覺金仙僧為德士寺院為宫觀林靈素欲盡廢釋氏以逞前憾請詔改佛號大覺金仙餘為仙人大士僧為德士易服飾稱姓氏寺為宫院為觀改女冠為女道尼為女德尋詔德士並許入道學依道士之法金李善慶來趙有開如金不至而復以余深為太宰王黼為少宰黼賜第城西日導以教坊樂供張什器悉取於官寵傾一時是時朝廷已納趙良嗣之計將㑹金以圖燕㑹諜云遼主有亡國之相黼聞畫學正陳堯臣善丹青精人倫因薦堯臣使遼堯臣即挾畫學塵二人與俱繪遼主像以歸言於帝曰遼主望之不似人君臣謹畫其容以進若以相法言之亡在旦夕幸速進兵兼弱攻昧此其時也并圖其山川險易以上帝大喜取燕雲之計遂決帝耕藉田罷裕民局封占城楊卜麻疊為占城國王占城在中國西南東至海西至雲南南至真臘一月程北至交州四十日所統大小聚落一百五大略如州縣自上世未嘗通上國周顯德中始入貢自是朝貢不絶然與交州相近互相侵擾焉詔封為王始與交址加恩均矣金使烏凌阿贊謨如遼迎封冊也二月加鄧洵武為少保三月以馮熙載為中書侍郎范致虛張邦昌為尚書左丞遼使蕭實訥埒冊金主旻為東懷國皇帝金主弗受詔馬政如金議夾攻遼以取燕雲政與索多復如金議同攻遼童貫使劉法帥師伐夏敗績於統安城法走還夏人追殺之童貫使熙河經略使劉法取朔方法不欲行强遣之乃引兵二萬出至統安城遇夏主弟察克率步騎為三陳以當法前軍而别遣精騎登山出其後大戰移七時前軍楊惟忠敗入中軍後軍焦安節敗入左軍朱定國力戰自朝至暮兵饑馬渴死者甚多法乘夜遁比明走七十里至蓋朱峗守兵見追之墜崖折足為一别贍軍斬首而去是役死者十萬法名將既死諸軍恟懼貫隱其敗而以捷聞察克見法首惻然語其下曰劉將軍前敗我於古骨龍仁多泉吾常避其鋒謂天生神將豈料今為一小卒梟首哉其失在恃勝輕出不可不戒遂乘勝圍震武劉仲武何瓘等赴之震武在山峽中熙秦兩路不能餉自築三歲間知軍李明孟清皆為夏人所殺至是城又將陷察克曰勿破此城留作南朝病塊乃自引去宣撫使司以捷聞受賞者數百人諸路所築城寨皆不毛夏所不爭之地而關輔為之蕭條夏四月丙子朔日有食之五月有龍見於京師初京師茶肆傭晨興見大犬蹲榻傍近視之則龍也軍器作坊兵士取而食之逾五日大雨如注厯七日而止京城外水髙十餘丈帝懼甚命户部侍郎唐恪決水下流入五丈河起居郎李綱言國家都汴百五十餘年矣未嘗有此異夫變不虛生必感召之灾望求直言採而用之以答天戒詔貶綱一官與縣去六月追封周莊周列禦寇為真君封莊周為微妙元通真君列禦寇為致虛觀妙真君仍行冊命配享混元皇帝夏人來詔童貫罷兵關右既困童貫諷夏人因遼進誓表納欵遂詔六路罷兵及夏遣使來賀天寧節授以誓詔夏使不取貫不能屈但迫館伴强之使持還及邉境棄之道中而去賈炎得而上之貫始大沮金色埒赫嚕來秋七月加宦者童貫太傅封涇國公時人稱蔡京為公相貫為媪相金使烏凌阿贊謨如遼遼冊至金金主以無兄事之語又不稱大金而言東懷乃小邦懷其德之義及有渠材二字語涉輕侮若遙芬多戩等言皆非善意殊乖體式如依前書所定然後可從乃復使贊謨如遼議且責之八月范致虛以母喪去位時朝廷欲用師契丹致虛言邉隙一開必有意外之患宰相謂其懷異㑹母喪去位竟不起復金頒女真字女真初無文字及獲契丹漢人始通契丹漢字於是烏頁摩囉歡古新等學之摩囉歡雨月盡通契丹文字遂與鄂特本等立法定制凡與遼宋往來書問皆摩囉歡古新主之金主遂命古新依倣漢人楷字因契丹字制度合本國語制女真字行之九月宴蔡京於保和新殿幸蔡京第帝幸道德院觀金芝遂幸蔡京第時京子攸倏翛及攸子行皆為大學士鞗尚帝女茂德帝姬家人厮養亦居大官媵妾封夫人京每侍上恆以君臣相悅為言帝時乘輕車小輦頻幸其第命坐賜酒略用家人禮京謝表有云主婦上夀請酬而肯從稚子牽衣挽留而不却蓋實事也加淮康軍節度使蔡攸開府儀同三司攸有寵於帝進見無時與王黼得預宫中祕戲或侍曲宴則攸黼著短衫窄袴塗抹青紅雜倡優侏儒中多道市井淫媟謔浪之語以獻笑取悅攸妻宋氏出入禁掖攸子行領殿中監視執政寵信傾其父攸嘗言於帝曰所謂人主當以四海為家太平為娛歲月能幾何豈徒自勞苦帝深納之遂數微行因令苑圃皆倣江浙為白屋不施五采多為村居野店及聚珍禽異獸動數千百以實其中都下每秋風靜夜禽獸之聲四徹宛若山林陂澤之間識者知其不祥之兆焉遼使蕭實訥埓如金遼主使實訥埓先持冊藁使金而後遣使送烏凌阿贊謨還安定郡王世福卒冬十月以紹述熙豐政事書布告天下十一月以張邦昌王安中為尚書左右丞安中附童貫王黼為中丞因論蔡京罪為帝所知遂居政府放太學生鄧肅歸田里肅以朱勔花石綱害民進詩諷諫詔放歸田里十二月帝微行竄袐書省正字曹輔於郴州帝自政和以來多微行乘小轎子數內臣𨗳從置行幸局局中稱出日為有排當次日未還則傳㫖稱瘡痍不坐朝始民間猶未知及蔡京謝表有輕車小輦七賜臨幸自是邸報聞四方而臣僚阿順莫敢言曹輔上疏諫曰陛下厭居法宫時乘小輦出入㕓陌之中郊坰之外極逰樂而後返道途之言始猶有忌今乃談以為常臣不意陛下當宗廟社稷付託之重玩安忽危一至於此夫君之與民本以人合合則為腹心離則為楚越畔服之際在於斯須甚可畏也蚩愚之民萬一當乘輿不戒之初一夫不逞包藏禍心雖神靈垂護然亦損威傷重矣又况有臣子不忍言者可不戒哉帝得疏出示宰臣令赴都堂審問余深曰輔小官何敢論大事輔曰大官不言故小官言之官有大小愛君之心一也王黼陽顧張邦昌王安中曰有是事乎皆應以不知輔曰茲事雖里巷小民無不知相公當國獨不知耶曽此不知焉用彼相黼怒令吏從輔受詞輔操筆曰區區之心一無所求愛君而已退待罪於家黼奏不重責輔無以息浮言遂編管郴州初輔將有言知必獲罪召子紳來付以家事乃閉户草疏及貶怡然就道召楊時為祕書郎時南劒將樂人初舉進士第閫程皓兄弟講孔孟絶學於河洛時調官不赴以師禮見皓於潁昌相得甚歡其歸也皓目送之曰吾道南矣及皓卒又師事程頥於洛蓋年四十矣一日頥偶瞑坐時與遊酢侍立不去頥既覺則門外雪深一尺矣後厯知瀏陽餘杭蕭山三縣皆有惠政民思之不忘時安於州縣未嘗求聞達而德望日重四方之士不逺千里從之遊號曰龜山先生㑹蔡京客張觷言於京曰宗社危在旦夕宜亟引舊德老成置諸左右以開𨗳上心羅天下忠義之士分布內外京問其人觷以時對京因薦之㑹路允迪自髙麗還言髙麗國主問龜山先生安在乃召為祕書郎庚子二年遼天慶十年金天輔四年夏元德元年春正月罷道學林靈素有罪放歸田里靈素初與道士王允誠共為神怪之事後忌其相軋毒殺允誠遂専用事益肆橫恣道遇皇太子弗斂避太子入訴於帝帝怒以靈素為太虛大夫斥還故里命江端本通判溫州察之端本廉得其居處過制罪詔徙安置楚州命下而靈素已死遺奏至猶以侍從禮葬焉二月趙良嗣如金議取燕雲遣右文殿修撰趙良嗣同金使色埒赫嚕往議取遼燕京西京之地金使烏凌阿贊謨如遼金主使贊謨持書及冊文副本至遼且責其乞師於髙麗三月遼使蕭實訥埓如金復議冊禮金主旻不許遼以金人所定大聖二字與先世稱號同遣實訥埓往議金主怒謂其臣曰遼人屢敗遣使求成惟飾虛詞以為緩師之計當議進兵乃令咸州路統軍司治軍旅修器械具數以聞將以四月二十五日進師令色克留兵一千鎮守棟摩以餘兵來㑹於渾河和議遂絶夏五月竄布衣朱夢說於池州上書論宦寺權太重也金主旻侵遼上京留守耶律托卜嘉以城降之金主自將攻遼以遼使實訥埒宋使趙良嗣從遣降者馬乙持詔諭城中使速降遼主方獵於呼圖哩巴聞金舉兵命耶律拜薩巴等選精兵三千以濟師五月壬子金主至臨潢城中侍禦備固守甲寅金主命進攻且謂實訥埒趙良嗣曰汝可觀吾用兵以卜去就遂臨城督戰諸軍鼓噪而進自旦及已棟摩以麾下先登克其外城留守托卜嘉以城降良嗣等奉觴為夀皆稱萬嵗金主乃還六月詔蔡京致仕猶朝朔望京専政日久公論益不與帝亦厭薄之子攸權勢既與父相軋浮薄者復間焉由是父子各立門户遂為仇敵攸别居賜第一日詣京京正與客語使避之攸甫入遽起握父手為診視狀曰大人脉勢舒緩體中得無有不適乎京曰無之攸曰禁中方有公事即辭去客竊窺見以問京京曰君固不解此耶此兒欲以為吾疾而罷吾耳閲數日果以太師魯國公致仕仍朝朔望罷禮制及他局五十八所復僧寺額秋七月罷醫算學八月趙良嗣以金貝勒來議伐遼及歲幣良嗣謂金主曰燕本漢地欲夾攻遼使金取中京大定府宋取燕京析津府金主許之遂議歲幣與遼同金主因以手札付良嗣約金兵自平地松林趨古北江宋兵自白溝夾攻不然不能從因遣貝勒偕良嗣還以致其言九月復德士為僧詔馬政如金報師期許歲幣帝使政報聘書云大宋皇帝致書於大金皇帝逺承信介特示函書致罰契丹逖聞為慰確示同心之好共圖問罪之師誠意不渝當如來約已差童貫勒兵相應彼此兵不得過關歲幣之數同於遼冬十月戊辰朔日有食之加內侍河東節度使梁師成太尉師成黠慧習文法初領睿思殿文字外庫主出外傳上㫖政和中漸得幸因竄名進士籍中纍遷至河東節度使遂加太尉時中外泰寧帝留意禮文符瑞之事師成逢迎希恩寵帝本以隸人畜之命入處殿中凡御書號令皆出其手多擇善書吏習倣帝書雜詔㫖以出外廷莫能辨師成實不能文而髙自標榜自言蘇軾出於時天下禁誦蘇文其尺牘在人間者皆毁去師成訴於帝曰先臣何罪自是軾之文乃稍出以翰墨為己任四方俊秀名士必招致門下往往遭㸃汚多置書畫卷軸於外舍邀賔客縱觀得其題識合意者輒密加汲引執政侍從可階而升王黼以父事之稱為恩府先生蔡京父子亦諂附焉都人目為隱相所領職局至數十百建德軍清溪民方臘作亂清溪民方臘世居縣揭村託左道以惑衆初唐永徽中睦州女子陳碩真反自稱文佳皇帝故其地相傳有天子基臘因益得憑籍以自信縣境梓桐幫源諸洞皆落山谷幽險處民物繁夥有漆楮杉材之饒富商巨賈多往來臘有漆園造作局屢酷取之臘怨而未敢發時朱勔領應奉局於蘇花石之擾比屋致怨臘因民不忍隂聚貧乏游手之徒以誅勔為名起作亂自號聖公建元永樂置官吏將帥以巾飾為别自紅巾而上凡六等無弓矢介胄唯以鬼神詭袐事相扇訹焚室廬掠金帛子女誘脅良民為兵人安於太平不識兵革聞金鼓聲即斂手聽命不旬日聚衆至數萬兩浙都監蔡遵顔坦擊之皆敗死於息坑十一月余深罷時福建以取花果擾民深為言之帝不悅出知福州以王黼為少保太宰初蔡京致仕黼陽順人心悉反其所為四方翕然稱為賢相及拜太宰遂乘髙為邪多蓄子女玉帛自奉僣擬禁省因請置應奉局自兼提領中外名錢皆許擅用竭天下財力以供費官吏承望風㫖凡四方水土珍異之物悉苛取於民進帝所者不能什一餘皆入於黼家十二月方臘陷建德軍歙衢杭州以童貫為江淮荆浙宣撫使帥師討之臘攻陷青溪遂陷睦歙州東南將郭師中戰死遂南攻衢殺郡守彭汝方北掠新城桐廬富陽諸縣進逼杭州郡守趙霆棄城走州即陷殺制置使陳建廉訪使趙約縱火六日死者不可勝計凡得官吏必斷臠支體探其肺腸或熬以膏油叢鏑亂射備盡楚毒以償怨心警奏至京師時方聚兵以圖北伐王黼匿不以聞於是凶焰日熾附者益衆東南大震淮南發運使陳遘上言臘衆强東南兵弱乞調京畿兵及鼎灃槍牌手兼程以來使不至滋蔓帝得疏始大驚乃罷北伐之議而以童貫為宣撫使談稹為兩浙制置使率禁旅及秦晉蕃漢兵十五萬討之以鄭居中權樞密院事封真臘金裒賔深為真臘國王真臘一名占臘在占城南東際海地方七千里有戰象二十萬政和中始通中國至是遣郎將麾臘摩秃防來朝詔封之比占城辛丑三年遼保大元年金天輔五年春正月鄧洵武卒鄧氏自綰以來世濟其姦而洵武阿蔡京尤甚京之敗亂天下禍源自洵武始童貫至蘇州承詔罷蘇杭州造作局及御前綱運并木石彩色等場初帝以東南之事付童貫且曰如有急即以御筆行之貫至吳見民困花石之擾衆言賊不亟平坐此耳貫即命其僚董耘作手詔罪已罷進奉諸局場而帝亦黜朱勔父子弟姪之在職者吳民大悅方臘陷婺州二月罷方田罷天下學校三舍法及宗學辟雍諸路提舉學事官方臘陷處州淮南盜宋江寇京東州郡至海州張叔夜敗之江乃降宋江起河朔轉掠十郡官軍莫敢攖其鋒聲言將至海州知州張叔夜使間者覘所向江徑趨海濵劫掠以巨舟十餘載鹵獲叔夜募死士得千人設伏近城而出輕兵距海誘之戰先匿壯卒海旁伺兵合舉火焚其舟賊聞之皆無鬭志伏兵乘之擒其副賊江乃降初知亳州侯蒙上書言江以三十六人橫行齊魏官軍數萬無敢抗者其才必過人今清溪盜起不若赦江使討方臘以自贖不許方臘寇秀州官軍敗之臘將方七佛引衆六萬攻秀州統軍王子武乘城固守已而大軍至合擊賊斬首九千築京觀五賊還據杭州遼主殺其文妃蕭氏南面都統耶律伊都叛降於金遼主有四子長曰趙王實訥埒次曰晉王額嚕溫次曰秦王定次曰許王晉王文妃蕭氏色色所生出為大丞相耶律隆運後性樂道人善而矜人不能一時號為長者及長積有人望內外歸心女直作亂境內郡縣所失幾半而遼主畋遊不恤忠臣多被踈斥文妃作歌諷諫遼主見而銜之樞密使蕭奉先元妃之兄而秦王許王之舅也以國人屬意晉王恐秦王不得立因潜圖之文妃姊適耶律達哈拉妹適耶律伊都一日其姊若妹俱㑹軍前奉先諷人誣文妃與駙馬蕭昱及伊都達哈拉等謀立晉王而尊遼主為太上皇遼主遂誅蕭昱達哈拉等而賜文妃死獨未忍加罪晉王伊都在軍中聞文妃等死大懼即率千餘騎叛降於金遼主遣蕭錫默蕭德恭耶律特哩衮蕭和尚等將兵追之及諸閭山縣伊都等謀曰主上信蕭奉先言奉先視吾輩蔑如也伊都乃宗室豪俊常不肯為奉先下若擒伊都他日吾黨皆伊都也不若縱之還即紿曰追襲不及奉先既見伊都之亡恐後日諸校亦叛乃驟加錫默等爵賞以結其心伊都至金金主見之因詔咸州都統司曰自伊都來灼見遼國事宜已決議親征其治軍以俟師期毋怠以陳遘為江淮經制使命遘經制七路治於杭州以供餽餉遘以財用不給創議度公私出納量增其贏號經制錢遂為東南七路之害夏四月童貫執方臘歸於京師二月童貫談槇前鋒至青河堰水陸並進臘復焚官舍府庫民居乃宵遁還淳安幫源洞諸將劉延慶王禀王渙楊惟忠辛興宗王淵等相繼至盡復所陷城四月貫等合兵擊臘於幫源洞臘衆尚二十萬與官軍力戰而敗深據巖屋為三窟諸將莫知所入王淵禆將韓世忠潜行溪谷問野婦得徑即挺身仗戈直前渡險數里搗其穴格殺數十人擒臘以出辛興宗領兵截洞口掠其俘遂為己功併取臘妻子及僞相方肥等五十二人於梓峒石穴中殺賊七萬其黨皆潰臘凡破六州五十二縣戕平民二百萬所掠婦女自賊洞逃出裸而縊於林中者相望百餘里五月以鄭居中領樞密院大蝗安置御史中丞陳過庭於黃州過庭以睦寇竊發上言致寇者蔡京養寇者王黼竄二人則寇自平又言朱勔父子本刑餘小人交結權近竊取名器罪惡盈積宜昭正典刑以謝天下三人聞而憾之遂陷以不舉劾之罪罷知蘄州未半道責黃州安置金赫嚕卒閏月復應奉局命玉黼梁師成領之方臘既平王黼言於帝曰臘之起由茶鹽法也而童貫入姦言歸過陛下帝怒遂復諸應奉局朱勔復得志矣秋七月廢純滋等十二州黑眚見於禁中元豐末嘗有物大如席夜見寢殿上而神宗崩元符末又見哲宗崩至大觀間漸晝見政和以來大作每得人語聲則出先若列屋摧倒之聲其形僅丈餘倣佛如電金眼行動硜硜有聲黑氣蒙之不大了了氣之所及腥血四灑兵刃皆不能施又或變人形亦或為驢晝夜出無時遇冬則罕見多在掖庭宫人所居之地亦嘗及內殿後習以為常人亦不大怖至是寢少時洛陽府畿內忽有物如人或蹲踞如犬其色正黑不辨眉目始夜則掠小兒食之後雖白晝入人家為患所至喧然不安謂之黑漢有力者夜執槍自衛亦有託以作過者二年乃息云八月加宦者童貫太師封楚國公賞平方臘功也方臘伏誅改睦州為嚴州歙州為徽州九月加王黼少傅鄭居中少師詔宦者李彥括民田於京東西路初胥吏杜公才獻策於內侍太傅楊戩立法索民田契自甲之乙乙之丙展轉究尋至無可證則度地所出增立賦租始於汝州浸淫於京東西淮西北括廢堤棄堰荒山退灘及大河淤流之處皆勒民主佃額一定後雖衝蕩回復不可減號為西城所梁山濼古巨野澤綿亘數百里濟鄆數州賴其蒲魚之利亦立租算船納直犯者盜執之一邑率於常賦外增租錢至十餘萬緡水旱蠲稅此不得免擢公才為觀察使至是戩死以內侍李彥繼之彥天資狠愎密與王黼表裏置局汝州臨事愈劇凡民間美田使他人投牒告陳皆指為天荒雖執印劵皆不省魯山闔縣盡括為公田焚民故劵使田土輸租佃本業訴者輒加威刑致死者千萬公田既無二稅轉運使亦不為奏除悉均諸别州京東西提舉官及京東州縣吏劉寄任輝彥李士漁王滸毛孝立王隨江惇吕坯錢棫宋憲皆助彥為虐如奴事主民不勝忿痛前執政冠帶操笏迎謁馬首而彥處之自如發物供奉大抵類朱勔凡竹數竿用一大車牛驢數十頭其數無極皆責辦於民經時閲月無休息期農不得之田牛不得耕墾殫財靡芻力竭餓死或自縊轅軛間如龍鱗薜荔一本輦致之費踰百萬喜賞怒刑禍福轉手因之得美官者甚衆潁昌兵馬鈐轄范寥不為取竹彥誣以刋蘇軾詩文于石為十惡竟坐勒停彥所至州郡倨坐堂上監司郡守不敢抗禮有言于帝梁師成適在旁抗聲曰王人雖微序於諸侯之上豈足為過言者懼不敢復言冬十月詔童貫復領陜西河東河西路宣撫使十一月馮熙載罷以張邦昌為中書侍郎王安中李邦彥為尚書左右丞邦彥本銀工子也俊爽美風姿為文敏而工然生長閭閻習猥鄙事應對便捷善謳謔能蹴鞠每綴街市俚語為詞曲人爭傳之自號李浪子以善事中人爭薦譽之纍擢翰林承㫖進右丞伊都以金舍音侵遼中京初耶律伊都奔金金尼瑪哈言于金主曰遼主失德中外離心我朝興師大業已定而根本弗除後必為患今乘其釁可襲取之天時人事不可失也金主然之乃命諸部戒備軍事至是尼瑪哈復言曰諸軍久駐人思自奮馬亦壯健宜乘此時進取中原羣臣言時方寒金主不聽竟用尼瑪哈計以舍音都統內外諸軍富嘉努尼瑪哈鄂特本斡里雅布富勒呼等副之伊都為鄉導以遼遼中京大定府以孔端友襲封衍聖公壬寅四年遼保大二年金天輔六年春正月加蔡攸少保梁師成開府儀同三司金舍音陷遼中京及澤州遼主田于鴛鴦濼伊都以金人襲之遼主殺其子晉王額嚕溫遂走雲中遺玉璽于桑乾河金陷中京遂下澤州遼主時獵于鴛鴦濼伊都與羅索奄至遼主憂甚樞密使蕭奉先曰伊都乃王子班之苗裔此來欲立甥晉王耳若為社稷計不惜一子明其罪誅之可不戰而伊都自回矣㑹耶律薩巴等復謀立額嚕溫事覺遼主召樞密使蕭達爾丹等議曰反者必以此兒為名若不除去何以獲安達爾丹唯唯竟無一言申理遼主乃遣人縊之或勸額嚕溫亡額嚕溫曰安忍為蕞爾之軀而失臣子之節遂就死遼主素服三日耶律薩巴等皆伏誅額嚕溫素有人望諸軍聞其死無不流涕由是人心解體伊都引金兵逼遼主行宫遼主率衛士五千餘騎自鴛鴦濼幸雲中遺傳國璽於桑乾河初秦始皇得藍田玉作傳國寶六面螭紐其正面刻文曰受命于天既夀永昌魚鳥篆也秦王子嬰奉以降漢至王莽篡漢平帝皇后投璽于殿階螭角微玷至獻帝失之孫堅得於井中傳至孫權以歸於魏魏文帝隸刻肩際曰大魏受漢傳國之寶傳晉宋齊梁陳隋唐五代至石晉亡歸之於遼興宗重熙七年試進士以有傳國寶者為正統命題至是失之遼主以金師為憂蕭奉先曰女真雖能攻我中京終不能逺離故土越三千里直搗雲中也二月金尼瑪哈敗遼奚王實默于北安州遂陷其城三月金尼瑪哈襲遼主行營遼主走夾山蕭奉先伏誅金尼瑪哈練兵北安遣古新略近地獲遼護尉實訥埒始知遼主獵於鴛鴦濼殺其子晉王衆心益離西北西南兩路兵馬皆弱不可用尼瑪哈使諾延溫都伊喇保報舍音曰遼主窮迫於山西猶事田獵不惜危亡自殺其子臣民失望攻取之策幸速見諭若有異議此當以偏師討之即整兵瑪以俟舍音意未決鄂特本勸從之舍音乃出青嶺尼哈出瓢嶺期㑹于羊城濼三月遼主聞金師將出嶺西遂趨白水濼尼瑪哈以精兵六千襲之遼主至努克特倉金兵將近計不知所出蕭奉先請趨夾山遼主遂乘輕騎入夾山既至始悟奉先之不忠怒曰汝父子誤我至此今欲誅汝何益於事恐軍心忿怒爾曹避敵茍安禍必及我其勿從行奉先下馬哭拜而去行未數里左右執其父子縛送金兵金人斬其長子昻以奉先及其次子昱械送金主道遇遼軍奪以歸國並賜死遼主逐其樞密使蕭達爾丹遼主居夾山侍衛俱亡元妃蕭氏逹爾丹之姑也謂達爾丹曰爾任國事致君如此何以生為達爾丹但謝罪而已明日遼主怒逐之為耶律髙善努所執送諸金人達爾丹伺守者怠脫身亡歸復為耶律糾堅所得送之耶律淳達爾丹自知不免絶食死帝臨太學遼李處溫等以秦晉國王淳稱帝于燕京降封遼主為湘隂王奉表乞附于金金人不許遼主之走雲中也留南府宰相張琳參知政事李處溫與秦晉國王淳守燕京處溫聞遼主入夾山數日命令不通即與族弟處能及子奭外假怨軍內結都統蕭幹謀立淳處溫邀張琳白其事琳曰攝政則可即真則不可處溫曰今日之事天意人心已定豈可易也琳不敢執遂與諸大臣耶律達實左企弓虞仲文曹義勇康公弼集蕃漢百官諸軍及父老數萬人詣淳府引唐靈武故事勸進淳不許處溫等曰主上蒙塵中原擾擾若不立王百姓何歸宜熟計之淳方出李奭持赭袍被之令百官拜舞山呼淳驚駭再三辭不獲已而從之羣臣上尊號曰天錫皇帝建元天福以妻蕭氏普賢女為德妃加處溫守太尉左企弓守司徒曹義勇知樞密院事虞仲文參知政事張琳守太師李處能直樞密院李奭為少府少監餘與計謀者授官有差以蕭幹為北院樞密使駙馬都尉蕭旦知樞密院事奚和勒博知北院樞密事軍旅之事悉委達實遙降遼主為湘隂王遂據有燕雲平及上京遼西六路遼主所有沙漠以北西南西北路兩都招討府諸蕃族而已淳遣使報宋免歲幣結好亦遣使奉表于金乞為附庸金人不報耶律達實者太祖八世孫通遼漢字善騎射登進士第纍擢翰林學士承㫖遼謂翰林為林牙故稱達實林牙云遼主淳改怨軍為常勝軍金尼瑪哈陷遼西京金人攻西京大同府遼耿守忠救之敗績尼瑪哈摩囉歡鄂特本等繼至尼瑪哈率麾下自其中衝擊使餘兵去馬從旁射之守忠大敗其衆殱焉西京遂陷西路州縣部族皆降金以童貫為河北河東路宣撫使蔡攸為副使帥師巡北邊以應金朝廷既與金人約夾攻遼以復燕雲蔡京童貫主之鄭居中力陳不可謂京曰公為大臣國之元老不能守兩國盟約輒造事端誠非廟算京曰上厭歲幣五十萬故爾居中曰公獨不思漢世和戎用兵之費乎使百萬生靈肝腦塗地公實為之由是議寢及金數敗遼兵童貫乃復乞舉兵居中又言不宜幸災而動待其自斃可也時睦寇初平帝亦悔於用兵王黼獨言曰中國與遼雖為兄弟之那然百餘年間彼之所以開邊慢我者多矣且兼弱攻昧武之善經也今而不取燕雲女真即强中原故地將不復為我有帝遂決意治兵黼於三省置經撫房専治邊事不關樞密括天下丁夫訃口出算得錢六千二百萬緡以充用黼専領其事他執政皆不得預黼又遺童貫書曰太師若北行願盡死力㑹聞耶律淳自立乃以貫為宣撫使蔡攸副之勒兵十五萬巡北邊以應金且招諭幽燕攸童騃不習事謂功業可唾手致入辭之日二美嬪侍帝側攸指而請曰臣成功歸乞以是賞帝笑而弗責先是童貫欲圖北方與熙河鈐轄趙隆論之隆極言其不可貫曰君能共此當有殊拜隆曰隆武夫豈敢干賞以敗祖宗二百年之好異時起釁萬死不足謝責貫心不悅夏四月置補校文籍局詔置補完校正文籍局録三館書置宣和殿及太清樓袐閣又令郡縣訪遺書金使圖克坦烏濟來議師期金棟摩羅索陷遼天德雲內寧邊東勝等州獲阿蘇以歸阿蘇至金金主杖而釋之遼西南面招討使耶律佛騰降于金遼主奔額蘇倫遼主既失西京及沙漠以南部族遂遁于額蘇倫金古新追之不及北部瑪克實贐馬駝食羊都統瑪古收集散亡㑹于額勒錦五月童貫帥師伐遼敗績于白溝貫退保雄州貶都統制种師道為右衛將軍致仕貫至髙陽關用知雄州和詵計降黃榜及旗述弔民伐罪之意且云若有豪傑能以燕京來獻者即除節度使遂命都統制种師道盡護諸將分道進兵師道諫曰今日之舉譬如盜入鄰家不能救又乘之而分其室焉無乃不可乎貫不聽分兵為兩道師道總東路之兵趨白溝辛興宗總西路之兵趨范村耶律淳聞之遣耶律違實蕭幹禦之師道次白溝遼人譟而前師道前軍統制楊可世敗績士卒多傷師道先令人持一巨梃自防賴以不大敗退師雄州遼人追擊至于城下辛興宗亦敗于范村帝聞兵敗而懼詔班師遼使來言曰女真之背本朝亦南朝之所甚惡也今射一時之利棄百年之好恃强矯之鄰基他日之禍謂為得計可乎救災恤鄰古今通義惟大國圖之貫不能對种師道復請許之和貫不納而密劾師道助賊王黼怒責授師道右衛將軍致仕嗣濮王仲御卒以其弟仲爰嗣六月遼主淳死蕭幹等尊淳妻蕭氏為太后主國事遙立秦王定為帝淳寢疾聞遼主傳檄天德雲內朔武應蔚等州合諸蕃精騎五萬約以八月入燕并遣人問勞索衣裘茗藥淳甚驚命北南面大臣議而李處溫蕭幹等有迎秦王定拒湘隂王之說集蕃漢百官議之從其議者東立惟南面行營都部署耶律寧西立處溫問故寧曰天祚果能以諸蕃兵大舉奪燕則是天數未盡豈能拒之否則秦湘父子也拒則皆拒自古安有迎子而拒其父者處溫等相顧微笑以寧扇亂軍心欲殺之淳欹枕長歎曰彼忠臣也焉可殺天祚果來吾有死爾復何面目相見耶已而淳死年六十蕭幹等乃立淳妻德妃蕭氏普賢女為皇太后主軍國事奉遺命遙立秦王定為帝蕭后遂稱制改元德興諡淳為孝章皇帝廟號宣宗葬于燕西之香山遼李處溫伏誅遼主淳疾亟時自知不起密授處溫番漢馬步軍都元帥意將屬以後事及蕭幹等召宰執入議處溫稱疾不至隂聚勇士為備紿云奉密㫖防他變淳死蕭后聽政幹以后命召處溫至以時方多難未即加誅但追毁元帥劄子處溫懼禍即落髮為僧尋有永凊人傅遵說隨郭藥師入燕被擒具言處溫嘗遺易州富民趙履仁書達宋將童貫欲為內應挾蕭后納土歸宋后執處溫問之處溫曰臣父子於宣宗有定策功宜世䝉宥容可使因讒獲罪后曰誤秦晉國王者皆汝父子向使秦晉國王如周公則終享親賢之名于後世汝何功之有并數其前罪惡數十處溫無以對乃賜死臠其子奭而磔之籍其家得錢七萬緡金玉寶器稱是皆為宰相數月間所取遼人快之夏人救遼金斡魯襲敗之于宜水夏主使李良輔將兵三萬救遼次于天德之野谷金將斡魯羅索敗之于宜水追至野谷澗水暴至夏人漂沒者不可勝計秋七月詔童貫伐遼以劉延慶為河北河東宣撫都統制王黼聞耶律淳死復命童貫蔡攸治兵以河陽三城節度使劉延慶代种師道為都統制八月金主旻襲遼主于實納圗遼主敗走金舍音使斡里雅布言于金主曰今雲中新定諸路遼兵尚數萬遼主在隂山天德之間而聶哷自立于燕京新降之民其心未固諸將望幸軍中金主從之既而聞遼主在大魚濼乃自將精兵萬人襲之普嘉努斡里雅布率兵四千為前鋒晝夜兼行馬多疲乏追及遼主于實納圖軍士至者才千人遼兵二萬五千方治營壘普嘉努與諸將議耶律伊都曰我軍未集人馬疲劇未可戰也斡里雅布既追及遼主而不亟戰日入而遁則無及矣遂戰短兵接遼兵圍之數重副統軍蕭迪里諭軍士以君臣之義於是士皆殊死戰遼主謂斡里雅布兵少必敗遂與妃嬪皆自髙阜下平地觀戰伊都指遼主日月旗以示諸將曰此遼主麾蓋也若萃而薄之可以得志斡遼里雅布等遂以騎兵馳赴之遼主望見大驚即遁去主兵遂潰斡里雅布等還金主曰遼主去不逺盍亟追之斡里雅布以騎兵千餘追之至諤勒哲圖遼主棄輜重而遁蕭迪里被執九月朝散郎宋昭上書諫伐遼詔編管于海州昭上書極言遼不可攻金不可鄰異時金必敗盟為中國患乞誅王黼童貫趙良嗣等且曰兩國之誓敗盟者禍及九族陛下以孝理天下其忍忘列聖之靈乎陛下以仁覆天下其忍置河北之民於塗炭之中而使肝腦塗地乎王黼大惡之除昭名編管海州金使圗克坦烏色來金人聞童貫舉兵恐宋徑取燕而歲幣不可得乃遣使來議師期髙麗王俁卒子楷立初髙麗之俗兄終弟及俁卒諸弟爭國其相李資深立俁子楷詔遣路允迪弔祭先是俁求醫於朝詔二醫往留二年而還楷語之曰聞朝廷將用兵于遼遼兄弟之國存之足為邊扞女真乃徑敵不可交也業已然願二醫歸報天子宜早為備醫還奏之然已無及矣趙良嗣如金報使也且言不負初約遼涿州留守郭藥師以城來降常勝軍帥郭藥師為涿州留守以蕭幹専政國人多二謂所部曰天祚失國女直不綱宋天子重兵壓境此男兒取金印時也遂擁所部八千人奉涿州來降童貫受之以聞詔授恩州觀察使以兵隸劉延慶遼易州守將髙鳯以城來降冬十月改遼燕京為燕山府西京為雲中府詔山前收復州縣合置監司以燕山府路為名山後别名雲中府又賜涿州日涿水郡威行軍檀州曰橫山郡鎮逺軍平州曰漁陽郡撫寧軍易州曰遂武郡營州曰平盧郡順州曰順興郡薊州曰廣川郡景州日欒川郡并燕山府為山前九州雲中府路則領武應朔蔚奉聖歸化儒媯并雲中府所謂山後九州也童貫使劉延慶及郭藥師帥師伐遼藥師敗績于燕山延慶退保雄州童貫遣劉延慶郭藥師將兵十萬出雄州以藥師為鄉導渡白溝延慶軍無紀律藥師諫曰今大軍跋隊行而不設備若敵人置伏邀擊首尾不相應則望塵決潰矣不聽至良鄉遼蕭斡率衆來拒延慶與戰而敗次于涿州與蕭幹對營閉壘不出藥師曰幹兵不過萬人今悉力拒我燕山必虛願得竒兵五千倍道襲之城可得也請令公之子三將軍簡師為後繼延慶許之三將軍謂光世也己酉延慶遣大將髙世宣楊可世與藥師帥兵六千夜半渡盧溝倍道而進質明遼常勝軍帥甄五臣領五千騎奪迎春門以入藥師等繼至下令納燕人降而盡殺契丹雜衆藥師遣人諭蕭后使趣降蕭后密報蕭幹幹舉精甲三千還燕巷戰光世渝約不至藥師失援而敗與可世棄馬縋城而出死傷過半世宣死焉延慶營于盧溝南幹分兵斷餉道擒護糧將王淵得漢軍二人蔽其目留帳中夜半僞相語曰聞漢軍十萬壓吾境吾師三倍敵之有餘當分左右翼以精兵衝其中左右翼為應舉火為期殱之無遺既言乃隂逸一人歸報宋師聞之以為信然明旦延慶見火起以為敵至即燒營而遁士卒蹂踐死者百餘里幹因縱兵追至涿水而去自熙豐以來所儲軍實殆盡退保雄州燕人知宋之無能為作賦及歌詩以誚之以蔡攸為少傅判燕山府十一月金使李靖來言燕地十二月趙良嗣如金求營平灤三州初朝廷與金約但求石晉賂契丹故地而不思平營灤三州非晉賂乃劉仁恭所獻以求援者王黼欲併得之金主不肯及趙良嗣往金主使普嘉努責良嗣以出兵失期且云今更不論元約特與燕京六州二十四縣謂薊景檀順涿易也良嗣言元約山前山後十七州今乃如此信義安在抗辨數四金人不從良嗣乃與其使李靖偕來止許山前六州帝復遣良嗣送之且求營平灤三州之地郭藥師及遼蕭幹戰于永清敗之詔加藥師武泰軍節度使金主旻陷遼燕京遼主淳妻蕭氏出奔天德童貫再舉伐燕不克成功懼得罪乃密遣王瓌如金以求先如約夾攻金主遂分三道進兵斡里雅布率兵七千之都古嚕納出得勝口尼楚赫出居庸關羅索為左翼富勒呼為右翼趣居庸關尼瑪哈趣南暗口達蘭趣北牛口遼德妃蕭氏五上表于金求立秦王定金主不許遂以關兵守居庸關戊子金師至關崖石自崩戍卒多壓死不戰而潰金師度關而南庚寅遼統軍都監髙六等送欵于金金主至燕京髙六等開門待之遂自南門入使尼楚赫羅索陳于城上金主次于城南遼宰相左企弓參政虞仲文康公弼樞密使曹義勇張彥忠劉彥宗等奉表降辛卯遼百官詣金主營請罪金主並釋之復命守舊職而遣左企弓等撫定燕京諸州縣蕭德妃與蕭斡自古北口趨天德於是遼五京皆為金有金主遣騎兵送趙良嗣還且獻遼俘遼主奔四部族遼主聞南京陷遂由薩里關出居四部族詳衮之家萬歲山成更名曰艮嶽山周十餘里其最髙一峯九十步上有亭曰介分東南二嶺直接南山山之東有萼緑華堂書館八仙館紫石巖棲真嶝覽秀軒龍吟堂山之南則夀山兩峯並峙有鴈池噰噰亭北直絳霄樓山之西有藥寮西莊巢雲亭白龍沜濯龍峽蟠秀練光跨雲亭羅漢巖又西有萬松嶺半嶺有樓曰倚翠上下設兩關關下有平池鑿大沼沼中作兩洲東為蘆渚浮陽亭西為梅渚雪浪亭西流為鳯池東出為鴈池中分二館東曰流碧西曰環山有巢鳯閣三秀堂東池後有揮雪􅈦復由磴道上至介亭亭左復有極目亭蕭森亭右復有麗雲亭半山北俯景龍江引江之上流注山間西行為潄瓊軒又行石間為煉丹凝觀圜山亭下視江際見髙陽酒肆及清澌閣北岸有勝筠庵躡雲臺蕭閒館飛岑亭支流别為山莊為回溪又於南山之外為小山橫亘二里曰芙蓉城窮極巧妙而景龍江外則諸館舍尤精其北又因瑤華宫火取其地作大池名曰曲江池中有堂曰蓬壺東盡封丘門而止其西則自天波門橋引水直西殆半里江乃折南又折北折南者過閶闔門為復道通茂德帝姬宅折北者四五里屬之龍德宫既成帝自為艮嶽記以為山在國之艮位故也蔡絛謂初名鳯凰山後因神降其詩有艮嶽排空霄因名艮嶽朱勔於太湖取石髙廣數丈載以大舟挽以千夫鑿城斷橋毁堰折閘數月乃至㑹初得燕地因號昭功敷慶神運石立于萬歲山其傍植兩檜一夭矯者名曰朝日升龍之檜一偃蹇者名曰卧雲伏龍之檜皆玉牌填金字書之巖曰玉京獨秀太平巖峯曰卿雲萬態竒峯又作絳霄樓勢極髙峻在雲霄表盡工藝之巧其後羣閹興築不已於是山林巖壑日益髙深亭臺樓觀不可稱紀四方花竹竒石咸萃于斯珍禽異獸無不畢有矣户部獻今年民數時天下分為二十六路京府四府三十州二百五十四監六十三縣一千二百三十四户二千八十八萬二千二百五十八口四千六百七十三萬四千七百八十四户口視西漢盛時蓋有加焉隋唐疆理雖廣而户口皆不及可謂盛矣癸卯五年遼保大三年金天輔七年八月太宗晟天㑹元年春正月遼奚和勒博自立為奚帝金兵入燕知北院樞密事奚王和勒博即箭笴山自立為奚國皇帝改元天復設奚漢渤海二樞密院改東西節度使為三王分司建官遼主命都統耶律瑪格討之金使李靖來趙良嗣如金金使李靖來議許六州代租錢詔遣良嗣報聘且求西京等州以王安中知燕山府詹度郭藥師同知府事朝廷以金人將歸燕謀帥臣守之左丞王安中請行王黼贊於帝遂授安中慶逺軍節度使河北河東燕山府路宣撫使知燕山府郭藥師為檢校少保同知府事詔藥師入朝禮遇甚厚賜以甲第姬妾張水嬉於金明池使觀之命貴戚大臣更互設宴又召對於後苑延春殿藥師拜庭下泣言臣在北庭聞趙皇如在天上不謂今日得望龍顔帝深褒稱之委以守燕藥師對曰願效死又令取天祚以絶燕人之望藥師變色言曰天祚故主也國破出走臣是以降陛下使臣畢命他所不敢辭若使反故主非所以事陛下願以付他人因涕泣如雨帝以為忠解所御珠袍及二金盆以賜藥師出諭其下曰此非吾功汝輩力也即翦盆分給之燕山府路轉運使吕頥浩言開邊極逺其勢難守雖窮力竭財無以善後又奏燕山河北五事危急帝怒命貶官而職任如故金以遼平州為南京命張㲄留守遼平州人張㲄為遼興軍節度使遼主之走山西也平州軍亂殺其節度使蕭迪里㲄撫定亂者州民推㲄領州事天錫帝殂㲄知遼必亡乃籍丁壯五萬人馬千匹練兵為備蕭德妃遣時立愛知平州㲄拒弗納金人入燕京訪㲄情狀於康公弼公弼曰㲄狂妄寡謀雖有鄉兵彼何能為示之不疑圖之未晚金人招時立愛赴軍前加㲄臨海軍節度使仍知平州既而尼瑪哈又欲先下平州擒張㲄公弼曰若加兵是趣之叛也公弼請自往覘之遂見㲄㲄曰契丹八路七路已降今獨平州存敢有異志所以未解甲者防蕭幹耳厚賂公弼使還公弼還言于尼瑪哈曰彼無足慮也乃升平州為南京加㲄試中書門卞平章事判留守事㲄一作覺遼興中歸德府宜錦乾顯成川豪懿來濕遷潤等州皆降於金二月以李邦彥趙野為尚書左右丞遼主追廢故秦晉國王淳為庶人殺淳妻蕭氏蕭德妃見遼主于四部族遼主怒殺之追降天錫帝淳為庶人除其屬籍而赦其黨蕭幹奔奚三月金使尼楚赫來盧益如金趙良嗣至燕與金主議燕京西京之地金主曰若宋必欲平灤等州則并燕京不與汝家矣因以答書先示良嗣良嗣讀至燕京用本朝兵力攻下其租稅當輸本朝良嗣因曰租稅隨地豈有與其地而不與其租稅者尼瑪哈曰燕京自我得之則當歸我大國熟計若不早見與請速追涿易之師無留我疆於是遣李靖等與良嗣偕來靖既入對遂見王黼黼謂靖曰租稅非約也上意以交好之故欲以銀絹充之靖復請去年歲幣帝亦特許之遂命良嗣與靖偕使良嗣至燕謂金主曰本朝徇大國多矣豈平灤一事不能相從耶金主曰平灤欲作邊鎮不可得也遂議租稅金主曰燕租六百萬止取一百萬不然還我涿易舊疆常勝軍亦當還我我且提兵按邊良嗣曰本朝自以兵下涿易今乃云爾豈無曲直耶且言御筆許十萬至二十萬不敢擅增乃令良嗣歸報金主謂之曰過半月不至吾提兵往矣時左企弓嘗以詩獻金主曰君王莫聽捐燕議一寸山河一寸金故金人欲背初約要求不已良嗣既還金聞遼主謀復故地乃悉斷盧溝以北橋梁焚次舍以防之良嗣行至雄州以金書遞奏其略言貴朝兵不克夾攻特因已力下燕所以拘稅今據燕管內每年租六百萬貫良嗣等稱御筆許二十萬以上不敢自専其平欒等州不在許限儻務侵求難終信義仍速追過界之兵王黼欲功之速成乃請復遣良嗣自雄州再往使許遼人舊歲幣四十萬之外每歲更加燕京代稅錢一百萬緍及議畫疆與遣使賀正旦生辰置𣙜場交易金主大喜遂使尼楚山赫來盧益等持誓書草來許以燕京及六州來歸而後諸州及西北一帶接連山川不在許與之限帝曲意從之遣盧益趙良嗣馬宏等持誓書觀之言其字畫不謹令易之益言帝親書所以示尊崇於大國也金人不聽凡至汴京更易者至數四金人又言近有燕人趙溫訊等逃出南朝須先還方可議交燕地良嗣諭宣撫司縛送溫訊於金既至尼瑪哈釋其縛而用之金人又求糧良嗣許以二十萬石夏四月金人來歸燕京及涿易檀順景薊之地童貫蔡攸入燕曲赦河北河東燕雲路遂班師金人既遂所欲乃使楊璞以誓書及燕京六州來歸而營平灤三州終以非石晉所賂契丹之地不預焉詔童貫蔡攸入燕交割庚子貫攸入城時燕之金帛子女職官富民皆為金人所掠而東唯存空城而已尼瑪哈猶欲止割涿易金主曰海上之盟不可忘也我死汝則為之貫等奏燕城老幼迎謁焚香稱夀帝為之曲赦兩河燕雲而命即日班師乙巳貫等還金斡魯及斡里雅布襲遼主營于青冢獲秦王定及族屬從臣以歸遼主與戰于白水濼遼師敗績趙王實訥埒復為金人所獲遼主走雲內乞附于金金人不許金主以斡魯雅為都統斡里布副之使襲遼主于隂山青冢之間至居庸關獲林牙耶律達實悉降其衆又獲喀勒扎于白水濼斡魯使斡里雅布尼楚赫羅索等以兵三千分道襲遼主四月戊戌將至青冢遇泥濘不能進斡里雅布與當海四騎以繩繫耶律達實使為鄉導遂直趨遼主駐營之地於時遼主往應州其嬪御諸女見金兵奄至驚駭欲走斡里雅布命騎下執之有頃斡魯等大軍至秦王許王及諸妃女與太叔和囉噶妃秦晉國王淳次妃并從臣皆被執獲輜重萬餘乘遼硬寨太保特默格竊遼主次子梁王雅里及長公主特哩乘軍亂出赴遼主軍得免羅索尼楚赫獲遼主左右輿帳斡魯兵至薩里門為書招遼主遼主答書請和遼主自金城來聞金人以所獲東去乃率兵五千餘邀戰于白水長濼斡里雅布以兵千餘敗之遼主遁去金人獲遼主子趙王實訥埒及傳國寶追奔二十餘里盡得遼主從馬卓哩特默胡巴爾布達别獲遼牧馬萬四千匹車八千乘皆獻于金主金主曰此羣臣之功也遂置傳國寶于懷中東面恭謝天地因録諸將功加賞焉遼主使牌印郎君穆喇斡持兔紐金印僞請降于金印而西走雲內斡里雅布受之視其文乃元帥燕王之也斡里雅布復以書招遼主諭以石晉北遷事遼主答書乞為弟若子量賜土地斡里雅布不許五月以楊時為邇英殿說書時入對言于帝曰熙寧之初大臣文六藝之言以行其私祖宗之法紛更殆盡元祐繼之盡復祖宗之舊熙寧之法一切廢革至紹聖崇寧抑又甚焉凡元祐之政事著在令甲皆焚之以滅其迹自是分為二黨縉紳之禍至今未殄臣願明詔有司條具祖宗之法著為綱目有宜于今者舉而行之當損益者損益之元祐熙豐姑置勿問一趨於中而已又言燕雲之師宜退守內地以省轉輪之勞募邊民為弓弩手以殺常勝軍之勢又乞為宣和㑹計録以周知天下財出入之數帝首肯之除邇英說書以收復燕雲加王黼太傅封楚國公鄭居中太保蔡攸少師封英國公進封童貫徐豫國公以趙良嗣為延康殿學士居中辭不拜王黼竭天下之財以北征僅得七空城至是率百官表賀詔以收復燕雲宰執皆進位而賜王黼玉帶居中自陳無功不拜詔王黼總治三省事遼主奔夏蕭迪里等以梁王雅里走西北部立為帝夏主李乾順遣使請遼主臨其國遼主從之中軍都統蕭迪里等切諫不聽遂渡河次于金蕭軍北遣使冊乾順為夏國皇帝人情惶懼不知所為迪里隂謂耶律烏哲曰事勢如此億兆離心正我輩效節之秋不早為計奈社稷何乃共劫遼主第二子梁王雅里走西北部三日遂立為帝改元神厯雅里性寬大惡誅殺獲亡者笞之而已有自歸者即官之因謂左右曰欲附來歸不附則去何須威逼耶每取唐貞觀政要及林牙勒扎資忠所作治國詩令侍從讀之烏爾古部莭度使吉德哷勒部統軍托卜嘉都監圗魯卜等各率其衆來附自是諸部繼至而雅里日漸荒怠好擊鞠特默格切諫乃不復出以迪里為樞密使特默格副之從行有疲困者輒振給之直長保德諫曰今國家空虛賜賚若此將何以相給耶雅里怒曰昔畋于福山卿誣獵官今復有此言若無諸部我將何取不納初令羣牧運鹽濼倉粟而民盜之議籍以償雅里乃自為直每粟一車償一羊三車一牛五車一馬八車一馳左右曰今一羊易粟二斗且不可得乃償一車雅里曰民有則我有若令盡償民何堪焉奚和勒博為其下所殺和勒博為郭藥師所敗一軍離心其黨耶律阿固齊等遂殺和勒博六月遼張㲄以平州來歸金人以燕地與宋以遼宰相左企弓為中書令虞仲文曹義勇為樞密使康公弼簽中書省事同燕京大家富民俱東徙燕民流離道路不勝其苦過平州遂入城言於張㲄曰左企弓不謀守燕使吾民流離無所安集公今臨巨鎮握强兵盡忠於遼必能使我復歸鄉土人心亦惟公是望㲄遂召諸將領議皆曰聞天祚兵勢復振出沒漠南公若仗義勤王奉迎天祚以圖中興先責左企弓等叛降之罪而誅之盡歸燕民使復其業而以平州歸宋則宋無不接納平州遂為藩鎮矣即後日金人加兵內用平山之軍外得宋為之援又何懼焉㲄曰此大事也不可草草翰林學士李石智而多謀可召與議石至其言與之合㲄乃遣張謙帥五百餘騎傳留守令召左企弓虞仲文曹義勇康公弼至灤河西岸遣議事官趙袐校往數企弓等十罪曰天祚播遷夾山不即奉迎一也勸皇叔秦晉國王僣號二也詆訐君父降封湘隂三也天祚遣知閣王有慶來議事而殺之四也檄書始至有迎秦拒湘之議五也不謀守燕而降六也不顧大義臣事千金七也根括燕財取悅于金八也使燕人遷徙失業九也教金人發兵先下平州十也爾有十罪所不容誅企弓等無以對遂皆縊殺之㲄仍稱保大三年畫天祚像朝夕謁事必告而後行稱遼官秩榜諭燕人復業恆産為常勝軍所占者悉還之燕民既得歸大悅李石更名安弼偕故三司使髙黨至燕京說王安中曰平州形勝之地張㲄總練之才足以禦金人安燕境幸招致之毋令西迎天祚北合蕭幹也安中深納之令安弼與黨至汴以聞王黼勸帝納之趙良嗣諫曰國家新與金盟如此必失其歡後不可悔不聽良嗣坐削五階而詔安中及詹度厚加安撫與免三年常賦㲄聞之自謂得計嗣濮王仲爰卒以其弟仲理嗣鄭居中卒以蔡攸領樞密院秋七月童貫致仕以談稹為河北河東燕山府路宣撫使禁元祐學術八月辛巳朔日有食之遼蕭幹復景薊州遂伐燕京及郭藥師戰于峰山幹敗走為其下所殺傳首京師詔加藥師太尉金主旻卒弟安班貝勒烏竒邁立更名晟金主去燕京六月有疾命尼瑪哈為都統普嘉努幹魯副之駐兵雲中以備遼而還八月戊申至布圖濼而殂年五十六固倫貝勒鄂舍音等共請烏竒邁即位更名晟改元天㑹以舍音特本同輔政鄂特本太祖庶長子也九月葬太祖於海古勒城西太祖豁達大度知人善任衆樂為用雖不克滅遼以遺後人然其規摹皆其創始也冬十月遼主復渡河東居于圗魯卜部耶律達實自金來歸遼主責之曰我在汝何敢立淳達實對曰陛下以全國之勢不能一拒敵棄國逺遁使黎民塗炭即立十淳皆太祖子孫豈不勝乞命于他人耶遼主無以答賜酒食而赦之遼主雅里死蕭迪里等復立耶律珠拉為帝雅里獵于扎拉山一日而射黃羊四十狼二十一因致疾殂年三十蕭迪里欲擇可立者耶律烏哲言興宗孫珠拉才德純備衆以為然遂立之張㲄敗金棟摩于兔耳山詔加㲄泰寧軍節度使犒賞銀絹數萬十一月幸王黼第觀芝貶轉運使乏上供錢者二十二人金斡里雅布襲平州張㲄奔燕山守將張忠嗣張敦固以城降金使入城敦固殺之初金聞平州歸宋帥師攻之而敗金主復使斡㑹張里雅布代棟摩斡里雅布遂自廣寧進趨平州㲄聞宋犒賜將至喜而逺迎斡里雅布乘其無備襲之城中人與戰而敗㲄不得還乃宵奔燕山王安中納而匿之都統張忠嗣張敦固以平州降金金遣使與敦固入諭城中則殺其使者閉門固守詔王安中殺張㲄以畀金人斡里雅布遣人以納叛來責王安中諱之金人索之益急安中取貌類㲄者斬其首與之金日非㲄也遂欲以兵攻燕詔安中以㲄與金安中不得已縊㲄殺之函其首併其二子送於金師於是燕降將及常勝軍士皆泣下郭藥師因宣言曰金人欲㲄即與若求藥師亦將與之矣當奈何安中奏其言且力求罷自是降將卒皆解體而金人遂用此興師矣遼主珠拉及蕭迪里為亂兵所殺金人來歸武朔州宋以山後諸州請于金金主新立將許之㑹尼瑪哈自雲中至言于金主曰先帝征遼之初圖宋協力夾攻故許以燕地宋人既盟之後請加幣以求山西諸鎮先帝辭其幣而復與之盟曰無匿逋逃無擾邊民今宋數路招納叛亡厚以恩賞纍疏叛人索之童貫不遣盟未期年今已如此萬世守約其可望乎且西鄙未寧割付山西諸郡則諸軍失屯據之所將有經略或難持久請勿與之金主遂遣使止以武朔二州來歸金斡里雅布遣使如夏斡里雅布趨天德遼耶律慎思降之因言夏國迎護遼主渡大河矣斡里雅布乃以便宜與夏議和其書略曰奉詔有之夏主遼之自出不渝終始危難相救今茲已舉遼國若能如事遼之日以效職貢當聽其來毋致疑二若遼主至彼可令執送且許割地蓋欲沮其援遼之心也十二月金使髙居慶來賀正旦也召王安中為上清寶籙宫使以蔡靖知燕山府事金主以其弟舍音為安班貝勒金使李靖來告哀也甲辰六年遼保大四年金天㑹二年春正月置書藝所連南夫如金弔祭也遼主居于都統耶律瑪古營金人襲之遼主奔烏爾古德哷勒部遼主葉營北走瑪古為金人所執瑪克實迎遼主至其部事之甚謹時從臣乏食咸以衣易羊至烏爾古德哷勒部封瑪克實為神裕恱王夏主遣使稱藩于金金以邊地畀之夏得金書遣把里公亮奉誓表請以事遼之禮稱藩於金且受割賜之地尼瑪哈承制割下寨以北隂山以南伊實扎蘭部圗嚕濼西之地與之二月以令蕩為安定郡王令蕩秦王德芳四世孫也帝耕籍田李邦彥以父喪去位遼耶律達實自立為王率衆西走遼主時得達實及瑪克實之兵自謂有天助再謀出兵收復燕雲逹實諫曰自金人初陷長春遼陽則車駕不幸廣平淀而都中京及陷上京則都燕山及陷中京則幸雲中自雲中而播遷夾山向以全師不謀戰備使舉國漠地皆為金有國勢至此而方求戰非計也當養兵待時而動不可輕舉遼主不從逹實遂殺知北院樞密事蕭伊遜及坡里置北南面官屬自立為王率鐵騎二百宵遁而西三月金人來索糧不與金遣使詣宣撫司索趙良嗣所許糧二十萬石談稹曰二十萬石豈易致耶兼宣撫司未嘗有許糧之文其使曰去年四月趙良嗣許之矣稹曰良嗣口許豈足憑也遂不與金人由是大怒皇后親蠶閏月金使王阿哈如夏賜以誓詔也自是兩國信使不絶夏四月起復李邦彥為尚書左丞五月金使髙珠髙興輔來髙珠致遺留物興輔告即位六月金棟摩克平州殺張敦固秋七月許亢宗如金賀即位也置璣衡所遼主復取天德東勝寧邊雲內等州至武川遇金人戰于昻阿下水而潰遂走山隂居于伊都谷八月談稹罷以童貫領樞密院為河北河東燕山府路宣撫使赦以復燕雲也九月以白時中為特進太宰李邦彥為少宰趙野宇文粹中為尚書左右丞蔡懋同知樞密院事更名艮嶽為夀嶽以金芝産於艮嶽萬夀峯故也時帝患苑圃之衆力不能支數有厭惡之言由是羣閹興築之議稍怠金使烏哲訥來賀生辰也冬十月詔毁蘇洵蘇軾蘇轍黃庭堅文集詔有收藏習用蘇黃之文者並令焚毁犯者以大不恭論罪遼主以圖魯卜部人額爾克為本部節度使遼主納之額爾克妻恩克故有是命十一月王黼有罪詔令致仕黼位元宰每陪曲宴親為俳優鄙賤之役以獻笑取悅太子聞而惡之黼以鄆王楷有寵隂為畫奪宗之計未成㑹其家玉芝産堂柱帝臨觀之而黼第與梁師成連牆穿便門往來帝始悟其交結狀還宫眷待頓衰李邦彥素與黼不協隂結蔡攸其毁之㑹中丞何㮚論黼姦邪専橫十五事遂詔黼致仕其黨胡松年等皆免詔蔡攸講議財利于尚書省罷應奉局自蔡京以豐亨豫大之說勸帝窮極侈靡久而帑藏空竭言利之臣殆析秋毫宣和以來王黼専主應奉掊剝橫賦以羡為功所入雖多國用日匱至是宇文粹中上言祖宗之時國計所仰皆有實數量入為出沛然有餘近年諸局務應奉司妄耗百出若非痛行裁減慮智者無以善後於是詔蔡攸就尚書省置講議財利司除茶法已有定制餘並講究條上攸請內侍職掌事干宫禁應裁省者委童貫取㫖由是不急之務無名之費悉議裁省帝亦自罷諸路應奉官吏省六尚歲貢十二月詔百官遵行元豐法制復詔蔡京落致仕領三省事王黼既致仕朱勔力請用京帝從之京至是四當國目昏眊不能事事悉決於季子絛凡京所判皆絛為之至代京入奏事絛每造朝侍從已下皆迎揖呫囁耳語堂吏數十人抱案從後由是恣為姦利竊㺯威柄驟引其婦兄韓梠為户部侍郎媒蘖密謀斥逐朝士創宣和庫二貢司四方之金帛與府藏之所儲盡拘括以實之為天子之私財白時中李邦彥等惟奉行文書而已河北山東盜起金使髙居慶來賀正旦也乙巳七年遼保大五年西遼德宗耶律達實延慶元年金天㑹三年是嵗遼亡金代西遼建國春正月遼主如党項二月至應州城東金羅索獲之以歸党項小呼嚕遣人請遼主臨其地戊子遼主遂趨天德過沙漠金兵忽至遼主徒步出走近侍進珠帽却之乘張仁貴馬得脫至天德己丑遇雪無禦寒具護衛太保蕭珠展亟以貂裘帽進途次絶糧蕭珠展進麨與棗遼主欲憩蕭珠展即跪坐倚之假寐蕭珠展輩惟嚙氷雪以濟饑過天德至夜將宿民家紿曰偵騎其家知之乃叩馬首跪而大慟潜宿其家居數日嘉其忠遙授以節度使遂趨党項以小呼嚕為西南面招討使總知軍事二月遼主至應州新城東六十里為金將羅索等所獲遼遂亡史臣曰遼起朔野兵甲之盛鼓行徼外席卷河朔樹晉植漢何其壯歟太祖太宗乘百戰之勢輯新造之邦英謀睿略可謂逺矣雖以世宗中才穆宗殘暴連遘弒逆而神器不搖蓋由祖宗威令猶足以震疊其國人也聖宗以來內修政事外拓疆宇申固鄰好四境乂安降臻天祚既丁末運又觖人望崇信姦回自椓國本羣下離心金兵一集內難先作廢立之謀叛亡之迹相繼蜂起馴至土崩良可哀也雨木冰歸粟于金詔京師運米五十萬石至燕山令工部侍郎孟揆親往措置蓋欲致之金也遼耶律達實稱帝于竒爾瑪勒達實北行三日過黑水見烏白達勒達詳衮崇烏魯崇魯獻馬四百駝二十羊若干遂西至哈屯城駐于北庭都護府㑹西鄙七州及十八部王諭之曰我祖宗艱難創業厯世九主厯年二百金以臣屬逼我國家殘我黎庶屠翦我州邑使我天祚皇帝蒙塵於外日夜痛心疾首我今仗義而西欲借力諸蕃翦我仇敵復我疆宇惟爾衆亦有軫我國家憂我社稷思共救君父濟生民於塗炭者乎遂得精兵萬餘置官吏立排甲具器械二月甲午以青牛白馬祭天地祖宗整旅而西先遺書假道于回鶻王必里克必里克得書即迎至邸大宴三日臨行獻馬六百駝百羊三千願質子孫為附庸送至境外所過敵者勝之降者安之兵行萬里歸者數國獲駝馬牛羊財物不可勝計軍勢日盛鋭氣自倍至塔什干西域諸國舉兵號十萬號呼喇繖來拒戰兩軍相望三里許達實諭將士曰彼軍雖多而無謀攻之則首尾不救我師必勝乃遣蕭額哩埒耶律松山等將兵二千五百攻其右蕭拉布及耶律穆蘇等將兵二千五百攻其左大石自以餘衆攻其中三軍俱進呼喇繖大敗殭尸數十里駐軍塔什干凡九十日回回國王來降貢方物又西行延至竒爾瑪勒二月甲申羣臣共冊立達實為帝改元慶年三十八號格爾汗復上漢尊號曰天祐皇帝世謂之西遼既而追諡其祖考為帝立妻蕭氏為昭德皇后因謂羣臣曰朕與卿等行三萬里跋涉沙漠夙夜艱勤賴祖宗之福卿等之力冒登大位爾祖父宜加恤典共享尊榮乃加蕭額哩埒四十九人祖父封爵夏四月保和殿大學士兼侍讀蔡絛有罪免詔蔡京復致仕蔡絛鍾愛于京擅權用事其兄攸嫉之數言于帝請殺絛帝不許白時中李邦彥亦惡絛乃與攸發絛姦私事帝怒欲竄之京力為請乃止勒停侍養因安置韓梠於黃州禠絛侍讀毁賜出身敕欲以撼京而京猶未有去志帝乃命童貫詣京令上章謝事貫至京泣曰上何不容京數年當有相讒譛者貫曰不知也京不得已以章授貫帝命詞臣代京作三表求去乃降制從之復行元豐官制詔行元豐官制復尚書令之名虛而勿授三公但為階官母領三省事六月封宦者童貫為廣陽郡王詔用神宗遺訓能復全燕之境者胙土錫以王爵故有是命加蔡攸太保秋八月金主晟降封故遼主延禧為海濵王癸卯金西南北路都統斡魯以遼主延禧至拉林河甲辰告於太祖旻廟丙午見金主晟遂降封為海濵王以蕭珠展盡忠甚加禮遇九月金使李孝和來以獲遼主來告慶也有狐升御榻而坐時又有都城東門外鬻菜夫至宣德門下忽若迷罔釋荷擔向門㦸手且詈云太祖皇帝神宗皇帝使我來道尚宜速改也邏卒捕之下開封獄一夕方省則不知向者所為乃於獄中盡之冬十月金舍音等分道南侵初宋兵三千自海道破金九寨殺馬城縣戍將節度使盧斡取銀牌兵仗及馬而還斡里雅布在平州遣人來索户口宋人弗遣且聞童貫郭藥師治兵燕山斡里雅布遂請于金主曰茍不先舉兵伐宋恐為後患金主以為然而未敢輕舉及使者往返既數道路險易朝廷治否府庫虛實漸得要領而耶律伊都劉彥宗又言不必用衆因糧就兵可也及既獲遼主即決意伐宋以安班貝勒舍音統領都元帥尼瑪哈為左副元帥古新為元帥右監軍耶律伊都為元帥右都監自雲中趨太原達蘭為六部路都統棟摩為南京路都統劉彥宗為漢軍都統以斡里雅布監棟摩彥宗兩軍戰事置樞密院於平州劉彥宗知院事置樞密院於雲中以時立愛知院事十一月以种師道為河東河北路制置使童貫次于太原使馬擴如金師十二月金尼瑪哈使王介儒至太原童貫逃歸尼瑪哈遂圍太原知府張孝純禦之先是金人遣使來許割雲中諸州帝信之遣宣撫使童貫往受地至太原聞尼瑪哈自雲中南下貫乃使馬擴辛興宗往使諭以交割蔚應州及飛狐靈丘縣餘悉還金國擴至軍前尼瑪哈嚴兵以待趣擴等庭參如見金主之禮既畢首議山後事尼瑪哈曰先帝與宋人交好各立誓書萬世無毁不謂宋違約隂納張㲄收燕京逃去官民本朝屢牒追還第以虛文見紿今當略辨是非擴曰本朝緣談稹昧大計輕從張㲄之請上深悔之願相國存舊好不以前事置胸中乞且交蔚應飛狐靈丘之地尼瑪哈笑曰爾尚欲此兩州兩縣耶山前山後皆我家地尚復何論汝家别削數城來可贖罪也汝輩可即去我自遣人如宣撫司矣擴還具言于貫貫曰金初立國邊頭寧有幾許軍馬遽敢作如此事耶擴曰彼既深恨本朝結納張㲄又為契丹舊臣所激故謀報復今宜速作備禦貫不從既而尼瑪哈遣王介儒薩里穆爾持書至太原責以渝盟納叛等事且言今已興兵辭語甚倨貫問之曰如此大事何不素告我薩里穆爾曰兵已興何告為相國軍自河東入太子軍自燕京入不戮一人止傳檄而定耳馬擴曰兵凶器天道厭之貴朝滅契丹亦藉本朝之力今一旦渝盟舉兵相向豈不顧南朝積纍之國若稍飭邊備安能遽侵薩里穆爾曰國家若以貴朝為可憚則不長驅矣後牒且來公必見之莫若勸童大王速割河東河北以大河為界用存宋朝宗社乃報國也貫聞之驚悶不知所為即與所屬以赴闕稟議為名欲還京師知太原府張孝純止之曰金人渝盟大王當㑹諸路將士極力支吾今大王去人心必搖是以河東與金也河東既失河北豈可保耶願少留共圖報國兼太原地險城堅人亦習戰未必金便能克也貫曰貫受命宣撫非守上也必欲留貫置帥臣何為遂行孝純嘆曰平生童太師作幾許威望及臨事乃蓄縮畏攝奉頭鼠竄何面目見天子乎尼瑪哈既入朔代州中山府遂圍太原孝純悉力固守金斡里雅布入檀薊州郭藥師迎戰于白河敗績遂還燕山執知府蔡靖以降金盡取燕山州縣郭藥師驕恣與詹度同職自以節鉞欲居度上度以御筆所書有序藥師不從常勝軍士橫暴度不能制朝廷慮其交惡命蔡靖代度靖至坦懷待之藥師亦重靖稍為抑損及王安中被召靖代知府事於是良械精甲藥師令其部曲持以貿易於他道為竒巧之物以奉權貴宦侍譽言日聞於帝遂専制一路增募兵至三十萬而不改契丹服飾朝論頗以為疑進拜太尉召之入朝藥師辭不至帝令童貫行邊隂察其去就不然則挾之偕來貫至藥師迎于易州再拜帳下貫避之曰汝今為太尉位視二府與我等耳此禮何為藥師曰太師父也藥師唯拜我父焉知其他貫釋然遂邀貫視師至于逈野略無人迹藥師下馬當貫前掉旗一揮俄頃四山鐡騎耀日莫測其數貫衆皆失色歸為帝言藥師必能抗金蔡攸亦從中力主之謂其可倚故內地不復防制屢有告變及得其通金國書朝廷輒不省詹度亦言藥師瞻視非常趣向懷異始詔遣官究實而金兵已南下矣斡里雅布自平州破檀薊至三河蔡靖遣藥師及張企徽劉舜仁帥師四萬五千迎戰于白河敗績而還藥師遂帥所部兵劫靖及中都轉運使吕頥浩以降斡里雅布執靖及頥浩置軍以行於是燕山府所屬州縣皆為金有斡里雅布既得藥師益知宋虛實因以為鄉導懸軍深入矣罷浙江諸路花石綱延福宫西城租課及內外製造局詔內侍梁方平帥衛士守黎陽帝以金人南下悉以禁旅付內侍威武軍節度使梁方平守黎陽步軍都虞候何灌謂白時中曰金人傾國逺至其鋒不可當今方平掃精鋭以北萬有一不枝梧何以善吾後盍留以衛根本不從以皇太子為開封牧帝以金師日迫為憂議避兵之計蔡攸探知帝意欲內禪引給事中吳敏入對宰執皆在敏前奏事且曰金人渝盟舉兵深入陛下何以待之帝蹙然曰奈何時東幸計已定命李棁先出守金陵敏退詣都堂言曰朝廷便為棄京師計何理也此命果行須死不奉詔宰執以為言棁遂罷行而以太子為開封牧詔臣庶極諫天下勤王罷道官及大晟府行幸諸局初宇文虛中為童貫參議官虛中以廟謨失策主帥非人將有納侮自焚之禍上書言之王黼大怒遂不見報及金人南下貫與虛中還朝帝以虛中為保和殿大學士至是金兵日逼帝甚憂懼謂虛中曰王黼不用卿言今金人兩路並進事勢若此奈何虛中對曰今日宜先降詔罪已更革弊端俾人心悅天意回則備禦之事將帥可以任之帝即命虛中草詔曰朕獲承祖宗休德託於士民君王之上二紀于茲雖兢業存於中心而過咎形於天下蓋以寡昧之質藉盈成之業言路壅蔽導諛日聞恩幸持權貪叨得志搢紳賢能陷于黨籍政事興廢拘于紀年賦斂竭生民之財戍役困軍旅之力多作無益侈靡成風利源酤𣙜已盡而牟利者尚肆誅求諸軍衣糧不時而冗食者坐享富貴災異謫見而朕不寤庶衆怨懟而朕不知追惟已愆悔之何及應天下方鎮郡縣守令各帥募衆勤王捍邊能立竒功者並優加奬異不限常制草澤之中懷抱異材能為國家建大計定大業或出使疆外者並不次任用其尤異者以將相待之中外臣庶並許直言極諫雖有失當亦不加罪帝覽之曰今日不吝改過可便施行虛中又請出宫人罷應奉等遂罷道官及大晟府行幸局暨諸局務以宇文虛中為河北河東路宣諭使時欲召熙河經略使姚古秦鳯經略使种師中令其以本路兵會鄭洛外援河陽內衛京城帝謂虛中曰卿宜以一使名護其軍遂命為宣諭使虛中以檄召姚古种師中兵馬令直赴汴京應援以吳敏為門下侍郎帝柬幸之意益決太常少卿李綱謂敏曰建牧之議豈非欲委太子以留守之任乎今敵勢强盛非傳太子以位號不足以招徠天下豪傑敏曰監國可乎綱曰肅宗靈武之事不足以復邦而建號之議不出於明皇後世惜之上聰明仁恕公曷不為上言使公言萬一得行將見金人悔禍宗社底寧天下受其賜翌日敏入對具以綱言白帝帝即召綱入議綱刺臂血上疏曰皇太子監國禮之常也今大敵入攻安危存亡在呼吸間猶守常禮可乎名分不正而當大權何以號召天下期成功於萬一哉若假皇太子以位號使為陛下守宗社收將士心以死捍敵天下可保帝意遂決明日宰臣奏事帝留李邦彥語敏綱所言遂拜敏門下侍郎草詔傳位皇太子帝傳位于皇太子太子即位尊帝為教主道君太上皇帝皇后為太上皇后居龍德宫庚申帝下詔禪位太子自稱曰道君皇帝太子入禁中被服泣涕固辭不許辛酉太子即位尊帝為教主道君太上皇帝退居龍德宫以李邦彥為龍德官使蔡攸吳敏副之以李綱為兵部侍郎綱上書言方今中國勢弱君子道消法度紀綱蕩然無統陛下履位之初當上應天心下順人欲攘除外患使中國之勢尊誅鋤內姦使君子之道長以副道君皇帝付託之意召對延和殿時金議割地綱言祖宗疆土當以死守不可以尺寸與人拜為兵部侍郎立妃朱氏為皇后后武康節度使伯材之女以耿南仲簽書樞密院事南仲帝東宫舊僚也李鄴如金師告內禪且請修好鄴至慶源府斡里雅布欲還郭藥師曰南朝未必有備不如姑行從之太學生陳東伏闕上書請誅蔡京王黼童貫梁師成李彥朱勔以謝天下時天下皆知京等誤國而用事者多受其薦引莫肯為帝明言之東率諸生上書曰今日之事蔡京壞亂於前梁師成隂賊於內李彥結怨於西北朱勔聚怨於東南王黼童貫又從而結怨于遼金敗祖宗之盟失守國之信創開邊隙使天下勢危如絲髮此六賊者異名而同罪伏願陛下擒此六賊肆諸市朝傳首四方以謝天下帝嘉納之通鑑續編卷十二
