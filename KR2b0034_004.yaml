body:
  text: 通鑑續編卷一元陳桱撰盤古氏太極生兩儀兩儀生四象四象變化而庶類繁矣相傳首出御世者曰盤古氏又曰渾敦氏盤古猶磐固也渾敦未昭晣之謂也皇王大紀曰盤古生於大荒莫知其始明天地之道達隂陽之變為三才首君於是混茫開矣天皇氏一姓十三人繼盤古氏以治是曰天靈澹泊無爲而俗自化始制干支之名以定歲之所在十干曰閼逢旃蒙柔兆疆圉著雍屠維上章重光𤣥黓昭陽十二支曰困敦赤奮若攝提格單閼執徐大荒落敦牂協洽涒灘作噩閼茂大淵獻地皇氏一姓十一人繼天皇氏以治爰定三辰是分晝夜以三十日為一月人皇氏一姓九人繼地皇氏以治是曰泰皇相厥山川分為九區人居一方故又曰居方氏當是時也萬物羣生淳風沕穆主不虚王臣不虚貴政教君臣所自起飲食男女所自始亦號九皇氏附十紀説按春秋元命包曰天地開闢至春秋魯哀公蔣十四年獲麟之嵗凡二百二十六萬七千年分為十紀其一曰九頭紀即人皇氏也古者謂一人為一頭人皇兄弟九人故也二曰五龍紀又謂之五姓兄弟五人曰皇伯皇仲皇叔皇季皇少治在五方司五行布山嶽繼人皇御世者也方是時也世亟巢穴日月貞明三曰攝提紀五十九姓繼五龍氏以治分天下而居焉四曰合雒紀三姓繼攝提氏以治始教民穴居者也五曰連通紀六姓繼合雒氏以治六曰叙命紀四姓繼連通氏以治七曰循蜚紀八曰因提紀九曰禪通紀十曰疏仡紀自人皇氏至叙命氏凡八十三君自循蜚而後皆有世次可紀禪通則終于炎帝疏仡則始于黄帝以迄于周言雖繁而事不經見聞者疑之夫人靈於萬物而氣禀不齊其才德出類者則為衆所宗此君道之始也蠭螘尚然况于人哉以盤古之先為無君耶吾不得而知也以人皇之後為有君耶吾不得而泯也慎其世而著其號舍其怪而存其常可也故謹列循蜚紀以下附諸人皇氏之末備考覽焉循蜚紀循蜚者以其時徳厚信矼人循其化速若蜚也有號而無世凡二十二氏鉅靈氏出於汾脽握大象持化權揮五丁之士驅隂陽反山川居無恒處而跡躔于蜀句彊氏譙明氏涿光氏鉤陣氏黄神氏􅩅神氏犂靈氏大騩氏鬼騩氏弇兹氏泰逢氏冉相氏盖盈氏大敦氏靈陽氏巫常氏泰壹氏是為皇人調大鴻之氣正神明之位葢範無形嘗無味要㑹乆視操法鑑而長存者空桑氏神民氏又曰神皇葢使神民異業精氣通行者猗帝氏次民氏次民之世穴處終矣因提紀因提者其世咸有制作俾後人可因以利時也有號有世凡十三氏辰放氏古初之人卉服蔽體辰放氏作教民􅠡木茹皮以禦風霜綯髪閐首以去靈雨而人從之命之曰衣皮之民傳四世蜀山氏蜀之為國肇自人皇其始蠶叢拍濩魚鳬三君各數百嵗同號蜀山蠶叢居瞿上魚鳬治導江逮蒲澤俾明時人氓椎結左言不知文字事莫克傳最後望帝杜宇云豗傀氏傳六世渾沌氏傳七世東戸氏子思子曰東户氏之熙載也紹荒屯遺美好垂精拱黙而九寰以承流當是之時禽獸成羣竹木遂長道上顔行而不拾遺耕者餘餼宿之隴首其歌樂而無謡其哭哀而無聲葢至德之世也傳十七世皇覃氏又曰離光氏春秋命厯序曰皇覃氏之世也在而不治官天地府萬物害乎無假是故死生同兆而不可相陵傳七世啓統氏傳三世吉夷氏傳四世几蘧氏亢倉子曰几蘧氏之在天下也不治而不亂徇耳目内通而外乎心知天下之人惟知母不知父鶉居鷇飲而不求不譽晝則旅行夜則類處及其死也稾舁風化而已令之曰知生之民天下蓋不足治也稀韋氏傳四世有巢氏太古之民穴居野處搏生咀華與物相友無有妎傷之心逮乎後世人民機智而物始為敵爪牙角毒槩不足以勝禽獸有聖者作構木為巢教民居之以避其害號曰有巢氏之民傳二世燧人氏自有巢氏教民巢居然猶未知熟食也有聖人作觀星辰而察五行知空有火麗木則明於是鑚木取火教民以烹餁而民利之故號燧人氏以為燧者火之所生也乃别五木以改火順四時而遂天之意由是火之功用洽矣時未有文字燧人氏始作結繩之政立傳教之臺為日中之市興交易之道人情以遂故又謂之遂皇有四佐焉曰明由必育成博隕丘傳四世庸成氏羣玉之山平阿無隘四徹中繩庸成氏之所守先王之冊府也傳八世禪通紀禪通者通于封禪之君也史皇氏倉帝名頡有睿德生而能書及長登陽虚之山臨于𤣥扈洛水之汭靈龜負書丹甲青文倉帝受之遂窮天地之變仰觀奎星圓曲之勢俯察龜文鳥羽山川掌指而剏文字文字成天為雨粟鬼為夜哭居陽武而葬利鄉柏皇氏中央氏大庭氏栗陸氏昆連氏軒轅氏作于空桑之北紹物開智見轉蓬而制乗車横木為軒直木為轅故號軒轅氏赫胥氏葛天氏尊盧氏祝融氏又曰祝誦氏是時天下洽和萬物咸若祝融聽弇州之鳴鳥以為樂歌諧神明而和人聲以火施化亦號赤帝故後世火官因以為號都于鄶葬衡山之陽昊英氏有巢氏朱襄氏隂康氏無懷氏太昊伏犧氏女皇氏炎帝神農氏按禪通紀凡十九氏其軒轅祝融或當在太昊前餘合繫太昊之後也疏仡紀疏以知逺仡以審斷仁義道德之所用也其世則自黄帝以訖于周三皇太昊伏犧氏太昊之母居于華胥之渚履巨人跡意有所動虹且遶之因而始娠生帝于成紀以木德繼天而王故風姓有聖德象日月之明故曰太昊作都于陳教民佃漁畜牧以充庖厨人生之始也與禽獸無異知有母而不知其父知有愛而不知其禮卧則呿呿起則吁吁飢則求食飽則棄餘茹毛飲血而衣皮革太昊始作網罟以佃以漁以贍民用故曰伏犠氏養犧牲以充庖厨故又曰庖犧氏畫八卦造書契太昊德合上下天應以鳥獸文章地應以河圖洛書於是仰觀象于天俯觀法于地中觀萬物之情始畫八卦卦有三爻因而重之為卦六十有四以通神明之德作書契以代結繩之政書制有六一曰象形二曰假借三曰指事四曰㑹意五曰轉注六曰諧聲使天下義理必歸文字天下文字必歸六書作甲厯起於甲寅支干相配為十二辰六甲而天道周矣嵗以是紀而年不亂月以是紀而時不易晝夜以是紀而人知度東西南北以是紀而方不惑制嫁娶上古男女無别太昊始制嫁娶以儷皮為禮正姓氏通媒妁以重人倫之本而民始不瀆以龍紀官太昊因龍馬負圖出于河之瑞始名官而以龍紀號曰龍師命朱襄為飛龍氏造書契昊英為潜龍氏造甲厯大庭為居龍氏治屋廬渾沌為降龍氏驅民害隂康為土龍氏治田里栗陸為水龍氏繁滋草木疏導泉源又命五官春官為青龍氏又曰蒼龍夏官為赤龍氏秋官為白龍氏冬官相為黒龍氏中官為黄龍氏於是共工為上相柏皇為下朱襄昊英常居左右栗陸居北赫胥居南昆連居西葛天居東隂康居下分理宇内而政化大洽造琴瑟太昊作荒樂歌扶徠詠罔罟以鎮天下之人命曰立基斵桐為琴繩絲為弦弦二十有七命之曰離徽以通神明之貺以合天人之和絙桑為三十六弦之瑟以修身理性反其天真而樂音自是興焉在位百十五年崩傳十五氏女媧氏與太昊同母生而神靈佐太昊正昏姻以重萬民之判是為神媒太昊没共工氏作亂振滔洪水以禍天下女媧役其神力以與共工氏較卒滅共工氏而誅之以治天下都于中皇之山是為女皇命臣隨作笙簧以通殊風娥陵制都良筦以一天下之音用五十弦之瑟於澤丘以郊天侑神聽之極悲乃破為二十五弦以抑其情而樂乃和治百三十載而没柏皇氏之在世也為而不有應而不求居于皇人之山中央氏亦曰中皇氏大庭氏之膺籙也三辰豐輝五鳯異色都于曲阜故魯有大庭氏之庫亦曰朱顔氏栗陸氏之為政敖愎自用民始攜叛其臣東里子諫而被殺天下益貳栗陸遂亡驪連氏亦曰昆連氏渾沌氏赫胥氏之為治也尊民而重事方是之時人居不知所為行不知所之鼓腹而游含哺而嬉晝動夕息渇飲飢食莫知作善而作惡也尊盧氏之立政也官天地府萬物革天下之故而世用寧治居嵹臺之陽昊英氏之居位也人民少而草木鳥獸繁葢衣薪之代也又曰子英有巢氏昔在上古人多禽獸之難聖人教之巢居人獲安焉及其乆也木處而顛有聖人教之編槿而廬緝藋而扉塓塗茨翳以違其禍以其革有巢之化故亦號有巢氏是曰古皇盖屋廬之始也朱襄氏之時恒風振蕩果木不實朱襄命士達作五弦之瑟以來隂氣定羣生而天下治又曰子襄葛天氏之世不言而信不化而行蕩蕩乎無能名之俗以熙熙其作樂也三人操牛尾投足以歌八闋一曰載民二曰𤣥鳥三曰遂草木四曰奮五穀五曰謹天常六曰達帝功七曰依地德八曰總萬物之極是為廣樂隂康氏之時水瀆不疏隂凝而易閉人鬱于内腠理殢著而多重膇隂康思所以利其關節乃制舞焉治于華原無懐氏之撫世也以道存生以德安刑其民甘食而樂居懐土而重生形有動作心無好惡雞犬之音相聞民至老死不相徃來命之曰無懐氏之民世傳伏犧氏之後凡十五氏為天子而後神農氏作今按易繫辭曰庖犧氏没神農氏作則相傳者不足信矣况太昊命官而十五氏多預焉則是皆佐伏犧為治之臣明矣豈當其時各君一方以理民如後世諸侯之國耶共工氏太昊之没共工氏曰康回老髦身朱髮任智自神俶亂天常竊保冀方自謂水德乃以水紀官師虞于湛樂淫佚其身欲壅防百川隳髙堙卑以害天下皇天弗福庶民弗助女媧氏戮之共工氏遂亡炎帝神農氏少典氏之君娶于有蟜氏之女曰安登生二子焉長曰石年育于姜水故以姜為姓以火德代伏犧氏治天下故曰炎帝其起本于烈山又號烈山氏亦曰連山氏其初國伊繼國耆合而稱之故又號曰伊耆氏都陳遷曲阜初蓺五穀嘗百草古者民茹草木之實食禽獸之肉而未知耕稼炎帝因天時相地宜斵木為耜揉木為耒始教民蓺五穀而農事興焉民有疾病未知藥石炎帝始味草木之滋察其寒温平熱之性辨其君臣佐使之義嘗一日而遇七十毒神而化之遂作方書以療民疾而醫道立矣復察水泉甘苦令人知所避就由是居民安食力而無夭札之患天下宜之故號神農氏始為日中之市炎帝之世其俗樸重端慤不忿争而財足無制令而民從威厲而不殺法省而不煩始列㕓于國日中為市致天下所之民聚天下之貨交易而退各得其以火紀官因火德王故以火紀官為火師春官為大火夏官為鶉火秋官為西火冬官為北火中官為中火在位百四十年崩于長沙之茶鄉炎帝之世諸侯夙沙氏叛不用帝命其臣箕文諫而被殺炎帝益修厥徳夙沙之民自攻其君而來歸其地於是南至交趾北至幽都東至暘谷西至三危莫不從其化也傳八帝至榆罔而亡神農氏納莽水氏之女曰聽詙生臨魁嗣為炎帝在位八十年臨魁生帝承在位六十年承生帝明在位四十九年明生帝宜又曰帝直在位四十五年冝生帝來亦曰帝克在位四十八年來生帝裏又曰帝居在位四十三年居生節莖節莖生克及戲皆不在帝位克生帝榆罔榆罔居于空桑為政束急務乗人而鬭其㨗於是諸侯攜貳其臣蚩尤作亂帝遜居于涿鹿有熊國君曰公孫軒轅實懋聖德諸侯歸之帝之五十五年諸侯尊軒轅為天子降封帝于路神農氏遂亡炎帝别子曰柱有聖德佐帝播種五穀後世德之祀以為稷有子曰慶甲或云嘗嗣炎帝云戲生器器生祝融為黄帝司徒祝融生術囂術囂生勾龍為顓頊后土能平九州辨土地之冝以教兆民後世祀之以配社勾龍生垂垂為堯共工寔生伯夷封于吕為舜四嶽其後吕尚周封于齊黄帝有熊氏初神農氏母弟世嗣少典氏為諸侯帝榆罔之代少典國君之妃曰附寳者感電光繞斗而有身生帝于軒轅之丘因名軒轅姓公孫軒轅生而神靈弱而能言㓜而徇齊長而敦敏成而聦明國于有熊故號有熊氏長于姬水故又以姬為姓及炎帝戰于阪泉神農氏衰諸侯相侵伐炎帝榆罔弗能征於是軒轅習用干戈以征不享諸侯咸來賔從榆罔欲侵陵諸侯諸侯益叛之軒轅修德振兵治五氣蓺五種撫萬民度四方教熊羆貔貅貙虎以與榆罔戰于阪泉之野三戰然後得其志誅蚩尤于涿鹿蚩尤姜姓炎帝之裔也好兵喜亂作刀㦸大弩以暴虐于天下兼并諸侯貪欲無度炎帝榆罔不能制之命居少顥以臨西方蚩尤益肆其惡出羊水登九淖以攻炎帝于空桑炎帝遜居涿鹿軒轅乃徵師諸侯與蚩尤戰于涿鹿之野蚩尤作大霧軍士昏迷軒轅為指南車以示四方遂擒蚩尤戮于中冀因名其地曰絶轡之野諸侯尊為黄帝代神農氏以治天下軒轅自涿鹿還諸侯咸尊為天子以代神農氏因其有土德之瑞故號曰黄帝以雲紀官帝初受命適有雲瑞乃以雲名官為雲師立六相帝舉風后力牧太山稽常先大鴻以治民劉恕外紀曰黄帝得六相而天地治神明至風后明乎天道故為當時太常察乎地利故為禀者奢龍辨乎東方故為土師祝融辨乎南方故為司徒大封辨乎西方故為司馬后土辨乎北方故為李立占天之官帝既受河圖得其五要乃設靈臺立五官以叙五事命鬼臾區占星鬬苞授規正日月星辰之象於是乎有星官之書命羲和占日尚儀占月車區占風命大撓作甲子帝命大撓探五行之情占斗柄所建始作甲子甲乙丙丁戊己庚辛壬癸謂之幹子丑寅卯辰巳午未申酉戌亥謂之枝枝幹相配以名曰而定之以納音命容成作葢天及調厯帝命容成作葢天以象周天之形綜六術以定氣運因問于鬼㬰區曰上下周紀其可數乎對曰天以六節地以五制周天氣者六期為備終地紀者五嵗為周五六合者嵗三千七百二十氣為一紀六十嵗千四百四十氣為一周太過不及斯以見矣乃因五量治五氣起消息察發斂以作調厯嵗紀甲寅日紀甲子而時節定是嵗己酉朔旦日南至而獲神䇿得寶鼎冕侯問於鬼臾區對曰是謂得天之紀終而復始乃迎日推䇿造十六神厯積邪分以置閏配甲子而設蔀於是時恵而辰從矣命𨽻首作數帝命𨽻首定數以率其羡要其㑹而律度量衡由是而成焉命伶倫造律帝命伶倫自大夏之西阮隃之隂取竹於解谿之谷以生空竅厚鈞者斷兩節間長三寸九分而吹之以為黄鐘之宫制十二筩以聽鳯凰之鳴而别十二律其雄鳴為六雌鳴亦六以比黄鐘之宫生六律六吕候氣之應以立宮商角徵羽之聲治隂陽之氣節四時之變推律厯之數起消息正閏餘命榮猨作十二鐘帝命榮猨鑄十二鐘協月筩以和五音立天時正人位焉命大容作咸池之樂帝命大容作承雲之樂是為雲門大卷著之椌楬以道其和中春之月乙卯之辰日在奎始奏之命曰咸池作冕旒正衣裳帝作冕垂旒充纊為𤣥衣黄裳以象天地之正色旁觀翬翟草木之華乃染五采為文章以表貴賤於是衮冕衣裳之制興作器用帝命寗封為陶正赤將為木正以利器用揮作弓夷牟作矢以威天下岐伯作鼓吹鐃角靈鞞神鉦以揚徳建武作舟車帝命共鼓化狐刳木為舟剡木為楫以濟不通邑夷法斗之周旋魁方杓直以攜龍角作大輅以行四方由是車制備服牛乗馬引重致逺而天下利矣作合宫帝廣宫室之制遂作合宫祀上帝接萬靈布政教焉作貨幣帝笵金為貨制金刀立五幣設九棘之利為輕重之法以制國用而貨幣行矣作内經帝以人之生也負隂而抱陽食味而被色寒暑盪之於外喜怒攻之於内夭昬凶札君民代有乃上窮下際察五氣立五運洞性命紀隂陽咨於岐伯而作内經復命俞跗岐伯雷公察明堂究息脉巫彭桐君處方餌而人得以盡年命元妃西陵氏教民蠶西陵氏之女嫘祖為帝元妃始教民育蠶治絲繭以供衣服而天下無皴瘃之患後世祀為先蠶畫野分州經土設井帝内行刀鋸外用甲兵制陣法設旗旄天下有不順者從而征之平者去之披山通道未嘗寧居東至于海西至于空桐南至于江北逐葷粥合符釡山而邑于涿鹿之阿遷徙無常處以師兵為營衛於是畫野分州得百里之國萬區命匠營國邑置左右大監監于萬國萬國以和遂經土設井以塞爭端立步制畝以防不足使八家為井井開四道而分八宅井一為隣隣三為朋朋三爲里里五為邑邑十為都都十為師師十為州分之於并而計於州則地著而數詳屈軼生于庭鳯皇巢于閣麒麟遊于囿帝順天地之紀幽明之占死生之説存亡之難時播百穀草木淳化鳥獸蟲蛾旁羅日月星辰水波土石金玉勞勤心力耳目節用水火財物由是民不習僞官不懐私市不預價城郭不閉見利不争風南時若人無夭札物無疵癘虎豹不妄噬鷙鳥不妄搏裔夷之人罔不來享有草生于庭佞人入則指之名曰屈軼鳯皇巢于阿閣麒麟遊于苑囿焉在位百年崩于荆山之陽帝採首山之銅鑄三鼎於荆山之陽八月既望鼎成崩焉年百十有一嵗葬橋山其臣左徹感思取衣冠几杖而廟祀之帥諸侯羣臣嵗時朝焉帝子二十有五人帝元妃西陵氏之女曰嫘祖生昌意𤣥囂龍苗二妃方纍氏之女曰節生休及清三妃肜魚氏之女生揮及夷彭四妃曰嫫母貌惡德充生蒼林禺陽其衆妾之子十六人總四妃之子為二十有五其得姓者十有四人别為十二姓曰祁己滕箴任荀僖姞儇依二姬二酉及有虞氏有天下封帝後為侯伯者十有九焉或云休僖姓黄帝之崩諸侯尊休為帝號有鴻氏無思無為不慮不圖而臻至治在位四十七年而崩𦵏于雍有子曰白民曰嘻嘻生季格格生帝魁白民銷姓降居于夷其别子為防風氏又曰帝鴻氏有别子曰縉雲氏不才子曰混沌縉雲氏娶土敬氏之女曰炎融寔生驩兠堯放之崇山驩兠生三苗堯竄之三危三苗氏有弟曰饕餮又曰蒼林生始均五帝少昊金天氏名摯姓已黄帝之子𤣥囂也母曰嫘祖感大星如虹下臨華渚之祥而生帝黄帝之世降居江水邑于窮桑故號窮桑氏國于青陽因號青陽氏以金德王天下遂號金天氏能修大昊之法故曰少昊或云黄帝之子清是為青陽氐娶于類氏之女曰皇娥生摯于河之湄都于曲阜以鳥紀官少昊之立也鳯鳥適至因以鳥紀官鳯鳥氏厯正也𤣥鳥氏司分者也伯趙氏司至者也青鳥氏司啓者也丹鳥氏司閉者也祝鳩氏司徒也雎鳩氏司馬也鳲鳩氏司空也爽鳩氏司寇也鶻鳩氏司事也五鳩鳩民者也五雉為五工正利器用正度量夷民者也九扈為九農正扈民無淫者也作大淵之樂帝之御世也諸福之物畢至爰書鸞鳯立建鼔制浮磬以通山川之風作大淵之樂以諧人神和上下是曰九淵在位八十四年崩壽百嵗𦵏于雲陽故後世又曰雲陽氏帝元妃生倍伐降處緡淵次妃生般為弓正是制弓矢主祀弧星封于尹城有子曰昧為𤣥㝠師于高陽之世少昊别子四人曰重該脩熙其不才子曰窮奇顓頊高陽氏姬姓祖曰黄帝父曰昌意昌意娶蜀山氏之女曰昌僕是為女樞感瑶光貫月之祥生帝于若水年十嵗佐少昊年二十即帝位以水徳紹金天氏政初國高陽故號高陽氏或云昌意娶昌僕生乾荒乾荒娶于母家曰女樞寔生顓頊都于帝丘命五官顓帝之世不能紀逺始為民師而命以民事以少昊之四子重該脩熙寔能金木及水乃俾重為木正曰句芒該為金政曰蓐收脩熙相代為水政曰𤣥㝠又以炎帝之子句龍為土政而帝之子為火政曰祝融是謂五官命南正重司天北政黎司地以屬神民古者民神異業是以禍災不至而求用不匱少昊氏衰九黎亂德民神雜揉不可方物家為巫史無有要質民匱于祀嘉生不祥無物以享禍災薦臻莫盡其氣顓帝受之乃命南正重司天以屬神北正黎司地以屬民使復舊常無相侵瀆民用安生以斗杓建寅之月為厯元帝作厯以孟春之月為元是嵗正月朔旦立春五星㑹于天厯營室冰凍始泮蟄蟲始發雞始三號天曰作時地曰作昌人曰作樂鳥獸萬物莫不應和故顓帝為厯宗也作承雲之樂帝命飛龍氏㑹八風之音為圭水之曲以召氣而生物浮金効珍於是鑄為之鐘作五基六英之樂以調陰陽享上帝朝羣侯名曰承雲在位七十八年崩帝靜淵以有謀疏通而知事養材以任地載時以象天依鬼神以制義治氣以教化潔誠以祭祀北至于幽陵南至于交趾西至于流沙東至于蟠木動静之物大小之神日月所照莫不砥屬年九十一而崩𦵏濮陽帝娶鄒屠氏之女生駱明蒼舒隤敳檮戭大臨厖降庭堅仲容叔達又娶勝濆氏之女生卷章庶子曰窮蟬其不才子曰檮杌自蒼舒至叔達所謂齊聖廣淵明允篤誠天下之人謂之八愷者也駱明姒姓生伯鯀鯀生禹是為夏后氏卷章妻曰女嬌生黎及回黎與回代為祝融于高辛之世吳回生陸終陸終生子六人曰樊曰惠連曰籛鏗曰㑹人曰曹姓曰季連樊封于昆吾籛鏗封于彭是為彭祖其孫元哲封于韋是為豕韋昆吾豕韋當夏之世代為侯伯季連芊姓其後為楚窮蟬生敬康敬康生句望句望生橋牛橋牛生瞽叟瞽叟生舜是為有虞氏或曰敬康之先國于虞非顓帝之裔也顓帝之裔孫曰女修生大業大業之妻曰女莘生大費是為伯益佐禹治水有功舜賜姓嬴氏禹薦于天者其長子曰大廉其後為秦為趙帝嚳高辛氏名夋姓姬祖曰少昊父曰蟜極生而神靈年十五佐顓帝受封于辛年三十以木德代高陽氏為天子以其肇基于辛故號高辛氏都于亳作九招之樂帝命咸黒典樂為聲歌命曰九招在位七十年崩帝普施利物不於其身聰以知逺明以察微順天之義知民之急仁而威惠而信修身而天下服取地之財而節用之撫教萬民而利誨之歴日月而迎送之明鬼神而敬事之其色郁郁其德嶷嶷其動也時其服也士帝漑執中而徧天下日月所照風雨所至莫不服從年百五嵗而崩葬頊丘帝元妃有邰氏女曰姜嫄生棄為舜后稷其後為周次妃有娀氏女曰簡狄生契為舜司徒其後為商三妃陳鋒氏女曰慶都生堯是為陶唐氏四妃娵訾氏女曰常儀生摯庶子曰伯奮仲堪叔獻季仲伯虎仲熊叔豹季狸忠肅共懿宣慈惠和天下之人謂之八元其不才子曰實沈閼伯子摯卽天子位九年而廢帝嚳崩摯嗣立荒淫無度不修善政居九年諸侯廢之而尊堯為天子帝堯陶唐氏見金氏通鑑前編及桱歴代筆記帝舜有虞氏見前編及筆記三代夏受舜禪商滅夏周滅商已上見前編及綱目并筆記秦滅周兩漢西漢滅秦東漢三國後漢魏篡東漢滅後漢呉兩晉西晉篡魏東晉南北朝宋篡東晉齊篡宋梁篡齊陳篡梁已上南朝元魏東魏西魏北齊篡東魏北周篡西魏滅北齊已上北朝隋篡北周滅陳唐篡隋五代梁篡唐唐滅梁晉篡唐漢代唐周篡漢已上見綱目并筆記通鑑續編卷一
