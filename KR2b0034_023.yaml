body:
  text: 通鑑續編卷二十元陳桱撰辛未四年金大安三年年夏神宗遵頊光定元年太祖皇帝六春三月臨安府大火火二日乃滅官寺多焚延及太廟詔遷神主于壽慈宫火息乃還太廟省部皆寓治驛寺西域哈喇婁部降于蒙古夏四月蒙古侵金金使鈕祜祿哈逹乞和蒙古不許初金納哈塔敏珠爾鎮守北鄙知蒙古將侵邊壤奔告于金主金主曰彼與我無釁汝何言此敏珠爾曰近見其鄰部附從西夏獻女而造箭製楯不休凡行營則令男子乘車蓋欲息馬力也非圖我而何金主以其擅生邊隙囚之及蒙古侵擾雲中九原連嵗不休遂破大水濼以進金主始恐乃釋敏珠爾之囚而遣西北路招討使鈕祜祿哈逹乞和太祖皇帝不許金命其平章政事通吉遷嘉努參知政事完顔呼沙呼行省事于撫州西亰留守赫舍哩呼沙呼行樞密院事以備邊呼沙呼即執中阿蘇裔孫也六月余嶸如金不至而復賀生辰也金有蒙古之難不至而還自是宋使多不能逹而金使則不廢常禮秋八月夏主安全卒族子遵頊立金通吉遷嘉努完顔呼沙呼禦蒙古于灰河赫舍哩呼沙呼遁還金師遂敗績蒙古取大同府桓撫州及西北州縣遷嘉努呼沙呼至烏沙堡未及設備蒙古兵奄至攻烏月營取之遷嘉努帥衆禦于灰河相持三日太祖皇帝率精騎三千至安定之北呼沙呼即以麾下徑卒七千遁去於是遷嘉努等兵皆敗走蒙古追至翠屏口金師又敗蒙古遂取西京及桓撫州太祖皇帝復遣其大太子卓沁二太子察罕台三太子靖太宗皇帝諱諤格德依帥兵分取雲內東勝武朔豐等州由是金德興𢎞州昌平懷來結山豐潤密雲撫寧臬寧東過平灤南至清滄自臨潢趣遼河西南至欣代皆降于蒙古閏九月金完顔呼沙呼帥師南還蒙古追之金師潰于會河堡蒙古入居庸關而去蒙古自撫州進攻奉聖州破之遂至野狐嶺時金招討使完顔糾堅監軍完顔萬努等率兵號四十萬駐于嶺下蒙古兵至或謂紏堅曰蒙古新破撫州方以所獲賜其下馬牧于野當乘其不虞掩擊之糾堅曰此危道也不若馬步俱進為計萬全太祖皇帝聞之進兵于獾兒觜糾堅遣明安問蒙古舉兵之故明安反降于蒙古以虛實告之太祖皇帝遂與糾堅等戰金師大敗死者不可勝計縣蒙古乘鋭而前呼沙呼畏其鋒不敢拒戰退走宣平中土豪請為前鋒呼沙呼不能用但問此去宣德間道而已土豪嗤之曰溪澗曲折我輩諳知之行省不知用地利力戰乃謀走也今敗矣呼沙呼不從引兵南行蒙古兵踵擊之至會河川金兵大潰呼沙呼僅以身免走入宣德蒙古兵乘勝薄宣德遂克晉安縣逰兵至居庸關守將完顔福壽棄關遁蒙古兵克之金中都戒嚴禁男子不得輒出城蒙古遊奕至都城下金主欲南奔汴會衛卒自誓迎戰蒙古兵敗而去金主乃止命泰州刺史珠格髙琪屯門外冬十月詔江淮京湖四川謹飭邊備以金有蒙古之難也十一月金以圖克坦鎰為右丞相鎰為上京留守聞蒙古兵日攻西北上言曰自國家與達旦交兵以來彼聚而行我散而守以聚攻散其敗必然不若入保大城併力備禦昌桓撫三州素號富實人皆健勇可內徙之以益兵勢人畜財貨不至亡失參政梁􅚻曰如此是自蹙境土也金主從􅚻謀及桓昌撫沒于蒙古金主始悔之中都戒嚴鎰聞之曰事急矣乃選兵二萬遣同知烏克遜鄂屯將之入衛金主嘉之徴拜右相鎰至奏曰遼東根本距中都數千里萬一受兵州府顧望必須報可誤事多矣可遣大臣行省以鎮之金主不恱曰無故置行省徒搖人心耳不從金赫舍哩呼沙呼至燕以為右副元帥帥師次于媯川呼沙呼之棄西亰而還也至蔚州擅取官庫銀五千兩及衣幣諸物奪官民馬與從行人入紫荆關殺漆水令至中都金主不問其罪而以為副元帥呼沙呼請兵二萬北屯宣德金主與三千人屯媯川呼沙呼不恱金通吉遷嘉努免貶完顔呼沙呼為咸平路兵馬總管灰河會河之敗金之精鋭皆盡衆謂二帥必誅用及遷嘉努止除名而呼沙呼降官由是將士不命矣金益都盜楊安兒寇掠山東州縣初益都楊安國少無賴以鬻鞍材為業市人呼為楊安兒安國因以自名泰和中金人南伐山東無賴往往相聚剽掠詔州縣捕之安貌時為羣盜亦請降𨽻名軍中纍官至防禦使及蒙古兵薄中都詔招鐵瓦敢戰軍得千餘人以唐古哈達為都統安兒副之以戍邊安兒亡歸山東與張汝楫聚黨攻劫州縣殺掠官吏安兒以其舅劉全為帥展王敏為謀主汲君立王琳閻通董友張正忠孫武正等為將山東大擾壬申五年金崇寧元年年太祖皇帝七春三月夏人寇金葭州乘其有蒙古之難也金赫舍哩呼沙呼有罪放歸田里呼沙呼欲移屯南口上言曰蒙古兵來必不能支一身不足惜三千兵為可憂十二關建春萬寧宫且不保金主惡其言下有司按問詔數其十五罪罷歸田里蒙古取金宣德府太祖皇帝既克宣德遂攻德興府坎墉而登金人禦之蒙古兵不利太祖皇帝與竒珠駙馬復擁楯以登而射之金人潰太祖皇帝始得脫身走四太子睿宗皇帝諱圗類因盡取德興府境內諸城堡而去金人復守之夏五月安南國王李龍􅧪卒子昊旵嗣昊旵尋卒無子其壻陳日煚遂主國事昊旵尋卒無子以女昭聖主國事其壻陳日煚因襲取之李氏自公藴八傳凡二百二十餘年而亡金以空名敕牒募人買之金河東陜西大飢斗米錢數千流莩滿野金泰始盜劉二祖寇掠淄沂州秋七月雨太廟屋壞癸酉六年金至寧元年九月以後宣宗珣貞祐元年太祖皇帝八年春正月宇文紹節卒三月樓鑰罷夏四月以章良能參知政事五月金復以赫舍哩呼沙呼為右副元帥帥師次于城北夏人寇金保安州慶陽府金完顔綱及蒙古戰于縉山金師敗績元帥右監軍珠格髙琪屯縉山以備邊善撫士卒皆樂為用及蒙古兵將至左丞完必顔綱行省事于縉山圖克坦鎰曰髙琪在彼行省不自往也若益兵助之彼之功即公之功矣綱不從果大敗敵勢益張秋八月金呼沙呼弒其主永濟九月升王珣立以呼沙呼為太師尚書令都元帥封澤王呼沙呼帥士三千屯中都城北與其黨完顔綽努富察魯沁烏庫哩達喇等謀作亂會金主以蒙古兵在居庸關而呼沙呼日務馳騖不恤軍事遣使責之使者至呼沙呼怒遂妄稱知大興府圗克坦南平謀反奉詔入討八月壬辰中夜分其軍為三由章義門入自將一軍由通玄門入恐城中兵出拒先遣一騎馳抵東華門大呼曰蒙古至北關已接戰矣既又遣一騎往亦如此乃使其黨圖克坦金壽召徒單南平南平不知行至廣陽門呼沙呼遇之於馬上手刺殺之并其從者護衛十人長完顔實古納聞亂召兵五百迎戰而死進至東華門護衛實哷竒爾等納之呼沙呼入宫盡以其黨易宿衛自稱監國都元師居大興府陳兵自衛召聲伎與親黨會飲癸巳以兵逼金主出宫乘素車至衛邸遣武衛兵二百錮守之尚宫左夫人鄭氏為內職掌寶璽呼沙呼欲除拜其黨令黃門入宫收璽鄭氏曰璽天子所用呼沙呼人臣取將何為黃門曰今天時大變主上猶且不保况璽乎御侍當思自脫計鄭氏厲聲曰若輩宫中近侍恩遇尤隆君難不以死報反為逆豎奪璽耶我死可必璽不可得也遂暝目不語黃門乃還呼沙呼復遣人奪取宣命之寶除拜百餘將人丞相圖克坦鎰時以墮馬傷足在告聞難作命駕入省或告之曰省府皆以軍士守之不可入矣少頃兵士索人於閭巷鎰乃還第呼沙呼欲僣位猶豫不決以鎰人望乃詣訪之鎰從容謂曰升王章宗之兄顯宗長子衆望所屬元帥決策立之萬世之功也呼沙呼然之乃遣宦者李思中弒金主於邸誘完顔綱還而殺之因盡撤沿邊諸軍赴中都平州騎兵屯薊州以自重遣使迎升王珣于彰德九月甲子辰王至燕即位珣本名烏達布顯宗庶長蒙古使伊埒濟如金議和且請昏也金以圖克坦鎰為左丞相閏月金主立其子守忠為太子金追廢其主永濟為東海郡侯冬十月蒙古復使伊埒濟如金金珠格髙琪及蒙古戰于燕城北金師敗績蒙古遂圍中都太祖皇帝兵至懷來鎮金元帥右監軍珠格髙琪拒之敗績僵尸四十餘里蒙古乘勝至古北口太祖皇帝留克特卜濟等帥軍守之而自以衆趍居庸關金人堅壁拒之太祖皇帝不得入乃命哲伯帥兵趍紫荆口距中都二百里呼沙呼欲誘之南至涿易聚兵擊之及蒙古兵至金戍卒奔潰克特卜齊以兵會太祖皇帝攻破涿易至皂河之內欲渡髙橋呼沙呼方病足乘車督戰蒙古兵大敗翌日再戰呼沙呼創甚不能出期髙琪以乣軍五千拒之髙琪失期不至呼沙呼欲斬之金主以其有功諭令免死呼沙呼乃益其兵令出戰戒之曰勝則贖罪不勝斬汝髙琪出戰自夕至曉北風大作吹石揚沙不能舉目金師大潰蒙古兵進圍燕京金珠格髙琪還自師殺赫舍哩呼沙呼金主命暴呼沙呼之罪以髙琪為左副元帥髙琪戰敗自度必為呼沙呼所殺乃以乣軍入中都圍呼沙呼之第呼沙呼聞難作登後垣欲走衣絓墜而傷股軍士就斬之髙琪取其首詣關請罪金主赦之因詔暴呼沙呼之罪奪其官爵以髙琪為左副元帥一行將士論功行賞蒙古取金涿州十一月夏人冦金會州蒙古徇金觀州刺史髙守約死之十二月夏人陷金涇州蒙古分兵徇金河北河東山東州郡多下之太祖皇帝留竒塔特及哈坦次燕城之外分所降楊伯遇劉林漢軍四十六都統并蒙古兵為三道命太子卓沁察罕台諤格德依三人分將循大行而南攻河北河東諸州時中原諸路之兵金皆僉往山後一帶防遏州郡無兵可守悉僉鄉民為兵土城守禦蒙古兵至盡驅其家屬來攻父子兄弟往往遙相呼認由是保州中山邢洺磁相衛輝懷孟諸郡皆不戰而降蒙古兵遂由真定威州趍黃河大掠平陽太原之間别將富察等亦遵海而東破灤薊大掠于遼西之地而太祖皇帝自將由中道破雄漠清滄景獻河間濵棣濟南等郡引兵復自大口以逼中都真德秀如金不至而復賀即位也甲戍七年金貞祐二年年太祖皇帝九春正月章良能卒蒙古徇金彰德府知府事鴻果玖珠死之徇懷州節度使宋扆死之二月金使完顔承暉乞和于蒙古太祖皇帝還自山東次于中都城北金平章政事髙琪言于金主曰蒙古人馬罷病當乘此一戰承暉曰不可我軍雖在都城家屬則居各鄀其人心去留未可知若出兵與戰敗則俱散勝則亦亡社稷安危在此一舉盍遣使議和得彼出居庸關後國乃可議耳金主然之乃遣承暉往乞和且許以公主歸之金銀繒帛各萬兩匹太祖皇帝許之蒙古使伊埒濟薩巴如金納幣也蒙古穆呼哩侵金遼西州縣三月召安丙同知樞密院事以董居誼為四川制置使丙未至改知潭州金人來求嵗幣弗與時以金有難二年不遣嵗幣故來督之起居舍人真德秀以為不宜與從之蒙古使伊埒濟薩巴如金逆女金以東海郡侯女歸之是為公主皇后金命諸人納粟買官蒙古取金嵐州節度使烏庫哩仲溫死之夏四月金及蒙古平太祖皇帝既成婚乃出居庸北還金主使承暉送之至麻池而返遂以蒙古允和大赦國內蒙古勢日強大然止居故地壤金以布薩安貞為諸路宣撫使時山東州縣多被兵燹河東河北惟真定清汾大名東平徐邳海數郡僅存蒙古兵既退乃以安貞宣撫安集遺黎金尚書左丞相圖克坦鎰卒蒙古兵退金主將遷都于汴鎰曰鑾輿一動北路皆不守矣今已講和聚兵積粟固守京師䇿之上也南京四面受兵遼東根本之地依山負海其險足恃備禦一面以為後圖䇿之次也金主不從鎰明敏方正問學該貫一時名士皆出其門多至卿相衛王之弒蒙古之難轉危為安惟鎰是賴焉蒙古置行尚書省于宣平以薩瑪哈領其事統金降民蒙古穆呼哩徇金大定府烏庫哩音達琿以城降之穆呼哩進兵北京金守將銀青帥衆二十萬禦于花道而敗入城固守禆將完顔實埒髙德王殺銀青推音達琿為帥音達琿遂舉城降之穆呼哩怒欲坑其民蕭額森諫曰遼西以北京為重鎮當撫之以慰衆望奈何坑之穆呼哩乃止以音達琿權北京留守烏葉爾權兵馬帥府事蒙古徇金霸州守將史天倪蕭伯特帥所部降之五月金主遷都于汴命平章政事完顔承暉奉太子以守燕金主以國蹙兵弱財用匱乏不能守中都乃遷于汴諫者皆不納五月命平章政事都元帥完顔承暉左丞穆延盡忠奉太子守中都遂與六宫啓行七月乙亥金主至南亰蒙古太祖皇帝聞之怒曰既和而遷是有疑心而不釋憾特以解和為欵我之計耳復圖南侵金主至良鄉乣軍反奉扎達等為帥降于蒙古秋七月蒙古使明安帥師會之遂同圍燕金主之南遷也至良鄉命護衛乣軍元給鎧馬悉復還官乣軍怨之遂作亂殺其主帥遜而共推扎達及伯勒齊爾扎拉爾三人為帥北還完顔承暉聞變以兵阻盧溝扎達擊敗之軍勢既張遣使乞降於蒙古太祖皇帝方怒金之南遷遂遣明安援扎達扎達合其兵以圍燕京以鄭昭先僉書樞密院事夏人請會師以伐金不報夏人以書來四川議夾攻金以恢復故疆董居誼以初入蜀不報八月金主召太子守忠于燕蒙古兵圍中都金主遣人召太子應奉翰林文字完顔蘇哷以為不可平章珠格髙琪曰主上居此太子宜從且汝能保都城必完乎蘇哷曰完固不敢必但太子在彼則聲勢俱重邊隘有守則都城無虞昔明皇幸蜀太子實在靈武蓋將以繫天下之心也不從竟召太子太子既行中都益懼夏人寇金慶原延安積石州九月壬戍朔日有食之冬十月蒙古兵徇金順州勸農使王晦死之蒙古取金成州十二月蒙古兵徇懿州節度使髙閭山死之金石天應以興中府張鯨以錦州降于蒙古嗣秀王師揆卒金濰州紅襖賊李全冦掠山東州縣全濰州北海農家子鋭頭蜂目權譎善下人弓馬趫捷能運鐵鎗人號為李鐵鎗金主自遷汴賦斂益橫河北山東遺民保寨阻險羣聚為盜冦掠州郡皆衣紅衲襖以相識全與仲兄福亦聚衆數千鈔掠山東劉慶福國用安鄭衍德田四于洋于潭等皆附之乙亥八年金貞祐三年年太祖皇帝十春正月以師禹嗣秀王師禹師揆弟也夏人寇金環州金右副元帥富察齊勤叛自通州以其師降于蒙古金太子守忠卒二月雷孝友罷金以穆延盡忠為平章政事兼左副元帥金布薩安貞討楊安兒安兒敗死其黨奉安兒妹以掠山東楊安兒之衆日盛鈔掠莒密布薩安貞至益都敗安兒干城東安兒奔登州遂僭號置官屬改元天順衆數十萬安貞復與山東行省完顔霆經歷鴻果將花帽軍討敗之殱其衆安兒乘舟入海欲走岠嵎山舟人曲成等擊之安兒墜水死安兒妹四娘子狡獪善騎射劉全收餘黨奉之稱曰姑姑掠食山東衆尚萬餘三月金瓜爾佳錫爾格斬劉二祖餘黨復推霍儀為帥彭義斌石圭夏全時青裴淵葛平楊德廣王顯忠附焉安定郡王伯柷卒夏五月金右丞相都元帥完顔承暉自殺穆延盡忠棄城南奔蒙古入燕立行中書省以守之蒙古兵圍燕承暉以左丞穆延盡忠久在軍旅委以心腹而已總持大綱期以保完都城及富察齊勤叛中都益急金主遣左監軍永錫左都監烏庫哩慶壽將兵三萬九千中丞李英運糧救之承暉遣間使奉礬書奏曰齊勤既降城中無有固志臣雖以死守之豈能持久伏念一失中都遼東河朔皆非我有諸軍倍道來援猶冀有濟永錫軍至涿州之旋風寨與蒙古兵遇而潰李英收清滄義軍數萬以進遇蒙古兵于霸州英馭衆素無紀律又值被酒遂大敗盡失其所運糧而還由是中都孤立內外不通時珠格髙琪居中専政忌承暉成功諸將又皆顧望雖屢遣援兵而終無一人至中都者完顔蘇哷上書備言髙琪滅亂紀綱戕害忠良不欲國家平治之罪請逐之金主不能用中都被圍既久承暉與盡忠會議期同死社稷盡忠不從承暉怒即起還第然兵柄既皆屬盡忠承暉無如之何乃辭家廟召左右司郎中趙思文謂之曰事勢至此惟有一死以報國家耳五月二日承暉作遺表付尚書省令史師安石書之大略論國家至計及髙琪姦狀且謝不能終保都城之罪從容若平日盡出財物召家人隨年勞多寡而分給之舉家號泣承暉神色泰然方與師安石舉白引滿謂之曰承暉於五經皆經師授謹守而力行之不為虛文既被酒取筆與安石訣最後倒寫二字投筆曰遽爾謬誤得非神志亂耶謂安石曰子行矣安石出門聞哭聲復還問之則知仰藥死矣家人匆匆瘞庭中是日暮凡在中都妃嬪聞盡忠將南奔皆束裝至通玄門盡忠紿之曰我當先出與諸妃啓途諸妃信之盡忠乃與愛妾及所親者先出城不復返顧蒙古兵遂入中都吏民死者甚衆宫室為亂兵所焚火月餘不滅時太祖皇帝在桓州聞燕陷遣使勞明安等而輦其府庫之實北去於是金祖宗神御及諸妃嬪皆淪沒焉盡忠行至中山謂所親曰若與諸妃偕來我輩豈得至此師安石奉承暉遺表至汴贈尚書令廣平郡王諡忠肅盡忠至汴金主殺之秋七月以鄭昭先參知政事曾從龍僉書樞密院事詔沂王嗣子均更名貴和金改交鈔為貞祐寶劵自泰和以來交鈔日多而輕乃更作二十貫至百貫二百貫千貫謂之大鈔初雖稍重未幾益輕而愈滯市邑視為無用之物富家內困藏鏹之限外弊交鈔屢更皆至窘敗謂之坐化商人往往舟運貿易于江淮錢多入于宋矣至是改交鈔名貞祐寶劵而弊如故八月金命參知政事侯摰行中書省于河北金置行省于陕西行樞密院于徐州歸德府元帥府于東平益都太原潞州行總管府于要害州縣時盜賊所在蜂起故也九月金定縣官募民進糧遷官令司縣官能募民進糧五千石以上減一資考萬石以上遷一官減二資考二萬石以上遷一官升一等金定敗敵功賞令隨處主帥及官軍義軍將校有能率衆復取中都者封王遷一品階授二品職能戰却敵善誘降人取附都州縣者豫本處長官散官隨職遷授餘州縣遞減二等諸色人以功賜國姓者能以千人敗敵三千人賜及緦麻以上親二千人以上賜及大功以上親千人以上賜止其家又以空名宣敕付陕西宣撫司遷授冬十月夏人寇金保安延安陷臨洮金命尚書左丞相布薩端兼都元帥行省事于陕西樞密副使布薩安貞行院事于徐州金以衍聖公孔元措為太常博士金主以元措聖人之後山東寇盜縱橫恐罹其害是使之奉祀而反絶之也故有是命蒙古薩哈侵金潼關不克遂自嵩山趨汴金人敗之乃還太祖皇帝次魚兒濼遣薩哈巴圖帥萬騎自西夏趨京兆以攻潼關不能下乃由嵩山小路趨汝州遇山澗輒以鐵鎗相鎖連接為橋以渡遂赴汴京金主急召花帽軍於山東十月蒙古兵至杏花營距汴京二十里花帽軍擊敗之蒙古兵乃還陜州自三門析津乘河氷合布灰引兵渡還金人専守關輔時蒙古兵所向皆下金主遣使求和太祖皇帝欲許之謂薩瑪哈曰譬如圍場中獐鹿吾已取之矣獨餘一兔盍遂舍之薩瑪哈不肯遣人謂金曰若欲議和可去帝號稱臣當封汝主為王故議不成時兩河已為蒙古所殘毁山東遼東又為羣盜所據金勢既蹙遂有南窺淮漢之謀宋江東計度轉運副使真德秀上奏曰金自南遷其勢日蹙蒙古西夏東出潼關深入許鄭攻圍都邑逰騎布滿山東而金以河南數州之地抗西北方張之師加以羣盜縱橫叛者四起危急如此不亡何待臣謹按國史女真叛遼在政和甲午其滅遼也在宣和己已而犯中原即於是年之冬今日天下之勢何以異政宣之時陛下亦宜以政宣為鑒夫以皇皇巨宋八葉重光至於政宣燕安湛溺之餘紀綱蕩然無一足恃本根既撥枝葉從之於是女真得以逞其凶殘攻陷我都城傾覆我社稷劫遷我二聖茶毒我蒸民自開闢以來播遷之禍未有若是之酷也臣觀蒙古之在今日無異昔者女真方興之時一旦與吾為鄰亦必祖述女真已行之故智蓋女真嘗以燕城歸我矣今獨不能還吾河南之地以觀吾之所處乎受之則享虛名而召實禍不受則彼得以陵寢為辭仗大義以見攻女真嘗與吾通好矣今獨不能卑辭遣使以觀吾之所答乎從之則要索亡厭豈能滿其溪壑之欲不從則彼得藉口以開釁端強敵之情必出於此不可不預圖以應之也昔劉石之亂江左粗安者以羣醜並爭莫能相一故吾得以偷旦夕之安及苻堅既滅慕容旋啓吞晉之謀元魏已併諸部遂萌飲江之志今新敵鴟張盡有河朔楊劉羣盜人皆服從臣恐五部角立之勢殊未可為江左茍安之計也昔孫氏以區區之吳能當強大之魏者其君臣能相與䇿勵也今國家幅員萬里帶甲百萬江漢為池豈下於吳陛下任九廟之託固不可付安危於度外養成深患也十一月以伯澤為安定郡王金以王世安為淮南招撫使世安獻取盱眙楚州之䇿金主以為招撫使選謀勇二三人同往淮南招紅襖賊及宋官自是南侵之謀興矣夏人冦金綏德蒙古兵徇金彰德知府圖們色哩死之十二月蒙古兵徇金大名府蒙古殺張鯨鯨弟致據錦州反蒙古以張鯨總北京十提領兵從托果琳齊哩克南征鯨懷反側穆呼哩覺之令蕭額森監其軍至平州鯨稱疾逗留不進額森執而殺之鯨弟致憤其兄被害乃殺長吏據錦州自稱瀛王改元興龍遣兵徇平灤瑞利義懿廣寧等郡皆下之穆呼哩帥先鋒蒙古巴哈權帥烏葉爾等軍討之州郡皆復降丙子九年金貞祐四年一年太祖皇帝十春正月蒙古取金曹州金立遂王守禮為太子更名守緒控制樞密院事二月蒙古圍金太原金以胥鼎為尚書左丞行省事于平陽蒙古取金霍山諸隘夏五月金以尚書右丞侯摰行省事于東平六月張致降金金以致行北京路元帥府事金改宣撫為經略使秋七月金侯摰斬賊郝定摰獲紅襖賊訊之知其渠帥郝定僣號署官改元已攻陷滕兖單等州有衆數十萬官軍不能討摰帥師進擊執定誅之八月金定僧道納粟補監寺威儀之令夏人寇金安塞堡蒙古徇金延安及防代州經略使鄂屯綽華善死之冬十月蒙古取金潼關節度使呢瑪哈富勒呼死之蒙古兵徇金汝州十一月蒙古兵次于沔池金右副元帥富察伊爾必斯奔還十二月金以珠格髙琪為尚書右丞相時蒙古進兵至陕州自關已西皆列營柵連亘數百里次嵩汝間御史臺言敵兵踰潼關崤沔深入重地近抵西郊彼知京師屯宿重兵不復叩城索戰但以逰騎遮絶道路而别兵攻擊州縣是亦困京師之漸也若専以城守為事中都之危又將見於今日况公私蓄積視中都百不及一此臣等所以寒心也願陛下命陜西兵扼距潼關與阿里不孫為犄角之勢選在京勇敢之將十數各付精兵隨宜伺察且戰且守復諭河北亦以此待之髙琪曰臺官素不習兵備禦方略非所知也遂止髙琪以蒙古兵日逼欲以重兵屯駐汴京以自固外郡殘廢不復憂恤金主惑之以故國勢益衰蒙古兵徇金平陽太原大名府蒙古穆呼哩圍錦州殺張致穆呼哩以致兵精且依險為阻欲設竒取之乃遣烏葉爾等别攻溜石山堡且諭之曰汝等急攻溜石賊必遣兵往援我出其不意斷其歸路可一戰擒也又令蒙古布哈别屯永德縣西十里以伺之賊聞溜石被圍果以兵救之蒙古巴哈以騎扼其歸路且馳報穆呼哩穆呼哩夜半引軍疾馳比曙抵神水與賊遇而蒙古布哈兵亦會前後夾擊大破之賊遂奔潰進圍錦州致屢戰不利乃閉門自守月餘其監軍髙益縳致出降穆呼哩殺之遼西平陳伯震如金金胥鼎會師敗蒙古于平陽鼎聞蒙古兵度潼關即遣必喇阿嚕岱圖克坦伯嘉帥兵萬五千由便道濟河以趍關陜而自以精兵援汴京又遣布薩薩固珠帥兵會諸將以拒蒙古之自關而東者金主以其忠拜鼎左丞遣還平陽鼎慮蒙古兵扼河乃檄絳解隰吉孟五州經略司相與會師為夾攻之勢及蒙古自三門集津北渡而還至平陽鼎敗之金人復取潼關丁丑十年金興定元年二年太祖皇帝十春正月蒙古徇金觀州二月金造貞祐通寶自百至三千等之為十凡一貫當寶劵千貫聽各路轉運司印造與舊劵參用而鈔愈賤陳伯震還自金伯震將還金主謂之曰聞息州南境有盜此乃彼界飢民沿淮為亂耳宋人何故攻我蓋自金有蒙古之難宋不遣嵗幣者六年珠格髙琪又以境土日蹙勸金主南侵以自廣金主曰但能守祖宗所付足矣安事外討髙琪言不已金主惑之故於伯震之陛辭言及以為用兵之端蒙古徇欣代州金尚書省乞罷府州學生廩給金主不許尚書省以軍儲不繼請罷州府學生廩給金主曰自古文武並用向在中都設學養士猶未嘗廢况今日乎不許金以苗道潤為中都留守兼經略使知中山府河北隊長苗道潤有勇略敢戰鬭能得衆心時河北羣盜起道潤擊之略定城邑五十餘所故有是命三月金以武仙權知真定府事金主命徵山東兵接應苗道潤共復中都而石海方據真定叛慮為所梗乃集鈕祜祿貞文振及威州刺史武仙所部精鋭與東平為犄角之勢圍之武仙率兵斬石海及其黨二百餘人降葛仲趙林張立等軍盡獲海僭擬物故有是命蒙古徇金霸州夏四月金使烏庫哩慶壽完顔薩布分道南侵至安昌王辛敗之乃去詔江淮制置使李珏京湖制置使趙方四川制置使董居誼便宜行事薩布破宋兵于信陽隴山遂渡淮犯光州中渡鎮執𣙜場官盛允升殺之分兵犯樊城圍棗陽光化軍至光山縣之安昌寨為廬州鈐轄王辛所敗金人乃去自是宋金之好絶詔三制置措置調遣便宜行事趙方請下詔伐金遂傳檄招諭中原官吏軍民金以元帥左都監完顔宇行府事督苗道潤等圖復燕京金侯摰使完顔霆敗霍儀斬之其黨皆潰五月復漣水縣蒙古取金沔城守將任福死之六月以伐金詔四方從趙方之請也詔略曰金人跨我中原天厭久矣狐兔失其故冗人競逐之若能立非常之勳則亦有不次之賞秋七月丙子朔日有食之嗣濮王不儔卒應純之使髙忠皎沈鐸伐金圍泗州及靈壁東海確山縣初楊安兒之寇掠山東也出沒島崓寶貨山積而不得食相率食人會鎮江武鋒卒沈鐸亡命山陽誘致米商獲利數十倍知楚州應純之償以玉貨北人至者輒舍之鐸因説純之以歸銅錢為名弛渡淮之禁由是北方來者莫可遏及下詔伐金純之以沈鐸為武鋒副將與髙忠皎各集忠義民兵分道伐金定逺民季先以李全來歸髙忠皎會其兵伐海州不克初李全聞楊安兒之妹四娘子保磨旗山因帥其黨歸之四娘子因與私通遂以為夫已而為完顔霆所敗全收其衆與楊氏及劉全保東海之崓山定逺民季先者大俠劉佑家厮養也嘗隨佑部綱客山陽楊安兒見而恱之處以軍職安兒死季先至山陽寅緣沈鐸得見應純之道山東豪傑願歸正之意純之命先為機察諭意羣豪至是遂以全衆五千附忠皎忠皎與合兵攻海州糧援不繼退屯東海九月蒙古徇金隰沁州太原中山府取磁淄濵棣博沂州冬十月金以河南為中京金昌府金命唐鄧蔡州行元帥府南侵金主以宋遣兵數犯其境及嵗幣不至將南侵右司諫許古上疏曰若能先遣使議和則蒙古聞之亦將斂迹豈宜用兵以益敵耶金主即命古草議和牒文既成以示參政髙汝勵汝勵言其有哀祈之意自示微弱不可乃止而詔唐鄧蔡州舉兵伐宋平章政事胥鼎切諫珠格髙琪不從金主以南北用兵西夏復擾財匱兵弱為憂集百官議守禦之䇿髙琪畏蒙古之逼専意南侵以避之有所言皆不用十二月募民納粟補官軍興故也蒙古徇金潞州都統馬甫死之取密州節度使完顔宇死之蒙古取金益都府金阿林入湫池堡天水軍遂據大散關李全襲金莒州取之李福取青州福全兄也蒙古以穆呼哩為太師魯國王經略山南太祖皇帝以穆呼哩功大拜太師國王承制行事帥蕃漢軍攻掠城邑且謂之曰太行之北朕自經略太行之南卿其勉之穆呼哩乃自中都南攻遂城及蠡州皆下之初蠡州拒守力屈乃降穆呼哩怒將屠其民州人趙瑨乞以身贖其母與兄穆呼哩哀而免之蠡人得全活甚衆蒙古圍夏興州夏主遵頊出奔西涼州蒙古哲伯伐奈曼庫克楚敗之蒙古太子卓沁伐烏蘇展哈努森達蘭烏克遜特們呼雅伊楞古等部皆降之戊寅十一年金興定二年三年太祖皇帝十春正月以李全為京東路總管以知楚州應純之節制京東忠義軍應純之見李全軍屢捷密聞于朝謂中原可復史彌逺鑒韓托胄之事不明招納密敕江淮制置使李珏及純之慰接之號忠義軍就聽純之節制放錢糧萬五千人以沈鐸為忠義副都統於是東海馬良髙林宋德珍等萬人輻輳漣水而季先又招石圭葛平楊德廣鐸亦招楊友劉全來歸二月金人焚大散關金阿林入皂郊堡王師死者五萬餘人金薩布圍隨州棗陽軍遊騎至漢上均州守臣應謙之棄城走三月額爾克入光化軍金人焚湫池堡王逸帥四川忠義人復皂郊追金阿林斬之伐秦州至赤谷而潰王逸帥忠義十萬及官軍復皂郊遂進攻秦州至赤谷口逸傳沔州都統劉昌祖之命退師且放散忠義人軍大潰金烏庫哩長壽入西和州夏四月入成州及河池縣復侵大散關興元都統吳政敗之金人乃去五月詔集議平戎禦戎和戎三䇿金洪果阿嚕岱襲敗李全于莒州夏人寇金鄜延蒙古徇金錦州元帥劉仲亨死之金賈瑀殺其中都經略使苗道潤元帥右都監張柔會師伐之至紫荆關遇蒙古與戰而敗柔遂降蒙古蒙古以柔為河北都元帥道潤素與副使賈瑀有隙一日從數騎出瑀伏甲射之道潤顛于道左從者駭散有何伯祥者獨下馬掖道潤道潤悶絶不能乘馬瑀伏發前突伯祥奪槍大呼殺數人賊乃遁去伯祥取道潤所佩金虎符以出令疾足間道以聞道潤之衆無所依部將靖安民代領之賈瑀不自安遣使告張柔曰吾已除道潤而公正直不以兵力黨惡人吾深敬之柔怒叱其使還白瑀曰汝賊吾所事主帥不即送死乃敢以此言相戲耶遂檄召道潤部曲告以復讎之意衆皆羅拜推柔為長柔方會兵趨中山而蒙古兵出自紫荆關柔遇之遂戰于狼牙嶺柔馬跌為蒙古兵士所執至軍前見主帥明安柔立而不跪左右強之柔叱曰彼帥也我亦帥也大丈夫死即死終不偷生為它人屈眀安壯而釋之其潰卒稍稍來集明安恐柔為變質其二親于燕京柔歎曰吾受國厚恩不意猖獗至此顧忠孝不兩立姑為二親屈遂降蒙古以柔為河北都元帥金石州賊馮天栩敗死其黨安國用降以國用為同知孟州事秋八月金以李竒嚕權中都路經略使蒙古穆呼哩帥蕃漢乣軍自太和嶺徇金河東遂取代隰州九月安定郡王伯澤卒蒙古穆呼哩取金太原府元帥左監軍烏庫哩德升死之取汾州節度使烏雅恩徹亨死之李全復密州冬十月蒙古穆呼哩徇金絳潞澤州取平陽行省李革死之穆呼哩圍平陽參政李革禦之兵少援絶城遂陷或謂革宜上馬突圍出革歎曰吾不能保此城何面目見天子汝輩可去矣乃自殺十一月蒙古穆呼哩取金潞州元帥右監軍納哈塔富拉塔死之十二月金使吕子羽來求成至淮不納而去金主欲乘勝與宋議和以開封府治中吕子羽為詳問使至淮中流宋人不納乃去由是和好遂絶金以布薩安貞為左副元帥金主使其太子守禮會師南侵户部獻今年境內民數戶一千二百六十六萬九千六百八十四口二千八百三十七萬七千四百四十二己卯十二年金興定三年四年太祖皇帝十春正月召董居誼還以聶子述為四川制置使金人侵西和知州趙彥呐敗之金人焚成州金人入鳳州夷其城金人侵隨均州信陽光化軍金人圍光濠滁州棗陽安豐軍吳政及金人戰于黃牛堡死之金遂侵武休關二月權興元府事趙希昔棄城走趙方使扈再興救棗陽金完顔薩布敗走棗陽圍急趙方語其子范葵曰朝廷和戰之説未定觀此益亂人意吾䇿決矣惟有提兵臨邊決戰以報國耳遂抗疏主戰因親往襄陽檄統制扈再興陳祥鈐轄孟宗政帥兵三萬救之仍增戍光化信陽均州以聨聲勢申飭諸將當遏於境上不可使之入而後拒之于城下復上疏力陳不可和者七事金人來自圌山勢如風雨再興宗政祥分三陳設伏以待既至再興佯却金人逐之宗政與祥合左右兩翼掩擊之金人三面受敵遂大敗而去死者不可勝計金人入興元府大安軍張威敗之乃去以曽從龍同知樞密院事兼江淮宣撫使以任希夷僉書樞密院事希夷嘗從朱熹學篤信力行熹稱其開濟為禮部尚書以朱熹張栻吕祖謙皆已賜諡而周惇頥程皓程頥張載尚未贈諡乃上言四人為百代絶學之倡乞定議賜諡朝廷從之金人入洋州四川制置使董居誼自利州逃歸趙方使扈再興伐唐鄧州夏人以書請會師以伐金詔利州安撫使丁焴許之三月以鄭昭先知樞密院事曽從龍參知政事金人焚洋州閏月金命權中都經略使李竒嚕治雄霸以東權中都西路經略使靖安民治易州以西之地賈涉使李全救淮西大敗金人于化湖陂又敗之于曹家莊安豐軍滁光濠州圍皆解詔加全廣州觀察使金人取淮西既久江淮制置使李珏遣師救之皆不克進金人遂分兵自光州攻黃州之麻城自濠州攻和州之石磧自盱眙攻滁州之全椒來安及揚州之天長真州之六合淮南流民渡江避亂諸城悉閉金之遊騎遂至東采石揚林渡建康大震淮東提刑知楚州節制京東忠義賈涉慮忠義人兵為金所用乃遣忠義軍統制陳孝忠向滁州石圭夏全時青向濠州李先葛平楊德廣趍滁濠李全李福要其歸路李全進至渦口與金左都監赫舍哩約赫德駙馬阿哈連戰于化湖陂殺金將數人得其金牌金人乃解諸州之圍而去全追擊之復敗之于曹家莊而還金人自是不敢窺淮東初賈涉募能殺金太子者賞節度使殺親王者賞承宣使殺駙馬者賞觀察使全因致所得金牌于涉詐云殺駙馬阿哈所獲者涉不之察為請于朝乞如約授賞遂授全廣州觀察使金完顔薩布復圍棗陽金布薩安貞自盱眙退師興元卒張福等作亂夏四月陷利州四川制置使聶子述出奔福遂掠閬果州興元軍士張福莫簡作亂以紅巾為號入利州聶子述退保劍門檄醴泉觀使安丙子知果州癸仲兼節制軍馬任討賊之事癸仲召沔州都統制張威等帥兵來會福等殺總領財賦楊九鼎遂掠閬果州曾從龍罷復以安丙為四川宣撫使張福等作亂四川大震張方魏了翁移書宰執謂安丙不起則賊未即平蜀未可定雖賊亦曰須安相公作宣撫事乃定耳李壁李􅌫亦皆以國事勉丙丙乃至果州會詔丙為宣撫知興元府利州路安撫使蜀民心始自安金築汴京裏城初珠格髙琪請修南京裏城金主曰此役一興民滋病矣城雖完固能獨安乎髙琪固請築之既而金主慮擾于民募人能致甓五十萬者遷一官百萬升一等於是平陽判官完顔阿拉左廂譏察霍定和發蔡京故居得二百萬有竒準格遷賞金主一日問曰人言此役恐不能就髙琪曰茍防城有法正使兵來臣等愈得效力金主曰與其臨城曷若不令至此為善髙琪無以對及城成髙琪受金鼎之賞建碑書功于會朝門蒙古張柔取金雄易安保州次于滿城金武仙會師伐之敗績柔遂圍中山府金河東北郡縣多降之蒙古使柔帥兵南下遂克雄易安保諸州柔猶不忘苗道潤之讎必欲誅賈瑀而瑀據孔山臺柔攻之瑀不下臺無井泉汲山下柔先斷其汲道瑀窮乃降柔縳瑀剖心以祭道潤時人義之遂引兵次于滿城武仙會鎮定深冀兵數萬攻之柔軍士適它出帳下士才數百人柔命老弱婦女乘城自率壯士突出仙兵後毁其攻具從數騎䇿馬挾槊大呼入圍仙衆皆披靡復使緣山張旗幟聲言救至曵柴揚塵鼓譟以進仙兵大潰柔追擊之仙兵尸陳數十里柔乘勝攻完州下之於是祁陽曲陽等帥皆降于柔柔遂圍中山府仙遣其將葛鐵鎗與柔戰于新樂飛矢中柔頷落其二齒柔拔矢以戰葛鐵鎗大敗死者數千人仙復遣劉成攻柔柔又敗之遂南掠金鼓深澤寧晉諸縣由是深冀以北鎮定以東三十餘城望風降附柔之威名震于河朔五月張福陷遂寧府及普州六月安丙討福誅之五月福衆薄遂寧權府事程遇孫棄城走福入遂寧焚其城遂入普州守臣張巳之棄城走福屯于普州之茗山六月甲申安丙自果州如遂寧下令諸軍合圍絶其樵蘇之路以困之張威兵至福窮請降威執之以獻于丙丙命臠其黨王才以祭楊九鼎而誅福既而張威捕莫簡及賊衆一千三百餘人誅之紅巾賊悉平丙命班師而還治于利州權知棗陽軍孟宗政大敗金人于城下追至鄧州而還金人圍棗陽孟宗政固守相持者九十日扈再興夜以鐵蒺藜密布地黎眀佯遁金人馳逐中蒺藜者十踣七八遂却走再興追至十五里岡已而金人薄城東南隅再興與宗政劉世興各當一面大戰數十合金人大敗完顔額克引衆數萬復薄城再興與宗政縱之涉濠半渡擊之又令守壩者佯走金人爭壩因急擊之金人多墮水中既而金人創對樓鵝車革洞決濠水運土石填城下再興募死士著鐵面具披氊列陳以待之金人計無所施忿甚周城開濠四面控兵列濠外飛鋒鏑以綯鈴自警鈴響則犬吠宗政厚募壯士乘間突擊金人不能支盛兵日薄城宗政隨方拒之金人屢敗愈怒戰益力會王大任帥鋭卒冒重圍轉鬭而進內外合勢軍勢大振自晡至三更金尸橫積草野棄旗甲輜重而走宗政等追之又敗之于范家莊擒獲不可勝計自是再興宗政等日與之戰遂進破順昌縣浙川鎮追金人至馬磴寨焚其城入鄧州而還金自是不敢窺襄漢中原遺民來歸者以萬數宗政發廪贍之給田創屋與居籍其壯者號忠順軍俾出沒唐鄧間宗政由是威名振于境外金人呼為孟爺爺信賞必罰好賢樂善為一時名將循吏云嗣濮王不標卒丁焴復以書約夏人以伐金秋七月李全復齊州八月蒙古取金武州判官郭秀死之取合河縣令喬天翼死之金中山治中王善殺權知府事李仲以叛九月以李大東為沿江制置使趙善湘主管淮西制置司公事賈涉主管淮東制置司公事兼節制京東河北路軍馬罷江淮制置司初山東忠義來歸者日衆而石圭以計殺沈釋于漣水應純之亦罷去權楚州梁丙無以贍之李先乞預借兩月糧然後帥所部五千并馬良等萬人往密州就食丙不許先請速遣李全代領其衆丙亦不從而以石圭權軍務圭乃奪運糧之舟渡淮大掠至楚州南渡門焚毁幾盡丙遣人諭之不止知盱眙軍賈涉上書言忠義之人源源而來不立定額自為一軍處之北岸則安能以有限之財應無窮之須飢則噬人飽則用命其勢然也朝廷乃命涉為淮東提刑知楚州兼節制忠義人兵涉受命即遣傅翼喻石圭楊德廣等以逆順禍福圭等乃謝罪涉慮其人衆而思亂因滁濠之役分石圭陳孝忠夏全為兩屯李全為五寨又用陕西義勇法涅其手合諸軍汰者三萬有竒涅者不滿六萬人正軍常屯七萬使主勝客朝廷省費十三四及分江淮為三司乃命涉主管淮東蒙古徇金東勝州節度使伯特烏色死之蒙古穆呼哩次師于單州蒙古太祖皇帝伐西域諸國張林以金山東諸郡附李全來歸詔以林為京東安撫使初蒙古克益都不守而去益都府卒張林與其黨復立府以歸金以功為治中凶險不逞知府田琢在山東徴求過當頗失衆心林率其黨逐之琢戰敗乃還汴林遂據益都山東諸郡皆附之林欲歸宋以自固而未決會李全自齊州還維上冡揣知林意乃薄兵青州城下遣人陳説國家威德勸林早附林恐全誘已猶豫未納全乃挺身入城惟數人從林開門納之相見甚歡謂得所託置酒結為兄弟全既得林要領附表奉青莒密登萊濰淄濵棣寧海濟南十二郡版籍歸宋其表辭有云舉諸七十城之全齊歸我三百年之舊主表至賈涉以聞詔授林武翼大夫京東安撫使兼京東總管賈涉因傳檄中原以地來歸及反戈自效者朝廷裂地封爵無所吝仍厲諸將圖未下州郡冬十二月四川宣撫司復洮州詔諸將議伐金及招諭中原豪傑趙方使扈再興許國孟宗政分道帥師伐金趙方以金人屢敗必將同時並攻當先發以制之乃遣再興等帥師六萬分道而進國宗政東趨唐州再興西趨鄧州戒之曰毋深入毋攻城第潰其保甲燬其城寨空其資糧而已李全襲泗州不克而還全以大雪淮氷合請于賈涉曰每恨泗州阻水今如平地矣請取東西城以自效涉許之全以長槍三千人從夜半渡淮潛向泗之東城將踏濠氷傅城下掩金人不備俄城上荻炬數百齊舉遙謂全曰賊李三汝欲偷城耶天黑故以火燭之全知有備乃引兵還金尚書右丞相珠格髙琪有罪伏誅髙琪自執政専固權寵擅作威福惡儒喜吏務行苛察與平章政事髙汝礪相倡和髙琪主機務汝礪掌利權附己者用不附者斥凡言事忤意及負材力或與已頡頏者對金主陽稱其材使幹當于河北隂置之死地又以己為相不得兼樞密元帥以攬兵柄乃與汝礪力勸金主南伐置河北于意外凡精兵皆集河南茍且嵗月不肯輒出一卒以應方面之急至是使奴薩布殺其妻因歸罪于薩布而殺之以滅口事覺金主久知其姦遂因其事下髙琪于獄殺之初金主將遷汴欲置乣軍于平州髙琪難之及發中都金主戒博多厚撫乣軍而博多輒殺數人且勸金主取其元給器用故有扎達之難而中都以亡故金主嘗歎曰壞天下者髙琪博多二人也蒙古伐髙麗髙麗王暾降之蒙古兵襲叛人于契丹徑髙麗之境髙麗人洪大宣降之且為鄉導共攻其國國王暾降自是交通使命往來不絶庚辰十三年金興定四年五年太祖皇帝十春正月扈再興圍鄧州金人救之乃還孟宗政敗金人于湖陽獲趙興兒許國伐唐州不克而還以不淩為嗣濮王夏人復以書來議伐金金以武仙遙領中都留守三月金以髙汝礪為尚書右丞相平章政事胥鼎致仕金紅襖賊于忙兒襲海州據之夏四月賈涉招諭豪傑于山東兩河蒙古徇金孟州金封王福伊喇衆嘉努武仙張甫靖安民郭文振胡天作完顔開燕寧九人為郡公並兼宣撫使分河北山東地以𨽻之初太原為蒙古所有河北州縣不能自立金主坦詔百官議所以為長久之利者翰林承旨圖克鎬等十六人謂制兵有三曰戰和守今欲戰則兵力不足欲和則彼不肯唯有守耳河朔州郡既殘毁不可一槩守之宜取願就遷徙者屯于河南陕西不願者許自推其長保聚險阻宣徽使伊喇光祖等三人謂度太原之勢雖暫失之頃亦可復當募土人威望服衆者假以方面重權能克復一道即以本道總管授之能捍州郡即以長佐授之必能各保一方使百姓復業宰臣欲置公府金主意未決中丞完顔伯嘉曰宋人以虛名致李全遂有山東實茍能統衆守土雖三公亦何惜焉金主曰它日事定公府無乃多乎伯嘉曰若事定以三公就節鎮何不可之有金主從之乃封滄州經略使王福為滄海公以清觀滄州鹽山無棣樂陵東光寧津吳橋將陵阜城蓨縣𨽻之河間招撫使伊喇衆嘉努為河間公以獻蠡安深州河間肅寧安平武強饒陽六家莊郎山寨𨽻之真定經略使武仙為恆山公真定有沃冀威鎮寧平定州抱犢寨欒城南宫縣𨽻之中都東路經略使張甫為髙陽公以雄霸莫州髙陽信安文安大城保定靜海寶坻武清安次縣𨽻之中都西路經略使靖安民為易水公以涿易安肅保州君氏川季鹿三保河北江礬山寨青白口朝天寨水谷歡谷東安寨𨽻之遼州從宜行元帥府事郭文振為晉陽公以河北東路皆𨽻之平陽招撫使胡天作為平陽公以平陽晉安府隰吉州𨽻之昭義節度使完顔開為上黨公以澤潞沁州𨽻之山東安撫副使燕寧為東莒公以益都府路皆𨽻之九公皆兼宣撫使階銀青榮祿大夫賜號宣力忠臣總帥本路兵馬署置官吏徵斂賦稅賞罰號令得以便宜行之除已畫定所管州縣外如能收復鄰近州縣者亦聽管屬同時九府財富兵強唯武仙耳五月蒙古徇金隩州兖州泰定軍節度使烏延威赫死之六月賈涉誘漣水軍忠義副都統季先殺之其下奉石圭為帥以拒命李全自化湖陂之捷有輕宋諸將之心以季先威望出已上隂結賈涉所任吏莫凱使譖先欲反涉信之乃以計命先赴樞密院議事於道殺之而遣統制陳選總先衆于漣水先部曲裴淵宋德珍孫武正王義深張山張友六人拒選不納而潛迎石圭于盱眙奉為統帥圭道楚城涉不之覺遂入漣水選還涉恥之謀分圭軍為六請于朝出六修武京東路忠義鈴轄誥命及印授淵等以分統先衆淵等陽從命而實不奉涉教令涉恐甚詔以圭為漣水忠義軍統轄圭不受而叛蒙古楊在取金大名府開州及東眀長垣縣蒙古穆呼哩取金嵐絳州遂侵河中府不克秋七月金使烏庫哩仲端如蒙古求成八月金嚴實據青崖崓以魏博恩德懷衛開相等郡來歸李全遂會張林襲東平敗績乃還金長清縣令嚴實為主將所疑以兵圍之實挈老幼壁于青崖崓依益都張林以避之會宋使趙拱以朝命諭京東過青崖實因求內附拱與定約奉實欵至楚州賈涉以聞實亦分兵四出所至州縣皆下於是太行之東皆受實節制實乃舉九郡歸宋賈涉因再遣拱往諭配以兵二千李全亦請往涉不能止乃帥楚州及盱眙忠義萬人以行拱説全曰將軍提兵渡河不用而歸非示武也今乘勢取東平可乎全乃合張林軍得數萬襲東平之城南金行省蒙古綱帥師固守全以三千人被金銀甲赤幟繞壕躍馬索戰不得乃與林夾汶水而寨詰旦金監軍王庭玉以騎兵三百奄至全欣然上馬帥帳前所有騎赴之殺數人奪其馬逐北抵山谷遇金龍虎上將軍斡布哈貫銀甲揮長槊盛兵以出旁有繡旗女將馳突全幾不免會諸將赴救拔全以出乃退保長清精鋭喪失大半以鎮江軍五百懷憤使拱先將之以歸而自以餘衆由滄州假鹽利以慰贍之未幾復還楚州張林侵金滄州王福以城降皇太子詢卒諡曰景獻安丙使王仕信帥師會夏人以伐金丙遺夏人書定議同舉約以夏兵野戰宋師攻城遂命利州統制王仕信帥師赴熙秦鳳翔委丁焴節制次于鞏州以俟夏人夾攻且傳檄招諭陜西五路官吏軍民復海州以徐晞稷知州事夏人陷金會州金遣使如夏行成蒙古穆呼哩次師滿城金恆山公武仙以真定降之穆呼哩以史天倪權知河北西路兵馬事武仙副之穆呼哩至滿城使蒙古布哈將輕騎三千出倒馬關適武仙遣葛鐵槍攻臺州蒙古布哈與之遇葛鐵槍戰敗武仙度力不能支遂舉城降史天倪説穆呼哩曰今中原已粗定而大兵所過猶縱抄掠非王者弔民伐罪之意也且王為天下除暴豈可效他軍所為乎穆呼哩善之即下命禁剽掠遣所俘老幼軍中肅然州郡聞之咸爭降附九月夏人圍金鞏州王仕信帥師會之不克遂還九月夏遣其樞密使寧子寧率衆二十萬圍鞏州且來促兵王仕信帥師發宕昌四川宣撫司統制質俊李實帥師發下城安丙命諸將分道進兵沔州都統張威出天水利州都統程信出長道興元都統陳立出大散關田冒出子午谷金州都統陳昱出上津己亥張威下令所部諸將毋得擅進兵於是諸將遲疑不進辛丑質俊等克來逺鎮敗金人于定邊城王仕信克鹽川鎮乙巳程信王仕信引兵會夏人于鞏州城下丁未攻城不克壬子程信與夏人復攻城不克信引兵趨秦州丙辰夏人自安逺寨退師十月丁巳朔程信邀夏人共攻秦州夏人不從遂自伏羌城引兵還諸將皆罷兵程信以宣撫司命斬王仕信于西和州夏人陷金定西西寧州蒙古使達呼如金冬十月金封紅襖賊帥時青為滕陽公青與叔父全俱為紅襖賊及楊安兒劉二祖敗青承赦命降𨽻軍中為濟州義軍萬戶李全降宋青心羡之亦帥衆叛金而南宋處之龜山有衆數萬至是金元帥赫舍哩烏雅特遣人招全及青全不從而青以書乞假邳州以屯老幼當襲取盱眙盡定淮南以贖罪金主乃加青銀青榮祿大夫封滕陽公本處兵馬總領元帥兼宣撫使而未授以邳十一月蒙古穆呼哩入金濟南府嚴實以彰德大名府磁洺恩博滑濬州降之穆呼哩以實權濟南等路都總管穆呼哩既戢士卒州郡恱附遂以輕騎入濟南嚴實上謁於軍門挈所部三府六州户三十萬以降穆呼哩承制以實為金紫光祿大夫權濟南等路都總管實將李信以青崖附于宋實母妻兄皆死焉實攻信復取青崖崓蒙古穆呼哩圍金東平府金兵二十萬聚于黃龍岡聞穆呼哩在濟南衆未大集遣步卒二萬襲之穆呼哩迎戰金兵敗穆呼哩遂薄黃龍岡金兵盛列于城北穆呼哩麾蒙古漢軍下馬短兵接金兵又大敗溺死于河者以萬數穆呼哩遂陷黃龍岡進取楚丘由單州趨東平圍之蒙古太祖皇帝克鄂托羅爾城太祖皇帝入西域避暑于頁實勒提斯河至秋進兵所過城皆下至鄂托羅爾城留二太子三太子圍之而自與四太子别攻城十一月城降蒙古耶律楚材進庚午元厯楚材遼東丹王烏雲八世孫而金尚書右丞履之子也貞祐三年為中都行省員外郎中都陷遂降于蒙古太祖皇帝有一天下之志嘗訪遼宗室召楚材謂之曰遼金世讎吾為汝報之矣楚材對曰臣祖父以來嘗北面事之既為臣子豈敢復懷二心讎君父耶太祖皇帝重其言命處左古以備訪問楚材通術數之學尤邃于太玄時從太祖皇帝征西域次于塔什干城楚材以金大明厯不應制庚午元厯上之太祖皇帝以楚材明天文之占屢有問莫不竒中故每征伐必令楚材預卜吉凶太祖皇帝亦燒羊脾骨以符之然後行十二月石圭以其衆叛降于蒙古賈涉命李全併將漣水忠義軍蒙古以圭為元帥石圭以入漣水非賈涉本意心懷不安而李全復請討圭於涉涉遂以全所統衆列于楚州之南渡門而移淮隂戰艦于淮岸以示圭有備因命一將招圭軍來者增錢糧不至者罷支給衆心遂散圭伎窮乃殺裴淵而挾孫武正宋德珍降于蒙古穆呼哩以圭為元帥圭即石畫虎也圭既去漣水之衆未有所屬李全求併將之凡萬一千人而月給萬五千人之請涉畏全不敢核實全益得志蒙古穆呼哩以嚴實權山東西路行省索囉呼圖克帥師次于東平金兵固守東平不下穆呼哩謂嚴實曰我料東平糧盡必棄城去若然汝即入城綏輯安古慰之勿苦郡縣以敗大事也乃留索囉呼圖克以蒙兵屯守東平以實權行省謂千户薩里台曰東平破可命嚴實石圭分城內南北以守之遂北還金易水公靖安民為其下所殺金復故主東海郡侯永濟為衛王諡曰紹仍加開府儀同三司得恭膺天命寶鎮江副都統翟朝宗得于金師也辛巳十四年金興定五年六年太祖皇帝十春正月李全襲金泗州入其西城二月金赫舍哩約赫德來救全敗乃還金會師于蔡州以南侵布薩安貞遂圍光州詔淮東京湖諸路禦之三月金人入黃蘄州而去扈再興敗之于天長鎮夏四月李全大敗之于淮上金東莒公燕寧及蒙古戰寧敗死五月甲申朔日有食之蒙古取金東平府命嚴實石圭分治之東平被圍既久援者不至糧道復絶其民東徙行省蒙古綱監軍王庭玉守將擊和立綱不能守率衆南趨邳州蒙古索囉呼圖克邀斬首七千級嚴實遂入城建行省于府第薩里台以穆呼哩命中分其城以嚴實撫安東平以北恩博等州石畫虎移治曹州六月詔立沂王嗣子貴和為皇子更名竑封祁國公帝以國本未立命選太祖後十五嵗以上者教育宫中如髙宗擇普安王故事於是立貴和為皇子以太祖十世孫與莒為秉義郎與莒燕懿王德昭之後而希瓐之子也家于紹興山隂縣母全氏初慶元人余天錫為史彌逺府童子師性謹願絶不預外事彌逺器重之彌逺在相位久以帝未有儲嗣而沂靖惠王近屬亦未有後欲借沂王置後為名隂擇宗室中可立者以備皇子之選會天錫告還鄉秋試彌逺密語之曰今沂王無後宗子賢厚者幸具以來天錫渡浙與越僧同舟抵越西門會天大雨僧言門左有全保長者可避雨天錫過之保長知其為丞相館客具雞黍甚肅須臾有二子侍立天錫異而問之保長曰此吾外孫趙與莒與芮也日者嘗言二兒後當極貴天錫因憶彌逺言且念其行又相當及還臨安以告彌逺彌逺命召二子來保長大喜鬻田治衣冠心以為沂邸後可冀也集姻黨送之且詫其遇及見彌逺善相大竒之恐事泄不便遽使復歸保長大慙其里人亦竊笑之逾年彌逺忽謂天錫曰二子可復來乎天錫召之保長辭謝不遣彌逺乃使天錫密諭保長曰二子長者最貴宜還撫于其父家遂載以至臨安天錫母朱為沐浴教字禮度益間習及貴和立為皇子乃補與莒秉義郎年十七矣與莒凝重寡言潔修好學每朝參待漏他人或笑語與莒獨儼然出入殿庭矩度有常見者斂容彌逺益異之秋七月以賈涉為淮東制置使八月任希夷罷以宣繒同知樞密院事俞應符僉書院事京湖制置大使趙方卒方病革曰未死一日當立一日紀綱及卒人皆思之方少從張栻學初知青陽縣告其守史彌逺曰催科不擾是催科中撫字刑罰無差是刑罰中教化人以為名言守襄漢十年以戰為守合官民兵為一體通制總司為一家許國以忠應變如神隱然有尊爼折衝之風故金人擾邊淮蜀大困而京西一境獨全能用名人如陳昉遊九功輩皆拔為大吏扈再興孟宗政皆自土豪推誠擢任致其死力卒為良將故能藩屏一方使朝廷無北顧之憂諸子范葵最顯以與莒為右監門衛大將軍賜名貴誠加貴誠果州團練使蒙古太祖皇帝圍西域塔里哈寨太祖皇帝住夏於西域蘇勒坦汗所避暑之地至秋分遣大太子二太子三太子率右軍攻玉隴哈什城四太子攻伊拉衮綽和爾瑪勒齊里克瑪勒齊阿喇斯等城而自將兵踰鐵門關以攻特爾默及巴喇勒哈城皆克之遂圍塔里哈寨九月立貴誠為沂靖惠王柄後冬十月復滄州復以齊州為濟南府兖州為襲慶府夏人復以書乞會師伐金金太醫侯濟張子英除名侯濟張子英治金主孫疾用藥暝眩孫不能任遂死有司論二人當誅金主曰濟等所犯誠宜死然以朕孫故而殺人所不忍也杖七十除名蒙古穆呼哩伐夏夏人以師會之遂取金葭州徇綏德州十一月圍延安府八月穆呼哩至天德監國公主遣其臣習里古思勞之且享將士穆呼哩遂由東勝州涉河引兵而西夏主聞之懼遣塔海監府等宴穆呼哩於河南獻奉甚厚且遣塔海甘布將兵五萬屬焉十月穆呼哩引兵東行自雲中歷太和寨以入葭州命石天應權行臺以守葭而自將大兵攻綏德破馬蹄克戎兩寨夏主遣迷㒒帥衆會之述㒒問穆呼哩相見之儀穆呼哩曰汝主見我主即其禮也迷㒒曰未受主命不敢即拜因引衆去十一月穆呼哩進攻延安迷㒒始贄馬而拜金元帥哈逹與將蒙納哈塔敏珠爾禦之哈達以兵三萬陳于城東蒙古古布哈先以騎士三千趣之約半夜伏發穆呼哩乃令軍士銜枚潛進伏於城東兩谷間明日蒙古布哈望見金兵佯棄旗鼓走金兵追之穆呼哩出伏乘其後鼓鼙震天金兵大亂穆呼哩追殺七千餘人哈達走入延安城堅壁不出穆呼哩以城池堅深猝不可拔乃留軍圍之而自將兵南攻洛川鄜州夏人冦金定西積石州師焚潁州蒙古入金潼關四川宣撫使安丙卒詔知成都府崔與之為四川制置使盡護蜀軍丙在四川以攻為守威功甚著朝廷賴之及卒詔與之盡護四蜀之師與之開誠布公拊循將士人人恱服軍政復立張林以京東叛降于蒙古蒙古以林為山東東路都元帥李福自膠西逃歸李全既併將漣水忠義益驕悍輕宋及遊金山作佛事以薦國殤知鎮江府喬行簡方舟逆全大合樂以享之全歸語其徒曰江南佳麗無比須與若等一到始造舭􅭥舟謀爭舟楫之利焉膠西當登寧海之衝百貨幅輳全使其兄福守之為窟宅計時互市始通北人尤重南貨價增十倍全誘商人至山陽以舟浮其貨而中分之自淮轉海達于膠西福又具車輦之而稅其半然後聽往諸郡貿易車夫皆督辦于張林林不能堪林財計仰六鹽場福恃弟有恩於林欲分其半林許福恣取鹽而不分場福怒曰若背恩耶待與都統提兵取君頭爾林懼其黨李馬兒説林歸蒙古林遂以京東諸郡請降于蒙古穆呼哩以林為山東東路益都府滄景濵棣等州行都元帥府事福狼狽走還楚州林猶遺賈涉書言非已叛實由李福也十二月鄭昭先罷閏月茍夢玉如蒙古通好也金更作興定寶泉每一貫當通寶四百貫蒙古侵鄜州節度使完顔祿錦鈕祜祿資祿都監赫舍哩鶴壽富察羅索死之蒙古穆呼哩取金坊州遂徇隰吉州蒙古使昻哈濟蘇來蒙古蘇布特敗欽察部于玉峪壬午十五年金元光元年七年太祖皇帝十春正月庚戍朔受恭膺天命之寶于大慶殿大赦二月李全復泗州金完顔額爾克時全南侵至固始而去夏五月次于淮師襲敗之金人誅時全金主以宋絶嵗幣國用以困乃命節元帥左監軍額爾克行元帥府事制三路軍馬同僉樞密院事時全副之以伐宋由頴壽進渡淮敗宋師于髙塘市攻固始縣破廬州將焦思忠兵既而獲生口言時全之姪時青受宋詔與金諸兵相拒全匿其事五月額爾克引衆還距淮二十里軍將渡全矯稱密詔諸軍且留收淮南麥遂下令人穫三石以給軍衆惑之額克及諸將佐勸止之全不從留三日額爾克謂全曰今淮水淺狹可以速濟若值暴漲宋乘其後將不得完歸矣全力拒之是夕大雨明日淮水暴漲乃為橋渡軍宋師襲之金兵大敗橋壞全以輕舟先濟士卒皆覆沒金之兵財由是大竭金主詔數全罪而誅之進封皇子祁國公竑為濟國公以沂王嗣子貴誠為邵州防禦使竑好鼓琴史彌逺買美人善鼓琴者納諸竑而厚撫其家使瞷竑動息美人知書慧黠竑嬖之時楊皇后専國政彌逺用事久宰執侍從臺諫藩閫皆所引薦莫敢誰何權勢薰灼竑心不能平嘗書楊后及彌逺之事于几上曰彌逺當決配八千里又嘗指宫壁輿地圖瓊崖曰吾他日得志置史彌逺於此又嘗呼彌逺為新恩以他日非新州則恩州也彌逺聞之大懼思以處竑而竑不知真德秀時兼宫教諫竑曰皇子若能孝於慈母而敬大臣則天命歸之矣否則深可慮也竑不聽德秀因力請外而去一日彌逺為其父浩飯僧淨慈寺與國子學録鄭清之登慧日閣屏人語曰皇子不堪負荷聞後沂邸者甚賢今欲擇講官君其善訓導之事成彌逺之坐即君坐也然言出於彌逺之口入于君之耳若一語泄者吾與君皆族矣清之曰不敢乃以清之兼魏惠憲王府大小學教授清之日教貴誠為文又購髙宗御書俾習之清之上謁彌逺即以貴誠詩文翰墨示之譽之不容口彌逺嘗問清之曰吾聞皇姪之賢已熟大要竟如何清之曰其人之賢更㒒不能數然一言以斷之曰不凡彌逺頷之再三奉之之意益決乃日媒糵竑之失言于帝覬帝廢竑而立貴誠而帝不悟其意蒙古穆呼哩以田雄權元帥府事及哈昭帥師戍于隰吉翼等州知濟南府种贇伐青州張林敗走李全入城據之六月俞應符卒蒙古太祖皇帝克塔里哈寨遂屠密拉城大掠實都而還蒙古穆呼哩取金牛心寨知吉州楊貞死之時金於牛心寨僑治吉州事穆呼哩自隰州攻之知州楊貞令妻孥先墜崖已從之皆死穆呼哩入寨留兵守之而去且使蒙古布哈引逰騎出秦隴以為聲援及視山川夷險強弱秋七月蒙古穆呼哩徇金青龍堡平陽公胡天作降之穆呼哩遂趨關中使蒙古布哈守京兆以備潼關按察爾次于晉安冀州之境九月彭義斌帥師復京東州縣嚴實將朝海以青崖降以宣繒參知政事程卓同知樞密院事薛極僉書院事冬十月蒙古穆呼哩取金河中府以石天應權河東南北路陜右關西行臺穆呼哩渡河所過州縣皆下遂取蒲州召石天應謂之曰河中為河東要郡我欲選一首領而不可得君才略絶衆幸為鎮之乃以天應權行臺平陽太原吉隰等處帥府皆受節度金王庭玉復曹州殺蒙古石圭十一月蒙古穆呼哩徇金同州節度使李復亨完顔額爾克死之蒙古穆呼哩徇金鳳翔府赦京東河北路以其新復故也十二月以李全為保寧軍節度使京東河北鎮撫節制司副使初李全每立戰功史彌逺輒欲加以官賈涉以為不可及加節鉞涉歎曰朝廷但知官爵可以得其心寧知驕則將至於不可勸耶蒙古太祖皇帝滅回回國其王走死太祖皇帝征回回國其王委國而去太祖皇帝命蘇布特逐之及于輝里河敗之回回王夜遁蘇布特將萬騎由不罕川追襲回回王逃匿海嶼蘇布特分兵守其要害回回王進退失據不旬日而庾死太祖皇帝遂進次于印度國鐵門關侍衛見一獸鹿形馬尾緑色而獨角能為人言謂之曰汝軍宜早回太祖皇帝怪之以問耶律楚材楚材對曰此獸名角端日行一萬八千里解四夷語是惡殺之象今大軍征西已四年蓋上天惡殺遣之以告陛下願承天心宥此數國人命實陛下無疆之福太祖皇帝即日班師癸未十六年金元光二年八夏獻宗德旺乾定元年太祖皇帝十午春正月金侯小叔復河中府殺石天應蒙古穆呼哩復取之穆呼哩攻鳳翔晝夜苦戰四十餘日不下將由河中北還金元帥右都監侯小叔襲河中破之殺石天應焚浮橋而退穆呼哩復取河中以天應子鄂克代領其衆以守城而造浮橋引師駐終南為屯田住夏之計初金主命元帥都監阿嚕岱守河中阿嚕岱恇怯不能軍竭民膏血為浚築之計及絳州破阿嚕岱益懼馳奏河中孤城不可守有旨親視果不可守則棄之無至資敵阿魯岱遂棄河中燒民居官舍一二日而盡尋有言河中重鎮國家基本所在設為敵人所據則大河之險我不得専恃矣金主命有司復修葺之終不能成故隨守隨陷二月嗣秀王師禹卒三月蒙古太師魯國王穆呼哩卒于解州穆呼哩自河中帥師還行至解州聞喜縣疾篤謂弟岱遜曰我為國家助成大業干戈垂四十年無復遺恨所恨者汴京未下耳汝等勉之言及而卒年五十四穆呼哩雄勇善謀與博爾濟博爾歡齊拉衮克俱以忠勇事太祖皇帝太祖皇帝號為都爾本庫魯猶中國言四傑也太祖皇帝軍嘗失利會天大雪失牙帳所在卧草澤中穆呼哩與博爾濟張氊蔽之自暮達曉竟不移足博爾濟從太祖皇帝征伐立功甚多每警夜則太祖皇帝安枕極見親遇位終右萬户贈太師廣平王博爾歡從太祖皇帝身更百戰竟死于陳位終第一千户竒拉衮㓛業與三人者等然中原之功穆呼哩為第一四人之子孫皆領宿衛號四集賽出官則為輔相焉夏五月蒙古初置達嚕噶齊監治郡縣太祖皇帝循實默里河而上命三太子循河而下至薩木丹城降之遂留住夏于帕爾滿川分兵攻諸部落之近者悉下之至扣肯寨與諸將會以西域漸定置達嚕噶齊於各城監治之振旅東還所過皆附茍夢玉還自鐵門關金作元光重寶元光珍貨珍貨以綾印製與銀鈔並用六月程卓卒淮東制置使賈涉卒以丘壽邁攝制置司公事涉以李全驕暴難制力求還朝在道卒初涉欲制忠義兵乃以翟朝宗統鎮江副司八千人屯楚州城中又分帳前忠義萬人命趙邦友髙友統五千屯城西王暉于潭統五千屯淮隂李全輕鎮江兵而忌帳前忠義乃數稱髙友等之勇遇出軍必請以自隨涉不許全每宴麾下必併召涉帳前將校於是帳前感之亦願𨽻全然未能合也及涉卒丘壽邁攝帥事全上言曰忠義烏合尺籍鹵莽莫若别置新籍一納諸朝一申制閫一以自留庶㓛過有考請給無弊壽邁從之全乃合帳前忠義與已軍盡籍之而併統其軍壽邁不悟秋七月夏人冦金積石州八月金納哈塔琉格殺行省蒙古綱據邳州以叛李全帥師會之不克進乃還青州邳州從宜經略使納哈塔琉格殺行省蒙古綱據州反與李二措致書海州言欲附宋李全麾下周岊得之以報全全喜遣王喜兒以兵二千應接而已繼之李二措納喜兒而囚之全欲攻邳四面阻水二措積徑弩備之全不得進合兵索戰而敗欲還楚州會濵棣有亂乃引兵趣青州金行院總帥雅烏特討留格殺之復其城九月庚子朔日有食之冬十二月嗣濮王不淩卒以許國為淮東安撫制置副使兼知楚州初淮西都統許國奉祠家居欲傾賈涉而代之因數言李全必反涉卒會召國入對國即上疏極言全姦謀益深反狀已著非有豪傑不能消弭遂易國文階以為淮東制置命下聞者莫不驚愕淮東參幕徐晞稷雅意開閫及聞國用乃注釋國疏以寄李全于青州全大不樂金主珣卒太子守緒立金主疾革時已暮夜近臣皆出惟前朝資明夫人鄭氏以年老侍側金主知其可託謂之曰速召太子主後事言絶而殂夫人祕之是夕后妃問安寢閣龐貴妃隂狡機慧常以其子英王守純年長不得立懷怨鄭氏恐其為變即紿之曰上方更衣后妃可少休他室伺其入遽鑰之急召大臣傳遺詔立皇太子守緒始啓户出后妃發喪太子方入宫英王已先至太子知之分遣樞密院官及東宫親衛軍官伊喇莽阿集軍三萬餘于東華門街部署既定命護衛四人監守純于近侍局然後即位於柩前宣宗在位孜孜以繼述世宗為志勤政憂民形於顔色然而境土日蹙盜賊羣起者良以性本猜忌崇信暬御奬用吏胥苛刻成風舉措失常任相非人臨事寡斷南開宋釁西啓夏侮捐棄中原招來多敵其淪胥以亡宜哉蒙古伐夏夏主遵頊傳國于其子德旺自號上皇蒙古蘇布特滅欽察烏魯斯薩里等部大掠西蕃邊部而還甲申十七年金哀宗守緒正大元年太祖皇帝十九年春三月召崔與之為禮部尚書以鄭捐之為四川制置使與之辭不拜與之治蜀將士輯睦府藏充實至是以疾歸廣州蜀人肖其像而祠焉金尚書右丞相髙汝礪卒汝礪循默固位金主立諫官乞黜之金主曰汝礪先帝所立以為相者又可黜耶又有男子服衰麻望承天門且笑且哭有司詰之則曰吾笑笑將相無人吾哭哭金國將亡羣臣請殺之金主曰近詔草澤直言今雖譏訕不可殺也唯以君門非笑哭之所杖而遣之金以張行信為尚書左丞行信初為參政惡髙琪之専每裁抑之髙琪忌而出之至是復召用金使李唐英來輸平金主遣尚書令史李唐英至滁州通好既而復遣樞密判官伊喇莽阿率兵至光州榜諭宋界軍民更不南伐秋七月以師嵒嗣秀王八月帝有疾史彌逺矯詔立沂王嗣子貴誠為皇子更名昀閏月帝崩于福寧殿昀即位尊皇后曰皇太后垂簾同聽政封皇子濟國公竑為濟陽郡王出判寧國府八月丙戍帝不豫史彌逺遣鄭清之往沂王府告貴誠以將立之意貴誠默不應清之曰丞相以清之從遊之久故使布腹心足下不答以一語則清之將何以復命于丞相貴誠始拱手徐言曰紹興老母在清之以告彌逺益相與歎其不凡壬辰帝疾篤彌逺稱詔以貴誠為皇子改賜名昀授武泰軍節度使封成國公閏月丁酉帝崩彌逺遣皇后兄子谷石以廢立事白后后不可曰皇子竑先帝所立豈敢擅變谷等一夜七往返后終不許谷等乃拜泣曰內外軍民皆已歸心茍不立之禍變必生則楊氏無噍類矣后默然良久曰其人安在彌逺即於禁中遣快行宣昀令之曰今所宣是沂靖惠王府皇子非萬嵗巷皇子茍誤則汝曹皆處斬皇子竑時聞帝崩跂足以需宣召久而不至乃屬目墻壁間見快行過其府而不入疑焉已而擁一人徑過天暝不知為誰甚惑之昀入宫見后后拊其背曰汝今為吾子矣彌逺引昀至柩前舉哀畢然後召竑竑聞命即赴至則每過宫門禁衛拒其從者彌逺亦引竑至柩前舉哀畢引出帷殿帥夏震守之遂召百官立班聽遺制則引竑就舊班竑愕然曰今日之事我豈當仍在此班震紿之曰未宣制已前當在此宣制後乃即位耳竑以為然已而遙見殿上燭影中已有人在御座則昀已即位矣宣制畢閣門宣贊呼百官拜舞賀新皇帝即位竑不肯拜夏震捽其首下拜遂稱遺詔以竑為開府儀同三司進封濟陽郡王判寧國府尊楊皇后曰皇太后垂簾同聽政詔遵孝宗故事宫中自服三年喪寧宗恭儉守文初年以舊學輔道之功召用宿儒引拔善類其政可觀中更韓托胄內蓄羣姦指正為偽外挑強鄰流毒淮甸函首求成國體虧矣及史彌逺擅權於外楊后竊政於內帝拱默不能自強惜哉封兄濟陽郡王竑為濟王出居湖州九月召傅伯成為顯謨閣學士楊簡為寶謨閣直學士柴中行為右文殿修撰並奉朝請伯成簡辭不至帝既立史彌逺欲收衆望勸帝褒表老儒於是帝謂宰輔曰傅伯成楊簡皆先朝耆舊朕所簡記可召赴行在故有是命簡辭不至簡嘗師陸九淵篤學力行其為政設施皆可為後世法人敬慕之以禮部侍郎程珌吏部侍郎朱著戶部侍郎陳德剛中書舍人真德秀並兼侍讀工部侍郎葛洪起居郎喬行簡宗政少卿陳貴誼軍器監王塈並兼侍講初德秀為起居舍人兼宫講言事不避權貴且卷卷於復讎時史彌逺方以爵祿縻天下士德秀慨然謂劉爚曰吾徒須急引去使廟堂知世亦有不肯為從官之人遂力請外至是自知潭州召還入對勸帝容受直言召用賢臣固結人心為本帝開納之德剛伸子也以真德秀為禮部侍郎兼直學士院魏了翁為起居郎開禧初了翁以武學博士召試學士院對䇿諫開邊事御史徐楠劾了翁狂妄了翁遂以親老出知嘉定府及韓托胄敗史彌逺用事收召諸賢了翁預焉力辭不至築室白鶴山下以所聞於輔廣李燔者開門授徒士爭負笈從之由是蜀人盡知禮義之學及為潼川轉運判官上疏乞與周惇頥張載程皓程頥錫爵定諡示學者趣向與任希夷合朝廷從之至是以起居舍人進改起居郎追封宗室希瓐為榮王妻全氏為國夫人以其子與芮襲封奉祀帝之本生父母也冬十月嗣秀王師嵒卒夏及金平始用敵國禮夏與金通好不交兵者八十年至貞祐初以小故生釁搆難十年一勝一負遂至精鋭俱盡兩國皆弊至是夏遣其吏部尚書李仲諤修好於金稱弟而不臣各用本國年號金主許之遂以夏國修好詔中外而遣禮部尚書鄂屯良弼報之十一月以葛洪同僉書樞密院事通鑑續編卷二十
