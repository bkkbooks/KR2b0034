body:
  text: 通鑑續編卷九元陳桱撰壬子五年遼咸雍八年春正月置卒察謗時政者置京城邏卒察謗議時政者收罪之二月以蔡挺為樞密副使挺知渭州甲兵整習常若冦至故多立功效然譎智深險在渭嵗乆欝欝不得志寓意詞曲有玉關人老之句中使至則使優伶歌之以達于禁中帝聞而愍之故有是命三月南平王李日尊卒子乾徳嗣乾徳㓜母黎氏燕燕太妃與宦者李尚吉同主國事判汝州富弼乞致仕許之弼至汝上言新法臣所不曉不可以治郡願歸洛養疾許之遂請老以司空致仕進封韓國公弼雖家居朝廷有大利害知無不言帝雖不盡用而眷禮不衰嘗因王安石有所建明帝却之曰富弼手疏稱老臣無所告訴但仰屋竊嘆者即當至矣其敬之也如此云立文武換官法置市易務于京師以吕嘉問提舉其事自王韶倡為縁邉市易之説王安石善之以為與漢平凖法同可以制物低昻而均通之遂用魏繼宗議以内蔵庫錢帛置市易務于京師凡貨之可市及滯於民而不售者平其價市之願以易官物者聴若欲市於官者則度其田宅或金帛為抵當而貸之錢責期使償半嵗輸息十一及嵗倍之過期不輸息外每月更加罰錢百分之二凡諸司配率並仰給焉以户部判官吕嘉問為提舉賜内庫錢百萬緡為本嘉問上建置十三事其一欲於律外禁兼并之家輙取利帝去之安石執不可已而帝聞其太煩碎人皆怨讟欲罷之以問安石安石對曰立法當論有害於人與否不當以煩碎廢也自是諸州上供藨席黄蘆之類六十色悉令計直從民願粥者市之以給用尋改提舉在京市易務為都提舉市易司秦鳯兩浙黔州成都廣州鄆州六市易司皆𨽻于都司焉夏四月置弓箭手于兩河知定州滕甫言河北州縣近山谷處民間各有弓箭社及獵射人習慣便利與夷人無異乞下本道逐州縣並令募諸色公人及城郭鄉村百姓有武勇願習弓箭者自為之社毎嵗之春長吏就閱試之北人勁悍緩急可用從之五月以古渭砦為安逺軍以王韶知軍事帝志復河隴㑹定川駐泊都監張守約請名古渭為軍以根本隴右帝從之築古渭為安逺軍以王韶知軍事知秦州郭逵奏韶盗貸市易錢王安石以為不足校徙逵涇州以青唐首領俞龍珂為供奉官賜姓名曰包順論辟田疏水功加賜知唐州趙尚寛等秩立保馬法王安石建保甲養馬之法文彦博吳充以為不便安石持論益堅乃詔開封府界諸縣保甲願牧馬者聴仍令以陕西所市馬選給之於是曽布等承詔上其條約凡陕西五路義勇保甲願養馬者户一匹物力高願養二匹者聴皆以監牧見馬給之或官與其直令自市府界毋過三千匹五路毋過五千匹襲逐盗賊外乘越三百里者有禁嵗一閱其肥瘠死病者補償在府界者免體量草二百五十束加給以錢布在五路者嵗免折變緣納錢三等以上十户為一保四等以下十户為一社以待病斃逋償者保户馬死保户獨償社户馬死社户半償之初行于開封及陕西遂徧諸路六月詔分經義論䇿為四場以試貢士初大經義次兼經義凡十道次論一首次䇿三道四日成立武學遼裕恱耶律仁先卒仁先為耶律伊遜所忌出為南京留守者數年能恤孤惸禁姦慝議者以休格之後惟仁先一人耳秋閏七月詔章惇察訪湖北經制蠻事時帝思用兵以威四夷湖北提㸃刑獄趙鼎上言峡州峒酋刻剥無度蠻衆願内附辰州布衣張翹亦上書言南北江利害遂詔中書檢正官章惇察訪湖北路經制蠻事時北江則彭氏主之有州二十南江則舒氏有四州田氏有四州句氏有五州皆自太祖已来受朝命𨽻辰州入貢者及惇往經制蠻相繼納土願為王民始剏城砦比之内地矣八月王韶大敗羌人遂城武勝以為鎮洮軍韶引兵城渭源堡及乞神平破蒙羅角抺耳水巴等族初羌保險諸將謀置陣平地韶曰賊不舎險来鬭則我師必徒歸今已入險地當使險為吾有乃徑趣抹邦山壓敵軍而陣令曰敢言退者斬賊乘高下鬬師小却韶躬擐甲胄麾帳下兵逆擊之羌大潰焚其廬帳而還洮西大震會木征度洮為之援餘黨復集韶戒别將由竹牛嶺路張軍聲而潜師越武勝遇瞎征首領瞎藥等與戰破之遂城武勝建為鎮洮軍韶言措置洮河只用囘易息錢未嘗輙費官本文彦博曰工師造屋初必小計冀人易於動工及既興作知不可已乃方增多帝曰屋壊豈可不修王安石曰主者善計自有忖度豈為工師所欺也彦博不復敢言由是韶進討敢肆欺誕朝廷不與計財詔求歐陽脩所撰五代史是嵗修卒土韶敗西蕃木征于鞏令城降其部落二萬以石鑑知辰州助章惇經制南北兩江也立方田及均税法帝患田賦不均重修定方田法詔司農以均稅條約并式頒之天下其方田法以東西南北各千步當四十一頃六十六畆一百六十步為一方嵗以九月縣委令佐分地計量隨陂石平澤而定其地因赤淤黒壚而辨其色方量畢以地及色參定肥瘠而分五等以定其稅則至明年三月畢掲以示民一季無訟即書户帖連莊帳付之以為地符均稅之法縣各以其租額稅數為限舊嘗收蹙竒零如米不及十合而収為升絹不滿十分而收為寸之類今不得用其數均攤增展致溢舊額凡越額増數皆禁若瘠鹵不毛及衆所食利山林陂塘溝路墳墓皆不立稅凡田方之角立土為峰植其野之所宜木以對表之有方帳有莊帳有甲帖有户帖其分煙析産典賣割移官給契縣置簿皆以今所方之田為正令既具乃以鉅野縣尉王㬅為指教官先自京東路行之諸路倣焉九月少華山崩冬十月置熈河路升鎮洮軍為熈州以王韶知州事置熈河路領熈河洮岷州通逺軍以韶知熈州兼經略安撫使然河洮岷三州猶未能復也十一月河州首領瞎藥来降以為内殿崇班賜姓名曰包納張商英有罪貶監荆南税商英附王安石得權御史裏行因劾樞宻院吏徇私語侵文彦博彦博求去帝怒謫之分陜西為永興秦鳯二路章惇開梅山置安化縣梅山峒蠻蘇氏舊不通中國其地東接潭南接邵西接辰北接鼎澧章惇招降之籍其民萬四千八百九户其田二十六萬四百三十六畆均定其稅使嵗一輸築武陽開峡二城置安化縣𨽻邵州自是鼎澧可以南至邵州十二月以陳升之為樞密使王韶築熈州諸闗砦癸丑六年遼咸雍九年春二月王韶取河州獲木征妻子以吕恵卿為翰林學士以鄧綰為御史中丞三月置脩經局以王安石提舉其事置諸路學官訓詩書周禮義以吕恵卿王雱同修撰詔進士將授官者悉試明法封李乾徳為交阯郡王文彦博罷彦博乆居樞宻以王安石多變舊典言于帝曰朝廷行事務合人心宜兼采衆論以静重為先陛下勵精求治而人心未安盖更張之過也祖宗法未必皆不可行但有偏而不舉之弊爾安石知為已發奮然排之曰求去民害何為不可若萬事隳脞乃西晉之風何益于治及市易司立至果實亦官監賣彦博以為損國體斂民怨致華嶽山崩為帝極言之安石曰華山之變殆天意為小人發市易之起自為細民乆困以抑兼并爾於官何利焉彦博因求去益力遂以司空判河陽府身雖在外而帝眷有加夏四月甲戌朔日當食不見司天奏四月朔日當食帝自三月丁巳避殿減膳降天下囚罪一等流以下釋之至是日不食始御殿復膳置律學掌授法律凡命官舉人皆得入學試讀貶同知太常禮院劉攽通判泰州時吕恵卿考舉士列阿時者在高等訐直者居下劉攽覆考悉反之恵卿不恱㑹攽貽書王安石論新法不便安石怒遂摭其與同院考官王介争詈事斥通判泰州攽博記能文章政事與兄敞及敞子奉世名相埒世稱三劉置疏浚黄河司以范子淵為都大提舉治平初命浚二股五股以紓恩冀之患及帝即位河決益甚都水監丞李立之請於恩冀深瀛等州創生隄三百六十七里以禦河於是都水監丞宋昌言與屯田都監内侍程昉獻議開二股以導東流詔司馬光等乘傳相度光還請如昌言䇿于二股之西置上約擗水令東俟東流漸深北流淤淺即塞北流放出御河胡盧河下紓恩冀深瀛之患王安石然之帝曰欲作簽河誠善安石曰若及時為之河可東行北流可閉遂詔光都大提舉修二股吕公著言光乃近職不可遣光得不往而二股之役命河北轉運司督之三越月而成深十一尺廣四百尺當浚之時河則稍障及水入河則決亦塞㑹河溢北京夏津帝問執政聞京東調夫修河有壊産者河北調急夫尤多若河復决奈何且河決不過占一河之地或西或東若利害無所校聴其所趍如何王安石曰北流不塞占公私田至多又水散澷乆復澱塞昨修二股費至少而公私田皆出向之㵼鹵俱為沃壤庸非利乎况急夫已減于去嵗若復葺理隄防則河北嵗夫愈減矣帝從之乃始置疏濬黄河司先是有選人李公義者獻鐡龍爪揚泥車法以濬河其法用鐡數斤為爪形以繩繋舟尾而沈之水篙工急櫂乘流相繼而下一再過水已深數尺宦官黄懐信以為可用而患其太輕王安石請令懐信公義同議増損乃别制濬川杷其法以巨木長八尺齒長二尺列于木下如杷狀以石壓之兩傍繫大繩兩端矴大船相距八十步各用滑車絞之去来撓蕩泥沙已又移船而浚或謂水深則杷不能及底雖數往来無益水淺則齒礙沙泥曳之不動卒乃反齒向上而曳之人皆知不可用惟安石善其法使懐信先試之以濬二股又謀鑿直河數里以觀其效且言于帝曰開直河則水勢分其不可開者以近河毎開數尺即見水不容施功爾今第見水即以杷濬之水當隨杷改趍直河茍置數千杷則諸河淺澱皆非所患嵗可省開濬之費幾百千萬帝曰果爾甚善聞河北小軍壘當起夫五千計合境之丁僅及此數一夫至用錢八緍故歐陽修嘗謂開河如放火不開如失火與其勞人不如勿開安石曰勞人以除害所謂毒天下之民而從之者帝乃賞懐信而命公義與堂除以杷法下大名令虞部員外郎都大提舉大名府界金隄范子淵與通判知縣共試驗之皆言不可用㑹子淵以事至京師安石問其故子淵意附㑹遽曰法誠善苐同官議不合耳安石大恱及置濬河司將自衛州濬至海口差子淵都大提舉公義為之屬許不拘常制舉使臣等人船木鐡工匠皆取之諸埽五月播州蠻酋楊貴遷來貢貴遷遣子光震来貢以光震為三班奉職湖北蠻向永晤舒光銀以其地來降永晤光銀以其部内富鶴保順天賜古叙峡中勝元九州来降瀘川夷羅晏叛詔熊本察訪之瀘夷叛詔遣中書檢正官熊本察訪梓䕫得以便宜措置諸夷事六月知南康軍周敦頥卒敦頥道州營道人初名敦實以犯英宗諱改焉初因舅鄭向任為分寧主簿有獄乆不决敦頥至一訊立辨邑人驚曰老吏不如也調南安司理有囚法當不死轉運使王逵欲深治之敦頥力與辯逵不聴敦頥委手板將棄官去曰如此尚可仕乎殺人以媚人吾不為也逵悟囚得釋調桂陽令改知南昌富家大姓黠吏惡少惴惴焉不獨以得罪於令為憂而又以汙穢善政為恥歴合州判官䕫州通判知郴州為廣東轉運判官知南康軍年五十七而卒敦頥慱學力行著太極圖明天理之根源究萬物之終始著通書四十篇發明太極之藴言約而道大文質而義精得孔孟之本原大有功於學者為南安司理時通判程珦以其為學知道因使二子顥頥往受業焉敦頥毎令尋孔顔樂處所樂何事故顥嘗曰自再見周茂叔後吟風弄月以歸有吾與㸃也之意侯師聖學於程頥未悟因見敦頥敦頥曰吾老矣説不可不詳留與對榻夜談越三日乃還程頥驚異之曰非從周茂叔来耶其善開發人類此既至南康即築室于蓮花峯下前有溪合于湓江取營道所居濓溪以名之學者遂稱為濓溪先生大蝗秋七月分河北為東西路不雨八月復周制比閭族黨之法九月置和糴倉于兩浙宋嵗漕江淮兩浙米七百萬石以廣軍儲實京邑河北河東陕西三路及内郡又自糴買以息邉民飛輓之勞其名不一州縣括民家所積糧市之以供兵食者曰推置取上戸版籍酌所輸租而均糴之曰對糴皆非常制其募商人輸芻粟於邉以要劵取鹽及緡錢香藥寳貨於京師或東南州軍陕西則受鹽于兩浙謂之入中入中利既厚商賈趍之由是悉以見錢和糴而縣官之費省矣是嵗置倉於兩浙稔嵗遂為常吕恵卿復請令諸軍餘糧願糶入官者計價支錢復儲其米於倉謂之坐倉其河北轉運提舉司置場以常平及省倉嵗用餘糧減直聴民以絲綿綾絹増價慱買俟秋成博糴者謂之博糴又有所謂結糴俵糴兌糴皆王安石所建大扺欲省漕費而已然皆為民害是時王韶開熈河章惇營溪峒邉鄙興師民不暇給詔興水利自水利之説興進計者紛然數年間諸路凡得廢田萬七百九十三處三十六萬一千一百七十八頃有竒而民給役勞擾初䇿武舉之士初樞宻請建武學於武成王廟從之遂賜食本錢萬緡生員以百人為額選文武官知兵者為教授使臣未參班與門廕草澤人召京官保任人材弓馬應格聴入學習諸家兵法教授纂次歴代用兵成敗前世忠義之節足以訓者講釋之願試陣隊者量給兵伍在官三年具藝業考試第等推恩未及格者逾年再試春秋各一試步射以一石三斗馬射以八斗矢五發中的或習武伎副之䇿畧雖弓力不及學業卓然並為優等補上舍生毋過三十人試馬射以六斗步射以六斗䇿一道孫吳義十道五通補内舍生馬步射馬戰應格對䇿精通士行可稱者上樞宻院審察試用雖不應格而曉術數知陣法智畧可用或累試策優等悉取㫖補上舍武藝策畧累居下等復降外舍凡武舉試義策于貢院武藝于殿前司及殿試則又試騎射及策于庭策武藝俱優為右班殿直武藝次優為三班奉職又次借職末等三班差使初樞宻院修武舉法不能荅策者荅兵書墨義王安石曰武舉而試墨義何異學究誦書不曉理者無補於事先王収勇力之士皆屬于車右者欲以備禦侮之用則記誦何所施帝從之至是始䇿武舉之士木征復入河州王韶伐取之岷宕洮疊首領皆以其城降帝受賀于紫宸殿賜王安石玉帶韶既復河州㑹降羌叛韶囘軍擊之木征以其間據河州韶進破訶諾木蔵城穿露骨山南入洮州境道隘釋馬徒行或日至六七木征留其黨守河州自將尾官軍韶力戰破走之河州復平岷州首領木令征以城降韶入之於是宕洮疊三州羌酋皆以城附韶軍行五十四日涉千八百里得州五斬首數千級獲牛羊馬以萬計捷書至帝以復熈河洮岷疊宕六州御紫宸殿受羣臣賀解所服玉帶賜王安石初收免行錢先是京師百物有行官司所須俱以責辦下逮貧民浮販類有陪折吕嘉問請約諸行利入厚薄令納錢以賦吏禄與免行户祗應而禁中賣買百貨並下雜買務仍置市司估物低昻凡内外官司欲占物價則取辦焉至是行之冬十月詔浚直河于大名是時河北河閉已乆水或横决散澷常虞壅遏外都水監丞王令圖獻議於北京第四第五埽等處開修直河使大河還二股故道乃命范子淵及朱仲立領其事開直河深八尺又用浚川杷疏浚二股及清水鎮河凡退背魚肋河則塞之王安石乃盛言用杷之功若不輟作雖二股上流可使行地中矣章惇討懿洽州蠻降之不雨甲寅七年遼咸雍十年春正月熊本討瀘夷降之本嘗通判戎州習夷中俗及至部以為彼能擾邉者介十二村豪為鄉𨗳爾乃以計致百餘人梟之瀘川其徒股慄願矢死自贖本請於朝寵以刺史廵檢之秩明示賞罰皆踴躍順命獨柯隂一酋不至本合晏州十九姓之衆發黔南義軍强弩遣大将王宣等帥以進討賊悉力旅拒宣敗之于黄葛下追奔深入柯隂窘追乞降本受之盡籍丁口土田及其重寳善馬歸之公上以受貢職於是烏蠻羅氏鬼主諸夷皆從風而靡願世為漢官奴本還帝勞之曰卿不傷財不害民一旦去百年之患至於檄奏詳明近世鮮儷擢集賢殿修撰賜三品服西南用兵自此始矣不雨王韶自熈州入朝景思立知河州事二月詔三司嵗會天下財用出納之數以聞唐自天寳以後海内多事户口凋耗租稅日削方鎮握重兵皆留財賦自贍其上供者殊少五代疆境偪蹙藩鎮益强率令部曲主塲院其属三司者補大吏以臨之輸額之外亦私有焉太祖周知其弊乾徳中諸州支度經費外凡金帛悉送闕下母或占留於是外權始削而利歸公上條禁文簿漸為精宻吏不得以售其姦兵既聚于京師外州無留財天下支用悉出三司景徳中丁謂為三司使著㑹計録以獻初吳蜀江南荆湖南越皆號富强相繼降附太祖太宗因其蓄蔵守以恭儉天下生齒尚寡而養兵未甚蕃任官未甚冗佛老之徒未甚熾外無金繒之遺百姓各安其生不為巧偽放侈故上下給足府庫盈溢承平既乆户口嵗増兵籍益廣吏員益衆佛老外國耗蠹中土縣官之費數倍於昔百姓亦稍縱侈而上下始困于財矣仁宗即位始大裁損道家之奉有節土木之工不興加以仁宗資性恭儉尤務約已以先天下有司言利者多擯不取聞民之有疾苦雖厚利舍之無所愛及用兵陕西調度百出縣官之費始廣議者或欲省吏兵奉賜帝謂禄廩皆有定制毋遽變更以摇人心西兵乆而不解財用益屈詔減后妃宗室之賜以助之於是三司使王堯臣取陕西河北河東三路未用兵及用兵後嵗出入財用之數㑹計以聞㑹元昊請臣朝廷亦已厭兵屈意撫納嵗賜繒茶二十五萬而契丹亦増嵗遺至五十萬自是嵗費彌有所加縣官所入僅足充費仁宗深慮之屢命官裁節而有司卒無所建明及帝即位尤先理財熈寧初命司馬光等置局看詳裁減國用王安石執政益講修錢榖之法時天下承平方圖開邉毎以財用不給日夕講求其故命官考三司簿籍商量經乆廢置之宜凡嵗費皆著為定式帝嘗患増置官司費財王安石謂増置官司所以省費帝曰古者什一而稅今取財百端安石謂古非特什一而已安石又欲盡禄天下之吏帝未之許而三司上新増吏禄嵗至緡錢百十一萬有竒主新法者皆謂吏禄既厚則人知自重不敢冒法可以省刑然良吏實寡賕取如故往往陷重辟議者不以為善至是詔三司帳司會計是嵗天下財用出入之數以聞法益宻矣瞎征寇白踏城景思立敗死三月木征遂寇岷州髙遵裕敗之木征復圍河州王韶入朝木征合宗哥首領青宜結鬼章之衆寇踏白城知河州景思立與戰敗死瞎征勢復熾遂寇岷州知州高遵裕遣包順敗焉木征去寇河州圍之遼使蕭禧來言疆事遼以河東路㳂邉増修戊壘起鋪舍侵入蔚應朔三州界内使林牙蕭禧来言乞行毁撤别立界至劉忱如遼議疆事也大旱詔求直言夏四月癸酉詔罷新法是日雨吕恵卿請復行新法詔從之遂下監安上門鄭俠御史獄帝以乆旱避殿減膳且知麥苗枯槁五種不入民無生意憂形于色對朝嗟嘆欲盡罷法度之不善者王安石曰水旱常數堯湯所不免不足貽聖慮但當修人事以應之帝曰此豈細事朕所以恐懼者正為人事之未修爾今取免行錢太重人情咨怨至出不遜語自近臣以至后族無不言其害者馬京曰臣亦聞之安石曰士大夫不逞者以京為歸故京獨聞此言臣未之聞也初光州司法參軍鄭侠為安石所奬㧞侠感其知已思欲盡忠及秩滿入京安石問以所聞侠曰青苗免役保甲市易數事與邉鄙用兵在俠心不能無區區也安石不荅俠退不復見但數以書言法之為民害者乆之監安上門及乆旱嵗饑征斂苛急東北流民毎風沙霾曀扶攜塞道羸疾愁苦身無完衣並城民買麻籸麥麩合米為糜或茹木實草根至身被鎻械而負瓦掲木賣以償官累累不絶侠以安石不可諫乃繪所見為圖奏疏詣閤門不納遂假稱宻急發馬逓上之銀䑓司且云旱由安石所致去安石天必雨疏奏帝反覆觀圖長吁數四袖以入内是夕寢不能寐翌日命開封體放免行錢三司察市易司農發常平倉三衛具熈河所用兵諸路上民物流散之故青苗免役權息追呼方田保甲並罷凡十有八事民聞之讙呼相賀先是帝語翰林學士承㫖韓維曰天乆不雨朕日夜焦勞奈何維對曰陛下憂閔旱災損膳避殿此乃舉行故事恐不足以應天變當痛自責已廣求直言因上疏極言青苗及開邉之害帝感悟即命維草詔責躬以求直言詔下人情大恱㑹侠疏至帝慨然行之是日果大雨逺近沾洽輔臣入賀帝示以侠所進圖狀且責之皆再拜安石上章求去外間始知所行之由羣姦切齒遂以侠付御史治其擅發馬逓罪翰林學士吕恵卿御史中丞鄧綰言于帝曰陛下數年以来忘寢與食成此美政天下方被其賜一旦用狂夫之言罷廢殆盡豈不惜哉相與環泣于帝前於是新法一切如故惟方田蹔罷木征乞降于王韶韶歸于京師韶自京師還至興平聞景思立敗賊圍河州其勢方盛乃與李憲日夜馳至熈州熈方城守韶命撤之選兵得二萬人直趣定羌城破西蕃結河川族斷夏國通路進臨寧河分命偏將入南山木征知援絶㧞柵去初思立之覆師也羌勢復熾朝議欲棄熈河帝為之旰食數下詔戒韶持重勿出及是帝大喜韶還熈州以兵循西山繞踏白城後焚賊二萬餘帳斬首七千餘級木征窮蹙率酋長八十餘人詣軍門乞降韶受之送木征及其妻子赴京師王安石有罪免以韓絳平章事吕恵卿參知政事安石執政六年更法度開邉疆老成正士廢黜殆盡儇慧少年超進用事天下怨之而帝倚任益専太皇太后嘗乗間語帝曰祖宗法度不宜輕改吾聞民間甚苦青苗助役宜罷之帝曰此以利民非苦之也后又曰安石誠有才學然怨之者甚衆欲保全之不若蹔出之於外帝曰羣臣惟安石為國家當事時帝弟岐王顥在側因進曰太后之言至言也不可不思帝怒曰是我敗壊天下耶汝自為之顥泣曰何至是耶皆不樂而罷乆之太后流涕謂帝曰安石亂天下奈何帝始疑之及鄭俠疏進安石不自安遂求去位帝再四勉留安石請益堅吕恵卿使其黨變姓名日投匭留之安石感其意因乞韓絳代已而恵卿佐之帝從其請二人守其成規不少失時號絳為傳法沙門恵卿為䕶法善神恵卿懼中外有議新法者乃作書遍遺監司郡守使陳利害又從容白帝下詔言終不以吏違法之故為之廢法故安石所建無所更改遼復使蕭素来言疆事遼復遣樞宻副使蕭素来議疆界于代州境上遂下詔樞宻院議之且手詔判相州韓琦判河南府文彦博司空富弼判永興軍曽公亮條代北事宜以聞琦奏言臣觀近年以来朝廷舉事似不以大敵為恤彼見形生疑必謂我有圖復燕南意故引先發制人之説造為釁端所以致疑其事有七高麗臣屬北方乆絶朝貢乃因商舶誘之使来契丹知之必謂將以圖我一也强取吐蕃之地以建熈河契丹聞之必謂行將及我二也遍植榆桞於西山冀其成長以制蕃騎三也剏團保甲四也諸州築城鑿池五也置都作院頒弓矢新式大作戰車六也置河北三十七將七也契丹素為敵國因事起疑不得不然臣昔年論青苗錢事言者輙肆厚誣非陛下之明幾及大戮自此聞新法日下不敢復言今親被詔命事係安危言及而隠死有餘責臣嘗竊計始為陛下謀者必曰治國之本當先聚財積榖募兵於農民則可以鞭笞四夷故散青苗錢使民出利為免役之法次第取錢迨置市易務而小商細民無所措手新制日下更改無常官吏茫然不能詳記監司督責以刻為明今農怨於畎畆商歎于道路長吏不安其職陛下不盡知也夫欲攘斥四夷以興太平而先使邦本困摇衆心離怨此則為陛下始謀者大誤也臣今為陛下計謂宜遣使報聘具言向来興作乃修備之常理豈有他意疆土素定悉如舊境不可持此造端以隳累世之好以可疑之形如將官之類因而罷去益養民愛力選賢任能疎逺姦諛進用忠鯁使天下恱服邉備日充若其果自敗盟則可一振威武恢復故疆攄累朝之宿憤矣置沅州即懿州也五月罷賢良方正科自孔文仲對策忤王安石意因言于帝曰進士試策則是制科何必復置是耶帝然之吕恵卿執政復言制舉止於記誦非義理之學乞罷之遂詔罷制舉而更以䇿論試館職云三司使曽布提舉市易司吕嘉問免吕嘉問提舉市易連以羨課受賞帝聞其擾民以語王安石安石對曰嘉問奉法在公以是媒怨帝曰免行錢所収𤨏細市易鬻及果實梳樸脂麻氷炭大傷國體安石為之力辨至譏帝為叢脞不知帝王大畧且曰非嘉問孰敢不避左右近習非臣孰為嘉問辨帝曰即如是士大夫何故以為不便安石請言者姓名令嘉問條析及帝以旱故命韓維孫永集市人問之減坐賈錢千萬安石遂持嘉問條析奏曰此皆百姓所願不如人言也嘉問言朝廷所以許民輸錢免行者盖人情安於樂業厭于追擾若一切罷去則無人祗承又吏胥禄廩薄勢不得不求於民非重法莫禁以薄廩申重法則法有時而屈縣官為給事則三司經費有限今取民於鮮而吏知自重此臣等推行之本意也議者乃欲除去是殆不然民未嘗不畏吏方以其行役觸罪雖欲出錢亦不可得今吏之禄可謂厚矣然未及昔日取民所得之半也初市易𨽻三司嘉問恃勢陵使薛向出其上及曽布代向為使懐不能平㑹帝出手札詢布布訪于魏繼宗繼宗憤嘉問掠其功列其與初議異者布得實具上嘉問多收息干賞挟官府而為兼并之事帝將委布考之安石言二人有私忿於是詔布與吕恵卿同治恵卿故撼布至三司召繼宗及市賈問狀其辭同乃脅繼宗使誣布語言増加繼宗不從布言恵卿不可共事帝欲聴之安石不可帝遂詔中書曰朝廷設市易本為平凖以便民若周官泉府者今顧使中人之家失業若此吾民安得泰然也宜釐定其制布見帝言曰臣毎聞徳音欲以王道治天下今市易之為虐駸駸乎間架除陌之事矣如此之政書于簡牘不獨唐虞三代所無歴觀秦漢以来衰亂之世恐未之有也嘉問又請販鹽鬻帛豈不貽笑四方帝頷之事未决安石去位嘉問持之以泣安石勞之曰吾已薦恵卿矣及恵卿執政遂治前獄劾布沮新法出知饒州嘉問亦出知常州六月作渾儀浮漏時日官皆市井庸販法象圖器皆不能知至是沈括提舉司天監括博學洽聞貫于幽深又極開敏於天文方志律厯醫藥卜筭無所不通始制渾儀景表五壺浮漏募天下上太史占書雜用士人分方伎科為五後皆施行授瞎征榮州團練使賜姓名曰趙思忠秋七月立手實法時免役出錢或未均吕恵卿用其弟曲陽縣尉和卿計創手實法其法官為定立田産中價使民各以田畆多少高下隨價自占仍并屋宅分有無蕃息立等凡居錢五當蕃息之錢一非用器田榖而輙隠落者許告有實以三分之一充賞將造簿預具式示民令依式為狀縣受而籍之以其價列定高下分為五等既該見一縣之民物産錢榖乃參會通縣役錢本額而定所當輸明書其數示衆兩月使悉知之詔從其言於是民家尺椽寸土撿括無遺至於雞豚亦編抄之民不聊生初恵卿制是法然猶災傷五分以上不預荆湖察訪使蒲宗孟上言民以手實上其家之物産而官為注籍以正百年無用不明之版圖而均齊其力役天下之良法也然災傷五分不預焉臣以為使民自供初無所擾何待豐嵗願詔有司勿以豐凶㢮張其法從之民於是益困矣冬十月置三司㑹計司以韓絳兼提舉絳建言三司總天下財賦而無考較盈虚之法請選官置司以天下户口人丁稅賦場務坑冶河渡租額年課及一路錢榖出入之數去其重複比較増虧廢置及羨餘横費計贏闕之處使有無相通而以任職能否為黜陟則國計大綱可以省察從之以王韶為樞密副使淯井長寧夷十郡及武都夷内附遼生女真部族節度使烏古鼐卒子和哩布嗣女真之先出于勿吉居古肅慎地元魏時勿吉有七部曰粟末曰博綽曰恩徹亨曰佛寧曰哈沙曰黒水曰白山至隋勿吉改號靺鞨唐初有黒水靺鞨粟末靺鞨二部皆附于高麗其五部則無聞焉李勣之破高麗粟末部去保東牟姓大氏是為渤海國黑水部居肅慎地東瀕海南鄰高麗開元中入朝置黑水府以其部長為都督賜姓名李獻誠及渤海盛强因役屬之朝貢遂絶于中國渤海既滅黑水部民在南者繫籍于遼號熟女真在北者不籍于遼號生女真生女真之地有混同江長白山混同江亦號黑龍江所謂白山黑水也已而避遼興宗諱改曰女直云函普者始居高麗年六十餘别其凡烏古鼐而與弟博和哩適生女直居于完顔部布爾罕水涯乆之完顔部人有殺他族人者兩族交鬭衆莫能解完顔部人謂函普曰若能為部人解此怨使兩族不相殺部有賢女年六十而未嫁當以相配仍為同部函普曰諾乃往諭之曰殺一人而鬬不解損傷益多曷若止誅首亂者一人部内以物納償汝可以無鬬而且獲利焉怨家從之乃為約曰凡有殺傷人者徴其家人口一馬十偶牸牛十黄金六兩與所殺傷之家即兩解不得私鬭衆曰謹如約女真之俗殺人償馬牛三十自此始既備償如約部衆信服之謝以青牛一并許歸六十之女函普即以青牛為聘禮而納之并得其資産後生二男長曰烏嚕次曰斡魯一女曰卓克舊索巴遂為完顔部人烏嚕生巴哈巴哈生綏赫黒水俗無室廬負山水坎地梁木其上覆以土夏則出隨水草以居冬則入處其中遷徙不常綏赫乃徙居海上務耕墾樹藝始築室有棟宇之制人呼其地為額安春訥格爾額訥格爾者漢語居室也自此以後遂定居水之側矣綏赫生舒嚕舒嚕剛毅質直生女直無書契約束不可檢制舒嚕欲稍立條教諸父部人皆不欲將坑殺之已被執叔父錫里庫亟往彎弓注矢射于衆中刼執者皆散走舒嚕得免由是稍以條教為治部落寖强遼以特哩衮官之諸部猶不肯用條教舒嚕耀武至于青嶺白山順者撫之不從者伐之所向克捷還至巴喇濟村而死載柩以行至海蘭水烏凌阿部人錫馨與完顔部人鄂和共出邀于路攻而奪其柩因揚言曰汝輩以舒嚕為能而推尊之吾今得之矣舒嚕之徒奔告于佛穆丹募兵追及與戰復得柩而還舒嚕之世生女真稍用條教然尚未有文字官府不知嵗月晦朔是以年夀修短莫得而考焉舒嚕生烏古鼐烏古鼐能役屬諸部自白山頁赫圖們邉扎蘭扎卜古倫之屬以至五國之長皆聴命會遼之民逃入于女直遼使赫嚕林牙將兵索逋民烏古鼐恐遼兵深入得其山川險易或將圖之乃以計止之曰兵若深入諸部必驚擾變生不測逋户亦不可得非計也赫嚕然之遂止其軍與赫嚕自行索之烏古鼐怨錫馨乃詭以錫馨阻絶海東青路告于遼遼主遣使責讓錫馨錫馨入見遼主因留之于邉地既而五國佛寧部節度使巴哩美叛遼鷹路不通遼将致討烏古鼐畏遼兵入其境乃告遼曰彼可計取也若用兵必將走險非嵗月可平也遼從之烏古鼐因陽與巴哩美為好而以妻子為質襲而擒之獻于遼主遼主召見于寢殿燕賜加等授生女真部族節度使將刻印與之烏古鼐不肯繫遼籍辭曰請俟他日遼主終欲與之遣使往諭烏古鼐詭使部人揚言曰都太師若受印繫籍部人必殺之遼使乃還烏古鼐既為節度使有官屬紀綱漸立矣生女真舊無鐡隣國有以甲胄往粥者必傾貲厚價以與貿易且令族人皆售之得鐡既多因之以修弓矢備器械兵勢稍振前後願附者衆烏古鼐為人寛恕能容物平生不見喜愠推財與人無所吝惜人或忤之亦不念然嗜酒好色飲㗖過人或呼之為和鑾和鑾者慈烏也北方有之狀如大鷄善啄物若飢不得食雖砂石亦㗖之烏古鼐聞其訕亦不介意故人益信服焉至是五國穆延部蘇頁貝勒畔遼鷹路不通烏古鼐伐之被重解鎧率衆力戰蘇頁敗走巴喇宻特濼時方十月氷忽蘇頁不能軍衆皆潰去烏古鼐亦還道遇逋亡要遮險阻晝夜拒戰比至部已憊即往遼境將見遼邉將達嚕噶自陳敗拉林之功行次拉林水有疾而復卒于家年五十四有子九人曰和卓曰和哩布曰噶順曰頗拉淑曰英格曰赫色本曰滿丕曰阿里罕曰們圖琿烏古鼐嘗言和卓柔和和哩布有器識故其卒也和哩布嗣之乙卯八年遼大康元年春正月蔡挺罷編管鄭俠于英州罷參知政事馮京放祕閣校理王安國于田里侠上疏論吕恵卿朋姦壅蔽仍取唐魏徴姚崇宋璟李林甫盧杞傳為兩軸題曰正直君子邪曲小人事業圖迹在位之臣暗合林甫輩而反於崇璟者各以其類復為書獻之且薦馮京可相恵卿奏為謗訕令中丞鄧綰知制誥鄧潤甫治之遂編管俠于汀州御史臺史楊忠信謂俠曰御史緘黙不言而君上書不已是言責在監門而臺中無人也取懐中名臣諫疏二帙授侠曰以此為正人助馮京在政府數與王安石論辯又薦劉攽蘇軾掌外制安石忌之及恵卿議罷制舉京力爭以為不可恵卿銜之㑹楊忠信事覺恵卿遂嗾侍御史張璪劾京與侠交通有迹令奉禮郎舒亶往捕俠亶遇侠于陳州搜其篋得所録名臣諫疏有言新法事及親朋書尺悉按姓名治之於是京與王安國丁諷王堯臣等皆得罪恵卿欲致侠以死帝曰侠所言非為身也忠誠亦可嘉豈宜深罪但徙英州京罷政出知亳州安國奪秘閣校理放歸田里侠至英得僧屋將壓者居之英人無貧賤富貴皆加敬爭遣子弟從學為築室遷居之初安國任西京國子教授秩滿至京師帝以安石弟之故特召對問曰漢文帝何如主安國對曰三代以後未有也帝曰但恨其才不能立法更制耳安國對曰文帝自代来入未央宫定變故俄頃呼吸間恐無才者不能至用賈誼言待羣臣有節専務以徳化民海内興於禮義幾致刑措則文帝加有才一等矣帝曰王猛佐苻堅以蕞爾國而令必行今朕以天下之大不能使人何也曰猛教堅以峻刑法殺人致秦祚不傳世今刻薄小人必有以是誤陛下者願専以堯舜三代為法則下豈有不從者乎帝又問卿兄秉政外論謂何安國對曰恨知人不明聚斂太急爾帝不悦由是止授崇文院校書屢以新法之弊力諫安石又嘗以佞人目恵卿故恵卿䘖之二月復以王安石平章事初吕恵卿迎合安石建立新法安石故力援引驟致執政恵卿既得志忌安石復用乃䧟安國于鄭侠之獄又起李士寧獄以傾安石安石聞而怨之韓絳時顓處中書事多稽留不決且數與恵卿争論度不能制宻請帝復用安石帝從之安石承命即倍道而進七日至汴京三月遼使蕭禧來言代北疆事也韓縝如河東㑹遼人議疆事沈括如遼遼蕭禧来理河東黄嵬地留館不肯辭曰必得請而後反帝遣知制誥沈括往報聘括詣樞宻院閱故牘得頃嵗所議疆地書指古長城為境今所爭盖三十里逺論之帝以休日開天章閣召對喜曰大臣殊不究本末幾誤國事命以畫圖示禧禧議始屈括行至遼遼相與議不能屈遂舍黄嵬而以天池請括乃還在道圖其山川險易迂直風俗淳龎人情向背為使契丹圖上之夏四月以吳充為樞密使閏月陳升之罷升之深狡多數善傅㑹以取富貴至是以足疾不能立朝罷行奉元厯輸林學士沈括所造也六月頒王安石所脩詩書周禮義于學官以取士安石既受詔修經至是以所訓釋詩禮書三經上進帝謂之曰今談經者人人殊何以一道徳卿所著經其以頒行使學者歸一遂頒于學官號曰三經新義加安石左僕射兼門下侍郎新義既頒一時學者無敢不傳習主司純用以取士士莫得自名一説先儒傳註一切廢不用焉帝又以字學乆不講為言及安石罷居金陵作字説二十四卷以進多穿鑿附㑹其流入于佛老云以王雱為龍圖閣直學士雱辭許之雱辭新命吕恵卿勸帝許之由是嫌隙尤著司徒兼侍中判相州魏國公韓琦卒諡忠獻秋七月詔韓縝如河東割地以畀遼初帝得韓琦疏善其䇿㑹王安石復相而蕭禧等又来韓琦亦薨帝問于安石安石對曰將欲取之必姑與之帝乃詔於分水嶺為界遣天章閣待制韓縝如河東割新疆與遼凡東西失地七百里遂為異日興兵之端云以朱夀昌通判河中府夀昌父巽守京兆時妾劉有娠而出夀昌生數嵗始還父家母子不相聞者五十年夀昌行四方求之不得飲食罕御酒肉與人言輙流涕用浮圖法灼背燒頂刺血書佛經力所可致無不為者及知廣徳軍與家人訣棄官入秦誓不見母不復還行次同州得焉劉氏時嫁党氏有數子年七十餘矣夀昌迎還京兆守臣錢明逸以事聞詔夀昌還就官由是天下皆知其孝夀昌以母故求通判河中府詔許之數年其母卒夀昌居喪幾喪明八月庚寅朔日有食之韓絳免絳與王安石議事不合㑹有劉佐者坐法免安石欲拂拭用之絳執不可議於帝前不决絳即再拜求去帝驚曰此小事何必爾絳對曰小事尚不伸况大事乎帝為逐佐至是以三司會計事多濡滯免相出知許州絳臨事果敢故韓琦以為有公輔器而薦用之特以黨安石為清議所少罷三司㑹計司冬十月吕恵卿有罪免御史蔡承禧論吕恵卿姦惡恵卿居家俟命中丞鄧綰亦欲彌縫前附恵卿之迹以媚王安石安石子雱復深憾恵卿遂諷綰發恵卿兄弟强借秀州華亭富民錢五百萬與知華亭縣張若濟買田共為姦利事置獄鞫之恵卿竟罷出知陳州綰又論三司使章惇恊濟恵卿之姦出知湖州罷手實法中丞鄧綰言凡民養生之具日用而家有之今欲盡令疏實則家有告訐之憂人懐隠匿之慮無所措手足矣商賈通殖貨利交易有無不過服食器用米粟絲麻布帛之類或春有之而夏已蕩析或秋貯之而冬已散亡公家簿書何由拘録其勢安得不犯徒使嚚訟者趨賞報怨以相告訐畏怯者守死忍困而已詔罷其法有星孛于軫詔求直言以王安禮為翰林學士知開封府乙未彗出軫帝以災異數見避殿減膳詔求直言赦天下詢政事之未恊于民者王安石率同列上疏言晉武帝五年彗出軫十年又有孛而其在位二十八年與乙巳占所期不合盖天道逺先王雖有官占而所信者人事而已天文之變無窮上下傅㑹豈無偶合周公召公豈欺成王哉其言享國日乆則曰嚴恭寅畏天命自度治民不敢荒寧其言夏商多歴年則亦曰徳而已禆竈言火而驗欲禳之國僑不聴則曰不用吾言鄭又將火僑終不聴鄭亦不火有如禆竈未免妄誕况今星工哉所傳占書又世所禁謄冩譌誤尤不可知陛下盛徳至善非特賢於中宗周召所言則既閲而盡之矣豈須愚瞽復有所陳竊聞兩宫以此為憂望以臣等所言力行開慰帝曰聞民間殊苦新法安石對曰祁寒暑雨民猶怨咨此無庸恤帝曰豈若并祁寒暑雨之怨亦無耶安石不悦退而屬疾不出帝再三慰勉然後復出視事其黨謀曰今不取上素不喜者暴進用之則權輕將有窺人閒隙者安石然之帝喜其出凡所進用無不從之安石弟安禮應詔上疏曰人事失於下變象見於上陛下有仁民愛物之心而澤不下究意者左右大臣不均不直謂忠者為不忠不賢者為賢乘權射利者用力殫於溝瘠取利究于園夫足以干隂陽而召星變願察親近之行杜邪枉之門至於祈禳小數貶損舊章恐非所以應天者帝覽疏嘉歎諭之曰王珪欲使卿條具朕嘗謂不應沮格人言以自壅障今以一指蔽目雖泰華在前弗之見近習蔽其君何以異此卿當益自信遂進翰林學士知開封府十一月交阯大舉入寇陷欽㢘州知邕州蕭注磊落有大志喜言兵羡王韶等以開邉獲高位乃上疏言交阯雖奉朝貢實包禍心失今不取必為後憂㑹交人為占城所敗或上言其餘衆不滿萬取之易也詔以注知桂州注入朝帝問攻取之策注以為難沈起言南交小醜無不可取之理乃以起代注知桂起遂一意攻擾交趾始貳朝廷復罷起而以劉彝代之初廣州屯北兵二十指揮以備邉交人畏之彝至奏罷正兵而用槍杖手分戍聴偏禆言以為安南可取乃大治戈船交人来互市率皆遏絶表䟽上訴又不得達遂分三道入冦一自廣府一自欽州一自崑崙關連䧟欽亷二州殺土丁八千人熊本平渝州䝤置南平軍渝州南川獠木斗叛詔秦鳯都轉運使熊本安撫之本進營佛頂埧扼其吭焚積聚以破其黨木斗氣索舉溱州地五百里来歸為四砦九堡建銅佛埧為南平軍召本還為知制誥因上疏曰天下之治有因有革期於趣時適治而已議者猥用持盈守成之説文茍簡因循之治天下之吏因以安常習故為俗奮言納忠者悠悠之徒相與蹙額盱衡而詆罵之陛下出大號發大政可謂極因革之理然改制之始安常習故之羣圜視四起交驩而合譟或諍于廷或謗于市或投劾引去者不可勝數陛下燭見至理獨立不奪今雖少定彼將伺隙而逞願陛下深念之勿使譟讙之衆有以窺其間而終萬世難就之業天下幸甚専以取媚王安石也遼主殺其后蕭氏后小字觀音姿容冠絶工詩善談論好音樂生太子濬時北院樞宻使耶律伊遜専政勢傾一國而忌后明敏于是宫婢單登等誣后與伶官趙惟一高長命私通伊遜以聞詔伊遜劾狀遂族誅惟一長命而賜后自盡歸其尸於家後追諡宣懿十二月以元絳參知政事曽孝寛僉書樞密院事絳在翰林謟事王安石而安石嘗徳曽公亮之助已欲引公亮子孝寛於政地以報之由是二人同升以趙卨為安南招討使宦者李憲副之帥師討交阯王安石聞欽亷䧟已不悦㑹得交人露布言中國作青苗助役之法窮困生民我今出兵欲相拯濟安石益怒自草敕牓詆之而以天章閣侍制趙卨為招討使宦者嘉州防禦使李憲為副將兵討之憲乆在西北邉好論兵王韶之開熈河憲視師焉勞效為多王韶免熈河雖名一路而實無租入軍食皆仰給他路轉運判官馬瑊捃官吏細故韶欲罷瑊王安石右瑊韶由是與安石異數以母老乞歸帝語安石勉留之韶不從帝亦不恱其為人乃出知洪州韶起孤生鑿空開邉驟躋政地然用兵有機略臨出師召諸將授以指不復更問每戰必捷嘗夜卧帳中前部遇敵矢石已及呼聲振山谷侍者股栗而韶鼻息自如人服其量罷直學士院陳襄襄福州侯官人少與周希孟陳烈鄭穆為友時學者沈溺於彫琢之文所謂知天盡性之説皆指為迂闊而莫之講四人者相與倡道於海濵聞者皆笑以驚守之不為變卒從而化謂之四先生襄舉進士再調知仙居縣教其民曰為吾民者父義母慈兄友弟恭子孝夫婦有恩男女有别子弟有學鄉閭有禮貧窮患難親戚相救婚姻死喪隣保相助無墮農業無作盗賊無學賭博無好爭訟無以惡陵善無以富吞貧行者讓路耕者讓畔班白者不負戴于道路則為禮義之俗矣民多化焉及改知河陽縣留意教化進縣子弟於學或讒之於判府富弼謂其誘邑子以資過客弼疑焉人勸襄毁學舍以塞往矣謗不從乆之弼以語襄襄曰自反而縮雖千萬人吾公茍有惑志何名知己講說不少解弼由是益竒之及弼相薦諸朝累擢侍御史上疏論青苗之害曰臣觀制置司所議莫非引經以為言而其實則稱貸以取利事體卑削貽中外譏笑是特管夷吾商鞅之術非聖世所宜行望貶斥王安石吕恵卿以謝天下罷韓絳以杜大臣爭利而進者不聴襄乃請外帝不許安石屢欲出之而帝眷待益深三遷直學士院帝嘗訪人材之可用者襄以司馬光韓維吕公著蘇頌范純仁蘇軾等三十三人對安石益惡之擿其書詔小失諷御史劾之遂知陳州更定解池鹽鈔法自薛向立鹽鈔本其後多虚鈔而鹽益輕以鈔折兌糧草有虚擡邉糴之患於是詔皮公弼熊本宋迪分領其事趙瞻制置以内蔵錢二百萬緡假三司遣市易吏行四路請置鹽引仍令秦鳯永興鹽鈔嵗以百八十萬為額至是中書奏陕西鹽鈔利害及立法八事大扺謂買鈔本錢有限而出鈔過多買不盡則鈔賤而糶貴故出鈔不可無限然商人欲變易見錢而官不為貴即為兼并所抑則鈔價益賤而邉境有急鈔未免多出故當置場以市價平之今當定買兩路實賣鹽二百二十萬緡以當用鈔數立額永興路八十一萬五千秦鳯路一百三十八萬五千熈河路五十三萬七千永興軍遣官買鈔嵗支轉運司錢十萬緡買西鹽鈔又用市易務賖請法募人賖鈔變易即民間鈔多而滯則送解池毁之詔從其請然有司給鈔溢額猶視其故時多言官賣不便乞通商王安石主提舉出賣解池公事張景温之言至課民買官鹽隨貧富作業為多少之差買賣私鹽聴人告重給賞以犯人家財給之買官鹽食不盡留經宿者同私鹽法於是民間騷怨鹽鈔舊法毎席六緡至是二緡有餘商不入粟邉儲失備誠州蠻來降誠徽州唐溪峒州世為楊氏所居號十洞首領以其族姓散掌州峒至是謝景温往招誘之其首領楊光富率其族姓二十三州峒歸附詔皆官之遼賜其北府宰相張孝傑姓耶律氏孝傑以進士第一得幸於遼主漢人中貴近無比至是賜以國姓嘗侍燕遼主曰先帝用仁先化葛以賢智也朕有孝傑伊遜不在仁先化葛下誠為得人然為人狡貪伊遜倚之為謀主丙辰九年遼大康二年夏大安元年春正月交阯陷邕州知州蘇緘死之交人圍邕知州蘇緘悉力拒守外援不至城遂䧟緘殺其家三十六人因自焚死城中人感緘之義無一人從賊者於是交人盡屠其民五萬八千餘口下溪州刺史彭師晏来降五溪悉平北江蠻酋彭師晏常持向背湖北轉運使孫構喜功名勇於建立聞向水蠻酋彭儒武與師晏有隙檄使攻之師晏窘急乃率其部内及誓下州峒蠻張景謂等各以其地乞降于湖北提㸃刑獄李平知辰州陶弼平弼受之遣師晏詣京師詔授師晏禮賔副使京東州都監官其下六十有四人自是五溪皆平二月召李憲還以郭逵為安南招討使趙卨副之帥師討交阯詔占城占臘合擊之吐蕃宗哥酋果莊寇五牟谷蕃將藺氊訥支大破之果莊復寇五牟谷韓存寳敗之以种諤知岷州夏五月分兩浙為東西路城茂州靜州蠻酋董整白来降六月以水源等峒蠻酋儂賀等七人為將軍秋七月城下溪州名曰會溪城御史中丞鄧綰有罪免吕恵卿既出守陳而張若濟之獄乆不成王雱令檢正中書户房吕嘉問及練亨甫共取中丞鄧綰所列恵卿事雜他書下制獄王安石不知也省使以告恵卿于陳恵卿因上書訟安石曰安石盡棄所學隆尚縱横方命矯令罔上要君此數惡力行於年嵗之間雖古之失志倒行逆施者殆不如此又發安石私書曰無使上知者帝以示安石安石謝無有歸以問雱雱言其情安石咎之雱憤恚疽發背死帝頗厭安石所為綰慮安石去失勢乃上書言宜録安石子及婿仍賜第京師帝以語安石安石曰綰為國司直而為宰臣乞恩澤極傷國體當黜之帝以綰操心頗僻賦性姦囘論事薦人不循分守斥知虢州置靖州八月罷粥祠廟錢司農粥祠廟於民應天府宋閼伯微子廟皆在粥中判官劉摯嘆曰一至於此往見判府張方平曰獨不能為朝廷言之耶方平矍然託摯為奏曰閼伯遷商丘主祀炎火為國家盛徳所乗歴世尊為大祀微子宋始封之君開國此地本朝受命建業所因又有雙廟乃唐張巡許逺孤城死賊能捍大患今若令承買小人規利冗䙝瀆慢何所不為嵗收微細實損國之大體欲望留此二廟以慰邦人崇奉之意䟽上帝大震怒批牘尾曰慢神辱國無甚於斯於是天下祠廟皆得罷粥冬十月王安石免安石之再相也屢謝病求去及子雱死尤悲傷不堪力請解機務帝亦厭之乃以使相判江寧府安石既退處金陵往往冩福建子三字盖深悔為吕恵卿所誤也以吳充王珪平章事充子安持雖娶王安石女而充深不善安石所為數為帝言新法不便帝察充中立無與及安石免遂相之充欲有所變革乞召還司馬光吕公著韓維蘇頌及薦孫覺李常程顥等數十人光自洛貽書充曰自新法之行中外洶洶民困于煩苛迫于誅斂愁怨流離轉死溝壑日夜引領冀朝廷覺悟一變敝法今日救天下之急當罷青苗免役保甲市易而息征伐之謀欲去此五者必先開言路令别利害以悟人主之心今病雖已深猶未至膏肓失今不治遂為痼疾矣充不能用以馮京知樞密院事京昔與王安石同在政府議論不合及吕恵卿告安石罪發其私書有勿令齊年知之語京與安石同年生故云帝以安石為欺故召用之十一月包順敗鬼章于多移谷种諤大敗鬼章于鐵城十二月郭逵敗交阯于富良江李乾徳降逵次長沙先遣將復邕亷而自將西進至富良江蠻以精兵乗船逆戰官軍不能濟趙卨分遣將吏伐木治攻具機石如雨蠻船皆壊因設伏擊之斬首數千殺其偽太子洪真李乾徳懼遣使奉表詣軍門納欵時官兵三十萬人冐暑渉瘴地死者過半富良江去其國不逺逵不敢渡得其廣源州門州思浪州蘇茂州機榔縣而還羣臣稱賀詔以廣源為順州赦乾徳罪以逵玩寇貶左衞將軍治劉彝沈起開釁之罪安置隨秀州置威戎軍詔宦者李憲措置秦鳯熈河邉事諸將皆受節制丁巳十年遼大康三年夏四月置憲州遼主廢其太子濬為庶人幽之于臨潢濬小字額嚕温幼而好學善騎射既立為太子兼北南院樞宻使時耶律伊遜擅政搆害宣懿皇后而立其黨蕭錫黙之妺為后遂欲害太子㑹䕶衛蕭呼嚕古知伊遜之姦狀伏橋下欲殺之值暴雨橋壞所謀不遂乃下呼嚕古獄太子亦以母后之故憂見顔色副提㸃蕭實沙謂伊遜曰臣民心屬太子公非閥閲一旦若立吾輩措身何地伊遜然之乃與同知北院宣徽事蕭塔喇台謀構太子以罪隂令䕶衛太保耶律扎拉誣告都宫使耶律薩喇知北院樞密事耶律蘇色䕶衛蕭呼嚕古等謀廢立按驗無狀詔不治而出蘇色等三人於外既而伊遜復令牌印郎君蕭額都温等誣首扎拉前告非妄臣實與謀欲殺伊遜然後立太子臣若不言恐事覺連坐遼主信之遂詔伊遜及耶律孝傑等鞫治薩喇等誣伏皆殺之杖太子幽于宫中太子具陳枉狀謂耶律雅克曰吾為儲副尚何所求公當為我辨之雅克伊遜之黨也因易其言為欵伏遼主大怒乃廢太子為庶人徙于上京太子將出曰我何罪至此蕭實沙叱使登車命衞士闔其扉而去秋七月河決澶州自開直河水勢増漲田廬益壊外都水監丞程昉以不白水災憂死至是大決於澶州曹村澶淵北流斷絶河道南徙東滙於梁山張澤濼分為二派一合南清河入于淮一合北清河入于海凡灌郡縣四十五而濮齊鄆徐尤甚壊田逾三十萬頃遣使修閉判大名府文彦博言河勢變移四散漫流兩岸俱被水患而都水止固䕶東流北岸希省費之賞未嘗増修隄岸今者之決溢非天災實人力不至也逾年決口塞詔改曹村埽曰靈平九月立義倉初封濮安懿王子宗樸為濮陽郡王奉王祀也河南逸士邵雍卒雍河南人少時自雄其才慷慨欲樹功業於書無所不讀始為學師堅苦刻厲寒不爐暑不扇夜不就席者數年已而歎曰昔人尚友於古而吾獨未及四方於是踰河汾渉淮漢周流齊魯宋鄭之墟乆之幡然来歸曰道在是矣遂不復出初北海李之才受易於河南穆修修之易受於种放而放受之於陳搏源流最逺其圖書象數變通之妙自秦漢以来鮮有知者之才攝共城令雍時居毋憂于蘇門山百源之上布裘蔬食躬爨以養父古之才叩門来謁勞苦之曰好學篤志果何似雍曰簡䇿迹外未有適也之才曰君非迹簡策者其如物理之學何他日則又曰物理之學學矣不有性命之學乎雍再拜願受業之才遂授以河圖洛書伏羲八卦六十四卦圖象雍由是探頥索隠妙悟神契洞徹藴奥汪洋浩博多其所自得者及其學益老徳益劭玩心高明以觀夫天地之運化隂陽之消長逺而古今世變微而飛走草木之性情深造曲暢庶幾所謂不惑而非依倣象類億則屢中者遂衍伏羲先天之㫖著書十餘萬言然世之知其道者鮮矣初至洛蓬蓽環堵不蔽風雨躬樵爨以事親雖平居屢空而怡然有所甚樂人莫能窺也及富弼司馬光吕公著諸賢退居洛中雅敬雍恒相從游焉為市園宅雍嵗時耕稼僅給衣食名其居曰安樂窩因自號曰安樂先生旦則焚香燕坐晡時酌酒三四甌徹醺即止常不及醉也興至輙哦詩自詠春秋時出逰城中風雨則不出出則乗小車一人挽之惟意所適士大夫家識其車音爭相迎候童孺厮𨽻皆驩相謂曰吾家先生至也不復稱其姓字或留信宿乃去好事者别作屋如雍所居以候其至名曰行􅌪司馬光兄事雍而二人純徳尤為鄉里所慕向父子兄弟每相飭曰毋為不善恐司馬端明邵先生知也士之道洛者有不之公府必之雍雍徳氣粹然望之知其賢然不事表襮不設防畛羣居燕笑終日不為甚異與人言樂道其善而隠其惡有就問學則荅之未嘗强以語人人無貴賤少長一接以誠故賢者悦其徳不賢者服其化時新法行吏牽廹不可為或投劾去雍門生故友居州縣者或貽書訪之雍曰此賢者所當盡力之時新法固嚴能寛一分則民受一分之賜矣投劾何益耶留守王拱辰薦雍遺逸授將作主簿後舉逸士補潁州團練推官皆固辭乃受命竟稱疾不之官年七十六而卒贈著作郎後賜諡康節先生雍天性高邁逈出千古而坦夷温厚不見圭角是以清而不激和而不流人與交乆益尊信之程顥嘗與雍議論終日退而歎曰堯夫内聖外王之學也雍知慮絶人遇事能前知程頥嘗曰其心虚明自能知之及疾病司馬光張載程顥程頥晨夕候之既卒顥為銘墓稱雍之道淳一不雜就其所至可謂安且成矣著皇極經世觀物内外篇漁樵問對傳于世冬十月濮陽郡王宗樸卒以其弟宗誼為濮國公詔自今濮安懿王子以次襲封以奉王祀十一月以西蕃宗哥首領青宜結果莊為廓州刺史阿令骨為松州刺史遼耶律伊遜弑其故太子濬及其妃蕭氏濬至上京幽于圜堵伊遜與耶律孝傑謀遣其私人蕭逹嚕噶等夜引力士入囚室紿以有赦召濬出殺之函首以還年二十以疾薨聞遼主命有司葬于龍門山既而伊遜復隂遣人殺濬妃蕭氏遼主知其寃悔恨無及追諡濬曰昭懐太子知太常禮院張載卒載長安人少喜談兵至欲結客取洮西之儒地年二十一以書謁范仲淹仲淹謂之曰者自有名教可樂何事於兵因勸之讀中庸載讀其書猶以為未足又訪諸釋老累年究極其説知無所得反而求之六經嘗坐虎皮講易京師聴從者甚衆一夕程顥程頥至與論易次日載語人曰比見二程深明易道吾所弗及汝輩可師之即撤坐輟講與二程論道學之要渙然自信曰吾道自足何事旁求於是盡棄異學淳如也舉進士調雲巖令以敦本善俗為先每月吉具酒食召鄉人高年㑹縣庭親勸酬之使人知養老事長之義因訪民疾苦及告所以訓戒之意帝初即位一新百度思得才哲之士謀之吕公著薦載有古學召見問治道載對曰為政不法三代者終茍道也帝悦以為崇文校書一日見王安石安石問以新政載曰公與人為善則人以善歸公如教玉人琢玉則宜有不受命者矣未幾移疾屛居南山下終日危坐一室左右簡編俯而讀仰而思有得則識之或中夜起坐取燭以書其志道精思未始須臾息也敝衣蔬食與諸生講學毎告以知禮成性變化氣質之道學必如聖人而後已以為知人而不知天求為賢人而不求為聖人此秦漢以来學者大蔽也故其學以尊禮貴徳樂天安命以易為宗以中庸為體以孔孟為法黜怪妄辨鬼神其家昏喪葬祭率用先王之意而傅以今禮又論定井田發斂學校之法皆欲條理成書使可舉而措諸事業吕大防薦之召知太常禮院以疾歸而卒載學古力行為關中士人宗師世稱為横渠先生著正蒙西東銘行于世程頥言西銘明理一而分殊擴前聖所未發與孟子性善養氣之論同功戊午元豐元年遼大康四年春正月以王安石為集禧觀使封舒國公閏月曽孝寛以父喪去位以孫固同知樞密院事初固與王安石議新法不合出知真定至是帝思其先見召用之二月濮國公宗誼卒弟宗暉嗣夏六月癸卯朔日有食之秋七月詔韓存寳經制瀘州夷瀘州納溪夷乞弟不奉職貢詔西上閤門使韓存寳經制之存寳至破其後城十有三囤官兵死者亦甚衆焉九月交趾來貢交趾李乾徳遣使来貢表求所失州縣詔不許以吕公著薛向同知樞密院事公著在翰林帝嘗以釋老之事語之公著問曰堯舜知此道乎帝曰堯舜豈不知公著曰堯舜雖知此而惟以知人安民為難所以為堯舜也帝黙然向幹局絶人尤善商財計算無遺䇿為陕西轉運副使八年所入鹽馬芻粟數累萬民不益賦其課為最帝知其才以為發運使改三司使洮河用兵資用浩繁向未嘗乏供給用心至到然不能不病民王安石方尚功利從中主之雖御史有言不聴也故益得展奮其才至於論兵帝前通暢明決遂由文俗吏得大用冬十二月以李稷都大提舉成都茶場自天聖以来茶法屢易至嘉祐始行通商雖議者或以為不便而更法之意則主于優民帝即位與大臣論昔茶法之弊文彦慱吳充王安石各論其故然通商之法未有所變及王韶建開河湟之䇿委以經畧熈寧七年始遣三司幹當公事李杞入蜀經畫買茶於秦鳯熈河慱馬而韶言西人頗以善馬至邉所嗜惟茶乏茶與市即詔趣杞據見茶計水陸運致以著作佐郎蒲宗閔同領其事初蜀之茶國皆民兩稅地不植五榖惟宜種茶賦稅一例折輸役錢亦視其賦民賣茶資衣食與農業田無異而税額總為三十萬杞被命經度又詔得調舉官屬乃即蜀諸州剏設官場嵗増息為四十萬而重禁𣙜之令其輸受之際往往壓其斤重侵其價直法加急矣逾年杞以疾去都官郎中劉佐代之茶運積滯嵗課不給佐遂免而蒲宗閔建議川峡路民茶息收十之三盡賣於官場更嚴私交易之令稍重至徒刑仍没緣身所有物以待賞給於是蜀茶盡𣙜民始病焉知彭州吕陶言川峡四路所出茶比東南十不及二諸路既許通商兩川却為禁地虧損治體如解州有鹽池民間煎者乃是私鹽晉州有礬山民間煉者乃是私礬今川蜀茶園皆已物與解鹽晉礬不同又市易司籠制百貨嵗出息錢不過十之二然必以二年為率今茶場司務重立法盡𣙜民茶隨買隨賣取息十之三茶户被害不可勝窮詔止収息十之二而以李稷代佐任佐坐措置乖方罷而吕陶亦得罪侍御史周尹利路漕臣張宗諤張升卿皆以論𣙜茶病民被貶李稷益以是要功建言州郡毋得越職論事而稷得舉劾官吏以重其權與蒲宗閔務浚利刻急一年之間通課利及舊界息稅七十六萬七千六十餘緡帝謂稷能推原法意日就事功宜速遷擢以勸在位遂以為都大提舉茶場而用范純粹同提舉徙司秦州稷以陸師閔幹當公事自輔己未二年遼大康五年春二月瀘州夷乞弟寇邉詔王光祖會師討之夏五月元絳罷以蔡確參知政事確善觀人主意與時上下以王安石薦再調監察御史因為之用知帝有厭安石意即論安石乗馬入宣徳門與衛士競以賈直及文彦博言浚川杷非濬河之具帝遣知制誥熊本行視以彦博言為是確遂論本附彦博本坐罷確因代其職改知諫院判司農事覬欲得臺端因論中丞鄧潤甫御史上官均按獄失實潤甫均皆罷而確得中丞猶領司農凡常平免役之法皆成其手㑹太學生虞蕃訟博士受賄確深探其獄連引朝士自翰林學士許將參知政事元絳子耆寧以下皆逮捕械繋令獄卒與同寢處飲食旋溷共為一室設大盆於前凡羮胾飯餅舉投其中以杓混攪分飼之如犬豕乆繫不問幸而得問無一事不承遂劾元絳為子有所屬請絳出知亳州確遂代其位確自知諫院為參知政事皆以起獄奪人位而居之士大夫交口叱罵而確自以為得計也吳充數為帝言新法不便欲稍去甚者確曰曹參與蕭何有隙至代為相一遵何約束今陛下所自建立豈容一人挟怨而壊之法遂不變絳工于文辭而無特操仕已顯猶謂遲晚時論鄙之秋八月増太學生舍増太學生舍為八十齋齋三十人外舍生二千人内舍生三百人上舍生百人月一私試嵗一公試補内舍生間嵗一試補上舍生彌封謄録如貢舉法於是中丞李定上國子監敕式令并學令凡百四十條云冬十月立水居户賦役法詔立水居船户五户至十户為一甲以輸賦役以順州賜交趾交趾歸所掠民也太皇太后曹氏崩帝事太后致極誠孝后亦慈愛天至故事外家男子毋得入謁帝以后春秋高數請召弟佾入見乆之乃許及見少頃后謂佾曰此非汝所當得留趣遣出焉帝嘗有意于燕薊已與大臣定議乃詣太后白其事后曰儲蓄賜予備乎鎧仗士卒精乎帝曰固已辦之矣后曰事體至大吉凶悔吝生乎動得之不過南面受賀而已萬一不諧則生靈所係未易以言茍可取之太祖太宗收復乆矣何待今日帝曰敢不受教下知湖州蘇軾御史獄貶為黄州團練副使軾自徐徙湖上表以謝又以事不便民者不敢言以詩託諷庶有益於國中丞李定御史舒亶擿其語以為侮慢因論軾自熈寧以来作為文章怨謗君父交通戚里逮軾赴臺獄詔定與知諫院張璪御史何正臣舒亶等雜治之定等媒蘖以為誹謗時事鍛鍊乆之且多引名士欲寘之死太皇太后曹氏謂帝曰嘗憶仁宗以制科得軾兄弟喜曰吾為子孫得兩宰相今聞軾以作詩繫獄得非仇人中傷之乎捃至於詩其過微矣宜熟察之帝曰謹受教呉充申救甚力帝亦憐之㑹翰林學士王安禮從容白帝曰自古大度之君不以言語罪人軾以才自奮謂爵禄可立取顧録録如此其心不能無觖望今一旦致于理恐後世謂陛下不能容才帝曰朕固不深譴也行為卿貰之第去勿漏言軾方賈怨於衆恐言者縁以害卿也王珪復舉軾詠檜詩云根到九泉無曲處世間惟有蟄龍知以為不臣帝曰彼自詠檜耳何預朕事軾遂得輕比舒亶又言駙馬都尉王詵輩公為朋比如盛僑周邠固不足論若司馬光張方平范鎮陳襄劉摯皆略能誦説先王之言而所懐如此可置而不誅乎帝不從但貶軾黄州團練副使本州安置弟轍坐累自應天府判官謫監筠州酒稅王詵王鞏謫貶有差張方平司馬光范鎮等二十二人俱罰銅初鮮于侁為京東轉運使以王安石吕恵卿當國正人不得立朝歎曰吾有薦舉之權而所列非賢耻也遂舉劉摯李常蘇軾蘇轍劉攽范祖禹等及知揚州㑹軾自湖赴獄親朋皆絶與交道出廣陵侁往見之䑓吏不許通或曰公與軾皆知乆其所往来文字書問宜焚之勿留不然且獲罪侁曰欺君負友吾不忍為以忠義分譴則所願也至是以舉吏累謫主管西京御史䑓軾至黄與田父野老相從溪山間築室於東坡自號東坡居士云庚申三年遼大康六年春正月遼耶律伊遜有罪貶知興中府二月遼主封其故太子濬之子延禧為梁王置兵衛之伊遜又欲害太子濬之子延禧因言宋魏國王科爾斡之子淳可為儲嗣羣臣畏伊遜莫敢出言北院宣徽使蕭托卜嘉伊勒希巴蕭托輝諫曰舎嫡不立是以國與人也遼主猶豫不決㑹獵黒山次于平淀遼主見扈從官屬多隨伊遜後始惡其専遂改伊削遜知南院大王事既而詔惟皇子仍一字王餘並降由是伊遜自魏王改封混同郡王伊遜入謝遼主即日出之於興中府其黨多黜遂封延禧梁王為設旗鼓伊喇六人以衛䕶之生六年矣以章惇參知政事三月吳充罷充欲有所為每為王珪蔡確所沮至是諫官張璪論充與郭逵書止其進兵故安南無功充既遭同列困毁素病瘤積憂畏疾益侵遂罷為西太一宫使踰月薨充為相務安靜心正而力不足知不可為而不能勇退為世所譏𦵏慈聖光獻皇后南丹州蠻来貢以刺史印賜之夏四月進封濮國公宗暉為濮陽郡王瀘夷乞弟寇戎州兵官王宣戰死五月詔韓存寳經制瀘夷六月詔中書詳定官制宋承唐制三師三公不常置宰相不専任三省長官尚書門下並列於外又别置中書于禁中是為政事堂與樞宻對掌大政天下財賦内庭百司中外筦庫悉𨽻三司中書省但掌冊文覆奏考帳門下省主乗輿八寳朝位版位流外考校諸司附奏挟名而已臺省寺監官無定員無専職悉皆出入分莅庶務故三省六曹二十四司類以他官主判雖有正官非别敕不治本司事事之所寄十無二三故中書令侍中尚書令不預朝政侍郎給事中不領省職諫議無言責起居不記注中書嘗闕舍人門下罕除常侍司諫正言非特㫖供職亦不任諫諍至於僕射尚書丞郎員外居其官不知其職十常八九其官人受授之别則有官有職有差遣官以寓禄秩位著職以待文學之選而别為差遣以治内外之事故士人以登臺閣升禁從為顯宦而不以官之遲速為榮滯以差遣要劇為貴途而不以階勲爵邑有無為重輕時人語曰寧登瀛不為卿寧抱槧不為監虚名不足以砥礪天下若此故自真宗仁宗以来議者多以正名為請帝自即位慨然欲更其制乃命館閣校唐六典以摹本賜羣臣遂置詳定官制局于中書命翰林學士張璪樞宻副承㫖張誠一主其事而詔中書門下省主判官歸其事於中書且罷省寺監官領空名者詔秘書監致仕劉几定雅樂于太常時將有事於明堂大臣言几知音詔詣太常定雅樂几言律主於人聲不以尺度求合古今異時聲亦隨變猶以古冠服加於今人安得而稱儒者泥古致詳於形名度數間而不知清濁輕重之用故求於器雖合考於聲則不諧且古樂備四清聲㳂五季亂離而廢請増之帝許焉樂成遂用于明堂然所學雜于鄭衛云秋七月河決澶州河決澶州北外都水監丞陳祐甫言商胡決三十餘年所行河道填淤漸高隄防嵗増未免泛溢今當修者有三商胡一也横壠二也禹舊迹三也然商胡横壠故道地勢高平土性疏惡皆不可復復亦不能持乆惟禹故瀆在大伾太行之間地卑而勢固故祕閣校理李垂與今知深州孫民先皆有修復之議望召民先同河北漕臣自衛州王供埽按視訖于海口從之九月詳定官制所上寄禄格官制成下詔行之凡領空名者一切罷去而易之階因以制禄謂之寄禄於是以開府儀同三司易中書令侍中同平章事特進易左右僕射自是以下至承務郎易祕書省校書郎正字將作監主簿有差檢校僕射以下及階散憲䘖並罷議者又欲罷樞宻院歸兵部帝曰祖宗不以兵柄歸有司故専命官以統之互相維制何可廢也遂止帝嘗謂執政曰官制將行欲新舊人兩用之指御史大夫曰非司馬光不可王珪蔡確相顧失色既退確謂珪曰陛下乆欲收靈武公能任責則相位可保也珪喜謝之因薦俞充帥慶使上平西夏䇿其意以為既用兵深入必不召光雖召將不至已而果不召光焉有事于明堂赦明堂禮成近臣遷秩即用新制於是省臺寺監之官各還所職矣以薛向孫固為樞密副使作神御殿于景靈宫神御殿原廟遺制也帝以奉安先朝御容多寓寺觀乃作十一殿于景靈宫而在京宫觀寺院神御皆迎入于禁中以時王禮祠之以馮京為樞密使吕公著為副使薛向免向養威持重同列質以西北事多黙不對㑹詔民畜馬向既奉命旋知民不便欲改議御史舒亶論其反覆無大臣體斥知潁州冬十月遼北府宰相耶律仁傑有罪貶為武定軍節度使仁傑乆在相位黷貨無厭嘗與客㑹飲昌言曰無百萬兩黄金不足為宰相家至是以附耶律伊遜貶十一月己丑朔日有食之辛酉四年遼大康七年春正月詔步軍都虞侯林廣經制瀘夷韓存寳伏誅以存寳逗遛無功也詔試進士加律義馮京罷京再執政初為王安石不容後見傾於吕恵卿而中立不倚人服其操宋進士自鄉舉至廷試皆第一者才三人王曽宋庠為名宰相京為名執政不愧科名云以孫固知樞密院事吕公著韓縝同知院事時議復肉刑欲取死囚試劓刖之公著曰試之不死則肉刑遂行矣乃止三月章惇免朱服為御史惇宻使客達意服不附之㑹惇父職方郎中俞强占民田服因論之併奏前事惇遂知蔡州以張璪參知政事夏四月河決澶州詔李立之築隄捍之自大名至于瀛州河復大決澶州小吳埽自澶注入御河詔東流已填淤不可復將来更不修閉小吳決口候見大河歸納應合修立隄防令李立之經畫以聞帝謂輔臣曰河之為患乆矣後世以事治水故常有礙夫水之趍下乃其性也以道治水則無違其性可也如能順水所向遷徙城邑以避之復有何患雖神禹復生不過如此輔臣皆曰誠如聖訓已而立之言臣如決口相視河流至乾寧軍分入東西兩塘次入界河於劈地口入海通流無阻宜修立東西隄詔從其議遂自北京南樂館陶宗城魏縣淺口永濟延安鎮瀛州景城鎮分立東西隄五十九埽立之在熈寧初已主立隄今竟行其言大抵熈寧専欲導河東流閉北流元豐以後因河決而北議者始欲復禹故迹帝愛惜民力思順水性而水官難其人王安石任程昉范子淵故二人尤以河事自任帝雖藉其才然毎抑之糜費財用而無成功五月追封晉程嬰為成信侯公孫杵臼為忠智侯立廟絳州報其存趙武也夏人幽其主秉常秋七月詔宦者李憲會陕西河東五路之師討之夏將李清本秦人説秉常以河南地歸宋國母梁氏知之遂誅清奪秉常政而幽之鄜延副總管种諤知慶州俞充皆上䟽言秉常遇弑國内亂宜興師問罪𢷬其巢穴此千載一時也帝然之遂遣宦者王中正往鄜延環慶稱詔募禁兵從者將之復詔宣慶使熈河經制李憲等以秉常見囚大舉征夏而召种諤入對諤至大言曰夏國無人秉常孺子往持其臂以来耳帝壮之以諤為經略安撫副使諸將悉聴節制孫固諫曰舉兵易解禍難不可帝曰夏有釁不取則為遼人所有不可失也固曰必不得已請聲其罪薄伐之分裂其地使其酋長自守帝笑曰此真酈生之説耳時執政有言便當直渡河不可留行固曰然則孰為陛下任此者帝曰朕已屬李憲固曰伐國大事也豈可使宦者為之今陛下任李憲則士大夫孰肯為用乎帝不悦他日固又曰今五路進師而無大帥就使成功兵必為亂帝曰大帥誠難其人吕公著進曰問罪之師當先擇帥既無其人曷若已之固曰公著言是也帝不聴詔大理卿崔台符議選格太祖設官分職多襲五代之制稍損益之凡入仕有貢舉奏䕃攝著流外從軍五等吏部銓惟注擬州縣官幕職兩京諸司六品以下官皆無選文臣少卿監以上中書主之京朝官則審官院主之武臣刺史副率以上内職樞宻院主之使臣則三班院主之其後典選之職分為四文選曰審官東院曰留内銓武選曰審官西院曰三班院帝自即位欲更制度建議之臣以為唐銓與今選殊異雜用其制則有留礙煩紊之弊乃詔内外官司舉官悉罷令大理卿崔台符同尚書吏部審官東西三班院議選格遂定銓注之法悉歸選部以審官東院為尚書左選流内銓為侍郎左選審官西院為尚書右選三班院為侍郎右選於是吏部有四選之法文臣寄禄官自朝議大夫職事官自大理正以下非中書省敕授者歸尚書左選武臣升朝官自皇城使職事官自金吾階衛伏司以下非樞宻院宣授者歸尚書右選自初仕至州縣幕職官歸侍郎左選自借差監當至供奉官軍使歸侍郎右選凢應注擬升移叙復䕃補封贈酬賞隨所分𨽻校勘合格團甲以上尚書省若中散大夫閤門使以上則列遷叙之狀上中書省樞宻院得畫㫖給告身祖宗以来中書有堂選百司郡縣有奏舉雖小大殊科然皆不𨽻于有司王安石言于帝曰中書總庶務今通判亦該堂除選徒留滯不能精擇宜歸諸有司帝曰唐陸贄謂宰相當擇百官之長而百官之長擇百官今之審官茍得其人安有不能擇百官者哉欲罷堂選曽公亮執不可而止至是既罷内外長吏舉官法堂除亦廢九月李憲敗夏人于西市遂復蘭州憲總熈秦七軍敗夏人於西市新城復襲女遮谷破之斬獲甚衆時董氊被詔㑹伐於是遣其首領洛施軍篤喬阿公等將兵三萬從憲進攻遂復蘭州古城蘭州新順首領巴令謁等三族率所部攻夏撒逋宗城大敗夏人种諤大敗夏人于米脂降其城諤率鄜延兵及畿内七將凡九萬三千人出綏徳城以攻米脂圍之三日夏人八萬来救諤撃破之復與戰於無定川諤伏兵斷其首尾大敗之降其將令介訛十月米脂砦降劉昌祚敗夏人于磨哆隘昌祚帥蕃漢兵出慶州至磨哆隘遇夏人與夏統軍梁大王戰敗之冬十月髙遵裕復通逺軍環慶行營經略使高遵裕將歩騎八萬七千出慶州戰敗夏人復通逺軍曲珍敗夏人于安定堡种諤遣曲珍率兵通黑水安定堡與夏人遇大敗之王中正入于宥州中正帥涇原兵出麟州度無定河循水北行地皆沙濕士馬多䧟沒糗糧不能繼遂入宥州十一月癸未朔日有食之髙遵裕之師潰于靈州遵裕㑹師攻靈州夏人決黄河七級渠以灌營復鈔絶餉道士卒凍溺遂潰而還餘軍才萬三千而已夏人躡之復敗焉种諤之師潰于索家平諤留千人守米脂而自帥大衆進攻銀石夏州遂入貢州敗夏人于黑水降横河平人户破石堡城斬獲甚衆進至夏州駐軍索家平㑹大校劉歸仁以衆潰而軍食又乏復值大雪乃引師還死者不可勝計入塞者僅三萬人王中正至柰王井而還中正至柰王井糧盡士卒死者二萬人乃引還十二月詔李憲帥師趨靈州不至而還時詔憲帥師直趨興靈憲總師東上使知熈州苗授出古渭取定西蕩禹臧花麻諸族降户二萬大敗夏人遂踰天都山下焚夏之南牟内殿并其館庫追襲其統軍仁多㖫丁敗之於葫蘆河凡師行百日轉鬬千里時五路之師㑹攻靈州獨憲不至靈而還劉昌祚帥師還涇原林廣敗乞弟于納江以吳居厚為京東都轉運使居厚初為武安節度推官奉行新法盡力核閒田以均給梅山傜計勞得補司農官屬轉提舉河北常平損増役法五十一條遂擢京東轉運副使時天子方興鹽鐡居厚精心計籠絡鈎稽收羨息錢數百萬即莱蕪利國二冶官自鑄錢以能擢都轉運使前使者皆以不任職蒙譴居厚至與河北蹇周輔李南公㑹境上議鹽法搜剔無遺居厚起州縣凡流無閥閲勲庸徒以言利得幸由是嗜進之士從風而靡當時商功利之臣所在成聚居厚最為掊克劇盗王中因民不忍聚衆數千欲乘其行部至徐簒取投諸冶以快其志居厚聞之遁還貶宣徽南院使陳玼知鄆州玼言西師不宜以宦者為主帥帝以為沮格故貶壬戍五年遼大康八年春正月貶髙遵裕為郢州團練副使討其敗師也初夏人聞朝廷大舉國母問䇿於廷諸將少者盡請戰有一老將獨曰不須拒之但堅壁清野縱其深入聚勁兵于靈夏而遣輕騎鈔絶其粮餽大兵無食可不戰而困也國母從之師卒無功而還帝曰朕始以孫固言為迂今悔無及矣環慶掌書記張舜民賦詩有白骨似沙沙似雪之句坐謫監邕州鹽米倉以李憲為涇原熈河蘭會安撫制置使李浩副之憲欲以開蘭㑹功贖後期之罪孫固曰兵法後期者斬况諸路皆至而憲獨不行不可赦也帝以憲有功但詰其擅還之由而已至是詔再議伐夏故有是命以曽鞏為中書舍人鞏文章本原六經斟酌司馬遷韓愈為歐陽修所重帝深知其才命充史館修撰専典史事至是以官制將行命為中書舍人時自三省百職事選授一新除書日至十數人人舉其職於訓辭典約而盡未幾卒二月封西蕃董氊為武威郡王以其遣師㑹伐夏也三月曲珍敗夏人于金湯夏四月壬子朔日當食不見帝以四月日當食避殿减膳至日不見乃御殿復膳御史中丞舒亶有罪免亶舉劾多私氣熖熏灼見者側目至是坐詐為録目奪兩秩勒停逺近稱快初行官制以王珪為尚書左僕射兼門下侍郎蔡確為尚書右僕射兼中書侍郎章惇為門下侍郎張璪為中書侍郎蒲宗孟為尚書左丞王安禮為尚書右丞官制成改同中書門下平章事為左右僕射參知政事為門下中書侍郎確既相屢興羅織之獄縉紳士大夫重足而立富弼在洛上言確小人不宜大用帝不從時王珪雖為首相拱手而已然二人本以次叙用不加禮遇屢因微失罰金毎罰二人輙門謝罰金門謝前此未有人皆耻之帝嘗語輔臣有無人才之歎宗孟率爾對曰人才半為司馬光邪説所壊帝不語直視乆之曰蒲宗孟乃不取司馬光耶未論别事只辭樞宻一節朕自即位以来唯見此一人他人則雖迫之使去亦不肯矣宗孟慚懼無以為容時李憲乞再舉伐夏帝以訪輔臣王珪對曰向所患者用不足朝廷今捐錢鈔五百萬緡以供軍食有餘矣安禮曰鈔不可噉必變而為錢錢又變為芻粟今距出征之期才兩月安能集事帝曰李憲以為已有備彼宦者能如是卿等獨無意乎唐平淮蔡唯裴度謀議與主同今乃不出公卿而出於閹寺朕甚耻之安禮曰淮西三州耳有裴度之謀李光顔李愬之將然猶引天下之兵力歴嵗而後定今夏氏之强非淮蔡比憲才非度匹諸將非有光顔愬輩臣懼無以副聖意也吕公著罷五月壬午朔日有食之作尚書省知延州沈括請城永樂詔給事中徐禧往議之种諤西討不能如志沈括欲盡城横山瞰平夏城永樂於是諤遣其子朴上據横山之策于朝帝以為然遣徐禧及内侍押班李舜舉使鄜延議之環慶遣師敗夏人于境上六月曲珍敗夏人于明堂川秋七月以蔡京為起居郎八月詔嵗以四孟月朝獻景靈宫詔自今朝獻景靈宫孟春用十一日孟夏擇日孟秋用中元日孟冬用下元日天子常服行事薦聖祖殿以素饌神御殿以膳羞器服儀物悉從今制累朝文臣執政官武臣節度使以上並圖形於兩廡凡執政官除拜赴宫恭謝其後南郊先詣宫行薦享禮並如太廟徐禧帥師城永樂使曲珍守之而還种諤言横山延袤千里多馬宜稼人物勁悍善戰且有鹽鐡之利夏人恃以為生其城壘皆控險足以守禦今之興功當自銀州始其次遷宥州又其次修夏州三郡鼎峙則横山之地已囊括其中又其次修鹽州則横山强兵戰馬山澤之利盡歸中國其勢居高俯視興靈可以直覆巢穴徐禧上言銀州雖據明堂川無定河之㑹而故城東南已為河水所吞其西北又阻天塹實不如永樂之形勢險阨請先城永樂竊惟銀夏宥三州䧟没百年一日興復實為俊偉但建州之始煩費不貲若選擇要㑹建置堡砦名雖非州實有其地舊来疆塞乃在腹心已與沈括議築砦各六諤言若城永樂則西夏必力爭不可帝從禧議詔禧護諸將往城永樂命括移府並塞總兵為援陕西轉運判官李稷主饋餉禧以諤䟦扈奏留諤守延而自率諸將往築之十四日而成距故銀州治二十五里賜名銀川砦禧括及李舜舉等還米脂以兵萬人屬曲珍守永樂九月夏人寇永樂徐禧帥師救之敗死詔沈括隨州安置永樂接宥州附横山夏人必爭之地徐禧等既去九日夏人以數千騎趍新城曲珍使報禧禧欲往援之或止禧曰初被詔相城禦㓂非職也禧不從遂與李舜舉李稷俱往獨沈括留守米脂時夏人三十萬已屯涇原北邉人来告者十數禧等皆不之信曰彼若大来是吾立功取富貴之日也大將高永亨曰城小人寡又無水泉不可守也禧以為沮衆械送延州獄禧抵永樂夏人傾國而至大將高永能請及其未陳擊之禧曰爾何知王師不皷不成列執刀自率士卒拒戰夏人益衆分陳迭攻進薄城下曲珍兵陳於水際官軍不利將士皆有懼色珍白禧曰今衆心已摇不可戰戰必敗請収兵入城禧曰君為大將奈何遇敵不戰先自退邪乃以七萬人陳于城下坐譙門執黄旗令衆曰視吾旗進止夏人縱鐡騎渡河珍曰此鐡鷂子軍也當其半濟擊之乃可以逞得地則其鋒不可當也禧不從鐡騎既濟震盪衝突大衆繼之珍鋭卒接戰而敗奔還蹂後陣夏人乘之珍衆大潰死及棄甲南奔者幾半將校冦偉李思古高世才夏儼程慱古等皆死之珍收餘衆入城崖峻徑窄騎卒縁崖而上喪馬八千匹夏人圍城者厚數里且據其水砦珍士卒晝夜血戰城中乏水已數日掘井不及泉渴死者十六七沈括李憲援兵及餽餉皆為夏人所隔不得前种諤怨禧不遣救師城中大急既而夏人螘附登城珍度不可敵白禧請突圍而南高永能亦勸李稷盡捐金帛募死士力戰以出皆不聴㑹夜半大雨夏人環城急攻城遂䧟禧舜舉稷永能皆為亂兵所害惟珍與王湛李浦吕整祼跣走免將校死者數百人喪士卒役夫二十餘萬夏人耀兵米脂城下而還自熈寧以来用兵得夏葭蘆吳保義合米脂浮圖塞門六堡而靈州永樂之役官軍熟羌義保死者六十萬人錢榖銀絹以萬數者不可勝計事聞帝臨朝痛悼為之不食贈禧等官而貶沈括為均州團練副使隨州安置降授曲珍為皇城使自靈武之敗秦晉困棘天下企望息兵而括諤進攻取之䇿禧素以邉事自任狂謀輕敵遂致覆敗自是帝始知邉臣不可倚信深自悔咎無意於西伐而夏人亦困弊矣初帝之遣禧也王安禮諫曰禧志大才踈必誤國事帝不聴及敗帝曰安禮每勸朕勿用兵少置獄盖為是也冬十二月新樂成劉几所定也遼主廢其后蕭氏為恵妃徙之乾陵癸亥六年遼大康九年春正月追封楚三閭大夫屈平為忠潔侯二月夏人寇蘭州王文郁敗之貶李憲為熈河都總管夏人數十萬攻蘭州鈴轄王文郁副總管李浩率死士七百餘人撃走之中丞劉摯言熈河經略使李憲貪功生事一出欺罔避興靈㑹師之期頓兵以城蘭州遺患至今詔貶憲為右千衛將軍熈河安撫經略都總管三月薛義敗夏人于葭蘆西嶺郭忠紹敗夏人于乜離抑部髙永翼敗夏人于真卿流部夏四月李浩敗夏人于巴義溪遼大雪平地丈餘馬死者十六七五月夏人寇蘭州夏人寇麟州知州訾虎敗之閏月夏主秉常上表乞復修貢詔許之夏人亦弊於兵而南都統昴星嵬名濟移書于涇原劉昌祚乞通好如初昌祚以聞帝諭昌祚荅之及入冦屢敗國用益竭乃遣謨箇咩迷乞遇来貢上表曰臣自歴世以来貢奉朝廷無所虧怠至於近嵗尤甚歡和不意憸人誣間朝廷特起大兵侵奪疆土城砦因兹構怨嵗致交兵今乞朝廷示以大義特還所侵倘垂開納别効忠勤帝賜詔曰比以權强敢行廢辱朕用震驚令邉臣往問匿而不報王師徂征盖討有罪今遣使造庭辭禮恭順仍聞國政悉復故常益用嘉納已戒邉吏毋輙出兵爾亦其守先盟復詔陕西河東經略司其新復城砦徼循毋出二三里夏之嵗賜悉如其舊秋七月孫固罷以韓縝知樞密院事安燾同知院事八月蒲宗孟免御史論其荒于酒色及繕治府舍過制故也以王安禮李清臣為尚書左右丞髙麗王徽卒子勲嗣徽居位三十八年治尚仁恕為東夷良主及卒謚曰文遼以其子三韓國公勲權知國事九月癸卯朔日有食之夏人乞還侵疆不許冬十月追封孟軻為鄒國公先是判國子監常秩請立孟軻揚雄像于廟庭仍賜爵號又請追尊孔子為帝下兩制禮官詳議以為非是而止至是知鄆州曽孝寛復請加封孟子乃詔封為鄒國公遼耶律伊遜伏誅伊遜在興中坐以禁物鬻入外國減死幽于萊州其黨耶律仁傑削爵為民至是伊遜復謀奔宋及私蔵兵甲事覺伏誅十一月太尉判河南府潞國公文彦博以太師致仕彦愽自河南入朝帝嘉其輔立英宗而不伐其功加兩鎮節度使將行賜宴瓊林苑兩遣中使遺詩祖道當世榮之至是請老以太師致仕居于洛陽以陸師閔都大提舉成都永興路茶場李稷既死以師閔代其任𣙜利尤刻税息倍於稷詔茶塲都大提舉視轉運使以重其任十二月髙麗王勲卒諡曰順户部獻今嵗民數時天下凡二十三路曰京東東西曰京西南北曰河北東西曰永興曰秦鳯曰河東曰淮南東西曰兩浙東西曰江南東西曰荆湖南北曰成都梓利䕫州曰福建曰廣南東西東南際海西盡巴僰北極三關東西六千四百八十五里南北萬一千六百二十里天下主客户一千七百二十萬一千七百一十三甲子七年遼大康十年春正月復封太祖後世準為安定郡王世凖燕懿王徳昭四世孫也自從式卒安定之封乆絶至是復封以奉太祖後夏人寇蘭州李憲敗之二月進封濮陽郡王宗暉為嗣濮王夏四月夏人寇延州吕真敗之五月詔以孟軻配食孔子追封荀况揚雄韓愈為伯從祀廟庭况為蘭陵伯雄為成都伯愈為昌黎伯六月夏人寇徳順軍秋七月王安禮罷九月夏人寇定西城秦貴敗之冬十月夏人寇熈河詔定交阯界以六縣二峒還之夏人寇靜邉砦彭孫敗之十一月夏人寇清邉砦夏國主秉常遣使入貢十二月端明殿學士司馬光上資治通鑑初光約戰國至秦二世如左氏體為通志八卷以進英宗悦之命續其事就崇文殿開局許自選官屬得借龍圖天章閣三館秘閣書籍給御府筆墨繒帛及御前錢以供果餌以内臣為承受光遂與劉攽劉恕范祖禹及子康編集及帝即位賜名資治通鑑製序文賜之㑹光出知永興軍以衰疾乞間乃差判西京留司御史䑓及提舉崇福宫前後六任聴以書局自隨給之禄秩光於是編閲舊史旁采小說抉摘幽隠校計亳釐上起周威烈王二十三年下終五代凡一千三百六十二年修成二百九十四卷又略舉事目年經國緯以備檢尋為目録三十卷又參考羣書評其同異俾歸一塗為考異三十卷合三百五十四卷歴十九年而成至是上之詔以光為資政殿學士降詔奬諭乙丑八年遼大安元年春正月帝有疾三月詔立延安郡王傭為皇太子賜名煦皇太后權同處分軍國事赦帝疾甚羣臣請立皇太子及請皇太后高氏權同聴政許之二月甲午朔立帝第六子延安郡王傭為皇冭子賜名煦與皇太后同處分軍國事先是岐王顥嘉王頵日問起居太后既垂簾命二王母輙入且隂敕中人梁惟簡妻製十嵗児一黄袍懐以来盖宻為踐阼倉卒備也初太子之未立也職方員外郎邢恕與蔡確成謀宻語太后之姪高公繪公紀曰上疾不可諱延安幼沖宜早有定論岐嘉皆賢王也公繪驚曰此何言君欲禍吾家耶恕知計不行反宣言太后屬意雍王而與王珪表裏導確約珪入問疾陽鉤致珪語使知開封府蔡京伏劔士於外須珪小持異則執而誅之既而珪言上自有子定議立延安恕益無所施及太子已立猶與確自謂有定䇿功傳播其語於朝帝崩于福寧殿皇太子即位大赦帝崩年三十八太子即位生十年矣神宗孝友謙抑厲精圖治將大有為而惑於王安石之偏見曲學騷動天下致祖宗之良法美意變壊幾盡卒成禍亂惜哉尊白王太后曰太皇太后皇后曰皇太后徳妃朱氏曰皇太妃德妃帝生母也太皇太后臨朝同聽政太后既聴政下詔曰先帝臨御十有九年建立政事以澤天下而有司奉行失當幾於煩擾或茍且文具不能布宣實恵其申諭中外協心奉令以稱先帝惠安元元之意於是散遣修京城役夫減皇城覘卒止禁庭工技廢導洛司出近侍尤無狀者戒中外無苛斂寛民間保户馬事由中㫖王珪等弗預知也蔡確思求媚於太后以自固太后從父高遵裕坐西征失律扺罪因上言乞復遵裕官后曰遵裕靈武之役塗炭百萬先帝中夜得報起環榻而行徹旦不能寐自是驚悸馴致大故禍由遵裕得免刑誅幸矣先帝肉未冷吾何敢顧私恩而違天下公議乎確悚慄而退詔以顔囘孟軻配享孔子蠲逋賦司馬光自洛入臨夏五月詔百官言政闕失光居洛十五年天下以為真宰相田夫野老皆號為司馬相公婦人女子亦知其為君實也神宗崩光赴闕入臨衛士望見皆以手加額曰此司馬相公也所至民遮道聚觀馬至不得行曰公無歸洛留相天子活百姓光懼亟還太后遣内侍梁惟簡勞光問為政所當先光請開言路詔榜朝堂而大臣有不恱者設六語云若隂有所懐犯非其分或扇摇機事之重或迎合已行之令上以徼倖希進下以眩惑流俗若此者罰無赦后復命示光光曰此非求諫乃拒諫也人臣惟不言言則入六事矣乃具論其情改詔行之於是上封事者千數王珪卒珪以文學見推流輩然自執政至宰相凡十六年無所建明率道諛將順當時目為三㫖相公以其上殿進呈云取聖㫖上可否訖云領聖㫖退諭稟事者云已得聖㫖也以蔡確韓縝為尚書左右僕射章惇知樞密院事以司馬光為門下侍郎詔起光知陳州過闕留為門下侍郎既而蘇軾自登州召還緣道人相聚號呼曰寄謝司馬相公毋去朝廷厚自愛以活我是時天下之民引領拭目以觀新政而議者猶謂三年無改於父之道光曰先帝之法其善者雖百世不可變也若王安石吕恵卿所建為天下害者當如救焚拯溺况太皇太后以母改子非子改父也於是衆議少止以蘇軾知登州六月賜楚州孝子徐積帛米積事親孝旦夕必冠帶定省從胡瑗學所居一室寒一裘啜粟飲水雖瑗遺以食亦不受也以父名石至終身不用石器行遇石則避而不踐或問之積曰吾遇之則怵然傷吾心思吾親故不忍加足其上耳中年屏處窮里而四方事無不知嘗借人書經夕還之借者紿言書中有金葉積賣衣償之不與辯後以近臣薦授楚州教授每升堂訓諸生曰諸生欲為君子而使勞已之力費已之財如此而不為君子猶可也不勞已之力不費已之財諸君何不為君子鄉人賤之父母惡之如此而不為君子猶可也鄉人榮之父母欲之諸君何不為君子又曰言其所善行其所善思其所善如此而不為君子未之有也言其不善行其不善思其不善如此而不為小人未之有也聞者敬服及卒賜諡節孝先生詔中外臣庶直言朝政闕失民間疾苦秋七月以吕公著為尚書左丞公著知揚州被召侍讀太后遣使迎問所欲言公著曰先帝本意以寛省民力為先而建議者以變法侵民為務與已異者一切斥去故日乆而弊愈深法行而民愈因誠得中正之士講求天下之利病協力而為之宜不難矣因上十事曰畏天愛民修身講學任賢納諫薄斂省刑去奢無逸既至拜為左丞公著既居政府與司馬光同心輔政推本先帝之志凡欲革而未暇與革而未定者一一舉行之民讙呼鼓舞稱便矣罷保甲團教法保甲法行於京畿及河北河東陕西三路凡置㑹校都保三千二百六十六正長壯丁六十九萬一千九百四十五人嵗省舊募兵錢百六十六萬一千四百八十三緡而民間應調不勝其苦先是司馬光言于太后曰兵出民間雖云古法然古者八百家纔出甲士三人歩卒七十二人聞民甚多三時務農一時講武不妨稼穡自兩司馬以上皆選賢士大夫為之無侵漁之患故卒乘輯睦動則有功今籍鄉村之民二丁取一以為保甲授以弓弩教之戰陳是農民半為兵也三四年来又令三路置都教場無問四時每五日一教特置使者比監司専切提舉州縣不得闗預每一丁教閱一丁供送雖云五日而保正長以泥堋除草為名聚之教埸得賂則縱否則留之是三路耕耘収穫稼穡之事幾盡廢也至是復力言其公私勞擾有害無益遂詔罷之罷沅州増修堡砦召程顥為宗正寺丞未至卒顥既罷御史出知扶溝縣㑹内侍王中正案閲保甲權熖章震諸邑競侈供張説之主吏来請顥曰吾邑貧安能效他邑取於民法所禁也獨有令故青帳可用爾及改判武學中丞李定劾其新法之初首為異論罷歸故官又坐獄逸囚責監汝州鹽稅顥嘗曰新法之行乃吾黨激成之當時自愧不能以誠感上心遂致今日之禍豈可獨罪王安石也至是召為宗正丞未行而卒年五十四顥資性過人充養有道和粹之氣盎於面背門人交友從之嵗乆未嘗見其忿厲之容遇事優為雖當倉卒不動聲色自十五六時與弟頥聞汝南周敦頥論學遂厭科舉之習慨然有求道之志泛溢于諸家出入于老釋者幾十年返求諸六經而後得之秦漢以来未有臻斯理者教人自致知至於知止誠意至于平天下洒掃應對至於窮理盡性循循有序病學者厭卑近而騖高逺卒無成焉故其言曰道之不明異端害之也昔之害近而易知今之害深而難辨昔之惑人也乘其迷暗今之惑人也因其高明自謂之窮神知化而不足以開物成務言為無不周遍實則外于倫理窮深極微而不可以入堯舜之道天下之學非淺陋固滯則必入於此自道之不明也邪誕妖妄之説競起塗生民之耳目溺天下於汙濁雖高才明智膠於見聞醉生夣死不自覺也是皆正路之榛蕪聖門之蔽塞闢之而後可以入道及卒士大夫識與不識莫不哀傷焉文彦博采衆論題其墓曰明道先生弟頥序之曰周公没聖人之道不行孟軻死聖人之學不傳道不行百世無善治學不傳千載無真儒無善治士猶得以明夫善治之道以淑諸人而傳諸後無真儒則天下貿貿焉莫知所之人欲肆而天理滅矣先生生乎千四百年之後得不傳之道於遺經以興起斯文為己任辨異端闢邪説使聖人之道煥然復明於世盖自孟子之後一人而已然學者於道不知所向則孰知斯人之為功不知所至則孰知斯名之稱情也哉冬十月詔置諫官詔倣唐六典置諫官令侍從各舉諫官二人復詔監察御史兼言事殿中侍御史兼察事從侍御史劉摯之言也罷義倉詔寛民力有司或致廢格者監司御史紏劾之河決大名時河流雖北而孫村低下夏秋霖雨漲水往往東出小吳之決既未塞至是又決大名之小張口河北州郡皆被其灾知澶州王令圖建議浚迎陽埽舊河又於孫村金隄置約復故東流之道于是囘河東流之議起矣𦵏永裕陵罷方田法十二月召執政侍臣講讀于經筵時開經筵講魯論讀三朝寳訓等書遼立王運為髙麗國王運勲子也罷市易法吕嘉問有罪貶知淮陽軍言者交論市易之患被於天下本錢無慮千二百萬緡率二分其息十有五年之間子本當數倍今乃僅足本錢盖買物入官未轉售而先計息至於物貨苦惡上下相蒙虧折日多空有虚名而已監察御史韓川論市易以為雖曰平均物直而其實不免貨交取利就使有獲不如所亡果何事也願趣罷其法於是詔罷市易而削前提舉市易光禄卿吕嘉問三秩貶知淮陽其黨皆降黜罷保甲養馬法邢恕有罪貶知隨州恕博貫經籍能文章從程頥學司馬光吕公著王安石吳充皆重之然天資詭詐冒進與蔡確謀立岐王顥為儲副事既不成㑹王珪卒恕遂與確及章惇因宣言太皇太后及吳充有異議賴確擁護而止以自為功至是復為高公繪草奏乞尊崇帝生母朱太妃為高氏異日計太后怒恕自起居舍人黜知隨州高麗來貢通鑑續編卷九
