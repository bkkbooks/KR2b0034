body:
  text: 御製書通鑑續編宋主答徐鉉事藝祖志一統命師伐江南卑辭徐鉉来稱如事父嚴父子而兩家不可何待占緩師復遣求論辯徒詹詹榻側難容睡按劔叱何慙嫚罵如沛公創業多直談更能用曺彬禁暴恢海􅉼一時王業定太平引養恬時泰作廣義吹求致苛纎謂徐鉉辱君䛕頌失太謙更為設若詞包茅問貢拈濶論名有無詭辯逞呫諵有如愛二毛宋師無救殱辭費申臆見史義何曽探昌黎有定評責人詳已亷
