body:
  text: 通鑑續編卷六元陳桱撰癸亥仁宗皇帝天聖元年契丹太平三年春三月行崇天厯司天役人張奎運所造也罷𣙜茶行貼射法初𣙜茶之法擇要害之地置𣙜貨務㑹給交鈔往還而不積茶貨其淮南蘄黄廬舒光夀六州官自為場置吏謂之山場凡十三所六州采茶之民皆𨽻焉謂之園户嵗課作茶輸租餘則官府市之其售于官者皆先受錢而後入茶謂之本錢又民嵗輸税願折茶者謂之折税茶其出粥皆就本場而官所收茶則送六𣙜貨務粥之茶出境則給劵商賈貿易入錢帛京師𣙜貨務以射六務十三場茶給劵隨所射與之其利既溥商賈爭轉致于西北天禧末乃禁茶出境凡民茶折税外匿不送官及私販粥者没入之計直論罪園户由是輒毁敗茶樹是嵗命李諮等較鹽茶礬税歳入登耗更定其法遂置計置司以張士遜吕夷簡魯宗道總之請行貼射法于淮南其法以十三場茶買賣本息併計其數罷官給本錢使商人與園户自相交易一切定為中估而官收其息且如粥舒州羅源場茶斤售錢五十有六其本錢二十有五官不復給但使商人輸息錢三十有一而已然必輦茶入官隨商人所指予之給劵為驗以防私售其歳課貼射不盡則官市之如舊園户過期而輸不足者計所負數如商人入息其入錢以射六𣙜貨務茶者如舊制豪商大賈不能有所輕重反爭言其不便矣夏五月行陕西河北入中芻糧見錢法初雍熈中用兵西北艱於饋餉乃令商人入芻糧塞下酌地之逺近而為其直取市價而厚増之授以要劵謂之交引至京師給以緍錢又移文江淮荆湖給以茶及顆末鹽官私便之至道初楊允恭為江淮兩浙制置茶鹽使始禁淮南十二州軍鹽官自粥之商人先入金帛京師及揚州折博務者悉償以茶自是粥鹽得實錢而茶無滯積然商人急於得鹽而鹽不可復得其輸邊粟者持交引詣京師坐賈置鋪𨽻名𣙜貨務之家轉粥茶貨而去及西北通好罷兵邊儲稍緩物價漸減而交引虚錢未改既以茶代鹽而買茶所入不補其給交引停積故商旅所得茶指期于數年之外京師收引者價愈賤商人病之景徳中鹽鐵副使林特崇儀副使李溥上茶法二十三䇿令商人有舊引千貫者令嵗入新引二百候五嵗則新舊皆給足諸𣙜貨務所受茶皆均第配給場務以交引至先後為次大商刺知精好之處日夜走僮使齎劵詣官率多先焉初禁淮南鹽小商已困至是益不能行既而商利寖薄陕西交引益賤入中者日少邊備不給茶法亦壊是歳改行貼射法令商人入芻粟塞下者隨所在實估度地里逺近量増其直給劵至京一切以緡錢償之謂之見錢法虚估之弊稍革秋九月馮拯罷拯氣貌嚴重而乏風節議論多迎合上意然自奉侈靡外示儉陋人不能知也至是以疾罷以王欽若平章事冬十一月置益州交子務初唐憲宗令商賈至京師委錢諸道富家以輕裝趍四方合劵乃取號曰飛錢太祖因其制許民入錢京師於諸州便換大中祥符四年張詠知益州患蜀人鐵錢重不便貿易設質劑之法一交一緡以三年為一界而換之六十五年為二十二界謂之交子使富民十六户主之後富民稍衰不能償所負爭訟不息轉運使薛由張若谷請置交子務以𣙜其出入禁私造者帝從其議立務于益州界以百二十五萬六千為額作奉真殿于景靈宫奉安真宗御容也甲子二年契丹太平四年春二月契丹改鴨子河為混同江秋八月帝臨國子監謁孔子冬十一月立郭氏為皇后后平盧節度使崇之孫女也時張美人有寵帝欲立之太后不可而止故后雖立而頗見疎乙丑三年契丹太平五年秋九月契丹主如燕契丹雖立五京而往来無恒月至是次南京宴于内果園燕人聚觀爭以土物来獻契丹主禮髙年恵鰥寡賜酺至夕六街燈火如晝士庶嬉遊焉求進士得七十二人命賦詩第其工拙以張昱等十四人為太子校書郎韓欒等五十八人為崇文館校書郎冬十月以晏殊為樞密副使十一月復𣙜茶罷貼射法商賈以貼射利薄而論者謂邊糴償見錢恐京師府蔵不足以繼爭言不便㑹江淮計置司言茶有滯積壊敗者請一切焚棄朝廷疑變法之弊下書責計置司而遣官行視茶積李諮具言新法之便庫有増緡邊饒儲積二府亦言滯積之茶乃累年壊敗者新法之利功緒已見盖積年侵蠧之源一朝閉塞商賈利於復故欲以動摇而論者不察其實助為㳺説願力行之毋為流言所易詔翰林侍講學士孫奭等同究利害奭等言貼射之法善者歸商粗惡入官故人莫肯售且園户貧弱力不能給故嵗輸不足今使入息煩擾益甚不可不革遂罷貼射法官復給本錢市茶商人入錢以售之茶法復壊王欽若卒帝謂輔臣曰欽若久在政府觀其所為真姦邪也王曽對曰欽若與丁謂林特陳彭年劉承珪同惡時稱五鬼姦邪險偽誠如聖諭十二月以張知白平章事張耆為樞密使耆即張旻也太后微時嘗寓旻家旻事之甚謹后深徳之故長樞府丙寅四年契丹太平六年春三月契丹凖布叛契丹西北恒為党項凖布諸部侵擾至是益甚夏六月京師大水大雨震雷平地水數尺壊京城民舍溺死者數百人時宰執方晨朝未入有㫖放朝王曽附中使奏曰天變甚異乃臣等燮理無狀豈可退安私室亟請入見陳所以備禦之道同列有先歸者皆媿服焉秋九月以周後柴元亨為三班奉職元亨世宗從孫也冬十月甲戌朔日有食之丁夘五年契丹太平七年春正月壬寅朔帝率羣臣上皇太后夀于㑹慶殿遂御天安殿受朝先是帝白太后欲元日先上太后夀乃受朝太后不可王曽奏曰陛下以孝奉母儀太后以謙全國體請如太后令帝不從晏殊免殊從太后幸玉清昭應宫從者持笏後至殊怒以笏撞之折齒為御史所論出之宣州尋改應天自五代以来天下學校廢壊殊始興建為諸州倡且延范仲淹以教生徒仲淹敦尚風節每論朝廷利害感激思奮殊深器之薦為秘閣校理以夏竦為樞密副使竦明敏博學文章典雅材術過人但急於進取喜交結任數傾側由是世以姦邪目之龍圖閣學士孫奭上無逸圖奭侍講久每至前世亂君亡國必反覆規諷因畫書無逸為圖以進帝命施于講讀閣下戊辰六年契丹太平八年春二月張知白卒知白為相慎名器每以盛滿為戒雖貴顯清約如寒士然體素羸憂畏日侵在中書忽感風眩輿歸第帝臨問疾已不能言三月丙申朔日有食之以張士遜平章事姜遵范雍為樞密副使夏五月楚王元佐卒趙徳明使其子元昊襲甘州取之元昊小字嵬理性雄毅多大畧善繪畫能創製物始圓面髙準曉浮圖學通蕃漢文字案上置法律常攜野戰歌太乙金鑑訣徳明雖臣事中國及契丹然於本國則稱帝由是立元昊為皇太子焉己巳七年契丹太平九年春正月曹利用罷時太后臨朝中人與貴戚稍能軒輊為禍福而利用以勲舊自處不恤也凡内降恩力持不予左右怨之太后亦嚴憚利用稱曰侍中而不名利用奏事簾前或以指爪擊帶鞓左右指示太后曰利用在先帝時何敢爾耶太后頷之㑹利用從子汭為兵馬監押於趙州被酒衣黄衣令人呼萬嵗事聞汭杖死内侍羅崇勲江徳明請併罪利用后問諸執政衆顧望未有對者張士遜徐曰此獨不肖子為之利用大臣宜不知狀后大怒王曽復為力解后曰卿嘗言利用強横今何解也曽曰利用素恃恩故常以理折之今加以大惡則非臣所知也后意少釋乃罷為衛將軍二月魯宗道卒時有小臣方仲弓上書請太后依武后故事立劉氏七廟后問諸輔臣衆不敢對宗道獨進曰若立劉氏七廟如嗣君何乃止后嘗與帝同幸慈孝寺欲乗大安輦先帝而行宗道曰夫死從子婦人之道也后遽命輦後乗輿時執政多任子於館閣讀書宗道曰館閤育天下英才豈紈袴子弟得以恩澤處耶曹利用恃權驕横宗道屢於帝前折之輔政七年剛正嫉惡遇事敢言貴戚用事者皆憚之目為魚頭㕘政因其姓且言骨鯁也張士遜罷士遜在政府無所可否時人以和鼓目之至是以救曹利用罷以吕夷簡平章事夏竦參知政事陳堯佐為樞密副使以薛奎參知政事初奎知開封府時真宗數宴大臣至有沾醉者奎諫曰陛下宜勵精萬㡬而簡宴幸今天下誠無事然宴樂無度大臣數被酒失儀非所以重朝廷也帝深納之及拜參政入謝帝曰先帝嘗以卿可大任今用卿先帝意也他日帝諭輔臣曰臣事君鮮有克終者奎對曰保終之道匪獨臣不然也因歴數唐開元天寳時事以聞安置衛將軍曹利用于房州行至襄陽自殺内侍等必欲報利用以快志故貶内侍楊懐敏送之至襄陽驛懐敏以語侵之利用遂投繯而死利用性悍梗少通力裁僥倖而其親舊或有因緣以進者故及於禍然居位忠藎有守終始一致死非其罪聞者寃之復賢良方正等科詔復賢良方正等六科増置書判拔萃科以待選人之應書者髙蹈丘園科沈淪草澤科茂材異等科以待布衣之被舉者其法先以藝業上之有司有司較之然後試秘閣中格進帝而親䇿焉夏四月南平王李公藴卒以其子徳政為交阯郡王追封公藴南越王六月大雨震電玉清昭應宫災丁未夜中宫内火起大雨震電至曉宫屋盡燬詔繫守衛者于御史獄太后泣對大臣曰先帝尊天奉道故竭力成此宫今一夕延燎㡬盡惟長生崇夀二小殿存爾何以稱遺㫖哉范雍抗言曰不若悉燔之也先朝以此竭天下之力遽為灰燼非出人意如因其所存又將葺之則民不堪命矣非所以祗天戒也中丞王曙亦言玉清昭應宫之建非應經義災變之来若有警者願除其地罷諸禱祠以應天變右司諫范諷復言此實天變不當置獄窮治太后與帝感悟遂減守衛者罪而下詔不復繕脩以二殿為萬夀觀王曽罷初太后受冊將御大安殿曽執不可及長寧節上夀又止供帳便殿太后已不悦曽復以太后左右姻家稍通請謁多裁抑之太后滋不能堪會玉凊昭應宫災曽以首相免秋七月罷諸宫觀使八月丁亥朔日有食之以陳堯佐王曙參知政事夏竦為樞密副使契丹大延琳據遼陽以叛冬十月契丹蕭孝穆帥師討之自神冊以来遼柬無𣙜酤鹽麯之法馮延休韓紹勲相繼為户部使始以燕法繩之民不堪命會燕荐饑户部副使王嘉獻計造船使其民諳海事者漕粟以賑之水路艱險多至覆没鞭朴榜掠民怨思亂東京錫里軍詳衮大延琳因之為變遂囚留守蕭孝先及其妻南陽公主殺韓紹勲王嘉等以快衆情僭號興遼改元天慶副留守王道平踰城走謁契丹主於黒嶺告變契丹主徴諸道兵命南京留守燕王蕭孝穆為都統以討之延琳嬰城固守十一月癸亥日南至帝朝皇太后于㑹寧殿遂同御大安殿以受朝十一月癸亥冬至帝率百官上太后夀于會寧殿遂同御大安殿以受朝帝之將朝會寧也祕閣校理范仲淹上疏切諫曰奉親于内自有家人禮顧與百官同列北面而朝之可乎非所以垂法後世也帝不納既又上疏請太后還政亦不報遂乞補外出為河中府通判以周後柴詠為三班奉職復授柴氏子姓十一人官及賜錢帛因命自今三年郊祀録周世宗後一人著為令庚午八年契丹太平十年春二月詔梁唐晉漢周朝三品以上官子孫依律敘䕃告身不存者不預御史臺主簿石介上疏以為不可坐罷夏五月賜信州龍虎山道士張乾曜號澄素先生後漢張道陵之後也秋八月罷𣙜鹽法復通商自諸國降附天下鹽利皆歸縣官其解池引水而成者曰顆鹽淮浙蜀廣鬻海井或鹻成者曰末鹽初皆通商貿易咸平中梁鼎始請自粥解鹽未㡬以公私煩擾復舊商販帝初即位置計置司議茶鹽利害茶法變為貼射而鹽則官自粥官得利㣲而民不便解池積鹽為阜其上生木合抱數莫可較於是詔翰林學士盛度御史中丞王隨等議更其制度上通商五利曰方禁商時伐木造船輦運兵民不勝疲勞今去其弊一利也陸運既差帖額又役車户貧人懼役連嵗逋逃今悉罷之二利也船運有沈溺之患綱吏侵盜雜以泥沙硝石其味苦惡疾生重膇今皆得食真鹽三利也錢幣國之貨泉欲使通流富家多蔵鏹不出民用益蹙今歳得商人出緡錢以助經費四利也嵗減監官兵卒畦夫傭作之給五利也於是詔罷三京二十八州軍𣙜法聽商人入錢若金銀于京師𣙜貨務給鈔受鹽于解池而申私販粥之禁契丹蕭孝穆執大延琳以歸九月姜遵卒以趙稹為樞密副使時政出宫掖稹厚結劉美家婢以千進用命未下有馳告者稹曰東頭西頭盖意在中書也聞者以為笑談初置武舉其法先閲騎射而試之以䇿為去留弓馬為髙下每遇制舉則試焉髙麗来貢辛未九年契丹太平十一年六月興宗宗真景福元年夏六月契丹主隆緒卒太子宗真立其母蕭訥木錦自為太后治國事三月契丹主如長春河有疾六月殂于大福河之北太子宗真立其行母蕭訥木錦自立為皇太后聽政聖宗理寃滯舉才察貪殘抑奢僭録勲勞振貧乏弭兵以息民設科以取士政令平壹國以富強契丹之賢主也契丹太后蕭訥木錦遷其主母齊天蕭氏于臨潢初聖宗疾革元妃訥木錦詈齊天后曰老物寵亦有既耶令左右扶后出宫於是護尉馮嘉努喜孫等希太后㫖誣齊天后弟北府宰相蕭珠卜詳衮蕭必塔謀逆太后令鞫治連及齊天后契丹主聞之曰皇后侍先帝四十年撫育朕躬當為太后今不果反罪之可乎太后曰此人若在恐為後患契丹主曰皇后無子而老雖在無能為也太后不從遷之上京秋七月王隨等如契丹王隨致祭王鬷梅詢弔慰范諷賀即位孔道輔賀其太后冊禮契丹宴使者優人以文宣王為戲道輔艴然徑出主客者固邀道輔還坐且令謝契丹主道輔正色曰中國與北朝通好以禮文相接今俳優之徒慢侮先聖而不之禁北朝之過也道輔何謝契丹君臣黙然因酌大巵謂曰天寒飲此可致和氣道輔曰不和固無害冬十月罷翰林學士宋綬時太后専政綬以為言故罷之契丹使耶律翥等來耶律翥謝弔慰髙徳順致遺物耶律遜耶律元謝賀即位及太后冊禮十二月契丹封李徳昭子元昊為夏國公以女歸之壬申明道元年契丹重熙元年春正月契丹主帥羣臣朝其母契丹太后専決國事契丹主不得預聞至是御正殿受契丹主及羣臣朝二月以張士遜平章事尊真宗婉儀李氏為宸妃是日卒婉儀杭州人實生帝太后既取帝為己子與楊太妃保護甚至帝亦盡孝道所以奉太后太妃者無不備而婉儀黙然處先朝嬪御中未嘗自異人畏太后亦無敢言者以是帝雖春秋長不自知為婉儀所出也至是疾革乃自順容進位宸妃是日薨太后欲以宫人禮治喪于外吕夷簡時為首相奏禮宜從厚太后遽引帝起有頃后復獨立簾下召夷簡問曰一宫人死相公云云何也夷簡對曰臣待罪宰相事無内外皆當預也后怒曰相公欲離間吾母子耶夷簡對曰陛下不以劉氏為念臣不敢言尚念劉氏則喪禮宜從厚后悟乃以一品禮殯于洪福院夷簡又謂入内都知羅崇勲曰宸妃當以后服殮用水銀實棺異時勿謂夷簡不道及也崇勲如其言三月契丹太后訥木錦弑主母齊天后蕭氏于臨潢太后慮契丹主懐齊天后鞠育之恩因其蒐于雪林遣人馳至臨潢賜齊天后死后曰我實無辜天下共知待我浴而後就死可乎使者退比復至則后已殂矣諡曰仁徳秋七月王曙罷八月以晏殊參知政事楊崇勲為樞密副使以吐蕃唃厮囉為寧逺大將軍宫中火詔求直言癸亥大内火延及八殿帝移御延福宫百官晨朝而宫門不啓輔臣請對上御拱宸門追班百官拜樓下吕夷簡不拜上使人問其故曰宫中有變羣臣願一見清光上舉簾見之乃拜有司究火所起多引宫人屬吏御史蔣堂言火起無迹安知非天意陛下宜修徳應變有司乃欲歸咎宫人是重天譴也程琳亦以為言上為罷獄詔羣臣直言闕失丁夘大赦殿中丞滕宗諒秘書監劉越請太后還政以答天譴不報九月復作受命寳帝寳冊為宫火所焚故也冬十一月夏王趙徳明卒以其子元昊為定難節度使西平王徳明卒贈太師尚書令兼中書令即遣楊吉授元昊三使封西平王初元昊數諫其父母臣宋徳明輒戒之曰吾用兵久疲矣吾族三十年衣錦綺此宋恩也不可負元昊曰衣皮毛事畜牧蕃性所便英雄之生當霸王耳何錦綺為既襲位明號令以兵法勒諸部始衣白窄衫氊冠紅裏冠頂後垂紅結綬自號嵬名吾祖凡六日九日則見官屬倣中國置文武班立蕃學漢學自中書令宰相樞密使以下皆分命蕃漢人為之以衣冠采色别士庶貴賤每舉兵必率部長與獵有獲則下馬環坐飲割鮮而食各問所見擇取其長避父諱改明道為顯道稱於國中諡徳明為太宗光聖皇帝墓號嘉陵追尊繼遷為太祖廟號武宗契丹冊趙元昊為夏國王以楊崇勲為樞密使癸酉二年契丹重熙二年春二月皇太后有事于太廟太后欲被服天子衮冕以享太廟薛奎力諫且曰必御此若何為拜后不聽服儀天冠衮衣去劒為初獻皇太妃為亞獻皇后為終獻禮畢羣臣上太后尊號曰應元齊聖顯功崇徳慈仁保夀皇太后帝耕藉田大赦三月皇太后劉氏崩后有疾帝為大赦天下甲午后崩帝見左右泣曰太后疾不能言猶數引其衣若有所屬何也薛奎曰其在衮冕也服之豈可見先帝於地下帝悟遂止以后服斂諡曰莊獻明肅舊制后皆二諡稱制加四諡自此始后稱制十二年雖政出宫闈而號令嚴明恩威加天下左右近習少所假借宫掖間未嘗妄改作内外賜予有節賜族人御食必易以釦口曰尚方器勿使入吾家也常服絁繻練裙侍者見帝左右簮珥珍麗欲效之后戒曰彼皇帝嬪御飾也汝安得學三司使程琳獻武后臨朝圖后擲于地曰吾不作此負祖宗事漕使劉綽還京西言在庾有出賸糧千餘斛乞付三司后問曰卿識王曽張知白吕夷簡魯宗道乎此四人者豈因獻羨餘進哉晚年稍進外家而任宦者羅崇勲江徳明等訪外事崇勲由此勢傾中外尊皇太妃楊氏為皇太后太后遺誥尊太妃為皇太后與皇帝同議國事閤門趣百僚賀御史中丞蔡齊目臺吏毋追班而入白于執政曰上春秋富習知天下情偽今宜躬攬朝政豈可使女后相踵稱制乎右司諫范仲淹復上疏曰太后母號也自古無因保育而代立者今一太后崩又立一太后天下且疑陛下不可一日無母后之助矣殿中侍御史龐籍請下閤門取垂簾儀制盡焚之由是止尊太妃為皇太后而削去同議軍國事帝始親政帝親政罷創修寺觀裁抑僥倖召宋綬范仲淹而黜内侍江徳明等中外大悦劉太后愛帝踰於已出帝亦盡孝故終始無毫髮間隙之可議及帝親庶務言者多追詆太后時事范仲淹言于帝曰太后受遺先帝調䕶陛下者十餘牟今宜掩其小故以全后徳帝曰此亦朕所不忍聞也遂下詔戒飭中外毋得輒言皇太后垂簾日事曹琮等如契丹曹琮告哀章得象致遺物吐蕃唃厮囉徙居青唐温逋竒囚唃厮囉于穽中而出兵收不附已者守穽人出之唃厮囉因集部衆討殺温逋竒而徙居青唐夏四月吕夷簡張耆夏竦陳堯佐范雍趙稹晏殊罷帝與吕夷簡謀以張耆等皆附太后得居政府欲悉罷之夷簡以為然帝退以語皇后后曰夷簡獨不附太后耶但多機巧善應變耳由是夷簡亦罷制下夷簡方押班聞唱名大駭不知其故因令素所厚内侍都知閻文應詗之乃知事由郭后也於是深憾后思有以傾之矣以李迪平章事王隨參知政事李諮為樞密副使王徳用僉書樞密院事追尊生母宸妃李氏為皇太后荆王元儼為帝言陛下乃李宸妃所生妃死以非命帝始知為宸妃子因號慟累日下詔自責追尊為皇太后諡莊懿幸洪福寺祭告易梓宫親啓視之妃以水銀故玉色如生冠服如皇后帝歎曰人言其可信哉待劉氏加厚陪葬于永定陵契丹使耶律夀寧等来夀寧来祭奠耶律卿寧耶律嵩弔慰帝及皇太后六月甲午朔日有食之秋七月旱蝗詔求直言八月以宋綬為端明殿學士復文明為端明置學士在翰林侍講學士之上以待學士之久次者首以綬為之冬十月葬莊獻明肅皇太后張士遜楊崇勲免士遜為首相無所建明㑹羣臣詣洪福院上莊懿太后冊退而入慰士遜與同列過楊崇勲園飲日中期不至中丞范諷劾之坐免以吕夷簡平章事宋綬參知政事王曙為樞密使王徳用蔡齊為副使初徳用為殿前都虞候有求太后内降補軍吏者徳用曰補吏軍政也不可與太后固欲與之徳用卒不奉詔帝親政閲太后閤中得徳用所奏事竒之以為可大用遂拜簽樞徳用謝曰臣武人幸得以馳驅自效賴陛下威靈待罪行間足矣且臣不學不足以當大事帝遣使者趣入院由是眷注益隆十一月贈寇準中書令詔自今宰相不得進擬臺臣帝曰宰相自用臺官則宰相過失無敢言者矣故有是詔十二月薛奎罷奎謀議正直或志不伸歸輒嘆咤不食家人笑曰何必如是奎曰吾仰慙古人俯愧後世爾廢皇后郭氏為淨妃玉京沖妙仙師居長寧宫黜御史中丞孔道輔等十人于逺州時尚美人楊美人俱得幸數與皇后忿爭一日尚氏於上前有侵后語不勝忿批其頰上自起救之誤批上頸上大怒内侍閻文應因與上謀廢后且勸帝以爪痕示執政帝以示吕夷簡且告之故夷簡有憾于后遂主廢黜之議帝猶疑之夷簡曰光武漢之明主也郭后止以怨懟坐廢况傷陛下頸乎帝意遂決將廢后夷簡敕有司毋得受臺諫章奏於是中丞孔道輔率諫官孫祖徳范仲淹宋庠劉渙御史蔣堂郭勸楊偕馬絳段少連十人詣垂拱殿伏奏皇后天下之母不當輕議黜廢願賜對盡所言帝使内侍諭道輔等至中書令吕夷簡以皇后當廢狀告之道輔語夷簡曰大臣之於帝后猶子事父母也父母不和可以諫止柰何順父出母乎夷簡曰廢后有漢唐故事道輔復曰人臣當道君以堯舜豈得引漢唐失徳為法耶夷簡不答即奏言伏閤請對非太平美事詔黜道輔等皆知逺州明日道輔等趍朝欲留百官揖宰相廷爭至待漏院聞詔乃退道輔鯁挺特達遇事彈劾無所避天下皆以直道許之至是名益重甲戌景祐元年契丹重熙三年春正月以賈昌朝等為崇政殿説書侍講學士孫奭年老乞外因薦賈昌朝趙希言王宗道楊安國等自代遂特置説書四人日輪二員祇候焉昌朝誦説尤為明析帝多所質問二月罷書判拔萃科夏五月契丹太后蕭氏有罪遷于慶州契丹主始親政立重元為太弟契丹太后蕭氏隂召諸弟議欲立少子重元重元以其謀白于契丹主遂收太后符璽而遷之於慶州七栝宫始親決國事立重元為皇太弟閏六月毁無額僧舍秋八月王曙卒曙方嚴簡重有大臣體居官深自損抑然溺於浮圖法恒齋居蔬食云以王曽為樞密使詔淨妃郭氏出居瑶華宫詔凈妃出居瑶華宫廢美人尚氏為道士居洞真宫安置美人楊氏于别宅尋賜淨妃號金陵教主沖靜元師帝頗念之遣使存問賜以樂府后和答之辭甚悽惋帝益悔恨焉九月立曹氏為皇后彬之孫女也趙元昊反寇環慶州元昊改元開運或告以石晉敗亡之號也乃改廣運乙亥二年契丹重熙四年春正月作邇英及延義閣詔蔡襄冩無逸篇于邇英閣之屛二月育汝南郡王允讓子宗實于宫中允讓太宗之孫父商王元份也帝未有儲嗣取宗實入宫命皇后撫鞠之生四年矣李迪罷以王曽平章事蔡齊盛度參知政事王隨李諮知樞密院事王徳用韓億同知院事趙元昊寇慶州慶州柔逺砦蕃部巡檢嵬通攻後橋諸砦破之元昊遂以執仇為名入寇慶州緣邉都巡檢楊遵與戰敗續環慶都監齊宗矩援之次節義峰伏兵發執宗矩去久之始放還秋九月李照進新雅樂初判太常寺燕肅乞以王朴所造律準考定樂器帝乃命李照照言王朴律準視古樂髙五律視禁坊樂髙二律昔伶倫截竹為律神瞽協其中聲然後聲應鳯鳴此不刋之法也臣請依神瞽律法試鑄編鐘一簴可使度量權衡協和詔許之乃下潞州求上黨羊頭山秬黍懐州河内縣取葭莩遂以縱黍累尺制律吕以定樂樂成進之雖律應古音而所造鐘磬才中太蔟樂與器自相矛盾議者非之乃復命官較焉而詔天下有深達鐘律音者所在以聞於是知杭州鄭向薦鎮東推官阮逸知蘇州范仲淹薦布衣胡瑗矣冬十一月廢后郭氏薨竄内侍閻文應于嶺南后居瑶華帝嘗密遣人召之后辭曰若再見召者須百官立班受冊方可乃止屬小疾帝遣入内都知閻文應挾醫診視數日言后暴崩中外疑文應進毒而不得其實帝深悼之追復后號以禮斂𦵏而停諡冊祔廟之禮知開封府范仲淹劾奏文應之罪竄之十二月加唃厮囉保順軍留後詔孔宗愿襲封文宣公自文宣公聖佑卒無子除襲封者且十年衛真令顔太初言于蔡齊齊白于帝故有是命宗愿聖佑弟也丙子三年契丹重熙五年春二月詔胡瑗阮逸較定鐘律瑗逸極言李照樂穿鑿帝命改作之瑗以横黍累尺及成則律圍徑與古不合猶以瑗為校書郎逸知城父縣而遣之詔太常仍用和峴所定樂而罷李照所製者三月罷𣙜茶復行貼射法自貼射茶法廢而河北入中虚估之弊益甚李諮既居政府請復行見錢法乃訪利害於商人遂罷河北入中虚估以實錢償芻粟實錢售官茶皆如天聖元年之制又以北商持劵至京舊必得交引鋪為之保任并得三司符驗然後給錢以是京師坐賈率多邀求三司吏稽留為姦令悉罷之命商持劵徑趍𣙜貨務驗實立償之而三説之法廢縣官自此省費矣三説法者募商人入中芻粟於邊給劵以茶償之又益以東南緍錢及香藥犀齒也夏五月貶權知開封府范仲淹及集賢校理余靖館閣校勘尹洙歐陽修于外詔戒羣臣越職言事范仲淹以吕夷簡執政進用者多出其門上百官圖指其次第曰如此為序遷如此為不次如此則公如此則私况進退近臣凡超格者不宜全委之宰相夷簡不悦他日論建都之事仲淹進曰洛陽險固而汴為四戰之地太平宜居汴即有事必居洛陽當漸廣儲蓄繕宫室帝以問夷簡夷簡對曰仲淹迂闊務名無實仲淹聞之乃為四論以獻一曰帝王好尚二曰選賢任能三曰近名四曰推委大抵譏切時弊且曰漢成帝信張禹不疑舅家故有新莽之禍臣恐今日亦有張禹壊陛下家法夷簡訴曰仲淹越職言事離間陛下君臣所引用皆朋黨也仲淹對益切由是落職知饒州集賢校理余靖上言曰仲淹以刺譏大臣重加譴謫儻其言未合聖慮在陛下聽與不聽耳安可以為罪乎汲黯在廷以平津為多詐張昭論將以魯肅為麄疎漢皇吳主熟聞訾毁兩用無猜豈損令徳陛下自親政以来屡逐言事者恐鉗天下口請改前命疏入靖坐落職監筠州酒税館閣校勘尹洙上疏曰仲淹忠亮有素臣與之義兼師友則是仲淹之黨也今仲淹以朋黨被罪臣不可茍免夷簡怒斥監䖍州酒税館閣校勘歐陽脩貽書責司諫髙若訥不能救謂其不復知人間有羞恥事若訥怒上其書脩坐貶夷陵令館閣校勘蔡襄作四賢一不肖詩以譽仲淹靖洙脩而譏若訥人士傳寫粥書者市之得厚利契丹使適至買以歸張於幽州館殿中侍御史韓瀆希夷簡㫖請書仲淹朋黨掲之朝堂以戒百官越職言事者從之秋七月置大宗正司八月班民間車服之令冬十月契丹主試進士于元和殿九月契丹主獵黄華山獲熊三十六十月幸燕京御元和殿以日射三十六熊賦幸燕詩試進士于廷賜馮立趙徽四十九人及第以立為右補闕徽以下皆為太子中舍賜緋衣銀魚遂大宴契丹御試進士自此始丞相張儉等請禮部貢院歡飲至暮而罷十一月皇太后楊氏崩諡曰莊恵祔𦵏永定陵李諮卒諮明辨知務在樞府慎爵賞抑僥倖號為稱職以王徳用知樞密院事章得象同知院事折惟忠卒以其子繼宣權知府州事遼中書令張儉致仕儉居相位二十年清約謙慎禆益𢎞多契丹主深重之丁丑四年契丹重熙六年春二月祠赤帝于宫中祈嗣也夏四月吕夷簡王曽宋綬蔡齊罷初夷簡事曽甚謹曽亦力薦其才遂至宰相及曽復入中書位反居下而夷簡任事久多所専決曽不能堪議論間有異同遂力求罷帝疑之問曽曰卿亦有所不足耶時外傳王繼明納賂夷簡曽因及之帝以問夷簡夷簡乞置對遂與曽交論帝前曽語屈求去益力夷簡亦乞罷時曽與蔡齊善而夷簡善宋綬惟盛度不得志於二人而性猜險每有所議齊間有異綬惟夷簡之是而度依違其間事多不決及是帝問度曰曽夷簡力求退何也度對曰二人心腹之事臣不得而知陛下詢二人以孰可代者則其情可察矣帝從之曽薦齊夷簡薦綬於是四人俱罷而度獨留曽性資端厚在朝廷進止皆有常處平居寡言笑人不敢干以私進退士人莫有知者范仲淹嘗問曽曰明揚士類宰相任也公之盛徳獨少此耳曽曰夫執政而欲使恩歸已怨將誰歸耶仲淹服其言帝之初即位也少太后將有専制之患曽正色危言以立于朝由是宦官近習不敢窺覦而帝徳日就太后亦全令名曽可謂社稷之臣矣以王隨陳堯佐平章事韓億程琳石中立參知政事盛度知樞密院事王鬷同知院事趙元昊侵吐蕃遂取𤓰沙肅州元昊遣其令公蘇奴兒將兵攻唃厮囉敗死略盡奴兒被獲元昊憤之乃自帥衆攻猫牛城一月不下既而詐約和城開乃大縱殺戮又攻青唐安二宗哥帶星嶺諸城唃厮囉部將安子羅以兵絶歸路元昊晝夜角戰二百餘日子羅敗元昊乗勝遂取𤓰沙肅三州元昊既悉有夏銀綏宥靜靈鹽會勝甘涼𤓰沙肅而洪定威龍皆即堡鎮號為州仍居興州阻河依賀蘭山為固地方萬里地饒五穀宜稻麥始大建官置十二監軍司委豪右分統其衆自河北至午臘蒻山七萬人以備契丹河南洪州白豹安鹽州羅落天都惟精山等五萬人以備環慶鎮戎原州左廂宥州路五萬人以備鄜延麟府右廂甘州路三萬人以備吐蕃囘紇賀蘭駐兵五萬靈州五萬興州興慶府七萬人為鎮守總勝兵五十餘萬而苦戰倚山訛山訛者横山𦍑平夏兵不在其數也選豪族善弓馬五千人迭直號六班直分鐵騎三千為十部設十六司于興州以總庶政改元大慶元昊自製蕃書形體方整類八分而畫頗重複以教國人紀事冬十二月并代忻州地震吏民壓死者二萬二千三百人傷者五千六百人畜牧死者五萬餘戊寅寳元元年契丹重熙七年夏景宗元昊天授禮法延祚元年春三月王隨陳堯佐韓億石中立免隨為相無所建明而數與堯佐億中立爭事會忻代地震右司諫韓琦言隨堯佐中立非輔弼才億子綜為羣牧判官不當自請以兄綱為代遂皆免琦遇事敢言切而不迂在諫垣前後凡七十餘疏云以張士遜章得象平章事王鬷李若谷參知政事王博文陳執中同知樞密院事得象為翰林學士時莊獻太后臨朝每遣内侍至學士院得象必正色待之或不交一言帝聞而器之至是謂曰向者太后垂簾羣臣邪正朕皆黙識卿清忠無所阿附又未嘗千請今日用卿職由此也夏四月王博文卒以張觀同知樞密院事冬十月詔戒百官朋黨中外論薦范仲淹者衆帝謂張士遜曰向貶仲淹為其密請建立皇太弟故也今朋黨稱薦如此奈何乃下詔戒敕百官毋得朋黨趙元昊稱帝國號曰夏元昊遣使詣五臺供佛以窺河東道路既還遂與諸酋歃血約先攻鄜延欲自靖徳塞門砦赤城路三道並入遣使奉表略曰臣祖宗本出帝胄當東晉之末運創後魏之初基逺祖思恭當唐季率兵拯難受封賜姓祖繼遷心知兵要手握乾符大舉義旗悉降諸部臨河五郡不旋踵而歸沿邊七州悉差肩而克父徳明嗣奉世基勉從朝命臣偶以狂斐制小蕃文字改大漢衣冠衣冠既就文字既行禮樂既張器用既備吐蕃塔塔張掖交河莫不從服稱王則不喜朝帝則是從遂以十月十一日郊壇備禮為世祖始文夲武興法建禮仁孝皇帝國稱大夏伏望許以西郊之地冊為南面之君敢竭庸愚常敦歡好謹奉表以聞十二月以夏竦為涇原秦鳯路安撫使知永興軍范雍為鄜延環慶路安撫使知延州備元昊也加唃厮囉保順軍節度使邈川大首領自西涼為李繼遷所陷潘羅支舊部往往歸唃厮囉囘紇降者復數萬唃厮囉居青唐西有臨谷城通青海髙昌諸國商人皆趍之以貿易由是富強朝廷欲使背擊元昊以披其勢因授節鉞唃厮囉約盡力無負然終不能立大功己卯二年契丹重熙八年夏四月募河東陜西民入粟實邊五月王徳用罷趙元昊反徳用請自將討之不許徳用狀貌雄毅面黒頸以下白晢人皆異之言者論其貌類藝祖且得士心不宜久典機密遂罷又有言其市馬府州者上其劵乃市於商人言者猶不已乃降知隨州家人惶懼徳用舉止言笑自若惟不接賔客而已六月詔削趙元昊官爵屬籍正月元昊表至羣臣皆曰元昊小醜也請出師討之旋即誅滅矣諫官吳育獨進曰元昊雖稱藩臣其尺賦斗租不入縣官且叛服不常請置之示不足責且已僭輿服勢必不能自削宜援國初江南故事稍易其名可以順附而收之不報而下詔削奪元昊官爵絶互市掲榜于邊募人能擒之者即授定難節鉞已而元昊又遣賀永年齎嫚書納旌節及所授敕告置神明匣留歸孃族而去朝廷乃遣使體量安撫陜西以夏守贇知樞密院事秋七月以夏竦知涇州兼涇原秦鳯經略安撫使朝廷遣轉運使龐籍就竦計事竦上奏曰繼遷當繼捧入朝之後曹光實掩襲之餘遁逃窮蹙而太宗累歳不能勦滅先皇帝鑒追討之弊戒疆吏謹烽候嚴卒乗来即逐之去無追捕也然拓跋之境自靈武陷没之後銀綏割棄以来假朝廷威靈其所役屬者不過河外小羌爾况徳明元昊相繼猖獗以繼遷窮蹙比元昊富實勢可知也以先朝累勝之士較當今闗東之兵勇怯可知也以興國習戰之師方今沿邊未試之將工拙可知也繼遷竄伏平夏元昊窟穴河外地勢可知也若分兵深入糗糧不支師行賊境利於速戰儻進則賊避其鋒退則敵躡其後老師費糧深可虞也若窮其巢穴須涉大河長舟巨艦非倉卒可具也若浮囊挽綆聨絡而進我師半濟賊乗勢掩擊未知何謀可以捍禦臣以為不較主客之利不計攻守之便而議追討者非良䇿也因條上十事一教習強弩以為竒兵二羈縻屬羌以為藩籬三詔唃厮囉父子并力破賊四度地勢險易逺近砦柵多少勇怯而増減屯兵五詔諸路互相應援六募土人為兵以代東兵七増置弓手壯丁獵户以備城守八並邊小砦毋積芻糧賊攻急則棄小砦入保大砦以完兵力九闗中民坐累若過悞者許入粟贖罪以贍邊計十捐並邊冗兵冗官及減騎兵以紓饋餉朝廷多采用之然是時邊臣多議征討反以竦為怯契丹主迎其太后于慶州太后居慶州五年契丹主悔之乃親御奉迎還京事之益謹而后常不懌冬十一月盛度程琳免時有告開封府吏馮士元姦利事知府鄭戩窮治之於是度坐令士元強取其鄰所賃官舍琳坐令士元市材木買婦女等事初張遜有第在武成坊遜曽孫偕宗室女所出也年才七歳家貧不自給乳媪擅出劵鬻第琳欲得之使士元密諭媪以偕㓜宜得御寳許粥乃售媪以宗室女故入宫見太后得御寳琳遂市取之於是士元流海外度知揚州琳知潁州而御史中丞孔道輔天章閣待制龐籍等十餘人皆坐朋黨免官補外初張士遜惡琳而疾道輔之不已附也欲去之㑹士元獄起士遜謂道輔曰上顧程公厚今為小人所誣盍見上辨之道輔不悟入言于帝曰琳罪薄不足深治也帝怒道輔始知為士遜所賣至鄆州發憤而卒以王鬷知樞密院事宋庠參知政事天聖中鬷使契丹過真定時曹瑋為總管鬷見之瑋從容謂曰君異日當柄用願留意邊防鬷曰何以教之瑋曰吾聞趙徳明嘗使人以馬𣙜易漢物不如意欲殺之少子元昊年才十餘諫曰我戎人本從事鞍馬而以資鄰國易不急之物已為非䇿又從而殺之失衆心矣徳明從之吾嘗使人覘元昊狀貌異常他日必為邊患鬷未以其言為然及在樞府帝數訪以邊事鬷不能對始歎瑋之明識折繼宣有罪貶為楚州都監以其弟繼閔權領府州事繼宣苛虐掊克種落嗟怨故也种世衡帥師城青澗鄜州判官种世衡言延安東北二百里有故寛州請因其廢壘而興之以當寇衝右可固延安之勢左可致河東之粟北可圖銀夏之舊朝廷從之命世衡董其役夏人屢来爭世衡且戰且城然處險無泉議不可守鑿地百五十尺始至石石工辭不可穿世衡命屑石一畚酬百錢卒得泉以濟城成賜名青澗以世衡知城事庚辰康定元年契丹重熙九年春正月丙辰朔日有食之除越職言事之禁正旦日食知諫院富弼請罷宴徹樂就館賜北使酒食執政不可弼曰萬一契丹行之豈不為朝廷羞既而聞契丹果罷宴帝深悔之時禁臣僚越職言事弼因言應天變莫若通下情遂除其禁元昊寇延州執副總管劉平石元孫以歸二月貶范雍知安州延州當夏人出入之衝地闊而砦柵踈土兵寡弱又無宿將至是先遣人通欵于范雍雍信之不設備既而元昊盛兵攻保安軍鄜延環慶副都總管劉平鄜延副都總管石元孫屯慶州雍以書召之平與元孫趍土門元昊既破金明砦執都監李士彬父子乗勝至延州城下守城兵才數百雍閉門堅守平元孫聞之督騎兵晝夜倍道而前明日至萬安鎮平先發步兵繼進夜至三川口西十里止營遣騎兵先趍延州爭門時鄜延都監黄徳和巡檢万俟政郭遵各將所部兵分屯外境范雍皆召還為援平與之合歩騎萬餘結陣東行五里許與賊遇平與賊皆為偃月陣相向有頃敵兵涉水為横陣郭遵擊退之敵復蔽盾為陣官軍復擊却之奪盾殺獲及溺死者近千人平左耳右脛皆中流矢日暮戰士上首功及其獲馬平曰戰方急爾各誌之皆當重賞汝語未巳敵以輕兵薄戰官軍引却二十步黄德和居陣後望見軍却率麾下走保西南山衆從之皆潰平遣其子宜孫馳追徳和執轡語曰當勒兵還并力抗敵奈何先奔徳和不從驟馬遁赴甘泉平遣軍校杖劒遮留得千餘人轉鬭三日敵退還水東平率餘衆保西南山立七柵自固敵夜使人叩柵問大將安在士不應復使人偽為戍卒送文移平平殺之夜四皷敵環營呼曰如許殘兵不降何待平旦敵酋舉鞭麾騎自山四出合擊絶官軍為二平遂與元孫等皆被執會大雪敵退延州得不陷詔殿中侍御史文彦博即河中置獄問狀黄徳和腰斬范雍貶官知安州而贈平元孫官雍為治尚恕好謀而少成故及於敗詔陜西轉運使明鎬募強壯備邊以夏守贇為陜西馬步軍都總管經略安撫招討使以韓琦為陜西安撫使時益利等州饑琦為體量安撫使琦至蜀逐貪殘不職吏寛賦調止供物活饑民百九十萬而還適元昊反琦上疏論西師形勢甚悉即命安撫詔改元許中外臣庶言事西事日擾甲午括畿内京東西淮南陜西馬丁酉詔樞密院同宰臣議邊事辛丑出内蔵緡錢八十萬陜西市糴軍儲訪知邊事者丙午降徳音釋寇所至州縣罪及夏税是日改元去尊號寳元二字許中外臣庶上封章言事三月丙子大風晝暝詔中外言闕政王鬷陳執中張觀免時邊事大急而鬷等無所建明每有議事又多不合故免以晏殊宋綬知樞密院事王貽永同知院事夏四月遣使籍陜西強壯及増補河北強壯軍五月張士遜致仕初西事方劇因簡輦官為禁軍輦官攜妻子遮宰相樞密院喧訴士遜將朝馬驚墜地士遜移告家居諫官韓琦論士遜既不能有建明政府又非養病之地士遜不自安上章請老至是以太傅鄧國公致仕宰相得謝自士遜始以吕夷簡平章事以夏竦為陜西招討使韓琦范仲淹為副使元昊陷塞門安逺承平等砦執塞門砦主髙延徳以去六月以夏守贇同知樞密院事増置陜西河東北京東西五路弓手秋七月郭禎如契丹告將伐夏也八月劉渙如邈川命唃厮囉以兵助討夏也夏守贇罷以杜衍同知樞密院事九月以宋綬晁宗慤參知政事鄭戩同知樞密院事以晏殊為樞密使王貽永杜衍鄭戩為副使李若谷罷以范仲淹兼知延州延州諸砦多為元昊所陷仲淹請自行詔命兼知延州先是詔分邊兵總管領萬人鈐轄領五千人都監領三千人寇至禦之則官卑者先出仲淹曰將不擇人以官為序取敗之道也由是大閲州兵得萬八千人分六將領之將三千人日夜訓練量賊衆寡使更出禦賊敵人聞之相戒曰無以延州為意今小范老子腹中有數萬甲兵不比大范老子可欺也仲淹大興營田且聽民得互市以通有無又以民逺輸勞苦請建鄜城為軍以河中府同華州中下户租税就輸之春夏徙兵就食可省糴什之三他所減不與詔以為康定軍仲淹又修承平永平等砦稍招還流亡定堡砦通斥堠城十二砦於是羌漢相踵歸業元昊寇三川等砦元昊寇三川砦都巡檢楊保吉死之又圍師子定川堡戰士死者五千人遂陷乾溝乾河趙福三堡冬十二月宋綬卒綬清介博學言動有常朝廷大議論多所裁決鑄當十錢詔出内蔵絹百萬及常平緡錢助糴軍儲又命倣淳化二年鑄當十錢法以銅為之權助邊費辛巳慶厯元年契丹重熙十年春正月加唃厮囉河西節度使詔鄜延涇原㑹帥討元昊未行而罷帝以元昊勢益猖獗遣翰林學士晁宗慤即陕西問攻守之䇿夏竦具二説令副使韓琦判官尹洙詣闕奏之帝取攻䇿執政以為難琦言元昊雖傾國入寇衆不過四五萬吾逐路重兵自守勢分力弱遇敵輒不支若併出一道皷行而前乗賊驕惰破之必矣杜衍曰徼倖而成功非萬全計也帝不聽詔鄜延涇原同出兵進討琦遣洙趍延州謀之期以正月會師同進范仲淹言正月塞外太寒我師暴露不如俟春深入則賊馬痩人饑勢易制也且鄜延密邇靈夏西羌必遊之地第按兵不動以觀其釁許臣稍以恩信招徕之不然情意阻絶臣恐偃兵無期矣經略判官田况亦請嚴設邊備若有侵掠即出兵邀擊或賊界謹自守備不必先用輕舉如此則全威制勝有功無患也帝從二議由是中國之師卒不出塞尋詔陕西諸路總管司嚴邊備毋輒入賊界賊至則禦之元昊遣人議和于延州范仲淹以書諭之元昊遣陷將髙延徳還延州與范仲淹約和仲淹不聞諸朝自為書反覆戒諭令其去帝號盡臣節以報累朝厚待之恩韓琦聞之曰無約而請和者謀也命諸將戒嚴而自行邊二月元昊寇渭州任福敗績于好水川貶韓琦知秦州韓琦行邊至髙平元昊果遣衆寇渭州薄懐逺城琦乃趍鎮戎軍盡出其兵又募勇士萬八千人命環慶副總管任福將之以耿傳叅軍事涇原都監桑懌為先鋒朱觀武英王珪各以所部從福節制將行琦令福併兵自懐逺趍徳勝砦至羊牧隆城出敵之後諸砦相距才四十里道近糧餉便度勢未可戰即據險置伏要其歸路戒之再三且曰茍違節制有功亦斬福引輕騎數千趍懐逺捺龍川遇鎮戎軍西路巡檢常鼎劉肅與敵戰于張家堡南斬首數百敵棄馬羊槖駞佯北桑懌引騎趍之福踵其後諜傳敵兵少福等頗易之薄暮與懌合軍屯好水川川與能家川隔在隴山外觀英屯籠絡川相距隔隴山五里約翌日會兵川口必使夏人匹騎無還然不知己陷其伏中矣路既逺芻餉不繼士馬乏食者三日追奔至籠竿城北時元昊自將精兵十萬營于川口候者言夏人有砦數不多兵乃益進福與懌循好水川西行出六盤山下距羊牧隆城五里與夏軍遇遂結陣諸將方知堕敵計勢不可留遂前格戰於道傍得數銀泥合封襲謹密中有動躍聲疑莫敢發福至發之乃懸哨家鴿百餘自合中起盤飛軍上於是夏兵四合懌馳犯其鋒福陣未成列賊縱鐵騎突之自辰至午陳動衆倚山欲據勝地俄而夏人陣中忽樹鮑老旗長二丈許懌等莫測及旗左麾左伏兵起右麾右伏兵起自山背下擊士卒多墜崖塹相覆壓懌肅戰死敵分兵數千斷官軍後福力戰身被十餘矢有小校劉進勸福自免福曰吾為大將兵敗以死報國耳揮四刄鐵簡挺身決鬭槍中左頬絶其喉而死敵乃併兵攻觀英戰既合王珪自羊牧隆城引屯兵四千五百陣于觀軍之西渭川駐泊都監趙津將瓦亭騎兵二千繼至珪屢出略陣陣堅不可破英被重傷不能視軍敵兵益至官軍大潰英津珪等皆死内殿崇班訾贇西頭供奉官王慶侍禁李簡李禹亨劉鈞及任福子懐亮與軍校死者又數十人士卒死者萬三百惟觀以兵千餘保民垣四向縱射㑹暮敵引去得還闗右大震時元昊傾國入寇福臨敵受命所統皆非素撫之兵又分出趨利是以甚敗奏至帝震悼為之旰食夏竦使人收散兵得琦檄於福衣帶間言罪不在琦琦亦上章自劾猶奪一官徙知秦州三月元昊復遣人至延州貶范仲淹知耀州元昊得仲演書復遣使持答書至語多不遜仲淹對其使焚之朝議以仲淹不當輒通書又不當輒焚之宋庠請斬仲淹杜衍曰仲淹志在招納盖忠於朝廷也何可深罪帝悟乃止降為户部員外郎徙知耀州夏四月以夏竦判永興軍陳執中知永興軍五月宋庠鄭戩罷庠天資忠厚練習典故遇事輒分别是非戩果敢任氣皆與吕夷簡不合罷凡庠與善者夷簡悉指為朋黨斥之以王舉正參知政事任中師任布為樞密副使詔夏竦帥師屯鄜州陳執中帥師屯涇州竦與執中議事多異同詔令互出巡邊於是竦屯鄜州執中屯涇州竦雅意在朝廷及任以西事頗依違顧避又數請解兵柄不見從及出巡邊嘗置侍婢中軍帳下㡬至兵變元昊命募得竦首者與錢三千其見輕侮如此秋七月置萬勝軍凡二十指揮元昊寇麟府州折繼閔敗之八月元昊陷豐州冬十月招討使夏竦免元昊寇金明寧逺二砦破之遂圍豐州豐孤城無援故陷元昊遣兵分屯要害以絶麟州餉道管勾麟府軍馬事張亢破之于柏子又破之于毛川築十餘柵河外始固知諫院張方平言豐州之陷將校俱被斥而竦為主帥獨不加罪非刑賞之公也乃改判河中分陜西為四路以陳執中知永興軍兼永興軍路經略安撫招討使龐籍知延州兼鄜延路經略安撫招討使韓琦知秦州兼秦鳯路經略安撫招討使范仲淹知慶州兼環慶路經略安撫招討使自元昊反延州城砦焚掠殆盡龐籍至稍葺治之戍兵十萬無壁壘皆散處城中畏籍莫敢犯法籍命部將狄青帥師築招安砦於橋子谷旁以斷寇出入之路又使周美襲取承平王信築龍安砦復於要害築十一城境内所亡地悉復之延民以安初元昊隂誘屬羌為助而環慶酋長六百餘人約為鄉導事覺范仲淹以其反覆不常至部即奏行邊以詔書犒賞諸羌閲其人馬為立條約諸羌皆受命自是始為中國用矣羌人親愛之呼為龍圖老子仲淹以慶州西北馬鋪砦當後橋川口在賊腹中欲城之度賊必爭密遣其子純佑與蕃將趙明先據其地引兵隨之諸將不知所向行至柔逺版築皆具旬日城成即大順城也賊覺以三萬騎来戰佯北仲淹勿追已而果有伏大順既成而白豹金湯皆不敢犯環慶自此寇盜益少仲淹在邊純佑年方冠與將卒錯處鈎深擿隱得其材否由是仲淹任人無失所向有功十一月置涇原強壯弓箭手有事于南郊大赦西方用師帝為旰食然元昊亦困弊漸有自悔之意會將有事于南郊知諫院張方平言曰陛下猶天地父母也豈與犬豕豺狼較乎願因郊赦引咎示信開其自新之路帝喜曰是吾心也乃於赦文通其善意十二月行崇天萬年厯詔天下立義倉壬午二年契丹重熙十一年春正月復京師𣙜鹽法自元昊反聚兵西鄙並邊入中芻粟者寡縣官急於兵食調發不足因聽入中芻粟予劵趨京師𣙜貨務受錢若金銀入中它貨予劵償以解池鹽由是羽毛筋角膠漆鐵炭瓦木之類一切以鹽易之猾商貪吏表裏為姦至入椽木二估錢千給鹽一大席為鹽二百二十斤虚費池鹽不可勝計鹽直益賤販者不行公私無利至是復京師𣙜法凡商人虚估受劵及已受鹽未粥者皆計直輸虧官錢内地州軍民間鹽悉收市入官官為置場増價出之復禁永興軍路十一州商鹽官自輦運以衙前主之又禁商鹽私入蜀置折博務於永興鳯翔聽人入錢若蜀貨易鹽趨蜀中以售已而東南末鹽悉復禁𣙜云二月初置義勇軍詔選河北河東強壯及民丁為軍刺手背為義勇字各營于其州給以奉廩分畨訓練三月晁宗慤罷契丹使蕭特黙来言闗南之地契丹主年漸長國内無事户口蕃息慨然有南侵之意㑹元昊反中國旰食欲乗釁取宋舊割瓦橋闗以南十縣及晉陽之地乃集羣臣議南院樞密使蕭恵曰兩國強弱聖慮所悉宋人西征有年師老民疲陛下親帥六軍臨之其勝必矣南院樞密使蕭孝穆曰我先朝與宋和好無罪伐之其曲在我况勝負未可逆料願熟察之契丹主從恵言乃遣南院宣徽使蕭特黙翰林學士劉六符使宋取故地且問興師伐夏及河東㳂邊䟽濬水澤増益兵戍之故而令諸部㑹師幽州命太弟重元及蕭恵將之以臨南境聲言伐宋夏四月富弼如契丹蕭特黙至吕夷簡奏知制誥富弼為接伴使與中使迎勞之特黙託疾不拜弼曰昔使北病卧車中聞命輒起今中使至而子不拜何也特黙等矍然起拜弼開懐與語特黙感悦亦不復隱其情密以其主所欲得者告曰可從從之不然以一事塞之足矣弼具以聞帝唯許増嵗幣仍以宗室女嫁其子且令夷簡擇報聘者夷簡素不悦弼因薦之集賢校理歐陽脩引顔真卿使李希烈事上疏乞留之不報弼得命即入對叩頭曰主憂臣辱臣不敢愛其死帝為動色進弼樞密直學士弼辭曰國家有急義不憚勞奈何逆以官爵賂焉遂往五月以大名府為北京朝廷聞契丹聚兵幽薊聲言南下議者請城洛陽吕夷簡曰此子囊城郢計也使契丹得渡河雖髙城深池何益我聞契丹畏壯侮怯景徳之役非乗輿濟河則未易服也宜建都大名示將親征以伐其謀帝從之建大名為北京即真宗駐蹕之所城焉秋七月任布罷以吕夷簡章得象兼樞密使帝聞契丹將見侵命河北河東皆為邊備出内蔵銀絹三百萬助軍資置北平軍知諫院張方平以西北用師乞合樞密之職於中書以通謀議帝以為然欲以宰相兼判樞密院事王舉正曰判名重不可不避乃改兼樞密使置宣毅及保捷軍吕夷簡請調諸道弓手刺其壯者為宣毅保捷軍聚于西北張方平力爭之夷簡不聽既而兩軍合二十餘萬皆市人不可用而大為國費富弼還自契丹六月弼至契丹見契丹主言曰兩朝人主父子繼好垂四十年一旦求割地何也契丹主曰南朝違約塞雁門増塘水治城隍籍民兵將以何為羣臣請舉兵而南吾謂不若遣使求地求而不獲舉兵未晚弼曰北朝忘章聖皇帝之大徳乎澶淵之役茍從諸將言北兵無得脱者且北朝與中國通好則人主専其利而臣下無所獲若用兵則利居臣下而人主任其禍故勸用兵者皆為身謀耳契丹主驚曰何謂也弼曰晉髙祖欺天叛君末帝昏亂土宇狹小上下離叛故契丹全師獨克然壯士健馬物故大半今中國提封萬里精兵百萬法令脩明上下一心北朝欲用兵能保其必勝乎就使其勝所亡士馬羣臣當之歟抑人主當之歟若通好不絶歳幣盡歸人主羣臣何利焉契丹主大悟首肯者久之弼又曰塞雁門者備元昊也塘水始於何承矩事在通好前城隍皆修舊民兵亦補闕非違約也契丹主曰微卿言吾不知其詳雖然吾祖宗故地當見還耳弼曰晉以盧龍賂契丹周世宗復取闗南地皆異代事若各求地豈北朝之利哉既退劉六符曰吾主恥受金幣堅欲十縣何如弼曰本朝皇帝言為祖宗守國豈敢妄以土地與人北朝所欲不過租賦爾朕不忍多殺兩朝赤子故屈已増幣以代之若必欲得地是志在敗盟假此為辭耳澶淵之盟天地鬼神其可欺乎明日契丹主召弼同獵引弼馬自近謂曰得地則歡好可久弼反覆陳其不可狀且言北朝既以得地為榮南朝必以失地為辱兄弟之國豈可使一榮一辱哉獵罷六符曰吾主聞公榮辱之言意甚感悟今惟有婚姻可議耳弼曰婚姻易生嫌隙本朝長公主出降齎送不過十萬緍豈若歳幣無窮之利哉契丹主諭弼使還曰俟卿再至當擇一事受之卿其遂以誓書来弼乃還入對具以白帝富弼復如契丹帝復使弼持和親増幣二議及誓書往契丹且命受口傳之詞于政府既行次樂夀謂副使張茂實曰吾為使者而不見國書脱書詞與口傳異吾事敗矣啓視果不同馳還都以晡時入見易書而行九月富弼暨契丹耶律仁先来弼至契丹不復議婚専欲増幣且曰南朝既増我歳幣其遺我之辭當曰獻弼曰南朝為兄豈有兄獻於弟乎契丹主曰然則為納字弼曰亦不可契丹主曰南朝既以厚幣遺我是懼我矣則於一字何有若我擁兵而南得無悔乎弼曰本朝兼愛南北故不憚更成何名為懼或不得已而至於用兵則當以曲直為勝負非使臣之所知也契丹主曰卿勿固執古有之矣弼曰自古唯唐髙祖借兵於突厥當時贈遺或稱獻納其後頡利為太宗所擒豈復有此禮哉聲色俱厲契丹主知不可奪乃曰吾當自遣人議之乃留増幣誓書而使其南院樞密副使耶律仁先漢人副行宫部署劉六符持誓書與弼偕来且議獻納二字弼至入對因曰二字臣以死拒之彼氣折矣可勿許也帝用晏殊議竟以納字與之於是歳増銀絹各十萬與前共五十萬匹兩嵗送至白溝和好復定元昊寇鎮戎軍葛懐敏㑹師禦之次于定川師潰懐敏走死元昊遂大掠渭州而去元昊數入寇掠雖勝而死亡創痍者相半國人困於㸃集財用不給為十不如之謡以怨之知延州龐籍上疏言夏境鼠食稼且旱元昊思納欵詔命知保安軍劉拯諭元昊親信野利剛浪㖫遇乞兄弟言公方持靈夏兵儻内附當以西平茅土分冊之剛浪㖫令浪埋賞乞媚娘等三人詣青澗城种世衡乞降世衡知其詐曰與其殺之不若因以為間留使監税出入騎從甚寵而遣王嵩以棗及畫龜為書置蠟九中遺剛浪㖫喻以早歸之意欲元昊得之而致疑剛浪㖫笑曰种使君年亦長矣何児戲尚爾囚嵩窖中知渭州王㳂涇原副總管葛懐敏亦使僧法淳持書往剛浪㖫乃使其教練使李文貴持書至青澗報世衡言用兵以来資用困乏人情便於和籍曰此詐也乃屯兵青澗留文貴不遣已而元昊果大舉入寇攻鎮戍軍懐敏督諸砦兵禦之保于定川元昊以鐵騎薄之懐敏輕率昧於應變由是大潰懐敏與諸將驅馬東南馳至長城濠路已斷敵周圍之懐敏及將校十四人死焉餘軍九千四百馬六百皆為敵所得元昊乗勝直抵渭州幅員六七百里焚蕩廬舍屠掠民畜自涇邠以東皆閉壘自守范仲淹自將慶州蕃漢兵援之元昊乃還初陳執中安撫京東與賓佐論當今名將共推懐敏獨駐泊將郭逵曰懐敏易與爾喜功徼倖徒勇無謀他日必敗朝廷事至是執中始嘆服其言冬十月梁適如契丹遣知制誥梁適持誓書與耶律仁先等如契丹契丹亦遣使再致誓書且報撤兵自是通好如故十一月復置陜西路安撫經略招討使以韓琦范仲淹龐籍為之置司涇州罷諸路經略使初翰林學士王堯臣為陕西體量安撫使上疏論兵因言韓琦范仲淹皆忠義智勇不當置之散地及葛懐敏敗死中外震懼帝思堯臣之言㑹仲淹附王懐徳入奏乞與韓琦同經略涇原並駐涇州琦兼秦鳯臣兼環慶涇原有警臣與琦合秦鳯環慶之兵掎角而進若秦鳯環慶有警亦可率涇原之師為援臣當與琦練兵選將漸復横山以斷賊臂不數年間可期平定矣願詔龐籍兼領環慶以成首尾之勢委文彦博秦州滕宗諒慶州總之孫沔亦可辦集渭州一武臣足矣帝采用其䇿乃復置陕西路安撫等使總四路之事置府涇州發定州禁軍二萬二千益屯于涇以琦仲淹籍分領陕西之地復以堯臣為體量安撫使徙文彦博帥秦滕宗諒帥慶張亢帥渭州堯臣復言琦等既為陕西四路經略等使則四路當稟節制不當復帶使名各置司行事使所禀不一於是四路並罷經略使琦與仲淹在兵間久名重一時人心歸之朝廷倚以為重二人號令嚴明愛撫士卒諸羌来者推誠撫接咸感恩畏威不敢輒犯邊境天下稱為韓范以泰山處士孫復為國子監直講復晉州平陽人舉進士不第退居泰山著春秋尊王發微十二篇國子直講石介有名山東師事之因語人曰孫先生非隱者也於是范仲淹富弼皆言復有經術宜在朝廷故有是命以富弼為翰林學士固辭不拜弼始受命使契丹聞一女卒再往聞一男生皆不顧得家書未嘗發輒焚之曰徒亂人意故能成兩國之好帝復申樞密直學士之命弼辭又除翰林學士弼懇辭曰増歳幣非臣本意特以方討元昊未暇與爭故忍死爾敢受賞乎癸未三年契丹重熙十二年春正月元昊更名曩霄上書請和西鄙用兵日久帝心厭之欲招懐元昊詔龐籍遣李文貴還以通意元昊復使文貴與王嵩以野利剛浪㖫書至延州議和然猶倔強不肯削僣號且云如日方中止可順天西行安可逆天東下籍以其言未服乃令自請而詔籍復書許之使呼剛浪㖫為太尉籍曰太尉三公非陪臣所得稱使剛浪㖫當之則元昊不得臣矣今其書自稱寧令或謨寧令皆其官名也於義無嫌朝廷從之元昊知朝廷許和有緒乃遣其六宅使賀從勗與李文貴至延州上書闕下自稱男邦泥定國兀卒上書父大宋皇帝更名曩霄而不稱臣兀卒即吾祖也如可汗號籍不敢聞從勗曰子事父猶臣事君也若得至京師天子不許更歸議之籍送使者闕下籍因陳便宜言羌久不通和市國人愁怨今辭理寖順必有改事中國之心請遣使諭之二月立四門學三月以吕夷簡為司空平章軍國重事夷簡感風眩詔拜司空平章軍國重事疾稍愈命數日一至中書裁決可否夷簡力辭帝降手詔曰古謂髭可療疾今剪以賜卿因御延和殿召見敕乗馬至殿門命内侍取兀子輿以前夷簡辭避久之詔給扶毋拜改授司徒監脩國史軍國大事與兩府同議以晏殊平章事兼樞密使賈昌朝參知政事召判蔡州夏竦為樞密使以蔡襄歐陽脩王素知諌院余靖為右正言時増置諫官以蔡襄等四人為之襄喜言路開而慮正人難久立也乃上疏曰任諫非難聽諫為難聽諫非難用諫為難脩等三人忠誠剛正必能盡言臣恐邪人不利正諫必造為禦之之説其禦之不過有三曰好名好進彰君過耳願陛下察之毋使有好諫之名而無其實脩每入對帝必延問執政咨所宜行既多所張㢮小人翕翕不便脩慮善人必不勝數為帝分别言之初范仲淹之貶饒州脩及尹洙余靖皆以直仲淹見逐羣邪因目之曰黨人於是朋黨之論起及仲淹日受眷注脩乃進朋黨論以為君子以同道為朋小人以同利為朋皆自然之勢也然小人無朋惟君子則有之盖小人所好者利禄所貪者財貨當其同利之時暫相黨引以為朋者偽也及其見利而爭先或利盡而反相賊害雖兄弟不能相保君子則不然所守者道義所行者忠信所惜者名節以之脩身則同道而相益以之事國則同心而共濟終始如一故為君子但當退小人之偽朋用君子之真朋則天下治矣脩論事切直人視之如仇帝獨奬其敢言顧侍臣曰如歐陽脩者何處得来夏四月邵良佐如夏州賀從勗至都帝采龐籍言命保安軍判官邵良佐及張士元張子奭王正倫等更往議且許封冊元昊為夏國主嵗賜絹十萬匹茶三萬斤富弼言元昊臣契丹而不臣我朝則是契丹為無敵於天下矣須令稱臣乃可許和蔡襄亦言元昊改吾祖為兀卒特以侮玩朝廷使朝廷賜之詔而亦曰吾祖是何等語耶不可許其請皆不聽邵良佐至夏州元昊亦遣如定聿捨張延夀等来議和及歳幣以韓琦范仲淹為樞密副使以元昊請和故召還時元昊倚契丹邀索無厭晏殊等厭於用兵將一切從之琦力陳其不可帝多納之夏竦至京師罷知亳州以杜衍為樞密使諫官歐陽脩蔡襄等交章論竦在陜西畏懦不肯用力兼之挟詐任數姦邪傾險陛下孜孜政事首用懐詐不忠之臣何以求治中丞王拱辰亦言竦經略西師無功而歸今置諸二府何以厲世因對極論之帝未省遽起拱辰前引裾帝乃悟㑹竦已至國門言者論益力乞毋令入見右正言余靖言竦累表引疾及聞召命即兼驛而馳若不早決竦必堅求面對敘恩感泣復有左右為之地者則聖聽惑矣章累上即日詔竦歸鎮而拜杜衍為樞密使竦亦自請還節鉞徙知亳州竦至亳上書萬言自辯乃徙判并州蔡襄言于帝曰陛下罷竦而用琦仲淹士大夫賀于朝庶民歌于路至飲酒呌號以為歡且退一邪進一賢豈能闗天下輕重哉盖一邪退則其類退一賢進則其類進衆邪並退衆賢並進海内有不泰乎雖然臣竊憂之天下之勢譬猶病者陛下既得良醫矣信任不疑非徒愈病而又夀民醫雖良術不得盡用則病且日深雖有和扁難責效矣國子監直講石介篤學尚志樂善嫉惡喜聲名遇事奮然敢為以章得象晏殊賈昌朝韓琦范仲淹杜衍同時登用而歐陽脩蔡襄余靖王素並為諫官夏竦既拜即罷因大喜曰此盛事也歌頌吾職其可已乎作慶厯聖徳詩以頌諸賢而指夏竦為大姦詩且出其師孫復聞之曰介禍始于此矣司徒吕夷簡致仕夷簡以疾罷議軍國大事固請老遂以太尉致仕朝朔望踰年薨帝見羣臣曰安得憂國忘身如夷簡者自章獻太后臨朝十餘年間天下晏然夷簡之力為多及西夏用師契丹求地夷簡選將命使二邊以寧當國既久頗務收恩避怨以固權利數為言者所詆帝眷倚不衰反斥言者故能於天下之事屈伸舒卷動有操術為世名相獨加幣契丹聚兵西北為後日之患又以私憾成郭后之廢逐孔道輔范仲淹于外為可罪也自正月不雨至于是月帝禱于西太一宫是日雨自正月不雨至于四月遣使祠禱於嶽瀆羣臣請帝親禱于郊帝曰太史言月二日當雨今將以旦日出禱王素曰臣非太史然度是日必不雨帝問其故素對曰陛下知其且雨而禱之應天不以誠故也帝曰然則明日詣醴泉觀素曰醴泉之近猶外朝耳豈憚暑不逺出耶帝悚然更詔詣西太一宫諫官故不在屬車間特命素扈從日甚熾埃氛翳空比車駕還未薄城天大雷電而雨時王徳用進二女素論之帝曰朕真宗皇帝子卿王旦子也有世舊非他人比徳用實進女然已事朕左右奈何素曰臣之憂正恐在左右耳帝動容立命遣二女出宫而賜素以銀緋焉五月丁夘朔日有食之詔諸路轉運兼按察使知諌院歐陽脩言天下官吏既多朝廷無由遍知其賢愚善惡乞立按察之法於内外朝官丞郎中選強幹㢘明者為之使至州縣遍見官吏其公㢘無狀皆以朱書於名之下其中材之人以墨書之嵗具官吏能否以聞詔從之秋七月王舉正罷御史臺舉李徽之為御史舉正友婿也格不行徽之訟曰舉正妻悍不能制如謀國何諫官歐陽脩余靖亦論舉正懦黙不任事范仲淹有相材請罷舉正而用仲淹帝然之舉正遂罷八月詔諫官日赴内朝從知制誥田况之請也以范仲淹參知政事富弼為樞密副使帝以歐陽脩之言拜仲淹參知政事仲淹日執政可由諫官而得乎固辭不拜帝不許乃受命帝方鋭意太平數問當世事仲淹對曰上用我至矣事有先後久安之弊非朝夕可革也帝再賜手詔又為之開天章閣引輔臣入對給以筆札俾條陳其所欲為者仲淹皇恐退而上十事曰明黜陟抑僥倖精貢舉擇長官均公田厚農桑脩武備推恩信重命令減徭役天子方信向仲淹悉采用之宜著令者皆以詔書畫一頒下弼見帝言曰契丹既結好議者便謂無事萬一敗盟臣死且有罪願陛下思其輕侮之恥坐薪嘗膽不忘修政以誥納帝前帝使宰相諭之曰此朝廷特用非以使遼故也弼乃受命時帝以平治責成輔相命弼主北事仲淹主西事弼上當世之務十餘條及安邊十三䇿大畧以進賢退不肖止僥倖去宿弊欲漸易監司之不才者使澄汰所部吏於是小人始不悦之矣詔韓琦宣撫陜西時二府合班奏事琦必盡言雖事屬中書亦指其失同列或不悦帝獨識之曰韓琦性直琦條所宜先行者七事曰清政本念邊計擢材賢備河北固河東收民心營洛邑繼又陳救弊八事曰選將帥明按察豐財利遏僥倖進能吏退不才謹入官去冗食謂數者之舉謗必隨之願委計輔臣聴其注措帝嘉納之命宣撫陕西琦討平羣盜張海郭邈山等禁卒羸老不任用者悉汰之盡脩鄜延城障須敵悉歸所侵地乃許和且陳西北四䇿以為今當以和好為權宜戰守為實務請繕甲厲兵營脩洛都密定討伐之計九月任中師罷冬十月以張昷之王素沈邈為都轉運按察使富弼范仲淹請詔中書樞密二府通選逐路轉運按察使既得人即委使自擇知州不任事者罷之知州擇知縣俟政績有聞一二年方真授之故有是命更定磨勘百官法初太祖以舊制文武常參官各以曹務閒劇為月限考滿即遷非循名責實之道乃罷之而置審官院考課中外職事受代京朝官引對磨勘非有勞績不得進秩其後立法文臣五年武臣七年無贓私罪始得遷秩曽犯贓罪則文臣七年武臣十年中書樞密取㫖其七階選人則考第資歴無過犯或有勞績者遞遷謂之循資淳化四年始置磨勘司然每遇恩慶百僚多得序進真宗即位始罷之惟郊祀恩許加勲階爵邑至是范仲淹富弼以官冗由磨勘亟易至髙位故獲䕃者衆乃令待制以上自遷官後六歳無故則復遷之有過益展年至諫議大夫止京朝官四嵗磨勘至前行郎中止少卿監限七十員有闕乃補少卿監以上遷官聽㫖其法始密于舊矣契丹北院樞密使蕭孝穆卒孝穆位髙益畏與人交始終如一所薦拔皆忠直嘗語人曰樞密選賢而用何事不濟若自親煩碎則大事凝滯矣自蕭和卓以吏才進位宰相其後轉效不知大體孝穆歎曰不能移風易俗偷安爵位臣子之道若是乎時稱為國寳臣十一月上清宫火更定䕃子法太祖初定任子之法臺省六品諸司五品登朝嘗歴兩任然後得請太宗即位諸州進奏者授以試銜及三班職尋特定選人七等凡誕聖節及三年南郊皆聽奏一人而特恩不預焉由是奏薦之恩廣至是范仲淹富弼始裁損其制凡選人遇部赴銓試不試者永不預選且罷聖節奏䕃恩自是任子之恩殺矣十二月契丹改政事省為中書省通鑑續編卷六
