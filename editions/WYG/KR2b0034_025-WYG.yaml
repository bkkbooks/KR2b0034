body:
  text: 通鑑續編卷二十二元陳桱撰甲午端平元年金天興三年末帝承麟元年太宗皇帝六年是嵗金亡春正月金主守緒傳位于東面元帥承麟孟珙入蔡州蒙古師從之金主守緒及尚書右丞完顔呼沙呼死之金主承麟死於兵江海獲金參知政事張天綱以歸金亡正月庚子朔蒙古兵以正旦㑹飲歌吹之聲四望相接城中饑窘歎息而已辛丑孟珙見黒氣壓城上日無光降者言城中絶糧已三月鞍靴敗鼓皆麋煮且聽以老弱互食諸軍日以人畜骨和芹泥食之又往往斬敗軍全隊拘其肉為糧故欲降者衆珙乃下令諸軍銜枚分運雲梯布城下以攻之金自被圍以來戰殁将帥甚衆至是禁近以及舍人牌印省部掾屬亦皆供役分守四城戊申蒙古兵鑿西城為五門整軍以入督軍鏖戰及暮乃退聲言來日復集是夕金主集百官傳位於東面元帥承麟承麟拜泣不敢受金主曰朕所以付卿者豈得已哉以朕肌體肥重不便鞍馬馳突卿平日趫㨗有将略萬一得免祚𦙍不絶此朕志也承麟因起受璽己酉承麟即位時孟珙之師向南門至金字樓列雲梯令諸軍聞鼓則進馬義先登趙榮繼之萬衆競進大戰城上烏庫哩鎬及其将帥二百人皆降金百官稱賀禮畢亟出捍敵而南城之陴已立宋旗幟矣俄頃四面鼓譟夾攻聲震天地南面守者棄門走門西開孟珙招江海諾廷布展之師以入金右丞呼沙呼帥精兵一千巷戰不能禦之金主守緒知事急即取寳玉寘於幽蘭軒環之以草命侍臣曰死便火我遂自經死呼沙呼聞之謂将士曰吾君已崩吾何以戰為吾不能死於亂兵之手吾赴汝水從吾君矣諸君其善為計言訖赴水死将士皆曰相公能死吾輩獨不能耶於是參政富珠哩羅索烏凌阿呼圖克總帥元志元帥王善爾赫舎哩柏夀烏庫哩和勒端及軍士五百餘人皆従死焉金主承麟退保子城聞金主守緒死帥羣臣入哭因謂衆曰先帝在位十年勤儉寛仁圖復舊業有志不就可哀也已吾欲諡之哀何如衆從之奠未畢城已陷諸将禁近共舉火焚之奉御經實收其骨将瘞之汝水上江海入宫執參政張天綱孟珙問金主所在天綱曰城危時自經矣今烟焰未絶也珙乃與諾延布展分金主骨及璽寳玉帶金銀印牌有差是日末帝承麟亦為亂兵所殺金亡承麟者世祖和哩布之後平章博索之弟也金自宣宗之世為宰相樞密者往往臨事推讓低言緩語以為養相體每有四方兵革災異輙以聖主心困或俟再議因循苟且以度時日及出兵則以近侍監戰每臨事多所牽制故師出無功國亂不聞以底於亡以不擅為嗣濮王追封榮王希瓐三世祖考為國公詔太師榮王已進王爵宜封三代乃封故修武郎子奭吴國公伯旿益國公師意越國公妣皆國夫人及蒙古以陳蔡為疆各引師歸陳蔡東南為宋西北為蒙古蒙古以劉福為河南道總管而去史嵩之使郭春詣奉先汛掃諸陵史嵩之使孟珙還師襄陽江海還師信陽王旻戍随州王安國守棗陽蔣成守光化楊恢守均州並益兵飭備經理屯田於唐鄧州金穆延烏登以息州來歸蒙古追殺之取其城烏登行省於息州與諸帥日以歌酒為樂軍士淫縦及聞蔡州破乃與富珠中羅索𤓰爾佳玖珠等送欵於宋為金主發喪設祭上諡曰昭宗州民羣奉烏登為丞相羅索為平章皆娶婦壬子舉城南遷宋人焚樓櫓蒙古望見大起追及於羅山盡殺之且索行省已下官屬於宋宋託以犒賞召入城自萬户以下凡七百人皆被殺蒙古兵至宋人歛避金兵悉見誅二月以趙彦呐為四川安撫制置使兼知興元府蒙古入金徐州完顔用安自殺三月以賈似道為籍田令似道涉之子而貴妃之弟也少落魄為㳺博不事操行以䕃補嘉興司倉帝以貴妃故累擢籍田令恃寵不檢日縦逰諸妓家至夜即燕逰湖上不反帝嘗夜慿髙望西湖中燈火異常時語左右曰此必似道也明日詢之果然使京尹史巖之戒之巖之對曰似道雖有少年習氣然其才可大用也由是帝眷注矣詔太常主簿朱揚祖詣洛陽省謁八陵史嵩之露布至詔遣朱揚祖林拓往省謁八陵尋復遣朱復之詣八陵相度修奉夏四月獻金俘於太廟論功行賞有差史嵩之遣使以孟珙所獲金哀宗遺骨及寳玉法物并俘囚張天綱完顔好海等獻於臨安四月丙戍備禮告於太廟蔵其骨於大理寺獄庫加孟珙帶御器械江海已下論功行賞有差知臨安府薛瓊問天綱曰有何面目到此天綱曰國之興亡何代無之我金之亡比汝二帝何如瓊叱之明日奏其語帝召天綱問曰汝真不畏死耶天綱對曰大丈夫患死之不中節耳何畏之有因祈死不已帝不聴初有司令天綱供状必欲易其所書故主天綱曰殺即殺焉用状為有司不能屈聽其所供天綱但書故主而已聞者憐之後莫知其所終監察御史王遂言史嵩之本不知兵矜功自侈謀身詭祕欺君誤國留之襄陽一日則有一日之憂洪咨䕫亦言殘金雖滅隣國方强益嚴守備猶恐不逮豈可動色相賀渙然解體以重方來之憂哉皆不報五月以趙范為兩淮制置使兼知黄州賜黄幹李燔李道傳陳宓樓昉徐暄胡夢昱等諡録用其子以其阨於權姦而各行其志没齒無怨也蒙古以嚴實為東平路行軍萬户蒙古之有山東實功為多初實所統有全魏十分齊之三魯之九凡五十四城至是畫境割大名彰徳外屬而益以徳兖濟單四州實統地既廣為東方牧伯之長時所在殘毁實披荆棘扞豺狼弊衣糲食暴露風日挈溝壑轉徙之民置之袵席之上勸耕稼豐委積辟用賢良汰逐貪墨所統治安東平遂為樂土四方之民争赴之實為之合散亡業單貧舉喪葬助婚嫁莫不感其恵焉招徕名士置諸幕府後多為賢公卿六月以曽從龍參知政事喬行簡知樞密院事鄭性之陳徳剛僉書院事詔復巴陵縣公竑官爵賜竑妻吴氏號慧浄法空大師從陳徳剛及太常少卿徐僑之請也趙范趙葵請復三京詔全子才㑹師趨汴金故将李伯淵等誅崔立以降趙范趙葵欲乗時撫定中原建守河據闗收復三京之議朝臣多以為未可獨鄭清之力主其說乃命趙范移司黄州刻日進兵范參議官丘岳曰方興之敵新盟而退氣盛鋒銳寧肯捐所得以與人耶我師若往彼必突至非惟進退失據開釁致兵必自此始且千里長驅以争空城得之當勤餽饟後必悔之范不聼史嵩之亦言荆襄方爾飢饉未可興師杜杲復陳守境之利出師之害喬行簡時在告上疏曰八陵有可朝之路中原有可復之機以大有為之資當大有為之㑹則事之有成固可坐而䇿也臣不憂師出之無功而憂事力之不可繼有功而至於不可繼則其憂始深矣夫自古吳君必先治内而後治外而今内未盡治也欲用其民必先得其心以為根本而數十年來上下皆懐利以相接耳規恢進取必須選将練兵豐財足食而今将之卒寡財匱食竭臣恐北方未可圖而南方已先騷動矣願堅持聖意定為國論以絶紛紛之說皆不聴而詔知廬州全子才合淮西兵萬人赴汴時汴京都尉李伯淵李琦李賤奴等為崔立所侮謀殺之及聞子才軍至伯淵等以書約降而陽與立謀備禦之䇿六月伯淵燒封丘門外以警動立立殊不安伯淵等乃來約立視火立從苑秀折希顔等數騎往諭京城民十五以上七十以下男子皆詣太廟街㸃集既還行及梳行街伯淵欲送立還府立辭數四伯淵必欲親送立不疑倉卒中就馬上抱立立頋曰汝欲殺我耶伯淵曰殺汝何傷即出匕首横刺之洞而中其手之抱立處再刺之立墜馬死伏兵起元帥三合殺苑秀折希顔後至不知見立墜馬謂與人鬬欲前解之随為軍士所殺伯淵繋立屍馬尾至内前號于衆曰立殺害刼奪烝淫暴虐大逆不道古今無有當殺之否萬口齊應曰寸斬之未稱也乃梟立首望承天門祭哀宗伯淵以下軍民皆慟或剖其心生噉之以三屍掛闕前槐樹上樹忽㧞起人謂樹有靈亦厭其所為也趙葵帥師㑹全子才於汴秋七月葵遣徐敏子帥師入洛陽蒙古還師南下全子才次於汴趙葵自滁州以淮西兵五萬取泗州由泗趨汴以㑹之葵謂子才曰我輩始謀據關守河今已抵汴半月不急攻洛陽潼關何待耶蒙古聞宋來争河南還師赴之決黄河寸金淀之水以灌宋師宋師多溺死時盛夏行師汴隄亦決水潦泛溢史嵩之又不致餽糧用不繼而所復州郡率皆空城無兵食可因子才難之葵督促益急乃檄鈐轄范用吉樊􅇳李先胡顯等提兵萬二千命淮西制置司機冝文字徐敏子為監軍先令西上又命楊誼以廬州强弩軍萬五千繼之各給五日糧諸軍以糧少為辝七月庚辰徐敏子唘行乙酉和州寧淮軍正将張迪以二百人趨洛陽蒙古聞迪來乃伏軍士於城外驅民出城以誘之迪至城下城中􅄫然無應者至晚有民庶三百餘家登城投降迪與敏子遂帥衆入城八月朱揚祖還自洛陽朱揚祖朝陵行至襄陽㑹諜報蒙古兵傳宋來争河南府哨已及孟津陕府潼關河南皆増屯戍設伏兵又聞淮閫刻日進師衆畏不前孟珙曰淮東之師由淮泗遡汴非旬餘不逹吾選精騎疾馳不十日可竣事逮師至東京吾已歸矣於是珙與二使畫夜兼行至陵下奉宣御表成禮而還至臨安入對以八陵圖上進帝問諸陵相去㡬何及陵前澗水新復揚祖悉以對帝含淚太息久之以趙范為京河關陜宣撫使知開封府東京留守趙葵為京河制置使知應天府南京留守全子才為關陜制置使知河南府西京留守京湖制置使史嵩之免詔嵩之與趙范掎角以復三京嵩之力陳非計故奉祠蒙古師至洛陽城下徐敏子以師還趙葵全子才遂棄汴而歸徐敏子入洛之眀日軍食已竭乃采蒿和麪作餅而食之楊誼至洛東三十里方散坐蓐食忽數里外有立紅黄涼繖者衆方駭異而蒙古伏兵突起深蒿中楊誼倉卒無備師遂大潰為蒙古擁入洛水者無數誼僅以身免是晚有潰卒奔告於洛曰楊誼一軍已為蒙古大陣衝散今蒙古兵已據北岸矣于是在洛之師皆奪氣八月􅃋旦蒙古兵至洛陽城下立寨敏子與戰勝負相當士卒乏糧因殺馬而食敏子等不能留乃班師趙葵全子才遂皆引師南還趙范以入洛之師敗績上表劾蔡子才輕進偏師趙楷劉子澄參賛失計師退無律致後陣覆敗詔貶秩有差鄭清之力請解政不許喬行簡上言三京撓敗之餘事與前異但當益修戰守之備帝嘉納之九月以趙范為京湖制置大使知襄陽府詔趙葵措置河南京東營田邊備全子才措置唐鄧息州營田邊備陳徳剛卒徳剛居位七日而卒帝深惜之召真徳秀為翰林學士魏了翁直學士院帝因民望召還二人徳秀入對帝迎謂曰卿去國十年每切思賢徳秀以大學衍義上進因言于帝曰天之所助者順人之所助者信天厭禍亂久矣陛下儻能敬徳以迓續休命中原終為吾有若徒以力求之而不反其本天意難測臣實憂之了翁入對言事剴切反覆利害之端至漏下四十刻乃退帝皆嘉納之冬十月陳貴誼卒以孟珙兼御前忠義軍都統制珙留襄陽招中原精銳之士萬五千餘人分屯漅北樊城新野唐鄧間以備蒙古名鎮北軍詔以為襄陽府駐劄御前忠義軍命珙兼領之十二月蒙古使王檝來以鄒伸之為報謝使蒙古使王檝來言曰何為而敗盟也自是淮漢之間無寧日矣乙未二年太宗皇帝七年春正月以程芾為蒙古通好使詔孟珙黄州駐劄措置邊防珙赴樞密院稟議因入對帝曰卿名将子忠動體國破蔡滅金功緒昭著珙對曰此宗社威靈陛下聖徳與三軍将士之勞臣何力之有授武功郎主管侍衛馬軍司公事時暫黄州駐劄朝辭帝問恢復珙對曰願陛下寛民力蓄人材以俟機㑹帝問和議珙對曰臣介胄之士當言戰不當言和賜賚甚厚珙至黄増埤浚隍蒐訪軍實邉民來歸者日以千數為屋三萬間以居之厚加賑貸又慮軍民雜處因髙阜為齊安鎮淮二砦以居諸軍二月蒙古城和林和林本唐回鶻毗伽汗之故城蒙古以為㑹同之所至是城之周回五里許正殿曰萬安三月以真徳秀參知政事陳卓同簽書樞宻院事夏五月真徳秀卒徳秀拜參知政事時已得疾遂三上表乞祠帝不得已授資政殿學士提舉萬夀官逾旬而卒徳秀立朝不滿十年奏疏将數十萬言皆切當世要務直聲震朝廷四方文士誦其文想見風采及官逰所至恵政深洽不愧其言由是中外交頌都城人時驚傳澒洞奔擁出關曰真直院至矣果至則又填塞聚觀不置史彌逺以是忌之輙擯不用而聲聞愈章及歸朝将大用則既衰矣然自韓侂胄立偽學之名以錮善類凡近世大儒之書皆顯禁絶之徳秀晚出獨慨然以斯文自任講習而服行之黨禁既開正學遂眀于後世徳秀之力為多馬六月以鄭清之喬行簡為左右丞相並兼樞宻使曽從龍知樞宻院事鄭性之同知院事陳卓簽書院事葛洪免召崔與之參知政事不至與之自成都乞歸廣州每有除命皆力辭不起及拜廣東安撫㑹摧鋒軍士作亂與之肩輿登城叛兵望之俯伏聴命而散因即家治事帝注想彌切及召參大政與之力辭帝乃遣使趣之且訪以政事之當行罷者人才之當用舍者與之上疏曰天生人才自足以供一代之用惟辨其君子小人而已忠實而有才者上也才不髙而忠實有守者次也用人之道無逾于此帝嘉納之召命益力與之控辭至十三疏不許蒙古奎騰太子侵蜀漢太宗皇帝命奎騰太子子侵蜀漢庫裕克太伐西域唐古和爾齊伐髙麗蒙古人每甲一名西征一名南征中州户十户一名南征一名伐髙麗秋七月蒙古侵唐州知随州全子才知棗陽軍劉子澄棄師走趙范帥師敗蒙古于上閘而還冬十月金鞏昌總帥汪世顯降于蒙古金亡郡縣皆降獨世顯堅守不下一日謂其衆曰宗祀已矣吾何愛一死千萬人之命懸于吾手平居享髙爵厚禄死其分也餘者何罪與其自􅀴于溝瀆姑徇一時之節孰若屈已紓斯人之禍㑹蒙古太子奎騰入蜀次于鞏昌城下世顯率耆老持牛羊酒幣迎謁太子謂之曰吾征討有年所至皆下汝獨固守何也世顯曰有君在上賣國市恩之人諒所不取太子大悅戒其下秋毫勿犯俾世顯仍舊職即日令帥所部従征世顯遂截嘉陵進趨大安太子資其糧械以入蜀十二月以魏了翁同僉書樞宻院事督視江淮京湖軍馬了翁在朝凡六月前後二十餘疏皆當世急務帝将引以共政而忌者相與合謀排擯之且言了翁知兵體乃命出視師賜便宜詔書如張浚故事陛辭御書唐嚴武詩及鶴山書院四大字賜之了翁開幕府于江州以吴􅅗為參謀官趙善翰馬光祖為參議官曽從龍卒以余嶸同僉書樞宻院事蒙古奎騰太子入沔州知州事髙稼死之稼在沔葺理創殘招集流散民皆襁負歸之又數與蒙古力戰竒功甚多至是蒙古自鳯州入四川東路之師多敗遂𢷬西池谷距沔九十里吏民議退保大安稼言于制置使趙彦呐曰今日之事有進無退若能進據險地以身捍蜀敵有後顧必不深入若倉皇召兵退守内地敵長驅而前蜀事去矣彦呐曰吾志也已而竟行留稼守沔蒙古自白水關入六股株距沔六十里沔無城依山為阻稼升髙鼔噪盛旗鼓為疑兵彦呐至置口輟帳前總管和彦威以軍還沔召小校楊俊何璘以兵㑹又選精兵千人命王宣帥以助之已而蒙古大至何璘遁沔州遂陷衆擁稼出户稼叱之不能止敵圍殺之蒙古圍青野原曹友聞救郤之趙彦呐聞髙稼死沔州破乃進屯青野原蒙古圍之知天水軍曺友聞曰青野為蜀咽喉不可緩也即往救之夜半截戰遂解其圍既而蒙古先鋒汪世顯𢷬大安友聞又救之指麾甫畢蒙古大軍數萬突至友聞迎戰又敗之敵乃退友聞遂引兵扼仙人關安南入貢丙申三年太宗皇帝八年春正月蒙古侵江陵統制李復眀死之二月蒙古侵蘄州孟珙帥師救卻之蒙古初行交鈔從耶律楚材之請也以萬定為額召魏了翁還以為僉書樞宻院事固辭不拜廷臣多忌了翁者故謀假出督以外之甫二旬復以建督為非而召之還而帝不悟於是了翁固辭求去以陳韡為沿江制置使知建康府史嵩之為淮西制置使知廬州三月襄陽将王旻等作亂以城降於蒙古趙范在襄陽以北軍主将王旻李伯淵樊文彬黄國弼等為腹心朝夕酣狎了無上下之分民訟邉防一切廢弛既而南北軍交争范失於撫馭於是旻伯淵焚襄陽城郭倉庫相繼降於蒙古時城中官民尚四萬七千有竒財粟在庫倉者無慮三十萬軍器二十四庫皆為蒙古所有金銀鹽鈔不與馬南軍主将李虎不救焚不定變反因勢刼掠襄陽為之一空自岳飛收復以來生聚繁庶城髙池深甲於西陲一旦厌燼禍至慘也詔削趙范三官仍舊職任夏四月魏了翁罷乞歸田里也詔悔開邊時師屢為蒙古所敗襄漢淮蜀日事兵争帝悔前事命學士吴泳草詔罪已泳以監察御史王萬忠伉有大志精於邉防以詔童訪之萬曰兵固失矣言之甚恐亦不可今邉民生意如髪宜以振厲奮發興感人心因為條具沿邉事宜泳從其言草詔上進其略曰自江閩之羣盗弗靖暨淮楚之逆雛為妖數年之間多難已甚屬讎金之寖滅而蒙古之典隣不利西南盖嘗躪階成而擾興沔其在辛卯遽已穿金房以瞰襄樊逮合謀成破蔡之功恐假道有及虞之勢心之憂矣臍可噬乎固将布失于國中以志吾過但使留屯于塞上自守我疆忽西陲之弗寧駭北騎之深入賴仙原有以議後而蜀道得以安全然虐燄之所經視曩嵗而尤惨重以唐均之叛将發此京湖之禍機肆荼毒於列城至蔓延於他路兵民之死戰鬬户口之困流離室廬靡存骼胔相望致援師之暴露及科役之繁苛為之騷然有足閔者是皆朕眀不能燭徳有未孚上無以格乎天之心下無以定乎民之志今方施令行政以為綏輯之圖補卒蒐乗以嚴守禦之備想瘡痍之溢目如疾病之在身蒙古取襄陽府随郢州荆門軍蒙古命呼嚕呼括漢民戸數初蒙古惟事進取所降之户因以與将士自一社一民各有所主不相統攝至是詔括户口以大臣呼嚕呼領之民户始𨽻州縣時羣臣共欲以丁為户耶律楚材以為不可衆皆曰我朝及西域諸國莫不以丁為户豈可捨大朝之法而從亡國之政耶楚材曰自古有中原者未嘗以丁為户若果行之可輸一年之賦随即逃散矣太宗皇帝從楚材之議時諸王大臣諸将所得驅口往往寄留諸郡㡬居天下之半楚材請因括户口皆籍為民帝從之五月以趙葵為淮東制置使兼知揚州葵至揚墾田治兵邉備以飭秋七月陳卓罷以鄭性之參知政事李鳴復僉書樞宻院事八月京湖制置大使趙范有罪免討失襄陽之罪也蒙古取棗陽軍徳安府初蒙古破許州獲金軍資庫使姚樞楊惟中見之以兄事樞時北庭無漢人士大夫太祖皇帝見樞至甚喜特加重焉及奎騰太子南伐俾樞従惟中即軍中求儒釋道醫卜之人樞招致稍衆至是破棗陽大将忒沒歹欲阬士人樞力與辨得脫死者數十人繼㧞徳安得趙復以儒學見重於世其徒稱為江漢先生既被獲不欲北行力求死所樞譬說百端復始悟樞與至燕學徒百人由是北方始知􅀴學而樞亦初得覩程朱性理之書焉蒙古以中原民户分𨽻宗戚六月呼嚕呼以所括户一百四萬上于太宗皇帝帝命分賜諸王貴族為湯沐邑耶律楚材奏曰尾大不掉易以生隙不如多與金帛足以為㤙帝曰業已許之矣楚材曰若設官吏必自朝命本投下止設逹嚕噶齊嵗賦以七分為率五分入府蔵二分為湯沐之資非恒賦外不令擅自徴斂或可耳從之於是皇后太子公主駙馬貴戚皆有分地矣九月辛未有事於眀堂大雨震電鄭清之喬行簡免召崔與之為右丞相兼樞宻使辭不至利州統制曹友聞及蒙古戰於陽平關敗績死之蒙古奎騰太子遂入蜀次于成都曹友聞帥師扼仙人關諜報蒙古太子合蕃漢軍五十餘萬将至友聞謂弟萬曰國家安危在此一舉衆寡不敵豈容浪戰惟當乗髙據險出竒設伏以待之蒙古攻武休關敗都統李顯忠軍遂入興元欲衝大安軍制置使趙彦呐檄友聞控制大安以保蜀口友聞以為不可彦呐不従友聞乃遣弟萬及友諒引兵上雞冠隘多張旗幟示敵堅守友聞選精銳萬人夜渡江宻往流溪設伏約曰敵至内以鳴鼔舉火為應外呼殺聲蒙古兵果至萬出逆戰蒙古巴圖爾擁萬騎逹海帥千人往來摶戰矢石如雨萬身被數創令諸軍舉烽友聞遣統制楊大金馮大用引本部出東萊園撃敵後隊總管夏用趙興帥本部出水嶺撃敵中隊總管吕嗣徳陳庚帥本部出龍泉頭擊敵前隊友聞親帥精兵三千人疾馳至隘下先遣統領劉虎帥敢死士五百衝敵前鋒不動友聞乃伏三百騎道旁而令虎銜枚突陣㑹大風雨諸将請曰雨不止淖濘深沒足宜俟少霽友聞叱曰敵知我伏兵在此緩必失機遂擁兵齊進友聞入龍尾頭萬聞之五鼔出隘口與友聞㑹内外兩軍皆殊死戰血流二十里西軍素以棉裘代鐵甲􅀴雨濡濕不利步鬬黎眀蒙古兵益増以鐵騎四面圍繞友聞嘆曰此殆天乎吾有死而已於是極口詬罵殺所乗馬以示必死血戰愈厲與弟萬俱死軍盡没蒙古兵遂長驅入蜀一月之間成都利州潼川三路所屬府州軍監關隘縣砦俱陷沒太子次於成都四蜀所存惟䕫州一路及潼川府路所屬瀘合州順慶府而已冬十月蒙古奎騰太子自成都入文州守臣劉蛻趙汝曏死之立陳日煚為安南國王十一月以喬行簡為左丞相兼樞宻使蒙古扣肯布哈入淮西詔史嵩之趙葵陳韡援之扣肯布哈入淮西蘄舒光州守臣皆遁扣肯布哈合三州人馬糧械趨黄州逰騎自信陽趨合肥詔淮西史嵩之援光淮東趙葵援合肥沿江陳韡過和州為淮西聲援蒙古特黙台侵江陵孟珙帥師敗之特黙台攻江陵史嵩之遣珙救之珙遣張順先渡而自以全師繼之變易旌旗服色循環往來夜則列炬照江數十里相接珙又遣趙武等與戰珙親往節度遂破蒙古二十四砦還民二萬而歸蒙古侵真州知州丘岳敗之蒙古攻真州岳部分嚴眀守具周悉蒙古兵薄城輒敗岳乗滕出戰於胥浦橋以強弩射其致師者一人死之敵兵少卻岳曰敵衆十倍於我不可以力勝也乃為三覆設砲石待之於西城敵至伏起砲發殺其驍将敵衆大櫌岳選勇士襲敵營焚其廬帳越二日皆引去蒙古始定户口田畆鹽商賦稅之法蒙古既括户數乃定賦稅每二户出絲一斤以供官用五户出絲一斤以與受賜貴戚功臣之家上田每畆稅三升半中田三升下田二升半水田畆五升商稅三十分之一鹽每銀一兩四十斤已上以為永額朝臣皆謂太輕耶律楚材曰将來必有以利進者則已為重矣既而燕京劉忽篤馬隂結權貴以銀五十萬兩樸買天下差發涉獵發丁以銀二十五萬兩撲買天下係官廊房地基水利猪雞劉庭玉以銀五萬兩撲買燕京酒課又有回回以銀一百萬兩撲買天下河泊橋梁渡口者楚材曰此皆姦人欺下罔上為害甚大咸奏罷之蒙古命括牝馬于中原未行而罷近臣有請刷漢地牝馬者太宗皇帝從之耶律楚材諌曰漢地所有繭􅁝五穀耳非産馬之地若今日行之後必為例是徒擾天下也乃止又侍臣托歡奏選室女楚材諌止之帝怒楚材曰向所刷室女二十八人尚在燕京足備使令而托歡傳㫖又欲徧行選刷臣恐重擾百姓耳帝乃止復成都府丁酉嘉熈元年太宗皇帝九年春正月以李􅌫同知樞宻院事四川宣撫使知成都府二月以鄭性之知樞宻院事鄒應龍僉書院事李宗勉同僉書院事詔經筵兼進講朱熹通鑑綱目蒙古選試儒者及釋道之人耶律椘材言僧道中避役者多合行選試遂汰三教僧道試􅀴通者給牒受戒居寺觀儒人中選者則復其家蒙古始給官府符印初諸路官府自為符印僭越無度耶律楚材奏並仰中書省依式鑄造由是名器始重蒙古始定驛令時諸王貴戚皆得自起驛馬而使臣猥多馬悉之則豪奪民馬乗之城郭道路騒擾所至須索百端供饋稍緩輒被箠撻館人不能堪耶律楚材請給牌劄定飲食分例其弊始革焉三月蒙古伐欽察烏魯斯黙爾竒斯部皆降之欽察去中國三萬餘里夏夜極短日暫没輒出土産良馬富者以萬計俗袵金革勇猛剛烈青目赤髪至是憲宗皇帝受命帥師至衮騰吉斯海㑹大風海水涸遂進師屠其衆生獲其酋長巴特瑪命之跪巴特瑪曰我國王也且非駝何可跪人終不以是求生乃舎之夏六月鄒應龍罷孟珙敗蒙古於黄州蒙古扣肯布哈攻黄州甚急珙帥師救之入城軍民喜曰吾父來矣駐帳城樓指畫戰守屢敗蒙古之師卒全其城臨安大火臨安大火自己至酉燒民廬五十三萬士民上書咸訴濟王之寃侍御史蒋峴史彌逺之黨也上疏謂火災天數何預故王遂劾方大琮王逸劉克荘等鼓扇異論同日去國并斥進士潘昉姓同逆賊語涉不順請論以漢法自是羣臣無敢復言濟王之寃矣詔建内小學擇宗子十嵗以下資質美者二三人置師教之秋八月追封趙汝愚為福王以李鳴復參知政事李宗勉僉書樞宻院事冬十月蒙古侵安豐知軍事杜杲敗之蒙古自淮西北還扣肯布哈攻安豐杜杲繕完守禦蒙古以火砲焚樓櫓城多堕陷杲随補完蒙古令巴圖爾硬軍斫牌权木杲募善射者用小箭射其目巴圖爾多傷而退䝉古填壕為二十七埧杲分兵扼埧蒙古乘風縦火俄而風雪驟作杲募壮士奪埧路士皆奮躍死戰㑹池州都統制吕文徳突圍入城與杲合力捍禦蒙古引去淮西以安文徳安豐人魁梧勇悍甞粥薪城中趙葵見其遺履長尺有咫異而訪之留置帳下遂累功勞超擢軍職十二月戊寅朔日有食之詔陳韡史嵩之趙葵守禦淮漢戊戍二年太宗皇帝十年春正月以余天錫同僉書樞宻院事二月以史嵩之參知政事督視京西荆湖江西路光蘄黄䕫施州軍馬置司鄂州蒙古使王檝來詔朱揚祖送之以孟珙為京湖制置副使置司松滋縣三月以周次說為蒙古通好使以李心傳為史館修撰初隆州井研人李舜臣博學力行多所著述尤邃於易嘗曰易起於畫理事象數皆因畫以見舍畫而論非易也畫従中起乾坤中畫為誠眀朱熹每為學者稱之有子三人曰心傳道傳性傳心傳閉户著書有史才通故實至是召為修撰専脩髙孝光寧四朝實録道傳尤眀河洛之學操行脩潔夏四月以李􅌫督視江淮京湖軍馬以丁黼為四川制置使兼知成都府五月以李鳴復知樞宻院事余天錫僉書院事李宗勉參知政事喬行簡請以兵事委鳴復財用委宗勉楮幣委天錫當㑹議者臣則參酌行之帝從其請詔崔與之提舉洞霄宫與之未嘗造朝帝嘗虚位待之至是始得奉祠任便居住踰年卒年八十二與之出自番禺所歴皆有政恵衆以公輔望之而與之屹然有大臣風竟與唐張九齡齊名異代良可尚也哉六月李􅌫卒秋七月以趙以夫同知樞宻院事九月蒙古圍廬州知州杜杲敗之詔加杲淮西制置使蒙古察罕帥兵號八十萬圍廬州期破廬後造舟巢湖以窺江左於壕外築土城周圍六十里穿兩壕攻具皆數倍于攻安豐時杜杲極力守禦蒙古築埧髙於城樓杲以油灌草即埧下煉之皆為煨燼又於串樓内立鴈翅七層俄砲中埧上衆驚杲乗勝出戰蒙古敗走杲追躡數十里杲又練舟師扼淮河遣其子庶監呂文徳聶斌伏精銳於要害蒙古不能進遂引師北歸以孟珙為京湖制置使知岳州冬十月史嵩之復光州孟珙復郢州荆門軍珙受詔收復京襄珙謂必得郢然後可以通餽饟得荆門然後可以出竒兵及至岳州檄江陵節制使𢷬襄郢召諸将指受方略發兵深入於是張俊復郢州賀循復荆門珙以諸将皆捷乃以蔡息降人置忠衛軍襄郢降人置先鋒軍蒙古領中書行省楊惟中建太極書院於燕京延趙復為師時濂溪周子之學未至於河朔楊維中用師於蜀湖京漢得名士數十人始知其道之粹乃收集伊洛諸書載送燕京及師還遂建太極書院及周子祠以二程張楊游朱六子配食又刻太極圖通書西銘於祠壁請趙復為師儒王粹佐之選俊秀有識度者為道學生由是河朔始知道學己亥三年太宗皇帝十一年春正月以喬行簡為少傅平章軍國重事行簡十上章請謝事詔用元祐故事以尊異之以李宗勉為左丞相兼樞宻使史嵩之為右丞相兼樞宻使督視江淮四川京湖軍馬嵩之自鄂入見故就命之時三相當國論者謂喬失之泛李失之隘史失之専云以余天錫參知政事游佀同僉書樞宻院事三月孟珙復信陽光化軍樊城襄陽府襄陽既復珙奏曰取襄不難而守為難非将士不勇也非車馬器械不精也實在乎事力之不給爾襄樊為朝廷根本今百戰而得之當加經理如䕶元氣非甲兵十萬不足分守與其抽兵於敵來之後孰若保此全滕上兵伐謀此不争之争也乃益置先鋒馬夏五月蒙古遣使如髙麗䝉古既伐髙麗髙麗屢敗乃復入貢請平蒙古令其王暾親朝當罷兵秋八月以游佀參知政事許應龍僉書樞宻院事林略同僉書院事蒙古塔海復取成都制置使丁黼敗死蒙古遂取漢卭簡眉閬蓬文州遂寧重慶順慶府冬十月許應龍林略罷十一月以范鍾僉書樞宻院事十二月孟珙遣師分道禦蒙古於蜀口遂復䕫州孟珙聞蒙古塔海及秃雪帥衆號八十萬南侵䇿其必道施黔以透湖湘乃請粟十萬石以給軍餉以二千人屯峽州千人屯歸州命弟瑛以精兵五千駐松滋為䕫州聲援于徳興增兵守歸州隘口萬户谷及蒙古至珙宻遣劉全帥師禦之命伍智思以千人屯施州蒙古既入蜀珙增置營砦分布戰艦遣張仲舉提兵間道抵均州防遏且設䇿備禦未㡬蒙古渡萬州湖灘施䕫振動珙兄璟時知峽州帥兵迎拒於歸州大埡砦㑹蒙古於襄樊随信陽招集軍民布種積船材於鄧之順陽珙遣張漢英出随任義出信陽焦進出襄分路撓其勢遣王堅潛兵燒所積船材又度敵必因糧於蔡遣張徳劉整分兵入蔡火其積聚且條上方略由是京湖稍安其業遂復䕫州以陳塤為國子司業塤史彌逺之甥而徳剛之族弟也紹定中為太常博士上疏乞去君側之蠱媚以正主徳從天下之公論以新庶政盖指賈貴妃及彌逺也彌逺召謂曰何為好名塤曰好名孟子所不取然求士於三代之上惟恐其好名求士於三代之下惟恐其不好名耳因力請外彌逺薨乃召還至是以吏部侍郎改司業諸生相慶以為得師學益相勵論者以中興國學未之有也庚子四年太宗皇帝十二年春正月䝉古以温都爾哈瑪爾提領諸路稅課所初耶律楚材定課税銀額每嵗五十萬兩及河南降户口滋息增至一百一十萬兩至是回回温都爾哈瑪爾請以二百二十萬兩撲買之楚材持不可曰雖取五百萬亦可得不過嚴課法禁隂奪民利耳民窮為盗非國之福近侍左右皆為温息都爾哈瑪爾所啗太宗皇帝惑之楚材言不行乃太曰撲買之利既興必有躡跡而纂其後者民之窮困将自此始矣二月以孟珙為四川宣撫使兼知䕫州節制歸峽鼎澧州軍馬珙遂大興屯田珙至鎮招集散民置寜武軍以降人回鶻愛里八都魯為飛鶻軍釐蜀政之弊為條班諸郡縣且曰不擇險要立砦柵則難責兵以衛民不集流離安耕種則難責民以養兵乃立賞罰以課殿最俾諸司奉行之尋兼䕫州路制置屯田大使遂大興屯田調夫築堰募農給種首秭歸尾漢口為屯二十為荘百七十為頃十八萬八千二百八十又創南陽書院以處襄漢流寓之士竹林書院以處四川流寓之士以李庭芝權施州建始縣庭芝訓農治兵選壮士雜軍官教之期年民皆知戰守善馳逐無事則植戈而耕敵至則悉出而戰珙下其法於所部行之以陳隆之為四川制置使知成都府三月貶四川制置副使知重慶府彭大雅官秩大雅當蜀殘破之初披荆棘冒矢石城重慶以禦利閬蔽䕫峽為蜀之根抵至是以城陷削三秩蜀人懐之為立廟祀焉夏四月召史嵩之還朝罷都督府嵩之在鄂諸将皆以捷聞帝眷顧益隆故召還以杜杲為沿江制置使知建康府蒙古使王檝來議嵗幣也秋九月喬行簡致仕冬閏十二月李宗勉卒宗勉守法度抑僥倖不私親黨召用老成樂聞讜言時號公清之相以㳺佀知樞宻院事徐榮叟僉書院事范鍾參知政事蒙古東平萬户嚴實卒子忠濟嗣辛丑淳祐元年太宗皇帝十三年春正月詔追封周敦頥汝南伯張載郿伯程顥河南伯程頥伊陽伯朱熹徽國公並從事孔子廟庭黜王安石從事慶元中著作郎李道𫝊請下詔崇正學取朱熹論語孟子集註大學中庸章句或問頒之太學仍請以周敦頥邵雍程顥程頥張載從祀孔子廟庭太常少卿徐僑禮部尚書李􅐉皆繼以為請未及施行至是詔曰朕惟孔子之道自孟軻後不得其傳至我朝周敦頥張載程顥程頥真見實踐深探聖域千載絶學始有指歸中興以來又得朱熹精思眀辨表裏混融使大學論孟中庸之書本末洞徹孔子之道益以大眀于世朕每觀五臣論著啓沃良多今視學有日其令學官列諸從祀以示崇奨之意尋以王安石謂天命不足畏祖宗不足法人言不足恤為萬世罪人豈宜從祀孔子其黜之越二日遂加封爵云帝謁孔子遂臨太學帝謁孔子遂御崇化堂命祭酒曹觱講禮記大學篇監學官各進一秩諸生推恩賜帛有差以紹定三年所製伏羲堯舜禹湯文武周孔顔曽子思孟子道統十三賛就賜國子監宣示諸生復親書朱熹白鹿洞學規賜焉三月趙以夫罷夏四月以與芮嗣榮王貴謙嗣沂王與芮帝母弟也秋七月髙麗王暾以其族子淳為質於蒙古以求成冬十月蒙古以伊囉斡齊行省於燕京専領中原事十一月蒙古太宗皇帝崩於烏特古呼蘭六皇后托里格訥治國事太宗皇帝性嗜酒晚年尤甚耶律楚材數諌不聼乃持酒槽之金口以獻曰此鐵為酒所蝕尚致如此况人之五臓耶帝恱賜以金帛勅左右曰進酒三鍾即止是年二月疾篤脈絶諸藥不能療六皇后素干國政不知所為召楚材問之時權姦滿朝粥獄賣官而温都爾哈瑪爾等尤强肆控治諸國楚材對曰今朝廷用人不當天下罪囚必寃枉故天變屢見宜赦天下六皇后亟欲行之楚材曰非君命不可頃之帝少蘇后以為言帝首肯之赦發而脈復生十一月疾愈已久楚材以太一數推之不宜田獵奏之數四左右皆曰若不騎射何以為樂帝從之出田五日還至烏特古呼蘭與温都爾哈瑪爾飲翌日崩年五十六六皇后召楚材問以儲嗣楚材曰此非外姓臣所敢知自有先帝遺詔幸遵行之后不從遂稱制温都其爾哈瑪爾専政用事權傾内外后至以御寳空紙令從意書填且曰温都爾哈瑪爾奏准事理令史若不書填則斷其手楚材力諌后不聴太宗皇帝仁厚簡黙服御儉素委任大臣略無疑貳政歸臺閣朝野無事西北中原皆入版籍遂有天下三分之二特晚年皇后乗急竊柄回回以貸致寵為可惜焉帝七子其長曰哈斯二皇后昻輝所生也早卒有子曰海都次諱庫裕克是為定宗皇帝曰奎騰曰庫春曰哈喇徹爾六皇后所生也曰哈坦曰黙呼七皇后所生也是時太子諸王各有分地不相統壹六皇后既稱制於和林號令不行國政中微十二月余天錫卒壬寅二年春二月㳺佀罷以范鍾知樞宻院事趙葵同知院事别之傑僉書院事葵上疏曰今天下之事其大者有㡬天下之才其可用者有㡬吾従其大者而講眀之疏其可用者而任使之有勇略者治兵有心計者治財寛厚者任牧養剛正者持風憲為官擇人不為人而擇官用之既當任之既久然後可以責其成効帝嘉納之以徐榮叟參知政事蒙古侵蜀孟珙遣師禦之䝉古伊克諾延自京兆取道商房以趨三川遂攻瀘州孟珙遣王令屯江陵及郢州劉全屯沙市焦進自江陵出襄與諸軍㑹張祥屯涪州以備之且下令應出戍主兵官不許失棄寸土權開州梁棟以乏糧還司珙曰是棄城也斬以徇由是諸将禀命惟謹蒙古燕京行省郎中姚樞棄官隠於蘇門伊囉斡齊在燕所屬惟事貨賂以掊克媚之樞為幕長一切拒絶因辭職擕家往輝州之蘇門墾荒雲門糞田數百畆誅茅為屋城中置私廟四室中堂龕魯司冦容傍列周程張邵司馬六君子像讀書其間衣冠荘肅以道學自任佳時則鳴琴百泉之上自板小學書論語孟子大學中庸朱子或問家禮俾楊維中板四書集註田尚書板詩傳折􅇆易程子傳書蔡氏傳春秋胡氏傳又以小學書流布未廣命弟子楊古為沈氏活板與近思録東菜經史論說諸書行之夏五月趙葵罷六月徐榮叟罷以余玠為四川宣諭使初玠家貧落魄無行亡命走揚州作長短句以謁趙葵葵壮之留置幕府俾帥舟師泝淮入河所向有功累擢淮東制置副使入對言方今指即戎之士為麤人斥為噲伍願陛下視文武之士為一勿令偏有所重偏則必至於激文武交激非國之福帝曰卿人物議論皆不尋常可獨當一面乃授四川宣諭使事干機速許同制臣共議措置先行後奏蒙古侵真州杜杲敗之以别之傑同知樞宻院事髙定子僉書院事杜範同僉書院事範抗言時政無有私𨼆同位憚之秋七月蒙古入通州屠其民而去九月庚辰朔日有食之冬十二月别之傑罷癸卯三年春二月以余玠為四川制置使知重慶府初蜀中財賦入户部五司者五百餘萬緡入四總領所者二千五百餘萬緡金銀綾錦之類不預焉自寳慶三年失關外端平三年蜀地殘破所存州郡無㡬國用益窘十六年間凡授宣撫使者三人制置使者九人或老或庸或暫或貪㦯惨㦯謬㦯遥領而不至或開隙而各謀終無成績於是兩川無復紀律遺民咸不聊生監司戎帥各専號令擅辟守宰蕩無法度蜀日益壊玠至大更弊政遴選守宰築招賢館于府左供帳一如帥居下令曰欲以謀告我者近則徑詣公府逺則自言于郡所在以禮遣之士之至者玠不厭接咸得其驩心言有可用随其才而任之茍不可用亦厚遺謝之遂於利閬城大獲山以䕶蜀口蓬州城營山渠州城大良平嘉定城舊治瀘州城神臂山其他因山為壘碁布星列如臂使指氣勢聫絡屯兵聚糧為必守計民始有安土之心玠又作經理四蜀圖以進曰願假十年手挈四蜀之地還之朝廷然後歸老山林臣之願也三月丁丑日有食之蒙古前中書令耶律楚材以憂卒楚材以温都爾哈瑪爾専政已言不見用力求避位㑹六皇后有疾遂罷楚材中書令楚材憂憤成疾而卒或譖之曰楚材為相二十年天下貢奉皆入私門后使衛士視其庫蔵惟名琴數十張古今書畫金石遺文數千卷而已楚材天資英邁夐出人表雖案牘滿前酬荅不失其宜正色立朝不為勢屈欲以身㣘天下每陳國家利病生民休戚辭色懇切太宗皇帝嘗曰汝又欲為百姓哭耶楚材每言興一利不若除一害生一事不如减一事平居不妄言笑及接士人温恭之容溢於外莫不感其徳焉太宗皇帝承大亂之後天綱人理㡬於泯絶加以南北之政每每相戾出入用事之臣又皆諸蕃降附言語不通趣向不同楚材以一書生孤立其間欲行所學可謂難矣幸賴太宗皇帝諌行言聴故能力行不頋然而見於設施者猶十無二三向使無楚材國不知其何如也蒙古便宜總帥汪世顯卒蒙古入蜀世顯之功為多至是召至和林賜金虎符授便宜總帥統秦鞏定西金蘭洮㑹環隴慶陽平凉徳順鎮戎原階成岷疊西和等二十州事無鉅細悉聴裁決還而卒子惟正嗣世顯善兵能将重儒愛民勤儉自持有古名将之風余玠城釣魚山徙合州治之播州冉璡及弟璞俱有文武才隠居蠻中前後閫帥辟召皆堅辭不至聞玠賢自詣府上謁玠與分廷抗禮待以上賔璡璞居數月無所言玠疑之乃更闢别館以處之且日使人窺其所為兄弟終日不言惟對踞以堊畫地為山川城池之形起則漫去如是又旬日請見玠屏人曰某兄弟辱明公禮遇思有以少禆益非敢同衆人也為今日西蜀之計其在徙合州城乎玠不覺躍起執其手曰此玠志也但未得其所耳璡曰蜀口形滕之地莫若釣魚山請徙諸此若任得其人積粟以守之賢於十萬師逺矣巴蜀不足守也玠大喜曰玠固疑先生非淺士先生之謀玠不敢掠以歸已遂不謀於衆密以其謀聞於朝請不次官之詔璡權發遣合州璞權通判合州徙城之事悉以任之釣魚城蜀始可守甲辰四年春正月以李鳴復參知政事杜範同知樞宻院事劉伯正僉書院事範固辭遂與鳴復俱罷初範為殿中侍御史嘗論鄭清之李鳴復之過不行即棄官去至是不屑與鳴復共政上疏辭位而去帝遣使召還太學諸生亦上書論範宜留鳴復宜斥史嵩之諷諌議大夫劉晉之并論罷二人三月以吴淵僉書樞宻院事秋九月史嵩之以父憂去位詔起復之罷将作監徐元杰及逐逰士之居京學者冬十一月嵩之乞終䘮制許之初嵩之開督府竭國用而無成㓛其從子璟卿諌曰久開督府所成何功東南民力困於供需州縣倉卒匱於應辦誠恐禍起蕭墻危如朝露為今之計莫若盡去在幕之羣小悉召在野之君子相與改絃易轍戮力王事以收桑榆之功不從已而黄濤劉應起徐霖等果上書論嵩之姦深擅權帝雖不聴而論者益衆及父彌忠疾亟嵩之謁告許之翌日彌忠卒詔嵩之起復徐元杰上疏以為不可帝不聴元杰遂去於是太學生黄榿伯等百四十四人上書曰嵩之心術回邪蹤跡詭祕曩者開督府以和議堕将士心以厚貲竊宰相位羅天下之小人為私黨奪天下之利權歸私室蓄謀積累險不可測在朝廷一日則貽一日之禍一嵗則貽一嵗之憂萬口一辭惟恐其去之不速今嵩之亡父以速其去中外方以為快而陛下起復之命已下矣陛下姑曰大臣之去不可不留嵩之不天聞疾不省聞計不行徘徊數日牽引姦邪布置要地彌縫貴戚買囑貂璫轉移上心衷私御筆必得起復之禮姦謀已遂然後從容就道初不見其有憂戚之容大臣居天子之下百官之上佐天子以孝治天下者也孝不行於大臣是率天下而為無父之國矣古者固有釋衰絰從王事者以其才足濟時也陛下所以起復嵩之者謂其有折衝萬里之才歟則嵩之夲無捍衛封疆之能徒有刼制朝廷之術謂其有經理財用之才欤則嵩之本無足國裕民之能徒有私自豐殖之計陛下眷􅅏将以利國殊不知貽國無窮之憂也嵩之之為計亦姦矣自入相以來知二親年耄慮其不測思為起復之計起復未卒哭之馬光祖為淮東總領未終喪之許堪為鎮江守臣所以預為已之地也故今里巷為十七字之謡曰光祖做總領許堪為節制丞相要起復援例夫以里巷之小民猶知其姦陛下獨未知之乎臺諌不敢言嵩之之爪牙也給舍不敢言嵩之之腹心也侍從不敢言嵩之之肘腋也執政不敢言嵩之之羽翼也嵩之當五内分裂之時方且擢姦臣以司喉舌謂其必無陽城毁麻之辱也植私黨以據要津謂其必無恵卿反噬之虞也自古大臣不出忠孝之門席寵怙勢至於三世未有不亡人之國者今史氏秉鈞三世矣天下士民惟知有史氏陛下孤立於上甚可懼也天欲去之而陛下留之堂堂中國豈無君子獨一小人而不悟是陛下欲藝祖三百年之天下壊於史氏之手而後已此臣所以痛心也五刑之屬三千其罪莫大於不孝若以法繩之雖置之鈇鉞猶不足謝天下况復置之具瞻之位乎不報武學生翁日善等六十七人京學生劉時舉等九十四人宗學生與寰等三十四人皆上書切諌亦不報武學生劉耐知帝嚮意用嵩之遂叛四學而上書曰秦人焚坑之禍漢末黨錮之獄使名士淪亡典籍消滅以貽千百年不可追之恨者其端始于一二愚士横議爾鄭國之人聚扵郷校以議執政之然否而子産不毁鄉校付之自然人皆賢之臣獨恨子産之無以變士習淑人心也今陛下尊居天陛置輔相於左右盖将以立國也而輕儇浮薄者乃指名大罵之然則朝廷何以為朝廷中國何以為中國信斯言也生人之類滅矣若使嵩之果匿䘮旬餘設謀起復固無以逃天下後世之議若起復出於陛下憂時之本心亦當顯示天下揭臣此章於四學俾輕儇浮薄者有所警戒太學齋廊因榜云丞相朝入諸生夕出丞相夕入諸生朝出時范鍾劉伯正領相事惡京學生言事謂皆逰士鼔倡之諷京尹趙與􅊸逐逰士諸生聞之作捲堂文以辭先聖曰天之将䘮斯文實係興衰之運士亦何負於國遽罹逐斥之辜静言思之良可醜也慨祖宗之立國廣學校以儲才非惟衍豐芑以遺後人抑且隆漢都而尚尊國士肆維皇上克廣前猷炳炳宸奎釐為四學戔戔束帛例及諸生蒙教育以如天恨補報之無地但思粉骨寧畏觸機直言安石之奸共惜元臣之去實惟公議不利小人始隂諷其三緘終盡打於一網不任其咎歸過於君是誠何心空人之國昔鄭僑且謂毁校不可而李斯尚知逐客為非彼既便已行之吾亦何顔有居此厄哉吾道告爾同盟勿見義而不為當行已而恥茍為飽暖是貪周粟之羞相與擕持毋蹈秦坑之慘斯言既出明日遂行與􅊸遂盡削逰士之籍嵩之自知不為公論所容上疏乞終䘮制帝乃許之吴淵罷十二月以范鍾杜範為左右丞相並兼樞宻使劉伯正參知政事㳺佀知樞密院事趙葵同知院事以鄭清之為少保奉朝請清之雖罷相寵頋不衰至是以少保醴泉觀使兼侍讀奉朝請封衛國公居京日與賔客門生相羊山水間帝御書輔徳眀謨之閣賜之眀年加少師賜玉帶及甲第於西湖之養魚荘以孟珙兼知江陵府珙至江陵登城歎曰江陵所恃三海不知沮洳有變為桑田者敵一鳴鞭即至城外盖自城以東古嶺先鋒直至三汉無所限隔乃脩復内隘十有一别作十隘於外有距城數十里者沮漳之水舊自城西入江因障而東之俾遶城北入於漢而三海遂通為一随其髙下為匱蓄洩三百里間𣺌然巨浸土木之工百七十萬民不知役遂為江陵天險乙巳五年春正月劉伯正罷以李性傳僉書樞宻院事二月吕文徳敗蒙古於五河復其城夏四月杜範卒蒙古太納侵江陵孟珙敗之秋七月蒙古侵濠州知州吕文徳敗之冬十一月以陳韡同僉書樞宻院事十二月以㳺佀為右丞相兼樞宻使趙葵知樞宻院事李性傳同知院事性傳尋罷丙午六年蒙古定宗皇帝元年春二月范鍾罷鍾直清守法為時名相與㳺佀不恊力辭而去蒙古入兩淮吕文徳敗之蒙古入蜀余玠敗之夏六月以陳韡參知政事秋七月蒙古定宗皇帝即位於蘇黙托里蒙古自太宗皇帝崩諸王近屬自相攻戰國内大壊至是定宗皇帝始即位于昻吉河之蘇黙托里諸王不服将謀不軌㑹雷雨大作行營水深數尺遂各散去九月京湖制置大使孟珙卒以賈似道為制置使知江陵府珙疾革乞致仕許之詔命未至而卒珙忠君體國之念可貫金石在軍中參佐部曲論事言人人異珙徐以片言折衷衆志皆惬謁士逰客老校退卒壹以恩意撫接名位雖重惟建旗鼓臨将吏面色凜然無敢涕唾者退則埽地焚香隠几危坐若蕭然事外者逺貨色絶滋味自號無菴居士冬十二月詔史嵩之以觀文殿大學士永國公致仕嵩之雖去國論者猶籍籍乃命致仕詔不復用以静羣言蒙古侵京湖江淮州縣丁未七年定宗皇帝二年春正月以嗣榮王與芮子孟啓為宜州觀察使孟啓資識内慧初能言即有法度帝甚竒之至是授官令就内小學夏四月以王伯大僉書樞宻院事吴潛同僉書院事以鄭清之為太傅右丞相兼樞宻使清之方與客放浪湖山寓僧刹竟夕不歸中使至門清之始還入對力辭不允以趙葵為樞宻使督視江淮京湖軍馬知建康府便宜行事陳韡知樞宻院事湖南安撫大使知潭州時江淮京湖邉警日至帝深憂之鄭清之薦二人可大任帝從之二人既受命捷音日至矣㳺佀罷秋七月吴潛罷以别之傑參知政事鄭寀同僉書樞宻院事八月寀罷髙定子卒呂文徳敗蒙古於泗州戊申八年定宗皇帝三年春三月蒙古定宗皇帝崩於杭錫雅爾之地皇太后托里格訥復治國事定宗皇帝在位委政于皇太后及近習而已及崩年四十三有子三人長曰呼察次曰諾果三曰和和時國内大旱牛馬死者十八九民不聊生夏六月以徐鹿卿為樞宻使秋七月以王伯大參知政事應㒡同知樞宻院事謝方叔僉書院事史宅之同僉書院事伯大尋罷冬十月别之傑罷己酉九年春正月封孟啓為益國公以周世宗八世孫柴彦穎襲封崇義公置慈幼局於臨安收養道路遺棄初生嬰児閏二月以鄭清之為太師左丞相兼樞宻使趙葵為右丞相兼樞宻使應㒡謝方叔參知政事史宅之同知樞宻院事清之辭免太師許之趙葵視師既久屢奏捷音帝思所以處之鄭清之曰非使作相不足以酬勞陛下豈以臣故耶臣必不因葵來遽引退臣願居左使葵居右帝從之夏四月壬寅朔曰有食之以淮東制置使丘岳兼淮西制置使岳在揚與蒙古戰多㨗閫職脩舉帝嘉之故有是命親書忠實二字賜焉五月趙葵乞歸田里不許葵制既下言者論其非由科第進者且曰宰相須用讀書人葵聞之因力辭右相乞歸田里其表有云霍光不學無術每思張詠之語以自慙后稷所讀何書敢以趙抃之言而自解帝雖不允而葵終不至陳韡罷冬十一月應㒡罷十二月以吴潛同知樞宻院事徐清叟僉書院事史宅之卒庚戍十年春三月以賈似道為兩淮制置大使知揚州李曽伯為京湖制置使知江陵府趙葵罷夏五月以善珘為嗣濮王余玠大敗蒙古於興元蒙古汪惟正屯兵利州以扼四川日謀進取使其從宜使李徳輝募民入粟綿竹陸輓興元水漕嘉陵資用饒足玠親帥諸軍廵邉直𢷬興元與惟正戰敗之辛亥十一年蒙古憲宗皇帝元年春正月封建國公孟啓為建安郡王賜名孜三月嗣濮王不擅卒以謝方叔知樞宻院事徐清叟同知院事吴潛參知政事夏六月蒙古憲宗皇帝即位於奎騰敖拉之地定宗皇帝之崩諸大臣欲奉庫春之子實勒們久而不決至是烏蘭哈達以太祖皇帝諸孫惟憲宗皇帝謙慎宜立諸大臣兄弟皆曰可乃大㑹於奎騰敖拉之地而即帝位焉實勒們不服憲宗皇帝因察諸王有異同者並羈縻之􅂑主謀者誅夷之由是始定遂罷不急之役嚴軍律以安民又以自太宗皇帝以來羣臣擅政凡有詔令必親為之政始歸一烏蘭哈達蘇布特之子也秋七月蒙古憲宗皇帝命其皇弟總治蒙古漢地民户事開府於金蓮川承制封拜憲宗皇帝詔凡軍民在齊拉衮山南者聴皇弟呼必賚大王總之遂開府於金蓮川大為張宴先是姚樞隠居蘇門以道自任皇弟遣趙璧召之樞至見皇弟聪眀才不世出虚已受言可大有為乃盡其平日所學為書數千言上之首以二帝三王為學之本為治之要與治國平天下之大經彚為八目曰修身力學尊賢親親畏天愛民好善逺佞次及時政之弊為條三十本末兼該細大不遺皇弟大竒其才動必見詢樞言於皇弟曰今土地人民財賦皆在漢地王若盡有之則天子何為後必有讒者矣不若惟掌兵權凡事付之有司則勢理順安皇弟納之蒙古以孟克薩勒為斷事官博勒和為大筆且齊掌朝貢事鴻和爾留守和林塔哈納阿勒達爾副之察罕伊爾根統蒙古漢軍侵兩淮丹達爾統蒙古漢軍侵四川和爾台統蒙古漢軍伐吐蕃伊囉斡齊布扎爾鄂勒博都特達喇行中書省事於燕京巴蘇呼諾海塔喇海主伊吾廬至阿穆河迤南事諤爾根主和掄舍哩迤西事斷事官掌國訟其權任為至重大筆且齊其任猶左丞相也冬十一月鄭清之致仕清之以老病固求解政帝不許賜玉帶以朝一日退朝忽感寒疾危甚遂以太傅充醴泉觀使封齊國公奉朝請越六日而卒清之不好立異以定䇿功久居宰輔其再相也年齒衰暮政歸妻子閒廢之人或因縁以賄進為世所少然端平之治有足稱者焉以謝方叔吴潛為左右丞相徐清叟參知政事董槐僉書樞宻院事蒙古以僧海雲道士李真常各領其教事蒙古伊克伐髙麗蒙古皇弟置屯田經略司於汴梁自奎騰太子􅂑漢上諸郡因留軍戍境上繼而襄樊夀泗復降而夀泗之民盡為軍官分有由是降附路絶雖嵗侵淮蜀軍将惟利剽殺子女玉帛悉歸其家城無居民野皆榛莽至是姚樞請以秋去春來之兵分屯要害敵至則戰退則耕積榖髙廩邉備既實俟時大舉則宋可平皇弟善之始置屯田經略司於汴西起穰鄧宿重兵與襄陽掎角東連陳亳清口桃源列障守之又置都運司於衛轉粟於河繼餽諸州陜西則移隴右汪世顯戍利州劉黒馬於成都割河東解之鹽池歸陜西置從宜所於關西以中粮興元猶懼不繼置行部秦州順嘉陵漕渙關沔池轉粟入利州又置安撫司於邢由是東西數千里民人安業翕然歸心矣蒙古以史天澤趙璧為河南經略使自太宗之後中原任非其人而河南陜西民受病尤甚憲宗皇帝即位倚任於伊囉斡齊史天澤自真定入朝請分河外所屬而試治之且乞不令伊囉斡齊有所鈐制許之乃立經略使於汴命天澤趙璧代治之時河南民無依恃差役迫急流離者衆軍無紀律暴掠平民莫敢誰何故州縣往徃為宋師所復天澤選賢才居幕府以清其源置提領布郡縣以察奸弊均賦稅以蘇疲困更鈔法以通有無設行倉以給軍饟立邉城以遏敵衝誅奸惡以肅官吏立屯田保甲以實邉鄙河南大治壬子十二年憲宗皇帝二年春正月王堅復興元二月乙夘朔日有食之蒙古侵随郢安復州余玠敗蒙古於嘉定府蒙古汪惟正城沔州蒙古徙其太宗六皇后及諸王於邉賜定宗皇后死竄太宗皇帝孫實勒們於摩多齊憲宗皇帝以諸王嘗欲立實勒們也乃徙六皇后托里格訥及孟格圖諸王於奎騰大王營盤哈坦諸王於巴實伯里黙哷諸王王於雅爾逹實河海都諸王於哈里雅爾伯爾克諸於庫爾哲托克托諸王於額宻埒分后家貲於諸王定宗皇后烏拉海額實以厭禳賜死禁錮實勒們於摩多齊夏六月蒙古以漢地分封宗屬憲宗皇帝以中州封同姓勑皇弟於汴京闗中自擇其一姚樞曰南京河徙無常土薄水淺潟鹵生之不若關中厥田上上古名天府陸海皇弟遂請關中憲宗皇帝曰關中户寡河南懐孟地狹民夥可取自益由是皇弟有關中河南之地蒙古皇弟以楊惟中為河南道經略使時河南總管劉福貪鄙殘酷害虐遺民将二十年惟中至召福聴約束福稱疾不至惟中命設大挺於坐復召之使謂福曰爾不奉詔吾以軍法行事福以數千人擁衛而至惟中即握大梃擊福踣之福數日死百姓莫不鼓舞稱快焉秋八月行㑹天厯蒙古憲宗皇帝命皇弟帥師伐西南夷皇弟實埒帥師伐西域克埓布哈帥師伐波黑奚撒里帥師伐印都皇弟由中道進烏蘭哈達由西道茶寒由東道副之印都古天竺國也有户百餘萬秋九月嗣沂王貴謙卒冬十月以徐清叟參知政事董槐同知樞宻院事嗣濮王善珘卒以善奐代之十一月吴潛罷浙東福建大水故也印都朝貢於蒙古蒙古烏蘭哈達伐附都鄯善烏㸑摩些等國皆降之癸丑寳祐元年憲宗皇帝三年春正月以太祖十一世孫建安郡王孜為皇子賜名禥進封永嘉郡王二月己酉朔日有食之蒙古汪惟正城利州沔利既城䝉古且耕且守蜀土不可復矣蒙古渡漢江次於萬州遂入西栁關髙逹敗之蒙古烏蘭哈達敗羅部於夷可浪山遂㑹皇弟滅大理擄其國王段智興以歸得五城八府蠻部三十有七夏五月召四川制置使余玠還六月以余晦為四川宣諭使初利州都統王䕫素殘悍號王夜叉恃功驕恣傑驁不受節度所至刼掠毒虐富人以脅取金帛蜀人苦之玠至嘉定䕫帥所部兵迎謁班聲如雷江水為沸旗幟精眀舟中皆戰掉失色而玠自若也徐命吏班賞䕫退謂人曰儒者乃有此人玠久欲誅䕫獨患其握重兵居外恐䡖動危蜀謀於親将楊成成曰䕫兵精勢張視侍郎為文臣必不肯甘心從令今縱弗誅養成其勢後一舉足西蜀危矣玠意遂決夜召䕫計事潛以成代領其衆䕫才離營而新将己軍騎入矣将士皆愕眙相顧不知所為成以帥指譬曉之遂相率拜賀䕫至玠斬之㑹戎州帥欲舉統制姚世安為代玠素欲革軍中舉代之弊以三千騎至雲頂山下遣都統金某往代世安世安閉關不納且有危言而世安素結丞相謝方叔子姓至是求援于方叔方叔遂倡言玠失戎利心帝惑之世安乃與玠抗玠鬰欎不樂玠專制四蜀交結權要凡有奏䟽詞氣不謹帝不能平㑹徐清叟入對語及玠因言玠不知事君之禮陛下何不出其不意而召之帝不荅清叟曰陛下豈以玠握大權召之或不至耶臣度玠素失士心必不敢帝然之乃以資政殿學士召而以知鄂州余晦為宣諭使國子司業葉夢鼎言蜀當垂亡危急之秋晦恐不滕其任乞改命謝方叔固以為能乃止蒙古使扎拉爾伐髙麗代也窟秋七月資政殿學士余玠卒玠聞召命愈不自安一夕暴下卒或謂仰藥死蜀人莫不悲慕如失父母玠之治蜀也任都統張實治軍旅安撫王惟忠治財賦監簿朱文炳接賔客皆有常度至於脩學養士􅁿徭以寛民力薄征以通商賈蜀既富實乃罷京湖之餉邉關無警又撒東南之戍自寳慶以來蜀閫未有及之者惜其遽以太平自詫進蜀錦蜀牋過於文飾久假便宜之權不顧嫌疑昧於勇退遂來讒賊之口又置機捕官雖足以㢘得事情然寄耳目於羣小虚實相半故人多懐疑懼至於姚世安拒命威名頓挫齎志以沒惜哉八月以余晦為四川制置使知重慶府通鑑續編卷二十二
