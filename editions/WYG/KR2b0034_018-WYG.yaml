body:
  text: 通鑑續編卷十五元陳桱撰辛亥紹興元年金天㑹九年春正月己亥朔帝在越州帥百官遥拜二帝不受賀復賢良方正直言極諫科以張俊為江淮路招討使時孔彦舟據武陵張用據襄漢李成據江淮湖湘十餘郡連兵數萬有席卷東南之志多造符䜟蠱惑中外以衆圍江州朝廷以俊為招討使帥兵進討俊請岳飛同徃許之李成陷江州謝克家罷盗曹成陷漢陽軍鄂州詔有司舉太祖後宜襲封安定郡王者詔曰太祖創業垂統德被萬世神宗詔封子孫一人為安定郡王世世勿絶今其封乆不舉有司其上應襲封人名依故事施行二月邵青㓂宣州以秦檜叅知政事詔贈程頤直龍圖閣制詞極其褒崇於是學者翕然尚之三月張俊大敗李成於樓子荘復筠江州俊聞李成将馬進在筠州以豫章介江筠之間遂急趨之既入城喜曰我已得洪破賊决矣及進犯洪州連營西山俊歛兵若無人者金鼔不動令将士登城居月餘進以大書牒來索戰俊以細書状報之進以俊為怯俊諜知賊怠乃議戰岳飛曰賊貪而不慮後若以騎兵自上流絶生米渡出其不意破之必矣飛請自為先鋒俊大喜乃令楊沂中絶生米渡岳飛重鎧躍馬潜出賊右突其陣所部從之進大敗走筠州飛抵城東進出城布陣十五里飛設伏以紅羅為幟上刺岳字選騎二百隨幟而前賊易其少薄之伏發進大敗走飛使人呼曰不從賊者坐吾不汝殺坐而降者八萬人俊與沂中復前後夾擊賊大潰進以餘卒奔成於南康飛夜引兵至朱家山又斬其将趙萬成聞進敗自引兵十餘萬來俊與飛遇成於樓子荘大破之遂復筠州成復以十萬衆援筠與俊夾河而營楊沂中夜衘枚渡河與俊夾攻成又大敗俊乗勝追至江州成勢迫絶江而去因呼俊為張鐵山遂復江州已而興國軍等處羣盗皆遁金烏珠取鞏洮河樂蘭廓積石西寧州於是涇原熙河二路皆為金有張浚退守閬州以張深為四川制置使次于益昌王庶為利䕫兩路制置使節制陜西諸路知興元府金人破福津蹂同谷以迫興州浚遂退保閬州而令張深劉子羽趨益昌夏四月金達蘭屯于宿遷縣劉光世復楚州隆祐皇太后孟氏崩年五十九桑仲陷鄧州盗李忠陷商州五月以張用為舒蘄鎮撫使作大宋中興玉寳劉光世使王徳襲揚州執郭仲威歸于行在所斬之邵青圍太平州劉光世招降之盗趙延壽據分寧縣吕頥浩招降之張俊大敗李成于黄梅縣成奔劉豫張俊引兵渡江追成至蘄州黄梅縣及之成大敗其衆數萬皆潰馬進為追兵所殺成北走降于劉豫江淮諸郡悉平岳飛功第一李忠譚兖降于張浚張用復叛冦江西岳飛招降之用㓂江西岳飛與用同郡人乃以書諭之曰吾與汝同里欲戰則出不戰則降用得書曰果吾父也遂帥衆降于飛六月上虞縣丞婁寅亮上書乞選太祖後以備儲嗣元懿太子卒帝未有後范宗尹造膝請建太子帝曰太祖以神武定天下子孫不得享之遭時多艱零落可憫朕若不法仁宗為天下計何以慰在天之靈於是詔知南外宗正事令懬選太祖後将育宫中至是寅亮上書曰先正有言太祖舍其子而立弟此天下之大公周王薨章聖取宗室育之宫中此天下之大慮仁宗感悟其說詔英宗入繼大統文子文孫宜君宜王遭罹變故不㫁如帶今有天下者獨陛下一人而已屬者椒寢未繁前星不耀孤立無助有識寒心天其或者深戒陛下追念祖宗公心長慮之所及乎崇寕以來諛臣進說獨推濮王子孫以為近屬餘皆謂之同姓遂使昌陵之後寂寥無聞僅同民庶藝祖在上莫肯顧歆此金人所以未悔禍也望陛下於伯字行内選太祖諸孫有賢徳者親秩親王俾牧九州以待皇嗣之生退處藩服庶幾上慰在天之靈下係人心之望書奏帝讀之大感歎攅昭慈獻烈皇后于越州詔權攅于㑹稽縣之上皇村以俟軍事寧歸𦵏哲宗園陵張琪陷徽州張浚以吳玠為陜西諸路都統制時闗隴六路盡䧟于金止餘階成岷鳯洮五州及鳳翔之和尚原隴州之方山原而已劉豫置招受司于宿州豫置招受司誘宋逋逃金人立豫以舊河為界恐兩河之民䧟没者逃歸下令大索或轉粥他國或繫送雲中益防豫也秋七月以岳飛為右軍副統制帥師次于洪州彈壓盗賊封太祖後令話為安定郡王金達蘭自宿遷北去范宗尹免宗尹為政多私屢為言者所詆秦檜從而擠之帝亦惡其為人㑹侍御史沈與求奏其罪状二十遂落職知温州宗尹有才智年三十為相毅然以國事自任八月以孔彦舟為蘄黄鎮撫使張浚殺左武大夫曲端浚既敗于富平乃思端言召之還稍復其官徙于閬州将任用之吳玠憾端因言端再起必不利于張公王庶又從而間之玠復書曲端謀反四字于手心侍浚立時舉以示焉浚素知端庶不可並立且方倚玠為用庶等知之即言端嘗作詩題柱有指斥乗輿之意曰不向關中興事業却來江上泛漁舟此其罪也浚乃送端于恭州獄有武臣康隨者嘗以事忤端端鞭其背隨深憾之㑹浚以隨提㸃䕫州刑獄端聞之曰吾其死矣隨至命獄吏縶維端以紙糊其口熁之以火端乾渴求飲與之酒九竅流血而死陜西士大夫以端累立大功死非其罪莫不痛惜之軍士悵恨有叛去者以汪伯彦為江東安撫大使時黄潜善已死張守罷以李回叅知政事富直柔同知樞宻院事以秦檜為尚書右僕射兼知樞宻院事范宗尹既去檜欲得其位因揚言曰我有二䇿可聳動天下或問何不言檜曰今無相不可行也語聞帝即用之范福棄蔡州以李祐代為鎮撫使復置賞功房于三省樞宻院以吕頤浩為尚書左僕射兼知樞宻院事以孟庾為江東西湖東等路宣諭制置使吕頤浩入對首言先平内㓂然後可以禦外侮今李成摧破李允文已降李敦仁已敗江淮惟張琪邵青兩㓂非乆必可蕩平惟閩中之㓂不一又孔彦舟據鄂馬友據潭曹成李宏在湖南江西之間而鄧慶龔富剽掠南雄英韶諸郡賊兵多寡不等然閩中之㓂最急廣東之㓂次之蓋閩中去行在不逺二廣不經殘破若非早除為害不細帝深然之故命庚帥師進討江湖盗詔能建策還二帝者賞以王爵冬十月李回罷王德殱邵青之衆于崇明沙獲青歸于行在所青聚其黨于崇明沙上劉光世令王徳討之㧞柵以入青軍大潰餘黨復至諜言青将用火牛徳笑曰此古法也可一不可再命合軍持滿陳始交萬矢齊發牛皆返奔賊衆殱焉青自縳請命徳獻諸行在餘黨悉平以孟庾叅知政事吳玠大敗金烏珠于和尚原玠自冨平之敗收散卒保和尚原積粟繕兵列柵為死守計或謂玠冝退屯漢中扼蜀口以安人心玠曰我保此敵决不敢越我而進堅壁臨之彼懼吾躡其後是所以保蜀也玠在原上鳯翔民感其遺恵相與夜輸芻粟助之玠償以銀帛民益喜輸者益多金人怒伏兵渭河邀殺之且令保伍連坐民冒禁如故金将摩哩自鳯翔烏嚕舍琿自階成出散關約日㑹和尚原烏嚕舎琿先期至陣北山索戰玠命諸将堅陣待之更戰迭休山谷路狹多石馬不能行金人舍馬歩戰大敗移砦黄牛㑹大風雹遂遁去摩哩方攻箭筈嶺玠復遣将擊敗之兩軍終不得合金人自起海角狃於常勝及與玠戰輒敗憤甚謀必取玠於是烏珠㑹諸帥之兵十餘萬造浮梁跨渭自寳雞結連珠營疊石為城夾澗與宋軍相拒十月癸酉進薄和尚原玠與弟璘選勁弩命諸将分番迭射號駐隊矢連發不絶繁如雨注敵稍却則以竒兵旁擊絶其糧道度其困且走設伏於神坌以待之敵至伏發遂大亂玠因縱兵夜擊大敗之烏珠中流矢僅以身免亟鬄其須髯而遁金自南侵未嘗有此敗衂深以為愧初金人之至也玠與璘以散卒數千駐原上朝問隔絶人無固志有謀刼玠之兄弟北降者玠知之召諸将㰱血盟勉以忠義皆感泣願盡死力故能成功焉初置見錢關子時命張俊屯婺州有司請樁辦合用錢而路不通舟錢重難致乃造關子付婺州召商人入中以給軍食商執關子于𣙜貨務請錢願得茶塩香貨鈔引者聽於是州縣以關子充糴本未免抑配而𣙜貨務又止以日輸三分之一償之人皆嗟怨升越州為紹興府關師古復秦州劉豫使王世冲㓂廬州知州王亨斬之金烏珠自河東還留薩里罕于鳳翔遂取慶陽慕容洧以環州叛降于金十一月以孟庾為福建江西荆湖宣撫使韓世忠為副使富直柔罷十二月盗曹成陷道州桑仲㓂復金州金以陕西地與劉豫於是中原盡屬於豫壬子二年金天㑹十年春正月癸巳朔帝在紹興府帥百官遥拜二帝不受朝賀韓世忠拔建州范汝為自焚死辛企宗討范汝為不克其勢益熾韓世忠曰建居閩嶺上流賊沿流而下七郡皆血肉矣亟率歩卒三萬水陸並進直抵鳯凰山五日破之汝為自焚死斬其二弟岳吉以徇禽其謀主謝嚮施逵及禆将陸必強等五百餘人世忠初欲盡誅建民李綱自福州馳見世忠曰建民多無辜世忠乃令軍士駐城上毋下聽民自相别農給牛穀商賈弛征禁脅從者汰遣獨取附賊者誅之民感更生家為立祠㨗聞帝曰雖古名将何以加世忠因進討江西湖廣諸盗帝如臨安府從吕頤浩之請也帝至臨安府二月詔劉光世帥師次於揚州經理淮東以李綱為湖廣宣撫使置御前忠銳軍以降盗崔増李捧邵青趙延壽李振單徳忠徐文所部兵為七将名御前忠銳軍𨽻歩軍司非樞宻奉㫖不許調遣三月桑仲為其黨所殺李横復郢州仲上疏願協力恢復京師乞正劉豫之罪且舉兵為聲援吕頤浩信之乃命仲節制應援京城軍馬量移事勢復豫所䧟州郡仍命河南翟興荆南解潜金房王彦徳安陳規蘄黄孔彦舟廬壽王亨相為應援毋失事機仲至郢州調兵其黨霍明執而殺之襄鄧統制李横擊走明復其州金人侵隴安吳璘敗之河南鎮撫使翟興為其下所殺劉豫将遷汴以興屯伊陽之鳯牛山憚之遣蒋頤持書誘興以王爵興斬頤而焚其書豫復隂㗖興禆将楊偉以利偉遂殺興擕其首奔豫興在河南累年軍少食乏而能激以忠義士莫不自奮金人畏之諸陵得不侵犯詔以子琮嗣職夏四月以翟汝文叅知政事曹成陷賀州詔吕頤浩都督江淮荆浙諸軍事帥師如鎮江頤浩信桑仲之言屢請出師身自督軍北向以復中原秦檜因風人言周宣王内修外攘故能中興今二相冝分任内外於是帝諭頤浩及檜曰頤浩治軍旅檜理庶務如種蠡分職可也乃命頤浩開府鎮江頤浩辟文武士七十餘人以神武後軍及御前忠銳崔増趙延壽二軍從行韓世忠張俊劉光世岳飛王􅊛楊沂中等皆𨽻焉凡十餘萬人帝嘗謂給事中程瑀曰頤浩熟於軍事在外總諸将檜在朝廷庻幾内外相應然檜誠實但太執耳瑀對曰如求機警能順旨者極不難得但不誠實則終不可倚帝然之劉豫徙於汴京豫至汴尊其祖考為帝置於宋太廟是日暴風捲旂屋瓦皆振士民大懼時河淮山東陜西皆屯金軍劉麟籍鄉兵十餘萬為皇子府十三軍分置河南汴京淘沙官凡兩京冡墓發掘殆盡賦歛煩苛民不聊生岳飛追曹成大敗之成走邵州成擁衆十餘萬由江西歴湖湘據賀邵郴連命岳飛權荆湖東路安撫都總管付金字牌黄旂招成成聞飛将至驚曰岳家軍來矣即分道而遁飛追至賀州力戰大破之成乃自桂嶺置砦至北藏嶺連控隘道親以衆十餘萬守蓬頭嶺飛部不八千人一鼔登嶺破其衆成奔連州飛謂部将張憲徐慶王貴等曰成黨散去追而殺之則脅從者可憫縱之則復聚為盗今遣若等誅其首而撫其衆慎勿妄殺累上保民之仁於是憲自賀連慶自邵道貴自郴桂招降者二萬與飛會連州進討成走入邵州張浚以王庶知成都府王似為利䕫制置使金主以其太祖孫亶為安班貝勒自舍音卒後安班貝勒之位乆虚至是尼瑪哈烏珠古新等會朝上京謂鄂特本曰儲嗣乆曠哈喇先帝嫡孫當立若不早定恐授非其人鄂特本然之遂相與請於金主金主不得已許之哈喇即亶也太祖之孫父曰豐王勝果勝果一名宗峻在太祖諸子中為最嫡云金主以其子富勒呼為固倫貝勒富勒呼一名宗磐金以尼瑪哈為都元帥烏珠為左副元帥閏月衍聖公孔端友卒以其子玠嗣五月以權邦彦僉書樞宻院事育太祖後子偁之子伯琮於宫中帝感婁寅亮之言選秦王徳芳五世孫左朝奉大夫子偁之子伯琮育於宫中命張媫妤鞠之生六年矣吕頤浩前軍将趙延壽反頤浩遂次於常州頤浩至常州趙延壽兵叛於吕城鎮遂犯金壇殺知縣胡思忠頤浩聞桑仲死已悔出師及延夀叛因稱疾不進王徳追趙延夀於建平誅之置修政局命秦檜提舉秦檜以周宣王内脩外攘為言乞置修政局從之以檜為提舉凡簿書獄訟官吏差除土木營繕皆領之張浚以劉子羽知興元府韓世忠招曹成降之世忠旣平范汝為旋師永嘉若将休息者忽由處信徑至豫章連營江濵數十里羣賊不虞世忠至大驚世忠因使董收招成成方為岳飛所追乃率其衆降得戰士八萬遣詣行在六月詔岳飛屯江州以李横為襄郢鎮撫使李道為鄧隨鎮撫使頒黄庭堅所書戒石銘於州縣翟汝文罷初汝文知宻州秦檜為州文學汝文薦其才故檜引輔政然汝文性剛不為檜屈至對案相詬目檜為濁氣故不得乆居位孔彦舟叛降於劉豫彦舟暴横不奉法朝廷将以兵執之彦舟遂叛秋七月以翟琮為河南府孟汝唐州鎮撫使吕頤浩還自常州八月以孟庾兼權同都督江淮荆浙諸軍事安定郡王令話卒以朱勝非提舉醴泉觀兼侍讀貶給事中胡安國提舉仙都觀是夕彗星見罷給事中程瑀等二十人帝初即位召安國為給事中黄潜善惡之遂罷潜善去復召為中書舍人兼侍講安國因上時政論二十一篇其言以為保國必先定計定計必先建都建都擇地必先設險分土必先制國制國以守必先䘏民夫國之有民猶人之有元氣不可不恤也除亂賊選縣令輕賦斂更弊法省官吏皆䘏民事也而行此有道必先立政立政有經必先覈實而後賞罰當賞罰當而後號令行人心順從惟上所命以守則固以戰則勝以攻則服天下定矣然欲致此顧人主志尚如何耳尚志所以立本也正心所以决事也養氣所以制敵也宏度所以用人也寛隠所以明徳也具此五者帝王之能事畢矣論入改給事中入對帝謂曰聞卿大名渴於相見何為累召不至安國辭謝居旬日再見以疾力求去帝曰聞卿深於春秋方欲講論遂以左氏傳付安國㸃句正音安國言春秋經世大典見諸行事非空言比方今思濟艱難左氏繁碎不宜虛費光隂耽翫文采莫若潜心聖經帝善之命兼侍讀専講春秋先是秦檜知吕頤浩不為公論所容乃多引知名士列於清要以自助欲傾頤浩而専政安國嘗聞游酢論檜人材可方荀文若信之故力言檜賢於張浚諸人及頤浩自常州還朝憾檜欲去之問計於席益席益曰目為黨可也今黨魁胡安國在𤨏闥宜先去之㑹頤浩薦知紹興府朱勝非代已都督帝從之命下安國奏勝非與黄潜善汪伯彦同在政府緘黙附會循致渡江尊用張邦昌結好金國淪滅三綱天下憤欝及正位冢司苗劉肆逆貪生茍容辱逮君父今強敵慿陵叛臣不忌用人得失係國安危深恐勝非上誤大計帝為罷都督之命改兼侍讀安國復持録黄不下頤浩特命檢正諸房文字黄龜年書行安國言有官守者不得其職則去臣今待罪無補既失其職當去甚明况勝非既臣論列之人今朝廷乃稱勝非處苖劉之變能調䕶聖躬昔公羊氏言祭仲廢君為行權先儒力排其説蓋權宜廢置非所施於君父春秋大法尤謹於此建炎之失節者今雖特釋而不問又加進擢習俗既成大非君父之利臣以春秋入侍而與勝非為列有違經訓遂卧家不出頤浩勸帝降旨曰安國屢召偃蹇不至今始造朝又數有請初非勝非不可同都督及改命經筵又以為非豈不以時艱不肯盡瘁乃欲求㣲罪而去其自為謀則善如國計何落職提舉仙都觀是夕彗出胃秦檜三上章留之不報侍御史江躋左司諫吳表臣論勝非不可用安國不當責於是與張燾程瑀胡世将劉一正林待聘樓炤等二十餘人皆坐檜黨並落職罷官云應天變除舊布新之象臺省為之一空安國強學力行以聖人為標的志於康濟時艱見中原淪没常若痛切於身雖以罪去其愛君憂國之心遠而彌篤毎有君命即置家事不問然風度凝逺蕭然塵表視天下萬物無一足以嬰其心故渡江以後儒者進退合義以安國尹惇為首謝良佐嘗曰胡康侯如大冬嚴雪百草痿死而松柏挺然獨秀者也秦檜免榜其罪于朝堂示不復用先是起居郎王居正與秦檜善及檜執政與居正論天下事甚銳既相所言皆不酬居正疾其詭言于帝曰秦檜嘗語臣中國之人唯當着衣㗖飯共圖中興臣時心服其言檜又自謂為相數月必聳動天下今為相設施止是願陛下以臣所言問檜所行檜聞而憾之出居正知婺州及胡安國罷檜留之不報遂求去㑹吕頤浩諷殿中侍御史黄龜年劾檜専主和議沮止國家恢復逺圖且植黨専權漸不可長乃罷檜相仍牓朝堂示不復用初檜所陳二策欲以河北人還金中原人還劉豫帝曰檜言南人歸南北人歸北朕北人将安歸檜語乃塞至是帝召直學士院綦崈禮入對語以是事及王居正所言崈禮即以帝意載于訓辭播告中外人始知檜之姦九月韓世忠大敗劉忠于蘄陽忠走降于劉豫世忠自豫章移師長沙劉忠有衆數萬據白面山營栅相望世忠欲急擊之孟庾不可世忠請期半月效㨗遂與賊對壘奕棊張飲堅壁不動衆莫能測一夕與蘇格聨騎穿賊營候者訶問世忠先得賊軍號隨聲應之周覧以出喜曰此天賜也夜伏精兵二千於白靣山與諸捋㧞營而進賊方迎戰所遣兵已馳入中軍奪望樓植旂葢傳呼如雷賊回顧驚潰世忠麾将士夾擊大破之忠走降劉豫罷修政局王倫還自金倫既被執乆之尼瑪哈使烏凌阿思謀即驛見倫語及契丹時事倫乆困懐歸乃倡為和議謂思謀曰海上之盟兩國約為兄弟萬世無變雲中之役我實饋師賛成厥功上國之臣嘗欲稱兵南來先大聖惠顧盟好不許厥後舉兵以禍吾國果先大聖意乎况亘古自分南北主上恭勤英俊並用期必復古盖思乆逺之謀歸我二帝太母復我土疆使南北赤子無致塗炭亦足以慰先大聖之靈幸執事者賛之思謀沉思曰君言是也歸當盡逹之已而尼瑪哈至曰比上國遣使來問其意指多不能對思謀傳侍郎語欲議和决非江南情實特侍郎自為此言耳倫曰使事有指不然來何為哉人定者勝天天定亦能勝人惟元帥察之尼瑪哈不答及是尼瑪哈忽至館中與倫議和縱之歸報倫至入對言金人情偽甚悉帝優奨之時方議討劉豫和議中格以潘致堯為金國通問使至楚州通判劉晏刼其幣奔劉豫以朱勝非為尚書右僕射兼知樞宻院事以韓世忠為江南東西路宣撫使守建康他帥臣稱宣撫使者並罷世忠置背嵬軍皆勇鷙絶倫者以王似為川陜宣撫副使張浚在關陜三年訓新集之兵當方張之敵以劉子羽為上賔任趙開為轉運擢吳玠為大将子羽慷慨有才畧開善理財而玠毎戰輒勝西北遺民歸附者衆故關陜雖失而全蜀按堵且以形勢牽制東南江淮亦頼以安朝廷疑浚殺趙哲曲端為無辜任子羽玠開為非是乃以似為副使浚始不安以令畤為安定郡王先是燕秦二王後相代襲封自是始定燕王之後金元帥右都監耶律伊都謀反伏誅遂大殺遼宗室冬十月禁私酤祫享于温州十一月詔李綱劉洪道程昌㝢解潜㑹師討楊太太年少楚人謂少為么故又曰楊么王彦復秦州彦守金州數立竒功以捍蜀桑仲旣死劇盗王闢董貴祁守中等悉阻兵窺蜀彦皆擊平之至是敗劉豫将郭振于白石鎮復秦州張浚承制以彦節制商虢陜茟等州軍馬十二月罷湖廣宣撫使李綱綱至潭時流民潰卒羣聚為盗散處荆湘之間多者數萬人綱悉平之因上言荆湖之地自昔號為用武之國今朝廷保有東南制馭西北當於鼎醴荆鄂皆宿重兵使與四川襄漢相接乃有恢復中原之漸不報吕頤浩言綱縱暴無善状遂罷提舉崇福宫川陜宣撫司以便宜賜類試陜西舉人周漠等進士出身初置江浙湖南月樁錢吕頤浩朱勝非以軍用不足創取江浙湖南諸路大軍月樁錢以上供經制係省封樁等窠名充其數茶塩錢葢不得用所樁不能給十之一二故郡邑多横賦自此大為東南民害召張浚知樞宻院事以盧法原為川陜宣撫處置副使及王似同治司事浚聞王似來乃上䟽求觧兵柄且論似不可任吕頤浩不恱朱勝非又以宿憾日短浚故召之南平王李乾徳卒以其子陽煥為交阯郡王以孔端朝為祕書省正字録孔子之後也詔孟庾同都督江淮荆浙諸軍事金薩里罕取金州王彦奔石泉金人乆窺蜀以吴璘駐兵和尚原扼其衝不得逞其志将出竒取之乃以宋叛将李彦琪駐秦州睨仙人關以綴吳玠河池之師復令游騎出熙河以綴闗師古薩里罕自商於直擣上津遂攻金州王彦以三千人迎敵而敗退保石泉薩里罕乘勝而進癸丑三年金天㑹十一年春正月丁巳朔帝在臨安府率百官遥拜二帝不受賀劉子羽之師潰于饒風關吳玠走西縣子羽走三泉金薩里罕遂入興元府而去金人長驅趨洋漢興元劉子羽聞王彦敗亟命田晟守饒風關而遣人召吴玠玠自河池日夜馳三百里引兵援之至饒風以黄柑遺敵曰大軍逺來聊用止渴薩里罕大驚以杖擊地曰爾來何速耶遂悉力仰攻關一人先登則二人擁後先者旣死後者代攻玠軍弓弩亂發大石摧壓如是者六晝夜死者山積敵乃更募死士由間道自祖溪關入繞出玠後乗髙以闞饒風諸軍不支遂潰敵入洋州玠邀子羽去子羽不肯而留玠同守定軍山玠難之遂退保興元之西縣子羽亦焚興元退保大安軍之三泉縣薩里罕遂入興元至金牛鎮四川大震子羽從兵不滿三百與士卒取草芽木甲食之遺玠書訣别玠得書未有行意其愛将楊政大呼軍門曰節使不可負劉待制不然政軰亦舍節使去矣玠乃間道㑹子羽子羽留玠共守三泉玠曰關外蜀之門戸不可輕棄復往守仙人關子羽以潭毒山形斗㧞其上寛平有水乃築壁壘方成而金兵已至距營十數里子羽據胡牀坐于壘口諸将泣告曰此非待制坐處子羽曰子羽今日死于此敵尋亦引去時張浚欲移守潼川子羽移書言已在此金人必不南浚乃止金兵由斜谷北出子羽謀邀之于武休不及薩里罕既回鳳翔遣十人持書招子羽子羽盡斬之而留其一縱之還曰為我語敵欲來即來吾有死爾何可招也初子羽聞有金師預徙梁洋之積及金人深入餽餉不繼殺馬及兩河所僉軍士以食而子羽玠復腹背要擊之死傷者十五六疫癘且作乃引衆自褒斜谷還興元子羽玠因出師掩其後金人墮溪澗死者不可勝計盡棄輜重而走餘兵不能自㧞者悉降子羽遂還興元金人始謀本謂玠在西邉故渉險東來不虞玠馳至雖入三州而得不償失李横復頴順軍頴昌府造渾天儀以李横為襄陽府鄧隨郢州鎮撫使兼京西招撫使詔春秋望祭諸陵二月權邦彦卒以伯琮為和州防禦使賜名瑗吳璘築殺金平移師守之吴璘尚守和尚原而餽餉不繼玠慮金人必復深入且其地去蜀逺命璘棄之而别營壘于仙人闗右興州長舉縣之地名曰殺金平令璘帥和尚原之兵以守焉以席益叅知政事徐俯僉書樞宻院事三月李横傳檄收復京師劉豫乞師于金金人救之及横戰于牟駝岡横師敗績豫復陷潁昌府以韓世忠為淮南東路宣撫使夏四月朱勝非以母䘮去位劉豫将董震以虢州來歸以震為商虢陜州鎮撫使以劉光世為江南東路宣撫使李成復陷虢州楊太僣號大聖天王么衆日盛自號大聖天王立鍾相少子子儀為太子么以下臣事之甚謹水軍統制徐文叛降于劉豫文勇力過人揮巨刀重五十斤所向無前衆呼為徐大刀以功為淮東浙西沿海水軍都統制諸将忌其材勇譛其将叛朝廷遣兵襲之文遂以所部海舟六十艘官軍四千餘自明州浮海抵塩城降于劉豫曰沿海無備二浙可襲也豫大喜以文知萊州令帥其衆冦通泰州潘致堯還自金以韓肖胄為金國軍前通問使禁邊兵犯齊境致堯還言金欲再遣重臣以取信遂寝出師之議而遣肖胄及胡松年徃金議和至齊劉豫欲以臣禮見肖胄無以應松年曰均為宋臣遂長揖不拜豫不能屈王彦復金州金人棄均房而去詔李横等班師還鎮以與金議和也五月罷宣撫司便宜黜陟張浚發閬州張浚雖被召而以劉子羽等軍敗祕其事而未行王似盧法原亦未赴閬至是詔周隨亨李愿宣坤王似盧法原赴鎮而罷宣撫司便宜黜陟浚及劉子羽王庻劉錫等遂赴行在所以陳䂓知池州規守徳安七年敵不敢犯至是召入對首乞罷鎮撫使帝納之自是不復除鎮撫使六月禁諸路招納淮北及中原來歸人以議和也詔王􅊛㑹師討楊太岳飛大敗盗彭友于雩都䖍吉平時䖍吉盗連兵㓂掠循梅廣恵英韶南雄南安建昌邵武汀諸州帝乃専命飛平之飛至䖍州固石洞賊彭友悉衆至雩都迎戰躍馬馳突飛麾兵即馬上擒之餘黨退保固石洞洞髙峻環水止一徑可入飛列騎山下令皆持滿黎明遣死士疾馳登山賊衆亂棄山而下騎兵圍之賊呼丐命飛令勿殺受其降因授徐慶等方略捕諸郡餘賊皆破降之初帝以隆祐太后震驚之故宻喻飛屠䖍城飛請誅首惡而赦脅從帝許焉䖍人感其徳繪像祠之及入見帝手書精忠岳飛字製旂以賜之秋七月復置博學宏詞科從工部侍郎李擢之請也上等改京官除館職中等减三年磨勘下等减二年並與堂除以制詔書表露布檄箴銘記賛頌序為題以試初許任子亦得就試起復朱勝非為尚書右僕射八月翟琮奔襄陽劉豫遂取伊陽劉豫盡有梁衛之地琮不能孤立乃棄伊陽之鳯牛山突圍奔襄陽沂王㮙有罪金人殺之㮙與駙馬劉文彦誣告道君皇帝謀反按騐無状伏誅九月吕頤浩免頤浩屢請興師復中原謂太祖取天下兵不過十萬今有兵十六七萬矣然自金人南牧莫敢嬰其鋒比年韓世忠張俊陳思恭張崇屢奏人有戰心天将悔禍又金人以中原付劉豫三尺童子知其不能立國願睿斷早定决䇿北向今之精銳皆中原人恐乆而消磨他日難以舉事帝方主和議不從至是以水旱不時蘇湖二州地震下詔罪已求言頤浩連章待罪帝一日謂大臣曰國朝四方水旱無不上聞近蘇湖地震泉州大水輒不以奏何也㑹侍御史辛炳殿中侍御史常同論頤浩過惡遂罷頤浩有膽略善弓馬當國歩艱難之日人倚之為重然其再相也胡安國勸其法韓忠獻以至公無我為先報復恩讎為戒頤浩不能用以劉光世為江東淮西宣撫使次池州韓世忠為淮東宣撫使次鎮江府王􅊛為荆南府岳鄂潭鼎澧黄州漢陽軍制置使次鄂州岳飛為江南西路舒蘄州制置使次江州時諸将擁重兵而無分地劉光世在鎮江月費至二千萬緡毎聞易鎮則設辭不奉詔有急復遷延以避之朝廷無如之何故命四人易鎮冬十月李成陷鄧州進㓂襄陽李横奔荆南成入據之遂陷隨唐郢州信陽軍罷諸路類省試舉人十一月韓肖胄還自金禁㳂淮兵擅侵齊境復元祐十科取士法從朱勝非之言也金烏珠取和尚原十二月金李永夀來自帝即位屢遣使如金多見拘留而金未嘗遣一介之使報聘至是尼瑪哈使李永壽王􅀈來請還劉豫之俘及西北士民之在南者且欲畫江以益劉豫與秦檜前議脗合識者益知檜與金人共謀矣殿中侍御史常同言先振國威則和戰常在我若一意議和則和戰常在彼靖康以來分為兩事可為鑒戒帝因從容語及武備曰今飬兵已二十萬有竒同曰未聞二十萬兵而畏人者也劉豫以孔子後璠襲封衍聖公主管祀事甲寅四年金天㑹十二年春正月辛亥朔帝在臨安府率百官遥拜二帝以章誼為金國通問使請還兩宫及河南地金始定制度頒之二月席益罷三月吳玠及金烏珠戰於仙人關大敗之烏珠薩里罕劉夔帥歩騎十萬破和尚原進攻仙人闗自鐵山鑿崖開道循嶺東下玠以萬人守殺金平以當其衝吳璘自武階路入援先以書抵玠謂殺金平之地濶逺前陣散漫後陣阻隘宜益修第二隘示必死戰然後可以必勝玠從之急治第二隘璘冒圍轉戰七晝夜始得與玠㑹于仙人關敵首攻玠營玠擊走之又以雲梯攻壘壁楊政以撞竿碎其梯以長矛刺之諸將有請别擇地以守者璘拔刀畫地謂諸將曰死則死此退者斬金軍分為二烏珠陣于東韓常陣于西璘率銳卒介其間左繞右縈隨急而後戰戰乆璘軍少憊急屯第二隘金兵踵至人被重鎧鐵鉤相連魚貫而上璘以駐隊矢迭射矢下如雨死者層積敵踐而登薩里罕駐馬四視曰吾得之矣翌日命攻西北樓姚仲登樓酣戰樓傾以帛為繩挽之復正金人用火攻樓仲以酒缶撲滅之玠急遣統領田晟以長刀大斧左右擊明炬四山震鼔動地明日大出兵統領王喜王武率銳士分紫白旗入金營金陣亂奮擊射韓常中左目金人始宵遁玠遣統制官張彦刼横山砦王俊伏河池扼其歸路又敗之是役也烏珠以下皆攜妻孥來劉䕫乃劉豫之腹心本謂蜀可圖既不得逞度玠終不可犯則還據鳯翔授甲士田為乆留計自是不妄動矣以趙鼎叅知政事罷都督府以其兵屬張俊張浚還自閬州罷為資政殿大學士居之福州浚至臨安中丞辛炳以宿憾率殿中侍御史常同等劾浚喪師失地䟦扈不臣遂奉祠福州居住浚即日行以王似為川陜宣撫使盧法原吳玠為副使夏四月安置宣撫司叅議官劉子羽于白州吳玠復鳯秦隴州熙河蘭廓路安撫使關師古以洮岷叛降于劉豫徐俯罷與趙鼎議不合故也知壽春府羅興叛降于劉豫五月以岳飛兼黄復州漢陽軍徳安府制置使時楊么與劉豫通欲順流而下李成既陷襄陽等六郡又欲自江西陸行趨浙與么㑹帝命飛為之備及朱勝非言襄陽國之上流不可不急取飛亦奏襄陽等六郡為恢復中原基本今當先取六郡以除心膂之病李成逺遁然後加兵湖湘以殄羣盗帝以語趙鼎鼎曰知上流利害無如飛者遂有是命飛渡江中流顧幕屬曰飛不擒賊不渉此江矣岳飛復襄陽飛至郢偽齊守京超號萬人敵乘城拒飛飛鼓衆而登超投崖死飛復郢州遂趨襄陽李成迎戰左臨襄江飛笑曰歩兵利險阻騎兵利平曠成左列騎江岸右列歩平地雖衆十萬何能為舉鞭指王貴曰爾以長槍歩卒擊其騎兵指牛臯曰爾以騎兵擊其歩卒合戰馬應槍而斃後騎皆擁入江歩卒死者無數成夜棄襄陽遁去飛遂復襄陽齊人收成餘衆益兵駐新野飛與别將王萬夾擊大敗之飛因奏金賊所愛惟子女玉帛志已驕惰劉豫僣偽人心終不忘宋如以精兵二十萬直擣中原恢復故疆誠易為力襄陽隨郢地皆膏腴茍行營田其利甚厚臣候糧足即過江北勦戮敵兵時方重深入之舉而營田之議自是興矣金人侵金州王彦敗之復育太祖後子彦之子伯玖于宫中吳才人以張媫妤鞠瑗亦請于帝乃復取太祖後秉義郎子彦之子伯玖命才人母之岳飛使牛臯復隨州秋七月以胡松年僉書樞宻院事岳飛使王貴張憲復鄧唐州信陽軍襄漢悉平飛移師次于徳安於是襄漢悉平飛移屯徳安軍聲大振㨗聞帝喜曰朕素聞飛行軍有紀律未知其能破敵如此章誼還自金師誼至雲中與尼瑪哈烏珠論事不少屈還至應天劉豫留之以計得歸持尼瑪哈答書約以淮南毋得屯駐軍馬葢欲畫江以益劉豫也八月以趙鼎知樞宻院事都督川陜荆襄諸軍事徐俯既去言者謂當國者不知兵乞令叅政通知由是為朱勝非所忌除鼎知院都督鼎辭以非才帝曰四川全盛半天下之地盡以付卿黜陟專之可也鼎乃條奏便宜復為勝非所抑乃上疏言頃者陛下遣張浚出使川陜國勢百倍于今浚有補天浴日之功陛下有礪山帯河之誓君臣相信古今無二而終致物議以被竄逐夫䘮師失地浚則有之然未必如言者之甚也大抵專黜陟之典受不御之權則小人不安其分謂爵賞可以茍求一不如意便生觖望是時蜀士至於醵金募人詣闕訟之以無為有何以自明故有志之士欲為國立事者毎以浚為戒今臣無浚之功當此重責去朝廷逺恐好惡是非行復紛紛於聰明之下矣伏望閔臣孤忠使得展布四體少寛陛下西顧之憂又言臣所請兵不滿數千皆老弱所齎金帛至微薦舉之人除命甫下彈墨巳行臣日侍宸𠂻所陳巳艱難况在萬里之外乎以魏良臣為金國通問使詔取王安石追封舒王制毁之從吕聰問之請也復以王似知成都府以岳飛為湖北荆襄潭州制置使次于鄂州趙鼎上言湖北鄂岳最為上流要害乞令飛屯鄂岳不惟江西藉其聲勢湖廣江浙亦𫉬安妥於是授飛清逺軍節度使充制置使飛時年三十二自中異諸将建節未有如飛之年少者九月朱勝非乞終䘮制許之時乆兩勝非累韋乞免且自論當罷者十一事帝未許侍御史魏矼劾其過勝非亦請解官持餘服許之勝非居相位苗劉之變保䕶之功為多然詆李綱忌趙鼎人以是少之安定郡王令畤卒劉豫使其子麟以金師㓂淮南金主與尼瑪哈議南伐㑹烏珠還力言其不可曰江南卑濕今士馬困憊糧儲未豐足恐無成功尼瑪哈曰都監務偷安耳金主以議不合乃止至是劉豫聞岳飛復襄鄧遂乞師于金請自宻州泛海趨昌國以攻取宋之糧船還趨明州城下奪取宋主御船直抵錢塘江口金主乃命鄂爾多逹蘭調勃海漢兒軍五萬以應豫謂烏珠知地險易使将前軍豫遣其子麟姪猊各將兵㑹金師南下騎兵自泗攻滁歩兵自楚攻承州金師渡淮韓世忠自承州退守鎮江以趙鼎為尚書右僕射兼知樞宻院事鼎将赴川陜陛辭時淮報驟至舉朝震恐帝曰卿豈可逺去當遂相朕制下朝士相慶以沈與求叅知政事冬十月詔韓世忠進次揚州金人圍亳州召張浚于福州初浚至福州慮金齊必併力窺東南而朝廷已議講解因上疏極言之至是帝思其言會趙鼎勸帝親征帝從之喻樗謂鼎曰六龍臨江兵氣自倍然公自度此舉果出萬全乎或姑試一擲也鼎曰中國累年退避不振敵情益驕義不可更屈故贊上行耳若事之濟否則非鼎所可知也樗曰然則當思歸路耳張徳逺有重望若使宣撫江淮荆浙福建俾以諸道兵赴闕則其來路即朝廷歸路也鼎然之入言于帝遂召浚為提舉萬壽觀兼侍讀韓世忠大敗金人于大儀追至淮而還世忠得命進駐揚州手勅感泣曰主憂如此臣子何以生為遂復如揚州使統制解元守承州候金歩卒親提騎兵駐大儀以當敵騎伐木為柵自斷歸路㑹朝廷使魏良臣使金世忠撤炊㸑紿良臣有詔移屯守江良臣疾馳去世忠度良臣已出竟即上馬令軍中曰眡吾鞭所嚮於是移軍自大儀勒五陣設伏二十餘所約聞鼓即起擊良臣至金軍中金人問宋師動息則具以所見對聶哷貝勒聞世忠退大喜即起兵至江口距大儀五里别將托卜嘉擁鐵騎過五陣東世忠傳小麾鳴鼔伏兵四起旗色與金人旗雜出金軍亂宋師迭進世忠令背嵬軍士各執長斧上揕人胸下斫馬足敵被甲陷泥淖世忠麾勁騎四靣蹂躪人馬俱斃遂擒托卜嘉等二百餘人而世忠所遣董旼亦擊敗金人于天長之鵶口橋解元至髙郵北門遇敵設伏水軍夾河陣一日合戰十三相距未决世忠遣成閔将騎士徃援復大戰俘獲甚多世忠復親追至淮金人驚潰相蹈藉溺死者甚衆㨗聞羣臣入賀帝曰世忠忠勇朕知其必能成功沈與求曰自建炎以來将士未嘗與金人迎敵一戰今世忠連㨗厥功不細論者以此舉為中興武功第一帝自將禦金師次于平江府金齊之師日迫羣臣勸帝他幸散百司以避之張俊曰避将安之惟進禦乃可免耳趙鼎曰戰而不㨗去未晚也帝因曰朕為二聖在逺屈已請和而彼復肆暴侵凌朕當親總六師臨江决戰沈與求復力贊之鼎喜曰累年退怯敵志益驕今聖斷親征將士必奮成功可必臣願効區區以圖報國於是以孟庾為行宫留守命百司不預軍旅之務者從便避兵以張俊為浙西江東宣撫使王􅊅為江西沿江制置使命胡松年詣江上㑹諸將議進兵劉光世移軍建康後宫自温州泛海如泉州劉光世遣人諷鼎曰相公自入蜀何事為他人任患韓世忠亦謂人曰趙丞相真敢為者鼎聞之恐上意中變乗間言陛下飬兵十年用之正在今日若少加退沮即人心渙散長江之險不可復恃矣戊戍帝遂發臨安劉錫楊存中以禁旅從己亥韓世忠㨗奏至壬寅帝次平江欲自渡江决戰鼎曰敵之逺來利在速戰遽與争鋒非䇿也且逆豫猶遣其子豈可煩至尊耶帝為止不行及胡松年自江上還云北兵大集然後知鼎之有先見也十一月詔暴劉豫罪逆于六師自豫僣立朝廷以金故至名為大齊至是始聲其罪金人入濠州金人入光滁州以張浚知樞宻院事視師鎮江浚至見趙鼎執其手曰此行舉措皆合人心鼎笑曰喻子才之功也詔拜浚知樞宻院事以其盡忠竭節諭于中外浚既受命即日赴江上視師時達蘭烏珠擁兵十萬約日渡江决戰浚長驅臨江召劉光世韓世忠張俊議事將士見浚勇氣十倍浚既部分諸將身留鎮江以節度之十二月金人圍廬州岳飛使牛臯救之金師引去臯追敗之金齊合兵圍廬州守臣仇悆嬰城固守求援于岳飛飛遣牛臯徐慶援之臯至遙語金將曰牛臯在此爾軰胡為見犯衆皆愕然不戰而潰飛謂臯曰必追之去而復來無益也臯乃追擊三十餘里金人相踐及殺死者不可勝計金師渡淮北歸達蘭屯泗州烏珠屯竹塾鎮為韓世忠所扼以書幣約戰世忠遣麾下王愈及兩伶人以橘茗報之且言張樞宻已在鎮江烏珠曰張樞宻貶嶺南何得乃在此愈出浚所下文書示之烏珠色變遂有謀歸之志㑹雨雪金餽道不通野無所掠殺馬而食蕃漢軍皆怨又聞金主病篤乃夜引師還烏珠等既去劉麟劉猊不能獨留亦棄輜重遁帝謂趙鼎曰近將士致勇争先諸路守臣亦翕然自効乃朕用卿之力也鼎謝曰皆出聖斷臣何力之有焉或問鼎曰金人傾國來攻衆皆洶懼公獨言不足畏何也鼎曰敵衆雖盛然以劉豫邀而來非其本心戰必不力以是知其不足畏也帝語張浚曰趙鼎真宰相天使佐朕中興可謂宗社之幸鼎奏金人遁歸尤當博采羣言為善後之計於是詔前宰執議攻戰備禦措置綏懐之方提舉臨安府洞霄宫李綱上疏曰陛下勿以敵退為可喜而以仇敵未報為可憤勿以東南為可安而以中原未復神州赤縣陷于敵國為可耻勿以諸將屢㨗為可賀而以軍政未修士氣未振尚使彊敵得以潛逃為可虞則中興之期可指日而俟議者或謂敵馬既退當遂用兵為大舉之計臣竊以生理未固而欲浪戰以僥倖非制勝之術也今朝廷以東南為根本將士暴露之乆財用調度之煩民力科取之困茍不大脩守備痛自料理先為自固之計何以能萬全而制敵議者又謂敵人既退當且保據一隅以茍目前之安臣謂祖宗境土豈可坐視淪陷不務恢復若今歳不征明年不戰使敵勢益張而吾之所糾合精銳士馬日以耗損何以圖敵唯宜於防守既固軍政既修之後即議攻討乃為得計其守備之宜則當料理淮甸荆襄以為東南屏蔽夫六朝之所以能保有江左者以強兵巨鎮盡在淮南荆襄間也今當以淮南東西及荆襄置三大帥屯重兵以臨之分遣偏師進守支郡加以戰艦水軍上連下接自為防守敵馬雖多不敢輕犯東路以揚州為帥府而以江東財用給之西路以廬州為帥府而以江西財用給之荆襄以襄陽為帥府而以湖北財用給之徐議營田使之贍養加以歳月則藩籬成守備之宜莫大於是矣然後可以議攻戰之利亦當分責於諸路大帥如淮東西之帥則當責以收復京東西路荆襄之帥則當責以收復京西南北路川陜之帥則當責以收復陜西五路此事雖若落落難合然在陛下聖意先定於中而以至誠不倦决斷行之蓋無不可成之理至於擇将之方治兵之政車馬噐械之制號令賞罰之權兵家皆有成法無待於言而戰陣之間因敵决勝臨事制度者兵無常形又不可預圖也臣願竊以為獻者在勿失機會而已若夫措置之方則臣願先定駐蹕之所今鑾輿未復舊都莫如權宜且於建康駐蹕控引二浙襟𢃄江湖運漕財榖無不便利然淮南有藩籬形勢之固然後建康為可都願陛下與二三大臣熟計之綏懐之畧則臣願先為自治自彊之計使中原陷溺之民知所依告益堅戴宋之心又言臣竊觀陛下臨御迨今九年國不關而日蹙事不立而日壊將驕而難御卒惰而未練國用匱而無贏餘之蓄民力困而無休息之期使陛下憂勤雖至而中興之效邈乎無聞則羣臣誤陛下之故也陛下觀近年以來所用之臣慨然敢以天下之重自任者幾人平居無事小亷曲謹似可無過忽有擾攘則錯愕無所措手足不過奉身以退天下憂危之重委之陛下而已有臣如此不知何補於國而陛下亦安取此夫用人如用醫必先知其術業可以已病乃可使之進藥而責成功今不詳究其術業而姑試之則雖日易一醫無補於病徒加疾而已大槩近年間暇則以和議為得計而以治兵為失策倉卒則以退避為愛君而以進禦為誤國上下偷安不為長久之計天歩艱難國勢益弱職此之由今天啓宸衷悟前日和議退避之失親臨大敵天威所臨使北軍數十萬之衆震怖不敢南渡潜師宵奔則和議之與治兵退避之與進禦其效槩可見矣然敵兵雖退未大懲創安知其秋髙馬肥不再來擾我疆場使疲於奔命哉且退避之䇿可暫而不可常可一而不可再退一歩則失一歩退一尺則失一尺徃時自南都退而至維揚則河北河東關陜失矣自維揚退而至江浙則京東西失矣萬有一敵騎南牧将復退避不知何所適而可乎航海之䇿萬乗冒風濤之險此又不可之尤者惟當於國家閒暇之時明政刑治軍旅選將帥修車馬備器械峙糗糧積金帛敵來則禦俟時而奮以光復祖宗之大業此最上䇿也臣願陛下自今以徃勿復為退避之計夫古者敵國善鄰則有和親仇讐之邦鮮復遣使今金人造釁之深知我必報其措意為何如而我方且卑辭厚幣屈體以求之其不推誠以見信决矣噐幣禮物所費不貲使軺徃來坐索士氣而又邀我以必不可從之事制我以必不敢為之謀是和卒不成而徒為此擾擾也非特如此於吾自治自彊之計動輒相妨實有所害臣願自今以徃勿復遣和議之使二者既定擇所當為者一切以至誠為之俟吾之政事脩倉廪實府庫充噐用偹士氣振力可有為乃議大舉則兵雖未交而勝負之勢决矣惟陛下正心以正朝廷百官使君子小人各得其分則是非明賞罰當自然藩方協力將士用命雖強敵不足畏逆臣不足憂此特在陛下方寸間耳帝賜詔褒諭之而不能用乙卯五年金熙宗亶天會十三年夏大徳元年春正月乙巳朔日有食之帝在平江府張浚還自鎮江以韓世忠為淮東宣撫使帥師次於鎮江劉光世為淮西宣撫使帥師次於太平張俊為江東宣撫使帥師次於建康酈瓊復光州金主旻卒安班貝勒亶立太宗以舍音鄂特本共知國政尼瑪哈斡里雅布總司戎事滅遼舉宋議禮制度治厯明時纘武脩文經國䂓模於是始定在位十三年無宫苑奢淫之過用大臣之言捨子立亶使太祖世嫡不失正緒可謂行其所難矣二月帝如臨安府詔太常少卿張銖奉迎太廟神主於溫州帝至臨安府川陜宣撫副使盧法原卒於閬州以趙鼎張浚為尚書左右僕射並兼知樞宻院事都督諸路軍馬鼎浚相得甚驩及将並相史館校勘喻樗聞之曰二人宜且同在樞府他日趙退則張繼之立事任人未甚相逺則氣脉長若同處相位萬有一不合或當去位則必更張是賢者自相背戾矣以岳飛為荆湖南北襄陽府路制置使帥師討楊太於洞庭湖王􅊛討么連年不克朝議以為招之便胡閎休獻致㓂禦戎二䇿言天地之氣先春後秋招之不伏則討之㑹飛入朝遂以命之飛以閎休為機宜文字吳璘復秦州金薩里罕來救楊政敗之作太廟於臨安從禮部員外郎江端友之請也侍御史張致逺言剏建太廟甚失興復大計殿中侍御史張絢亦言去年建明堂今年立太廟是將以臨安府為久居之計不復有意中原不納詔張浚如江上議邊防初封劉光世妾許氏等為孺人從光世之請妾之有封自此始也閏月胡松年罷王􅊛免置總制司命孟庾領之命户部尚書章誼措置財用孟庾提領號總制司初陳伯亨以發運兼經制使帝在揚州四方貢賦不以期至吕頤浩葉夢得等言亨伯以東南用兵嘗設經制司取量添酒錢及増一分稅錢頭子賣契等錢斂之於細而積之甚衆一嵗得錢近百萬緡所補不細今若行於諸路無慮數百萬計邊事未寧茍不出此緩急必至暴斂與其斂於倉卒曷若積於細微帝從之至是又因經制之額増析而為總制錢大為東南之害三月張浚乞視師於潭州詔許之浚以建康東南都㑹而洞庭據上流恐楊么滋蔓為害請乗其怠討之具䟽請行帝遣之至醴陵釋邑囚數百皆楊么諜者給以文榜俾招諭諸砦皆讙呼而去於是相率請降金以尼瑪哈領三省事初粥民間田宅契紙夏四月罷鎮撫使封周後柴叔夏為崇義公奉安神主於太廟太上道君皇帝崩於金之五國城太上自離汴與淵聖及后妃族屬備極窘辱至是崩年五十四遺言欲歸葬内地金主不許時兵部侍郎司馬朴與奉使朱弁在燕山聞之共議制服弁欲先請朴曰為臣子聞君父䘮當致其哀尚何請設請而不許奈何遂服斬衰朝夕哭金人義之而不責洪皓在冷山聞之北向泣血撰文以祭其辭激烈問者揮涕焉史臣曰徽宗非若晉恵之愚孫皓之暴亦非有曹馬之簒奪其失國也特以恃其私智小慧用心一偏踈斥正士狎近姦諛於是蔡京以獧薄巧佞之資濟其驕奢淫泆之志溺信虛無崇飭㳺觀困竭民力君臣逸豫相為誕謾怠棄國政日行無稽及童貫用事又加兵勤逺稔禍速亂遂致國破身辱與石重貴同科豈得諉諸數哉自古人君玩物而䘮志縱欲而敗度鮮不亡者徽宗特甚焉耳行朝獻景靈宫之禮於射殿龍圖閣直學士致仕楊時卒自帝南幸時奉祠優游林泉以著書講學為事東南學者推時為程氏正宗胡宏羅從彦皆其弟子卒年八十三諡文靖羅從彦南劔人初為博羅主簿聞時得程氏之學慨然慕之時為蕭山令從彦徒歩徃從見時三日即驚汗浹背曰不至是幾虚過一生矣旣卒業築室山中絶意仕進終日端坐時行溪上吟咏而歸充然自得朱熹謂龜山倡道東南士之游其門者甚衆然潜思力行任重詣極者仲素一人而已學者稱為豫章先生其門人李侗最著李侗初從從彦學從彦好静坐侗退入室中亦静坐從彦令侗静中看喜怒哀樂未發前氣象而求所謂中者久之侗於天下之理該攝洞貫以次融釋各有條序從彦甚重之侗卒業退居山中謝絶世故凡四十年飲食或不充而怡然自適閨門内外夷愉肅穆若無人聲而衆事自理與鄉人處飲食言笑終日油油如也其接後學答問不倦嘗曰學問之道不在多言但黙坐澄心體認天理若見雖一毫私欲之發亦退聽矣學者稱為延平先生朱熹嘗從侗受學毎稱侗姿禀勁特氣節豪邁而充養完粹無復圭角精純之氣逹於面目色温言厲神定氣和語黙動靜端詳閒泰自然之中若有成法平居恂恂若無甚可否者及其酬酢事變斷以義理則有截然不可犯者五月何蘚如金通問二帝中書舍人胡寅乞罷許之初建炎中胡寅為起居郎嘗上䟽請絶和議刻意講武以使命之資為養兵之費庶幾敵人知我有含怨必闘之志沙漠之駕或有還期不然則今僻處東南萬事不競所為乞和必無可成之理不報及何蘚奉使寅為中書舍人復上䟽言女真昔驚動陵寢戕伐宗廟刼質二帝塗炭祖宗之民乃陛下讎也自建炎丁未至於紹興甲寅所謂卑辭厚禮以問安迎請為名而遣使者不知幾人矣知二帝所在見二帝之面得女真之要領因講和而能息敵兵者誰歟但見丙午而後通和之使未息肩而黄河長淮大江相次失險矣劉豫稱兵犯順矣女真知中國所重在二帝所恨在刼質所畏在用兵則常示欲和之端增吾所重平吾所恨匿吾所畏而中國坐受此餌旣乆而後寤也天下其謂自是改圖必矣何為復出此謬計耶茍曰姑為是豈有修書稱臣厚費金帛而成就一姑息之事也茍曰以二帝之故不得不然則前效可考矣况嵗月益久敵情益閟必無可通之理也適觀何蘚之事恐和說復行國論傾危士氣沮䘮所繫不細䟽入詔褒諭之及張浚自潭州還言使事兵家機權後將闢地復土終歸於和未可遽絶帝遂遣蘚行寅因乞外知邵州以孟庾知樞宻院事封貴州防禦使瑗為建國公出就資善堂聽讀趙鼎請名行宫新作書院為資善堂命建國公就堂聽讀且薦徽猷閣待制范冲兼翊善起居郎朱震兼贊讀二人皆名徳老成極天下之選岳飛嘗詣資政堂見瑗退而喜曰社稷得人矣中興基業其在是乎以令矼為安定郡王行綂元厯常州布衣陳得一所造也金左副元帥鄂爾多卒六月岳飛大破楊太於洞庭太死湖湘平飛受命討么而所部皆西北人不習水戰飛曰兵何常顧用之何如爾乃先遣使招諭之其黨黄佐曰岳節使號令如山若與之戰萬無生理不如徃降節使誠信必善遇我遂降飛表授佐武義大夫單騎按其部拊佐背曰子知逆順者果能立功封侯豈足道哉欲復遣子至湖中視其可乗者擒之可勸者招之如何佐感泣誓以死報㑹張浚至潭州席益疑飛玩㓂欲以上聞浚曰岳侯忠孝人也兵有深機胡可易言益慙乃止黄佐襲周倫砦殺之飛上其功遷武功大夫飛以王􅊛無功皆其統制任士安不受􅊛節度故也鞭之使餌賊曰三日賊不平斬汝矣士安宣言岳太尉兵二十萬至矣賊見止士安軍併力攻之飛設伏士安戰急伏四起擊之賊走㑹朝旨召張浚還防秋飛袖小圖示浚浚欲俟來年議之飛曰已有定畫都督能少留不八日可破賊浚曰何言之易飛曰王四廂以王師攻水冦則難飛以水㓂攻水冦則易水戰我短彼長以所短攻所長所以難若因敵將用敵兵奪其手足之助離其腹心之託使孤立而後以王師乗之八日之内當俘諸酋浚許之飛遂如鼎州黄佐招楊欽來降飛喜曰楊欽驍悍既降賊腹心潰矣表授欽武義大夫禮遇甚厚乃復遣歸湖中兩日欽說全琮劉詵來降飛詭罵欽曰賊不盡降何來也杖之復令入湖是夜掩賊營降其衆數萬么負固不服方浮舟湖中以輪激水其行如飛旁置撞竿官舟迎之輒碎飛伐君山木為巨筏塞諸港汊又以腐木亂草浮上流而下擇水淺處遣善罵者桃之且行且罵賊怒來追則草木壅積舟輪礙不行飛急擊之賊奔港中為筏所拒官軍乗筏張牛革以蔽矢石舉巨木撞其舟盡壊么技窮赴水死飛入賊壘餘酋驚曰何神也俱請降衆凡二十餘萬巨舟千艘飛親行諸砦慰撫之縱老弱歸田里少壮為軍果八日而㨗書至潭張浚歎曰岳侯神筭也黄誠斬楊么首挾鐘子儀周倫詣浚降湖湘悉平初么恃其險官軍自陸襲則入湖水攻之則登岸因曰欲犯我者除是飛來至是人以其言為䜟云孟庾罷韓世忠復鎮淮軍八月論詆誣宣仁聖烈皇后罪追貶章惇為昭化軍節度副使蔡卞為單州團練副使子孫不許在朝九月金主追尊其考妣為帝后金主追尊其考豐王宗峻為景宣皇帝廟號徽宗妣富察氏為恵昭皇后冬十月張浚還自潭州帝賜浚書謂上流定則川陜荆㐮形勢接連事力增倍天其以中興之功付卿乎浚遂奏遣岳飛屯荆襄以圖中原自鄂岳轉淮東大㑹諸將議防秋之宜帝遣使賜詔趣歸及至帝勞問曰卿暑行甚勞羣冦旣就招撫成朕不殺之仁卿之力也召對便殿浚進中興備覽四十一篇帝嘉歎置之座隅以席益為四川制置大使時吳玠專治戰守於財計盈虛未嘗問一切以軍期趣辦於趙開遂與開異趣玠數以饋餉不繼訴於朝開亦自劾老􅉵乞去朝廷為之交解乃以益為制置大使位宣撫副使上州軍兵馬並𨽻大使司邊防重事仍令宣撫司處置令民自實田畆間架於官賣之令州縣造户帖出賣民間自行開具地宅田畒間架之數立為定價凡六等期一季足其錢令督府摏管十一月徴和靖處士尹焞為崇政殿說書初金人陷洛焞闔門被害焞死復甦門生舁至山谷中而免劉豫聘之不從以兵恐之焞自商州奔蜀至閬得程頤易傳十卦於其門人吕稽中又得全本於其壻邢純拜而受之因止於涪涪頤讀易地也焞乃闢三畏齋以居州人不識其靣至是范冲舉以自代以趙開為四川都轉運使詔張浚視師於襄漢川陜浚以金勢未衰而劉豫復據中原乃具奏請出視師從之浚復以知鄂州劉子羽叅議軍事以李綱為江西安撫制置大使知洪州張浚薦其忠也以沈與求兼權樞宻院事丙辰六年金天㑹十四年西遼感天后蕭氏咸清元年春正月己巳朔帝在臨安府以伯􅅼為和州防禦使賜名璩安定郡王令矼卒二月置行在交子務印交子錢引給諸路令公私同見錢行用從都督府措置財用張澄之請也以折彦質僉書樞宻院事韓世忠圍淮陽軍金烏珠救之世忠還世忠聞劉豫聚兵淮陽即引軍渡淮旁符離而北至其城下為賊所圍奪戈一躍潰圍而出不遺一鏃呼延通與金將雅哈貝勒摶戰扼其吭而擒之乗銳掩擊金人敗去遂進兵圍淮陽堅守不下約曰受圍一日則舉一烽至六烽具舉烏珠與劉猊皆引兵至世忠求援於張俊俊以世忠有相吞意不從世忠勒陣向敵遣人語之曰錦衣驄馬立陣前者韓相公也或危之世忠曰不如是不足以致敵敵果至殺其導戰二人遂引去世忠復還楚州淮陽之民從而歸者以萬計沈與求罷張浚㑹諸將於鎮江命張俊進屯盱眙二月以韓世忠為京東淮東路宣撫處置使屯楚州岳飛為京西湖北路宣撫副使屯鄂州張浚毎稱二人可倚以大事故並命之世忠至楚披草萊立軍府與士同力役夫人梁氏親織箔為屋將士有怯戰者世忠遺以巾幗設樂大宴俾婦人妝以耻之故人人奮勵撫集流散通商惠工山陽遂為重鎮焉金以尼瑪哈鄂特本富勒呼並領三省事夏四月劉豫陷唐州京湖宣撫副使岳飛以母䘮去官詔起復之五月復造見錢關子罷交子務有司言朝廷措置見錢闗子失其本意改為交子官無見錢民何以信於是罷交子務令𣙜貨務儲見錢印造闗子六月張浚撫師淮上命劉光世進屯廬州岳飛進屯襄陽楊沂中進屯泗州浚命光世屯合肥以招北軍沂中領精騎以佐張俊飛屯襄陽以窺中原且謂飛曰此君素志也飛扶母櫬還廬山累表乞終䘮詔不許以令懬為安定郡王秋七月以郭浩為永興軍路經畧安撫使知金州邵隆知商州經理商虢以陳公輔為左司諌吏部貟外郎陳公輔言今日之禍實由公卿大夫無氣節忠義不能維持天下國家平時既無忠言直道緩急詎肯仗節死義豈非王安石學術壊之耶安石之政事既壊人才學術則害人心三經字説詆誣聖人破碎大道非一端也春秋正名分定褒貶俾亂臣賊子懼安石使學者不治春秋史漢載成敗安危存亡理亂為世龜鑑安石使學者不讀史漢揚雄不能死於王莾之簒而為之著劇秦美新之文安石乃曰雄之仕合於聖人無可無不可之義馮道事四姓八君安石乃曰道五代時最善避難以存身使公􅀸皆師安石之言宜其無氣節忠義也䟽入帝大喜授司諫賜三品服劉光世復壽春府八月召四川都轉運使趙開還以李迨代之席益在四川頗侵用軍期錢趙開訴於朝又數增錢引而軍計猶不給朝廷以開益不恊乃召開赴行在而以迨代之自金人犯陜蜀開職饋餉軍用無乏一時頼之其後計臣屢易於開經畫無敢變更然茶䀋搉酤竒零絹布之征遂為蜀之常賦則開作俑之責不能逃焉岳飛使牛臯復鎮汝軍以秦檜為行宫留守孟庾同留守並參决尚書省樞宻院事張浚奏東南形勢莫重於建康實為中興根本且使人主居此則北望中原常懐憤惕不敢自暇自逸而臨安僻居一隅内則易生安肆外則不足以號召逺近係中原之心請即幸之以撫三軍而圖恢復㑹諜報劉豫將有南冦之志趙鼎建議幸平江帝從之遂命檜庾留守檜自被斥㑹與金議和稍復其官知温州紹興府又以張浚薦授醴泉觀使兼侍讀至是漸用事張浚進屯泗州岳飛復蔡州飛累戰皆㨗遣楊再興復河南長水縣張浚曰飛措畫甚大今已至伊洛則太行一帶山砦必有嚮應者已而忠義社梁興等果歸之飛復及偽齊李成孔彦舟連戰至蔡州克其城金主追帝其先祖函普曰始祖烏嚕曰徳帝巴哈曰安帝綏赫曰獻祖烏古鼐曰景祖和哩布曰世祖頗拉淑曰肅宗英格曰穆宗烏雅舒曰康宗妣皆為皇后復定景祖世祖太祖太宗廟皆不祧九月帝如平江府岳飛使王貴敗劉豫之衆於唐州上䟽進師恢復中原帝不許飛乃還鄂飛遣王貴郝晸董先復虢州盧氏縣獲糧十五萬石中原響應㑹劉豫屯兵窺唐州飛遣王貴等攻破之焚其營飛因奏進兵以取中原不許於是孤軍無援引還鄂州帝至平江府權奉安神主於能仁寺冬十月劉麟劉猊分道冦淮西張浚使楊沂中帥師禦之戰於藕塘猊大敗走麟自順昌引去沂中追至南壽春而還劉豫聞張浚㑹諸將於江上牓其罪逆將進兵討之恐懼告急於金請先出師南冦而乞師救援金主召諸將相議之富勒呼曰先帝所以立豫者欲其闢疆保境我得安民息兵也今豫進不能取又不能守兵連禍結愈無休期也從其請則豫受利敗則我受其弊况前年因豫出師嘗不利於江上矣奈何許之金主從其議遂不許豫而遣烏珠引兵黎陽以觀釁於是豫僉鄉兵三十萬號七十萬分三道而南子麟率中路兵由壽春趣廬州以犯合肥姪猊率東路兵取紫荆山出渦口以犯定逺孔彦舟率西路兵趨光州以犯六安朝廷大懼時張俊屯盱眙楊沂中屯泗州韓世忠屯楚州岳飛屯鄂州劉光世屯廬州而沿江上下無兵趙鼎深以為憂移書張浚欲令張俊與楊沂中合以保合肥浚以為然乃遣楊沂中張宗顔等分道禦之且令沂中趣濠州以與張俊合因謂沂中曰上待統制厚宜及時立功㑹邊報日急張俊劉光世皆張大賊勢以聞浚以書戒二將曰賊豫之兵以逆犯順若不勦除何以立國平日亦安用養兵為哉今日之事有進戰無退保及劉麟進逼合肥趙鼎曰豫逆賊也官軍與豫戰而不能勝或更退守何以立國今賊已渡淮當急遣張俊合光世之軍盡掃淮南之冦然後議去留帝善之然慮張俊光世不足任因命岳飛盡以兵東下而手札付浚令俊光世沂中等還保江浚上言若令俊等渡江則無淮南而長江之險與賊共有淮南之地正所以屏蔽大江使賊得淮南因糧就運以為家計江南其可保乎今正當合兵掩擊可保必勝若一有退意則大事去矣且岳飛一動襄漢有警何所恃乎願朝廷勿専制於中使諸將有所觀望也帝手書報浚曰非卿識髙慮逺何以及此由是異議乃息沂中兵至濠光世已舍廬州將趨采石淮西大震浚聞之令吕祉馳徃光世軍中諭其衆曰若有一人渡江者即斬以徇光世不得已乃還駐廬州與沂中俊等相應劉猊軍至淮東為韓世忠所阻乃引趣定逺劉麟從淮西繫三浮橋而渡次於濠壽之間張俊以兵拒之甲辰猊率衆數萬犯定逺欲趨宣化以冦建康沂中以兵二千進禦與猊前鋒遇於越家坊敗之猊恐孤軍深入為王師所襲乃引兵趣合肥欲與麟合而後進行至藕塘沂中復遇之猊據山列陣矢下如雨沂中急擊之且使統制吳錫率勁卒五千突入其軍猊衆潰亂沂中縱大軍乗之而自以精騎衝其脅大呼曰賊破矣賊衆錯愕駭視張宗顔自泗來乗背擊之張俊大軍復與戰於李家灣賊衆大敗横屍滿野猊以首抵其謀主李愕曰適見髯將軍銳不可當果楊殿前也即與精騎數軰遁去沂中躍馬叱之餘衆皆怖請降麟在順昌聞猊敗亦㧞砦去沂中及王徳乗勢追麟至南壽春而還孔彦舟亦解光州圍而退北方大恐金人聞豫敗來詰其狀始有廢豫之意西遼主達實卒其妻蕭氏權國事達實殂子伊立年幼遺命后塔布布延權國稱制號感天皇后十二月張浚還自鎮江韓世忠敗金人於淮陽趙鼎罷初張浚在江上遣參議軍事吕祉入奏事所言誇大鼎毎抑之帝謂鼎曰他日張浚與卿不和必吕祉也既而浚因請事語意微侵鼎鼎言臣初與浚如兄弟因吕祉離間遂爾睽異今浚成功當使展盡底藴浚當留臣當去帝曰俟浚還議之及浚還朝鼎與折彦質請帝回蹕臨安浚奏天下之事不倡則不起三歳之間陛下一再臨江士風百倍今岳飛軍回人心解體乞乘勝攻河南而車駕進幸建康又言劉光世驕惰不戰不可為大將請罷之鼎言擒劉豫固易耳然得河南能保金人不内侵乎且光世累世為將將卒多出其門無故而罷之恐人心不安浚滋不悦而帝多從浚議鼎求退益力遂罷知紹興府鼎與浚為相政事先後及人才所當召用者條而置之座右次第奏行之故列要津者多一時之望人號為小元祐復尊程頤之學一時學者皆聚於朝然鼎不及見頤故有偽稱伊川門人以求進者亦䝉擢用帝嘗親書忠正徳文四字及尚書一帙賜之曰書所載君臣相戒飭之言所以賜卿欲共由斯道鼎頓首謝折彦質罷以張守叅知政事以吕頤浩為浙西安撫制置大使判臨安府陳公輔乞禁程頤之學詔從之左司諫陳公輔上䟽言今世取程頤之說謂之伊川之學相率而從之倡為大言謂堯舜文武之道傳之仲尼仲尼傳之孟軻軻傳之頤頤死遂無傳焉狂言恠語淫說鄙論曰此伊川之文也幅巾大袖髙視濶歩曰此伊川之行也師伊川之文行伊川之行則為賢士大夫捨此皆非也乞禁止之遂詔士大夫之學宜以孔孟為師庻幾言行相稱可濟時用布告中外使知朕意丁巳七年金天㑹十五年春正月癸亥朔帝在平江府金初用大明厯天會五年命司天楊級造大明厯至是始用之以陳與義叅知政事沈與求同知樞宻院事張浚改兼樞宻使以秦檜為樞宻使何蘚還自金始聞太上皇帝及太上皇后崩帝成服張浚請遵以日易月之制詔外朝從之宫中仍致䘮三年何蘚范寧之還始知道君皇帝及寧徳皇后鄭氏相繼崩己亥帝成服百官七上表請遵以日易月之制知嚴州胡寅上疏請致䘮三年衣墨臨戎以化天下帝欲遂終服張浚言天子之孝不與士庻同必思所以奉宗廟社稷今梓宫未返天下塗炭願陛下揮淚而起斂髮而趍一怒以安天下之民帝乃命浚草詔告諭羣臣外朝勉從所請以日易月宫中仍行三年之䘮浚又請命諸大將率三軍發哀成服俾中外感動而退上䟽曰陛下思慕兩宫憂勞百姓臣每感慨自期誓殱敵讎十年之間親養缺然爰及妻孥莫之私顧其意亦欲遂陛下孝養之心拯生民於塗炭昊天不吊禍變忽生使陛下抱無窮之痛罪將誰執念昔陜蜀之行陛下命臣曰我有大隙於北刷此至耻惟爾是屬而臣終隳成功使敵無憚今日之禍端自臣致乞賜罷黜帝詔浚起視事浚再䟽待罪不許時帝遇朔望猶率羣臣遥拜淵聖中丞廖剛言禮有隆殺兄為君則君之已為君則兄之可也望但歳時行家人禮於内庭從之二月癸巳朔日有食之以王倫為奉迎梓宫使如金倫陛辭帝命謂撻懶曰河南之地上國既不有與其付劉豫曷若見歸以岳飛為湖北京西宣撫使飛自鄂入見帝從容問曰卿得良馬否飛曰臣有二馬日啖芻豆數斗飲泉一斛然非精潔則不受介而馳初不甚疾比行百里始奮迅自午至酉猶可二百里禠鞍甲而不息不汗若無事然此其受大而不茍取力裕而不求逞致逺之材也不幸相繼而死今所乗者日不過數升而秣不擇粟飲不擇泉攬轡未安踴躍疾驅甫百里力竭汗喘殆欲斃然此其寡取易盈好逞易窮駑鈍之材也帝稱善進拜太尉宣撫以王徳酈瓊兵𨽻之帝復詔徳瓊曰聽飛節制如朕親行時韓世忠張俊皆乆貴立功而飛少事俊為列将一旦㧞起爵位與齊俊深忌之始與之有隙矣三月帝如建康府以吕祉為兵部尚書都督府叅謀軍事帝至建康以沈與求知樞宻院事遥尊宣和皇后韋氏為皇太后帝一日號慟謂輔臣曰宣和皇后春秋髙朕思之不遑寧處屈已講和正為此耳翰林學士朱震引唐建中故事請遥尊為皇太后從之以吕頤浩兼行宫留守孟庾罷淮西宣撫使劉光世免以其兵𨽻都督府命吕祉節制之光世在淮西軍士多降盗素無紀律張浚言其沈酣酒色不恤國事語以恢復意氣怫然乞賜罷黜㑹光世引疾乞解兵柄乃拜少師萬壽觀使奉朝請張浚因分其兵為六軍命吕祉徃廬州節制之張守曰必欲改圖湏得聞望素髙能服諸將之心者乃可祉不可用也浚不從夏四月作太廟於建康京湖宣撫使岳飛乞終䘮制遂還廬山張浚以張宗元監其軍飛留建康見帝數論恢復之略且上疏言金人所以立劉豫於河南蓋欲荼毒中原以中國攻中國彼得以休兵觀釁臣欲陛下假臣月日便則提兵趨京洛據河陽陜府潼關以號召五路叛將叛將既還遣王師前進彼必棄汴而走河北京畿陜右可以盡復然後分兵濬滑經略兩河如此則劉豫成擒金人可滅社稷長久之計實在此舉帝曰有臣如此顧復何憂進止之機朕不中制復召至寢閤命之曰中興之事一以委卿飛遂圖大舉會秦檜主和議忌之言於帝請詔飛詣都督張浚議事浚謂飛曰王徳淮西軍所服浚欲以為都統而命吕祉以督府叅謀領之如何飛曰徳與酈瓊素不相下一旦揠之在上則必争吕尚書不習軍旅恐不足服衆浚曰張俊楊沂中如何飛曰張宣撫飛之舊帥也然其人暴而寡謀沂中視徳等耳豈能御此軍哉浚艴然曰浚固知非太尉不可也飛曰都督以正問飛飛不敢不盡其愚豈以得軍為念哉時飛母䘮未終屢請持服而不見許及與浚忤即日上章乞解兵柄終母䘮服以張憲攝軍事歩歸廬山廬於墓側浚怒奏飛積慮在於併兵奏牘求去意在要君遂以都督府參議軍事張宗元權其判官實監其軍張浚如太平州淮西視師五月召胡安國提舉萬夀觀兼侍讀未至貶知永州張浚薦安國帝召之將行聞陳公輔乞禁程氏之學乃上䟽曰孔孟之道不傳久矣自頤兄弟始發明之然後知其可學而至今使學者師孔孟而禁不得從頤學是入室而不由户本朝自嘉祐以來西都有邵雍程顥及其弟頤關中有張載皆以道徳名世公卿大夫所欽慕而師尊之㑹王安石蔡京等曲加排抑故其道不行望下禮官討論故事加之封爵載在祀典比於荀楊韓氏仍詔館閣褒其遺書校正頒行使邪說者不得作䟽入公輔與中丞周祕侍御史石公揆交章論安國學術頗僻故貶六月沈與求卒詔岳飛入朝遂遣還鎮累詔起飛不得已趍朝待罪帝慰遣之飛遂復職及張宗元還言將和士銳人懐忠孝皆飛訓養所致帝大悦飛至鎮上奏言比者寢閣之命咸謂聖斷已堅何至今尚未决臣願提兵進討順天道因人心以曲直為老壯以逆順為强弱萬全之效可必錢唐僻在海隅非用武地願建都上㳺用漢光武故事親率六軍徃來督戰庻將士知聖意所向人人用命不報秋七月嗣濮王仲湜卒金晋國王尼瑪哈卒尼瑪哈内能謀國外能謀敵决策制勝有古名將之風八月以張俊為淮西宣撫使屯盱眙楊沂中為淮西制置使劉錡副之屯廬州時以王徳為淮西都統制統劉光世之軍酈瓊副之瓊與徳素等夷不相下及吕祉還朝徳瓊列狀交訟於都督府及御史臺乃召徳還建康以其軍𨽻督府而命沂中錡置司廬州召淮西副統制酈瓊赴行在瓊以衆叛降於劉豫都督府參謀軍事吕祉死之吕祉復至廬州酈瓊又訟王徳祉諭之曰若以君等為是則大相誑然張丞相但喜人向前倘能立功雖有大過亦濶畧况此小嫌耶當力為諸公辨之保無他虞瓊等感泣事小定祉乃宻奏乞罷瓊及統制勒賽兵權其書吏漏語於瓊瓊令人遮祉所遣郵置盡得祉所言大怨㑹聞朝廷命張俊楊沂中等為大帥而召已赴行在大懼遂叛諸將晨謁祉坐定瓊袖出文書示中軍統制張璟曰諸兵官有何罪張統制乃以如許事聞之朝廷耶祉見之大驚欲返走不及為瓊所執璟及兵馬鈐轄喬仲福統制劉永衡皆死之瓊遂帥全軍四萬人渡淮降劉豫擁祉次三塔距淮三十里祉下馬立棗林下謂瓊曰劉豫逆賊我豈見之衆逼祉上馬祉罵曰死則死於此又諭其衆曰劉豫逆臣爾軍中豈無英雄乃隨酈瓊去乎衆頗感動凢千餘人環立不行瓊恐摇動衆心急䇿馬先渡祉遂碎首折齒而死時有得祉括髮之帛歸吳中者祉妻吳氏持帛自縊以徇葬聞者哀之劉錡吳錫以兵追瓊不及而還九月詔張俊屯廬州岳飛屯江州酈瓊叛張浚始悔不用飛言飛乞進討瓊不許詔駐師江州為淮浙援飛知劉豫結尼瑪哈而烏珠惡豫可以間而動㑹軍中得烏珠諜者飛陽責之曰汝非吾軍人張斌耶吾向遣汝至齊約誘至四太子汝徃不復來吾繼遣人問齊已許我今冬以會合冦江為名致四太子於清河汝所持書竟不至何背我耶諜兾緩死即詭服乃作蠟書言與劉豫同謀誅烏珠事因謂諜曰吾今貸汝復遣至齊問舉兵期刲股納書戒勿泄諜還以書示烏珠烏珠大驚馳白金主於是廢豫之意益决張浚免罷都督府浚總中外之政幾事叢委以一身任之毎奏對必言讎耻之大反復再三帝未嘗不改容流涕時天子方厲精克己戒飭宫庭内侍無敢越度事無巨細必以咨浚賜諸將詔徃徃命浚草之及酈瓊叛吕祉死浚因引咎力求去帝問浚誰可代卿者且曰秦檜何如浚曰近與共事方知其闇帝曰然則用趙鼎浚曰得之矣檜由是憾浚浚遂奉祠而都督府亦罷以趙鼎為尚書左僕射兼樞宻使以劉錡知廬州冬十月安置提舉江州太平觀張浚於永州浚既去位言者論之不已至引漢武誅王恢為比欲逺竄之會趙鼎乞降詔安撫淮西帝曰俟行遣張浚朕當下罪已之詔鼎言浚已落軄帝曰浚罪當逺竄鼎曰浚母老且有勤王功帝曰功過自不相掩已而内批出浚謫嶺南鼎留不下詰旦約同列救解帝怒未釋鼎力懇曰浚罪不過失䇿耳凡人計慮豈不欲萬全倘因一失便寘之死地後有竒謀秘計誰復敢言者此事自闗朝廷非獨私浚也張守亦以為言秦檜憾浚不出一語上意解遂以秘書少監分司西京永州居住李綱聞之馳奏曰浚措置失當誠為有罪然其區區狥國之心有可矜者願少寛假以責來效不報金以達蘭烏珠為左右副元帥閏月以尹焞為秘書郎兼崇政殿說書焞承召命以疾辭不行范冲奏給五百金為行資令漕臣奉詔至涪親遣焞始就道㑹陳公輔攻程氏之學焞至九江遂留不進張浚言焞拒劉豫之節且其所學所養有大過人者乞令江州守臣疾速津送焞至建康城外復以疾辭帝曰焞可謂恬退矣趣召入見命為秘書郎兼説書張俊棄盱眙還建康金襲汴執劉豫以歸廢為蜀王立行臺尚書省於汴韓世忠岳飛請伐金以復舊壤不報初豫由尼瑪哈髙慶裔而得立故奉二人特厚諸將多憾之尼瑪哈既死豫兵復敗藕塘金人欲廢之㑹豫請立麟為太子金主曰徐當遣人咨訪河南百姓豫雖意沮而猶日遣使乞師南侵金乃建元帥府於太原令齊國兵權聽元帥府節制而以束㧞為元帥左都監屯太原大托卜嘉為元帥右都監屯河間復分戍陳蔡汝亳潁許諸郡至是尚書省奏豫治國無狀當廢金主遂令達蘭烏珠偽稱伐宋以襲之將至刀馬河二帥遣人召劉麟渡河議事麟以二百騎至武城烏珠麾騎翼而擒之遂馳入汴京豫方射講武殿烏珠從三騎突入東華門下馬逼豫出見因執其手偕至宣徳門強乗以羸馬露刃夾之囚於金明池翌日集百官宣詔責豫而廢之其詔有曰建爾一邦逮兹八稔尚勤兵戍安用國為乃以鐵騎數千圉宫門遣小校巡閭巷間宣言曰自今不僉汝為軍不取汝免行錢為汝敲殺貌事人請汝舊主少帝來由此人心稍安置行臺尚書省於外以張孝純權行臺左丞相呼沙呼為汴京留守李儔副之諸軍悉令歸農聽宫人出嫁得金一百二十餘萬兩銀一千八百餘萬兩米九十餘萬石絹二百七十萬匹錢九千八百七十餘萬緡豫求哀於二帥達蘭謂之曰昔趙氏少帝出京百姓然頂煉臂號泣之聲聞乎逺近今汝廢無一人憐者汝何不自責也豫語塞迫之行願居相州韓琦宅許之十二月與家屬徙臨漢岳飛奏乗廢豫之際擣其不備長驅以取中原韓世忠亦上䟽言機不可失請全師北討皆不報十一月四川制置大使席益以母䘮去官十二月王倫還自金尋復遣之倫将還達蘭送之謂曰好報江南自今道塗無壅和議可成倫至入對言金人許還梓宫及太后且許歸河南地帝大喜曰若金人能從朕所求梓宫及太后其餘一切非所較也逾五日復遣倫奉迎梓宫於金交阯郡王李陽煥卒子天祚嗣通鑑續編卷十五
