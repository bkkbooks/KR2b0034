body:
  text: 通鑑續編編年類提要臣等謹案通鑑續編二十四卷元陳桱撰桱字子經奉化人流寓長洲官至翰林學士桱祖著宋時以秘書少監知台州嘗作書名厯代紀統其父沁為校官又續有撰述世傳史學桱以司馬氏通鑑朱子綱目並終於五代其周威烈王以上雖有金履祥前編而亦㫁自陶唐因著此書首述盤古至髙辛氏以補金氏所未備為第一卷次摭契丹在唐及五代時事以志其得國之故為第二卷其二十二卷皆宋事始自太祖終於二王以繼通鑑之後故以續編為名然大書分注全仿綱目之例當名之曰續綱目仍襲通鑑之名非其實也沈周客座新聞載桱著此書時書宋太祖云匡𦙍自立而還未輟筆忽迅霆擊其案桱端坐不懾曰霆雖擊吾手終不為之改易也云云此雖小說附㑹之談亦足見桱以褒貶自任後人乃造作此說也今觀其義例於宋自太平興國四年平北漢後始為大書繫統鄭瑗井觀瑣言稱其本晦翁語録持論已偏至於金承麟稱末帝立僅一日未成為君乃為之紀年西遼自徳宗以下諸主但傳年號並無事蹟可紀亦一一詳為分注亦不免循名失實明史何喬新傳載喬新年十一時侍父京邸修撰周旋過之喬新方讀通鑑續編旋問書法何如對曰吕文煥降元不書叛張世傑溺海不書死節曹彬包拯之卒不書其官而紀羲軒多採怪妄似未有當云云亦未始不中其失也他如取宋太祖燭影斧聲之訛載文天祥黄冠故鄉之語漫無考正輕信傳聞陳耀文學林就正又謂桱誤以范仲淹赴桐廬郡至淮遇風詩為唐介作併改詩中强楚為狂楚盡室為今日蛟黿為魚龍則引據未免疎舛黄溥簡籍遺聞又謂桱紀其先户部尚書顯吏部尚書伸工部尚書徳剛諸事為宋史所不載成化間續綱目者亦皆削去疑其或出于妄托則挾私濫載尤不協至公然自通鑑綱目以後繼而作者實始于桱其後王宗汶薛應旂等雖遞有增修而才識卒亦無以相勝姑存以備㕘考亦未為不可乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
