body:
  text: 通鑑續編卷十四元陳桱撰戊申髙宗皇帝建炎二年金天會六年春正月帝在揚州金尼楚赫取鄧州范致虚出奔安撫使劉汲死之金烏珠侵東京留守宗澤敗之金烏珠自鄭抵白沙去汴京密邇都人震恐僚屬入問計宗澤方對客圍棊笑曰何事張皇劉衍等在外必能禦敵乃選精鋭數千使繞出敵後伏其歸路金人方與衍戰伏兵起前後夾擊之金人果敗尼瑪哈據西京與澤相持澤遣部將閻中立郭俊民李景良等帥兵趨鄭遇敵大戰兵敗中立死之俊民降景良遁去澤捕景良斬之旣而俊民與金將史姓者持書來招澤澤數俊民曰汝失利死尚為忠義鬼今反為金人持書相誘何面目見我乎斬之謂史曰我受此上有死而已汝為人將不能以死敵我乃欲以兒女子語誘我乎亦斬之劉衍還金人復入滑澤部將張撝往救之撝至滑衆寡不敵或請少避之撝曰避而偷生何面目見宗公力戰而死澤聞撝急遣王宣往援已不及因與金人大戰破走之澤以宣知滑州金自是不復犯東京澤得金將遼臣王䇿于河上解其縳問金之虚實得其詳遂決大舉之計召諸將謂曰汝等有忠義心當協謀勦敵期還二聖以立大功言訖泣下諸將皆聽命金人屢戰不利悉引兵去澤復上疏請帝還京曰臣為陛下保獲京城自去年秋至于今春又三月矣陛下不早囘則天下之民何所依戴不報澤威聲日著敵聞其名常尊憚之對南人言必曰宗爺爺復明法科金人取永興軍經略使唐重死之東平府軍校孔彦舟叛㓂黄州彦舟聞金兵將至山東遂帥所部刼殺居民燒廬舍掠財物而南渡淮犯黄州金人取均房青濰鄭州張遇焚真州遂陷鎮江府王淵招降之金尼楚赫取鄭州竄内侍邵成章于南雄州時所在盜起汪伯彦黄潛善匿不以聞邵成章上疏言二人必誤國事帝怒除名編管南雄州焉金蘇瑪拉入襄陽以劉豫知濟南府豫景川人為河北提刑金人南侵豫棄官避地真州張慤薦之起知濟南時盜起山東豫不願行請易東南一郡執政惡之不許豫忿而去二月金巴爾斯取唐蔡陳州潁昌府河北盜楊進降于宗澤金人取淮寧府知府向子韶死之以王貺充金國軍前通問使同知樞密院事孫傅卒于燕馬擴聚兵奉信王榛于真定五馬山以總制諸砦和州防禦使馬擴奔五馬山砦聚兵得上皇子信王榛于民間奉之以總制諸砦金遷河南襄陽潁昌汝鄭均房唐鄧陳蔡之民于河北三月金尼瑪哈焚河南府而去翟進復西京詔以進為京西北路安撫制置使夏四月金烏珠復入河南府翟進復取之烏珠聞洛陽為翟進所復率衆來攻進與韓世忠丁進迎戰而敗韓世忠被矢如棘力戰得免乃收餘兵南歸烏珠入西京進復集鄉兵與金人戰屢敗之殺其將翟海乘勝入洛陽金人帥懐孟蒲衛之衆復至斧門而入進與巷戰金人引去以信王榛為河外都元帥工部侍郎兼侍講楊時罷以老疾求去也五月宗澤請車駕還京師詔許之許景衡罷宗澤遣子頴詣行闕上疏曰天下之事見幾而為待時而兵則事無不成今收復京洛而金動渡河捍蔽滑臺而敵國屢敗河東河北山砦義民引領舉踵日望官兵之至以幾以時而言之中興之兆可見而金人滅亡之期可必在陛下見幾乘時而已若規規為偏霸之謀豈非可鄙之甚乎尋復上疏言丁進數十萬衆願守䕶京城李成願扈從還闕即渡河勦敵楊進等兵百萬亦願渡河同致死力臣願陛下及此時還京則衆心翕然何敵之足憂乎又言聖人愛其親以及人之親所以教人孝敬其兄以及人之兄所以教人弟陛下當與忠臣義士合謀肆討迎復二聖使天下知孝弟帝得疏又聞信王榛將渡河入汴乃降詔擇日還京時朝廷有大政事景衡必請間極諫黄潛善汪伯彦以為異已因共以渡江南幸之議為景衡罪罷之景衡行至𤓰洲得暍疾卒景衡得程頤之學志慮忠純議論不與時俯仰旣卒帝思之曰朕自即位以來執政忠直遇事敢言惟許景衡耳立詩賦經義分試貢士法帝念時方用武士人不能至行在下詔諸路提刑轉運司選官即置司州軍引試使副或判官一人董之且命參酌元祐科舉條制立詩賦經義分試法殿試仍對䇿三道第一甲第一人授左宣教郎第二第三人授左宣義郎第四第五人授左儒林郎第六人以下並授左文林郎第二甲並授左從事郎第三甲以下並授左迪功郎學究出身者授登仕郎故事廷試上十名内侍先以卷奏定髙下帝曰取士當務至公豈容以已意升降自今勿先進卷以朱勝非為尚書右丞以宇文虚中充金國祈請使虚中降于金虚中時竄韶州㑹詔求使絶域者虚中應詔乃復資政殿大學士充祈請使稱臣奉表于金時金人方興兵南伐已留王倫朱弁矣虚中至金人遣之歸虚中曰奉命北來祈請二帝二帝未還虚中不可歸遂留時金國初建制度草創頗愛虚中有才藝毎加官爵虚中即受之遂與韓昉俱掌制河北制置使王彦帥師還次于沙店彦治兵刻日大舉告期于宗澤澤召彦㑹議彦乃將兵萬餘渡河金人以重兵襲其後而不敢擊旣至汴澤大喜令彦宿兵近甸以衛根本彦遂屯滑州之沙店張慤卒慤善理財論錢榖利害猶指諸掌在朝諤諤有大臣節然議論可否不形辭色未嘗失其同列之歡時論善之六月以王庻節制陜西六路軍馬曲端為都統制時陜西撫諭使謝亮持詔賜夏國庶移書與之曰夏人之患小而緩金人之患大而迫秋髙必大舉盍仗節率兵舉義驅逐渡河徐圗恢復亮不從秋七月東京留守宗澤卒澤前後請帝還京二十餘奏毎為黄潛善汪伯彦所抑憂憤成疾疽發于背諸將入問疾澤矍然曰吾以二帝蒙塵憤憤至此汝等能殱敵則我死無恨衆皆流涕曰敢不盡力諸將出澤歎曰出師未捷身先死長使英雄涙滿襟明日澤無一語及家事但連呼過河者三而卒年七十都人號慟澤始招集羣盗聚兵儲糧結諸路義兵連燕趙豪傑自謂渡河剋復可指日莫有志弗就識者恨之子頴居戊幕素得士心澤卒數日將士去者什五都人請以穎繼父任不許以杜充為東京留守充酷而無謀至汴悉反宗澤所為於是豪傑離心降盜聚城下者復去剽掠矣八月作皇帝金寳金之入汴也九寳惟大宋受命寳及定命寳尚存至是帝作金寳三一曰皇帝欽崇國祀之寳二曰天下合同之寳三曰書詔之寳殿中侍御史馬伸乞罷黄潛善汪伯彦詔貶伸監濮州酒稅卒于道伸自湖南還上疏言黄潛善汪伯彦不法十七事乞速罷二人政柄别選賢者共圗大事疏入留中明日改授衛尉少卿伸以論事不行辭不拜録其疏申御史臺且言臣論可采即乞施行非是合坐誣罔之罪因移疾待命詔伸言事不實送吏部責濮州監酒税趣使上道伸怡然襆被而行竟死道中聞者寃之伸學于程頤勇於為義毎曰吾志在行道以富貴為心則為富貴所累以妻子為念則為妻子所奪道不可行也河北京東捉殺使李成叛二帝至金㑹寧金主旻以太上皇帝為昬德公淵聖皇帝為重昬侯金主命二帝赴上京八月丁丑二帝至以素服見金太祖廟遂見金主于乾元殿金主封之九月郭三益卒金鄂爾多襲信王榛于五馬山砦取之初馬擴詣行在受密㫖使幾察信王且令擴聽諸路節制擴知事不成遂留大名不進金鄂爾多恐擴以援兵至急發兵攻五馬山諸砦斷其汲路諸砦皆䧟榛亡走不知所終冬十月金徙二帝于韓州韓州在燕京東北一千五百餘里金尼瑪哈鄂爾多㑹師圍濮州詔韓世忠等帥師救之詔孟忠厚奉隆祐太后如杭州侍御史張浚請先定六宫所居地詔孟忠厚奉后如杭州以苗傅劉正彦為扈從都副統制楊進復叛㓂汝洛知河南府翟進敗死楊進復叛衆至數萬剽掠汝洛間翟進患之與其兄興謀擊之未果而楊進遣騎數百絶洛水犯進營進乘半渡擊之追奔數十里破賊四砦馬驚墜塹為賊所害賊因乗勝大敗官軍十一月安置提舉嵩山崇福宫李網于萬安軍中丞王綯論之也金富察羅索取延安府王庶曲端帥師救之端次于襄樂庶至甘泉而還王庶至京兆曲端不欲屬之凡有命多託辭不行庶無如之何復還端涇原金人諜知庶端不協乃併兵攻鄜延庶調自沿河至馮翊據險以守金人先已乘冰渡犯晉寧侵丹州又渡清水河破潼闗秦隴皆震庶傳檄會諸路兵進禦時端盡統涇原精兵駐淳化庶日移文趣端進端終不聽而遣其副將呉玠復華州自引兵遷延迂道自邠之三水與玠㑹于襄樂金攻延安急庶自坊州收散亡往援知興元府毛􅊅亦將所部兵赴之比庶至甘泉延安已䧟庶無所歸以兵付􅊅自將百騎與官屬馳赴襄樂勞軍庶猶以節度望端欲倚以自副端彌不平見庶問延安失守狀謀殺之不果㑹庶上章自劾端即拘縻其官屬奪其使印庶乃得去還京兆金以烏葉掌國史女直初未有文字尼瑪哈好訪問女直老人多得其祖宗遺事及金主嗣位復進士舉而韓昉軰皆在左右文學之士稍見拔擢至是詔求祖宗遺事以備國史命烏葉與耶律迪延掌之烏葉等採摭遺言舊事自函普以下至太祖綜為三卷上之以趙開都大提舉川陜茶馬事開善心計好詗問天下利病毎有通變救弊之志宣和末為成都轉運判官多所更革至是陳榷茶買馬五害朝廷是之即擢開都大提舉川陜茶馬事使推行之於是大更茶馬之法官買官賣茶並罷剏條約印給茶引使茶商執引與茶户自相貿易不二年茶引收息至百七十餘萬緡買馬踰二萬匹金尼瑪哈取濮州知州楊粹中死之尼瑪哈以濮州小易之至城下知州瑪楊粹中固守命將姚端夜擣其營尼哈跣足走僅以身免遂攻城益急几三十三日而陷粹中死之金烏珠取開德府相州呉玠襲史斌誅之以魏行可充金國軍前通問使朝享祖宗神主于夀寧僧寺祀昊天上帝于圜丘大赦始郊也知府州折可求以城降于金折氏自五代以來據有府州控扼西北中國賴之故自德扆傳子御勲御卿御卿子惟正惟昌惟忠惟忠子繼宣繼閔繼祖繼祖兄子克柔克行克行子可大可適可求世知州事累功建節為國藩衛至是知晉寧軍徐徽言約可求出兵夾攻金人羅索聞之執可求之子彦文使為書招可求可求遂以所屬麟府豐三州降之而其宗族仍仕中朝十二月太后至杭州金達蘭侵濟南知府劉豫以城降之違蘭圍濟南劉豫遣子麟禦却之達蘭遣人㗖豫以利豫懲前忿遂殺濟南驍將闗勝率百姓降金百姓不從豫縋城納欵金鄂爾多取大名府提㸃刑獄郭永死之鄂爾多入大名守臣張益謙轉運判官裴億降鄂爾多問曰城破乃降何也二人以郭永不從為辭鄂爾多遣騎召永謂曰沮降者誰永曰不降者我鄂爾多欲用之永罵曰無知小子恨不醢爾以報國何説我以降乎鄂爾多怒併其家屬皆殺之以黄潛善汪伯彦為尚書左右僕射顔岐朱勝非為門下中書侍郎盧益同知樞密院事潛善伯彦入謝帝曰潛善作左相伯彦作右相朕何患國事不濟時金兵横行羣盜蠭起潛善伯彦旣無謀畧而專權自恣東京委之御史南京委之留臺泗州委之郡守言事者不納其説請兵者不以上聞金兵日南而晏然不以為慮御營司參贊軍事張浚極言金人必來攻請豫為備潛善伯彦以為過計而笑之金尼瑪哈入襲慶府軍士有欲發孔子墓者尼瑪哈曰大聖人墓安可發殺軍士於是獲存己酉三年金天㑹七年春正月帝在揚州以翟興為京西北路招討使河南尹河北制置使王彦朝于行在詔免對彦遂致仕彦以所部兵馬付東京留守司而率親兵趨行在見黄潛善汪伯彦力陳兩河忠義延頸以望王師願因人心大舉北伐言辭憤激二人大怒遂請降㫖免對差充御營平㓂統領彦遂稱疾致仕以路允迪僉書樞密院事張用王善復叛㓂淮寧府金尼瑪哈取徐州韓世忠之師潰于沭陽金尼瑪哈遂入淮陽次于泗州平㓂將軍韓世忠屯淮陽㑹山東兵以援濮州尼瑪哈聞之分兵萬人趨揚州自帥大軍迎戰世忠不敢敵夜引還尼瑪哈躡之至沭陽世忠棄軍走鹽城衆遂潰尼瑪哈入淮陽以騎兵三千取彭城間道趨淮東戊申入泗州二月詔劉正彦帥師衛皇子六宫如杭州金人至天長劉光世帥師禦之師潰而還江淮制置使劉光世帥兵阻淮以拒金人金騎兵掩至天長光世迎敵未至而軍潰光世奔還金尼瑪哈入天長軍帝南渡江入于鎮江府金人追至揚子橋而去尼瑪哈至楚州守臣朱琳降遂乗勝而南辛亥䧟天長軍壬子内侍鄺詢報金兵至帝即被甲乘騎馳至𤓰洲步得小舟渡江惟䕶聖軍卒數人及王淵張俊内侍康履等從行日暮至鎮江府時汪伯彦黄潛善方率同列聽浮屠克勤説法罷而㑹食堂吏大呼曰駕已行矣二人相顧蒼黄乃戎服䇿馬南馳見帝于鎮江揚州居民争門而出死者相枕籍無不怨憤是日金將馬五帥五百騎先馳至揚州城下聞帝已南行乃追至揚子橋癸丑金游騎至𤓰洲劉光世見帝泣曰王淵専管江上海船每言緩急決不誤事今臣所部數萬騎二千餘皆不能濟淵忿其言斬江北都巡檢使皇甫佐以自解朱勝非馳見淵督之淵始經畫已無所及自是失諸將心太常少卿季陵自揚州奉太廟神主以行金人追之太祖神主亡時事起倉卒朝廷儀物皆委棄之季陵亟取九廟神主以行出城未數里回望城中烟焰燭天陵為金人所追亡太祖神主于道帝如杭州以吕頤浩僉書樞密院事守鎮江帝召從臣問去留吏部尚書吕頤浩乞留蹕以為江北聲援羣臣皆以為然王淵獨言鎮江止可捍一面若金人自通川渡江以趨姑蘇將若之何不如錢唐有重江之險帝意遂決以頤浩為江淮制置使與行在五軍制置使劉光世駐鎮江控扼江口又以楊惟忠節制江東軍馬駐江寧府是夕發鎮江次吕城鎮甲寅次常州丙辰次平江府戊午次呉江縣命朱勝非節制平江府秀州軍馬禮部侍郎張浚副之留王淵守平江己未次秀州庚申次崇德縣吕頤浩從行即拜同簽書樞密院事江淮兩浙制置使以兵二千還屯京口又命張浚以兵八千守呉江金人入真泰州劉俊民如金師詔錄用張邦昌親屬仍命俊民持邦昌貽金人約和書藁以行金羅索取晉寧軍知軍事徐徽言死之羅索破晉寧軍徐徽言據子城拒戰因潰圍走擒之使之拜臨之以兵不動命折可求諭使降徽言大駡羅索殺之統制孫昂及士卒皆不屈俱被害帝至杭州赦壬戌駐蹕杭州即州治為行宫乙丑降德音赦死罪以下放還士大夫被竄斥者惟李綱罪在不赦更不放還葢用黄潛善計罪綱以謝金也金人焚揚州而去戊辰金兵焚揚州士民皆死存者才數千人庚午金兵引去黄潛善汪伯彦有罪免潛善伯彦自知不為衆所容聨疏言艱難之時不敢具文求退中丞張徴論二人大罪二十致陛下䝉塵天下怨懟乞加罪斥乃罷潛善知江寧府伯彦知洪州潛善猥持國柄嫉害忠良逐李綱沮宗澤臺諫内侍言者隨䧟以竒禍中外為之切齒而帝不悟伯彦則居位日淺故論者或末減其罪云以葉夢得張澂為尚書左右丞吕頤浩復揚州金人旣去頤浩遣將陳彦渡江襲金餘兵復揚州以王庶知京兆府曲端知延安府三月以朱勝非為尚書右僕射王淵同僉書樞密院事淵制下諸將籍籍帝乃命淵免進呈書押本院文字葉夢得罷詔禮部侍郎張浚帥師次于平江府以吕頤浩為江南東路安撫制置使知江寧府扈從統制苗傅劉正彦作亂殺僉書樞密院事王淵及内侍康履等奉皇子魏國公旉即位請隆祐太后臨朝尊帝為睿聖仁孝皇帝居顯寧寺大赦改元明受苗傅自負世將且有勞於王室以王淵驟得君超遷顯職心不平之劉正彦亦以招降劇盜功大賞薄怨上二人因相結時内侍康履藍珪恃恩用事履尤妄作威福凌忽諸將諸將疾之㑹内侍臨浙觀潮供帳遮道苗傅等怒曰汝輩使天子顛沛至此猶敢爾耶中大夫王世脩亦嫉内侍恣横言於正彦正彦曰㑹當共除之及王淵入樞府傅等疑其必由内侍以進遂與世脩謀先斬淵然後殺宦者議旣定癸未劉光世為殿前都指揮使百官入聽宣制傅正彦令世脩伏兵城北橋下俟淵退朝即捽下馬誣以結宦者謀反正彦手斬淵即與傳擁兵至行宫門外梟淵首于行闕分捕内侍凡無鬚者皆殺之履馳入宫白帝帝大驚朱勝非急趨樓上詰傅等専殺之故中軍統制呉湛排門引傳黨入内奏曰傅等不負國家止為天下除害耳知杭州康允之見事急請帝御樓撫諭之日將午帝登樓百官皆從軍校王元大呼曰聖駕來傅等見黄葢猶山呼而拜帝慿欄呼傅等問故傅厲聲對曰陛下信任中官賞罰不公軍士有功者不賞内侍所主者得官黄潛善汪伯彦誤國至此猶未逺竄王淵遇敵不戰首先渡江因交康履乃除樞密臣自陛下即位以來功多賞薄臣已將王淵斬首中官在外者皆誅訖更乞康履曽擇誅之以謝三軍帝曰潛善伯彦已降黜履擇當重與降責卿等可歸營傅曰天下生靈無辜肝腦塗地止緣中官擅權若不斬履澤臣不還營帝猶未許逾時傅兵不退淛西機宜文字時希孟曰中官之為患至此極矣不悉除之天下之患未巳帝曰朕左右可無給使耶軍器監葉宗諤曰陛下何惜一康履不以慰三軍帝不得已命呉湛執履與之傅即於樓下腰斬履臠其肉梟首與淵首相望并捕澤斬之編管藍珪于逺州帝諭傅等歸營傅等進曰陛下不當即大位將來淵聖皇帝來歸未知何以處之帝命朱勝非縋樓下委曲諭之傅請隆祐太后同聽政及遣人使金議和帝許之即下詔請隆祐太后垂簾同聽政傅等聞詔不拜曰自有皇太子可立况道君皇帝已有故事勝非還白帝帝曰朕當退避但須太后手詔也乃遣顔岐入内請太后御樓太后至帝即立楹側從官請帝坐帝曰不當坐此矣太后因乗肩輿下樓出門見傅等諭之曰自道君皇帝任蔡京王黼更祖宗法度童貫起邊事所以招至金人養成今日之禍豈闗今上皇帝事况皇帝初無失德止為汪伯彦黄潛善所誤今已竄逐統制豈不知之傅等對曰臣等必欲太后為天下主奉皇子為帝后曰今强敵在前吾以一婦人於簾前抱三歲兒决事何以令天下敵國聞之豈不轉加輕侮傅等固請太后曉譬百端傅不從傅顧勝非曰今日政須大臣果决相公可無一言乎勝非還白帝曰王鈞甫乃傅等腹心適語臣云二將忠有餘而學不足此語可為後圖之緒帝乃即坐上作詔襌位于皇子而請太后垂簾同聽政事宣詔畢傅等麾其軍退於是皇子旉即位太后垂簾決事尊帝為睿聖仁孝皇帝以顯寧寺為睿聖宫是夕徙帝居之大赦改元明受以張澂兼中書侍郎韓世忠為御營使司提舉一行事務張俊為秦鳯副總管分其衆𨽻諸軍又以王孝迪為中書侍郎盧益為尚書左丞加傅為武當軍節度使正彦為武成軍節度使以呉湛主管步軍司王孝迪盧益為大金國信使朱勝非奏母后垂簾須二人同對此承平故事今日事機須密奏者乞許臣僚獨對而日引傅黨二人上殿以弭其疑太后語帝曰賴相此人若汪黄在位事已狼籍矣王鈞甫見勝非勝非問前言二將學不足如何鈞甫曰如劉將手刃王淵軍中亦非之勝非因以言撼之曰上皇待燕士如骨肉那無一人効力者乎人言燕趙多竒士徒虚語耳鈞甫曰不可謂燕無人勝非曰君與馬柔吉皆燕中名人嘗獻策滅燕者今金人所任多契丹舊人若渡江禍首及君盍早為朝廷協力乎鈞甫唯唯勝非又謂王世脩曰國家艱難若等立功之秋也誠能奮身立事從官豈難得乎世脩喜時時往來道軍中情乃擢世脩工部侍郎傅等欲挾帝幸徽越勝非諭之以禍福傅等乃止張浚吕頤浩㑹師勤王苗傅帥羣臣朝帝于顯寧寺改元赦書至平江張浚命守臣湯東野祕不宣旣而得苗傅等所傳檄浚慟哭召東野及提刑趙哲謀起兵討之時傅令張俊以三百人赴秦鳯而以餘兵屬他將俊知其偽拒不受軍士洶洶俊諭之曰當詣張侍郎決之即引所部八千人至平江浚見俊語故相持而泣且諭俊以將起兵問罪俊泣拜曰此須侍郎濟以機術毋驚動乗輿也赦至江寧吕頤浩曰是必有兵變其子抗曰主上春秋鼎盛二帝蒙塵沙漠日望拯救其肯遽遜位于幼冲乎灼知兵變無疑也即遣人寓書於浚曰時事如此吾儕可但已乎浚以頤浩有威望能斷大事乃荅書約共起兵且告劉光世于鎮江令以兵來㑹頤浩得浚書乃留楊惟忠屯江寧以安人心且命控扼江上以防苗傅等挾帝渡江㑹有㫖召頤浩赴院供職頤浩上書言金人乘戰勝之威羣盜有蜂起之勢興衰撥亂事屬艱難豈容皇帝退享安逸請亟復明辟以圖恢復遂以兵發江寧舉鞭誓衆士皆感厲張浚又念傅等居中欲得辨士往説之節制司參議官馮轓請行浚遣之至杭見傅等折以正議令早反正劉正彦遣轓約浚至杭張浚命張俊分兵扼呉江上疏請復辟苗傅等謀除浚禮部尚書命將所部詣行在浚以大兵未集未敢誦言討賊乃託云張俊驟囘人情震讋不可以不少留以撫其軍㑹韓世忠自陽城由海道將赴行在至常熟張俊聞之曰世忠來事濟矣因白浚以書招之世忠得書舉酒酹地曰誓不與此賊共戴天至平江見浚慟哭曰今日之事世忠願與張俊任之公無憂也浚因大犒俊世忠將士呼至前抗聲問曰今日之舉孰順孰逆衆皆曰賊逆我順浚曰聞賊以重賞購吾首若浚此舉違天悖人汝等可取浚頭去不然一有退縮悉以軍法從事衆皆感憤於是令世忠帥兵赴闕戒之曰投鼠忌器事不可急急則恐有他變宜趨秀州據糧道以俟大軍之至戊戊世忠發平江至秀州稱病不行而大脩戰具傅等聞之始懼欲拘世忠妻子以為質朱勝非紿傅曰不若遣之使迓世忠而慰撫之則平江諸人益安矣傅從之封世忠妻梁氏為安國夫人俾迓世忠速其勤王梁氏疾驅出城一日夜會世忠于秀州勝非喜曰二兇真無能為也張浚復遣馮轓往杭因報書于正彦曰自古言渉不順謂之指斥乗輿事渉不遜謂之震驚宫闕廢立之事謂之大逆不道大逆不道者族今建炎皇帝不聞失德一旦遜位豈所宜聞傅等得書而恐乃遣苗瑀馬柔吉將重兵扼臨平亟除俊世忠節度使而誣浚欲危社稷責黄州團練副使郴州安置馮轓謂朱勝非曰主上受淵聖詔為兵馬大元帥嗣聖宜易稱皇太姪同太后垂簾聽政大元帥征伐于外最為得䇿召百官赴睿聖宫議稱帝為皇太弟天下兵馬大元帥康王嗣君為皇太姪監國諫議大夫鄭㲄與監察御史王庭秀上疏言睿聖皇帝承正統已二年一旦尊為太上皇於理猶順今乃欲降為臣稽之於古無所取法行之於今實逆天道且二十日内而降二天子自古未之有也力争之乃止頤浩將至平江浚乘輕舟迓之咨以大計頤浩曰頤浩曩諫開邊幾死宦臣之手承乏漕挽幾䧟沙漠之鄉今事不諧不過赤族為社稷死豈不快乎浚壯其言旣而劉光世兵亦至浚乃草檄聲傅正彦之罪以韓世忠為前軍張俊翼之劉光世為游擊頤浩浚總中軍光世分兵殿後乙巳太后降㫖睿聖皇帝處分兵馬重事張浚劉光世發平江丙午以浚同知樞密院事李邴鄭㲄並同僉書樞密院事是日浚頤浩發平江上疏乞建炎皇帝還即尊位傅等聞之憂恐不知所為朱勝非謂之曰勤王之師未至者使是問自反正耳不然下詔率百官六軍請帝還宮公等置身何地乎即召李邴張守作百官章及太后手詔而賜傅正彦鐵劵傅等遂帥百官朝于睿聖宫帝慰勞之傅正彦以手加額曰聖天子度量如是也傅黨張逵曰趙氏安而苗氏危矣盜邵青陷泗州金人取京東諸郡金達蘭以劉豫知東平府節制河南州郡界舊河以南俾豫統之又以豫子麟知濟南府達蘭屯兵衝要以鎮撫之趙立復徐州詔以立權知州事初金人破徐知州王復死之都虞候趙立戰死而復蘇求復尸瘞之隂結鄉民為收復計及金師北去乃帥殘兵邀擊大敗之遂復徐州事聞詔以立權知州事時山東莾為盜區立介居其間威名流聞夏四月帝復位尊隆祐太后為隆祐皇太后以苗傅為淮西制置使劉正彦為副使四月戊申朔太后下詔還政朱勝非帥百官請睿聖宫親掖帝乗馬還行宫與太后御前殿垂簾復以建炎紀年以張浚知樞密院事吕頤浩張浚敗苗翊于臨平苗傅劉正彦南走頤浩浚至杭州誅貶逆黨有差吕頤浩張浚軍次秀州頤浩諭諸將曰今雖反正而賊猶握兵居内事若不濟必反以惡名加我翟義徐敬業可監也進次臨平苗翊馬柔吉負山阻水為陣中流植鹿角以梗行舟韓世忠舍舟力戰張俊劉光世繼之翊衆少却世忠復舍馬操戈而前令將士曰今日當以死報國面不被數矢者皆斬於是士卒争用命翊引神臂弩持滿以待世忠瞋目大呼挺刃突前翊衆辟易矢不及發遂敗走勤王兵入北闗傅正彦急趣都堂取所賜鐡劵擁精兵二千夜開湧金門以走犯富陽新城二縣將南趨閩中辛亥頤浩浚入城世忠手執王世脩以屬吏頤浩浚入見伏地涕泣待罪帝問勞再三謂浚曰曩在睿聖兩宫隔絶一日啜􅃵覆手念卿被謫此事誰任解所服玉帶賜之帝握世忠手慟哭曰中軍統制呉湛佐逆為最尚留朕肘腋能先誅乎世忠即謁湛握手與語折其中指與王世脩俱斬于市逆黨王元左言馬瑗范仲熊時希孟皆貶隆祐皇太后撤簾朱勝非顔岐王孝迪張􅊹路允迪盧益免朱勝非見帝言曰臣昔遇變義即當死偷生至此欲圖今日之事耳因乞罷政帝問誰可代者對曰吕頤浩張浚帝問孰優對曰頤浩練事而暴浚喜事而疎帝曰浚太年少對曰臣向被召軍旅錢穀悉付浚此舉浚實主之中丞張守論勝非不能預防致賊猖獗宜罷之不報至是與同位俱免以吕頤浩為尚書右僕射李邴為尚書右丞鄭㲄僉書樞密院事以劉光世為御營副使韓世忠張俊為御前左右軍都統制詔尚書左右僕射並帶同中書門下平章事改門下中書侍郎為叅知政事省尚書左右丞自元豐肇建三省凡軍國事中書揆而議之門下審而覆之尚書承而行之三省皆不置官長以左右僕射兼兩省侍郎二相旣分班進呈首相遂不復與朝廷議論宣仁太后覺其不便始令三省合班奏事分治省事至是從吕頤浩之言三省始合為一以李邴叅知政事帝如江寧府詔韓世忠劉光世追苗傅劉正彦韓世忠請于帝曰賊擁精兵距甌閩甚邇儻成巢窟卒未可滅臣請討之帝從之立魏國公旉為皇太子盜薛慶陷髙郵軍金羅索取鄜坊州五月以張浚為川陜京西湖南北路宣撫處置使便宜黜陟浚謂中興當自闗陜始慮金人或先入陜蜀則東南不可保因慷慨請行詔以浚為宣撫使聽便宜黜陟與沿江襄漢守臣議儲畜以待臨幸帝問浚大計浚請身任陜蜀之事置幙府于秦川别遣大臣與韓世忠鎮淮東令吕頤浩扈蹕來武昌為趨陜之計復以張俊劉光世與秦川相首尾帝然之初浚宣撫川陜之議未决監登聞檢院汪若海曰天下者常山蛇勢也秦蜀為首東南為尾中原為脊今以東南為首安能起天下之脊哉將圖恢復必在川陜浚大悦焉以滕康同僉書樞密院事帝至江寧府居于神霄宫改江寧為建康府張浚如髙郵薛慶降慶據髙郵有衆數萬浚親往招之入慶壘從者不滿百慶感其恩意遂降因留浚三日以邀賞傳者謂浚被執吕頤浩等請罷浚帝從之越十日浚還請去帝不許以洪皓充大金通問使金人執之帝遣皓如金遺尼瑪哈書願去尊號用金正朔比于藩臣時所在盜梗皓艱難百端得達太原留一年遣至雲中尼瑪哈迫之使仕劉豫皓曰萬里銜命不得奉兩宫南歸恨力不能磔逆豫忍事之耶留亦死不即豫亦死不願偷生狗鼠間願就鼎鑊無悔尼瑪哈怒將殺之旁一校曰此真忠臣也目止劍士為皓跪請得流遞冷山流遞猶編竄也韓世忠獲劉正彦于浦城苗傅于建陽歸于行在所世忠自衢信追討至浦城之魚梁驛與苗傅劉正彦遇世忠步走挺戈而前賊望見咋曰此韓將軍也皆驚潰遂擒正彦及傅弟翊王德亦執苗瑀斬馬柔吉傅亡入建陽縣人詹標執之獻于世忠世忠悉送於行在帝手書忠勇二字掲旗以賜之翟興誅楊進楊進居鳴皋山北興與子琮帥鄉兵時出擾之進懼棄輜重南走興要擊于魯山進中流矢死餘衆數萬悉潰去河南平六月霖雨詔郎官以上言闕政遂罷王安石配享神宗廟庭時久兩恒隂吕頤浩謝罪求去詔郎官以上言闕政復下詔以四失罪已一曰昧經邦之大畧二曰昩戡難之逺圖三曰無綏人之德四曰失馭臣之柄司勲員外郎趙鼎上疏曰自熈寧間王安石用事變祖宗之法而民始病假闢國之謀造生邊患興理財之政窮困民力設虚無之學敗壞人材至崇寧初蔡京託紹述之名盡祖安石之政凡今日之患始于安石成于蔡京今安石猶配享神宗而京之黨未除時政之缺莫大于此中丞張守上疏曰陛下處宫室之安則思二帝母后穹廬毳幕之居享膳羞之奉則思二帝母后粗糲酪漿之味服細煖之衣則思二帝母后窮邊絶塞之寒苦操予奪之柄則思二帝母后語言動作受制于人享嬪御之適則思二帝母后誰為之使令對臣下之朝則思二帝母后誰為之尊禮思之又思兢兢栗栗聖心不倦而天不為之助順者萬無是理也罷賞功司隆祐皇太后至建康府罷右司諫袁植植請誅黄潛善及失守者權邦彦等九人詔朕方念咎責已豈可盡以過失歸臣下遂罷植出知池州金人取磁州秋七月苗傅劉正彦伏誅遂削朱勝非顔岐路允迪等職居張澂于衡州詔以苗劉之變當軸大臣不能身衛社稷朱勝非顔岐路允迪並落職張澂衡州居住金達蘭取濰萊州皇太子旉卒諡曰元懿鄭㲄卒以王綯參知政事周望同僉書樞密院事范瓊有罪下獄死張浚發建康初汴京破二帝及宗室北遷瓊之謀居多又乘時剽掠左右張邦昌為之從衛至是自洪州入朝見帝悖慢且乞貸苗劉等死帝畏其威以為御營司提舉一行事務張浚將赴川陜與樞密檢詳文字劉子羽密謀誅之一日命張俊以千兵渡江若備他盜者使皆甲以來因召瓊俊及劉光世赴都堂議事為設飲食食已諸公相顧未發子羽坐廡下恐瓊覺取黄紙趨前舉以麾瓊曰下有敕將軍可詣大理寺置對瓊愕不知所為子羽顧左右擁置輿中衛以俊兵送獄光世出撫其衆數瓊在圍城中附金迫二帝北狩之罪且曰誅止瓊爾汝等固天子自將之軍也衆皆投刃曰諾有㫖分𨽻御營五軍瓊下獄具伏賜死子弟皆流嶺南瓊旣誅張浚乃發建康升杭州為臨安府初吕頤浩與張浚定幸武昌之議及浚行頤浩以為道逺餉難乃變前論㑹滕康張守陳武昌有十害不可往帝從之遂升杭州為臨安府將定都焉崔縱如金不屈死之通問二帝也縱至金首以大義責金人請還二帝金人怒徙之窮荒縱不少屈竟死于金詔李邴滕康權知三省樞密院事奉隆祐皇太后如洪州太后至建康會防秋迫命劉寧止制置江浙衛太后往洪州百司非預軍事者悉從命滕康李邴權知三省樞密院事從行凡四方奏讞吏部差注舉辟功賞之類皆𨽻焉又命四廂都指揮使楊惟忠將兵萬人以衛過落星寺舟覆宫人溺死者無數惟后舟無虞盜郭仲威陷淮陽軍廣州教授林勲上本政書勲上本政書十三篇言國家兵農之政宜假井田之制使民一夫占田五十畆其有羡田之家毋得市田其無田與游惰末作者皆驅之使為𨽻農以耕田之羨者而雜紐錢榖以為什一之税毎十六夫為一井每井賦二兵馬一匹匹婦之貢絹三尺綿一兩非蠶鄉則布六尺麻二兩其説甚備書奏詔以為桂州節度掌書記其後朱熹甚愛其書陳亮亦曰此書考古驗今思慮周密世之為井田之學者無以加矣八月李邴罷以劉珏權同知三省樞密院事陜西節制使王庶罷以王似代之庶至京兆㑹金人大入庶調兵自沿河至馮翊據險以守且傳檄諸路㑹期伐金金人詭道䧟丹州延安事聞乃罷庶而以似代之盗劉文舜陷舒州杜時亮如金師時金人將渡江而南朝廷聞之遣時亮使金師以請和致書于尼瑪哈曰古之有國家而迫于老亡者不過守與奔而已今以守則無人以奔則無地此所以諰諰然惟冀閣下之見哀而赦已故前者連奉書願削去舊號是天地之間皆大金之國而尊無二上亦何必勞師逺涉而俊為決哉又命吕頤浩以書遺劉豫俾面陳此意閏月以吕頤浩為尚書左僕射同中書門下平章事杜充為尚書右僕射同中書門下平章事兼江淮宣撫使守建康韓世忠為浙西制置使守鎮江劉光世為江東宣撫使守太平池州帝聞金師將至召諸將議移蹕之地張俊辛企宗請自鄂岳幸長沙韓世忠曰國家已失河北山東若又棄江淮更有何地吕頤浩曰金人之謀以陛下所至為邊面今當且戰且避奉陛下於萬全之地臣願留常潤死守帝曰朕左右不可以無相乃以充守建康王變𨽻之世忠光世皆受充節制充將發汴京統制岳飛諫曰中原地尺寸不可棄今一舉足此地非我有他日欲復取之非數十萬衆不可充不從皇太后至洪州帝如臨安府帝發建康如臨安自是不復議防淮矣張浚次於襄陽招兵分屯襄郢唐鄧金人取密州九月丙午朔日有食之金人取單州興仁府遂侵南京知府凌唐佐降之以周望為兩浙荆湖等路宣撫使守平江諜報金人治舟師由海道窺江浙詔韓世忠守圌山福山望總兵守平江罷起居郎胡寅寅上疏曰陛下以親王介弟受淵聖皇帝之命出帥河北二帝旣遷則當糾合義師北向迎請而乃亟居尊位建立太子不復歸覲宫闕展省陵寢偷安歲月略無扞禦及敵騎乘虚匹馬南渡一向畏縮惟務逺逃軍民怨畧咨恐非自全之計也因進七䇿一曰罷和議而脩戰二曰置行臺以區别緩急之務三曰務實效去虚文四曰大起天下之兵以自强五曰都荆襄六曰選宗室之賢才者封建任使之七曰存紀綱以立國體書凡數千言吕頤浩惡其切直罷之于外以張守同僉書樞密院事徙劉光世守江州杜充嚴急光世不樂屬之會金師至淮西朝議以隆祐太后在豫章恐有震驚乃徙光世于江州以屏蔽之以張邵為金國軍前通問使金人囚之邵至濰州見達蘭命邵拜邵曰監軍與邵為南北朝從臣無相拜禮且具書言天未厭宋而金乃裂地以封劉豫復窮兵不已何也達蘭怒取國書去送卲密州囚於柞山砦金人取沂曹州髙麗請脩貢詔不許冬十月金羅索取永興軍鞏州盜酈瓊圍光州帝至臨安府郭仲威詣周望降帝渡浙居于越州帝至臨安七日復渡浙如越州李成陷滁州張浚治兵于興元以劉子羽參議軍事趙開為隨軍轉運使專總四川財賦又以曲端為都統制子羽薦涇原都監呉玠及弟璘之才勇浚以玠為統制璘掌帳前親兵自蜀有西師益利諸司已用便宜截上供及常平本皆盡浚以為慮知趙開善理財即承制用之開見浚曰蜀之民力盡矣錙銖不可加獨𣙜貨尚存贏餘而貪猾認為已有共相𨼆匿惟不恤怨詈斷而敢行庶可救一時之急浚銳意興復委任不疑於是大變酒法即舊撲買坊場所置隔槽設官主之麯與釀具官悉自買聽釀户各以米赴官場自釀凡一石米輸三千并頭子雑用等二十二其釀之多寡惟錢是視不限數也又於秦州置錢引務興州鼓鑄銅錢官賣銀絹聽民以錢引或銅錢買之凡民錢當入官者並聽用引折納官支出亦如之民以為便舊錢引才二百五十萬開添印至四千一百九十萬人不厭其多宣撫司一日獲偽引三十萬盜五十人浚欲從有司議當以死開曰相君誤矣使引偽加宣撫使印其上即為真黥其徒使治幣是相君一日獲三十萬之錢起五十人之死也浚稱善從之開復大變鹽法印鹽引毎斤納錢二十五而買賣與茶法同時浚荷重寄智旬犒月賞期得士死力費用不貲盡取辦於開開悉慮於食貨筭無遺䇿雖支費不可計而貲財常有餘金當海入夀春府黄州遂濟江以趨江西劉光世帥師走南康金人入江州光世至江州日置酒髙會金人自黄州渡江几三日無知之者金兵薄城下光世遂引兵自信州趨南康金人入城由大冶趨洪州十一月金烏珠入廬和州無為軍張浚出行闗陜浚出行闗陜訪問風俗罷斥姦贓以搜攬豪傑為先務諸將惕息聽命隆祐皇太后如䖍州金當海入洪吉撫袁州臨江軍滕康劉珏聞金師至奉太后出城江西制置使王子獻棄洪州走丁巳金人䧟臨江戊午䧟洪州撫袁二州降之丁夘䧟吉州孫悟如金師致書請和也盜劉忠陷舒州金烏珠入太平州主管步軍司閭勍自西京奉祖宗神御至越州詔奉安于天慶觀帝還浙西以禦金師至錢清復如越州以周望同知樞密院事守平江以范宗尹參知政事以趙鼎為御史中丞鼎自右司諌拜侍御史所言四十事施行者三十有六及金人至江上鼎陳戰守禦三䇿拜中丞鼎言經營中原當自闗中始經營關中當自蜀始欲幸蜀當自荆襄始呉越介在一隅非進取中原之地荆襄左顧川陜右控湖湘而下瞰京洛三國所必争宜以為行闕而屯重兵于襄陽運江浙之粟以資川陜之兵經營大業計無出此金烏珠入建康府守臣杜充降通判楊邦乂死之時江浙倚重於杜充而充日事誅殺且無制敵之方及烏珠與李成合兵攻烏江充閉門不出統制岳飛泣諫請視師充不從烏珠遂乗充無備由馬家渡渡江充始遣都統制陳淬及飛帥師迎戰王􅊅以軍先遁淬敗死諸將皆潰充兵亦散烏珠至建康守臣陳邦光户部尚書李棁迎降充渡江保真州諸將怨充之嚴刻欲乘其敗以害之充聞不敢還營居長蘆寺烏珠遣人説之曰若降當封以中原如張邦昌故事充遂還建康與梲邦光率官屬迓金師拜烏珠于馬首通判楊邦乂獨不肯屈膝以血大書衣裾曰寧作趙氏鬼不為他邦臣烏珠使人誘以官終不屈大罵乞死遂殺之充至金尼瑪哈薄其為人久之得仕帝如明州帝聞杜充敗謂吕頤浩曰事迫矣若何頤浩遂進航海之䇿其言曰敵兵多騎必不能乗舟襲我江浙地熱必不能久留俟其退去復還二浙彼出我入彼入我出此兵家之竒也帝然之遂如明州韓世忠帥師自鎮江退守江隂張浚至秦州盜桑仲陷襄陽府十二月帝至明州金烏珠入臨安府遣阿里富勒琿追帝于明州帝孫于海烏珠自建康趨廣德殺守臣周烈遂過獨松闗見無戍者謂其下曰南朝若以羸兵數百守此吾豈能遽度哉遂犯臨安守臣康允誠棄城走烏珠聞帝在明州遣阿里富勒琿帥精騎渡浙追之帝乗樓船入海次于定海縣留范宗尹趙鼎于明州以俟金使又謂張俊曰若能扞敵成功當加王爵吕頤浩奏令從官已下各從便去帝曰士大夫當知義理豈可不扈從若如此則朕所至乃同㓂盜耳於是郎官以下多從衛癸巳帝舟次于昌國縣皇太后至䖍州太后至吉州金人追之急后乗舟夜行質明至太和縣舟人景信反楊惟忠兵潰失宫人一百六十滕康劉珏皆遁兵衛不滿百遂自萬安陸行如䖍州后及潘貴妃以農夫肩輿而行至䖍府庫皆空衛兵所給惟得沙錢市買不售與百姓交鬬縱火肆掠三日土豪陳新率衆圍城楊惟忠部將胡友自外引兵破新于城下后稍得安岳飛敗金人于廣德飛率所部自建康躡金人于廣德境中六戰者皆捷擒金將王權俘首領四十除察其可用結以恩義遣還令斫營縱火飛乘亂縱擊大破之駐軍鍾村軍無見糧將士忍饑秋毫無扼金所籍兵相謂曰此岳爺爺軍也争降附之金阿里富勒琿入越州遂渡􅈠娥江進侵明州張俊使楊沂中帥師迎戰于髙橋敗之戊戌阿里富勒琿入越州宣撫郭仲荀奔温州知府季鄴降之遂趨明州敗宋兵于東闗濟􅈠娥江壬寅至明州西門之髙橋張俊使統制劉寶與戰而敗統制楊沂中田師中等復殊死戰沂中舍舟登岸知明州劉珙道帥州兵射其旁大破之殺數千人金使來召人至砦計事俊使小校往金人與語欲入越州請降俊拒之戒將士慮敵必再至下令清野多以輕舟閉闗自守金人屠洪州周望及金達蘭戰于秀州敗績庚戌四年金天㑹八年春正月帝舟居于海次于昌國縣金阿里富勒琿復侵明州烏珠以師㑹之張俊走台州金人遂入城屠其民甲辰朔西風大作金師乗之復攻明州乙巳張俊劉洪道坐城樓遣兵掩擊殺傷大當金人奔北死於江者無數夜拔砦退屯餘姚而遣人請濟師于烏珠庚戌阿里富勒琿復攻明州烏珠引師㑹之張俊懼帥其師趨台州劉洪道亦遁己未金師入城屠其民金阿里富勒琿襲帝舟于章安張公裕敗之帝遂如温州泊于港口金人乗勝破定海縣聞帝在章安鎮以舟師追之提領海舟張公裕引大舶擊却之辛酉帝發章安如温州甲子泊港口金羅索取陜州知州李彦仙死之初金人得陜用降者守之使招集散亡時石壕尉李彦仙保三砦屢敗金師破其五十餘壁以計復陜州及絳解諸縣事聞詔彦仙知陜州兼安撫使彦仙至陜蒐軍實増埤濬隍益為戰守備遣邵興復虢州金將烏嚕來攻彦仙敗之羅索聞之自蒲解悉兵大至彦仙又大敗之羅索僅以身免彦仙度金人必併力來攻即遣人求兵于張浚已而羅索果率折可求等衆十萬來分其軍為十以正月旦為始日輪一軍攻城期以三句必拔彦仙意氣如常數出兵與戰旣而食盡告急于浚浚檄曲端以涇原兵援之端素疾彦仙不奉命浚曰金若下陜則全據大河且窺蜀矣乃出師至長安道阻不得進彦仙日與金戰羅索竒其才誘㗖百端彦仙悉斬其使力盡城䧟彦仙投河死其屬官居民無一人降者羅索怒盡屠其餘民而去滕康劉珏免金以韓企先為尚書左僕射兼侍中企先遼中書令知古九世孫世為大官至是金主召見于上京甚驚異之曰朕常夢此人今果見之時方議禮制度企先博通經史知前代故事或因或革咸取折衷二月酈瓊降于劉光世詔奉安祖宗神御于福州以盧益李囘權知三省樞密院事金人入潭州屠其城金烏珠自明州還浙西遂入秀州烏珠還臨安縱火焚掠以輜重不可遵陸取道秀州而北金人取東京權留守上官悟出奔為盜所殺自是四京皆沒于金鼎州盜鍾相自稱楚王赦以金兵退故也李成陷舒州金人至平江周望走太湖烏珠入城焚掠而去金游騎至平江周望奔太湖知府湯東野棄城遁烏珠入城縱兵焚掠死者甚衆城中殆空鍾相陷澧州孔彦舟詣傅雱降張浚帥師入援三月金烏珠入常州鎮江府使盧益奉迎隆祐皇太后于䖍州帝謂輔臣曰朕初不識太后自迎至南京愛朕不啻已出今在數千里外兵馬驚擾當承奉迎以惬朕朝夕慕念之意遂遣盧益及辛企宗潘永思等奉迎于䖍州孔彦舟獲鍾相歸于行在誅之其黨楊太復聚衆于龍陽軍賊戚方陷廣德軍方江淮軍校也夏四月張浚行至房州聞金人退復還秦川帝還越州金師退帝將西還召羣臣議駐蹕之所且曰㑹稽止可暫駐吕頤浩曰將來宜駐浙右徐圖入蜀范宗尹曰臣謂若使入蜀恐兩失之據江表而徐圖闗陜之事則兩得之决擇取舍不可不審帝曰善三月辛酉發温州四月癸未至越州甲申下詔親征巡幸浙西韓世忠大敗金烏珠于江中烏珠走建康達蘭遣師救之烏珠復入于江世忠敗績烏珠遂濟江次于六合初韓世忠以前軍駐青龍鎮中軍駐江灣後軍駐海口欲俟烏珠師還擊之及烏珠由秀趨平江世忠事不就遂移師鎮江以待之三月金師至江上世忠先以八千人屯於焦山寺烏珠欲濟江乃遣使通問且約戰期世忠許之因謂諸將曰是間形勢無如金山龍王廟者敵必登之以覘我虚實乃遣蘇德將百人伏廟中百人伏廟下岸側戒之曰聞江中鼓聲則岸兵先入廟兵繼出以合擊之及敵至果有五騎趨龍王廟廟中伏兵先鼔而出獲其兩騎其三騎則振䇿以馳馳者一人紅袍玉帶旣墜復跳而免詰諸獲者則烏珠也旣而接戰江中几數十合世忠妻梁氏親執將鼓敵終不得濟俘獲甚衆擒烏珠之婿龍虎大王烏珠懼請盡歸所掠以假道世忠不許復益以名馬又不許遂自鎮江沂流西上烏珠循南岸世忠循北岸且戰且行世忠艨艟大艦出金師前後數里擊柝之聲達旦將至黄天蕩烏珠窘甚或謂之曰老鸛河故道今雖湮塞若鑿之可通秦淮烏珠從之一夕渠成凡三十里遂趨建康岳飛以騎三百步兵三千邀擊于新城大破之烏珠乃復自龍灣出江中趨淮西會達蘭自濰州遣貝勒太一引兵來援烏珠乃復引還欲北渡世忠與之相持於黄天蕩太一軍江北烏珠軍江南世忠以海艦進泊金山下豫以鐡綆貫大鉤授健者明旦敵舟譟而前世忠分海舟為兩道出其背每縋一綆則曳一舟沉之烏珠窮蹙求㑹語祈請甚哀世忠曰還我兩宫復我疆土則可以相全烏珠語塞又數日求再會而言不遜世忠引弓欲射之烏珠丞馳去見海舟乗風使􅅫往來如飛謂其下曰南軍使船如使馬奈何乃募人獻破海舟之䇿於是閩人王姓者教其舟中載土以平板鋪之穴船板以櫂槳俟風息則出有風則勿出海舟無風不可動也且以火箭射其篛蓬則不攻自破矣烏珠然之且用方士計刑白馬剔婦人心自割其額以祭天四月丙申天霽風止烏珠以小舟出江世忠絶流擊之海舟無風不能動而舟上皆有五緉烏珠令善射者乘輕舟以火箭射之五緉皆自焚烟焰蔽天師遂大潰焚溺死者不可勝數世忠僅以身免奔還鎮江烏珠遂濟江屯于六合縣世忠以八十人拒烏珠十萬之衆凡四十八日而敗然金人自是亦不敢復渡江矣吕頤浩免初御營使本以行幸總齊軍政而宰相兼領之遂専兵柄樞府幾無所預頤浩在位尤顓恣中丞趙鼎嘗疏論之及聞韓世忠敗金人于黄天蕩頤浩請帝幸浙西下詔親征帝將從之趙鼎以為不可輕舉頤浩惡鼎異已改鼎翰林學士鼎不拜改吏部尚書又不拜而上言陛下有聽納之誠而宰相陳拒諫之説陛下有眷待臺臣之言而宰相挾挫沮言臣之威堅臥不出上疏論頤浩過失凡千餘言頤浩因求去詔以頤浩倡義勤王宜從優禮乃罷為鎮南軍節度使醴泉觀使而復命鼎為中丞諭之曰朕毎聞前朝忠諫之臣恨不之識今於卿見之金當海自荆門北去牛臯襲敗之于宋村金人犯江西者聞烏珠北還亦自荆門引兵而去留守司統制牛皋潛軍邀擊敗之于宋村五月以范宗尹為尚書右僕射兼御營使金人焚建康而去岳飛敗之于靜安烏珠旣濟江金人在建康者焚掠執李梲陳邦光等自靜安渡宣化而去岳飛邀擊於靜安鎮大敗之以張守參知政事趙鼎僉書樞密院事王綯罷以翟興孟汝趙立劉位趙霖李成呉翊李彦先薛慶並為鎮撫使分土處之時京畿東西荆湖南北淮南諸路盜賊蠭起大者數萬人據有州郡朝廷不能制范宗尹言于帝曰羣盜皆烏合之衆急之則併死力以拒官軍莫若析地以處之盜有所歸則可以漸制帝善之乃以九人並為鎮撫使分地畀焉興河南府汝唐州立楚泗州州漣水軍位滁濠州霖和州無為軍成舒靳州翊光黄彦先海州淮陽軍慶髙郵天長軍軍興聽便宜從事俾立顯功許以世襲然無統屬有急又不遣援故諸鎮鮮能自守六月周望有罪連州安置罷御營司以范宗尹兼知樞密院事滁濠鎮撫使劉位為盜所殺以陳規解潛程昌㝢陳求道范之才馮長寧為鎮撫使規德安府復州漢陽軍潛荆南府歸峽州荆門公安軍昌㝢鼎澧州求道襄陽府鄧隨郢州之才金均房州長寧淮寧順昌府蔡州以吕頤浩為建康路安撫大使朱勝非為江州路安撫大使劉光世為兩浙路安撫大使以郭仲威為真揚州鎮撫使戚方降于張俊張浚使呉玠帥師復永興軍金烏珠自六合趨陜西張浚以金兵萃于淮上懼其復擾東南謀牽制之且欲出兵分道由同州鄜延以擣其虚乃遣秦鳯副總管呉玠帥師復永興軍烏珠聞之遂自六合引兵趨陜西以為援僉書樞密院事陳過庭卒于燕秋七月以孔彦舟為辰沅靖州安撫使張浚使吕世存復鄜州金徙二帝于五國城去金上京東北千里又名鶻里敗路洪皓自雲中密遣人奏書以桃梨粟麺等獻二帝於五國始知康王即位焉以岳飛為通泰州鎮撫使詔諸將討戚方飛與戰數十合方窮乃降于張俊俊還盛言飛可用乃以為通泰鎮撫知泰州飛辭乞淮東一重難任使收復本路州郡乗機漸進使山東河北河東京畿等路次第而復不聽八月以謝克家參知政事隆祐皇太后至越州后至帝親迎之于行宫門外因遍問所過守臣治狀入居行宫薛慶及金人戰于揚州城下死之盧益罷呉玠復永興軍張浚承制安置其都統制曲端于萬安軍端素善撫士卒長於兵略然性剛愎旣迫逐王庶而奪其印又欲併王􅊅軍朝廷疑其欲反浚使張彬至渭州察之彬至渭謂端曰今兵合財備羅索以孤軍深入吾境我合諸路攻之不難端曰彼將士精鋭且因糧于我我今反為客未可勝也若按兵據險時出偏師以擾其耕獲彼不得耕必取糧河東則我為主矣如此一二年彼必困弊乃可圖也萬一輕舉後憂方大彬還以白浚浚不以為然及金人大擾環慶端遣呉玠等拒于彭原店而自將屯宜禄玠敗端退屯涇州金乗勝焚邠州而去玠怨端不為援端亦謂玠前軍已敗故不得據險以防衝突乃劾玠違節制玠由是怨端及烏珠留江淮浚議出師撓之端曰平原廣野敵便於衝突而我軍未嘗習水戰金人新造之勢難與争鋒宜訓兵秣馬保疆而已後十年乃可浚積前疑遂以彭原之敗罷端兵柄再貶海州團練副使萬安軍安置以桑仲為襄陽鄧隨郢州鎮撫使以范冲直史館重修神宗哲宗實録初隆祐太后生辰置酒宫中后謂帝曰宣仁太后之賢古今母后未有其比昔姦臣肆為謗誣雖嘗下詔明辨而國史尚未刪定豈足傳信吾意在天之靈不無望于帝也帝悚然乃召范冲直史館重修神宗哲宗實録冲乃為神宗考異明示去取舊文以墨書刪去者以黄書新修者以朱書世號朱墨史又為哲宗辨誣録由是二史得其正而姦臣情狀益著矣冲祖禹之子也九月太上皇后鄭氏崩于金之五國城金立劉豫為齊帝于大名府初金主聞帝如東南遣尼瑪哈南伐諭之曰俟宋平當援立藩輔以鎮南服如張邦昌者及烏珠渡江北還乃議立其人衆議折可求劉豫皆可立豫以重寳賂達蘭而請立已達蘭許之乃言于尼瑪哈尼瑪哈未之許其腹心大同府尹髙慶裔説之曰吾家舉兵只欲取兩河故汴京旣得則立張邦昌邦昌死後有河南之役今河南州郡官制不易風俗不更者豈非欲循邦昌故事耶元帥盍不早建言而使恩歸他人也尼瑪哈從之乃遣使即豫所部咨軍民所宜立者衆未及對豫鄉人張浹越次請立豫議遂定達蘭以聞於是金主用立張邦昌故事以舊河為界遣髙慶裔及知制誥韓昉備璽綬寳册立豫為大齊皇帝世脩子禮奉金正朔置丞相以下官其詔有曰今立豫為子皇帝旣為鄰國之君又為大朝之子使介惟使者始見躬問起居與面辭有奏則立其餘並行皇帝禮九月戊申豫即位都大名府豫旣立復還東平以張孝純為丞相李孝揚為左丞張柬為右丞鄭億年為工部侍郎李儔為監察御史王瓊為汴京留守子麟為提領諸路兵馬兼知濟南府弟益為北京留守冊其母翟氏為皇太后妾錢氏為皇后改明年為阜昌元年朝廷聞之凡偽仕于豫而其家屬在東南者悉厚加撫䘏桑仲陷均房州金達蘭侵楚州鎮撫使趙立死之立天性忠義知人善戰見敵如仇自金人犯中國能與之抗者立為之首故能以區區之衆為江淮障至是登城為飛砲碎首左右馳救之立曰吾終不能與國復仇矣言絶而死金羅索取延安府保安軍張浚使劉錫帥五路之師及金羅索戰于富平敗績浚退保秦州浚聞烏珠將至檄召熙河劉㻛秦鳯孫偓涇原劉錡環慶趙哲四經畧及呉玠之兵合四十萬人馬七萬匹以錫為統帥迎敵決戰前軍統制王彦諫曰陜西兵將上下之情皆未相通若少不利則五路俱失不若且屯利閬興洋以固根本敵入境則檄五路之兵來援萬一不捷未大失也浚不從劉子羽亦力言未可浚曰吾寧不知此顧東南事方急不得不為是耳呉玠郭浩皆曰敵鋒方銳宜各守要害須其弊而乗之亦不從遂行次于富平縣劉錫㑹諸將議戰玠曰兵以利動今地勢不利未見其可宜擇髙阜據之使不可勝諸將皆曰我衆彼寡又前阻葦澤敵有騎不得施何用他徙已而羅索引兵驟至輿柴囊土藉淖平行進薄諸營錫等與之力戰劉錡身率將士薄敵陳殺獲頗多勝負未分而敵鐡騎出不意直擊趙哲軍他將不及援哲因離所部其將校望見塵起遂驚遁諸軍皆潰敵乘勝而進闗陜大震浚時駐師邠州督戰旣敗退保秦州召趙哲斬之而安置劉錫于合州命諸軍各還本路上書待罪帝手詔慰勉之自是闗陜不可復論者咎浚之輕師失律焉金安班貝勒都元帥舎音卒舍音又名杲金達蘭入楚州淮陽鎮撫使李彦先救之敗死冬十月秦檜還自金師檜從二帝至燕金主以檜賜達蘭為其任用達蘭信之及南伐以為參軍事達蘭攻楚州檜與妻王氏自軍中趨漣水軍丁禩水砦自言殺金人監已者奪舟而來欲赴行在遂航海至越州求見帝帝命先見宰執檜首言如欲天下無事須是南自南北自北朝士多疑其與何㮚孫傅等同海被拘執而檜獨還又自燕至楚二千八百里踰河越無譏訶之者安得殺監而南就令從軍達蘭金人縱之必質妻屬安得與妻帑偕惟范宗尹及李囘二人素與檜善盡破羣疑力薦其忠及入對首奏所草與達蘭求和書呈帝帝謂輔臣曰檜朴忠過人朕得之喜而不寐旣聞二帝母后消息又得一佳士也先是朝廷雖數遣使于金但且守且和而專意與敵解仇息兵則自檜始葢檜首倡和議于金故達蘭隂縱之使還也以李囘同知樞密院事馮長寧以淮寧叛附于劉豫十一月趙鼎罷辛企宗除節度使鼎言企宗非軍功忤㫖罷奉祠以富直柔僉書樞密院事以秦檜為禮部尚書范宗尹欲處檜以經筵帝曰且與一事簡尚書故有是命金鄂爾多取涇原渭州鎮戎軍日南至帝率百官遥拜二帝王彦敗桑仲于長沙平遂復房州時所在盜賊蠭起加以饑饉無所資食惟蜀富饒巨盜往往窺覬桑仲旣䧟均房遂乗勢直擣金州白土闗衆號三十萬知金州王彦故仲將也仲以申牘請於彦曰仲於公無敗犯願假道入蜀就食耳彦遣統領門立為先鋒擊之賊銳甚立戰死將士失色或請避之彦叱曰樞相張公方有事闗陜若仲越金而至梁洋則腹背受敵大事去矣敢言避者斬即勒兵趨長沙平阻水據山設伏以待仲見官軍少蟻附搏戰彦執旗一麾士殊死戰仲敗走彦休士進擊追奔至白沙磧遂復房州張浚以彦為金均房州鎮撫使張浚退守興州命呉玠守和尚原浚聞金人入德順軍乃退保興州時輜重焚棄將士散亡惟親兵千餘自隨人情大沮或請徙治夔州參軍事劉子羽此之曰孺子可斬也四川全盛敵欲入冦久矣直以川口有鐡山棧道之險未敢遽窺爾今不堅守縱使深入而吾僻處䕫峽遂與闗中聲援不相聞進退失計悔將何及今幸敵方肆掠未逼近郡宣司但當留駐興州外繫闗中之望内安全蜀之心急遣官屬出闗呼召諸將收集散亡分布隘險堅壁固壘觀釁而動庶幾可以補前愆耳浚然其言而諸參佐無敢行者子羽請即奉命乃單騎至秦州召諸亡將時諸將不知宣司所在及聞命大喜悉以其衆來會几十餘萬人軍勢復振子羽因請遣呉玠聚兵扼險于鳯翔大散關東之和尚原以斷敵之來路闗師古等聚熙河兵于岷州大潭孫偓賈世方等聚涇原鳯翔兵于階成鳯三州以固蜀口金人知有備遂引去十二月金鄂爾多取熙州金金源郡王羅索卒建州盜范汝為降定差役法帝在河朔嘗歎知縣不得其人一充役次即至破家及即位深加講議乃定差役法十以村疃三十户每料輪差甲頭一名催納租稅以二五家為一保十大保為一都内選才力髙富者二人充都保主一都盗賊烟火之事其次有保長若品官則一品限田五十頃至九品五頃免差子孫䕃盡則同編户太學生及得解試者許募人充役軍丁女户及孤弱悉免通鑑續編卷十四
