body:
  text: 通鑑續編卷十七元陳桱撰甲子十四年金皇統四年夏人慶元年春正月行人王倫為金所殺金欲以倫為平濼三路都轉運使倫曰奉命而来非降也金脅以威倫拒益力金杖其使俾縊殺之倫厚賂使少緩遂冠帶南鄉再拜慟哭曰先臣文正公以直道輔相兩朝天下所知臣今將命被留欲汚以偽職臣敢愛一死以辱命遂就縊於是河間地震雨雹三日聞者哀之作太學及國子監即岳飛第為之太學凡十三齋二月万俟卨罷以樓炤僉書樞宻院事初卨自金還秦檜假金人譽已數千言囑卨以聞卨難之他日卨奏事退檜坐殿廬中批上㫖輙除所厚者官吏鈐紙尾進卨曰不聞聖語却不視檜大怒自是不交一語諷言官李文㑹詹大方論之卨遂求去三月帝謁孔子遂臨太學國學大成殿成司業髙閌請帝視學從之止輦于殿門外歩趨升降退御敦化堂命禮部侍郎秦熺執經髙閌講易泰卦徽猷閣直學士胡寅以閌阿㫖文飾移書責之夏四月作渾儀禁野史秦檜慮為人所譏著作郎周執羔阿其意上言訪聞有意之人窺伺朝廷作為私史以售其邪説請禁絶之檜從其言五月樓炤罷以李文㑹僉書樞宻院事置經界局於平江府以李椿年領其事秦檜之請也金使烏延和來賀天中節也六月黥配太學生張伯麟於吉陽軍伯麟嘗題壁有夫差爾忘越王之殺而父乎秦檜怒故也九月以呉璘為利州西路安撫使治興州階成和鳳文龍興七州𨽻焉以陽政為利州東路安撫使治興元府利閬洋巴劒大安軍興元府𨽻之徙趙鼎於吉陽軍秦檜怨鼎不附和議凡鼎所善者如張九成折彦質張戒解潜辛承宗皆指為鼎黨貶斥之鼎在潮五年杜門謝客時事不掛口有問者但引咎而已先是鼎請正建國公皇子之號檜言鼎欲立皇太子是待陛下終無子也宜俟親子乃立於是御史王滋言帝未有嗣宜祀髙禖乃築壇于圜丘東至是中丞詹大方希檜意劾鼎與其黨范冲邪謀密計轉相扇惑以徼無妄之福蓋指皇子而冲嘗為翊善故也遂移鼎吉陽鼎謝表有曰白首何歸悵餘生之無㡬丹心未泯誓九死以不移檜見曰此老倔强猶昔冬十月何若請黜程頤之學右正言何若指程順張載遺書為專門曲學請戒内外師儒之官力加禁絶秦檜從之十一月徙李光於瓊州十二月李文㑹免以楊愿僉書樞宻院事愿附秦檜得為翰林學士一時書命藉張擴潤色擴詠二毫筆詩愿以為譏已訴于檜擴坐斥及為中丞迎合檜意以舉劾至是以論李文㑹遂代其位檜當國每薦執政必擇柔佞易制者以備員而已然猶忌之故往往不久而去刻帝書六經於國子監乙丑十五年金皇統五年春正月丁未朔初御大慶殿受朝分經義詩賦為兩科以取士二月封崇國公璩為恩平郡王出就外第與普安郡王官屬禮制相等號東西府夏六月乙亥朔日有食之帝幸秦檜第先是知䖍州薛弼言州民析朽柱中有文曰天下太平年秦檜大喜乞詔付史館於是修飾彌文以粉飾治具為茍安餘杭之計祥瑞之奏曰至矣凡忤其意者輙陷以罪曽惇獻詩稱為聖相得知台州由是凡投獻者以臯䕫稷契為不足必曰元聖至是賜第一區帝親幸之加檜妻婦子孫官封尋書一徳格天之閣六字以賜之冬十月楊愿罷以李若谷僉書樞宻院事以秦熺為資政殿學士兼侍讀恩數視執政丙寅十六年金皇統六年春正月行籍田禮二月毁淫祠作秦檜家廟三月作武學夏五月作景鐘髙九尺親祠上帝則用之秦檜製銘焉金右丞相韓企先卒企先為相每欲為官擇人專以培植奬勸後進為己責任推轂士類甄别人物一時臺省之臣號多君子稱賢相焉髙麗王楷卒子晛立六月金殺其翰林學士宇文虚中金人重虚中之才號為國師而虚中恃才輕肆好譏訕凡見女直人輙以異域目之貴人逹官往往積不能平至是唐古酬等告虚中謀反有司鞫治無狀乃羅織虚中家圖書為反具虚中曰死自吾分至於圖籍南来士大夫家家有之翰林直學士髙士談圖書尤多於我家豈亦反耶有司承順風㫖并殺士談於是虚中與老幼百口同日焚死士談瓊孫也秋九月以何鑄為金國祈請使請國族也金劉豫死冬十二月有星孛於西南放萬夀觀使張浚於連州彗見浚自福州上疏言當今事勢如養大疽於頭目心腹之間不決不止遲則禍大而難決疾則禍輕而易治惟陛下謀之於心謹察情偽使在我有不可犯之勢庶㡬社稷安全不然後將噬臍事下三省秦檜大怒令中丞何若劾之遂貶連州居住丁夘十七年金皇統七年春正月以李若谷參知政事何若僉書樞宻院事以秦熺為資政殿大學士二月李若谷罷三月何若罷以段拂㕘知政事夏四月以汪勃僉書樞宻院事五月安置知饒州洪皓於英州閩浙大水宦者白鍔宣言夑理乖戾洪尚書名聞天下胡不用秦檜怒黥配鍔于吉陽軍而諷諌官詹大方論皓與鍔為刎頸交更相推譽責官安置秋七月召鄭剛中還以知成都府李璆權四川宣撫司事剛中治蜀頗有方畧秦檜忌之八月清逺軍節度副使趙鼎卒於吉陽軍鼎潜居深處門人故吏皆不敢通問惟廣西帥張宗元時餽醪米㑹降㫖鼎趙鼎李光遇赦永不檢舉且令本軍月具存亾申省遣人語其子汾曰秦檜必欲殺我我死汝曹無患不爾禍及一家矣先得疾自書墓中石記鄉里及除拜嵗月且書銘旌云身騎箕尾歸天上氣作山河壯本朝遺言屬其子乞歸塟遂不食而死天下聞而悲之鼎為相専以固國本為先以為本固而後敵可圖讎可復惜其見忌於檜齎志以歿然中興賢相則鼎為稱首焉冬十一月辛卯朔日有食之戊辰十八年金皇統八年春二月段拂罷三月以秦熺知樞宻院事夏四月戊子朔日有食之罷秦熺為觀文殿學士兼侍讀位次右僕射熺乞避父子共政也五月放浙東副總管李顯忠於台州顯忠熟知西邊山川險易因上恢復䇿秦檜惡之降官奉祠台州居住罷四川宣撫司以李璆為四川安撫制置使六月金以完顔亮為平章政事亮本名都古嚕納太祖孫鄂特本之子也為人僄急猜忌殘忍任數自以已與金主同為太祖孫遂懐覬望及為中京留守專仗立威以厭伏小人明安蕭裕傾險敢決亮結納之每為論天下事裕揣知其意因曰留守先太師太祖長子徳望如此人心天意宜有所屬誠有志舉大事願竭力以從亮喜遂與謀議及入為右丞進平章務攬持權柄用其腹心為省臺要職引裕為兵部侍郎秋八月汪勃罷以詹大方僉書樞宻院事金以完顔宗賢為左丞相宗賢請州郡長吏當並用本國人金主曰四海之内皆朕臣子若分别待之豈能致一自今本國及諸色人量才通用之九月詹大方卒冬十月以余堯弼僉書樞宻院事金太師領三省事烏珠卒金自尼瑪哈死逹蘭富勒呼等皆有自為之意鄂特本獨立不能如之何使無烏珠則日就衰弱矣故其國論功者以為尼瑪哈復惟有烏珠一人耳十一月徙胡銓於吉陽軍新州守臣張𨽻承秦檜㫖論銓與客唱酬怨望故也十二月金以完顔亮為右丞相金主自即位以来委政於尼瑪哈鄂特本烏珠雖初年國家多故而吏清政簡百姓樂業烏珠既没其后費摩氏干政朝官往往因之以取宰相金主欲立繼嗣為后所制心不能平因縱酒自遣酗怒至於手刃侍臣亮嘗生日金主遣近侍局直長大興國以司馬光畫像玉吐鶻廐馬賜之后亦附賜禮物金主聞之怒杖興國而奪回賜物亮本懐不􅁤疑畏愈甚興國亮母族也遂因之以作亂己巳十九年金皇統九年十二月以後廢主海陵煬王亮天徳元年夏天盛元年春三月癸未朔日有食之金以完顔亮為太保領三省事亮既得政益邀譽引用勢望子孫結其歡心夏五月金黜完顔亮行臺尚書省事四月壬申夜大風雨雷電震壊寢殿鴟尾有火入金主寢内燒幃幔金主趨别殿避之越五日大風壊民居官舎瓦木人畜皆飄颺十數里死傷者數百人五月以天變肆赦命翰林學士張鈞草詔參知政事蕭肄摘其語以為誹謗金主殺鈞且問故誰使為之左丞相宗賢曰都古嚕納實然金主不恱出亮亮行過中京與留守蕭裕定約而去秋八月金主殺其左司郎中三合近侍髙夀星等當遷屯燕南入訴于費摩后后以白金主且激怒之金主召議者治罪遂殺三合而杖平章政事秉徳夀星竞不遷秉徳由是怨望九月金復召完顔亮為平章政事亮行至良鄉召還莫測其故大恐及至復以為平章由是謀逆益甚冬十月金主殺其弟胙王常勝金主杖秉徳又杖左丞唐古辨二人怨之遂與大理卿烏逹謀廢立烏逹以其謀告完顔亮一日亮與辨語因問曰若舉大事誰可立者辨曰胙王常勝乎亮問其次辨曰鄧王子阿蘭亮曰阿蘭屬疎安得立辨曰公豈有意耶亮曰果不得已捨我其誰於是旦夕相與密謀護衛將軍塔斯疑之以告費摩后曰辨等公餘竊竊聚語臣深恠之后以白金主金主怒召辨謂曰爾與亮謀何事將如我何杖之亮因此忌常勝阿蘭且惡塔斯㑹河南兵士孫進作亂自稱皇弟按察大王而金主之弟止有常勝扎拉亮乗此構常勝扎拉阿蘭達蘭等殺之十一月金主殺其后費摩氏金主積怒于后遂殺之而召胙王妃薩滿納于宫中十二月金亮弑其主亶而自立䕶衛十人長布薩呼圖克舊受鄂特本恩時圖克坦額哷楚克與大興國俱給事寢殿時乗夜從主者取符鑰歸家以為常興國常以李老僧屬亮得為尚書省令史亮因使老僧結興國為内應興國遂與亮定約㑹金主獵還殺其妃四人亮因變羣臣震怒十二月丁巳乗呼圖克額哷楚克内直作是夜興國取符鑰納亮及左丞相秉徳左丞唐古辨妹大理卿烏逹圖克坦貞李老僧等入宫亮懐刀與其壻塔斯隨辨至宮門守者以辨乃國壻亮又至親不疑而納之及殿門衛士始覺有變亮等抽刀刧之莫敢動遂入寢殿額哷楚克先進刃呼圖克次之金主頓仆亮前手刃之血濺滿其面與衣金主既殂秉徳等未有所屬呼圖克曰始者議立平章今復何疑乃奉亮坐稱萬嵗秉徳遂與羣臣奉亮即位詐以金主欲議立后召大臣因殺曹國王宗敏左丞相宗賢以秉徳為左丞相唐古辨為右丞相烏逹為平章政事布薩呼圖克額哷楚克為副提㸃圖克坦貞為左衛將軍大興國為廣寧尹蕭裕為祕書監諡費摩后為悼平皇后大赦改元熈宗之世境内無事敬禮大臣委以國政故其治有足觀者末年酗酒妄殺人懐危懼自致凶禍焉金主亮追廢其故主亶為東昏王金主追諡其考梁宋國王鄂特本為帝廟號徳宗庚午二十年金天徳二年春正月施全刺秦檜於道中不克檜殺之檜趨朝殿前司後軍使臣施全挾刃于道遮檜肩輿刺之不中捕送大理檜親鞫之全對曰舉天下皆欲殺敵人汝獨不肯故我欲殺汝也詔磔于市自是檜每出列五十兵持長梃以自衛金主尊其嫡母圖克坦氏及母達氏皆為太后鄂特本正室圖克坦氏無子次室大氏生金主圖克坦氏賢遇下有恩意大氏事之甚謹相得至歡而金主自以二母有嫡妾之分心不自安及弑熈宗圖克坦氏曰帝雖失道人臣豈可至此及入宫見金主不賀金主䘖之至是二母俱尊為皇太后圖克坦氏居東宫號永夀宫大氏居西宫號永寧宫客後圖克坦后生日酒酣大氏起為夀圖克坦后方與坐語大氏跪者乆之金主怒而出明日召諸公主宗婦日與圖克坦后語者皆杖之大氏以為不可金主曰今之事豈能尚如前日耶自是嫌隙成矣三月以余堯弼㕘知政事巫伋僉書樞宻院事俞堯弼如金賀即位也及還金主以太上皇帝玉帶附遺于帝其秘書郎張仲軻曰此希世之寶也金主曰江南之地他日當為我有此置之外府耳仲軻由是知金主有南侵之意遂每事先意逢之矣以秦熺為觀文殿大學士萬夀觀使治私史編管右承務郎李孟堅於峽州李光在瓊嘗作私史其仲子右承務郎孟堅為所親陸升之言之升之訐其事秦檜命兩浙轉運副使曹泳究實泳言孟堅省記父光所作小史語渉譏謗送大理寺獄成詔光遇赦永不檢舉孟堅除名編管峽州於是胡寅程瑀潘良貴宗穎張燾許忻賀允中吴元八人皆縁坐黜降有差安置徽猷閣直學士致仕胡寅於新州秦檜嘗以白金與寅寅報書云願公脩政任賢尊王禦侮檜怒遂陷以李孟堅之獄復令右正言章复劾之故貶夏四月置力田科金主大殺其宗室以蕭裕為尚書左丞蕭玉為禮部尚書初金主在熈宗世見太宗諸子盛强忌之及即位遂與蕭裕謀殺之又以前左丞相秉徳首謀廢立而不即勸進衘之將盡誅焉恐國人以秉徳等皆懿親大臣無罪而死人心不服於是裕教尚書省譯史蕭玉上變遂召領三省事阿嚕左丞相唐古辨判大宗正寺呼爾察等鞫繫至則殺之因遣使如東京殺留守阿林北京殺留守呼拉布南京殺領行臺事秉徳并誅其親屬復殺太宗子孫七十餘人尼瑪哈子孫三十餘人諸宗室五十餘人太宗尼瑪哈後皆絶而烏逹蕭裕蕭玉等皆受重賞五月秦檜上中興聖統詔奉安於景靈宫玉牒所檢討官王曮等所撰中興之蹟也六月加秦熺少保秋七月除薪米税八月徙張浚於永州秦檜必欲殺浚以其死黨張柄知潭州與郡丞汪召錫共伺察之金以蕭玉參知政事金主又使玉子尚主謂之曰朕始得天下嘗患太宗諸子方强賴社稷之靈卿發其姦朕無以報此功使朕女為卿男婦代朕事卿也九月竄太常主簿呉元美於容州元美作夏二子傳指蚊蠅也其鄉人鄭瑋告之以為譏毁大臣且言元美家有潜光亭商隠堂有心于黨李光無意于事秦相故竄冬十月金主殺其左副元帥薩里罕平章政事博濟工部尚書穆里延并夷其族金主復忌舎音諸子盛强及宗室勲舊大臣欲盡除之乃諷都元帥府令史約蘇誣飾上變遂殺薩里罕及景祖孫穆里延舍音子博濟於是舎音子孫百餘人穆里延子孫二十餘人皆死秦檜有疾詔執政赴檜第議事十二月甲子檜始朝命肩輿入宫門二孫塤堪扶掖升殿不拜辛未二十一年金天徳三年春正月金初置國子監二月以巫伋為金國祈請使請淵聖及皇族也三月金營宫於燕京金主稍習經史慕中國朝著之尊宻有遷都意遂下詔求直言而上書者多謂上京僻在一隅官艱於轉漕民難於赴訴不若徙燕以應天地之中與金主意合乃詔廣燕城建宫室有司圖上燕城宮室制度營建隂陽五姓所宜金主曰國家吉凶在徳不在地使桀紂居之雖卜善地何益使堯舜居之何用卜為遂遣左丞相張浩右丞相張通古等調諸路夫匠築燕京宫室城周九里三十歩其宫室一依汴京制度運一木之費至二千萬牽一車之力至五百人宫殿之餙徧傅黄金而後間以五采金屑飛空如落雪一殿之費以億萬計成而復毁務極華麗焉夏五月金主納其宗婦於宫宰臣請益嬪御金主命圖克坦貞語之曰前所誅黨人諸婦多朕中表親宜選焉遂納博濟子蘇爾圖宗固子呼喇勤和碩台秉徳弟嘉哩四人之妻于宫而嘉哩妻髙氏尤美以為脩儀金主為人善飾詐未即位媵妾不過三數人既即位逞欲無厭秋七月以曹筠為四川安撫制置使九月巫伋還自金伋還言金不許所請冬十一月余堯弼罷壬申二十二年金天徳四年春三月編管王庶子之竒之荀於梅容州秦檜意也貶直龍圖閣葉三省於筠州竄監都作院王逺於髙州通書趙鼎王庶力詆和議也夏四月巫伋罷以章复僉書樞宻院事伋與秦檜居同里一日檜謂假曰里中有何新事伋曰有一術士自鄉里来頗能論命檜色變曰是人言公何日拜相伋皇恐而罷中丞章复聞之即劾伋隂懐異意遂罷秋七月金主使唐古定格殺其夫崇義節度使烏逹以定格為貴妃九月章复罷冬十月以宋樸僉書樞宻院事竄從政郎楊煒於萬安軍初煒嘗草書議和戎非便欲獻李光未上先見蕭振言之㑹光罷而止及煒為黄巖令振知台州而秦檜從子昌時提㸃浙東刑獄以其事聞于檜乃大索煒家得其書草遂竄煒而詔李光永不檢舉居振于池州癸酉二十三年金貞元元年春三月金遷都於燕三月金主自上京至燕京初備法駕下詔改元親選良家子百三十人充後宫金改燕京為中都汴京為南京中京為北京廢上京為㑹寜府金主以燕列國之名不當為京師號遂改為中都大興府削上京之名止稱㑹寧府又改大定府為北京遼陽府為東京惟西京大同府如舊以王循友知建康府循友知鎮江上書乞加秦檜九錫故也金以蕭裕為右丞相夏四月金太后大氏卒金主遷都于燕親屬皆從獨留圖克坦太后于㑹寧圖克坦后嘗憂懼每中使至必易衣以俟命大氏在燕嘗思念圖克坦后謂金主曰永夀宫待吾母子甚厚慎毋相忘也及病篤以不得一永見圖克坦后為恨將死謂金主曰汝以我之故不令夀宫偕来我死必迎致之事之當如事我五月以蕭振為四川安撫制置使金主殺其弟西京留守嘉努冬十月宋樸罷以史才僉書樞宻院事十二月金主納其叔母阿蘭為昭妃召葛王烏禄妻烏凌阿氏於濟南烏凌阿氏自殺金主恣于淫泆夀寜縣主實庫斡里雅布之女也静樂縣主布拉及錫納烏珠之女也實古爾宗雋之女也混同郡君蘇哷和卓及其妹伊都阿嚕之女也皆金主之從姊妹郕國夫人重節富勒呼之女孫而金主之姪也張定安妻鼐喇古太后大氏之兄嫂也金主無所忌恥皆與之私至是唐古定格與其奴通金主殺之而納其叔父曹王宗敏之妻阿蘭為昭妃既又使祕書監完顔文出其妻唐古實格而以為麗妃使伊里布出其妻富察徹辰而納之徹辰金主姊之女子也又召葛王烏禄妻烏凌阿氏于濟南烏凌阿氏謂烏禄曰我不行上必殺王我當自勉不以相累也行至良鄉自殺凡妃主宗婦嘗私之者皆分屬諸妃出入禁中錫納及蘇哷和卓最得幸焉金制凡宫人在外有夫者皆分畨出入金主欲率意幸之盡遣其夫往㑹寜婦人皆不聴出外嘗誡宫中給使男子於妃嬪位舉首者刓其目凡出入不得獨行便旋湏四人偕往所司執刀監䕶不由路者斬之日入後下階砌行者死男女倉卒誤相觸先聲言者賞三品官後言者死齊言者則皆免罪甲戌二十四年金貞元二年崇西遼承天后耶律氏福元年春正月金蕭裕謀反伏誅裕在相位恃功專恣勢傾朝廷金主倚信之他相仰成而已裕以金主猜忌忍殺恐將及禍遂與蕭馮嘉努等謀立故遼主豫王延禧之孫事覺伏誅三月竄何兊於英州兊上書訟其師馬伸發端上金人書乞存趙氏秦檜以其與己分功編管英州夏四月以孔搢襲封衍聖公搢玠子也五月癸丑朔日有食之金始置交鈔庫金以銅少循宋交子法造鈔引一貫二貫三貫五貫十貫五等謂之大鈔一伯二伯三伯五伯七伯五等謂之小鈔與錢並用以七年為限納舊易新諸路置官庫受之每貫取工墨錢十五文公私便焉六月史才罷以魏師遜僉書樞宻院事秋七月貶四川制置使蕭振於池州以符行中代之振治蜀以寛而總領財賦符行中附秦檜以急斂為務故振貶而行中用以秦塤修撰實録院塤檜孫也是年三月以敷文閣待制試進士舉省試殿試皆為第一檜從子焞焴姻黨周夤沈興傑皆登上第及廷試知貢舉湯思退以塤第一帝讀其䇿以其皆檜熺語遂擢張孝祥第一而降塤居第三至是脩撰實録院祖父孫三世同領史職前此未之有也冬十一月魏師遜罷以施鉅參知政事鄭仲熊僉書樞宻院事加秦熺少傅封嘉國公金毁㑹寜舊宫及大族第宅夷其址而耕之十二月竄知饒州洪興祖京西轉運副使魏安行於昭欽州秦檜疑故龍圖閣學士程瑀論語講解譏已而興祖嘗為序安行為鏤板至是毁之而加罪於二人竄通判武岡軍方疇知雷州王趯於永辰州疇通書于胡銓趯求内徙李光也西遼主伊立卒遺命其妺博克碩寛權國事子幼故也自號承天皇太后乙亥二十五年金貞元三年春二月竄常州通判沈長卿仁和縣尉芮煜於化州武岡軍長卿舊與李光啟譏和議又與芮煜共賦牡丹詩有寧令漢社稷變作莽乾坤之句故皆編管夏四月施鉅罷五月丁未朔日有食之六月鄭仲熊罷以湯思退僉書樞宻院事改岳州為純州秦檜惡同岳飛姓也秋七月進封李天祚為南平王八月下趙鼎子汾等於大理寺獄秦檜於一徳格天閣書趙鼎李光胡銓三人姓名必欲殺之及鼎死而憾不已江西運判張常先箋注前帥張宗元與張浚詩言于朝其詞連逮者數十家將誣以不軌而盡去之㑹汪召錫告宗室知泉州令衿觀檜家廟記口誦君子之澤五世而斬謫居汀州檜乃諷殿中侍御史徐嚞論趙汾與令衿飲别厚贐必有姦謀詔送汾令衿大理鞫問使汾自誣與張浚李光胡寅胡銓等五十三人謀大逆獄成而檜病不能書獲釋以董徳元參知政事冬十月秦檜有疾詔進封為建康郡王加其子熺少師並令致仕是夕檜卒檜為相屏塞人言蔽帝耳目一時臺諌非誦檜功徳則訐人語言以中傷善類或恐觸忌諱畏言國事則止言乞禁銷金鋪翠鹿胎􅃣子以塞責百官當輪對者多謁告避免羣小媚檜無所不至吕愿中率賔佐共賦秦城王氣詩張扶請檜乗金根車又有乞置益國官屬及議九錫者及病帝幸其第問焉檜無一語惟流涕而已其子熺奏請代居相位者帝曰此事卿不當與帝還宫命沈虚中草檜及熺制並令致仕熺猶遣子塤與右司員外郎林一飛宗正丞鄭柟夜見其黨殿中侍御史徐嚞右正言張扶謀請已為相帝不聴檜卒遺表有云願陛下益堅鄰國之歡盟謹國是之摇動贈申王諡忠獻檜居相位凡十九年劫制君父倡和誤國一時忠臣良將誅鋤畧盡其頑鈍無恥者率為檜用争以誣陷善類為功其矯誣也無罪可狀不過曰謗訕曰指斥曰怨望曰立黨沽名甚則曰有無君之心凡論人章疏皆檜自操以授臺諫識之者曰老秦筆也察伺之卒布滿京城小渉譏議即捕治中以深文又隂結内侍及醫師王繼先伺上動静郡國事惟申省無一至帝前者又立久任之說士淹滯失職有十年不解者自其專相易執政二十八人皆世無一譽柔佞易制者率自冗散以㧞之或自言官承㫖彈擊輙以政府報焉然甫入即出惟深徳王次翁故歴四年而始去之開門受賂富敵於國外國珍寶死猶及門隂險深阻與同列論事上前未嘗力辨但以一二語傾擠之俾帝自怒凡陷忠良率用此術晚年殘忍尤甚數興大獄焉以湯思退兼權參知政事初秦檜病篤召董徳元湯思退至卧内屬以後事各贈黄金千兩徳元慮檜以為自外不敢辭思退慮檜以為期其死不敢受帝聞思退不受以為非檜黨遂信任之治秦檜姻黨安置曹泳鄭億年於逺州竄莫汲等九人於嶺南免林一飛等二十三人官金主迎其太后圖克坦氏至燕金主命以大房山雲峯寺為山陵遣右丞相布薩思恭等如㑹寜奉遷太祖太宗梓宫及迎圖克坦后至沙流河金主親迎之且命左右約杖二束自隨跪於太后前謝罪曰亮不孝乆缺温凊願太后痛笞之不然不安后親扶起叱約杖者退后曰今庶民有克家子立百金之産尚且愛之不忍笞我有子如是寧忍笞乎既至燕居于夀康宫金主事之外極恭順后起則自扶掖之常從輿輦徒行后所御物或自執之見者以為至孝雖太后亦信其誠十一月以魏良臣㕘知政事以士俴為嗣濮王令詪為安定郡王嗣濮王安定郡王自令㢜士儡卒後秦檜不與繼封凡十餘年至是始復十二月詔復張浚折彦質万俟卨段拂及洪皓胡寅張九成等二十九人官徙李光於郴州胡銓於衡州召孟忠厚奉朝請董徳元免以沈該參知政事以提舉江州太平興國宫劉錡知潭州復以蕭振為四川制置使符行中免金汴京火金主隂有南侵之意乃謀遷汴遣完顔長寧為南京留守經畫之既而大火宫室盡焚金主大怒杖殺長寧丙子二十六年金正隆元年春正月追復趙鼎孫近鄭剛中汪藻舊官安定郡王令詪讓封於其兄令衿詔從之金以蕭玉為右丞相二月魏良臣罷三月罷宰相兼樞宻使以邊事已定也以万俟卨㕘知政事竄東平進士梁勛於逺州勛上書言金人必舉兵宜為之備帝怒編管勛于千里外州軍而下詔曰講和之䇿㫁自朕志秦檜但能賛朕而已豈以存亾而渝定議耶近者無知之輩皷倡浮言以惑衆聴至有偽撰詔命召用舊臣抗章公車妄議邊事朕甚駭之自今有此當重寘典憲夏五月以沈該万俟卨為尚書左右僕射湯思退知樞宻院事卨為相主和固位無異秦檜士論薄之六月以程克俊㕘知政事淵聖皇帝崩於金秋七月彗星見詔求直言八月程克俊罷以張綱㕘知政事綱初為給事中以秦檜用事遂致仕卧家者二十餘年嘗書座右曰以直行已以正立朝以静退髙天下其篤守如此九月以陳誠之同知樞宻院事冬十月復安置特進張浚於永州浚去國二十年天下士無賢不肖莫不傾心焉武夫健將言浚者必咨嗟太息至兒童婦女亦知有張都督也金使至必問浚安在惟恐其復用而秦檜懼其正論害己令臺臣有所彈劾語必及浚謂為國賊必欲殺之檜死乃起判洪州㑹有母喪念天下事為和議所移邊備蕩弛且聞金主驕悍自以大臣義同休戚不敢以居喪為嫌適有星變求直言浚䕶喪還蜀行至江陵聞之上言金人數年間勢必南侵而吾方溺於宴安謂金可信蕩然莫為之備沈該万俟卨居相位尤不厭天下望惟欲受命於金疏進万俟卨湯思退大怒言於帝曰金人未有釁而浚所奏乃若禍在年嵗間者衆莫不笑其妄卨復諷臺諌湯鵬舉凌哲等論浚名在罪籍唱為異議以動國是若使歸蜀恐搖動逺方遂復安置永州金主改葬其始祖以下十主於燕之大房山丁丑二十七年金正隆二年春二月以湯鵬舉㕘知政事三月万俟卨卒夏六月以湯思退為尚書右僕射四川制置使蕭振卒秋七月以李文㑹代之振再治蜀甚有惠政士民思之八月以湯鵬舉知樞宻院事九月張綱罷以陳康伯㕘知政事冬十月金初鑄銅錢先是止用前代錢也十一月湯鵬舉免孫道夫如金賀正旦也戊寅二十八年金正隆三年春正月金主杖其諫議大夫楊伯雄金主使實逹爾東勝家保養其次子舒蘇鄂博至是病死追封宿王楊伯雄語同直曰宿王之死盖養于宫外供䕶雖謹不若父母膝下豈國家風俗素尚如此金主聞之怒召伯雄謂曰爾臣子也君父所為豈得言風俗禁中事豈汝當言朕或體中不佳間或不視朝祗是少得人㡬拜爾而庶事皆奏决便殿縦有死刑不即論决盖使囚者得緩其死至於除授宣敕雖復稽緩有何利害朕每當閒暇頗閲教坊聲樂聊以自娱書云内作色荒外作禽荒酣酒嗜音峻宇雕墻有一于此未或不亡此戒人君不恤國事溺於此者爾如朕雖使聲樂喧動天地宰相敢有濫與人官而吏敢有受賕者乎外間敢有竊議者乎爾諫官也有可言之事當公言之言而不從朕之非也而乃私議可乎伯雄對曰陛下至徳明聖固無竊議者愚臣失言罪當萬死惟陛下哀憐乃杖而釋之二月以陳誠之知樞宻院事王綸同知院事孫道夫還自金道夫將還辭于金主金主使宣徽使敬嗣暉謂道夫曰歸白爾帝事我上國多有不誠今畧舉二事爾民有逃入我境者邊民皆即發還我民有叛逃入爾境者有司索之往往託詞不發一也爾於沿邊盜買鞍馬備戰陣二也且馬待人而後可用如無其人得馬百萬亦奚以為我亦豈能無備且我不取爾國則已如欲取之固非難事我聞接納叛亡盜買鞍馬皆爾國楊太尉所為常因俘獲問知其人無能為者也盖欲南侵故先設此二事為辭道夫還具奏之湯思退不以為然三月辛酉朔日有食之秋七月金以李通㕘知政事初金主召左諌議大夫馬欽校書郎田與信直長錫錫入便殿侍坐金主與張仲軻論漢書謂仲軻曰漢之封疆不過七八千里今吾國幅員萬里可謂大矣仲軻曰本朝疆土雖大而天下有四主若能一之乃為大矣金主曰彼且何罪而伐之仲軻曰臣聞宋人買馬修器械招納山東叛亡豈得為無罪金主喜曰向者梁珫嘗為朕言宋有劉貴妃者姿質羙艷蜀之花蕋吴之西施所不及也今一舉而兩得之俗所謂因行掉臂也江南聞我舉兵必逺竄爾欽與信皆對曰海島蠻越臣等皆知道路彼將安往金主曰彼將出兵何地欽等對曰不過淮上爾金主曰然則天與我也朕舉兵滅宋逺不過二三年然後討平髙麗夏國一統之後論功遷秩分賞將士彼必忘勞矣時金主恃其累世强盛欲大肆征伐以一天下嘗曰天下一家然後可以為正統及拜李通參知政事通揣知金主意遂與張仲軻馬欽梁珫及近習羣小輩盛言江南富庶子女玉帛之多逢其意而先導之金主信其說以通為謀主遂遣使籍其諸路明安部族及州縣渤海丁壯充軍凡年二十以上五十以下者皆籍之雖親老丁多求一子留侍亦不許也九月以王剛中為四川制置使以士輵為嗣濮王作損齋帝以治道貴清静宜恬淡寡欲清心省事乃作損齋屏去玩好置經史古書于中以為燕居之所自撰記文冬十月金營宫室於汴京金主遣其左丞相張浩參政敬嗣暉如汴京營建宫室禮部侍郎黄中使還上言金人治汴京必欲徙居以廹我不可不早為之備若彼果至汴則壯士健焉不數日可及境矣湯思退大怒左遷中官十二月安定郡王令衿卒己夘二十九年金正隆四年春正月禁科賣鹽帝曰鹽雖民間常用之物不可一日缺至於科賣則為大害盜賊往往繇此以起而計口食鹽之法尤非所當行也二月金造戰艦於通州將南侵也三月立限田差役法金大造兵於諸道金主决意南侵遣使分詣諸道總管府督造兵器詔諸路舊貯軍器並致于燕時方建宫室于汴修城郭于燕其財用皆賦于民民不能堪箭翎一尺至千錢村落間往往椎牛以供筋革至于烏鵲狗彘無不被害者夏五月貶禮部侍郎孫道夫知緜州道夫自使金還累奏敵有窺江淮之意帝曰朝廷待之甚厚彼以何名為兵端道夫曰彼身弑其君而奪之位興兵豈問有名沈該不以為慮道夫每對帝輙言武事該疑其引用張浚忌之故貶六月以王綸為金國奉表稱謝使帝疑金主有南侵之意使綸往覘之綸還入對言鄰國恭順和好無他皆陛下威徳所致湯思退等皆賀帝曰中外之論皆欲沿邉屯戍軍馬移易將帥為進取之計萬一輕舉兵連禍結何時而已陳誠之罷沈該免貪冒也秋七月以賀允中􅄁知政事復以令詪為安定郡王八月金調馬於諸路詔諸路調馬以户口為差計五十六萬疋富室有至六十疋者仍令户自養飼以俟九月以湯思退陳康伯為尚書左右僕射康伯静重明敏一語不妄發帝謂為真宰相嘗命與湯思退論事俾其勿憚商確必當理乃已康伯言大臣當盡公若依阿植黨此鄙夫患失者臣所不能皇太后韋氏崩帝事后甚謹先意承志唯恐不及或一食稍减輙不勝憂懼常戒宫人曰太后年已髙惟優游無事起居適意即夀考康寧事有所闕慎勿令知第来白朕至是崩年八十十一月葬顯仁皇后十二月以王綸知樞宻院事金主殺其太醫使祈宰上疏諌南侵也庚辰三十年金正隆五年春正月以葉義問同知樞宻院事二月立普安郡王瑗為皇子進封建王更名瑋時建安恩平二王並在禁中名號未正中外籍籍利州提㸃刑獄范如圭以為憂掇至和嘉祐間名臣奏章凡三十六篇合為一書囊封以獻請㫁以至公勿疑帝感悟即日下詔以普安郡王為皇子三月以皇姪恩平郡王璩判大宗正寺名號始定金東海民張旺作亂使徐文帥舟師平之旺反金主遣都水監徐文帥舟師九百浮海討之命文曰朕意不在一邑將試舟師爾夏六月王綸罷秋七月丁丑朔日有食之以葉義問知樞宻院事周麟之同知院事朱倬參知政事倬初以張浚薦自宜興簿入對時方以劉豫為憂倬䇿必敗帝大喜而秦檜惡之出為越州教授檜死倬知惠州陛辭因言前事帝問卿何乆淹如此倬言為檜所厄帝愀然慰諭目送之且曰人不知卿惟朕獨知遂累擢至中丞論事多所禆益帝信任之八月丙午朔日有食之賀允中致仕冬十月虞允文如金賀正旦允文至金見運粮造舟者多及辭還金主謂曰我將㸔花洛陽允文奏之十二月湯思退免侍御史陳俊卿論思退抰巧詐之心濟傾邪之術觀其所為多效秦檜盖思退致身皆檜父子恩也宜寘之憲典遂奉祠初行㑹子戸部侍郎錢端禮被㫖造㑹子儲見錢于城内外流轉其合發官錢並許兊㑹子輸左蔵庫初行于兩浙遂通行于諸州徐度如金賀生辰也辛巳三十一年金正隆六年十月世宗雍大定元年春正月甲戌朔日有食之帝不受朝二月詔復分經義詩賦為兩科以取士三月以楊椿㕘知政事以陳康伯朱倬為尚書左右僕射徐度還自金金主南侵之議既决乃密𨼆畫工於奉使中俾寫臨安湖山以歸為屏而圖已之像䇿馬於吴山絶頂題詩其上有立馬吴山第一峰之句遣使徴諸道兵其女直契丹奚人不限丁數悉僉起之凡二十四萬以其半强者為正軍弱者為阿里喜又僉中都南都中原漢兒渤海之丁合二十七萬遂遷都汴京命尚書右丞李通諭徐度曰朕昔從梁王于軍樂南京風土常欲廵幸今營繕將畢功將以二月末先往河南帝王廵狩自古有之以淮右多隙地欲校獵其間従兵不踰萬人况朕祖宗陵廟在此安能乆于彼乎汝等歸告汝主令有司宣諭朕意使淮南之民無懐疑懼度還言之夏四月金使髙景山來求漢淮之地始聞淵聖皇帝之䘮金主遣其僉書樞密院事髙景山右司員外郎王全来賀天中節金主謂全曰汝見宋主即面數其焚南京宫室沿邊買馬招致叛亡之罪當令大臣来此朕將親詰之且索漢淮之地如不従則厲聲詆責之彼必不敢害汝盖欲激怒以為南侵之名也又謂景山曰回日以全所言奏聞全至臨安一如金主之言以詆帝帝謂全曰聞公北方名家何乃如是全復曰趙桓今已死矣帝始知淵聖崩遽起發哀而罷以吳璘為四川宣撫使陳康伯知金人必敗盟請早為之備因建四䇿一増荆南兵以重上流二分畫兩淮地命諸將結民社保境三劉寳獨當淮東將驕卒少不可恃四沿江諸郡脩城積粮以固内地帝多従之及聞王全言乃詔以其語諭諸路統制帥守監司隨宜應變毋失機㑹時宿將無在者唯劉錡在荆南因召之又以璘為四川宣撫使仍命王剛中同治軍務六月以劉錡為淮南江東西浙西制置使帥師屯揚州金西北路契丹伊喇斡罕反初金主徴兵伐宋使牌印素赫如西北路盡僉契丹丁壯契丹人曰西北路接近鄰國世世征伐相與讎怨若男丁盡従軍彼以兵来則老弱必盡係累矣幸使者入朝言之素赫畏罪不敢言復與牌印耶律娜等督起西北路兵契丹聞男子當盡起於是西北路招討司譯使薩巴與部衆殺招討使完顔烏哲及素赫等而執耶律娜取招討使司貯甲三千遂反議立故遼主延禧子孫衆推都監老華善為招討使山後四羣收山前諸羣牧皆應之咸平府穆琨𤓰哩舉兵據咸平繕完器甲出府庫財物募兵以應方薩巴其勢益張金主使布薩呼圖克等討之薩巴雖强然自度大軍必相繼而至勢不可支謀歸于西遼乃率衆沿龍駒河西出薩巴既行而舊居山前者皆不欲往偽署六院節度使伊喇斡罕兵宫陳家殺薩巴執老華善等斡罕自為都元帥陳家為都監擁衆東還至臨潢府東南新羅寨東京留守曹國公烏禄使伊喇札巴等招之札巴等見斡罕以烏禄意諭之斡罕已約降已而復謂札巴曰若降爾能保我輩無事乎札巴曰我知招降爾其他豈能必㢤札巴見斡罕兵衆强盛車帳滿野意其可以有成反說之曰我之始来以汝輩不能有為今觀兵勢强盛如此汝等欲如羣羊為人所驅去乎將欲恃天時乎若果有大志吾亦不復還矣其黨有前布塔布部族節度使矩威者言昔古新丞相賢能人也嘗說西北部族他日當有事今日正合此語恐不可降也於是斡罕决意不降遂攻臨潢圍之衆至五萬金主遷都於汴二月癸亥金主發燕京六月癸亥備法駕入汴所過麥野皆空徐嚞如金至盱眙金人卻之乃還帝遣嚞賀金主遷都金主使韓汝嘉就境上止之曰朕始至此比聞北方小警欲復歸中都無庸来賀也嚞乃還秋七月金大括驘馬於諸路大括驘馬官至七品聴留一匹等而上之并舊籍民焉其在東者給西軍在西者給東軍交相往来晝夜絡繹不絶死者狼籍于道其亡失多者官吏懼或自殺所過蹂踐民田調發牽馬夫役詔河南州縣所貯粮米以備大軍不得他用驘馬所至當給芻粟而無可給有司以為請金主曰此方比嵗民間儲畜尚多今禾稼滿野驘馬可就牧田中借令再嵗不穫亦何傷乎於是國内騷然盜賊蠭起大者連城邑小者保山澤有以賊盜事聞者金主輙杖而黜其官由是羣臣不敢言金主大殺宋遼宗室之在其國内者於是趙氏耶律氏子男被害者百三十餘人周麟之有罪免初陳康伯聞金将敗盟召三衙帥及楊存中至都堂議舉兵又請侍従臺諫集議康伯傳上㫖曰今日更不尚和與守直問戰當何如時帝雅欲視師内視省都知張去為隂沮用兵且陳退避䇿中外妄傳幸蜀閩人情洶洶朱倬兼一語周麟之受命賀金遷都憚不欲行康伯獨以為己任奏曰金人敗盟天人共憤今日之事有進無退聖意堅决則將士之意自倍願分三衙禁旅助襄漢待其先發應之康伯勉周麟之以國事麟之語侵康伯康伯曰使某不為宰相當自行大臣與國存亡雖死安避麟之竟辭行遂坐免宿遷人魏勝起兵復漣水軍及海州宿遷人魏勝多智勇應募為弓箭手居山陽及金人籍諸路民為兵勝躍曰此其時也聚義士三百北渡淮取漣水軍宣布朝廷徳意不殺一人漣水民翕然以聴遂取海州郡守髙文富遣兵捕勝勝迎擊走之追至城下文富閉門固守勝令城外多張旗幟舉烟火為疑兵又使人向諸城門諭以金人棄信背盟無名興師及夲朝寛大之意城中人聞之即開門以降勝擊殺州兵千餘而執文富民皆按堵如故勝權知州事遣人諭朐山懐仁沭陽東海諸縣皆定之乃蠲租稅釋罪囚發倉庫犒戰士分忠義士為五軍紀律明肅部分如宿將勝自兼都統制益募忠義以圖收復逺近聞之響應旬日得兵數千即具其事報境上帥守冀給軍装器甲時帥雖知金將渝盟未有發其端者莫敢以聞勝復帥所部千餘攻沂州入其城殺金守將及軍士三千餘衆悉降得其器甲數萬以成閔為湖北京西制置使金主亮弑其太后圖克坦氏太后聞金主意欲南侵數以言諫之金主不恱每謁見還宫必忿怒人不知其故及至汴后居寧徳宫使侍婢髙福娘問金主起居金主幸之因使伺后動静凡后所為事無大小福娘夫特黙格教福娘增飾其言以聞及契丹反樞密使布薩呼都克往討辭謁后后謂曰國家世居上京既徙中都今又至汴復將興兵涉江淮伐宋疲弊中國我嘗諫止之不見聴也契丹事復如此奈何福娘以告金主金主意謂后嘗養鄭王充為已子充四子皆成立恐呼圖克將兵在外或有異圖乃召㸃檢大懐忠等使弑后且指名后左右數人皆令殺之后方樗蒲懐忠等至令后跪受詔后諤然方下跪尚衣局使虎特末従後擊之仆而復起者再髙福娘等縊殺之并殺其左右數人金主命焚后于宫中棄骨于克水并殺鄭王充之子塔納阿里布等三人遂召呼圖等還皆殺之封髙福娘為勛國夫人以特黙格為澤州刺史又以尚書令張浩左丞相蕭玉諌伐宋杖而釋之自是莫有敢諫者矣九月金主大舉南侵金主分諸道兵為三十二軍軍置總管置左右領軍大都督及三道都統制府以總之以樞密使璸都為左大都督李通副之尚書左丞赫舍哩良弼為右大都督烏延富勒琿副之工部尚書蘇保衡為浙東道水軍都統制益都尹正嘉副之由海道徑趣臨安太原尹劉萼為漢南道行臺兵馬都統道制進自蔡州以瞰荆襄河中尹圖克坦哈沙為西蜀行營兵馬都統制由鳳翔取大㪚闗駐軍以俟後命主左監軍圖克坦貞别將兵二萬入淮隂九月庚寅金召諸將授方畧賜宴于尚書省命皇后圖克坦氏與太子光英居守尚書令張浩左丞相蕭玉參知政事敬嗣暉留治省事甲午金主戎服乗馬具装啓行妃嬪皆従衆六十萬號百萬氊帳相望鉦皷之聲不絶李通造浮梁于淮水之上將自清河口入淮東逺近大震以黄祖舜同知樞宻院事上淵聖皇帝廟號曰欽宗金圖克坦哈沙侵黄牛堡吳璘敗之復秦隴洮州圖克坦哈沙將五千騎扼大散闗遊騎侵黄牛堡人情洶洶制置使王剛中跨一馬馳二百里至吴璘營起璘于帳中責之曰大將與國義同休戚臨敵安得高枕而卧璘大驚即馳至殺金坪駐軍青野原益調内郡兵分道而進授以方畧以援黄牛剛中又以蠟書抵張正彦濟師西師大集璘將王彦以神臂弓射金師却之璘又遣别將彭青至寳雞渭河夜劫橋頭大寨破之乗勝復秦隴洮三州金師既退剛中倍道馳還謂其屬李燾曰將帥之功吾何有焉燾嘆曰身督戰而功成不居過人逺矣夏浚復泗州髙平人王友直起兵復大名府遣使入朝博州髙平人王友直幼従父佐游志復中原以歸宋聞金主渝盟乃結豪傑謂之曰權所以濟事權歸于正何害于理即矯制自稱河北等路安撫制置使以其徒王任為副使徧諭州縣勤王未㡬得衆數萬制為十三軍置都統制等官以統之進攻大名一皷而克撫定衆庶諭以紹興年號遣馮轂赴行在奏事冬十月金人圍海州李寳救之金人引去寳遂及魏勝敗金舟師於膠西之唐島殺其将鄭家金遣䝉古鎮國以兵萬餘攻海州抵州北二十里新橋魏勝出兵迎戰大敗之殺鎮國軍聲益振山東之民咸欲附勝勝傳檄招諭結集以待王師之至沂州民壁蒼山者數十萬金人圍之乆不下砦守滕􅀢告急于勝勝提兵救之陳于山下金人襲之勝單騎而殿以大刀奮擊金人望見知其為將也以五百騎圍之數重勝馳突四擊金陣開復圍戰移時身被數十創冒刃出圍金兵追之馬中矢踣勝歩入砦無敢當者金人又急攻絶其水砦中食乾糒殺牛馬飲血勝黙禱而雨作金人攻益急周山為營勝度其必復攻海州因間出砦趨城中金人果解蒼山圍自新橋扺城下勝出戰皆捷金兵分四面攻之勝募士登城以禦矢石如雨者七日勝為矢所中自鼻貫齒不能食督戰益力金兵死傷多乃引去金主渡淮慮勝睨其後分軍數萬攻海州圍之㑹浙東副總管李寳遣其子公佐覘敵至海州具知其狀而寳方帥舟師由海道拒敵于膠西公佐遣人報之寳遡風至東海慷慨勵士赴援金人不意寳至乃引去勝出城迎寳寳與勝俱至膠西之石島與敵舟師遇敵舟次于唐島僅隔一山初金主命海艦𢷬蘇杭悉以中原民操舟楫民家送衣裘者相告語王師至即背之及寳入島中適北風勁舟不進有頃反風金舟艤于岸操舟者望見寳舟謬云此金國兵也俾皆入舟中寳舟忽至金人不知寳縦火焚之其舟以赤油絹為帆風順火熾操舟者皆登岸走金兵在舟中者坐以待縛斬其水軍副都統制鄭家努等於是獲敵無算寳還東海金人自渦口渡淮劉錡帥師次於淮隂劉錡兵至揚州建大將旗皷軍容甚肅觀者嘆息以兵駐清河口以扼金師金人以氊裹船載糧而来錡使善沒者鑿沈其舟辛丑金人自渦口渡淮乙巳錡次于淮隂金人立曹國公烏禄為帝於遼陽更名雍金主亮自發汴京將士在道多亡歸者赫嚕明安福夀髙忠建盧萬家博索路總管黙音東京穆琨金珠等始授甲於大名即舉部亡歸従者至二萬餘皆公言于路曰我輩今往東京立新天子矣時東京留守烏禄許王鄂爾多之子而太祖之孫也性仁孝沈静明逹衆心歸之金主亮嘗使穆里延宻圖淮北諸王烏禄聞而憂懼㑹故吏魯沁自汴還具言金主弑母等事且曰將遣使害宗室兄弟矣烏禄益懼謀於其舅興元少尹李錫錫勸鳥禄先殺副留守髙存福烏禄遂執存福將殺之適福夀等以軍入東京乃共殺存福等丙午烏禄御宣政殿即位大赦改元大定下詔暴楊金主亮罪惡數十事烏禄初封葛王劉錡將王權之師潰於昭闗錡帥師還揚州金主亮遂入廬州錡遣大將王權措置淮西權不従錡節制聞金兵大至即棄廬州引兵退屯昭闗不戰而潰錡聞之遂自淮隂退還揚州金主入廬州權自昭闗退守和州金蕭琦入滁州呉拱復唐州武鉅復鄧州詔葉義問督視江淮軍馬虞允文參謀軍事帝聞王權敗召楊存中至内殿議禦敵之䇿因命存中就康伯議欲航海避敵康伯延之入解衣置酒帝聞之已自寛明日康伯入奏曰聞有勸陛下幸越趨閩者審爾大事去矣盍静以待之一日帝忽降手詔曰如敵未退㪚百官康伯焚詔而後奏曰百官㪚主勢孤矣帝意既堅康伯乃請下詔親征以葉義問督視江淮軍馬中書舍人虞允文參賛軍事金圖克坦貞入真州遂侵揚州王彦復商州以楊存中為御營宿衛使存中即沂中也王權自和州退屯東采石金主遂入和州金主入和州以梁山濼水涸先所造戰船不得進命李通更造船督責苛急將士日夜不得休息壊城中民居以為材木煮死人膏為油用之因築臺江上金主被金甲登臺殺黑馬以祭天以一羊一豕投於江中召左都督璸都等謂之曰舟楫已具可以濟江矣副都督富勒琿曰臣觀宋舟甚大我舟小而行遲恐不可濟金主怒曰爾昔従梁王追趙構入海島豈皆大舟耶明日遣總管阿林阿薩爾二人率舟師先濟温都敖拉馬欽實納三人皆従戰金主置黄旗紅旗于岸上以號令進止既濟江兩舟相逼南岸水淺不得進與宋兵相對射者久之金舟矢盡而敗遂還和州㑹尚書省令左司郎中鄂博庫報曹國公已即位于東京改元大定金主拊髀歎曰朕本欲平江南改元大定此豈非天乎因出其素所書取一戎衣天下大定改元事以示羣臣遂召諸將帥謀北還且分兵渡江李通曰陛下親征深入異境無功而還若衆㪚于前敵乗于後非萬全計若留兵渡江車駕北還諸將亦將解體今燕北諸軍近遼陽者恐有異志宜先發其渡江斂舟焚之絶其歸望然後陛下北還南北皆指日而定矣金主然之以李顯忠為御營先鋒都統制屯蕪湖劉錡使員琦禦金人於皂角林大敗之斬其將髙景山劉錡有疾詔錡還鎮江錡以舟渡真揚之民于江之南留屯瓜州時錡病甚求解兵柄留其姪中軍統制汜以千五百人塞瓜州李横以八千人固守詔錡還鎮江專防江錡既南渡兩淮不可守矣成閔復蔡州王彦復虢州十月召張浚判建康府殿中侍御史陳俊卿上疏極言浚忠藎帝悟乃詔復官判建康浚至岳陽買舟冒風雪而行時金兵充斥浚遇東来者云敵兵方盛焚采石烟焰漲天慎毋輕進浚曰吾赴君父之急知直前求乗輿所在而已時長江無一舟敢行北岸者浚乗小舟徑進焉召王權還以李顯忠代將其師金人侵𤓰州劉汜禦之敗績葉義問自鎮江如建康葉義問至鎮江聞金人攻瓜州劉汜以克敵弓射却之乃督鎮江兵渡江衆以為不可義問强之汜請出戰劉錡不従汜拜家廟而行金人以重兵逼瓜州汜先退李横以孤兵不能當亦却失其都統制印横汜僅以身免錡聞汜敗因憤悶疾益甚義問聞之乃遵陸趨建康市人皆媟罵之虞允文大敗金師於東采石金主亮遂趨揚州乙亥金主帥大軍臨采石江上刑白黒馬祭天誓明日濟江晨炊玉麟堂先濟者與黄金一兩㑹葉義問命虞允文往蕪湖迎李顯忠交王權軍且犒師采石丙子允文至采石王權已去顯忠未来敵騎充斥官軍三五星散解鞍束甲坐道傍皆權敗兵也允文謂坐待顯忠則誤國事遂立招諸將勉以忠義曰金帛告命皆在此以待有功衆曰今既有主請死戰或謂允文曰公受命犒師不受命督戰他人壊之公任其咎耶允文叱之曰危及社稷吾將安避至江濵見江北已築髙臺對植絳旗二繡旗二中建黄屋金主踞坐其下兵凡四十萬馬倍之宋軍才萬八千允文乃命諸將列大陣不動分戈船為五其二並東西岸其一駐中流蔵精兵待戰其二蔵小港備不測部分甫畢敵已大呼金主操小紅旗麾數百艘絶江而来瞬息之間抵南岸七十艘直薄宋軍軍小却允文入陣中撫統制時俊之背曰汝膽畧聞四方立陣後則兒女子爾俊即揮雙刀出士殊死戰中流宋軍以海鰌船衝敵舟皆平沉敵半死半戰日暮未退㑹有潰卒自光州至允文授以旗皷従山後轉出敵疑援兵至始遁允文又命勁弩尾擊追射大敗之敵兵不死于江者金主悉敲殺之允文犒將士曰敵今敗明當復来夜半部分諸將分海舟縋上流别遣盛新以舟師截金人于揚林河口明旦敵果至因夾擊之復大敗焚其舟三百敵遣詔来諭王權似有宿約者允文曰此反間也乃復書言權因退師已置憲典新將李顯忠也願快戰以决雌雄金主得書大怒遂焚其龍鳳舟斬梁漢臣及造舟者二人率其軍趨揚州過烏江縣觀項羽祠嘆曰如此英雄不得天下誠可惜也癸未金至至揚州使符寳郎耶律摩多護神果軍扼淮渡凡自軍中還至淮上無都督府文字者皆殺之因出内箭飾以金龍題曰御箭繫帛書其上使人乗舟射之南岸言宋遣人焚燬汴京宫室及沿邊買馬誘中原人今興師問罪義在吊民大軍所至必無秋毫之犯欲以招誘宋人金主雍追尊其考許王鄂爾多為帝廟曰睿宗李顯忠至采石虞允文帥師還鎮江顯忠至允文語之曰敵入揚州必與瓜州兵合京口無備我當往公能分兵相助乎顯忠分李捧兵萬六千與之允文遂還京口時敵屯重兵滁河造三牐儲水深數尺塞瓜州口楊存中成閔邵宏淵諸軍皆集京口凡二十餘萬惟海鰌船不滿百戈船半之允文謂遇風則使戰船無風則使戰艦又以數少恐不足用遂聚材改治馬船為戰艦命張深守滁河口扼大江之衝苗定駐下蜀援之劉錡罷疾篤故也虞允文謁錡問疾錡執允文手曰疾何必問朝廷養兵三十年一技不施而大功乃出一儒生我輩愧死矣明年錡以劉汜敗發怒不已嘔血數升卒錡慷慨深毅有儒將風金主亮之南下也令有敢言錡姓名者斬枚舉南朝諸將問其下孰敢當者皆隨姓名以對其答如響至錡莫有應者金主曰吾自當之惜錡以疾不能成功齎悢而沒焉以成閔為淮東制置招討使李顯忠為淮西制置招討使吳珙為湖北京西制置招討使金人入泰州金人弑其主亮於𤓰州庚寅金主至瓜州居于龜山寺虞允文與楊存中臨江按試命戰士踏車船中流上下三周金山回轉如飛敵持滿以待相顧駭愕金主笑曰紙船耳有一將跪奏南軍有備不可輕願駐揚州徐圖進取金主怒杖之五十召諸將約以三日濟江否則盡殺之驍騎髙僧欲誘其黨以亡事覺金主命衆刃剉之乃下令軍士亡者殺其富勒琿富勒琿亡者殺其穆琨穆琨亡者殺其明安明安亡者殺其總管由是軍士益危懼甲午令軍中運鴉鶻船及運船于瓜洲期以明日渡江敢後者死衆欲亡歸乃决計于浙西路都統制耶律元宜及明安唐古烏葉且曰前阻淮渡皆成擒矣比聞遼陽新天子即位不若共行大事然後舉軍北還如何元宜然之乃期詰旦衛軍畨代即行事乙未黎明元宜等帥諸將以衆薄金主營金主聞亂以為宋兵奄至攬衣遽起箭入帳中金主取視之愕然曰乃吾兵也近侍局副使大慶山曰事急矣當出避之金主曰走將安往方取弓已中箭仆地之延安少尹納哈塔鄂爾多先刃之手足猶動遂縊殺軍士攘取行營服用皆盡乃取驍騎指揮使大磐衣年褁其尸而焚之收其妃嬪及李通郭安國圖克坦永梁珫大慶山等皆殺之元宜自為左領軍副大都督使人殺太子光英于汴金主在位每飾情貌以御臣下却尚食鵞以示儉及游獵頓次不時需索一鵞一鶉民間或用數萬售之有以一牛易一鶉者或以敝衾覆衣以示近臣或服補綴令記注官見乏或取軍士陳米飯與尚食同進先食軍士飯㡬盡或見民車陷泥澤令衛士下挽俟車出然後行與近臣燕語輙引古音賢君以自况顯貴大臣使進直言而直諌者輙死比眤羣小官賞無度左右有曠僚者人或以名呼之即授以顯官嘗置黄金裀褥間有喜之者令自取之滛嬖不擇骨肉刑殺不必有罪殫民力如馬牛費財用如土苴欲為君則弑君欲伐鄰則殺母欲奪人妻則使人殺其夫三綱絶矣復何他論哉金都督府遣使來輸平耶律元宜既弑金主乃退屯三十里遣人持檄詣鎮江軍議和十二月楊春復廬州以李寳為浙西通泰海州沿海制置使金劉萼自荆襄帥師北去昝朝復鄧州成閔渡江收復淮東李顯忠渡江收復淮西王選復楚州帝如建康府張浚至建康即具行宫儀物請車駕臨幸帝従之金師渡淮北還罷督視府虞允文還自鎮江允文入對帝慰藉嘉歎謂陳俊卿曰允文天性公忠朕之裴度劉銳復泗州李顯忠復和州金主雍入燕金主雍聞金主亮死遂入燕京帝次於鎮江府王友直自夀春來歸以為忠義軍都統制壬午三十二年金大定二年春正月戊辰朔日有食之帝在鎮江帝至建康府壬申帝至建康張浚迎拜道左衛士見浚無不以手加額浚起廢復用風采𨼆然軍民皆倚以為重山東人耿京起兵復東平遣辛棄疾來朝山東忠義耿京據東平自稱天平節度使以齊州歴城人辛棄疾掌書記棄疾勸京歸宋京遣棄疾奉表詣行在帝大喜厚賚之金使髙忠建來金主下令散南征之衆而以忠建為報諭宋國使且告即位以耿京為天平軍節度使知東平府以楊存中為江淮荆襄路宣撫使二月以虞允文為川陕宣諭使允文陛辭言金亮既誅新主初立彼國方亂天相我恢復也和則海内氣沮戰則海内氣伸帝以為然允文至蜀遂與吴璘經畧中原帝還臨安府時將祔欽宗于太廟帝還臨安謂張浚曰卿在此朕無北顧憂矣御史吴芾言建康可以控帶襄漢經理淮甸大駕宜留以繫中原之望若還臨安則西北之勢不能相接不従瘞欽宗重於臨安之招賢寺金人取蔡州金以張浩為尚書令金主嘗謂宰相曰進賢退不肖宰相之職也有才能髙於已者或懼其分權往往不肯引置同列朕甚不取卿等毋以此為心又曰朕嘗慕古之帝王虚心受諌卿等毋緘黙以自便也又曰朕即位未半年可行之事甚多近日全無敷奏朕深居九重正頼卿等賛襄各思所長以聞不可公餘輙従自便優游也又曰臣民上書者多尚書省詳閱而不即具奏天下將謂朕徒受其言而不行也又曰百姓上書陳時政其言猶有所補卿等位居機要畧無獻替可乎聽斷獄訟簿書期㑹何人不能唐虞之聖猶務兼覧博照乃能成治正隆專任獨見故取敗亡朕蚤夜孜孜冀聞讜論也時有近侍進言欲罷科舉者金主問張浩曰自古帝王有不用文學者乎浩曰有之復曰誰歟浩曰秦始皇金主顧近侍曰豈可使我為秦始皇乎事遂寢金放蕭玉敬嗣暉許霖等於田里誅特黙格及其妻髙氏討輔金主亮為虐者也閏月袝欽宗主於太廟吳璘復大散闗分兵守和尚原金人退守寳雞楊椿罷張安國殺耿京以降金辛棄疾還執安國歸於臨安斬之張安國殺京降金棄疾還至海州與衆謀曰我縁主帥来歸朝不期事變何以復命乃約李寳統制王世隆等徑趨金營即帳中縛之獻于臨安斬之詔授棄疾江隂判官棄疾獻議恢復持論勁直不為迎合衆壯之呉璘復徳順軍環州璘遣姚仲取鞏王彦屯商虢華恵逢取熈河或久攻不下或既得復失竟無成功仲舍鞏攻徳順踰四旬不克璘以李師顔代之遣子挺節置軍馬挺與敵戰于瓦亭大敗之禽其千户耶律糾堅等百三十七人金人懲其敗悉兵趣徳順璘自將往督師先壁于險阻治夾河戰地璘至城下守陴者聞呼相公来觀望咨嗟矢不忍發璘按行諸屯斬不用命者先以數百騎嘗敵敵一鳴皷銳士空壁躍出突璘軍璘軍得先治地無不一當百至暮璘忽傳呼某將戰不力人益奮搏敵大敗遁入壁黎明師再出敵堅壁不動㑹大風雷金人㧞營去凡八日而克璘入城市不改肆父老擁馬迎之璘又遣嚴忠取環州遂還河池洪邁如金金髙忠建至臨安議遣使報聘且賀即位工部侍郎張闡請嚴遣使之命正敵國之禮彼或不従則有戰爾如是則中國之威可以復振帝然之遂遣起居郎洪邁充賀登極使帝謂執政曰向日講和本為梓宫太后雖屈已卑辭有所不憚今兩國之盟已絶宜正名畫境朝儀嵗幣當先定之邁乃奏接伴禮儀十有四事既而忠建責事以臣禮及取新復州郡陳康伯以義折之乃止邁行書用敵國禮帝手札賜邁曰祖宗陵寢隔闊三十年不得以時洒掃祭祀心實痛之若彼能以河南地見歸必欲居尊如故正復屈已亦何所惜邁奏言山東之兵未解則兩國之好不成至燕金閤門見國書不如式抑令于表中改陪臣二字朝見之儀必欲用舊禮邁執不可金鎖使館三日水漿不通及見金人語不遜欲留邁張浩不可乃遣還吳璘使姚仲等復河原㑹熙州永安鎮戎軍夏四月以汪澈參知政事金人圍海州張子盖帥師救郤之金追廢故主亮為海陵郡王諡曰煬五月詔張浚措置兩淮事務立建王瑋為皇太子更名眘初金主南侵兩淮失守朝臣多勸帝退避建王不勝其憤及帝下詔親征瑋請率師為前驅直講史浩聞之入言于瑋曰皇子不宜將兵因為草奏請衛従以共子職帝亦欲瑋徧識諸將遂命扈蹕幸金陵及還臨安帝欲遜位陳康伯密賛大議乞先正名俾天下咸知聖意遂草立太子詔以進帝従之瑋既立更名眘金立楚王允恭為太子罷三招討司以李顯忠主管侍衛馬軍司成閔主管殿前衙司吳珙主管侍衛步軍司金主初立山東河北豪傑蠭起且聞太行忠義多欲挈地歸宋金人懼乃議和李顯忠隂結金都統蕭琦為内應請出師欲自宿亳趨汴由汴京以通闗陜闗陝既通則鄜延一路熟知顯忠威名必皆響應且欲起其舊部曲數萬以取河東㑹詔罷兵乃止罷楊存中為醴泉觀使六月追封皇太子所生父子偁為秀王母張氏為王夫人詔集議子偁封爵户部侍郎汪應辰定其稱曰太子本生之親議入内降曰皇太子所生父可封秀王諡安僖母為王夫人朱倬罷帝還自建康有内禪意倬密奏曰靖康之事正以傳位大遽盍姑徐之及太子立倬心不自安力求去帝遜位於皇太子自稱太上皇帝皇后稱太上皇后退居徳夀宫太子即位大赦乙亥帝降手札皇太子可即皇帝位朕稱太上皇帝后稱太上皇后退處徳夀宫太子固讓不許遂即位班退帝即駕之徳夀宮太子服袍履步出祥曦門冒雨掖輦以行及宫門弗止太上麾謝再三且令左右扶掖以還顧謂羣臣曰付託得人吾無憾矣髙宗恭儉仁厚以之繼體守文則有餘撥亂反正則不足當其初立因四方勤王之師内相李綱外任宗澤天下之事宜無不可為者顧乃播遷窮僻坐失事機始惑於汪黄終制於秦檜偷安忍恥匿怨忘親以貽来世之譏悲夫以龍大淵為樞宻副都承㫖曽覿帶御器械幹辦皇城司二人帝潜邸内知客也以胡銓知饒州始復用也秋七月吳挺復鞏州召張浚入朝以為江淮宣撫使封魏國公帝手書召浚入見浚至帝改容曰久聞公名今朝廷所恃惟公因賜之坐浚従容言人主之學以一心為本一心合天何事不濟所謂天者天下之公理而已必兢業自持使清明在躬則賞罰舉措無不當人心自歸敵國自服帝竦然曰當不忘公言加浚少傅魏國公為宣撫使浚見帝英武力陳和議之非勸帝堅意以圖恢復欲遣舟師自海道𢷬山東命諸將出師犄角以向中原翰林學士史浩以潜邸舊臣時預樞密議欲城采石瓜洲浚言不守兩淮而守江干是示敵以削弱怠戰守之氣不若先城泗州浩不恱遂與有隙凡浚所規畫浩必沮之竟無成功詔汪澈視師湖北京西劉珙如金告即位也追復岳飛官以禮改葬官其孫六人趙樽復光州八月以史浩參知政事九月川陜宣諭使虞允文罷史浩議欲盡棄陜西上言官軍西討東不可過寳雞北不可過徳順若兵宿于外去川口逺則敵必襲之朝廷遂棄三路允文上言恢復莫先於陜西陜西五路新復州郡又係於徳順之存亡一旦棄之則窺蜀之路愈多西和成階利害至重不可不慮於是召允文還允文入對言今日有八可戰且以笏畫地陳棄地利害帝曰此史浩誤朕也改允文知太平金完顔思敬獲伊喇斡罕斬之斡罕稱帝改元天正兵勢大張往討者多為所敗金主遣右副元帥黙音討之遇于長濼幹罕大敗率衆西走黙音復追敗于霧􅟶河金主復以布薩忠義為右副元帥代黙音經畧契丹忠義至軍斡罕時居花西道尚有衆八萬忠義及赫舎哩志寧追之至諾爾嶺陷泉大敗之斡罕以數騎僅免收合散卒萬餘入奚部其黨多降斡罕自知勢窮北走沙陀其徒執之獻于右都監完顔思敬送于中都斬之其黨悉平唯札巴不服頗為邊患金人甚苦之冬十月葉義問罷加恩平郡王璩少傅以張燾同知樞宻院事金以察世傑侵徳順軍金以重兵扼鳯翔争吴璘新復十三州三軍璘亟馳徳順以備之已而世傑率師十萬来攻璘力戰以拒之十一月金以布薩忠義為都元帥帥師次於汴京赫舍哩志寜為左副元帥帥師次於睢陽金主以宋不稱臣且陜淮多為宋所復乃詔忠義總戎事居南京節置諸軍復令志寧經畧宋事駐軍睢陽忠義將行金主諭之曰宋若歸侵疆貢禮如故則可罷兵忠義至汴簡閱士卒分屯要害十二月以陳康伯兼樞宻使以魏勝知海州勝善用大刀能左右射旗揭曰山東魏勝金人望見即退走初勝起義時無州郡糧餉之給無府庫倉廩之儲經畫市易課酒𣙜鹽勸糴豪右環海州度視敵兵攻處築城浚隍塞闗隘在軍未嘗一日懈弛恒如敵至士卒精銳有自北方来歸者勝與之同卧起共飲食示以不疑周其貧窶使其感激自是河北山東歸附者日衆矣以沈介為四川制置使通鑑續編卷十七
