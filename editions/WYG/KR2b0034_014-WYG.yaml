body:
  text: 通鑑續編卷十一元陳桱撰辛巳徽宗皇帝建中靖國元年遼天祚帝延禧乾統元年春正月皇太后向氏崩遼主洪基卒孫燕國王延禧立遼主卒於混同江之行宫年七十遺詔立其孫延禧延禧即位是為天祚皇帝二月改元詔為耶律伊遜所誣陷者復其官爵籍沒者出之流放者還之以張孝傑家屬分賜羣臣道宗即位之初求直言訪治道勸農興學救菑䘏患粲然可觀既而行謗訕之令重告訐之賞羣邪並興䜛巧競進賊及骨肉諸部多叛甲兵之用無寕日焉一歳而飯僧三十六萬一日而祝髪三千尚足與論治道哉二月貶章惇為雷州司户參軍右正言任伯雨論惇久竊朝柄迷國罔上毒流縉紳乘先帝變故倉卒輒逞異志睥睨萬乘不復有臣子之恭向使其計得行將置陛下與皇太后於何地若貸而不誅則天下大義不明大法不立矣臣聞北使言去年遼主方食聞中國黜惇放箸而起稱善者再謂南朝錯用此人北使又問何為只若是行遣以此觀之不獨孟子所謂國人皆曰可殺雖蠻貊之邦莫不以為可殺也章八上末報㑹臺諫陳瓘陳次升等復極論之乃詔貶惇為雷州司户參軍初蘇轍謫雷州不許占官舍遂僦民屋惇又以强奪民居下州追民究治以僦劵甚明乃止至是惇問舍於民民曰前蘇公來為章丞相幾破我家今不可也後徙睦州卒初惇之入相也妻張氏病且死囑之曰君作相幸勿報怨既祥惇語陳瓘曰悼亡不堪奈何瓘曰與其悲傷無益曷若念其臨絶之語耶惇黙然而止三月罷權給事中任伯雨伯雨初為右正言半歳之間凡上百八䟽大臣畏其多言俾權給事中密諭以少黙即為真伯雨不聴抗論愈力時曽布欲和調元祐紹聖之人伯雨言人才固不當分黨與然自古未有君子小人雜然並進可以致治者盖君子易退小人難退二者並用終於君子盡去小人獨留唐徳宗坐此致播遷之禍建中乃其紀號不可以不戒既而欲劾布布覺之徙為度支員外郎以趙懐徳知湟州夏四月辛夘朔日有食之五月𦵏欽聖憲肅皇后作觀成殿于景靈宫奉安哲宗神御六月范純禮罷時韓忠彦雖為首相而柔懦不決曽布遂専政漸進紹述之説諷中丞趙挺之排撃元祐諸臣純禮從容言于帝曰邇者朝廷命令莫不是元豐而非元祐以臣觀之神宗立法之意固善吏推行之或有失當以致病民宣仁聴斷一時小有潤色盖大臣識見異同非必盡懐邪為私也今譏論之臣有不得志故挾此以藉口以元豐為是則欲賢元豐之人以元祐為非則欲斥元祐之士其心豈恤國事直欲快私忿以售其姦不可不深察也㑹左司諫江公望上䟽言自哲宗有紹述之意輔政非其人以媚已為同忠於君為異一語不合時學必目為流俗一談不侔時事必指為横議借威柄以快私隙必以亂君臣父子之名感動人主使天下騷然泰陵不得盡繼述之美元祐人才皆出於熙豐培養之餘遭紹聖竄逐之後存者無幾矣神考與元祐之臣其先非有射鈎斬袪之隙也先帝信仇人而黜之陛下若立元祐為名必有元豐紹聖為之對有對則争興争興則黨復立矣陛下改元詔㫖亦稱思建皇極盖嘗端好惡以示人本中和而立政皇天后土實聞斯言今若渝之奈皇天后土何帝以示純禮純禮賛之曰願陛下以曉中外使知聖意所向亦足以革小人徇利之情乞褒遷公望以勸來者純禮沈毅剛正曽布憚之謂駙馬都尉王詵曰上欲除君承㫖范右丞不可詵怒㑹詵館遼使純禮主宴詵誣其輒斥御名遂罷知潁昌府秋七月安燾罷罷左司諫江公望時蔡王府相告有不遜語及於王公望乞勿以無根之言加諸至親故罷以蔣之竒知樞密院事章楶同知院事陸佃為尚書右丞冬十月李清臣免清臣與韓忠彦有姻好忠彦惟其言是聴范純禮之罷亦其謀也至是以忤曽布免罷權給事中陳瓘瓘論議持平務存大體不以細故藉口未嘗及人晻昧之過及權給事中曽布使客告以將即真瓘語于正彚曰吾與丞相議事多不合今若此是欲官爵相餌也若受其薦進有異同則公議私恩兩有愧矣吾有一書将投之以決去就汝其書之但郊祀不逺彼不相容則澤不及汝矣能不介於心乎正彚願得書旦持入省布使數人邀相見甫就席遽出書布大怒争辯移時至箕踞誶語瓘色不變徐起言曰適所論者國事是非有公議公未可遽失待士禮布矍然改容信宿出瓘知泰州遼主追尊其考妣為帝后遼主尊其考昭懐太子濬為大孝順聖皇帝廟號順宗妣蕭氏曰貞順皇后尋誅伊遜黨徙其子孫於邉發伊遜塔喇台之墓剖棺戮屍以其家屬分賜被殺之家十一月以陸佃温益為尚書左右丞益初知潭州凡遂臣在其境内如鄒浩范純仁劉奉世韓川吕希純吕陶輩率為所侵困用事者悦之復召蔡京為翰林學士承㫖供奉官童貫性巧媚善策人主微指先事順承以故得幸及詣三吳訪書畫竒巧留杭月餘蔡京與之㳺不舍晝夜凡所畫屏幛扇帶之屬貫日以達禁中且附語言論奏於帝所由是帝屬意用京左階道録徐知常以符水出入元符皇后所太學博士范致虚與之厚因薦京才可相知常入宫言之由是宫妾宦官衆口一詞譽京遂起京知定州改大名㑹韓忠彦與曽布交惡布謀引京自助乃召為翰林學士承㫖以西蕃賖羅撒為邈川首領賖羅撒隴拶之弟也詔改眀年元為崇寧曽布主於紹述請改元崇寧帝従其言鄧洵武獻愛莫助圖詔以為中書舍人給事中兼侍講洵武為起居郎嘗因對言陛下乃神宗子今相宗彦乃琦之子神宗行新法以利民琦嘗論其非今忠彦更神宗之法是忠彦為能繼父志陛下為不能也必欲繼志述事非用蔡京不可又曰陛下方紹述先志羣臣無助者乃作愛莫助之圖以獻其圖如史記年表列旁行七重别為左右左曰元豐右曰元祐自宰相執政侍従臺諫郎官館閣學校各為一重左序助紹述者執政中唯温益一人餘不過三四若趙挺之范致虚王能甫錢遹之屬而已右序舉朝輔相公卿百執事咸在以百數帝出示曽布而揭去左方一姓名布請之帝曰蔡京也洵武謂非相此人不可以與卿不同故去之布曰洵武既與臣見異臣安敢豫議眀日改付温益益欣然奉行請相蔡京而藉異論者於是善人皆不見容而帝決意相京矣乃進洵武中書舍人給事中兼侍講壬午崇寧元年遼乾統二年夏貞觀元年春二月以蔡確配享哲宗廟庭追封孔鯉為泗水侯孔伋為沂水侯三月詔宦者童貫製御器于杭州夏五月韓忠彦罷忠彦為相召還流人進用忠讜之士於是張庭堅陳瓘鄒浩龔夬江公望常安民任伯雨陳次升陳君錫張舜民等皆居臺諫翕然稱為得人然與曽布不協至是左司諫吳材右正言王能甫附布論忠彦變神考之法度逐神考之人材遂罷出知大名府復追貶元祐黨籍司馬光四十四人官諫官吳材王能甫等復舉元祐黨籍以排斥諸賢諫議大夫彭汝霖言諸人罪狀已經紹聖黜削案籍俱在但可據而行不必俟指名彈撃於是司馬光文彦博等四十四人貶奪有差詔籍元祐元符及今黨人不得與在京差遣詔元祐并元符末今来責降人除韓忠彦曽任宰相安燾曽任執政王覿豐稷見任侍従官外蘇轍范純禮劉安世范純粹劉安世賈易吕希純張舜民陳次升韓川吕仲甫張耒歐陽棐吕希哲劉唐老吳安詩黄庭堅黄隠畢仲游常安民劉當時孔平仲徐常王鞏張保源晁補之商倚張庭堅謝良佐韓䟦馬琮陳彦黙李祉陳祐任伯雨陳郛朱光裔蘇嘉鄭俠劉昱魯君貺陳瓘龔夬汪衍余爽湯馘程頥朱光庭張彦臣張巽張士良曽燾趙約譚扆楊偁陳侚張琳等並令三省籍記不與在京差遣内侍請以金飾宫宇詔黜之帝新即位思節冗費後苑嘗欲増葺殿宇計用金箔五十六萬七千帝曰用金為箔以飾土木一壊不可復收甚無謂也令罰内侍請者陸佃罷佃與曽布比而持論近恕每欲參用元祐人才尤惡奔兢嘗曰天下多事須不次用人茍安寧時人之才無大相逺當以資歴序進少緩之則士知自重矣又曰今天下之勢如人大病向愈當以藥餌輔養之須其安平茍為輕事改作是使之騎射也㑹御史請更懲元祐黨佃言于帝曰不宜窮冶乃下詔云元祐諸臣各已削秩自今無所復問言者亦勿輒言揭之朝堂言者用是論佃名在黨籍不欲窮治正恐自及耳遂罷知亳州卒以許將温益為門下中書侍郎蔡京趙挺之為尚書左右丞京素與屯田員外郎孫鼛善鼛嘗曰蔡子貴人也然才不勝徳及是京謂之曰我若用於天子願助我鼛曰公誠能謹守祖宗之法以正論輔人主示節儉以先百吏而絶口不言兵天下幸甚京黙然挺之初通判徳州希時相意行市易法徳安監鎮黄廷堅言鎮小民貧不堪誅求及召試館職學土蘇軾言其聚斂小人學行無取豈堪此選挺之由是深銜二人既拜中丞遂與曽布比黨建議紹述排撃元祐諸賢由是進居政府六月詔脩神宗所定官制追封商逸民伯夷為清惠侯叔齊為仁惠侯閏月曽布免布與蔡京素有隙議事多不合㑹布擬壻父陳佑甫為户部侍郎京言布私其所親布忿怒争辯久之聲色俱厲温益叱之曰曽布上前安得失禮帝不悦殿中侍御史錢遹言布呼吸立成禍福喜怒遽變炎凉鈎致齊人之窽言欲破紹聖之信史於是布請罷出知潤州安置知越州鄒浩于永州秋七月詔内外官並以三年成任以蔡京為尚書右僕射制下之日賜坐延和殿命之曰神宗創法立制先帝繼之兩遭變更國是未定欲上述父兄之志卿何以教之京頓首謝曰敢不盡死焚元祐法詔置講議司於都省命蔡京提舉京起於逐臣一旦得志天下拭目所為而京隂託紹述之柄箝制天子用熙寧條例司故事即都省置講議司自為提舉講議熈豐已行法度及神宗欲為而未暇者以其黨吳居厚王漢之等十餘人為僚屬取政事之大者如宗室冗官國用商旅鹽澤賦調尹牧每一事以三人主之凡所設施皆由是出而法制屢變無常矣章楶罷復罷春秋博士八月初置安濟坊于郡縣養民之貧病者詔天下興學貢士蔡京請天下州縣並置學州置教授二員縣置小學縣學生選考升諸州學州學生每三年貢太學至則附試别立號考分三等入上等補上舍入中等補下等上舍入下等補内舍餘居外舍諸州軍解額各以三分之一充貢士州給常平或係省田宅充養士費縣用地利所出及非係省錢凡州縣學生曽經公私試者復其身内舍免户役上舍仍免借借如官户法凡州學上舍生升舍以其秩即貢入辟雍長吏集闔郡官及提學官具宴設以禮敦遣限嵗終悉集闕下自川廣福建入貢者給借職劵過二千里給大將劵續其路食皆以學錢給之如有孝弟睦姻任恤中和若行能尤異為鄉里所推縣上之州免試入學州守貳若教授詢審無謬即保入貢不實者坐罪作辟雍蔡京請建外學以待州縣學之貢士乃詔將作少監李誡即京城南門外相地營建外學外圓内方為屋千八百七十二楹四講堂百齊齊列五楹可容三十人是為辟雍京又奏古者國内外皆有學周成均盖在國中而黨庠遂序則在國外臣親承聖詔天下皆興學貢士即國南郊建外學以受之俟其行藝中率然後升諸太學凡此聖意悉與古合今上其所當行者太學専處上舍生内舍生而外學則處外舎生士初貢至皆入外學經試補入上舍内舍始得進處太學太學外舍亦令出居外學其敇令格式悉用太學規制國子祭酒總治學事外學官屬司業丞各一人稍減太學博士正録員歸外學於是上舍至二百人内舍六百人外舍三千人又置諸王宫大小學教授立考選法詔司馬光等二十一人子弟毋得官京師以趙挺之張商英為尚書左右丞商英為中書舍人謝表歴詆元祐諸賢及任翰林學士草蔡京拜相制極其褒美故京引之九月初置居養院於京師以處鰥寡孤獨者仍以户絶財産給養詔中書籍元符三年日食上書人為正邪黜陟有差初元符末日食求言言者多及熈寧紹聖之政至是蔡京與其黨葉夢得强浚明强淵明等議請下詔籍其章䟽付中書定為正上正中正下三等邪等尤甚邪上邪中邪下凡四等於是鍾世美以下四十一人為正等悉加旌擢范柔中以下五百四十一人為邪等降責有差治議復元祐皇后者貶元符宰執韓忠彦曽布李清臣黄履官安置侍從臺諫曽肇豐稷等十七人于逺州以馮澥為鴻臚寺主簿内侍郝隨諷蔡京再廢孟后㑹昌州判官馮澥上書言先帝既終則后無單立之義稽之逆順陛下無立嫂之禮要之終始皇太后亦不得伸慈婦之恩雖已遂之事難復之失然感悟追正有何不可於是侍御史錢遹殿中侍御史石豫左膚等乞治元符末大臣嘗請復元祐皇后而廢元符皇后事乃詔降宰臣韓忠彦曽布官追貶李清臣為雷州司户參軍黄履為祁州團練副使而竄翰林學士曽肇中丞豐稷諫官陳瓘龔夬等一十七人于逺州擢澥為鴻臚寺主簿蔡京籍元祐及元符末宰執司馬光等侍從蘇軾等文臣程頥等武臣王獻可等宦者張士良等百二十人為姦黨請帝書之遂刻石于端禮門時元祐元符末羣賢貶竄死徙者畧盡蔡京猶未惬意乃與其客强浚明葉夢得籍宰執文彦博司馬光吕公著吕大防劉摯范純仁韓忠彦王珪梁燾王巖叟王存鄭雍傅堯俞趙瞻韓維孫固范百禄胡宗愈李清臣蘇轍劉奉世范純禮安燾陸佃曽任待制以上官蘇軾范祖禹孔文仲孔武仲朱光庭孫覺鮮于侁賈易鄒浩等餘官程頥秦觀張耒晁補之黄庭堅孔平仲等内臣張士良等武臣王獻可等凡百二十人等其罪狀謂之姦黨請御書刻石于端禮門冬十月蔣之竒罷詔責降人不得同州居住復廢元祐皇后為仙師出居瑤華宫御史中丞錢遹殿中侍御史石豫左膚言元祐皇后得罪先朝昭告宗廟天下莫不知哲宗上賔太后聴政當國大臣盡欲變亂紹聖之事以逞私欲因一布衣何大正狂言復還廢后位號當時物議固已洶洶乃至踈逖小臣詣闕上書忠義激切則天下公議従可知矣今朝廷既已貶削忠彦等及追褫大正誤恩則元祐皇后義非所安孔子曰必也正名乎名不正則言不順夫在先朝則曰后今日則謂之元祐皇后於名為不正先朝廢而陛下復於事為不順考之典禮則古昔所無稽之本朝則故實未有詢之師言則大以為不然况既為先朝所廢則宗廟祭告歳事薦享人事有嫌疑之迹神靈萌厭斁之心萬世之後配祔將安所施宜蚤正厥事斷以大義無牽於流俗非正之論以累聖朝於是蔡京許將温益趙挺之張商英言元祐皇后再復位號考之典禮將来宗廟不可従享陵寢不可配祔揆諸禮制皆所未安請如紹聖三年九月詔書帝従之乃加賜后希微元通知和妙靜仙師復出居瑤華宫罷元符臣僚劉奉世等二十七人祠禄坐元符末黨與變法也以蔡卞知樞密院事遼蕭哈里叛入于阿克占部生女真部節度使英格誅之蕭哈里叛刼乾州武庫器甲遼主命北面林牙郝嘉努捕之哈里亡入於係案女真布扎爾水阿克占部遣其族人額特哷至生女真結和約同舉兵英格執之㑹遼主命英格捕討哈里英格募兵得千餘人兄子阿固達曰有此甲兵何事不可圖也遂㳄混同水盖先是女真甲兵未嘗滿千也及與哈里遇時遼兵追哈里者數千而不能克英格謂遼將曰退爾軍我當獨取哈里遼將許之英格使阿固達與哈里戰阿固達策馬而進哈里中流矢墮馬執而殺之因大破其黨函哈里首遣使獻於遼遼主大喜錫予加等英格自是知遼兵之易與益自肆矣十二月議復湟州貶元符宰執韓忠彦曽布安燾范純禮蔣之竒等官蔡京蔡卞請復湟鄯且薦髙永年王厚為帥於是冶棄湟州罪貶忠彦及燾為節度副使布為賀州别駕純禮分司南京奪蔣之竒職凡預議者皆貶黜有差追諡哲宗子鄧王茂為獻愍太子初鄒浩召自新州入對帝首問及諫立后事奨歎再三詢及諫草安在對曰已焚之矣退告陳瓘瓘曰禍其在此乎異時姦人妄出一緘則不辨矣蔡京用事乃使其黨偽為浩䟽言劉后殺卓氏而奪其子以為已出欺人可也詎可以欺天乎之語帝詔暴其事遂追冊茂為太子而貶竄浩等詔元祐學術政事並勿施用沅州徭入冦癸未二年遼乾統五年春正月安置知越州鄒浩于昭州安置元符末臺諫官任伯雨等十二人于逺州蔡京蔡卞怨元符末臺諫之論已悉陷以黨事同日貶竄陳瓘㢘州任伯雨昌化軍龔夬化州陳次升循州陳師錫郴州陳祐澧州江公望南安軍常安民温州張舜民商州馬涓吉州豐稷台州初蔡京帥蜀張庭堅在其幕府及入相欲引以自助庭堅不從京恨之至是亦編管于象州知荆南府舒亶平沅州徭取誠徽州亶平辰沅州徭賊復誠徽州改誠為靖州徽為蒔竹縣以復荆湖疆土曲赦兩路温益卒益仕宦従微至顯無片善可紀至其狡譎傅㑹盖天性也以蔡京為尚書左僕射二月尊元符皇后劉氏為皇太后宫名崇恩更𣙜茶法置諸路茶場茶自嘉祐通商至熈寧中李稷稍復𣙜法而利復歸於官至是蔡京請仍舊禁𣙜官買即産茶州郡隨所置場申商人園户私易之禁令商人於在京𣙜貨務及所在州郡自買於場户茶貯於籠篰官為抽盤循第敘收息訖批引販賣歳入百萬緡以進御命京城所主之自是盜販公行民滋病矣三月詔黨人子弟毋得擅到闕下其應縁趨附黨人罷任在外指射差遣及得罪停替臣僚亦如之策進士于集英殿賜及第出身五百三十八人其嘗上書在正等者升甲邪等者黜之蔡京請之也夏四月詔毁范祖禹唐鑑蘇洵蘇軾蘇轍黄庭堅秦觀文集以趙挺之為中書侍郎張商英吳居厚為尚書左右丞安惇同知樞宻院事除直祕閣致仕程頥名頥自涪徙峽復直祕閣言者希蔡京意論其學術頗僻素行譎誕専以詭異聾瞽愚俗乃毁頥出身文字其所著書令監司嚴加覺察范致虚乞下河南盡逐學徒詔内侍童貫監洮西軍六月貫及王厚復湟州羌人多羅巴奉溪賖羅撒謀復國趙懐徳畏偪奔河南種落更挟之以令諸部朝廷患衆羌扇結命王厚安撫洮西合兵十萬討之蔡京因言内客省使童貫嘗使陜右審五路事宜與諸将之能否為最悉請以貫用李憲故事監其軍帝従之貫至湟州適禁中火帝下手札驛止貫毋西兵貫發視遽納鞾中厚問故貫曰上趣成功耳遂行多羅巴知王師且至集衆以拒厚厚聲言駐兵而隂戒行羌備益㢮乃與知岷州髙永年異道而進多羅巴三子以數萬人分據險要厚撃殺其二子唯少子阿蒙中流矢去道遇多羅巴與俱遁厚遂㧞湟州捷聞進蔡京官三等蔡卞以下二等降徳音于熈河蘭㑹路减囚罪一等秋七月詔元符末上書進士見充三舍生者罷歸詔自今戚里宗屬勿得為執政官詔責降人子弟毋得任在京差遣八月論棄湟州罪貶韓忠彦安燾范純禮蔣之竒等官大蝗詔有司酺祭張商英罷商英與蔡京不合數詆京身為輔相志在逢君御史以為非所宜言且取商英所作元祐嘉禾頌及祭司馬光文斥其反覆罷知亳州詔入元祐黨籍九月詔元符上書邪等人並與外祠選人不得改官置醫學詔建崇寧寺于諸郡始正吏部選人階官國初以來選人階官七等其一曰三京府判官留守判官節度觀察判官其二曰節度掌書記觀察支使防禦團練判官其三曰軍事判官京府留守節度觀察推官其四曰防禦團練軍事推官軍監判官其五曰縣令録事參軍其六曰試銜縣令知縣事其七曰三京軍巡判官司理户曹司户法曹司法參軍主簿縣尉七階選人須三任六考用奏薦及功賞乃得升改凡改官其第一階進士則授太常丞餘人太子中允第二階進士則授太子中允或祕書郎餘人著作佐郎第三階進士授著作佐郎餘人大理寺丞第四至第七階進士授大理寺丞餘人衛尉寺丞惟判司主簿縣尉七考乃授改官其不及考者遞降一等凡非登科及特㫖者年二十五方注官凡三班院二十以上聴差使初任皆監當次任為監押巡檢知縣凡流外人三任七考有舉者六員移縣令通判有班行舉者三員與磨勘凡進納人六考有職官或縣令舉者四員移注四任十考有改官者五人舉之與磨勘大率反以職為階官而以差遣為職名實混淆元豐雖定官制而此亦未正刑部尚書鄧洵武極言之遂定選人七階曰承直郎曰儒林郎曰文林郎曰従事郎曰通仕郎曰登仕郎曰將仕郎以易前弊後改通仕為従政登仕為脩職將仕為迪功而専用通仕登仕將仕三階奏補未出官人承直至脩職須六考迪功七考有官保任而職司居其一乃得磨勘坐愆犯則隨輕重加考及舉官有差頒蔡京所書元祐姦黨碑刻石于州縣蔡京又自書姦黨為大碑頒於郡縣令監司長吏㕔皆刻石有長安石工安民當鐫字辭曰民愚人固不知立碑之意但如司馬相公者海内稱其正直今謂之姦邪民不忍刻也府官怒欲加之罪民泣曰被役不敢辭乞免鐫安民二字于石末恐得罪後世聞者愧之髙麗使人如生女真部女真雖舊屬髙麗不相通者久矣㑹髙麗醫者来英格遣人送之還境上醫者至言於高麗王曰女真居黑水者部族日强兵益精悍王乃通使于女真自是来徃不阻英格既破蕭哈里使人報捷于髙麗髙麗復使人賀之英格遣其族弟色克報聘髙麗待之甚厚冬十月遼生女真部節度使英格卒兄子烏雅舒嗣英格死和哩布之長子烏雅舒襲自烏古鼐以来兩世四人志業相因卒定離析一切治以本部法令英格又用阿固達之請令諸屬部不得擅置信牌馳驛訊事由是號令始一遂闢土東南至於伊勒呼海蘭扎矣蘭托卜古倫東北至於五國矩威圖塔十一月詔禁以元祐學術政事授業者遼主謁太廟遼羣臣上尊號于遼主遼主受之因謁太廟更𤣥祖伊徳實為肅祖昭烈皇帝徳祖色勒迪為懿祖莊敬皇帝遼以宋魏國王和囉噶為太叔徙鄭王淳為越王和囉噶興宗之子也淳小字聶哷和囉噶之子篤好文學昭懐太子之得罪道宗嘗欲立淳為太子羣臣不可而止遼主即位寵待加厚自北平郡王進封鄭王至是徙封越留守東京遼主召監脩國史耶律儼纂諸帝實録遼主召知樞密院事漆水郡王耶律儼纂太祖以下諸帝實録儼撰成七十卷儼本姓李父仲禧為南院樞密使賜以國姓儼以進士莅政㢘能國人莫不譽之更鹽鈔法初陜西芻糧不足募商人入中雖有數倍之息而苦於回貨於是官為積鹽於解池積錢於在京𣙜貨務積鹽鈔于陜西沿邉州郡商人以物解至邉入中即請鹽鈔以歸徑請鹽於解池故商人無滯而邉備不乏蔡京欲囊括四方之錢實中都以誇富强而固恩寵乃更其法俾商人先輸錢於𣙜貨務請鈔赴産鹽州郡授鹽而舊鈔悉不用商人凡三輸錢始獲一直之貨因無貲更鈔已輸錢悉乾沒於是有齎數十萬劵一旦廢棄者朝為豪商夕儕流丐有赴水投繯而死者商賈不通邉儲失備矣提㸃淮東刑獄章縡見而衰之奏改法誤民京怒奪縡官纂府銅融州邵州蠻内附甲申三年遼乾統四年春正月詔元符上書邪等人毋得至京師鑄當十大錢自太祖以来諸路置監鑄錢有折二折三當五隨時立制而未嘗鑄當十也至是蔡京請鑄於諸路與小平錢通行於時以蔡攸為秘書郎攸京長子也元符中監在京裁造院帝時為端王毎退朝攸適趨局遇諸塗攸下馬拱立王問知為攸心善之及即位遂有寵至是自鴻臚卿賜進士出身拜秘書郎鑄九鼎元豐中知禮院楊傑言樂音多疵詔范鎮劉几與傑參定几傑所奏下舊樂三律鎮以為聲雜鄭衞且律有差宫商易位専主房庶以律生尺之説以為定樂當先正律乃作律尺龠合升斗豆區鬴斛圖上之又乞訪求真黍以定黄鐘而劉几即用李照樂加四清聲而奏樂成詔罷局元祐中鎮請太府銅造律度量鐘磬等式上之其樂復下李照樂一律有竒然鐘律之議司馬光與范鎮論辯者三十餘年終不能相一周敦頥程頥張載皆有樂論亦未究其要及帝即位鋭意制作以文太平蔡京復毎為帝言方今泉幣所積贏五千萬和足以廣樂富足以備禮帝惑其説而制作營築之事興矣至是京擢其客劉昺為大司樂付以樂政昺引蜀方士魏漢津見帝獻樂議破先儒累黍之非用夏禹以身為度之文取帝指三節為三寸三三為九而黄鍾之律成請先鑄九鼎以備百物之象帝従之漢津本剰員兵士自云師事唐仙人李良授鼎樂之法皇祐中與房庶俱被召至京而黍律已成不得伸所學而退或謂漢津嘗執役於范鎮見其制作因掠取之蔡京神其説託以李良授云然漢津曉隂陽數術多竒中嘗語所知曰不三十年天下亂矣人未之信也二月令天下坑冶金銀悉輸内蔵三月置文繡院髙麗侵生女真部髙麗既與生女真部通好㑹烏雅舒遣碩碩歡以錫馨圖們之兵徃伊勒呼嶺徇海蘭甸之地下其七城髙麗使人謂碩碩歡欲有議事乞遣使焉碩碩歡使博魯徃而海蘭甸亦使二詳衮如髙麗髙麗執二詳衮而遣博魯還於是五水之民皆阻於髙麗髙麗攻女真碩碩歡大破之殺獲甚衆追入其境焚掠戍守而還髙麗復攻之碩碩歡以五百人禦於布騰水又大破之追入布騰水逐其殘衆踰境於是髙麗王懼遣還所俘而請和烏雅舒命碩碩歡立幙府於潺水察其嘗隂與髙麗徃来為亂階者即正其罪餘無所問由是使好復通夏四月王厚復鄯州厚帥大軍次于湟命髙永年將左軍循宗水而北别將張誡将右軍出宗谷而南自將中軍趨綏逺期會宗哥川羌置陣臨宗水倚北山谿賖羅撒張黄屋建大斾乗髙指呼望中軍旗鼓争赴之厚麾遊騎登山攻其背親帥强弩迎射羌退走右軍濟水撃之大風従東南来揚沙翳羌目不得視遂大敗斬首四千三百餘級俘三千餘人羅撒以一騎馳去其母龜茲公主與諸酋開鄯州城門以降厚計羅撒必且走青唐將夜追之童貫以為不能及遂止師下青唐知羅撒留一宿去貫始悔之詔改鄯州為西寧州隴右節度罷講議司五月更知開封府為牧尹改六曹名改定六曹以士户儀兵刑工為序増其員數倣唐六典易胥吏之稱王厚復廓州加蔡京守司空封嘉國公厚將大軍趨廓州羌酋落施軍令結以衆降遂入廓州詔以復鄯廓加京官封而超拜厚武勝軍節度觀察留後鄯廓湟州雖復而府蔵困匱秦中騷然矣置京西北路交子所蔡京請置京西北路専切管幹通行交子所倣川峽路立偽造法通情轉用并鄰人不告者皆罪之私造交子紙者罪以徒配已而令諸路更用錢引準新様印製四川如舊法惟閩浙湖廣不行錢引趙挺之以為閩乃京鄉里故得免焉六月圖熈寧元豐功臣於顯謨閣賜辟雍殿名曰大成以荆國公王安石配享孔子位次孟軻増諸州學未立者置書畫筭學書學習篆隸草三體明説文字説爾雅博雅方言篆以古文大小二篆為法隸以二王歐虞顔栁真行為法草以章草張芝九體為法畫學之業曰佛道曰人物曰山水曰鳥獸曰花竹曰屋木以説文爾雅方言釋名教授説文則令書篆字著音訓餘書皆設問答以所解義觀其能通畫意與否仍分士流雜流别其齊以居之考畫之等以不倣前人而物之情態形色俱若自然筆韻簡髙為工筭學之業以九章周髀及假設疑數為筭問仍兼海島孫子五曹張丘建夏侯筭法并厯筭三式天文書為本科其生皆占經以試其取士法畧如太學上舍三等推恩以通仕登仕將仕郎為次重定元祐元符黨人刻石于朝堂詔重定元祐元符黨人及上書邪等者合為一籍通三百九人刻石于朝堂餘並出籍自今母得復用彈奏詔内外官毋得越職論事秋七月行方田法八月許將免將居政府十年不能有所建明中丞朱諤劾將在元祐則盡更元豐之所守居紹聖則隂匿元祐之所為罷知河南諤蔡京之黨也九月以趙挺之吳居厚為門下中書侍郎張康國鄧洵武為尚書左右丞紹聖中蔡京治役法薦康國為屬及京當國定黨籍議紹述康國皆預密謀故京引援之甚力自福建轉運判官不三歲入翰林為承㫖遂拜左丞復以其兄康伯代為學士以胡師文為户部侍郎初東南六路糧斛自江浙起綱至于淮甸以及真揚楚泗為倉七以聚蓄軍儲復自楚泗置汴綱般運上京以江淮發運使董之故常有六百萬石以供京師而諸倉常有數年之積州郡告歉則折納上等價錢謂之額斛計本州歳額以倉儲代輸京師謂之代發復於豐熟以中價收糴至飢歉則令民納錢民以為便本錢歳増兵食有餘其法良善及蔡京當國始求羡財於是以其姻家胡師文為發運使以糴本數百萬緡充貢入為户部侍郎自是繼者效尤時有進獻本錢竭矣本竭則不能増糴儲積空而輸般之法壊矣詔諸州學别置齋以養材武之士冬十月夏人寇涇原遂㑹西蕃圍宣威城執知鄯州髙永年殺之貶王厚為郢州團練使蔡京使王厚招夏卓羅右廂監軍仁多保忠厚言保忠雖有歸意而下無附者章數上京責厚愈急厚乃遣弟詣保忠還為夏邏者所獲遂追保忠赴牙帳厚以保忠縦不為夏所殺亦不能復領軍政使得之一匹夫耳何益於事京怒必令以金幣招之夏乃㸃兵延渭慶三路各數千騎遣使求援于遼朝廷命西邉能招致夏人者毋問首従賞同斬級令陶節夫在延安大加招誘夏主遣使巽請皆拒之又令殺其放牧者夏人遂入鎮戎畧數萬口於是羌酋溪賖羅撒合兵逼宣威城知鄯州髙永年出禦之行三十里為羌人所執多羅巴謂其下曰此人奪我國使吾宗族漂無處所遂殺之探其心肝以食焉羅撒復焚大通河橋新疆大震事聞帝怒親書五路將帥劉仲武等十八人姓名勅御史侯䝉徃秦州逮治蒙至秦仲武等囚服聴命蒙喻之曰君輩皆侯伯無庸以獄吏辱第以實對獄既具蒙奏言漢武帝殺王恢不如秦穆公赦孟明子玉縊而晉侯喜孔明亡而蜀國輕今羌殺吾一都䕶而使十八將由之而死是自艾其肢體也欲身不病得乎帝悟釋不治惟王厚坐逗留降授郢州團練使立九廟復祀翼祖宣祖也十一月帝臨太學官論定之士十六人焉帝臨辟雍賜司業吳絪蔣靜四品服學官推恩有差詔専取士于學校罷科舉法時雖設辟雍太學以待士之升貢者然州縣猶以科舉貢士蔡京以為言遂詔天下取士悉由學校升貢其州郡發解凡試禮部法並罷而毎歳試上舍生則差知舉如禮部法云十二月升通逺軍為鞏州復封孔子後奉聖公端友為衍聖公是歳大蝗王祖道言黎洞王古蠻楊晟免等内附時蔡京間邉知桂州王祖道欲乘時徼利乃誘王江酋楊晟免等使納土夸大其辭言向慕者百二十峒五千九百家十餘萬口其旁通江峒之衆尚未論也王江在諸江合流之地山川形勢據諸峒要㑹幅員二千里宜開建城邑控制百蠻以武臣為守置溪峒司主之安惇卒乙酉四年遼乾統五年春正月築溪哥城立武學試藝法邦潘疊三州蕃落來歸蔡卞罷卞居心傾邪一意以婦翁王安石所行為至當以兄京晩達而位在上致已不得相故二府政事時有不合至是京將用童貫為制置使卞言不宜用宦者必誤邉計京於帝前詆卞卞求去遂出知河南府以内侍童貫為熈河蘭湟秦鳳路經畧安撫制置使二月築御謀城以張康國知樞宻院事劉逵同知院事何執中為尚書左丞閏月令州縣倣尚書六曹分六案鑄夾錫鐡錢自太祖以来閩蜀陕西多用鐡錢每十文當銅錢一文至是河東轉運判官洪中孚言遼夏以鐡錢為兵器若雜以鉛錫則脆而不可用請改鑄之乃詔置陕西河東河北京西監鑄當二夹錫鐡錢云趙懐徳來降以為感徳軍節度使封安化郡王三月以趙挺之為尚書右僕射詔建王古砦為懐逺軍従王祖道之請也置二砦為立學復銀州䍧牱夜郎首領以其地内附夏人寇塞門遼歸女于夏夏主連歳請婚于遼遼以其族女南仙為成安公主嫁之置議禮局于尚書省初太祖命聶崇義重集三禮圖劉温叟等撰開元通禮二百卷本唐開元禮而損益之至景祐中賈昌朝撰太常新禮及祀儀皇祐中文彦博撰太享明堂記嘉祐中歐陽脩撰太常因革禮元豐中宋敏求詳定朝㑹儀注祈禳蕃國喪𦵏禮總百六十三卷帝以為未備置議禮局于尚書省命詳議官具禮本末議定請㫖以給事中劉昺領其事罷左司諫黄葆光葆光為左司諫始莅職即言三省吏猥多乞非元豐舊制者一切革去帝命釐正之一時士論翕然蔡京怒其異已宻白帝降内批云當豐亨豫大之時為衰亂減損之計徙為符寳郎夏四月遼使蕭良來為夏人求還侵地及退兵也夏人寇臨宗順寧砦及湟州劉延慶辛叔獻等敗之五月除黨人父兄子弟之禁林攄如遼報聘也賜信州龍虎山道士張繼元號虚靖先生漢天師張道陵三十代孫也且詔龍虎山張氏自今相襲為山主傳授法籙者即度為道士六月趙挺之罷初帝以蔡京獨相謀置右輔京力薦挺之及既相與京争權屢陳京姦惡且請去位以避之遂罷大蝗蔽日秋七月置四輔郡右司諫姚祐請置輔郡以拱大畿詔以潁昌府為南輔升襄邑縣為拱州為東輔鄭州為西輔澶州為比輔各屯兵二萬重其資給盖蔡京欲兵權歸已故也還上書流人八月置提舉溪峒司従王祖道請也改懐逺軍為平州定鼎于九成宫帝鼐及八鼎成詔奉安於九成宫以蔡京為定鼎禮儀使帝幸宫行酌獻禮賜魏漢津號冲顯處士鼎各一殿周以垣墻上施埤堄墁如方色外築垣環之曰九成宫中央曰帝鼐其色黄祭以土王日為大祠北方曰寳鼎其色黑祭以冬至東北方曰牡鼎其色青祭以立春東方曰蒼鼎其色碧祭以春分東南曰岡鼎其色緑祭以立夏南方曰彤鼎其色紫祭以夏至西南曰阜鼎其色黑祭以立秋西方曰皛鼎其色赤祭以秋分西北曰魁鼎其色白祭以立冬八鼎皆為中祠樂用登歌享用素饌復於帝鼎之宫立大角鼎星祠尋復鑄帝坐大鐘及二十四氣鐘云大晟樂成帝受賀于大慶殿新樂成加號魏漢津虚和冲顯寳應先生賜樂名大晟置府建官謂之雅樂頒之天下播之教坊九月以九鼎成受賀于大慶殿賜方士魏漢津號嘉成侯作寳成宫帝以九鼎成受賀于大慶殿詔於鑄鼎之地作寳成宫置殿以祠黄帝夏禹周成王周公旦召公奭置堂以祀唐李良及魏漢津賜漢津號嘉成侯漢津尋死于京師年九十矣詔徙元祐黨人于近地惟不得至畿甸冬十一月安定郡王世雄卒林攄還自遼有罪貶知潁州攄之使遼也蔡京使其激怒以啓釁攄遂恣情不遜遼人大怒空客館水漿絶烟火至舍外積潦亦汚以矢溺使饑渴無所得如是者三日乃遣還凡饔餼祖犒皆廢歸復命議者以為怒鄰生事猶除禮部尚書遼人以失禮来言始出之以朱勔領應奉局及花石綱于蘇州初蔡京過蘇州欲建僧寺閣㑹費鉅萬僧言必欲集此縁非郡人朱冲不可京即召冲語之冲願獨任居數日冲請京詣寺度地至則大木數千章積庭下京器其能踰年京召還朝遂挟冲子勔與俱竄名姓于童貫軍籍中皆得官帝頗埀意花石京諷冲宻取浙中珍異以進初致黄楊三本帝嘉之後歳歳増加然歳不過再三貢貢物裁五六品至是漸盛舳艫相銜於淮汴號花石綱置應奉局於蘇州命勔總其事勔指取内帑如囊中物每取以數十百萬計於是搜巖剔藪幽隐不置其黨徐鑄等數人輔之竭縣官經常以為奉所貢物豪奪漁取於民毛髮不少償凡士庶之家一石一木稍堪翫者即領健卒直入其家用黄帕覆之加封識焉指為御前之物未即取使䕶視之微不謹即被以大不恭罪及發行必撤屋抉牆以出人不幸有一物小異共指為不祥惟恐芟夷之不速民預是役者中家破産或粥賣子女以供其須劚山輦石程督慘刻雖在江湖不測之淵百計取之必得乃止至截諸道糧餉綱旁羅商舡掲所貢暴其上篙工柁師倚勢貪横凌轢州縣道路以目相視廣濟卒四指揮盡給挽士猶不足於用以陶節夫經制環慶涇原河東事節夫知延安府嘗城銀州與知渭州鍾傳屢陳取興靈之策蔡京張康國從中助之故有是命詔分平州為允格州知桂州王祖道言黎人為患六十年道路不通今願為王民得地千五百里乞以安口隘為允州中古州為格州詔分平州置允州格州髙麗王顒卒子俁嗣丙戌五年遼乾統六年春正月有星孛于西方長竟天以吳居厚劉逵為門下中書侍郎以鄭居中同知樞宻院事尋罷初鄭貴妃寵􅃣後宫而家世㣲居中直學士院乃自言於妃為從兄弟因彼此相倚為重及入樞府妃時已貴重於居中已無所賴乃用宦者黄經臣計以外戚秉政辭改授中太一宫使詔求直言毁元祐黨人碑復謫者仕籍帝以星變避殿損膳劉逵請帝碎元祐黨碑寛上書邪籍之禁帝従之夜半遣黄門毁石刻翌日蔡京見之厲聲曰石可毁名不可滅也太白晝見赦除黨人一切之禁權罷方田罷諸州歳貢供奉物詔崇寧以來左降者各以存沒稍復其官盡還諸徙者二月蔡京有罪免京懐姦植黨威福在其手中託紹述之名紛更法制貶斥羣賢増脩財利之政務以侈靡惑人主動以周官惟王不㑹為説毎及前朝借財省費者必以為陋至於土木營造率欲度前䂓而侈後觀時夭下乆平吏員冗濫節度使至八十餘員留後觀察下及遙郡刺史多至數千員學士待制中外百五十員京因覩帑蔵盈溢遂倡為豐亨豫大之説視官爵財物如糞土累朝所儲掃地矣帝嘗大宴出玉琖玉巵示輔臣曰欲用此恐人以為大華京曰臣昔使契丹見玉盤琖皆石晉時物持以夸臣謂南朝無此今用之上夀於禮無嫌帝曰先帝作一小臺財數尺上封事者甚衆朕畏其言此器已就久矣儻人言復興久當莫辨京曰事茍當於理多言不足畏也陛下當享天下之奉區區玉器何足計哉帝悦其言乃置應奉司御前生活所營繕所蘇杭造作局御前人船所其名雜出大率争以竒巧為功而花石綱之害為尤甚及彗星見帝悟其姦凡所建置一切罷之而免京為中太一宫使留京師言者論不已中丞吴執中言于帝曰進退大臣當全體貌帝為京下詔戒飭言者乃已以趙挺之為尚書右僕射蔡京既免帝召見挺之曰京所為一如卿言復拜右相挺之與劉逵同心輔政凡京所行悖理虐民之事稍稍澄正之然挺之多智慮後患毎建白務開其端而使逵畢其説逵亦欲自以為功直情不顧初挺之首興邉事用兵累年至是帝臨朝語大臣曰朝廷不可與四夷生隙隙一開禍結不解兵民肝腦塗地豈人主愛民恤物意哉挺之退謂同列曰上志在息兵吾曹所宜將順三月罷求直言以世福為安定郡王世福燕懿王徳昭曽孫也廢銀州為銀川城許夏人平夏五月行紀元厯劉昺所造也秋七月庚寅朔日當食不虧冬十二月劉逵罷蔡京令其黨進言于帝曰京之改法度皆禀上㫖非私為之今一切皆罷恐非紹述之意帝惑其説復有用京之心然羣臣未有覺之者鄭居中徃來鄭妃父客鄭紳所知之即入見言陛下建學校興禮樂以藻飾太平置居養安濟院以周拯窮困何所逆天而致威譴乎帝悦居中退語禮部侍郎劉正夫正夫因請對語與居中合帝遂疑逵擅政於是京黨御史余深石公弼論逵専恣反覆陵蔑同列引用邪黨出知亳州得鎮國寳有以玉印六寸龜紐獻者文曰承天福延萬億永無極詔名鎮國寳黎洞蠻韋宴閙等内附詔復以其地為地文蘭郍州丁亥大觀元年遼乾統七年春正月以蔡京為尚書左僕射吳居厚罷以何執中為中書侍郎鄧洵武梁子美為尚書左右丞子美初為河北轉運使傾漕計以奉上損緡錢三百萬市北珠以進由是諸路漕臣效尤争進羡餘矣北珠出於女直子美市於遼遼嗜其利虐女直捕海東青以求珠女直深怨之而子美用是顯二月復行方田三月趙挺之罷以何執中鄧洵武為門下中書侍郎梁子美朱諤為尚書左右丞以蔡攸為龍圖閣學士兼侍讀立八行取士科八行者孝友睦婣任恤忠和也凡有此八行者即免試補太學上舍知台州李諤文以徐中行薦中行聞之盡毁其所為文入委羽山以避之或問之中行曰人而無行與禽獸等使吾得以八行應科目則彼之不被舉者非人類歟以葉夢得為起居郎夢得附蔡京得為祠部員外郎京罷相趙挺之更其所行及京再相復反前政夢得入對因曰陛下前日所建立者出於陛下乎出於大臣乎豈可以大臣進退而有所更張也上悦故有是命夏五月以蔡薿為給事中薿以諸生試策揣蔡京意且復用即對曰熈豐之徳業足以配天不幸繼之以元祐紹聖之纉述足以永頼不幸繼之以靖國陛下兩下求言之詔冀以聞至言收實用也而見於元符之末者方且幸時變而肆姦言乘間隙而投異意詆誣先烈不以為疑動搖國是不以為憚願逆處其未至而絶其原於是擢為第一以所對頒天下甫解褐即除秘書正字未踰年至侍從前此未有也鄧洵武免時妖人張懐素謀反朝士多株連者而洵武與其黨連昏坐免鄧氏自綰以來世濟其姦而洵武阿二蔡尤力班大晟樂于天下詔自今諸路監司勿任元祐學術者六月以梁子美為中書侍郎以黎洞地為庭孚州朱諤卒秋八月以徐處仁為尚書右丞林攄同知樞密院事九月貶侍御史沈畸監信州酒税竄御史蕭服于處州蔡京怨劉逵㑹蘇州盜鑄錢獄起京欲陷逵婦兄章綖兄弟遣開封尹李孝夀鞫之株連者千餘人强抑使承死者甚衆京猶以為緩遣侍御史沈畸御史蕭服徃代畸至蘇即日决釋無左證者七百人歎曰為天子耳目司而可傅㑹權要殺人以茍富貴乎遂閲實平反以聞京大怒貶畸監信州酒税服羈管處州而綖竟竄海島前直袐閣程頥卒順於書無所不讀其學本於誠以大學論語孟子中庸為標指而達於六經動止語黙一以聖人為師其不至於聖人不止也嘗言今農夫祁寒暑雨深耕易耨播種五穀吾得而食之百工技藝作為器物吾得而用之介胄之士被堅執鋭以守上宇吾得而安之無功澤及人而浪度嵗月晏然為天地間一蠧唯綴緝聖人遺書庶幾有補爾於是著易春秋傳平生誨人不倦故學者出其門最多淵源所漸皆為名士而劉絢李籲謝良佐㳺酢張繹蘇昞吕大臨吕大鈞尹焞楊時成徳尤著世稱頥為伊川先生卒年七十五絢力學不倦頥毎言他人之學敏則有矣未易保也若絢者吾無疑焉任終太常博士籲頥稱其才器可大任又言自予兄弟倡明道學能使學者視倣而信從者籲與劉絢有力焉仕終校書郎良佐學問該贍事有未澈則顙有泚嘗與頥别一年復来見頥問所進對曰但去得一矜字爾頥喜曰是子可謂力學切問而近思者與游酢楊時吕大臨在程門號四先生仕終監西京竹木場有論語説行於世酢初與兄醇俱以文行知名所交皆天下士頥見之京師謂其資可以進道及程顥興扶溝學招使肄業酢盡棄故所習而學焉仕終知濠州繹家世甚㣲年長未知學傭力於市聞邑官傳呼聲心慕之問人曰何以得此人曰此讀書所致耳即發憤力學遂以文名謂科舉之習不足為將祝髪為僧周行已官河南謂之曰何為舍聖人之學異日程先生歸可師也㑹頥自涪還河南繹徃受業頥稱其穎悟嘗曰吾晩得二士謂繹與尹焞也大鈞大防之弟也能守其師説而踐履之尤喜講明井田兵制謂治道必自此始張載每歎其勇為不可及仕終陜西轉運従事大臨大鈞之弟通六經尤邃於禮每欲掇習三代遺文舊制令可行不為空言以拂世矯俗嘗與兄大忠大防相切磋論道考禮一本於古仕終袐書省正字冬十月貶張商英為安化軍節度副使閏月以林攄為尚書左丞鄭居中同知樞密院事蔡京言樞宻本兵之地與三省殊無嫌於用親黄經臣力抗前説京言不效居中疑京不已援遂怨京乃與張康國比而問京都水使者趙霖得龜兩首於黄河獻以為瑞京曰此齊小白所謂象罔見之而霸者也居中曰首豈有二人皆駭異而京獨主之殆不可測帝命棄龜金明池謂居中愛我故申前命十一月壬子朔日有食之蔡京以不及所當食分率羣臣稱賀建鎮州於黎母山知桂州王祖道請於黎母山心立鎮州為下都督府賜軍額曰靜海知州領海南安撫都監徙萬安軍於水口王祖道伐南丹蠻獲其酋莫公佞建觀州南丹州地與宜州及西南夷接壤世為莫氏所居自署刺史王祖道欲取之乃誣公佞阻文蘭州不令納土遣劉推忠發兵討之擒莫公佞以南丹州為觀州公佞弟公晟結溪洞報復侵掠城邑遂圍新萬安州及觀州殺刺史蔡京匿不以聞徐處仁以母喪去位十二月召王祖道為刑部尚書以張莊知桂州祖道在桂四年厚以官爵金帛挑諸夷建城邑調兵鎮戍輦輸内地錢帛鹽粟無復齊限地瘴癘戍者什亡五六實無尺土一民益於縣官時廣南西路轉運副使張荘實與祖道表裏至是祖道以功召而以荘代其任祖道荘既鑿空超取顯美由是龐恭孫趙遹程鄰相與效之邉壤益多故矣置黔南路加蔡京太尉領庭孚平允従觀宜栁融九州蔡京以功加太尉太廟齋郎方軫上書請誅蔡京京下軫于獄流之嶺南軫上書言蔡京睥睨社稷内懐不道専以紹述熈豐之説為自謀之計内而執政侍従外而帥臣監司無非其門人親戚自元符末陛下嗣服忠義之士投匭者無日無之京分為邪等黥配安置不齒仕籍則誰肯為陛下言哉京又使子攸日以花石禽鳥為獻欲愚陛下使不知天下治亂臣以為京必反也請誅京上詔宣示京京下軫獄流之嶺南夏人来貢涪州夷駱世華駱文貴内附乾寧軍言黄河清戊子二年遼乾統八年春正月壬子朔受八寳于大慶殿赦加蔡京太師時得良玉工帝命作六寳曰皇帝之寳曰皇帝行寳曰皇帝信寳曰天子之寳曰天子行寳曰天子信寳以合秦制天子六璽之數與受命鎮國通曰八寳受命鎮國惟封禪用之二月作徽猷閣蔵哲宗御某也三月班金籙靈寳道場儀範于天下夏四月童貫復洮州五月加貫檢校司空賜蔡京玉帶童貫復積石軍溪哥王于征樸哥降遂復積石軍貫頗恃功驕恣選置將吏皆㨗取中㫖不復關朝廷蔡京不悦張莊言安化蒙氏蠻内附知桂州張莊奏安化上三州一鎮地土及恩廣監洞蒙光眀落安知洞程大法都丹團黄光明等納土共五萬一千一百餘户二十六萬三千餘人幅員九千餘里六月以涪夷地為珍州以平夏城為懐徳軍秋八月梁子美罷九月以林攄為中書侍郎余深為尚書左丞深為中丞時與知開封府林攄治妖人張懐素獄事多連蔡京二人曲為掩覆凡獄辭及交通書問有及京者輒取焚之京深徳二人故力引焉皇后王氏崩冬十二月𦵏靖和皇后于永裕陵張莊言寛樂等州蠻内附詔以莊兼黔南經畧安撫使莊奏寛樂州安沙州譜州四州七源等州納土計二萬人一十六州三十三縣五十餘洞幅員萬里蔡京帥百官表賀謂混中原風氣之殊當天下輿地之半詔莊兼黔南經畧使渝州蠻趙泰等内附以其地為溱州涪夷任應舉湖南猺楊再光内附詔孔伋從祀孔子廟庭折克行卒以其子可大知府州事克行在邊久善拊士卒戰功最多羌人號為折家父夏人入貢己丑三年遼乾統九年春正月以涪夷地為永州二月播州楊文貴内附以其地為遵義軍文貴南平夷也來獻其土建為遵義軍領播川琅川帶水三縣三月張康國暴卒于待漏院康國始因附蔡京而進及在樞府寖為崖異時帝惡京専愎隂令康國阻其姦且許以相京忌康國遂引吳執中為中丞執中即劾京客劉昞宋喬年帝嘉執中之不阿康國曰是乃為逐臣地耳已而執中將論康國康國先知之旦奏事留白帝曰執中今日入對必為京論臣臣願避位既而執中對果陳其事帝怒黜執中知滁州至是康國因退朝趨殿廬得疾仰天吐舌舁至待漏院卒或疑中毒云右正言陳禾上䟽請竄童貫貶禾監信州酒時童貫權益張與黄經臣胥用事中丞盧航表裏為姦搢紳側目陳禾曰此國家安危之本也吾位言責此而不言可乎遂上䟽劾貫經臣怙寵㺯權之罪願亟竄之逺方論奏未終帝拂衣起禾引帝衣請畢其説衣裾落帝曰正言碎朕衣矣禾言陛下不惜碎衣臣豈惜碎首以報陛下此曹今日受富貴之利陛下他日受危亡之禍言愈切帝變色曰卿能如此朕復何憂内侍請帝易衣帝却之曰留以旌直臣翌日貫等相率前訴謂國家極治安得此不祥語盧航奏禾狂妄謫監信州酒併黔南入廣西路夏四月林攄有罪免集英臚唱貢士攄當傳姓名不識甄盎字帝笑曰卿誤耶攄不謝而語詆同列御史論其寡學倨傲不恭失人臣禮黜知滁州猶為帝言頃使遼見其國中攜貳若兼而有之勢無不可盖欲報其辱也帝由是始有北伐之意以鄭居中知樞密院事管師仁同知院事余深為中書侍郎薛昻劉正夫為尚書左右丞昻與余深林攄附蔡京為至久昻至舉家為京避私諱或誤及之輒加笞責昻嘗誤及即自批其口五月流孟翊于逺方孟翊獻所畫卦象謂宋將中微宜更年號改官名變庶事以厭之帝不樂詔竄之逺方六月詔脩樂書管師仁罷蔡京有罪免中丞石公弼殿中侍御史張克公劾京罪惡章數十上京坐免公弼始與京有連故得進用及居言路遇事利害輒言不憚京始忌之既免京政復上章言吏員猥冗戾元豐舊制於是詔堂選歸吏部者數千員罷宫廟者千員都水知埽六十員縣非大郡悉省丞在京茶事歸之户部諸道市舶歸之轉運司仕塗為清以何執中為尚書左僕射執中一意謹事蔡京遂代為首相太學生陳朝老詣闕上書曰陛下知蔡京之姦解其相印天下之人鼔舞有若更生及相執中中外黯然失望執中雖不敢肆為非法若蔡京之蠧國害民然碌碌常質初無過人天下敗壊至此如人一身臓腑受沴已深豈庸庸之醫所能起乎執中夤縁攀附致位二府亦已大幸遽俾之經體賛元是猶以蚉負山多見其不勝任也䟽奏不省以瀘夷地為純滋州秋八月嗣濮王宗漢卒兄子仲増嗣冬十一月詔蔡京以楚國公致仕仍提舉哲宗實録留京師詔筭學以黄帝為先師風后等八人為配享巫咸等七十二人為從祀罷東南鑄夾錫錢禮書成凡二百四十七卷瀘州夷王募弱内附庚寅四年遼乾統十年春正月詔士庶拜僧者論以大不恭罪夏人入貢以余深張商英為門下中書侍郎侯蒙同知樞宻院事蔡京既免帝自峽州召商英知杭州過闕賜對因奏曰神宗脩建法度務以去大害興大利今誠一一舉行則盡紹述之美法若有弊不可不變但不失其意足矣遂留居政府帝嘗従容問蒙曰蔡京何如人也蒙對曰使京正其心術雖古賢相何以加京聞而銜之三月詔罷醫筭書畫學宫詔醫學生併入太醫局筭生入太史局書生入翰林書藝局畫生入翰林畫圖局學官等並罷詔元符上書邪下等人依舊録用夏五月立詞學兼茂科帝以宏詞科不足以致文學之士改立詞學兼茂科嵗附貢士院試去檄書而増制誥中格則授館職嵗不過五人有星孛于奎婁詔直言闕失貶蔡京為太子少保出居杭州京留都中丞石公弼言京盤旋京師無去志其餘威震于羣臣願持必斷之決以消後悔殿中侍御史洪彦昇言京再居元宰假紹述之名一切更張敗壊先朝法度朋姦誤國公私困弊既已上印而偃蹇都城上憑眷顧之恩中懐䟦扈之志願早賜英斷遣之出京殿中侍御史毛注言京擅持威福動搖中外以翰林學士葉夢得為腹心交植黨與以所親宋喬年尹京其門人播傳咸謂陛下恩眷不衰行且復用帝皆不聴唯逐夢得而遷注為侍御史注復極論京受孟翊妖姦之書與逆人張懐素游處引㐫朋林攄置政府等事太學生陳朝老亦䟽京惡十四事乞投畀逺方以禦魑魅皆不報及彗出奎婁間帝避殿減膳令侍従官直言指陳闕失公弼等遂極論京罪侍御史張克公論京輔政八年權震海内輕賜予以蠧國用託爵禄以市私恩役將作以葺居第用漕船以運花石名為祝聖而修塔以壯臨平之山託言灌田而決水以符興化之䜟法名退送門號朝京方田擾安業之民圜土聚徙郡之惡及不軌不忠之罪凡數十事毛注又論京罪積惡大天人交譴雖罷相致政猶怙恩恃寵偃居賜第以致上天威怒推原其咎實在於京考京之罪盖不可以縷數陛下去黨碑以開自新之路京疾其異已而别為禁防陛下頒明詔以來天下之言京惡其議已而重致於法以嚴刑峻罸脅持海内以美官重禄交結人心錢鈔屢更而商賈不行邊事數興而國力大匱聲焰所震中外憤疾宜早令去國消弭天變奏上乃出之余深罷深與蔡京結為死黨京既去國深不自安上䟽乞罷乃出知青州追貶王祖道為昭信軍節度副使放張莊于永州討妄言拓地之罪也六月以張商英為尚書右僕射時蔡京久盜國柄中外怨疾見商英能立異同更稱為賢帝因人望而相之時久旱彗星中天商英受命是夕彗不見明日兩帝喜因大書商霖二字以賜之薛昻免秋七月罷方田八月以劉正夫為中書侍郎侯蒙鄧洵仁為尚書左右丞吳居厚為門下侍郎閏月以張閣知杭州兼領花石綱閣受杭州之命思所以固寵乃因辭日乞領花石綱事應奉益繁矣九月丙寅朔日有食之冬十月立貴妃鄭氏為皇后后開封人初帝為端王常朝欽聖太后于慈徳宫后時為押班太后命后供侍帝即位太后因以賜帝后性端謹善順承帝意好觀書章奏能自製帝愛其才寵冠後宫竟立為后以吳居厚知樞宻院事南丹州首領莫公晟内附户部獻今年民數主客户二千八十八萬二千二百五十八口四千六百七十三萬四千七百八十四辛夘政和元年遼大慶元年春三月以王襄同知樞宻院事夏六月復蔡京太子少師秋七月廢平從州為砦八月復蔡京太子太師張商英罷商英為政持平謂蔡京雖明紹述但借以刼制人主禁錮士大夫耳於是大革弊事改京所鑄當十大錢為當三以平泉貨復轉般倉以罷直達行鹽鈔法以通商旅蠲横歛以寛民力勸帝節華侈息土木抑僥倖帝頗嚴憚之嘗葺升平樓戒主者遇丞相導騎至必匿匠樓下過則如初時稱商英忠直然意廣才踈凡所當為先於公座誦言故不便者得預為計初何執中與蔡京同相凡營立皆預議至是惡商英出已上與鄭居中日夜醖織其短先使言者論其門下客唐庚竄之恵州初帝在潜邸方伎郭天信言當履天位及即位頗睠寵之商英因與徃来事覺居中遂諷中丞張克公論之商英罷政出知河南九月王襄免坐薦引近侍也鄭允中童貫如遼童貫既得志於西羌遂謂遼亦可圖因請使遼以覘之乃以鄭允中充賀遼主生辰使而以貫副之或言以宦官為上介國無人乎帝謂曰契丹聞貫破羌故欲見之因使覘其國策之善者也遂行冬十月貶張商英為崇信軍節度副使徙陳瓘于台州瓘以論蔡京竄郴州瓘子正彚在杭訟京有動摇東宫意杭守蔡嶷執正彚送京師下開封府獄併逮及瓘尹李孝壽逼使證其妄瓘曰正彚聞京將不利社稷遍于道路瓘豈得預知以所不知忘父子之恩而指其為妄則情有所不忍挾私情以符合其説又義所不為京之姦邪必為國禍瓘固嘗論之於諫省亦不待今日語言間也内侍黄經臣莅鞠聞其辭失聲太息謂曰主上正欲得實但如言以對可也獄具正彚猶以所告失實流海上瓘安置通州瓘嘗撰尊堯集謂紹聖史官専據王安石日録改脩神宗史變亂是非不可傳信深明誣妄以正君臣之義張商英為相取其書既上而商英罷瓘又徙台州何執中令所過州縣出兵甲䕶送至台每十日一徙執中又起凶人石悈知台州欲置瓘以必死悈至執瓘至庭大陳獄具將脅以死瓘揣知其意大呼曰今日之事豈被制㫖耶悈失措始告之曰朝廷令取尊堯集爾瓘曰然則何用許使君知尊堯所以立名乎盖以神考為堯主上為舜尊堯何得為罪時相學術短淺為人所愚君所得幾何乃亦不畏公議干犯名分乎悈慙揖瓘使退所以窘辱之者百端終不能害執中怒罷悈瓘平生論京兄弟皆披擿其處心發露其情慝最所忌恨故得禍最酷童貫以遼李良嗣來以為祕書丞賜姓趙氏燕人馬植本遼大族植仕至光禄卿行汚而内亂不齒于人童貫使至盧溝植夜見其侍史自言有滅燕之策因得見貫貫與語大竒之載與俱歸易姓名曰李良嗣薦諸朝植即獻策曰女真恨遼人切骨而天祚荒淫失道本朝若自登莱涉海結好女真與之相約攻遼其國可圖也議者謂祖宗以来雖有此道以其地接諸蕃禁商賈舟船不得行百有餘年矣一旦啓之懼非中國之利不聴帝召見問所來植對曰遼國必亡陛下念舊民遭塗炭之苦復中國徃昔之疆代天譴責以治伐亂王師一出必壺漿来迎萬一女真得志事不侔矣帝嘉納之賜姓趙氏以為祕書丞圖燕之議自此始壬辰二年遼天慶二年春正月詔元符上書邪等人不得除監司二月詔蔡京復以太師致仕賜第京師遼主如混同江生女真部阿固達等朝之遼主如春州幸混同江釣魚界外生女真帥長在千里内者以故事皆来朝適遇頭魚宴酒半酣遼主命諸帥次第起舞至阿固達辭不能但端立直視遼主諭之再三阿固達終不従他日遼主宻諭北院樞宻使蕭奉先曰阿固逹䟦扈如此可託以邉事誅之否則必貽後患奉先曰彼麤人不知禮義且無大過而殺之恐傷向化心設有異志蕞爾小國亦何能為遼主乃止阿固逹之弟烏竒邁尼瑪哈烏舍等嘗従遼主獵能呼鹿刺虎搏熊遼主喜加以官爵阿固達歸疑遼主知其異志且以遼主淫酗齊不恤國政遂稱兵先併旁近部族女真卓克繖阿固拒之阿固達擄其家屬二人走訴咸州詳衮司送北樞宻院蕭奉先作常事以聞遼主命送咸州詰責欲使自新後數召阿固達阿固逹不至一日率五百騎折突入咸州吏民大驚翌日赴詳衮司與卓克繖等面庭下阿固達不屈送所司問狀一夕遁去遣人訴于遼主言詳衮司欲見殺故不敢留自是召不復至矣奉先遼主元妃之兄也外寛内忌因元妃故遼主深倚任之夏四月復行方田蔡京至自杭州帝宴之于太清樓京自杭赴召帝宴之於内苑太清樓京為樓記以進備言宫室服玩之盛加何執中司空五月詔太師蔡京落致仕三日一至都堂議事京患言者議已乃作御筆密進而丐帝親書以降謂之御筆手詔違者以違制坐之事無巨細皆託以行至有不類帝書者羣下亦莫敢言由是貴戚近臣爭相請求至使中人楊球代書號曰書楊京復病之而亦不能止矣六月以余深為門下侍郎罷户部尚書陳顯知越州顯因對言再用蔡京士民失望帝怒故罷顯不復仕歸隠四明秋七月訪遺書于天下置禮制局掌討論古今宫室車服器用婚喪冠祭沿革制度及更置郊廟禋祀之器劉昺領之九月更定官名蔡京率意自用欲更置官名以繼元豐之政乃首更開封守臣為尹牧由是府分六曹縣分六案内侍省職悉倣機廷之號脩六尚局建三衞郎遂詔太師太傅太保古三公之官今為三師古無此稱合依三代為三公為真相之任司徒司空周六卿之官太尉秦主兵之任皆非三公並宜罷仍立三孤為次相之任更侍中為左輔中書令為右弼尚書左僕射為太宰兼門下侍郎右僕射為少宰兼中書侍郎罷尚書令而以太尉冠武階然是時員既濫冗名且紊雜甚者走馬承受升擁使華黄冠道流亦濫朝品元豐之制至此大壊冬十一月受元圭于大慶殿赦進封蔡京為魯國公時民間有得玉圭來獻者以何執中為少傅太宰兼門下侍郎十二月加童貫太尉宴輔臣于延福宫宫在大内北拱宸門外初蔡京欲以宫室媚帝召内侍童貫楊戩賈詳何訢藍従熈五人諷以内中逼窄之狀五人乃請因延福舊名而新作之五人分任工役視力所致争以侈麗髙廣相誇尚各為制度不務沿襲及成號延福五位東西配大内南北稍劣其東直景龍門西抵天波門其間殿閣亭臺相望鑿池為海䟽泉為湖鶴莊鹿砦文禽竒獸孔翠諸柵蹄尾動以數千嘉花名木類聚區别怪石巖壑幽勝宛若天成不類塵境既成帝自為文以記之其後又為村居野店酒肆青帘於其間每歳冬至後即放燈自東華門以北並不禁夜徙市民行鋪夾道以居縦博羣飲至上元後乃罷謂之先賞尋又跨舊城脩築號延福第六位復跨城外浚濠作二橋東為景龍門橋西為天波門橋橋下疊石為固引舟相通而橋上人物外自通行不覺也名曰景龍江夾江皆植竒花珍木殿宇對峙焉蜀夷董舜咨等内附置祺亨州癸巳三年遼天慶三年春正月追封王安石為舒王復封安石子雱為臨川伯従祀孔子廟庭時新儀成於正月元日舍菜仲春仲秋上丁舍奠以兖國鄒國公及舒王配享殿上頒辟雍大成殿名於諸路州學吳居厚罷居厚久居政府以周謹自媚雖無大惡可言然一時聚歛者推為稱首以鄭居中知樞密院事二月罷文臣勲官崇恩皇太后劉氏有罪自殺帝以哲宗故曲加恩禮于后而后頗干預外事且以不謹聞帝與輔臣議將廢之而后已為左右所逼即簾鈎自縊而死年三十五賜方士王老志號洞微先生王仔昔號通妙先生濮人王老志初為小吏遇異人授以丹遂棄妻子結草廬田間為人言休咎多驗太僕卿王亶以名聞時帝方嚮道術乃召至京師館于蔡京第嘗緘書一封至帝所唘視乃昔嵗秋中與喬劉二妃燕好之語也由是益信之號為洞㣲先生朝士多従求書初若不可解者卒應者什八九其門如市京慮太甚頗以為戒老志亦謹畏乃奏禁絶之踰年而死洪州人王仔昔隠于嵩山自言遇許遜得大洞隠書豁落七元之法能道人未来事蔡京薦之帝得召見賜號冲隠處士篆符有驗進封通妙先生由是道家之事日興而仔昔恩寵寖加朝臣戚里夤縁關通中丞王安中上䟽請自今招延山林道術之士當責所屬保任宣召出入必令察視其所經由仍申嚴臣庶徃還之禁并言京欺君僣上蠧國害民之事上欣然納之已而再䟽京罪上曰本欲即行卿章以近天寧節俟過此當為卿罷京京伺知之大懼其子攸日夕侍禁中泣拜懇祈上為遷安中翰林學士三月壬子朔日有食之夏四月作保和殿總為屋七十五間工致其巧人致其力上飾純緑下漆以朱無文藻繪畫五采垣墉無粉澤淺墨作寒林平逺禽竹前種松竹桂桐梅橘蘭蕙後列太湖石引滄浪水陂池連緜若起若伏支流派别縈紆清泚左實典謨訓誥經史右蔵三代鼎彞俎豆敦盤尊罍東序置古今書畫第其品秩西序收琴阮筆硯焉鄧洵仁罷營方澤作玉清和陽宫在福寧殿東以薛昻為尚書右丞班五禮新儀五禮新儀成凡二百二十卷増置禮直官許士庶就問新儀詔開封尹王革編類通行者刋本給天下使悉知禮意其不奉行者論之以罪閏月改公主為帝姬五月𦵏昭懐皇后班新燕樂秋七月加何執中少師以燕樂成進執政官一等故也冬十月閲新樂器于崇政殿出古器以示百官詔祀大禮並以道士百人執威儀前導十一月有事于南郊詔天神降帝南郊執大圭以道士前導蔡攸為執綏官玉輅出南薰門帝忽曰玉津園東若有樓臺重複是何處也攸即奏見雲間樓殿臺閣隠隠數重既而審視皆去地數十丈頃之帝又曰見人物否攸即奏有若道流童子持幡節盖相繼而出雲間衣服眉目歴歴可識遂以天神降詔告在位作天真降臨示現記由是益信神仙之事矣十二月詔求道教仙經于天下遼生女真部節度使烏雅舒卒兄子阿固達自稱都貝勒先十月烏雅舒夢逐狼屢發不能中阿固逹直前射中之以問左右皆曰吉兄不能得而弟得之之兆也是月烏雅舒死阿固達襲位為都貝勒遼使阿息保往謂之曰何故不告䘮阿固達曰有䘮不能弔而乃以為罪乎他日阿息保徑至烏雅舒殯所閱䁌馬欲取之阿固達怒將執而殺焉烏雅舒之長子摩囉歡力止之乃已甲午四年遼天慶四年春正月置道階時王老志王仔昔徐知常等得幸遂置道階先生處士等名凡一十六級夏四月閲太學辟雍諸生雅樂五月初祭地祗于方澤六月以廣西溪洞地置隆兌州秋八月置延康述古二殿學士改端明殿為延康殿置學士以樞密直學士為述古殿直學士冬十月遼生女真阿固達叛陷寧江州遼主好畋獵淫酗怠于政事毎歳遣使市名鷹海東青于海上道出生女真使者貪縦徵索無藝女真怨苦之及阿蘇奔遼女真烏雅舒屢以為請遼主不遣烏雅舒遂以為辭稍稍拒市鷹使者及阿固達襲位復遣普嘉努索阿蘇久而不還阿固逹乃使實古納尼楚赫復至遼主終不許實古納歸具言遼主驕肆廢弛之狀阿固逹乃召其所屬使備衝要建城堡脩戎器遼統軍司聞之遣節度使尼格問阿固達曰汝等有異志乎脩戰具飭守備將以誰禦阿固達荅曰設險自守又何問哉遼主復使侍御阿息保徃問境上多建城堡之故阿固達因以嫚語荅之曰我小國也事大國不敢廢禮大國徳澤不施而逋逃是主以此字小能無望乎若還阿蘇朝貢如故不然城未已也阿息保還遼主遂發渾河北諸軍益東北路統軍司阿固達聞之使富卦喇復如遼索阿蘇實觀形勢富卦喇還言遼兵多不知數阿固達曰彼初調兵豈能遽集如此復使華沙布如遼華沙布歸言惟四院統軍司與寧江州軍及渤海八百人耳阿固達曰果如吾言謂其下曰遼人知我將舉兵集諸路軍備我我必先發制之無為人制乃與尼瑪哈烏舍等謀遂集所屬諸部兵以尼楚赫羅索棟摩等為將而使博集賽勤和徴伊蘭路都古嚕訥兵烏楞古阿嚕撫諭斡琿兩路係遼女真薩卜丹徃安圖路執遼障鷹官達嚕噶部副使色埒寧江州渤海大嘉努九月阿固達率兵進次羅和城諸部兵皆㑹于拉林水得二千五百人數遼之罪告于天地曰世事遼國恪脩職貢定烏春烏木罕之亂破蕭哈里之衆有功不省而侵侮是加罪人阿蘇屢請不遣今將問遼之罪天地其鑒佑之遂命諸將傳檄而誓曰汝等戮力同心有功者奴婢部曲為良庶人官之先有官者敘進輕重眂功茍違誓言身死梃下家屬無赦且戰且前將至遼界遇渤海軍耶律色實墜馬遼人前救阿固達射救者斃之并中色實色實㧞箭走阿固達射殺之獲所乘馬阿固達弟鄂特本與數騎陷遼圍中阿固達救之免胄戰或自旁射之阿固達顧見射者一矢而斃謂其下曰盡敵乃止衆従之勇氣自倍遼師大奔蹂踐死者十七八薩哈在别部聞之使其子尼瑪哈及烏舍至軍勸其稱帝阿固達曰一戰而勝遂稱大號何示人淺也進軍寧江州填塹攻城寧江人自東門出阿固達使温特赫額圖琿邀擊盡殪之遼統軍司以聞時遼主射鹿于慶州畧不介意唯遣海州刺史髙仙夀應援而已十月朔寧江州陷遼防禦使藥太師努被獲阿固達隂縦之使招諭遼人又使渤海梁福額特埒偽亡以招諭其鄉人且曰女真渤海本同一家我興師伐罪不濫及無辜也又使羅索招諭係遼女真而引兵還初女真部民皆無徭役壯者悉為兵平居則漁畋射獵有警則下令諸部徵之凡步騎之仗糗皆自備焉其部長曰貝勒行兵則稱曰明安穆琨明安猶千夫長也穆琨猶百夫長也従其所率多寡為號穆琨之副曰富埒琿士卒之副従曰伊勒希部卒之數初無定制至是始命以三百户為穆琨十穆琨為明安凡以衆降附者率以明安穆琨之名授之尼瑪哈或訛尼雅滿云十一月遼蕭嗣先帥師伐女真敗績于混同江遼主免嗣先官而釋其罪遼主聞寧江州陷召羣臣議漢人行宫副部署蕭圖薩温曰女真雖小其人勇而善射自執我叛人蕭哈里勢益張大我兵乆不練若遇强敵稍有不利諸部離心不可制矣為今之計莫若大發諸道兵以威壓之庶可服也北院樞宻使蕭達爾丹曰如圖薩温之謀徒示弱耳但發滑水以北兵足以拒之乃以司空蕭嗣先為東北路都統蕭托卜嘉副之發契丹奚軍三千及中京禁兵等七千屯出店河阿固達聞之帥衆来禦未至混同江㑹夜阿固達方就枕若有扶其首者三阿固達寤而起曰神明警我也即鳴皷舉燧而行黎明至混同江遼兵方壊凌道阿固達選壯士十人撃走之因帥衆繼進遂登岸甲士三千七百至者才三之一與遼兵遇㑹大風起塵埃蔽天阿固達乘風奮撃遼兵潰將士多死其獲免者十有七人樞密使蕭奉先嗣先兄也懼嗣先得罪輒奏東征潰軍所至刼掠若不肆赦恐聚為患遼主従之嗣先但免官而已自是凡軍潰敗遂止免官而不加罪於是諸軍相謂曰戰則有死而無功退則有生而無罪故士庶無鬬志遇敵輒潰散矣阿固達襲敗遼蕭迪里于沃稜濼東殺獲甚衆遼人嘗言女真兵滿萬則不可敵至是始滿萬矣十二月詔廣南歳貢真珠犀角象齒女真敗遼師于賔祥咸三州遂陷其城遼特哩王奚和勒博以所部叛降于女直和勒博奚王托琳之後也以童貫為陜西經畧使環州定逺大首領夏人李訛􅗹以書遺其國統軍梁哆㖫曰我居漢二十年毎見春廪既虚秋庾未積糧草轉輸例給空劵方春未秋士有飢色若捲甲而趨徑𢷬定逺唾手可取既得定逺則旁十餘城不攻而下矣我儲穀累嵗闕地而蔵之所在如是大兵之来斗糧無齎可坐而飽也哆㖫遂以萬人来迎轉運使任諒先知其謀募民盡發窖穀哆㖫圍定逺失所蔵越七日訛􅗹遂以其部萬餘歸夏夏主築臧㡳河城遂詔童貫經畧之通鑑續編卷十一
