body:
  text: 通鑑續編卷八元陳桱撰戊申神宗皇帝熈寧元年遼咸雍四年春正月甲戌朔日有食之帝不受朝詔宰臣極言闕失趙槩罷槩秉心和平與人無怨惡在官如不能言然隂以利物者為多時議比之劉寛婁師德以老求罷以唐介叅知政事先是宰相省閲所進文書于待漏院同列不得聞介謂曾公亮曰身在政府而事不預知上或有所問何辭以對乃與同視後遂為常二月以孔若蒙襲封衍聖公三月夏國主諒祚卒子秉常立秉常年七歲矣諡諒祚曰昭英皇帝廟號毅宗遣使來告哀帝遣劉航冊命秉常為夏國主遼遣使冊為夏國王諒祚之世嘗去蕃禮從漢儀服中國衣冠徃徃以漢官命其臣且數上表求九經唐史冊府元龜宋正旦冬至朝賀儀仁宗以九經賜之夏四月詔翰林學士王安石越次入對安石受命歴七月始至京師及入對帝問為治所先安石對曰擇術為先帝曰唐太宗何如曰陛下當法堯舜何以太宗為哉堯舜之道至簡而不煩至要而不迂至易而不難但末世學者不能通知以為高不可及耳帝曰卿可謂責難於君朕自視𦕈躬恐無以副卿此意可悉心輔朕庶同濟此道一日講席羣臣退帝留安石坐曰有欲與卿從容論議者因言唐太宗必得魏徴劉備必得諸葛亮然後可以有為二子誠不世出之人也安石曰陛下誠能為堯舜則必有臯䕫稷契誠能為高宗則必有傅説彼二子者何足道哉以天下之大人民之衆百年承平學者不為不多然常患無人可以助治者以陛下擇術未明推誠未至雖有臯䕫稷契傅説之賢亦将為小人所蔽卷懐而去耳帝曰何世無小人雖堯舜之時不能無四凶安石曰惟能辨四凶而誅之此其所以為堯舜也若使四凶得肆其讒慝則臯䕫稷契亦安肯茍食其禄以終身乎詔安石越次入對六月詔録唐魏徴狄仁傑後河決恩冀瀛州秋七月以陳升之知樞宻院事故事樞宻使與知院不並置時文彦博吕公弼既為使帝以升之三至密省欲稍異其禮故特命之升之即旭也以避帝嫌名改焉京師地震八月復行崇天厯京師地震九月初封太祖曾孫從式為安定郡王帝謂創業垂統實自太祖顧無以稱乃下詔封楚康惠王德芳孫舒國公從式為安定郡玉奉太祖祀世世勿絶明年復詔宣祖太祖太宗之子皆擇其後一人為宗世世封公以奉其祀作英德殿于景靈宫奉安英宗神御也冬十一月有事于南郊赦執政以河朔旱傷國用不足乞南郊勿賜金帛詔學士議司馬光王珪王安石同見光曰救灾節用當自貴近始可聽也安石曰常衮辭堂饌時以為衮自知不能當辭職不當辭禄且國用不足非當世急務所以不足者以未得善理財者故也光曰善理財者不過頭㑹箕歛爾安石曰不然善理財者不加賦而國用足光曰天下安有此理天地所生財貨百物不在民則在官彼設法奪民其害乃甚于加賦此葢𢎞羊欺武帝之言太史公書之以見其不明耳争議不已帝曰朕意與光同然姑以不允答之會安石草詔引常衮事責兩府兩府不敢復辭京師地震十二月邵亢罷夏人誘知保安軍楊定等殺之詔种諤隨州安置以韓琦知永興軍經略陜西郭逵為鄜延宣撫使詔夏人以塞門安逺砦來易綏州种諤既受嵬名山降夏主諒祚乃詐為會議誘知保安軍楊定都巡檢使侍其臻等殺之邊釁復起朝議以諤生事欲棄綏誅諤陕西宣撫機宜文字趙卨上疏以為不可乃貶諤四秩隨州安置而以韓𤦺知永興軍經略西事徙郭逵宣撫鄜延卨又為逵移書執政曰夏既殺王官而又棄綏不守見弱已甚且名山舉族來歸何以處之請存綏以張兵勢䂓度大理河川建堡畫稼穡之地三十里以處降者朝廷不從賜夏主秉常詔許納塞門安逺二砦歸其綏州故壤無雪以王韶管幹秦鳳經略司機宜文字韶遂行邊西蕃俞龍珂帥其衆内附建昌軍司理王韶詣闕投匭上平戎三䇿以為西夏可取欲取西夏當先復河湟河湟復則夏人有腹背受敵之憂夏人比年攻青唐不能克萬一克之必併兵南向大掠秦渭之間牧馬于蘭㑹㫁古渭境盡服南山生羌西築武勝遣兵時掠湟河則隴蜀諸郡當盡驚擾木征兄弟其能自保耶今唃氏子孫雖董氊粗能自立瞎征欺巴温之徒文法所及各不過一二百里其勢豈能與西人抗哉武威之南至于洮河蘭鄯皆故漢郡所謂湟中浩亹大小榆枹罕土地肥美宜五種者在焉幸今諸羌𤓰分莫相統一此正可并合而兼撫之時也諸種既服唃氏其敢不歸唃氏歸則河西李氏在吾股掌中矣且唃氏子孫瞎征差盛為諸戎所畏若招諭之使居武勝或渭源城使紏合宗黨制其部族習用漢法異時族類雖盛不過一延州之李士彬環州之慕恩耳於漢有肘腋之助且使夏人無所連結䇿之上也帝異其言召問方略王安石以為竒請以韶管幹秦鳳經畧司機宜文字韶至秦㑹諸將以蕃部俞龍珂在青唐最大渭源羗與夏人皆欲覊縻之議先致討韶因按邉引數騎直抵其帳諭以成敗遂留宿明旦兩種皆遣其豪隨韶以東龍珂率其屬十二萬口内附己酉二年遼咸雍五年元夏惠宗秉常乾道年春二月以富弼為司空侍中平章事初弼自汝州入覲詔許肩輿至殿門帝御内東門小殿令其子掖以進且命毋拜坐語從容訪以治道弼知帝果于有為對曰人君天好惡不可令人窺測可測則姦人得以傅㑹當如之監人善惡皆所自取然後誅賞隨之則功罪皆得其實矣又問邊事弼對曰陛下臨御未久當布德行惠願二十年口不言兵帝黙然至曰昃乃退欲以集禧觀使留之力辭赴郡至是召拜司空兼侍中左僕射同平章事時帝以灾變避正殿减膳撤樂王安石言于帝曰灾異皆天數非闗人事得失所致弼在道聞之嘆曰人君所畏者天耳若不畏天何事不可為者此必姦人欲進邪説以摇上心使輔弼諫諍之臣無所施其力是治亂之機不可以不速救即上書數千言力論之及入對又言君子小人之進退繋王道之消長願深加辨察勿以同異為喜怒喜怒為用舍陛下好使人伺察外事故姦憸得志又令中外之務漸有更張此必小人獻説于陛下也大抵小人惟喜動作生事則其間必有所希覬若朝廷守静則事有常法小人何所望哉願深燭其然無使有悔以王安石叅知政事帝欲用安石曾公亮因力薦之唐介言安石難大任帝曰文學不可任耶經術不可任耶吏事不可任耶介對曰安石好學而泥古故議論迂闊若使為政必多所更變介退謂公亮曰安石果大用天下必困擾諸公當自知之帝問判少府監孫固曰安石可相否固對曰安石文行甚高處侍從獻納之職可矣宰相自有度安石狷狹少容必欲求賢相吕公著司馬光韓維其人也帝不以為然竟以安石叅知政事謂之曰人皆不能知卿以為卿但知經術不曉世務安石對曰經術正所以經世務但後世所謂儒者大抵皆庸人故世俗以為經術不可施於世務耳帝曰然則卿所設施以何為先安石對曰變風俗立法度正方今之所急也帝深納之立制置三司條例司議行新法詔陳升之王安石領其事以蘇轍吕惠卿檢詳文字章惇為條例官曾布檢正中書五房公事王安石言昔周置泉府之官以𣙜制兼併均濟貧乏變通天下之財後世唯桑𢎞羊劉晏粗合此意學者不能推明先王法意更以為人主不當與民争利今欲理財則當修泉府之法以收利權帝納其説安石猶恐帝不能決意任之乃復言曰人才難得亦難知今使十人理財其中容有一二敗事則異論乗之而起臣謂堯與羣臣共擇一人治水尚不能無敗事况所擇而使非一人豈能無失要當計利害多少而不為異論所惑帝曰有一人敗事而遂廢所圖此所以少成事也至是立制置三司條例司掌經畫邦計議變舊法以通天下之利命陳升之王安石領其事初泉人吕惠卿自真州推官秩滿入都與安石論經義意多合遂定交因言于帝曰惠卿之賢豈特今人雖前世儒者未易比也學先王之道而能用者獨惠卿而已及立條例司遂以惠卿及蘇轍並為撿詳文字事無大小安石必與惠卿謀之凡所建請章奏皆惠卿筆也又以章惇為三司條例官曽布檢正中書五房凡有奏請朝臣以為不便者則布必上疏條析以堅帝意使専任安石以威脅衆俾母敢言由是安石信任布亞于惠卿而農田水利青苗均輸保甲免役市易保馬方田諸役相繼並興號為新法而天下騒然矣安石與劉恕友善欲引置三司條例恕以不習金穀為辭且曰天子方屬公以大政宜恢張堯舜之道以佐明主不應以利為先安石遂與之絶夏人冦秦州夏人冦秦州䧟劉溝堡殺守將范愿死者不可勝計夏四月大旱詔羣臣言闕失唐介卒介簡伉敢言居政府數與王安石争辯而安石强解帝主其説介不勝其憤遂疽發背而卒以薛向為江淮發運使向制置解鹽多變范祥之法淮南轉運使張靖論其罪王安石右向抵靖于法而擢向焉立免役法詔劉彞等八人察農田水利賦役于天下初帝即位問天下遺利于三司使韓綘綘請盡地力因言京東民有父子二丁將為衙前役者其父告子曰吾當求死使汝免于凍餒因自經死江南有嫁其祖母及與母析居以避役者又有鬻田減其户等者望博訪利害集議裁定使力役無偏重之患同知諫院呉充亦言今鄉役之中衙前為重民間規避重役土地不敢多耕而避户等骨肉不敢義聚而憚人丁故近年上户寖少中下户寖多役使頻仍生資不給則轉為工商不得已而為盗賊宜早定鄉役利害以時施行會帝閲内藏庫奏有衙前越千里輸金七錢庫吏邀乞踰年不得還者帝重傷之乃詔條例司講立役法條例司言使民出泉顧役即先王致民財以禄庶人在官者之意願條諭諸路凡有産業物力而舊無役者今當出泉以助役計户産業若家資之貧富上下分為五等歲以夏秋隨等輸錢鄉户自四等坊郭自六等以下勿輸析居者隨所析而定降其等其官户女户寺觀未成丁者皆減半輸用其錢募三等以上税户代役隨役輕重制禄坊郭三年鄉村五年農隙集衆稽其物産考其貧富察其詐偽為之升降若故為高下者以違制論募法三人相任衙前仍供物産為抵弓手試武藝典吏試書計以三年或二年乃更為法既具掲示一月民無異辭著為令令下募者執役被差者得散去天下土俗不同役重輕不一民貧富不等從所便為法凡當役人户以等第出錢名免役錢其坊郭等第户及未成丁單丁女户寺觀品官之家舊無供役而出錢者名助役錢凡敷錢先視州若縣應用雇直多少隨户等均取雇直既已用足又率其數增取二分以備水旱欠閣謂之免役寛剰錢于是先令開封府界試用其法而遣劉彞謝鄉材候叔獻程顥盧秉王汝翼曽伉王廣亷八人行諸路相度農田水利稅賦科率徭役利害蘇轍言役人之不可不用鄉户猶官吏之不可不用士人也有田以為生故無逃亡之憂朴魯而少詐故無欺嫚之患今乃舍此不用而用浮浪不根之人竊恐掌財者必有盜用之姦捕盜者必有竄逸之弊唐楊炎為兩税取大厯十四年應于賦歛之數以定兩税之額則租調與庸既兼之矣今兩税如舊奈何復取庸錢且品官之家復役已久盖古者國子俊造將用其才者皆復其身胥史賤吏既用于官者皆復其家聖人舊法良有深意奈何至于官户而又將役之耶不聽五月罷宣徽北院使王拱辰拱辰與王安石議新法不合安石惡之㑹富弼曽公亮有故遂出拱辰判應天府罷翰林學士知開封府滕甫初甫同修起居注帝召問治亂之道對曰治亂之道如黒白東西所以變色易位者朋黨汨之也帝曰卿知君子小人之黨乎曰君子無黨譬之草木綢繆相附者必蔓草非松柏也朝廷無朋黨雖中主可以濟不然雖上聖亦殆帝以為名言至是以翰林學士知開封府甫在帝前論事如家人父子言無文飾洞見肝鬲帝知其誠盡事無巨細人無親疎輙皆問之甫隨事解答不少嫌𨼆王安石方議新法恐甫言而帝信之也因出之鄆州尋徙知定州至郡言新法之害且曰臣始以意度其不可耳既為郡乃親見之願下一明詔罷之弗納置賣鹽場于永興軍罷通商法薛向謂即永興軍置賣鹽埸以邊費錢十萬緡儲永興為鹽鈔本而罷通商從之罷知諫院錢公輔公輔言滕甫不宜去薛向變法當黜拂王安石意出知江寕府以韓維為翰林學士維言百執事各有職惟當責任若代之行事最為失體天下大事不可猝為人君設施自有先後帝嘉納之六月罷御史中丞吕誨王安石執政帝倚任之士大夫多以為得人吕誨獨言其不通時事大用之則非所宜會著作佐郎章辟光上言帝弟岐王顥冝遷居外邸皇太后大怒帝令治其離間之罪王安石謂無罪誨請下辟光吏帝不從誨刻安石曰安石外示朴野中藏巧詐陛下悦其才辯而委任之安石初無逺畧惟務改作立異罔上欺下文言飾非誤天下蒼生必此人也如久居廟堂必無安静之理辟光之謀本安石吕惠卿所導辟光揚言朝廷若深罪我我終不置此二人故安石力加營救願察于𨼆伏質之士論然後知臣言之當否帝方眷注安石還其章疏誨遂求去帝謂曾公亮曰若出誨恐安石不自安安石曰臣以身許國陛下處之有義臣何敢以形迹自嫌茍為去就乃出誨知鄧州誨之將有言也司馬光勸止之誨曰安石雖有時名然好執偏見輕信姦回喜人佞已聽其言則美施於用則疎置諸宰輔天下必受其禍且上新即位所與圖治者二三執政而已茍非其人将敗國事此乃腹心之疾救之惟恐不逮顧可緩耶誨既斥安石益橫光由是服誨之先見自以為不及也誨三居言職始論陳旭次論歐陽修最後論王安石凡三見黜人推其鯁直以吕公著為御史中丞王安石嗛吕公弼不附已乃白用公弼弟知開封府公著為中丞以偪之公弼果力求去帝不許公著言于帝曰惟人君去偏聽獨任之弊而不主先入之言則不為邪説所亂矣帝曰善罷翰林學士權開封府鄭獬獬不肯行新法王安石惡而出之杭州秋七月乙丑朔日有食之行均輸法以薛向領其事均輸之法所以通天下之貨制為輕重斂散之術使輸者既便而有無得以懋遷其説始于桑𢎞羊至是條例司言天下財用無餘典領之官拘于弊法内外不相知盈虗不相補諸路上供歲有常數豐年便道可以多致而不能贏餘年儉物貴難於供億而不敢不足逺方有倍蓰之輸中都有半價之鬻徒使富商大賈乗公私之急以擅輕重斂散之權今江浙荆淮發運使實揔六路賦入其職以制置茶鹽礬酒税為事軍儲國用多所仰給宜假以錢貨資其用度周知六路財賦之有無而移用之凡糴買税斂上供之物皆得徙貴就賤因近易逺令預知中都帑藏年支見在之定數所當供辦者得以從便變易蓄買以待上令稍收輕重斂散之權歸之公上而制其有無以便轉輸省勞費去重斂寛農民庶幾國用可足民財不匱詔以發運使薛向領均輸平凖事行于六路賜内藏錢五百萬緡上供米三百萬石時議者慮其為擾多言非便帝不聽薛向既董其事乃請設置官属從之蘇軾言均輸徙貴就賤用近易逺然廣置官属多出緡錢豪商大賈皆疑而不敢動以為雖不明言販賣既已許之變易變易既行而不與商賈爭利者未之聞也夫商賈之事曲折難行其買也先期而與錢其賣也後期而取直多方相濟委曲相通倍稱之息由此而得今先設官置吏簿書廪祿為費已厚非良不售非賄不行是官買之價比民必貴及其賣也弊復如前商賈之利何縁而得朝廷不知慮此乃捐五百萬緡以予之此錢一出恐不可復縱使其問薄有所獲而征商之額所損必多矣帝方惑於王安石不納其言然均輸法亦迄不能就八月貶侍御史劉琦御史錢顗監處衢州鹽酒稅判刑部劉述與王安石爭刑名帝是安石述執奏不已安石白帝詔開封府推官王克臣劾􅄒罪􅄒遂率劉𤦺錢顗共上疏曰安石執政以來未踰數月中外人情囂然胥動盖以專肆胸臆輕易憲度無忌憚之心故也陛下任賢求治常若饑渇故置安石政府必欲致時如唐虞而反操管商權詐之術規以取媚遂與陳升之合謀侵三司利權取為已功開局設官用八人者分行天下驚駭物聽動摇人心去年因許遵文過飾非妄議自首按問之法安石任一偏之見改立新議陛下不察為詔自今謀殺已傷按問欲舉自首者減罪二等遂害天下大公先朝所立制度自宜世世子孫守而勿失乃欲事事更張廢而不用安石自應舉厯官尊尚堯舜之道以倡率學者欲士人之心靡不歸向謂之為賢陛下亦聞而知之遂正位公府遭時得君如此之專乃首建財利之議務為容悦言行乖戾一至于此剛戾自任則又甚焉姦詐專權之人豈宜處之廟堂以亂國紀願早罷逐以慰天下元元之心曽公亮位居丞弼不能竭忠許國反有畏避之意隂自結援以自固寵久妨賢路亦宜斥免趙抃則括囊拱手但務依違大臣事君豈當如是疏上安石奏先貶𤦺顗遂貶𤦺監處州鹽酒務顗監衢州鹽税公亮擬太重安石曰蔣之奇以論歐陽修不實亦貶監當官帝從之司馬光上疏諫曰夫食鷹鸇者求其鷙也鷙而烹之將安用哉今顗等譴謫恐臣下自此以言為諱乞還其本資以靖羣聽不報貶殿中侍御史孫昌齡通判蘄州論新法忤王安石也罷判國子監范純仁初純仁自陜西轉運副使召還帝問陜西城郭甲兵糧儲如何對曰城郭粗全甲兵粗修糧儲粗備帝愕然曰卿之才朕所倚信何為皆言粗對曰粗者未精之辭如是足矣願陛下且無留意邉功若邉臣觀望將為他日意外之患遂拜起居舍人同知諫院純仁奏言王安石變祖宗法度掊克財利民心不寧書曰怨豈在明不見是圖願陛下圖不見之怨帝曰何謂不見之怨對曰杜牧所謂不敢言而敢怒者是也帝曰卿善論事宜為朕條陳古今治亂可為監戒者遂作尚書解以進曰其言皆堯舜禹湯文武周公之事也治天下無以易此願深究而力行之加同修起居注時帝切於求治多延見疎逖小臣咨訪闕失純仁言小人之言聽之若可采行之必有累盖知小忘大貪近昧逺願加深察富弼在相位稱疾家居純仁言弼受三朝眷倚當自任天下之重而恤已深於恤物憂疾過于憂邦致主處身二者胥失弼與先臣素厚臣左諌省不敢私謁以致忠告願示以此章使之自省及薛向行均輸法於六路純仁言臣嘗親奉徳音欲修先王補助之政今乃效桑羊均輸之法而使小人為之掊克生靈歛怨基禍安石以富國强兵之術啟廸上心欲求近功忘其舊學尚法令則稱商鞅言財利則背孟軻鄙老成為因循棄公論為流俗異已者為不肖合意者為賢人劉琦錢顗等一言便䝉降黜在廷之臣方大半趍附陛下又從而驅之其將何所不至道逺者理當馴致事大者不可速成人才不可急求積弊不可頓革儻欲事功急就必為憸佞所乗宜速還言者而退安石答中外之望不聽遂求罷諫職改判國子監去意愈確執政使諭之曰毋輕去已除知制誥矣純仁曰此言何為至于我哉言不用萬鍾非所顧也純仁毎上章疏語多激切帝悉不付外純仁盡録申中書安石大怒乞加重貶帝曰彼無罪姑與一善地命知河中府尋徙成都轉運使以新法不便戒州縣未得遽行安石怒其沮格以事左遷知和州以程顥權監察御史裏行顥河南人舉進士再調晉城令民以事至縣者必告以孝弟忠信度鄉村逺近為伍保使之力役相恤而姦偽無所容凡孤煢殘廢者責之親戚鄉黨使無失所行旅出於其途者疾病皆有所飬鄉必有校暇時親至召父老與之語兒童所讀書親為正句讀教者不善則為易置擇子弟之秀者聚而教之鄉民為社會為立科條旌其善惡使有勸有耻在縣三年民愛之如父母至是吕公著薦為御史帝素知其名數召見毎退必曰頻求對欲常常見卿一日從容咨訪報正午始趍出庭中人曰御史不知上未食乎顥前後進説甚多大要以正心窒欲求賢育才為言務以誠意感悟人主常勸帝昉未萌之欲及弗輕天下士帝俯躬曰當為卿戒之貶判刑部劉述知江州開封獄具述三問不承王安石欲置之獄司馬光范純仁爭之乃議貶通判帝不許以述知江州同判刑部丁諷貶通判復州審刑院詳議官王師元坐言許遵所議刑名不當貶監安州税罷條例司檢詳文字蘇轍轍與吕惠卿論多不合會遣人使于四方求遺利中外知其必迎合生事而莫敢言轍以書抵王安石力陳其不可安石怒將加之罪陳升之止之乃以為河南府推官焉九月立常平給斂法初陜西轉運使李參以部内多戌兵而糧儲不足審訂其缺令民自𨼆度麥粟之贏先貸以錢俟穀熟還官號青苗錢經數年廩有餘糧繼而河北轉運司幹當公事王廣亷奏乞度僧道牒數千道為本錢於陜西運司行青苗法春散秋斂朝廷從之民甚便焉於是條例司言諸路常平廣惠倉錢榖略計貫石可及千五百萬以上斂散未得其宜故為利未博今欲以見在斛斗遇貴量減市價糶遇賤量増市價糴可通融轉運使苗稅及錢斛就便轉易者亦許兌換仍以見錢依陜西青苗錢例願預借者給之隨稅輸納斛斗半為夏料半為秋料内有請本色或納時價貴願輸錢者皆從其便如遇灾傷許展至次料豐熟日納非惟足以待凶荒之患民既受貸則兼并之家不得乗新陳不接以邀倍息又常平廣惠之物收藏積滯必待年儉物貴然後出糶所及者不過城市游手之人今通一路有無貴發賤斂以廣蓄積平物價使農人有以赴時趨事而兼并不得乗其急凡此皆以為民而公家無所利其入是亦先王散惠興利以為耕斂補助之意也欲量諸路錢穀多寡分遣官提舉每州選通判幕職官一員典幹轉移出内仍先自河北京東淮南三路施行俟有緒推之諸路其廣惠倉除量留給老疾貧窮人外餘並用常平倉轉移法詔曰可乃出内庫緡錢百萬糴河北常平粟而常平廣惠倉之法遂變為青苗矣初王安石既與吕惠鄉議以常平糴本散與人户令出息二分春散秋歛一如陜西法令既具出示蘇轍等曰此青苗法也有不便以告勿疑轍曰以錢貸民使出息二分本以救民非為利也然出納之際吏縁為姦雖有法不能禁錢入民手雖良民不免妄用及其納錢雖富民不免踰限如此則恐鞭箠必用州縣之事不勝煩矣唐劉晏掌國計未嘗有所假貸有尤之者晏曰使民僥倖得錢非國之福使吏倚法督責非民之便吾雖未嘗假貸而四方豐凶貴賤知之未嘗逾時有賤必糴有貴必糶以此四方無甚貴甚賤之病安用貸為晏之所言則漢常平法耳今此法見在而患不修公誠能有意於民舉而行之則晏之功可立俟也安石曰君言誠有理當徐思之由是逾月不言青苗㑹京東轉運使王廣淵言方春農事興而民苦乏兼并之家得以乗急要利乞留本道錢帛五十萬貸之貧民歲可獲息二十五萬從之其事與青苗法合安石始以為可用召廣淵至京師與之議於是决意行焉以吕惠卿為崇政殿説書判司農司條例司言常平新法宜付司農司選官主判兼領農田差役水利詔以秘書省著作佐郎吕惠卿為太子中允崇政殿説書兼判司農集賢校理胡宗愈同判之二人為政法益宻矣司馬光諫曰惠卿憸巧非佳士使王安石負謗于中外者皆其所為安石賢而愎不閑世務惠卿為之謀主而安石力行之故天下并指為姦邪近者進擢不次大不厭衆心帝曰惠卿進對明辯亦似美才光對曰惠卿誠文學辯慧然用心不正願陛下徐察之江充李訓若無才何以能動人主帝黙然光又貽書安石曰謟諛之士於公今日誠有順適之快一旦失勢将必賣公自售矣安石不悦冬十月富弼罷王安石用事雅不與弼合弼度不能爭多稱疾求退章數十上帝曰卿即去誰可代卿者弼薦文彦博帝黙然良乆曰王安石何如弼亦黙然遂出判亳州弼恭儉孝敬好善嫉惡常言君子與小人並處其勢必不勝君子不勝則奉身而退樂道無悶小人不勝則交結搆扇千岐萬轍必勝而後已迨其得志遂肆毒於善良求天下不亂不可得也以陳升之平章事升之既相帝問司馬光曰近相升之外議云何對曰閩人狡險楚人輕易今二相皆閩人參政楚人風俗何以更得淳厚帝曰王安石何如對曰人言安石姦邪則毁之太過但不曉事又執拗耳郭逵城綏州夏主秉常既冦秦州復上誓表納安逺塞門二砦以乞綏州詔將許之鄜延宣撫郭逵上言曰此正商於六百里之䇿也非先交二砦不可與綏朝議以為然賜以誓詔令以二砦來歸當還綏州夏王得詔遣其臣罔萌訛來言欲先得綏郭逵命機宜趙卨等如夏交所納二砦且定地界夏主使罔萌訛對曰朝廷本欲得二砦地界非所約卨曰然則塞門安逺二墻墟耳安用之二砦之北舊有三十六堡且以長城嶺為界西平王祥符所移書固在也罔萌訛語塞卨以夏人渝盟請城綏州逵從之改名綏徳城以嵬名山為供備庫使賜姓名曰趙懷順十一月詔韓綘制置三司條例陳升之既相詔以綘代其任王安石毎奏事綘必曰臣見安石所陳非一皆至當可用陛下宜省察安石恃以為助頒農田水利法頒農田水利約束於諸路由是爭以水利為言矣置交子務于潞州以河東運鐵錢公私勞費故也已而轉運司言其法行則鹽礬不售有害入中糧草罷之罷開封府判官趙瞻帝問瞻曰青苗法便乎瞻對曰唐行之於末世擾攘中以掊民財使者豈可為長久計耶王安石怒出為陜西轉運副置提舉常平廣惠倉官條例司上言民間多願借貸青苗錢乞遍下諸路轉運使施行及議置提舉官時天下當平錢穀見在一千四百餘萬貫石乃詔諸路各置提舉二員以朝官為之管當一員京官為之掌常平廣惠倉兼管勾農田水利差役事諸路凡四十一人提舉官既置徃徃迎合王安石之意務以多散為功富民不願取貧者乃欲得之即令隨户等髙下品配又令貧富相兼十人為保首王廣淵在京東一等户給十五千等而下之至五等猶給一千民間喧然以為不便廣淵入奏謂民皆歡呼感德諫官李常御史程顥論廣淵抑配掊克迎朝廷㫖意以困百姓㑹河北轉運使劉庠不散青苗錢奏適至安石曰廣淵力主新法而遭劾劉庠欲壞新法而不問舉事如此安得人無向背由是常顥之言不行十二月知青州鄭獬乞罷從之獬上言青苗之害不忍無罪之民䧟于憲網乞罷官從之下龍圖閣學士祖無擇秀州獄貶為忠正軍節度副使祖無擇與王安石同知制誥安石嘗辭一家所饋潤筆物其人固不受安石取寘諸院梁上安石憂去無擇用為公費安石聞而惡之及安石得政乃諷監司求無擇罪㑹知明州苗振以貪聞御史王子韶使兩浙亷其狀因迎安石意遂連無擇在杭州貪賄時無擇知通進銀臺司自京師逮赴秀州獄遂誣伏坐謫安石因言于帝曰陛下遣一御史出即得無擇罪乃知朝廷于事但不為未有為之而無效者無擇以言語政事為時名卿被誣放棄士論惜之遼加耶律伊遜太師北院樞宻使魏王伊遜用事久勢振中外門下饋賂不絶凡阿順者䝉薦擢忠直者輙斥竄至是加太師詔四方有軍旅許以便宜從事王韶乞治秦州間田許之貶秦鳳經略使李師中知舒州師中在秦持重緫大體王韶築渭涇上下兩城屯兵以脇武勝軍撫納洮河諸部下師中議師中以為不便詔師中罷帥事韶又言渭源至秦州良田不耕者萬頃願置市易司頗籠商賈之利取其贏以治田乞假官錢為本詔秦鳯經略司以川交子易物貨給之命韶領市易事師中言韶所指占乃極邉弓箭手地耳又將移市易司於古渭恐秦州自此益多事所得不補所亡王安石主韶議為削師中職徙知舒州而以竇舜卿知秦州且遣李若愚按實若愚至問田所在韶不能對舜卿檢索僅得地一頃既而地主有訟又歸之矣若愚奏其欺安石又為謫舜卿而以韓縝知秦州縝遂附會實其事乃進韶太子中允初師中仕州縣邸狀報包拯參知政事或云朝廷自此多事矣師中曰包公何能為今知鄞縣王安石者眼多白甚似王敦他日亂天下者必斯人也世貴其先識庚戍三年遼咸雍六年春正月判尚書省張方平乞罷許之方平以王安石變更法制力請外任出知陳州陛辭極論新法之害帝為之憮然二月陜西安撫使韓𤦺乞罷常平新法王安石遂稱疾不朝詔諭之乃復視事陜西路安撫使韓𤦺上疏曰臣凖散青苖詔書務在惠小民不使兼并乗急以要倍息而公家無所利其入今所立條納乃自鄉户一等而下皆立借錢貫陌三等以上更許增借坊郭户有物業勝質當者亦依鄉户例支給且鄉户上等并坊郭有物業者乃從來兼并之家今令多借之錢一千令納一千三百則是官自放錢取息與初詔絶相違戾又條約雖禁抑勒然湏上户為甲頭以任之民愚不慮久逺請時甚易納時甚難故自制下以來上下惶惑皆謂若不抑散則上户必不願請近下等第與無業客户雖或願請必難催納將來必有用刑督索及勒干係書手典押耆户長同保均陪之患若謂陜西嘗行其法官有所得而民以為便此乃轉運司行於一時者今乃建官置司以為毎歳所行之法而取利三分豈陜西權宜之比哉乞罷提舉官第委提㸃刑獄依常平舊法施行帝袖其疏以示執政曰𤦺真忠臣雖在外不忘王室朕始謂可以利民今乃害民如此且坊郭安得青苗而使者亦强與之王安石勃然進曰茍從其所欲雖坊郭何害因難𤦺奏曰陛下修常平法以助民至于收息亦周公遺法也如桑𢎞羊籠天下貨財以奉人主私用乃可謂興利之臣今抑兼并振貧弱置官理財非所以佐私欲安可謂興利之臣乎帝終以𤦺説為疑安石遂稱疾不出帝諭執政罷青苗法曽公亮陳升之欲即奉詔趙抃獨曰新法皆安石所建不若俟其出由是連日不决安石因求去帝命司馬光草答詔有士夫沸騰黎民騷動之語安石怒抗草自辯帝為巽辭謝之且命吕惠卿諭㫖韓綘又勸帝留安石安石入謝因言中外大臣從官臺諫朝士朋比之情且日陛下欲以先王之正道勝天下流俗今姦人欲敗先王之正道以沮陛下之所為此所以紛紛也帝以為然安石乃起視事持新法益堅詔以𤦺奏付制置條例司安石令翰林學士兼三司使曽布條析其不然刋石頒之天下𤦺申辯愈切且論安石妄引周禮以惑上聽皆不報時文彦博亦以青苗之害為言帝曰吾遣二中使親問民間皆云甚便彦博曰韓𤦺三朝宰相不信不信二宦者乎先是安石隂結入内副都知張若水押班藍元震為助帝遣使潜察府界俵錢事適命二人二人使還極言民情深願無抑配者故帝信之不疑以司馬光為樞密副使固辭許之光素與王安石厚及行新法光援朋友責善之義貽書反覆開陳其不然至于再三安石不樂㑹帝御邇英閣聽講光讀曹參代蕭何帝曰漢常守蕭何之法不變可乎光對曰寧獨漢也使三代之君常守禹湯文武之法雖至今存可也漢武取髙帝約束紛更盜賊半天下元帝改孝宣之政漢業遂衰由此言之祖宗之法不可變也吕惠卿言先王之法有一年一變者正月始和布法象魏是也有五年一變者廵狩考制度是也有三十年一變者刑罰世輕世重是也光言非是其意以風朝廷耳帝問光問對曰布法象魏布舊法也諸侯變禮易樂者王巡狩則誅之不自變也刑新國用輕典亂國用重典是為世輕世重也非變也且治天下譬如居室敝則修之非大壞不更造也公卿侍從皆在此願陛下問之三司使掌天下財不才而黜之可也不可使執政侵其事今為制置三司條例司何也宰相以道德佐人主安用例茍用例則胥吏矣今為看詳中書條例司何也惠卿辭塞乃以他語抵光帝曰相與語是非耳何至是光又言青苗之弊曰平民舉錢出息尚能蠶食下户至饑寒流離况縣官督責之威乎惠卿曰青苗法願則與不願不强也光曰愚民知取債之利不知還債之害非獨縣官不强富民亦不强也太宗平河東立糴法時米斗十錢民樂與官為市其後物貴而和糴不解遂為河東世世患臣恐異日之青苗亦猶是也帝曰陜西行之久民不為病光曰臣陜西人也見其病不見其利朝廷初不許有司尚能以病民况法許之乎時又令諸軍餘糧願糶入官者計價支錢復儲其米於倉名曰坐倉帝以問光光對曰倉有儲粟庫無見錢非利也惠卿曰得米百萬斛則省東南之漕以其錢供京師光曰東南錢荒而粒米狼戾今不糴米而漕錢棄其有餘取其所無農末皆病矣他日又對帝曰今天下洶洶者孫叔敖所謂民之有是衆之所惡也光曰然陛下當論其是非今條例司所為獨安石韓綘惠卿以為是耳陛下豈能獨與此三人共為天下耶帝欲大用光訪之安石安石曰光外託劘上之名内懷附下之實所言盡害政之事所與盡害政之人而欲寘之左右使預國論此消長之機也光才豈能害政但在高位則異論之人倚以為重韓信立漢赤幟趙卒氣奪今用光是與異論者立赤幟也及安石稱疾不出帝乃以光為樞宻副使光辭曰陛下所以用臣盖察其狂直庻有補于國家若徒以禄位榮之而不取其言是以天官私非其人也臣徒以禄位自榮而不能救生民之患是盜竊名器以私其身也陛下誠能罷制置條例司追還提舉官不行青苗助役法雖不用臣臣受賜多矣今言青苗之害者不過謂使者騷動州縣今日之患耳而臣之所憂乃在十年之外非今日也夫民之貧富由勤惰不同惰者常乏故必資於人今出錢貸民而歛其息富者不願取使者以多散為功一切抑配恐其逋負必令貧富相保貧者無可償則散而之四方富者不能去必責使代償數家之負春筭秋計展轉日滋貧者既盡富者亦貧十年之外百姓無復存者矣又盡散常平本錢榖專行青苗他日若思復之將何以取富室既盡常平已廢加之以師旅因之以饑饉民之羸者必委死溝壑壯者必聚而為盜賊此事之必至者也疏凡九上帝使謂之曰樞宻兵事也官各有職不當以他事為辭光對曰臣未受命則猶侍從也於事無不可言者㑹安石復起視事乃下詔允光辭收還勅誥知通進銀臺司范鎮封還詔㫖者再帝以詔直赴光不由門下鎮奏曰由臣不才使陛下廢法乞解其職不許授河州刺史瞎欺丁木征金紫光禄大夫陜西四路安撫使韓琦請罷許之𤦺以論青苗不見聽上疏請解四路止領大名府路王安石欲沮𤦺即從之三月始䇿試舉人罷詩論賦三題帝篤意經學深閔貢舉之弊且以西北人材多不在選遂議更法王安石言古之取士俱本于學請興學校以復古其明經諸科欲行廢罷取明經人數増進士額乃下詔曰化民成俗必自庠序進賢興能抑繇貢舉而四方執經藝者專于誦數趍鄉舉者狃于文辭與古所謂三物賓興九年大成亦已盭矣今下郡國招徠雋賢其教育之方課試之格令兩制兩省待制以上御史三司三館雜議以聞㑹親試舉人遂専以策罷詩賦論三題䇿定限以千字於是賜第者八百二十九人葉祖洽䇿言祖宗多因循茍簡之政陛下即位革而新之遂擢第一帝謂執政曰對䇿亦何足以實盡人才然愈於以詩賦取人爾舊制進士入進謝恩銀百兩至是罷之仍賜錢三千為期集貢立刑法科立試刑法及詳刑官試律令刑統大義斷按所以待諸科之不能業進士者貶知審官院孫覺知廣德軍帝初即位將大革積弊覺時為右正言上疏論弊政固不可不革革而當其悔乃亡帝稱其知理嘗與語及知人之難覺曰知人之要在于知言人主知人之道任賢使能而已陛下欲興太平之治而所擢數十人者多有口才而無實行臣恐日乆月長彚征牆進充滿朝廷之上則賢人日去正人曰逺其為患禍尚可以一二言之哉願無速于小利近功則王道可成矣既而罷去王安石早與覺善將援以為助自知通州召還累改知審官院時吕惠卿用事帝問于覺覺對曰惠卿辯而有才過於人數等特以為利之故屈身于安石安石不悟臣竊以為憂帝曰朕亦疑之青苗法行㑹議者謂周官泉府民之貸者至輸息二十而五國事之財用取具焉覺條奏其妄曰成周賖貸特以備民之緩急不可徒與也故以國服為之息然國服之息説者不明鄭康成釋經乃引王莽計贏受息無過歲什一為據不應周公取息重於莽時况載師所任地漆林之征特重所以抑末作也今以農民乏絶將補耕助歛顧未作而征之可乎國事取具盖謂泉府所領若市之不售貨之滯於民用有買有予并賖貸之法而舉之儻專取具于泉府則冡宰九賦將安用耶聖世宜講求先王之法不當取疑文虛説以圖治今老臣疎外而不見聽輔臣遷延而不就職門下執正而不行諌官請罪而求去臣誠恐姦邪之人結黨連伍乗衆情之恟恟動摇朝廷釣直干譽非國家之福也安石覽之怒覺適以事詣中書安石以語動之曰不意學士亦如此始有逐覺意會曽公亮言畿縣散青苗錢有追呼抑配之擾安石遣覺行視虗實覺言民實不願與官中相交所有體量望賜寢罷遂坐奉詔反覆貶知廣德軍夏四月貶御史中丞吕公著知潁州監察御史王子韶等皆罷青苗法行公著上疏曰自古有為之君未有失人心而能圖治亦未有脅之以威勝之以辯而能得人心者也昔日之所謂賢者今皆以此舉為非而主議者一切詆為流俗浮論豈昔皆賢而今皆不肖乎王安石怒其深切㑹帝使公著舉吕惠卿為御史公著曰惠卿固有才然姦邪不可用帝以語安石安石益怒誣其言韓𤦺欲因人心如趙鞅興晉陽之甲以逐君側之惡貶知潁州且命知制誥宋敏求草制明著罪狀敏求不從但言敷陳失實安石怒白于帝命陳升之改其語行之由是御史王子韶等皆罷去趙抃罷自新法行抃數言其非便㑹安石稱疾帝將改其法而抃請俟安石出安石出而持初議益堅抃始大悔上疏言制置條例司建使者四十餘輩騷動天下安石强辯自用詆天下公論以為流俗違衆罔民順非文過近者臺諌侍從多以言不聽而去司馬光除樞宻不肯拜且事有輕重體有小大財利于事為輕而民心得失為重青苗使者於體為小而禁近耳目之臣用舍為大今舍重而取輕失大而得小懼非宗廟社稷之福也奏入懇求去位乃出知杭州抃長厚清修為政善因俗施教寛猛不同以惠利為本韓琦稱為人中標表已不及也以韓絳參知政事監察御史程顥乞罷許之時新法行中外皆以為非攻王安石甚力顥以御史被㫖赴中臺議事安石方怒言者厲色待之顥徐言曰天下事非一家私議願平氣以聽之安石為之媿屈自安石用事顥未嘗一語及於功利嘗因論時政最後言曰智者若禹之行水行其所無事也舍而之險阻不足以言智自古興治立事未有中外人情交謂不可而能有成者况于排斥忠良沮廢公議用賤凌貴以邪姦正者乎正使僥倖有小成而興利之臣日進尚徳之風寖衰尤非朝廷之福青苗等法行顥與吕公著孫覺李常張戩等上疏極諌不聽遂乞去言職安石素與顥善及是雖不合猶敬其忠信不深怒之但出為京西路同提㸃刑獄顥固辭乃改授簽書鎮寧軍節度判官貶知諫院李常通判滑州青苗法立常請勿收息王安石不從常上疏曰條例司始建已致中外之議至于均輸青苗斂散取息傅㑹經義人且大駭何異王莽猥析周官片言以流毒天下安石見之遣所親宻諭意常不為止又言州縣散常平錢實不出本勒民出息帝詰安石安石請令常具官吏主名常以非諌官體遂落職通判滑州貶監察御史裏行張戩知公安縣戩上疏論王安石亂法曾公亮陳升之趙抃依違不能救正韓綘左右徇從李定以邪謟竊臺諌吕惠卿刻薄辯給假經術以文姦言豈宜勸講君側書數十上又詣中書爭之安石舉扇掩面而笑戩曰戩之狂直宜為公笑然天下之笑公者不少矣趙抃從傍解之戩曰公亦不得為無罪抃有愧色戩以言不聽稱病待罪遂貶知公安㝷徙監司竹監至舉家不食筍戩載之弟也以李定為監察御史裏行罷知制誥宋敏求蘇頌李大臨及同知諫院胡宗愈李定為秀州判官孫覺薦之朝召至京師李常見之問曰君從南方來民謂青苗法如何定曰民便之無不喜者常曰舉朝方共爭是事君勿為此言定即徃白王安石且曰定但知據實以言不知京師乃不許安石大喜謂曰君且得見盍謂上道之立薦對帝問青苗事定曰民甚便之於是諸言新法不便者帝皆不聽命定知諫院宰相言前無選人除諫官之比遂拜太子中允監察御史裏行同知諫院胡宗愈言御史當用學士及丞雜論薦又須官博士員外郎今定以幕職得之不可㑹知制誥宋敏求蘇頌李大臨等言定不由銓考擢授朝列不縁御史薦寘憲臺雖朝廷急于用才度越常格然隳紊法制所益者小所損者大封還制書詔諭數四頌等執奏不已並坐累格詔命落知制誥敏求以右諫議大夫奉朝請頌歸工部郎中班大臨出知汝州天下謂之熈寧三舍人胡宗愈復力爭之安石怒併出宗愈通判真州以謝景温為侍御史知雜事謝景温王安石之姻家也安石以外論紛紛言於帝而用之知金州張仲宣有罪詔免刑流海外仲宣坐枉法贓法官援知台州李希輔例杖眷黥配海島判審刑院蘇頌言于帝曰古者刑不上大夫仲宣官五品今黥之使與徒𨽻為伍雖其人無可矜所重者汙辱衣冠耳帝曰善詔免杖黥而流海外因著為令五月詔罷制置三司條例以其事還中書王安石復稱疾不朝詔諭之乃起視事初陳升之欲傅㑹王安石以固其位安石亦患正論盈廷引升之為助升之知其不可而竭力為之用安石德之故先使正相位升之既相乃時為小異陽若不與之同者因言于帝曰宰相無所不統所領職事豈可稱司請罷制置三司條例司安石曰古之六卿即今執政有司馬司徒司冦司空各名一職何害于理升之曰若制置百司條例則可但令制置三司一官則不可帝意未決㑹判大名府韓𤦺上言條例司雖大臣所領然止是定奪之所今不闗中書而徑自行下則是中書之外又一中書也由是制置三司條例遂罷以其事歸中書而常平新法則付司農寺命吕惠卿同判之兼領農田水利差役帝恐傷安石之意以手札開諭安石自是與升之不協因稱疾久不起帝敦諭數四安石乃出世亦以是薄升之為人稱曰筌相遼立賢良科時遼放進士至百四十人復設賢良科令進是科者先以所業十萬言進六月以李定為崇政殿説書罷監察御史陳薦御史陳薦言定頃為涇縣主簿聞庶母仇氏死匿不為服詔下江東淮浙轉運使問狀奏云定嘗以父老求歸侍養不云持所生母服定自辯言實不知為仇氏所生故疑不敢服而以侍養辭官曾公亮謂定當行追服王安石力主之罷薦御史而改定為崇政殿説書秋七月吕公弼罷公弼以王安石變法數勸其宜務安靜安石不悦公弼具疏將論之從孫嘉問竊其藁以示安石安石先白之帝怒遂罷公弼知太原府吕氏號嘉問為家賊云以馮京為樞密副使罷監察御史林旦薛昌朝范育徙李定檢正中書吏房昌朝旦育論定乃不孝之人豈宜居勸講之地併論王安石之罪章六七上安石又白罷三人定亦不自安求解説書乃檢正中書吏房直舍人院同判太常寺八月夏人冦環慶州以韓綘為陜西宣撫使先是夏人築閙訛堡知慶州李復圭合蕃漢兵三千遣禆將李信种詠劉甫等禦之信等大敗而還復圭懼欲自解即執信等斬之復出兵追夏人殺其老幼二百以功告㨗而邉釁大啟矣至是夏人大舉入環慶攻大順城柔逺砦荔原堡淮安鎮東西谷業樂鎮兵多者號二十萬少者不下一二萬屯于榆林游騎至慶州城下九日乃退鈐轄郭庻等數人死焉韓綘請行邉王安石亦請徃綘曰朝廷方賴安石臣宜行乃以綘為陜西宣撫使幾事不可待報者便宜施行授以空名告敇得自除吏尋命兼河東宣撫使判司農司吕惠卿以父䘮去職以曾布代之以劉庠知開封府庠不肯屈事王安石安石欲見之而不可或以為言庠曰安石自執政未嘗一事合人情徃將何語耶卒不徃而上疏極言新法非是帝曰奈何不與大臣協心濟治乎庠對曰臣知事陛下而已不敢附安石也九月曾公亮罷公亮方厚莊重沈深周宻謹繩墨蹈規矩明練文法習知朝廷典憲初嫉韓琦故薦王安石以間之及與安石同輔政知帝方向之隂為子孫計凡更張庶事一切聽順而外若不與之者嘗遣其子孝寛參其謀至帝前略無所異由是帝益信任安石安石深德之以老求去遂拜司空兼侍中蘇軾嘗從容責公亮不能救正變更公亮曰上與介甫如一人此乃天也世譏其不忠以馮京參知政事呉充為樞密副使京為中丞嘗上疏論王安石更張失當累數千言安石指為邪説請黜之帝不從而亟用之䇿賢良方正之士罷台州推官孔文仲還故職詔舉賢良帝親策之太原判官吕陶對曰陛下初即位願不惑理財之説不間老成之謀不興疆場之事陛下措意立法自謂庶幾堯舜然以陛下之心如此天下之論如彼獨不反而思之乎及奏第帝顧王安石取卷讀讀未半神色頗沮帝覺之使馮京竟讀稱其言有理㑹范鎮所薦台州推官孔文仲對䇿凡九千餘言力論安石所建理財訓兵之法非是宋敏求第為異等安石怒啟帝御批罷文仲還故官齊恢孫固封還御批韓維陳薦孫永皆力論文仲不當黜帝不聽范鎮上疏曰文仲草茅疎逺不識忌諱且以直言求之而又罪之恐為聖明之累亦不聽蘇頌嘆曰方朝廷求賢知饑渇有如此人而不見録豈其論太髙而難合耶言太激而取怨耶吕陶亦止授通判蜀州司馬光范鎮見陶曰自安石用事吾輩言不復效不意君及此平生聞望在兹一舉矣作東西府居執政也翰林學士司馬光乞罷許之光力求去乃以端明殿學士知永興軍貶知山隂縣陳舜俞監南康軍鹽酒稅青苗法行舜俞不肯奉令上疏深陳其害且自劾曰民間出舉財物取息重止一倍約償緡錢而穀粟布縷魚鹽薪蓛耰鋤釜錡之属得雜取之朝廷募民貸取有司約中熟為價而必償緡錢欲如私家雜償他物不可得故愚民多至賣田宅質妻孥有識耆老戒其鄉黨子弟未嘗不以貰貸為苦祖宗著令以財物相出舉任從書契官不為理其保全元元之意深逺如此今乃官自出舉誘之以便利督之以威刑方之舊法異矣詔謂振民乏絶而抑兼并然使十户為甲浮浪無根著者毋得給俵則乏絶者已不䝉其惠此法終行愈為兼并地爾何以言之天下之有常平非能人人計口受餉但權穀價貴賤之柄使積貯者不得深藏以邀利耳今散為青苗唯恐不盡萬一饑饉荐至必有乗時貴糶者未知將何法以制之官制既放錢取息富室藏鏹坐待鄰里逋欠之時田宅妻孥隨欲而得是豈不為兼并利哉雖分為夏秋二科而秋收之月與夏歛之期等夏放之月與秋斂之期等不過展轉計息以給為納使吾民終身以及世世毎歲兩輸息錢無有窮已是别為一賦以敝海内非王道之舉也奏上謫監南康軍鹽酒税時又有知陳留縣姜潜到官才數月青苗令下潜即榜於縣門又移之鄉村各三日無人至遂撤榜付吏曰民不願矣府寺疑潜壅令令其属按驗無違令者潜知不免即移疾去山隂陸佃嘗受經於王安石至是因應舉入京師安石問以新政佃曰法非不善但推行不能如初意還為擾民如青苗是也安石驚曰何為乃爾吾與惠卿議之又訪外議佃曰公樂聞善古所未有然外間頗以為拒諫安石笑曰吾豈拒諌者但邪説營營顧無足聽佃曰是乃所以致人言也明日召佃謂之曰惠卿言私家取債亦須一雞半豚已遣李承之使淮南質究矣既而承之還詭言民無不便佃説遂不行宣徽北院使張方平乞罷許之帝問祖宗禦戎之要方平對曰太祖不勤逺略如靈夏河西皆因其酋豪許之世襲環州董遵晦西山郭進闗南李漢超皆優其禄賜寛其文法諸将財用豐而威令行間諜精審吏士用命故能以十五萬人而獲百萬之用及太宗謀取燕薊又内徙李彞興馮暉於是朝廷始旰食矣真宗澶淵之克與契丹盟至今人不識兵革三朝之事如此近歲疆場之臣乃欲試天下於一擲事成徼利不成貽患不可聽又曰王安石舉累朝之令典一旦削除之其意安在陛下何不詰之帝頗采其言安石深惡之方平亦力求去乃出判應天府冬十月陳升之以母喪去位翰林學士范鎮乞致仕從之鎮上疏曰臣言不行無顔復立于朝請謝事臣言青苗不見聽一宜去薦蘇軾諫官孔文仲制舉不見用二宜去李定避持服遂不認母壞人倫逆天理而欲以為御史御史臺為之罷陳薦舍人院為之罷宋敏求李大臨蘇頌諫院為之罷胡宗愈王韶上書肆意欺㒺以興造邉事事敗則置而不問反為之罪帥臣李師中及御史謝景温一言蘇軾則下七路掎摭其過執政不悦孔文仲則遣之歸任以此二人况彼二人事理孰是孰非孰得孰失其能逃聖鑑乎因復極言青苗之害且曰陛下有納諌之資大臣進拒諫之計陛下有愛民之性大臣用殘民之術疏入王安石大怒持其疏至手顫乃自草制極詆之遂以户部侍郎致仕凡所宜得恩典悉不與鎮表謝略曰願陛下集羣議為耳目以除壅蔽之姦任老臣為腹心以養平和之福天下聞而壯之蘇軾徃賀曰公雖退而名益重矣鎮愀然曰君子言聽計從消患于未萌使天下隂受其賜無智名無勇功吾獨不得為此使天下受其害而吾享其名吾何心哉日與賓客賦詩飲酒或勸使稱疾杜門鎮曰死生禍福天也吾其如天何司馬光嘗曰吕獻可之先見范景仁之勇決皆予所不及也十一月夏人冦大順城燕達敗之十二月立諸路更戌法舊以兵雜戌者遣還本路立保甲法初太祖懲五代之弊用趙普䇿收四方勁兵列營京畿以備宿衛分畨屯戌以捍邉圉于時将帥之臣入奉朝請獷暴之民收𨽻尺籍雖有桀驁恣肆而無所施其間為什長之法階級之辨使之内外相維上下相制截然而不可犯其後定兵制大抵三者而已天子之衛兵以守京師備征戍者曰禁軍諸州之鎮兵以分給役使者曰廂軍選于户籍或應募使之團結以為所在防守者曰鄉軍其外則蕃兵也及帝即位論租庸調法而善之王安石對曰此法近井田後世立事粗得先王遺意則無不善今亦無不可為顧難速成耳又曰人主誠能知天下利害以其所謂害者制法而加于兼并之人則人自不敢保過限之田以其所利者制法而加于力耕之人則人自勸于力耕而授田不能過限然此湏漸乃能成法使人主誠知利害之權因以好惡加之則所好何患人之不從所惡何患人之不避若人主無道以揆之則多為異議所奪雖有善法何由立哉帝言府兵與租庸調相須安石對曰今義勇士軍上畨供役既有廩給則無貧富皆可以入衛出戌雖無租庸調法亦自可為帝又言節財用安石對以減兵最急今若練募兵而鼓舞河北陜西三路之民習兵則兵可省欲公私財用不匱為宗社長久計則募兵之法誠當變革於是變募兵而立保甲其法十家為保選主户有幹力者一人為長五十家為一大保選一人為大保長十大保為一都保選為衆所服者為都保正又以一人為之副應主客户兩丁以上選一人為保丁附保兩丁以上有餘丁而壯勇者亦附之内家資最厚材勇過人者亦充保丁授之弓弩教之戰陣毎一大保聽輪五人警盜凡告捕所獲以賞格從事同保犯强盗殺人放火强姦略人傳習妖教造畜蠱毒知而不告依律伍保法餘事非干已又非敕律所聽紏皆毋得告雖知情亦不坐若于法類保合坐罪者乃坐之其居停强盜三人經三日保鄰雖不知情科失覺罪逃移死絶同保不及五家併他保有自外入保者收為同保户數足則附之俟及十家則别為保置牌以書其户數姓名葢以捕盗賊相保任而肄武事也于是提㸃刑獄趙子幾迎安石意請先行於畿甸詔從之遂推行於永興秦鳳河北東西五路以達于天下諸州籍保甲聚民而教之禁令苛急徃徃去為盗郡縣不敢以聞判大名府王拱辰抗言其害曰非止困其財力奪其農時是以法驅之使䧟于罪罟也浸淫為大盜其兆已見縱未能盡罷願裁損下户以紓之主者指拱辰為沮法拱辰曰此老臣所以報國也抗章不已帝悟由是第五科户得免以韓綘王安石平章事王珪參知政事時綘開幕府於延安詔即軍中拜之尋命安石提舉編修三司珪為翰林學士承㫖典内外制十八年嘗因齋宫賦詩有所感嘆帝聞而憐之遂拜參知政事行免役法于天下免役法行于開封府既罷衙前八百三十人畿縣鄉役數千吕惠卿林旦曽布相繼主其事遂行於諸路於是兩浙提舉常平張靚率民助役錢至七十萬薛向為帝言之帝問王安石安石對曰提舉官據數取之朝廷以恩惠科減于體為順既而東明縣民數百詣開封府訴超升等第不受遂突入安石私第安石諭以相府不知訴之御史臺臺亦不受諭令散去帝知之以詰安石安石對曰知縣賈蕃乃范仲淹之壻好附流俗致民如是夫治民當知其情偽利病不可示姑息若縱之使妄經臺省嗚鼓邀駕恃衆僥倖則非所以為政未幾酸棗縣升户等皆失實帝問安石曰酸棗既有自下户升入上户則四等有免輸役錢之名而無其實安石言嘗取諸縣新舊籍對覆升降聞外間扇摇役法者謂輸多必有贏餘若羣訴必可免彼既聚衆僥倖茍受其訴與免輸錢當仍役之帝乃盡用其言遣察訪使徧行諸路促成役書既上之司農乃頒募役對法於天下臺諌多以為言帝謂安石宜少裁之安石曰朝廷制法當斷以義豈須規規恤淺近之人議論耶司馬光曰上等人户自來更互充役有時休息今使歲出錢是常無休息之期也下等人户及單丁女户從來無役今盡使之出錢是鰥寡孤獨之人俱不免役也夫力者民之所生而有者穀帛者民可耕桑而得也至于錢者縣官之所鑄民之所不得私為也故古之用民者各因其有而取之農民之役不過出力税不過穀帛不責民所無也今有司立法惟錢是求歲豐則民賤糶其穀歲凶則伐桑棗殺牛賣田得錢以輸民何以為生乎是以免役法行富室差得自寛貧者困窮日甚矣知長葛縣樂京知湖陽縣劉䝉皆以助役故投劾去職詔皆奪其官折克柔卒以其弟克行權知府州事辛亥四年遼咸雍七年元夏天賜禮盛國慶年春正月韓綘使种諤帥師襲夏人于囉兀大敗之遂城囉兀韓綘素不習兵事開幕府于延安措置􅆾方選蕃軍為七軍復以种諤為鄜延鈐轄知青澗城任信之命諸將皆受其節制蕃兵皆怨望諤謀取横山乃帥師襲夏人于囉兀大敗之因以衆二萬城焉自是夏人曰聚兵為報復計言者以諤稔邉患不便宜戒之弗聽已而綘言諤入夏之功乞加旌賞詔遣使撫問粥廣惠倉田廣惠倉田本絶户業以賑濟者也王安石請粥之以為河北東西陜西京東四路常平倉本錢詔從之二月更定科舉法罷詩賦及明經諸科專以經義論䇿試士詔議科舉或謂宜變法便判官告院蘇軾獨上議曰得人之道在于知人知人之法在于責實使君相有知人之明朝廷有責實之政則胥吏皂𨽻未嘗不無人雖因今之法臣以為有餘使君相不知人朝廷責實則公卿侍從常患無人况學校貢舉乎雖復古之制臣以為不足夫時有可否物有興廢使三代聖人復生于今其選舉亦必有道何必由學乎且慶厯固嘗立學矣天下以太平可待至于今惟空名僅存今陛下必欲求德行道藝之士責九年大成之業則将變今之禮易今之俗又當發民力以治宫室斂民財以養逰士置學立師而又時簡不帥教者屏之逺方徒為紛紛其與慶厯之際何異至于貢舉或曰鄉舉德行而略文章或曰專取䇿論而罷詩賦或欲舉唐故事采譽望而罷彌封或欲變經生帖墨而考大義此數者皆非也夫欲興德行在于君人者修身以格物審好惡以表俗若欲設科立名以取之則是教天下相率而為偽也上以孝取人則勇者割股怯者廬墓上以亷取人則敝車羸馬惡衣菲食凡可以中上意者無所不至自文章言之則䇿論為有用詩賦為無益自政事言之則詩賦論䇿均為無用然自祖宗以來莫之廢者以為設法取士不過如此也矧自唐至今以詩賦為名臣者不可勝數何負于天下而必欲廢之帝喜曰吾固疑此得軾議釋然矣他日王安石言于帝曰今人材乏少且其學術不一異論紛然不能一道德故也欲一道德則當修學校欲修學校則貢舉法不可不變若謂此科嘗多得人自縁仕進别無他路其間不容無賢若謂科法已善則未也今以少壯之時正當講求天下正理乃閉門學作詩賦及其入官世事皆所不習此科法敗壞人材致不如古既而中書門下又言古之取士皆本學校道德一于上習俗成于下其人材皆足以有為于世今追復古制則患于無漸宜先除去聲病偶對之文使學者得專意經術以俟朝廷興建學校然後講求三代所以教育選舉之法施之天下則庶幾可以復古矣於是改法罷詩賦帖經墨義士各占治易詩書周禮禮記一經兼論語孟子毎試四場初大經次兼經大義凡十道次論一首次䇿三道禮部試即増二道中書撰大義式頒行試義者須通經有文采乃為中格不但如明經墨義粗解章句而已其殿試則專以䇿限千字以上分五等第一等二等賜進士及第第三等賜進士出身第四等賜同進士出身第五等賜同學究出身詔治吏沮格青苗法者三月夏人冦撫寧堡䧟之詔种諤潭州安置諤進築永樂川賞逋嶺二砦分遣都監趙璞燕達築撫寧故城及分荒堆三泉吐渾川開光嶺葭蘆川四砦與河東路修築各相去四十餘里已而夏人来攻順寧砦遂圍撫寧折繼昌髙永能等擁兵駐細浮圖去撫寧咫尺囉兀兵勢尚完諤在綏德節制諸軍聞夏人至茫然失措欲作書召燕達戰怖不能下筆顧運判李南公涕泗不已由是新築諸堡悉䧟将士没者千餘人詔治諤罪責授汝州團練副使潭州安置㝷再貶賀州别駕詔給諸州學田增置教官始命諸州置學官率給田十頃贍士初置小學教授詔察奉行新法不職者韓綘免初綘與种諤謀出兵鄜延安撫使郭逵曰諤狂生爾朝廷徒以家世用之必誤大事綘怒奏逵沮撓軍事召還之至是坐興師敗衂罷相知鄧州夏四月以司馬光權判西京留臺光既歸洛自是絶口不論事開封府推官蘇軾乞罷許之軾自直史館判官告院及議貢舉與帝意合即日召見問方今政令得失安在軾對日陛下生知之性天縱文武不患不明不患不勤不患不斷但患求治太急聽言太廣進人太鋭願鎮以安静待物之來然後應之帝竦然曰卿三言朕當熟思之凡在館閣皆當為朕深思治亂無有所隐軾退言於同列王安石不悦命權開封推官將困之以事軾决㫁精敏聲聞益逺㑹上元敕府市浙燈且令損價軾諌止之嘗以新法不便上疏極論且曰臣之所言者三言而已願陛下結人心厚風俗存紀網人主所恃者人心也自古及今未有和易同衆而不安剛果自用而不危者祖宗以來治財用者不過三司今陛下不以財用付三司而創制置三司條例使六七少年日夕講求于内使者四十餘輩分行營幹于外夫制置三司條例司求利之名也六七少年與使者四十餘輩求利之器也造端宏大民實驚疑創法新竒吏皆惶惑以萬乗之主而言利以天子之宰而治財論説百端喧傳萬口臣以為欲消䜛慝而召和氣則莫如罷條例司今君臣宵旰幾一年矣而富國之功茫如捕風徒聞内帑出數百萬緡祠部度五千人耳以此為術人皆知其難也汴水濁流自生民以來不以種稻今欲陂而清之萬頃之稻必用千頃之陂一歲一淤三歲而滿矣陛下遂信其説即使相視地形所在鑿空訪㝷水利上糜帑廩下奪農時隄防一開水失故道雖食議者之肉何補于民臣不知朝廷何苦而為此哉自古役人必用鄉户徒聞江浙之間數郡顧役而欲措之天下自楊炎為兩税租調與庸既兼之矣奈何復欲取庸萬一後世不幸有聚斂之臣庸錢不除差役仍舊推所從來則必有任其咎者矣青苗放錢自昔有禁今陛下始立成法毎歲當行雖云不許抑配而數世之後暴君汙吏陛下能保之乎異日天下恨之國史書之曰青苗錢自陛下始豈不惜哉且常平之法可謂至矣今欲變為青苗壞法成此所䘮逾多虧官害民雖悔何及昔漢武以財力匱竭用賈人桑𢎞羊之説買賤賣貴謂之均輸于時商賈不行盗賊滋熾幾至于亂孝昭既立霍光順民所欲而予之天下歸心遂以無事不意今日此論復興立法之初其費已厚縱使薄有所獲而征商之額所損必多臣願陛下結人心者此也國家之所以存亡者在道德之淺深不在乎强與弱厯數之所以短長者在風俗之厚薄不在乎富與貧人主知此則知所輕重矣故臣願陛下務崇道德而厚風俗不願陛下急于有功而貪富强仁祖持法至寛用人有序專務掩覆過失未嘗輕改舊章考其成功則曰未至言乎用兵則十出而九敗言乎府庫則僅足而無餘徒以德澤在人風俗知義故升遐之日天下歸仁議者見其末年吏多因循事不振舉乃欲矯之以苛察濟之以智能招來新進勇鋭之人以圖一切速成之效未享其利澆風已成多開驟進之門使有意外之得欲望風俗之厚豈可得哉惟陛下以簡易為法清净為心而民德歸厚臣之所願陛下厚風俗者此也祖宗委任臺諫未嘗罪一言者縱有薄責旋即超升許以風聞而無官長言及乗輿則天子改容事闗廊廟則宰相待罪臺諫固未必皆賢所言亦未必皆是然須養其鋭氣而借之重權者將以折姦臣之萌也臣聞長老之談皆謂臺諌所言嘗隨天下公議今者物論沸騰怨讟交至公議所在亦知之矣自兹以徃習貫成風盡為執政私人以致人主孤立紀綱一廢何事不生臣之所願陛下存紀綱者此也時王安石贊帝以獨斷専任軾因試進士發䇿以晋平呉獨斷而克苻堅伐晉獨斷而亡齊桓専任管仲而覇燕噲専任子之而敗事同而功異為問安石滋不悦使侍御史謝景温論奏軾向丁憂歸蜀乗舟商販詔下六路捕逮篙工水師窮治無所得軾遂請外通判杭州時新法日下軾于其問毎因法以便民民賴以安以鄧綰為侍御史判司農寺初綰通判寧州知王安石得君専政乃條上時事數十以為宋興百年習安玩治當事更化且言陛下得伊周之佐作青苗免役等法民莫不歌舞聖澤以臣所見寧州觀之知天下皆然誠不世之良法願勿移于浮議而堅行之復貽安石書極頌其美由是安石力薦于帝遂驛召對㑹夏人冦慶州綰於帝前敷陳甚悉帝問識王安石吕惠卿否綰對曰嘗一識也帝曰安石今之直人惠卿賢人也退見安石欣然如素交属安石致齋陳升之以綰練習邉事使復知寧州綰聞之不樂誦言急召我來乃使還耶或問君今當作何官綰曰不失為館職得無為諌官乎曰正自當爾明日果除集賢校理檢正中書孔目房鄉人在都者皆笑且罵綰曰笑罵從他笑罵好官還我為之㝷同知諌院時常平水利免役保甲之政皆出司農而吕惠卿居憂曽布不能獨任其事安石欲藉綰以威衆故有是命五月高麗來貢高麗為遼所阻不通中國者四十三年至是福建轉運使羅拯命商人黃真洪萬招接通好髙麗王徽乃因真還移牒福建願備禮朝貢拯以聞朝議謂可結以謀遼乃命拯諭以供億腆厚之意王徽遂遣其民官侍郎金悌等由登州入貢自是與中國復通聘貢相繼翰林學士知開封府韓維乞罷許之維知開封保甲法行帝聞鄉民憂弓矢之貴無錢買之加以傳惑徙之戌邉父子聚泣甚以為憂語王安石曰保甲宜緩而宻安石對曰日力可惜會京東河北有烈風之異民大恐帝批付中書令省事安静以應天變放遣兩路募夫責監司郡守不以上聞者安石執不下維上言諸縣團結保甲鄉民驚擾至有截指斷腕以避丁者乞候農隙排定帝以問安石安石對曰此固未可知就令有之亦不足怪今固士大夫覩新政尚或紛紛驚異况于二十萬户百姓有蠢愚為人所惑動者豈應為此遂不敢一有所為耶帝曰民言合而聽之則勝亦不可不畏也安石對曰為天下者如止欲任民情所願而已則何必立君而為之張官置吏也大抵保甲法上自執政大臣中則兩制下則盗賊及停藏之人皆所不欲然臣召鄰人問之皆以為便則雖有斬指以避丁者不皆然也况保甲不特除盗固可漸習為兵既人皆能射又為長旗鼓變其耳目且約以免税上畨代廵檢兵又自正而上能捕賊者授之以官則人競勸然後使與募兵相參則可以銷募兵驕志且省財費此宗社長久之計也惟陛下果斷不恤人言以行之帝遂變河東陜西三路義勇如府畿保甲法安石由此益惡維帝欲命維為御史中丞維以兄絳居政府力辭之安石因言維善附流俗以非上所建立乞允其請乃復知開封兼羣牧使仍為翰林學士㑹文彦博求去帝曰宻院事劇當除韓維佐卿明日維奏事殿中以言不用力請外郡帝曰我東宮舊人當留輔政維對曰使臣言得行賢于富貴若縁攀附舊恩以進非臣之願也乃出知襄州六月知青州歐陽修乞致仕許之修以風節自持既連被汚衊年六十即乞謝事及徙青州上疏請止散青苗錢王安石惡之修求歸益切馮京請留之安石曰修附麗韓琦以𤦺為社稷臣如此人在一郡則壞一郡在朝廷則壞朝廷留之安用乃以太子少師致仕貶判亳州富弼官徙判汝州弼判亳州青苗法行弼謂如是則財聚于上人散于下持不行提舉官趙濟劾弼沮格詔㫖鄧綰乞付有司鞫治乃落弼使相移判汝州王安石曰弼雖責猶不失富貴昔鯀以方命殛共工以象恭流弼兼二罪止奪使相何由沮姦帝不荅弼行過應天謂判府張方平曰人固難知也方平曰謂王安石乎亦豈難知者方平頃知皇祐貢舉或稱其文學辟以考校既至院中之事皆欲紛更方平惡其為人檄之使出自是未嘗與語弼有愧色秋七月貶御史中丞楊繪知亳州御史劉摯監衡州鹽倉遣察訪使促成役書于諸路繪上言提舉常平張靚等科配助役錢一户多者至三百千乞少裁損以安民心又言孫廸張景温體重不顧出錢之民欲困以重役皆不聽繪見時賢士多引去以避王安石乃上疏言老成人不可不惜當今舊臣多引疾求去范鎮年六十有三吕晦年五十有八歐陽修年六十有一而致仕富弼年六十有八而引疾司馬光王陶皆五十而求散地陛下可不思其故乎安石聞而深惡之㑹劉摯為安石所器拜監察御史裏行摯就職即奏言亳州獄乃小人意在傾富弼以市進今弼已得罪願少寛之又言程昉開漳河調發猝廹人不堪命趙子幾擅升畿縣等户使納役錢期會急逼人情惶駭復上疏言陛下有勸農之志今變而為煩擾陛下有均役之意今倚以為聚斂其言愛君憂國之言者皆無以容於其問今天下有喜於敢為有樂乎無事彼以此為流俗此以彼為亂常此風寖成漢唐黨禍必起矣因陳率錢助役十害其要曰上户常少中下户常多故舊法上户之役類皆數而重下户之役率常簡而輕今不問上下户槩視物力以差出錢故上户以為幸而下户苦之嵗有豐凶而役人有定數助錢歲不可缺則是賦税有時減閣而助錢更無蠲損也役人必用鄉户為其有常産則自重今既招顧恐止得浮浪姦偽之人則帑庾場務綱運不惟不壯能典幹竊恐不勝其盗用而冒法者衆至于弓手耆承符散從手力胥史之類恐遇冦則有縱逸因事輙為掻擾也疏上㑹楊繪論提刑趙子幾怒知東明縣賈蕃不禁遏縣民致使訟助役事摭以他故下蕃于獄而自鞫之是希安石意指而致縣令于罪也因其助役之利一而難行者五其利以民驗田多寡輸錢無决射之患而難行者以民惟種田而責其輸錢就募者非土著而有姦細田税有多少不同耆長顧人則盗賊難止衙前顧人則失䧟官物摯亦上言趙子幾捃摭賈蕃是欲箝天下之口乞按子幾挾情之罪於是安石大怒命知諌院張璪取繪摯所論助役十害至五難行之事作十難以詰之璪辭安石怒出璪知蔡州而改命曽布為之布既作十難且劾繪事欺誕心懷向背詔下其疏於繪且使各言狀繪録前後四奏以自辯摯奮然曰為人臣豈可壓于權勢使天子不知利害之實即條對所難以伸其説曰助役歛錢之法有大臣及御史主之于内有大臣親黨為監司提舉官而行之于諸路其勢順易矣然曠曰彌年終未有定論者為不順乎民心也臣待罪言責采士民之説以聞職也今乃遽令分析是使之較是非爭勝負交口相直無乃辱陛下耳目之任哉所謂向背則臣所向者義所背者利所向者君父所背者權臣願以臣章并司農奏宣示百官考定當否如臣言有取幸早施行若稍渉欺罔甘就竄逐不報明日摯復上疏曰陛下起居言動躬蹈德禮夙夜勵精以親庶政天下未至于安且治者誰致之耶陛下注意以望太平而自以太平為己任得君專政者是也二三年間開闔動摇舉天下無一物得安其所者盖自青苗之議起而天下始有聚斂之疑青苗之議未允而均輸之法行均輸之法方擾而邉鄙之謀動邉鄙之禍未艾而助役之事興至於求水利行淤田併州縣興事起新難以徧舉其議財則市井屠販之人皆此召至政事堂其征利則下至厯日而官自粥之推以徃不可究言輕用名器淆混賢否忠厚老成者擯之為無能俠少儇辯者取之為可用守道憂國者謂之為流俗敗常害民者謂之為通變凡政府謀議經畫除用進退獨與一掾属决之然後落筆同列預聞反在其後故奔走乞丐之人其門如市今西夏之欵未入反側之兵未安三邉瘡痍流潰未定河北大旱諸路大水民勞財乏縣官减耗聖上憂勤念治之時而政事如此皆大臣誤陛下而大臣所用者誤大臣也疏奏安石欲竄摯嶺外帝不許詔貶繪知亳州謫摯監衡州鹽倉遣察訪使徧行諸路促成役書改助役為免役不願就募而强之者論如律八月復以春秋三傳試貢舉士王安石嘗戲言春秋經為斷爛朝報故貢舉不以春秋取士至是帝命復之議取河湟置洮河安撫司命王韶主之九月以鮮于侁為利州路轉運副使時詔監司各定所部助役錢數利州路轉運使李瑜欲定四十萬判官鮮于侁曰利州民貧地瘠半此可矣瑜不從遂名為奏時諸路役書皆未就帝是侁議諭司農曽布使頒以為式因黜瑜而擢侁副使兼提舉常平初王安石居金陵有重名士大夫期以為相侁惡其沽激要君語人曰是人若用必壞亂天下及安石用事侁乃上書論時政曰可為憂患者一可為太息者二其他逆治體而召民怨者不可槩舉其意專指安石安石怒毁短之帝曰有章奏在安石乃不敢言既為副使部民不請青苗錢安石遣吏詰之侁曰青苗之法願取則與民自不願豈能强之哉蘇軾稱侁上不害法中不廢親下不傷民以為三難募民粥坊場河渡新法開封府界及諸路坊場河渡募人承買收取浄利歲收六百九十八萬六千緡穀帛九十七萬六千六百石匹有竒既而司農并祠廟粥之聽民為賈區其中以王雱為崇政殿説書雱安石子也為人慓悍隂刻無所顧忌性敏甚年十三時得秦卒言洮河事嘆曰此可撫而有也使西夏得之則吾敵强而邉患博矣故安石聞王韶開熈河議因力主之未冠已著書數十萬言舉進士調旌德少尉雱氣豪睥睨一世不能作小官安石執政所用多年雱亦欲預選乃與父謀曰執政子雖不可預事而經筵可處安石欲帝知自用乃以雱所作䇿論天下事者三十餘篇及雱注道德經鏤板粥于市遂傳達于帝鄧綰曽布又力薦之召見除太子中允崇政殿説書安石更張政事雯實導之常稱商鞅為豪傑之士且言不誅異議者則法不行安石一日與程顥語雱囚首跣足携婦人冠以出問父所言何事曰以新法為人所沮故與程君議之雱大言曰梟韓𤦺富弼之首于市則法行矣安石遽曰皃誤矣貶同知諌院唐坰為潮州别駕坰以父任得官嘗上書言秦二世制于趙髙乃失之弱非失之强帝悦其言又言青苗法不行宜斬大臣異議如韓琦者數人王安石尤喜之薦使對賜進士出身為崇文校書帝薄其人除知錢塘縣安石復令鄧綰舉為御史遂除太子中允將用為諌官安石疑其輕脱將背已立召不除職以本官同知諌院非故事也坰果怒安石易已凡奏二十疏論時事皆留中不出坰乃因百官起居日扣陛請對帝令諭以他日坰伏地不起遂召升殿坰至御座前進曰臣所言皆不臣不法請對陛下一一陳之乃搢笏展疏目安石曰王安石之御座聽劄子安石遲遲坰訶曰陛下前猶敢如此在外可知安石悚然而進坰大聲宣讀凡六十條大抵以安石專作威福曽布等表裏擅權天下但知憚安石威權不復知有陛下文彦博馮京知而不敢言王珪曲事安石無異厮僕且讀且目珪珪慙懼俯首又言薛向陳繹安石頥指氣使無異家奴張璪李定為安石爪牙張商英乃安石鷹犬逆意者雖賢為不肖附已者雖不肖為賢至詆安石為李林甫盧杞帝屢止之坰慷慨自若略不退懾讀已下殿再拜而退侍臣衛士相顧失色閤門紏其凟亂朝儀乃逺貶潮州别駕既而靈臺郎尤瑛言天州隂星行失度宜退安石安石怒黥瑛配英冬十月立太學生三舍法宋初國子生以京朝七品以上子孫為之太學生以八品以下子弟若庶人之俊異者為之試論䇿經義如進士法及帝即位垂意儒學以天下郡縣既皆有學嵗時月各有試程其藝能以差次升舍其最優者為上舍免發解及禮部試而特賜之第遂專以此取士又以慶厯中嘗置太學内舍生二百人帝漸増至九百人至是乃盡以錫慶院及朝集院西廡建講書堂四諸生齋舍掌事者直廬始僅足用自主判官外増置直講為十員率二員共講一經令中書遴選或主判官奏舉生員釐為三等始入太學為外舍定額為七百人外舍升内舍員二百内舍升上舍員百各執一經從所講官受學月考試其業優等上之中書其正録學諭以上舍生為之經各二員學行卓異者主判直講復薦之于中書奏除官立選人及任子出官試律令法十二月安定郡王從式通鑑續編卷八
