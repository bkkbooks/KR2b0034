body:
  text: 通鑑續編卷七元陳桱撰甲申四年契丹重熈十三年春三月詔天下州縣立學詔曰儒者通天地人之理明古今治亂之原可謂博矣然學者不得騁其說而有司務先聲病章句以拘牽之則吾豪傑竒偉之士何以奮焉士以純明朴茂之美而無斆學養成之法使與不肖並進則夫懿德敏行何以見焉此取士之甚弊而學者自以為患夫遇人以薄者不可貴人以厚也今朕建學興善以尊子大夫之行更制革弊以盡學者之才有司其務嚴訓導精察舉以稱朕意學者其進德修業無失其時其令州若縣皆立學本道使者選部屬官為教授員不足取於郷里宿學有道業者由是州郡奉詔興學而士有勸服儒術者不可勝數矣更定科舉法科舉進士明經諸科之外又有特奏名别頭試之目特奏名者始于晉天福中以士之貢于鄉而屢絀于禮部或廷試所不録者積前後舉數參其年而差等之遇親䇿士則别籍其名以奏徑許赴試至咸平三年是科至九百餘人焉别頭試者士有親戚仕本州或為發解官及侍親逺宦距本州二千里令轉運司類試以十率之取三人以貢焉宋之取才惟進士諸科名卿鉅公皆由此選帝自即位以來尤嚮用之登上第者不數年輒赫然顯貴范仲淹參知政事意欲復古勸學數言興學校本行實詔近臣議宋祁等言教不本於學校士不察於鄉里則不能覈名實有司束以聲病學者専于記誦則不足盡人材參考衆說擇其便于今者莫若使士皆土著而教之於學校然後州縣察其履行則學者修飭矣乃詔州縣立學士須在學三百日乃聽預秋賦舊嘗充賦者百日而止試于州者令相保任有匿服犯刑虧行冒名等禁三場先䇿次論次詩賦通考為去取而罷帖經墨義士通經術願對大義者數十道契丹党項諸部叛附于夏元昊侵党項契丹遣延昌宫使髙嘉努讓之元昊不聽命党項等部及夾山部落呆兒族一百户與山西部族節度使庫哩皆叛契丹降于元昊夏四月作太學五月帝謁孔子判國子監王拱辰田况王洙余靖等言漢太學二百四十房千八百室生徒三萬人唐學舍亦千二百間今取才養士之法盛矣而國子監才二百楹制度狹小不足以容詔以錫慶院為太學置内舍生二百人講殿既備帝謁孔子故事止肅揖帝特再拜賜直講孫復五品服初海陵人胡瑗為湖州教授訓人有法科條纎悉備具以身率先雖盛暑必公服坐堂上嚴師弟子之禮視諸生如其子弟諸生亦信愛如其父兄從之㳺者常數百人時方尚詞賦湖學獨立經義治事齋以敦實學及興太學詔下湖州取其法著為令式云契丹伐党項夏人救之曩霄來降元昊遣使上誓表言兩失和好遂歴七年立誓自今願藏盟府其前日所掠將校民戸各不復還自此有邉人逃亡亦毋得襲逐臣近以本國城砦進納朝廷其栲栳䥥刀南安承平故地及他邊境蕃漢所居乞畫中為界於内聽築城堡凡嵗賜銀綺絹茶二十五萬五千乞如常數臣不復以他相干乞頒誓詔葢欲世世遵守永以為好儻君親之義不存或臣子之心渝變當使宗祀不永子孫罹殃六月詔范仲淹宣撫陜西河東初仲淹以忤吕夷簡放逐者數年帝以其士望所屬拔起而大用之倚以為治中外想望其功業仲淹亦以天下為己任與富弼同心輔政裁削倖濫考覆官吏日夜謀慮興致太平然更張無漸規模濶大論者籍籍及按察使出多所舉劾衆心不悦任子之思薄磨勘之法宻僥倖者不便由是謗毀稍行夏竦既怨石介因與其黨造為黨論目杜衍歐陽修及仲淹為黨人且偽作介為富弼撰廢立詔草飛語上聞弼與仲淹懽適聞契丹伐夏遂請行邉仲淹既去朝攻者益急帝心不能無疑矣契丹命耶律古雲耶律庶成等修國史秋七月契丹使耶律髙嘉努來契丹主以夏援党項之故徵諸道兵將討元昊遣延昌宫使髙嘉努告于宋曰請為中國討賊慎無與和也帝疑契丹與元昊同謀以見欺欲調發為備富弼曰契丹實有怨于元昊耳保無他也乃止八月詔富弼宣撫河北從弼請也弼及范仲淹既去石介不自安亦請外得濮州通判余靖如契丹時朝廷欲加元昊封冊而契丹之使適至帝召羣臣議之知制誥余靖言契丹挾詐不可輕許乃命靖致贐禮且覘其誠否而留夏國封冊不發九月晏殊罷殊平居好賢及為相務進人材故省院臺閣皆極一時之選至是歐陽修出為河北都轉運使諫官奏留之殊獨不許孫甫蔡襄因上言殊為李宸妃碑不言生帝又役官兵治僦舍以規利乃降授工部尚書出知潁州殊剛簡清儉善於知人博學洽聞文章贍麗應用不窮為世推重以杜衍平章事兼樞宻使賈昌朝為樞宻使陳執中參知政事衍在樞宻每有内降率寢格不行積詔㫖至十數輒納帝前帝嘗語歐陽修曰外人還有知杜衍封還内降耶几有求於朕每以衍不可告之也而止者多於所封還契丹主伐夏冬十月曩霄誘而敗之契丹及夏平九月契丹主會師于九十九泉遣太弟重元將騎七千為先鋒出南路樞宻使蕭惠將騎六萬出北路契丹主自帥騎兵十萬繼進濟河長驅入夏境四百里不見敵據得勝寺南壁以待蕭惠與元昊戰于賀蘭山北敗之元昊見契丹兵盛乃上表謝罪退師十里請收叛黨以獻且進方物契丹主遣樞宻副使蕭革迓之而進軍次于河曲元昊親率党項三部以待罪契丹命革詰其納叛背盟之故賜之酒許其自新蕭惠以為大軍既集宜加討伐不可許和契丹主猶豫未决元昊以未得成言又退師三十里以俟凡三退將百里每退必赭其地契丹馬無所食因許之和元昊乃遷延以老之度其馬飢士疲因縱兵急攻蕭惠營敗之乘勝攻南壁契丹主大敗從數騎走得免元昊入樞宻使蕭孝友砦執駙馬蕭呼圖克以去已而遣使歸其先所俘獲契丹亦遣所留夏使還之十一月契丹主班師還十二月呼圖克歸契丹遣使如夏州遣使賜元昊誓詔曰朕臨制四海廓地萬里西夏之土世以為胙今乃納忠悔咎表于信誓質之日月要之鬼神及諸子孫無有渝變申復懇至朕甚嘉之俯閲來誓一皆如約十一月詔戒朋黨相訐契丹城雲州為西京大同府雲州即雲中也於是契丹境内凡五京六州軍城百五十六縣二百九部族五千二屬國六十東至于海西至金山暨于流沙北至臚胊河南至白溝幅貟萬里契丹之至盛也十二月余靖還自契丹冊曩霄為夏國主余靖還知契丹已與夏和帝乃遣尚書貟外郎張子奭充冊禮使仍賜對衣黄金帶銀鞍勒馬銀二萬两絹二萬匹茶二萬斤冊以漆書竹冊籍以天下樂錦金塗銀印方二寸一分文曰夏國主印錦綬約稱臣奉正朔改所賜敕書為詔而不名許自置官屬使至京就驛貿賣宴坐朶殿使至其國相見用賔客禮嵗賜銀絹茶綵共二十五萬五千置𣙜塲於保安軍及髙平砦第不通青鹽命國子博士髙良夫等會夏人畫疆界然宋使徃止留館宥州終不復至興靈而元昊帝其國中自若也乙酉五年契丹重熈十四年春正月范仲淹富弼罷仲淹内剛外和政尚忠厚汎愛樂善及其去也咸惜其當朝不久莫能成先憂後樂之志性至孝好施予置義莊里中以贍宗族海内之人無不敬慕其德焉杜衍罷衍好薦引賢士而沮止僥倖羣小咸怨御史中丞王拱辰之黨尤嫉之衍婿蘇舜欽易簡子世慷慨有大志能文章論議稍侵權貴衆不能容時監進奏院循前例祠神以妓樂娯賔集賢校理王益柔曙之子也於席上戲作傲歌拱辰聞之以二人皆范仲淹所薦而舜欽又衍懿親欲因是以傾衍及仲淹乃諷御史魚周詢劉元瑜舉劾其事䟽上拱辰及張方平列狀請誅益柔章得象晏殊無可否賈昌朝隂主之韓𤦺言于帝曰益柔狂語何足深討方平等皆陛下近臣今西陲用兵大事何限一不為陛下論列而同狀攻一王益柔此其意可見矣帝感悟乃止黜益柔監復州酒税而除舜欽名同席被斥者十餘人皆知名之士拱辰喜曰吾一舉網盡矣舜欽既得罪衍由是不安求去不許而拱辰遂見譏於公議及諫官錢明逸論范仲淹富弼帝欲罷二人而衍獨左右之帝不悦二人既罷翰林學士丁度有憾於衍因置書指衍與二人為朋比衍竟坐是出知兖州衍清介有大節其去也君子惜之以賈昌朝平章事兼樞宻使王貽永為樞宻使宋庠參知政事吳育龎籍為樞宻副使罷磨勘䕃子新法三月韓琦罷范仲淹富弼罷去𤦺不能獨居上疏辨析不報初陜西四路總管鄭戩遣靜邉砦主劉滬著作佐郎董士亷城水洛以通秦渭援兵知渭州尹洙以為前此屢困于賊者正由城砦多而兵勢分也今又益城不可奏罷其役會戩罷而扈等督役如故洙不平召滬等還滬又不至洙以張忠代之滬不受代洙乃諭禆將狄青徃械滬及士亷下吏而罷水洛之役戩論奏不已𤦺是洙而朝議右戩竟徙洙知慶州釋滬等獄而復城水洛𤦺乃請外遂出知揚州河東轉運使歐陽修上疏曰杜衍范仲淹韓琦富弼天下皆知其有可用之賢而不聞其有可罷之罪正士在朝羣邪所忌謀臣不用敵國之福也竊為陛下惜之羣邪益忌修因其孤甥張氏獄傳致修罪左遷知滁州洙博學有識度以為自唐以來文格卑弱至桞開始為古文而世未知宗尚乃與穆修復振起之為文簡而有法元昊反洙未甞不在兵間故於西事尤為練習未幾卒罷科舉新法范仲淹既去執政以新定科舉入學預試為不便且言詩賦聲病易考而䇿論汗漫難知祖宗以來莫之有改且得人甞多矣天子下其議有司請如舊法乃詔曰科貢舊條皆先朝所定也宜一切如故前所更令其悉罷之夏四月丁亥朔日有食之章得象免時帝鋭意天下事進用羣賢使同得象經畫當世急務得象無所建明御史孫抗數論之得象不得已乃上章求去以陳執中平章事兼樞宻使吳育參知政事丁度為樞宻副使冬十月罷轉運兼按察使罷宰相兼樞宻使丙戌六年契丹重熈十五年春三月辛巳朔日有食之日食帝謂宰相曰謫見于天願歸罪朕躬卿宜救民疾苦思所以利安之賈昌朝對曰陛下此言足以弭天變臣敢不孜孜以奉陛下帝曰人主懼天而修徳猶人臣畏法而自新也昌朝頓首謝秋八月以吳育為樞宻副使丁度參知政事育在政府遇事敢言至是知永静軍向綬疑通判江中立譛已因誣以罪廹令自殺育欲坐綬死賈昌朝不可遂争議帝前左右皆失色育論辯不已乃請曰臣所辯者職也顧力不勝願罷臣職知審刑院髙若訥附昌朝議綬竟減死一等帝亦以昌朝故徙育樞宻而謂近臣曰呉育剛正可用第嫉惡太過耳冬十月不雨髙麗王欽卒子徽嗣丁亥七年契丹重熈十六年春二月募人中糧于秦州詔取益州交子三十萬于秦州募人入中糧粟大旱帝避正殿詔言闕失三月賈昌朝吳育免時大旱帝避正殿減膳許中外臣僚實封條陳失政賈昌朝引漢冊免三公故事乞罷御史中丞髙若訥上言曰大臣喧争為不肅故雨不時若於是賈昌朝以使相出判大名吳育歸給事中班未幾以育判尚書都省因侍讀帝謂曰臣下毀譽多出愛憎卿所當慎也育對曰知而形之言不若察而行之事聖主之行如日月之明進一人使人皆知其善出一人使人皆見其惡則隂邪不能搆害公正可以自立百王之要道也乙未以夏竦平章事丁酉改授樞宻使竦制下諌官御史文章言大臣和則政事修竦前在關中與首相陳執中論議不合今不可使共事故改命以文彦博參知政事髙若訥為樞宻副使壬寅帝禱于西太一宫是日雨夏四月甲辰帝御正殿秋八月分河北為四路冬十一月貝州宣毅卒王則據城中以叛以明鎬為河北體量安撫使初涿人王則以歲饑流至貝州自賣為人牧羊後隸宣毅軍為小校貝冀俗尚妖幻相與習五龍滴涙等經及諸圖䜟書言釋迦佛衰謝彌勒佛當持世則之與母訣也甞刺福字於背以為記妖人因妄傳則字𨼆起争信事之州吏張巒卜吉主其謀黨與連德齊諸州約以明年正旦斷澶州浮梁作亂會其黨潘方浄以書謁北京留守賈昌朝事覺被執則故不待期冬至日知貝州張得一方與官屬謁天慶觀則率其徒刼庫兵執得一囚之殺通判董元亨司理王奬判官李浩清河令齊開主簿王奕等兵馬都監田斌以從卒巷戰不勝而出城扉闔提刑田京任黄裳持印棄其家縋城出保南關入驍健營撫士卒凡有欲應賊者京以計盡誅之由是營兵二十六指揮在外者皆懾服不敢叛南關得不䧟則僣稱東平郡王以張巒為丞相卜吉為樞宻使建國曰安陽牓所居門曰中京居室廏庫皆立名號改元得聖以十二月為正月民年十二以上七十以下皆涅其面曰宜軍破趙得勝旗幟號令率以佛為稱城以一樓為一州書州名補其徒為知州每面置一總管然縋城下者日衆於是令民伍伍為保一人縋餘悉斬事聞以知開封府明鎬為體量安撫使而詔貝州有能引致官兵獲賊者授諸衛士將軍鎬至貝州民汪文慶等自城上繫書射鎬帳約為内應夜埀絙以引官軍入城者數百人賊覺率衆拒戰不利乃與文慶等復縋而出初官軍先登者欲専其功斷絙以絶後來者及賊來拒衆寡不敵故敗戊子八年契丹重熈十七年春正月以文彦博為河北宣撫使明鎬副之閏月執王則歸于京師誅之鎬以貝州城峻不可攻乃為距闉將成為賊所焚鎬乃即南城為地道日攻其北以牽制之朝廷以則未下命彦博宣撫鎬為之副彦博至貝鎬穿道適通遂選壯士夜半由地道入城衆登城賦縱火牛官軍以槍中牛鼻牛還攻賊賊大潰開東門遁總管王信追則擒之餘衆保村舍者皆被焚死檻送則京師磔于中市則據城中凡六十六日而敗改貝州為恩州張得一以降賊伏誅以文彦博平章事衛士作亂伏誅帝將以閏月望夕復張燈皇后諫止之越三日親從官顔秀等四人夜入禁中越屋叩寢殿皇后方侍帝聞變遽起帝欲出后閉閤擁持趣召都知王守忠使引衛卒入賊傷宫嬪殿下聲徹帝所宦者以乳嫗毆小女子紿奏后叱之曰賊在近殺人敢妄言邪隂遣人挈水踵後賊果舉炬焚簾水隨滅之是夕所遣宦侍后皆親剪其髮曰以是徴賞故争盡死力守忠兵至賊就擒滅詔領皇城司者皆坐斥事連副都知楊懐敏夏竦與懐敏相結欲曲庇之乃請御史與宦官同鞫于禁中不可滋蔓俾反側不安丁度曰宿衛有變事關社禝請付外臺窮治因争于帝前帝從竦議由是懷敏止降官領内職如故二月夏國主曩霄卒子諒祚立元昊卒年四十六子諒祚立生十月矣養于國舅訛龐遂與其三大將分治國政遣使告哀于宋契丹諡元昊曰武烈皇帝廟號景宗墓曰泰陵詔遣開封府判官曹穎叔祭奠六宅使鄧保弔慰之契丹亦遣永興宫使耶律褭里慰奠焉夏四月冊諒祚為夏國主朝議請因諒祚幼弱母族専國以節鉞啖其三大將使各有所部分以披其勢可以得志陜西安撫使程琳曰幸人之䘮非所以柔逺人不如因而撫之帝乃遣刑部員外郎任顓徃冊諒祚為夏國主議者深惜朝廷之失機罷丁度為觀文殿學士度以與夏竦議事不合求解政事罷為紫宸殿學士御史何郯言紫宸非官稱所宜乃改延恩為觀文殿置學士以授之度性淳質在翰林十五年數論天下事未甞及私帝雅重之以明鎬參知政事文彦博數推鎬貝州之功且薦其才可大用故也五月無雲而震夏竦免殿中侍御史何郯論竦姦邪不可任樞要㑹京師同日無雲而震者五帝方坐便殿趣召翰林學士張方平至謂曰夏竦姦邪以致天變如此宜免之乃出知河南竦在樞府深怨石介之譏已欲報之而介已卒會徐州狂人孔直温謀反搜其家得介書竦因言介詐死北走契丹耳請發棺驗之詔下兖州訪介存亡杜衍知兖與其僚以闔族保介必死提刑吕居簡亦言無故發棺何以示後始獲免然猶錮介子孫而貶孫復監䖍州税以宋庠為樞宻使龐籍參知政事六月明鎬卒鎬沉鷙有謀能斷大事其卒也帝深惜之河北京東大水己丑皇祐元年契丹重熈十八年夏英宗諒祚延嗣寜國元年春正月甲午朔日有食之夏五月加知青州富弼禮部侍郎固辭不受河北京東大水民流就食青州富弼勸所部民出粟益以官廪得公私廬舍十餘萬區散處其人以便薪水官吏自前資待缺寄居者皆賦以禄使即民所聚選老弱病瘠者廪之仍書其勞約他日為奏請受賞率五日輒遣人持酒肉飯糗慰藉出于至誠人人為盡力山林陂澤之利可資以生者聽民擅取死者為大冢葬之目曰叢冢及麥大熟民各以逺近受糧而歸几活五十餘萬人募為兵者萬計前此救災者皆聚民城郭中為粥食之蒸為疾疫及相蹈藉或待哺數日不得粥而仆名為救之而實殺之自弼立法簡便周盡天下傳以為式帝聞遣使褒勞加拜禮部侍郎弼曰此臣職也敢受賞乎固辭不受六月以賈昌朝為觀文殿大學士兼判尚書都省初置觀文殿大學士自是宰相求閒即命是職以寵之秋七月契丹主伐夏不見敵而還八月陳執中罷以宋庠平章事髙若訥參知政事龎籍為樞宻使梁適為副使九月廣源州蠻儂智髙宼邕州儂氏自唐初即雄于西原與黄氏周氏據州十有八而儂氏尤强世為廣源州首領唐末交阯强盛廣源服屬之及儂全福為交人所殺其妻改適商人生智髙冒姓儂氏既壯與其母據儻猶州建國曰大厯交人攻而執之釋其罪使知廣源州智髙怨交阯乃乗間襲據安德州僣稱南天國改元景瑞因招納亡命貢獻中國以求内附朝廷不許智髙復奉金函書以請亦不報智髙怒與廣州進士黄師宓等謀據廣南乃數出敝衣易榖食紿言洞中饑饉部落離散知邕州陳拱信之不為設備智髙得以肆志一夕忽縱火焚其居因紿衆曰平生積聚今為天火所焚無以為生計窮矣當取邕廣以自王否則兵死衆從之遂率衆五千㳂江東下攻邕州横江寨守將張日新等戰死詔江南福建等路發兵備之罷武舉夏人襲契丹蕭惠敗之契丹北院樞宻使韓王蕭惠為河南行營都統帥師自河南進以伐夏戰艦糧艘綿亘數百里既入敵境偵候不逺鎧甲載于車軍士不得乗馬諸將請備不虞惠曰諒祚必自迎車駕何暇及我無故設備徒自弊耳契丹主既還惠師尚進未立營柵夏人奄至恵與麾下不及甲而走追者射之惠幾不得脱士卒死傷者不可勝計冬十月契丹耶律達嚕噶獲夏主嫡母於賀蘭以歸庚寅二年契丹重熈十九年夏天祐垂聖元年春二月夏人侵契丹三月契丹蕭博諾伐夏詔即大慶殿為明堂秋九月大享天地赦自太祖以來未甞親享明堂惟命有司攝事而已是嵗帝謂輔臣曰今年冬至日當親祀園丘欲以季秋行大享明堂之禮然自漢諸儒論議駁而不同夫明堂者布政之宫朝諸侯之位天子之路寢乃令大慶殿也今之親祀不當尚于郊壝寓祭也其以大慶殿為明堂分五室于内仍詔有司詳定儀注以聞于是新作明堂禮神玉製樂八曲九月己酉朝享景靈宫庚戌享太廟辛亥大享天地于明堂以太祖太宗真宗配儀如圜丘大赦百官進秩一等自是凡享明堂皆寓于大慶殿折繼閔卒以其弟繼祖領府州軍事冬十月夏主諒祚請平於契丹契丹不許諒祚母没藏氏遣使乞依舊稱藩于契丹契丹因其使還詔别遣信臣至當徐圖之十二月諒祚母復遣使上表乞依舊臣屬契丹主乃遣北院都監蕭爻括等使夏索党項叛戸没藏氏乞代党項權進駞馬牛羊等物而求唐隆鎮及罷所建城邑契丹主不許而安置所獲元昊妻屬于薊州十一月詔外戚毋得任二府閏月置詳定大樂局于秘閣召太子中舍致仕胡瑗同定雅樂瑗典作雅樂其法下李照一律由是黄鍾律短而所奏樂音髙又其鐘弇而直聲鬱不發著作佐郎劉羲叟曰此謂害金帝將感心腹之疾乎已而果然契丹主䇿進士于金鑾殿辛卯三年契丹重熈二十年春正月分淮南為東西路三月宋庠免庠天資忠厚人稱為長者然在政府無所建明㑹張貴妃母越國夫人曹氏客張彦方偽造敕牒為人補官事覺論死庠弟龍圖閣學士祁之子與彦方遊諫官包拯吳奎等言庠不戢子弟庠遂求去以劉沆參知政事夏六月詔州郡自今勿得獻瑞物知無為軍茹孝標獻芝草帝命免孝標罪而戒州郡自今勿復獻以張堯佐為宣徽等使知河陽府貶殿中侍御史裏行唐介為英州别駕文彦博免時張貴妃寵冠後庭堯佐其伯父也以故驟除宣徽節度景靈郡牧四使殿中侍御史唐介與知諫院包拯吳奎等力争之且請中丞王舉正留百官班廷論奪其二使無何堯佐復除宣徽使知河陽命下衆以為朝廷真欲出堯佐于外介謂同列曰是欲與宣徽而假河陽為名耳不可但已也而同列依違介獨抗言之帝謂曰除擬本出中書時文彦博為首相介遂劾彦博知益州日造間金竒錦緣閹侍通宫掖以得執政今顯用堯佐益自固結請罷之而相富弼語甚切直帝怒卻其奏不視且曰將逺竄介徐讀疏畢曰臣忠憤所激鼎鑊不避何辭於謫帝急召執政示之曰介論事是其職至以彦博由妃嬪致宰相此何言也進用冢司豈應得預而乃薦弼時彦博在帝前介責之曰彦博宜自省即有之不可𨼆彦博拜謝不已帝怒益甚梁適叱介使下殿修起居注蔡襄趍進救之貶春州别駕王舉正言其太重帝亦悟明日取其疏入改英州而罷彦博知許州奎亦以介黨出知宻州帝慮介或道死有殺直臣名命中使䕶之梅堯臣李師中皆賦詩激美由是介直聲動天下士大夫稱真御史必曰唐子方冬十月以龎籍平章事髙若訥為樞宻使梁適參知政事王堯臣為樞宻副使十一月以房庶為校書郎益州鄉貢進士房庶甞著樂書補亡二卷其説以為甞得古本漢志云度起于黄鍾之長以子榖秬黍中者一黍之起積一千二百黍之廣度之九十分黄鍾之長一為一分今文脱之起積一千二百黍八字故誤以一黍為一分其法非是當以秬黍中者一千二百實管中黍盡得九十分為黄鍾之長九寸加一為尺則律定矣直秘閣范鎮是之時胡瑗等製樂已定故授官而遣之壬辰四年契丹重熈二十一年夏五月資政殿學士范仲淹卒諡文正儂智髙陷邕横貴藤梧康端龔潯等州遂圍廣州詔余靖楊畋等討之智髙攻陷邕州執知州陳珙等即州建大南國自稱仁惠皇帝改元啓厯置官屬時天下久安廣南州郡無備智髙所向輒下遂陷八州乃進圍廣知州魏瓘拒之事聞命知桂州陳曙討之六月以余靖為廣西安撫使知桂州與同提刑李樞及陳曙經制賊盗事復以楊畋體量安撫廣南提舉經制盗賊事發廣東鈐轄司兵赴之戸部貟外郎范鎮上書議樂鎮言陛下制樂三年有司紛然未决葢由不議其本而争其未也樂者和氣也發和氣者聲音也聲音生于無形故古人以有形之物傳其法然後無形之聲音得而和氣可道也今有形之物皆相戾而不合則無形之聲音不可得而和也必得真黍然後可為耳鎮自謂得古法司馬光不以為是數與論難竟不能决帝觀攲器于邇英閣帝出攲器陳于邇英閣諭丁度等曰日中則昃月滿則虧朕欲以中正臨天下當與列辟共守此道度等拜曰臣亦願無傾滿以報陛下因言太宗甞作此器真宗甞著論帝遂製後述以賜度等以狄青為樞宻副使青初以善騎射為騎御散直元昊反擇衛士從軍以青為三班差使時士卒畏怯獨青每臨敵被髮帶銅面具出入賊中無不披靡以是數立竒功尹洙與談兵善之薦于韓琦范仲淹曰此良將材也二人待之甚厚仲淹授以左氏春秋且曰將不知古今匹夫勇耳青由是折節讀書悉通秦漢以來將帥兵法累進馬軍副指揮使青起行伍十餘年而顯貴而涅猶存帝常敕青傅藥除之青指其面曰陛下以功擢臣不問門地臣所以有今日由此涅耳臣願留以勸軍中不敢奉詔帝益重之至是自知延州召拜副使臺諌王舉正等諫其不可帝不聽秋七月契丹主追帝其逺祖追尊伊徳實為𤣥祖簡獻皇帝色勒迪為徳祖宣簡皇帝妣皆為后復加諡太祖以下帝后儂智髙自廣州寇昭州陷之智髙圍廣兩月知不可拔乃引衆去鈐轄張忠與知英州蘇緘邀擊于白田忠敗死智髙遂攻賀州不克乃攻昭州鈐轄王正倫戰死州遂陷九月以孫沔為湖南江西安撫使余靖提舉廣南兵甲經制賊盜事以狄青為荆湖宣撫使提舉廣南經制盗賊事智髙寇擾日甚嶺外騷動楊畋等久無功帝以為憂智髙移書行營求邕桂節度使帝將受其降梁適曰若爾則嶺表非朝廷有矣會狄青上表請行遂以為宣撫使明日青入對自言曰臣起行伍非戰伐無以報國願得蕃落騎數百益以禁兵羈賊首致闕下帝壯其言諫官韓絳言青武人不宜專任帝以問龎籍籍對曰青起行伍若用為主帥以文人副之則號令不專不如不遣乃詔嶺南諸軍皆受青節度以范祥為陜西轉運使制置解鹽事罷𣙜法復通商自復𣙜法兵民輦運不勝其苦州郡騷然所得鹽利不足以佐縣官之急並邊務誘人入中芻粟皆為虗估騰踊至數倍大耗京師錢幣帑藏益虗太常博士范祥關中人也熟其利害常謂兩池之利甚博而不能少助邉計者公私侵漁之害也儻一變法嵗可省度支緡錢數十百萬乃畫䇿以獻遂命制置其事使推行之于是舊禁鹽地一切通商聽鹽入蜀罷九州軍入中芻粟令入實錢償以鹽授以要劵即池驗劵按數而出盡弛兵民輦運之役以商所入緡錢糴粟輔並邉九州軍而悉留𣙜貨務錢幣以實中都由是黠商貪賈無所僥倖關内之民得安其業公私便之冬十月知制誥王洙上新雅樂詔詳定之洙等上樂而議者以為鐘磬皆不合古遂復命詳定而當議者各安所習久而不決乃命諸家作鍾律以獻然終無所成焉以孫復胡瑗為國子監直講翰林學士趙槩言通判陵州孫復經為人師乃命復與胡瑗同為直講瑗既居太學其徒至不能容取旁官舍處之禮部所得士瑗子弟十常居四五隨材髙下喜自修飭衣服容止徃徃相類人遇之不問可知為瑗弟子也復教養不及瑗而治經過之然二人論見不合常相避不見儂智髙陷賔州復入于邕十一月壬寅朔日有食之十二月陳曙帥師討儂智髙敗績于金城驛狄青執曙誅之狄青至廣南合孫沔余靖之兵進次賔州廣西鈐轄陳曙乗青未至輒以歩兵八千犯賊潰于崑崙關指使袁用等皆遁青曰令之不齊兵所以敗晨會諸將堂上揖曙起并召相用等三十二人按以敗亡狀驅出軍門斬之沔靖顧􅌓眙諸將股栗莫敢仰視雨雪時冬無雪帝責躬減膳每見輔臣憂形于色龐籍等言臣等不能燮理上煩聖心願守散秩以避賢路帝曰是朕誠不能感天而惠不能及民非卿等之過也是夕大雪癸巳五年契丹重熈二十二年夏福聖承道元年春正月會靈觀災狄青大敗儂智髙于邕州智髙走大理廣南平青既誅陳曙因按兵止營令軍士休十日智髙遣人覘之以為軍未即進覘者去青明日乃整軍馳一晝夜絶崑崙關出歸仁鋪為陣賊既失險悉出逆戰前鋒孫節搏賊山下賊氣鋭甚孫沔等懼失色青執白旗麾騎兵縱左右翼出賊不意大敗之追奔五十里斬首數千級賊黨黄師宓儂建中智中及偽官屬死者百五十七人生擒賊五百餘死者萬計智髙夜縱火燒城遁去由合江口入大理遲明青按兵入城獲金帛鉅萬雜畜數千招復老壯七千二百甞為賊所俘脅者慰遣之梟師宓等于城下斂屍築京觀于城北隅時賊屍有衣金龍衣者衆謂智髙已死欲以上聞青曰安知其非詐耶寧失智髙不敢誣朝廷以貪功也於是廣南悉平㨗至帝喜曰青破賊龎籍之力也又曰向非梁適言南方安危未可知也詔余靖經制廣西與都監蕭注等追捕智髙而召青沔還朝後二年余靖遣注入特磨道生獲智髙毋及其弟智光子繼宗繼封歸于京師伏誅智髙不知所終夏五月髙若訥罷以狄青為樞宻使孫沔為副使賞平廣南功也龎籍臺諫朝士皆論青不可長省府帝不聽秋七月龎籍罷籍姻屬道士趙清貺與堂吏皇甫淵受賂事覺刺配逺州道死諫官韓絳因論籍隂諷吏杖殺清貺以滅口覆按無實言者猶不已罷知鄆州籍長於吏事持法深峭士卒畏服及為相聲名減於治郡時以陳執中梁適平章事九月夏及契丹平諒祚遣使進降表子契丹契丹主使其林牙髙嘉努持詔撫諭之自是貢獻如常時冬十月丙申朔日有食之作鎮國神寶時奉宸庫有良玉廣尺厚半之帝以為希世之珍不欲為服玩之器命龐籍篆文作寶十二月以曹陳許滑鄭州為輔郡甲午至和元年契丹重熈二十三年春正月貴妃張氏薨追諡為温成皇后二月孫沔罷自郭后廢楊尚二美人斥貴妃寵傾後宫至贈其父堯封為郡王世父堯佐仕至太師姻戚莫不顯貴及卒帝憂悼甚至輟朝七日禁京城舉樂而追冊為皇后治䘮皇儀殿知制誥王洙鈎摭非禮隂與内侍石全斌附㑹欲令孫沔讀冊宰相䕶葬帝從之沔曰此翰林學士職也陛下若以臣沔讀冊則可以樞宻副使讀冊則不可遂求罷乃知杭州時陳執中為首相奉行唯謹且引洙為員外翰林學士全斌領觀察使士論由是争咎執中以田況為樞宻副使三月王貽永罷貽永尚真宗女鄭國公主自以祖宗來無外姻輔政者恒懼寵禄過盛故在樞府十五年能逺權勢帝由是益加尊禮至是以疾罷以王德用為樞宻使徳用時以太子太師致仕會乾元節上夀立班廷中契丹使語譯者曰黒王相公乃復起耶帝聞之遂拜樞使夏四月甲午朔日有食之用牲于社是日雷雨至申時見所食九分之餘宰相率百官稱賀秋七月以程戡參知政事立温成園梁適免契丹甞欲易國書稱南北朝適曰宋之為宋受之于天不可改也契丹亦其國名自古豈有無名之國哉乃止適曉暢法令臨事有膽量而多挾智數貪黷怙權不戢子弟御史中丞孫抃御史馬遵吳中復論之出知鄭州八月以劉沆平章事冬十月葬温成皇后丙午祔于太廟且製樂章焉乙未二年契丹道宗洪基清寧元年春三月改封孔子後文宣公世愿為衍聖公太常博士祖無擇言祖諡不可加後嗣乞更定美號乃改封焉仍令世襲及知仙源縣如故夏四月契丹來致其先世繪像以求帝容契丹主甞謂近臣曰朕與宋主約為兄弟歡好歲久欲見其繪像可諭其使至是因遣使來賀乾元節持其三世畫像來致其主命以求御容定衙前五則法初太祖因唐制定諸州户為九等上四等給役下五等免之以御前主官物里正戸長鄉書手課督賦税耆長弓手壯丁逐捕盜賊承符人力手力散從官給使令後有貧富不均隨時升降淳化末始令諸縣以第一等戸為里正第二等戸為戸長里正督税衙前運官物陪償折耗役為至重民多破産者蔡襄韓絳甞為帝言之乃立五則法令相替易然猶不能堪以趙抃為殿中侍御史抃為御史彈劾不避權倖聲稱凛然京師目為鐵面御史其言務欲朝廷别白君子小人以為小人雖小過當力遏而絶之君子不幸註誤當保全愛惜以成就其德進拜殿中侍御史時吳充鞠真卿刁約馬遵吕景初吳中復吕溱蔡襄吳奎韓絳皆以直言居外抃言近日正人端士紛紛引去者以正色立朝不能諂事權要傷之者衆耳由是悉得召還六月陳執中免知諫院范鎮論執中無學術非宰相器會執中嬖妾笞小婢出外舍死中丞孫抃殿中趙抃等論之不報至是以旱録囚范鎮言執中為相不病而家居陛下欲弭灾變宜速退執中以快天下之望今臺臣不以隂陽不和財匱民困盜賊滋熾獄犴充斥以責宰相而捨大索小暴揚燕私若用此為進退是因一婢逐一相非所以明等級辨堂陛也孫抃復與其屬郭申錫毋湜范師錫等合班論奏執中過失詔令輪日入對執中竟免然執中在中書八年人莫敢干以私云以文彦博富弼平章事彦博與弼同召至郊詔百官迎之范鎮言曰隆之以虚禮不若推之以至誠及宣制士大夫相處于朝帝遣小黄門覘知之語翰林學士歐陽修曰古之命相或得諸夢卜今朕用二相人情如此豈不賢于夢卜哉修頓首賀㑹契丹使者耶律防至王徳用與射于玉津園防曰天子以公典樞宻而用富公為相將相皆得人矣秋八月契丹主宗真卒子燕趙國王洪基立復以重元為皇太叔契丹主如秋山次于南崖之北峪有疾召長子燕趙國王洪基諭以治國之要因大赦縱五坊鷹鶻焚釣魚之具翌日而殂洪基即位于柩前以皇太弟重元為皇太叔免拜不名大赦改元尊皇太后為太皇太后遣使告哀于宋夏髙麗洪基字納琳小字察喇況靜嚴毅有君人之容興宗早年居位不能制其母致有殺逆専擅之事既又不善厥謀遂有慶州貽悔之舉然能感富弼之言申南北之好許諒祚之盟息忿報之師於是政治内修條教宣明使無禽荒之失則何讓於聖宗焉九月遣使弔祭于契丹帝聞契丹主殂發哀成服于内東門幕次遣使祭奠弔慰及賀即位冬十月下溪蠻彭仕羲反知辰州宋守信帥師討之不克而還北江蠻酋最大者曰彭氏世有溪州州有三曰上中下溪又有龍賜忠順保静感化天賜永順六州及懿安逺新給富來寧南順髙十一州為二十州馬氏有湖南溪州刺史彭士愁等以溪錦蔣氏歸之馬氏立銅柱為界建隆末彭允林以其地内附於是二十州悉置刺史命其土酋世襲之而下溪州則兼都誓主以統十九州焉謂之誓下州將世襲則都誓主率其羣酋議子孫若弟姪親黨之當立者具名移辰州為保證申鈐轄司以聞乃賜敕告印符受命者隔江北望再拜謝恩下溪州則自彭允林文勇儒猛仕端四世相繼為刺史及仕端死復命其弟仕羲累加檢校尚書右僕射至是仕羲子知上溪州師寶怨父取其妻乃赴辰州訴之仕羲甞殺誓下十三州將奪其印符而并其地貢奉賜予悉専之自號如意大王補置官屬將起為亂知辰州宋守信聞之乃以師寶為鄉導帥兵數千深入討伐仕羲深入他洞不可得俘其拏及銅柱而官軍戰死者十八九守信等皆坐貶自是蠻獠數入冦掠邉吏不能制矣十一月南平王李德政卒子日尊嗣詔贈德政侍中南越王葬契丹興宗十二月契丹初置五經博士助教契丹主自即位以來求直言者再親御清涼殿䇿進士張孝傑等四十四人復詔設學養士頒五經傳疏置博士助教各一員詔李仲昌修六塔河河入中國行太行西曲折山間不能為大患既出大岯東走赴海更平地二千餘里禹迹既湮河并為一特以隄防為之限夏秋霖潦百川衆流所會不免決溢而大名鄆澶滑孟濮齊淄滄棣濵德博懐衛鄭等郡及開封往往受其害於是詔諸州長吏兼河隄使通判兼判官葢以謹力役而重水患也防塞之法甚備而決溢之患時有説者以河隨時漲落自立春後凍解候人量水初至凡一寸則夏秋當至一尺頗為信驗謂之信水二三月桃花始開冰泮雨積川流猥集波瀾盛長謂之桃華水春末蕪菁花開謂之菜花水四月麥芒變色謂之麥黄水五月瓜實延蔓謂之瓜蔓水盛夏朔地堅冰消釋沃蕩山石水帶礬腥併流于河謂之礬山水七月豆秀謂之豆花水八月菼薍華謂之荻苖水九月重陽謂之登髙水十月水落復道謂之復槽水十一十二月斷冰雜流乗寒復結謂之蹙凌水水信有常率以為凖非時暴漲謂之客水隨決隨塞瀕河苦之至是河決大名館陶之郭因詔發丁塞之而河勢猶壅殿中丞李仲昌請自澶州商胡河穿六塔渠入横隴故道以披其勢富弼是其䇿詔發三十萬丁修六塔河以囘河道以知澶州李璋為總管李仲昌提舉河渠内侍張懐恩為都監王從善為鈐轄龍圖閣直學士施昌言總領其事翰林學士歐陽修三上疏力諫其不可行帝不聽丙申嘉祐元年契丹清寧二年春正月帝有疾文彦博帥宰相宿衛禁中二月帝疾瘳乃罷甲寅朔帝御大慶殿受朝未罷疾暴作扶入禁中文彦博呼内侍史志聰問狀對曰禁宻不敢漏言彦博叱曰爾曹出入禁闥不令宰相知天子起居欲何為耶自今疾勢增損必以告不爾當行軍法又與劉沆富弼謀啓醮于大慶殿因留宿殿廬志聰曰無故事彦博曰此豈論故事耶復命近臣禱于寺觀諸州長吏禱于嶽瀆蠲天下被灾田租而降赦死罪以下罷上元張燈令輔臣禱天地宗廟社禝知開封府王素夜叩宫門上變彦博不使入明旦有言禁卒告都虞候欲為亂劉沆欲捕治彦博召都指揮使許懐德問都虞候何如人懐德稱其愿可保彦博曰然則卒有怨誣之耳當亟誅之以靖衆乃請沆判狀尾斬卒于軍門北京留守賈昌朝素惡富弼隂結内侍武繼隆令司天官二人俟執政聚時於殿廷言國家不當穿河于北方致上體不安彦博知其意有所在然未有以制之後數日二人又上言請皇后同聽治亦繼隆所教也史志聰以其狀白執政彦博視而懷之不以示同列而有喜色徐召二人詰之曰汝今日有所言乎曰然彦博曰天文變異汝職所當言也何得輒預國家大事汝罪當族二人懼色變彦博曰觀汝直狂愚耳未忍治汝罪自今無得復然二人退乃出狀示同列同列皆憤怒曰奴敢爾僣言何不斬之彦博曰斬之則事彰灼於中宫不安衆乃曰然既而議遣司天官定六塔方位復使二人徃繼隆曰請留之彦博曰彼本不敢妄言有教之者耳繼隆黙不敢對二人至六塔恐治前罪更言六塔在東北非正北也二月甲辰帝疾愈御延和殿彦博等還私第當是時京師業業賴彦博弼持重衆心乃安已而劉沆白帝曰陛下違豫時彦博擅斬告反者彦博以沆判呈帝帝乃解閏三月以王堯臣參知政事程戡為樞宻副使戡以文彦博親故改授副使知諫院范鎮請建太子詔罷鎮諫職帝夙性寛仁言事者競為激訐鎮知諫院獨務引大體非關朝廷安危生民利疚則未嘗言及帝在位三紀忽暴疾先雖育宗實宫中而未有建儲之意中外莫不寒心無敢先言者文彦博因請于帝帝許之會疾瘳而止至是鎮奮然曰天下事尚有大于此者乎即上疏曰置諫官者為宗廟社禝計也諌官而不以宗廟社禝計事陛下是愛死嗜利之人臣不為也方陛下不豫海内皇皇莫知所為陛下獨以祖宗後裔為念是為宗廟社禝之慮至深且明也昔太祖舍其子而立太宗天下之至公也真宗以周王薨養宗子於宫中天下之大慮也願以太祖之心行真宗故事拔近屬之尤賢者優其禮秩置之左右與圖天下以繫億兆人心疏奏文彦博使客問何所言鎮以實告客曰如是何不與執政謀鎮曰自分必死故敢言若謀於執政或以為不可豈得中輟乎章累上不報執政諭之日奈何效希名干進之人鎮貽書曰比天象見變當有急兵鎮義當死職不可死亂兵之下此乃鎮擇死之時尚可顧希名干進之嫌哉因復上疏言之愈切聞者股栗除兼侍御史知雜事鎮以言不從固辭執政諭之曰今間言已入為之甚難鎮曰事當論其是非不當問其難易諸公謂今日難于前日安知異日不難于今日乎凡見帝面陳者三因泣下帝亦泣謂曰朕知卿忠卿言是也當更俟三二年鎮退復上疏以請前後章凡十九上待命百餘日鬚髮皆白朝廷知不可奪乃改鎮糾察在京刑獄同修起居注時并州通判司馬光亦言建儲事且勸鎮以死争之翰林學士歐陽修殿中侍御史包拯吕景初趙抃知制誥吳奎等皆上疏力請於是宰輔文彦博富弼王堯臣等相繼勸帝早定大計皆不見聽以唐介知諌院御史吳中復請召還唐介文彦博因言于帝曰介頃為御史言臣事多中臣病其間雖有風聞之誤然當時責之太深請如中復奏乃召介知諫院時稱彦博長者夏四月河決六塔流李仲昌于英州罷囬河役四月壬子李仲昌等命塞商胡北流入六塔河不能容是夕復決溺兵夫漂芻藁不可勝計詔三司判官沈立往行視内侍劉恢遂奏六塔之役水死者數千萬人穿土干犯忌禁且河口乃趙征村於國姓御名有嫌而大興鍤斸非便詔罷其役而令御史吳俟中復及内侍鄧守恭置獄于澶劾仲昌等違詔㫖不秋冬塞北流而遷延以致決潰於是張懐恩流潭州仲昌流英州并施昌言李璋等被謫有差大雨京師屋壞江河溢大雨水注安上門門關折壞官司廬舍數萬區諸路言江河決溢河北尤甚六月雨社禝壇壞詔求直言六月乙亥雨瓌太社太稷壇詔羣臣實封言闕失而分遣使賑䘏被傷者於是翰林學士歐陽修知制誥吳奎侍御史吕景初皆以帝未建儲副為言而知制誥劉敞言之尤力秋八月庚戌朔日有食之狄青罷青在樞府每出入士卒輒指日以相矜誇至壅馬足不得行又其家數有光怪㑹京師大水青避于相國寺行止殿上人情頗疑知制誥劉敞出知揚州陛辭言曰陛下幸愛青不如出之以全其終帝然之乃以使相判陳州青為人慎宻寡言其計事必審中機㑹而後發行師先正部伍明賞罰與士卒同饑寒勞苦雖敵猝犯之無一士敢後先者故數有功未甞專賞蔽下故人皆樂為之死以韓琦為樞宻使九月命宰臣攝事于太廟大赦冬十一月王德用罷德用將家子習知軍中情偽善以恩撫下故多得士心雖屢臨邉境未甞親矢石督攻戰而名聞四裔閭閻婦女小兒亦呼為黒王相公云以賈昌朝為樞宻使十二月劉沆免沆初以附張貴妃得進由是數為御史范師道趙抃等論列沆深疾之因上言自慶厯後臺諫官用事朝廷命令之出事無當否悉論之必勝而後已專務抉人隂私莫辨之事以中傷士大夫執政畏其言進擢尤速請行御史遷次之格滿二歲者與知州帝從之既又隂欲出師道抃于外中丞張昪曰天子耳目之官而宰相挾私斥之可乎上疏極言于帝沆遂出知應天沆長于吏事然任數善刺探權近過失隂持之以軒輊取事以曽公亮參知政事以包拯權知開封府拯性峭直剛毅惡吏苛刻為政務敦厚雖嫉惡如仇而未甞不推以忠恕與人不茍合不偽辭色以悦人平生無私書及知開封貴戚宦官為之斂手吏民不敢欺童稚婦人亦知其名呼曰包待制京師為之語曰關莭不到有闕羅包老以其笑比黄河清焉丁酉二年契丹清寧三年夏奲都元年春三月親試舉人帝切于求士進士諸科一舉而獲選者至千三百餘人士子習尚險怪竒僻之文號太學體張方平甞言文章之變與政通今設科取才専取辭藝士惟道義積于中英華發于外然則以文取士所以叩諸外而質其中之藴也言而不度則何觀焉邇來文格日失其舊各出新意相勝為竒朝廷惡其然屢下詔書戒敕而學者樂于放逸罕能自還今賦或八百字論或千餘字䇿或置所問而妄肆胷臆漫陳他事驅扇浮薄重虧雅俗豈取賢斂才備治具之意耶其増習新體澶漫不合程式悉乞考落雖為下詔掲示而士習不改是年翰林學士歐陽修知貢舉痛抑新體仍嚴禁挾書者凡為時所推譽善文者皆被黜榜出澆薄之士候修晨朝聚譟于馬首街司邏卒不能禁止至為祭文投修家求其主名卒不能得然自是塲屋之習遂為之變竒險之辭始革矣三月癸卯帝御殿親試舉人及第出身者凡八百七十七人舉人殿試免黜落自此年始契丹使耶律防來初興宗以其先世繪像來求御容會殂事乃已至是復使耶律防陳覬來求以成先志張昪如契丹報使也秋八月置廣惠倉于諸州初天下沒入户絶田官自粥之至是韓𤦺請留勿粥募人耕而收其租别為倉貯之以給州縣郭内之老㓜貧疾不能自存者謂之廣惠倉以提刑領其事歲終具出納之數上三司毎千戸留田租百石以是為差戸寡而田有餘則粥如舊九月契丹使蕭扈來求御客也胡宿奉帝繪像如契丹冬十二月詔間嵗舉士置明經科進士諸科待試京師者恒六七千人一不幸有故不應詔徃徃沉淪十數年以此毀行干進者不可勝數王洙侍邇英閣講周禮至三年大比大考州里以賛鄉大夫廢興帝曰古者選士如此今率四五嵗一下詔故士有抑而不得進者孰若裁其數而屢舉也下有司議咸請易以問嵗之法則無滯才之歎薦舉數既減半主司易以詳較得士必精且人少則有司易於檢察偽濫自不能容使寒苦藝學之人得進於是下詔間嵗貢舉進士諸科悉解舊額之半增設明經試法凡明兩經或三經五經各問大義十條兩經通八三經通六五經通五為合格兼以論語孝經䇿時務三條出身與進士等而罷説書舉人契丹太后蕭氏卒訥木錦卒諡欽哀戊戌三年契丹清寧四年夏六月文彦博賈昌朝罷彦博以老求罷以使相判河南封潞國公知諌院陳升之等恐昌朝遂代為相乃率僚屬上言昌朝建大第别創客位以待宦者宦官有矯制者樞宻院釋不治昌朝竟出判許州昌云朝在侍從中多得名譽及執政始不為正人所與以韓𤦺平章事宋庠田况為樞宻使張昪為副使時帝春秋髙且以疾不能御殿中外惴恐而儲嗣未建范鎮雖解言職請之益切每入對未甞不言兾以感動帝意而帝依違不决琦既相乗間進曰皇嗣者天下安危之所係自昔禍亂之起皆由䇿不早定陛下何不擇宗室之賢者以為宗廟社禝計帝曰後宫將有就館者姑待之已而又生女𤦺懐漢書孔光傳以進日成帝無嗣立弟之子彼中材之主猶能如此况陛下乎願以太祖之心為心則無不可者帝不答及昪為中丞指切時政無所避畏帝謂之曰卿孤立乃能如此昪對曰臣仰託聖主致位侍從是為不孤今陛下之臣持禄養望者多而赤心謀國者少竊以為陛下乃孤立耳帝為感動秋八月乙亥朔日有食之王堯臣卒下溪蠻彭仕羲降仕羲復乞内附奉朝貢歸連嵗所掠甲仗士卒詔辰州還其拏及銅柱自是復通中國然桀驁益甚冬閏十二月詔伎吏母得知州軍及提㸃刑獄詔定制科進士遷次之格時間歳舉士登第者衆驟致顯擢欲稍裁抑之下詔曰朕惟國之取士與士之待舉不可曠而冗也故立間歳之期以勵其勤約貢舉之數以精其選著為定式申敕有司而髙第之人甞不次而用若循舊比終至濫官甚亡謂也自今制科入第三等與進士第一人除大理評事簽書兩使幕職官代還升通判再任滿試館職制科入第四等與進士第二第三除兩使幕職官代還改次等京官制科入第五等與進士為四第五除試銜知縣代還遷兩使職官鏁㕔人視此若夫髙才異行施於有政而功狀較然者當以異恩擢焉帝之世十有三舉進士四千五百七十人其甲第之三人凡三十有九官不至公卿者五人而已己亥四年契丹清寧五年春正月丙申朔日有食之用牲于社帝避殿不受朝二月罷𣙜茶自茶為官𣙜民私蓄盜販皆有禁嵗報刑辟不可勝計園戸困於征取官司並縁侵擾困陷罪戾至破産逃匿者歲比有之又茶法屢變歲課日削官茶所在陳積縣官獲利無幾論者皆謂宜弛其禁帝曰茶鹽民所食而强設法以禁之致犯法衆顧經費尚廣未能弛禁爾既而葉清臣請令通商收税以免輦運之勞弭刑辟之濫又茶與鹽均為人用宜以口定賦三司議以為不可行於是著作佐郎何鬲三班奉職王嘉麟皆上書請罷給茶本錢縱園戸貿易而官收租錢與所在征算歸𣙜貨務以償邉糴之費可以疏利源而寛民力富弼韓𤦺曽公亮然其䇿請于帝行之下三司議三司言茶課給本收利所獲甚㣲而煩擾為患園戸輸納侵害日甚小民趨利犯法益繁宜約嵗入息錢之數均賦茶民資其買賣所在收算而不給本錢遂下詔曰自唐建中始有茶禁上下規利垂二百年民困誅求官積濫惡犯法者繁情所不忍是以江湖數千里為穽以害民也其弛舊禁俾通商利以體吾民凡嵗輸緡錢三十三萬八千有竒謂之租錢與諸路本錢悉儲以待邉糴自是惟臘茶禁如舊餘茶肆行天下矣論者猶謂朝廷志于恤人省刑其意良善然茶戸先時受錢于官而今也顧使納錢于官受納之間利害百倍先時百姓冒法販茶者被罰耳今悉均賦于民賦不時入刑亦及之是良民代冐法者受罪先時商賈為國遷貿而州郡收其税今商賈以利薄不行致税額不登經費日蹙翰林學士歐陽修劉敞皆主是説而帝力行前議焉交阯寇欽州夏四月大祫于太廟封周世宗後柴詠為崇義公給田十頃以奉周祀從著作佐郎何鬲之請也以范鎮知制誥鎮入謝首言建儲事且曰陛下許臣今三年矣願早定大計復獻祫享賦以諷焉帝猶未許田况罷况寛厚明敏有文武材好論天下事言甚明切以疾罷冬十一月汝南郡王允讓卒追封濮王諡安懿允讓天資渾厚内寛外莊喜愠不見于色甞至大宗正寺宗子有好學者勉進之以善若不率教則勸戒之至不變始正其罪故皆畏服及薨以其子宗實育于宫中故䘏典有加以牧地賦貧民庚子五年契丹清寕六年春正月鑿二股河夏四月程戡免戡與宋庠不合數争議于帝前臺諫以為言帝不悦之殿中侍御史吕誨復論戡結貴倖以致位乃免以孫抃為樞宻副使五月以王安石為三司度支判官撫州臨川人王安石好讀書善屬文曽鞏攜其所撰以示歐陽修修為之延譽擢進士上第授淮南判官故事秩滿許獻文求試館職安石獨否乃調通判舒州文彦博為相薦安石恬退乞不次進用以激奔兢之風歐陽修為學士薦安石為諌官安石皆以祖母年髙為辭修以其湏禄養復言於朝召為羣牧判官改度支判官安石議論髙竒能以辨博濟其説果於自用慨然有矯世變俗之志於是上萬言書其大要以為今天下之財力日以困窮風俗日以衰壊患在不知法度不法先王之政故也法先王之政者法其意而已法其意則吾所改易更革不至乎傾駭天下之耳目囂天下之口而固已合先王之政矣因天下之力以生天下之財取天下之財以供天下之費自古治世未甞以財不足為患也患在治財無其道耳先是館閣之命屢下安石輒辭不起士大夫謂其無意于世恨不識其面朝廷每欲畀以美官惟患其不就也及赴是職而閒者莫不喜悦焉六月曽公亮上新唐書帝以自商周以來為國長久者惟漢與唐而劉煦等所撰唐史卑弱淺陋不足以起其文使唐之君臣功烈不足以動人耳目乃命翰林學士歐陽修端明殿學士宋祁刋修之范鎮王疇宋敏求吕夏卿劉羲叟等為編修官參知政事曽公亮提舉其事十有七年而成凡二百二十五卷其事則增于前文則省于舊紀志表則歐陽修撰之𫝊則宋祁撰焉修以祁先進且位重故各著其名以自異秋七月交阯寇邉詔發諸州兵討之冬十一月宋庠免庠再登用浮沉固寵又愛信幼子縱其與小人逰殿中侍御史吕誨論庠隂求援助徇私紊法罷判鄭州以曾公亮為樞宻使張昪孫抃參知政事歐陽修陳旭趙槩為樞宻副使以薛向為陜西轉運使兼制置解鹽事范祥卒故也辛丑六年契丹清寧七年春三月富弼以母䘮去位詔起復之弼固辭弼為首相守典故而傅以公議無容心於其間由是百官任職天下無事以母䘮去位故事執政遭䘮皆起復帝虚位五起之弼固請終制且曰起復金革之變禮不可施於平世帝許之夏四月陳旭罷知諌院唐介趙抃御史范師道吕誨上疏論旭隂結宦者故得大用帝曰朕選用執政豈容内臣預議耶旭亦請罷乃知定州而介等皆外補以包拯為樞宻副使六月壬子朔日有食之是日京師隂雨司天言當食六分之半食四分而雨羣臣欲援至和例稱賀中丞王疇言若受賀則失祗畏奉天之意同判尚書禮部司馬光言日之所照周徧中外雲之所蔽至為近狹雖京師不見四方必有見者天意若曰人君為隂邪所蔽灾慝甚明天下皆知其憂危而朝廷獨不知也食不滿分者乃厯官術數不精當治其罪亦非所以為賀也帝從之以司馬光同知諌院光入對首言臣昔通判并州所言三章願陛下果斷力行帝沉思久之曰得非欲選宗室為繼嗣者乎此忠臣之言但人不敢及耳光對曰臣言此自謂必死不意陛下開納帝曰此何害古今皆有之光復上疏言人君之大德有三曰仁明武致治之道有三曰任官信賞必罰且言養兵之術務精不務多赦書害多而利少非國家之善政也又進五規曰保業惜時逺謀重㣲務實帝深納之以王安石知制誥安石自度支判官改同修起居注辭之累日閤門吏齎敕就付之拒不受吏隨而拜之則避于厠吏置敕於案而去又追還之上章至八九乃受遂加制誥糾察在京刑獄秋八月以曽公亮平章事張昪為樞宻使胡宿為副使宿為人清慎忠實臨事不妄發既發亦不可回止其當重任尤能顧惜大體及入政府羣臣多更張庻事以革宿弊宿曰變法古人所難不務守祖宗成法而徒紛紛無益於治也閏八月䇿賢良方正直言極諫之士于崇政殿王介蘇軾蘇轍皆在舉中轍對切直胡宿力請黜之帝不許曰求直言而以直棄之天下其謂我何乃收入第四等王安石以母䘮去職時有詔舍人院無得申請除改文字安石争之曰審如是則舍人不得復行其職而一聽大臣所為自非大臣欲傾側而為私則立法不當如是今大臣之弱者不敢為陛下守法而强者則挾上㫖以造令諌官御史無敢逆其意者臣實懼焉語皆侵執政執政者不悦會以母䘮遂去職以歐陽修參知政事以范鎮為翰林學士冬十月起復濮安懿王子宗實知宗正寺固辭不拜羣臣以儲位未建為憂言者雖切而帝未之允司馬光上疏曰向者臣進豫建太子之説意謂即行今寂無所聞此必有小人言陛下春秋鼎盛何遽為此不祥之事小人無逺慮特欲倉卒之際援立其所厚善者耳定䇿國老門生天子之禍可勝言哉帝大感動日送中書光見韓琦等曰諸公不及今定議異日禁中夜半出寸紙以某人為嗣則天下莫敢違𤦺等拱手曰敢不盡力時知江州吕誨亦上疏言之及琦入對以光誨二疏進讀未及有所啟帝遽曰朕有意久矣誰可者琦惶恐對曰此非臣輩所可議當出自聖擇帝曰宫中甞養二子小者甚純近不慧大者可也𤦺請其名帝曰宗實𤦺等遂力賛之議乃定宗實天性篤孝好讀書不為燕嬉褻慢服御儉素如儒者時居濮王䘮乃起復為泰州防禦使知宗正寺𤦺曰事若行不可中止陛下斷自不疑乞内中批出帝意不欲宫人知曰只中書行足矣命下宗實乞終䘮不允凡十八表而後許之帝復以問𤦺𤦺對曰陛下既知其賢而選之今不敢遽當葢器識逺大所以為賢也願固起之帝曰然十二月復豐州壬寅七年契丹清寧八年春三月孫抃罷抃篤實無威儀居政府年耄善忘舉止語言傳者為口實御史韓鎮論罷之以趙槩參知政事吳奎為樞宻副使槩與韓𤦺曽公亮歐陽修同心輔政朝廷以治修以軍民官吏財利政之先務乃掇百司之要中書所當知者集為總目遇事取視之不復求諸有司焉夏五月包拯卒秋八月以皇從兄濮安懿王子宗實為皇子賜名曙封鉅鹿郡公宗實既終䘮帝復起之猶力辭韓𤦺言於帝曰宗正之命初出外人皆知必為皇子不若遂正其名帝從之議既定中書召翰林侍讀學士王珪作詔珪曰此大事也非面受㫖不可明日珪請對進曰海内望此舉久矣果出自聖意乎帝曰朕意决矣珪再拜賀始退而草詔歐陽修聞之數曰王珪真學士也詔下宗實復稱疾固辭章十餘上記室周孟陽請其故宗實曰非敢徼福以避禍也孟陽曰今已有此迹設固辭不受中人别有所奉遂得燕安無患乎宗實始悟會司馬光進言於帝曰皇子辭不貲之富至於旬月其賢於人逺矣然父召無諾君命召不俟駕願以臣子大義責之宜必入帝從之宗實遂受命將入宫戒其舍人曰謹守吾舍上有適嗣吾歸矣因肩輿赴召良賤不滿三十人行李蕭然唯書數厨而已中外相賀既為皇子慎靜恭黙無所猷為而天下隂知其有聖徳云冬十月詔賜諸路常平糴本錢詔内藏庫三司共出緡錢一百萬助糴天下常平倉折繼祖卒以其兄子克柔權領府州事召福州處士陳烈為國子監直講不至侯官人陳烈性介僻篤於孝友學行端飭動遵古禮平居終日不言御童僕如對賔客里中敬之從學者常數百人賢父兄訓子弟必舉烈言行以示之公卿交薦其賢朝廷屢召之固辭不起人問其故烈曰吾學未成也癸卯八年契丹清寧九年夏拱化元年春三月帝崩于福寧殿夏四月皇子鉅鹿郡公曙即位尊皇后為皇太后赦三月辛未帝暴疾崩于福寧殿皇后聞之悉斂諸門鑰寘于前召皇子入以遺詔令嗣位皇子驚再言曰曙不敢為因反走韓琦等共掖留之四月壬申朔皇子即位欲亮隂三年命韓𤦺攝冢宰宰臣不可乃止仁宗恭儉仁恕敬天重民有司甞請以玉清舊址為苑帝曰吾奉先帝苑囿猶以為廣何以是為燕私常服浣濯帳帟衾裯多用繒絁甞中夜饑思燒羊戒勿宣索曰恐膳夫自此戕賊物命以備不時之需大辟疑者皆令上讞嵗甞活千餘人吏部選人一坐失入死罪皆終身不遷每諭輔臣曰朕未甞詈人以死况敢濫用刑乎在位四十二年之間吏治若媮惰而任事蔑殘刻之人刑法似縦弛而决獄多平允之士國未甞無嬖倖而不足以累世治之體朝未甞無小人而不足以勝善類之氣君臣上下惻怛之心忠厚之政所以培壅國基者厚矣子孫一矯其所為馴致于亂傳曰為人君止于仁帝誠無愧焉帝有疾詔請皇太后權同處分軍國事乙亥帝得暴疾詔請皇太后權同處分軍國事后乃御内東門小殿垂簾宰臣覆奏事后性慈儉頗渉經史及聽政多援經義以决事中外章奏日數十上一一能記綱要有疑未决者則曰公輩更議之未甞出已意檢柅曹氏及左右臣僕毫分不以假借宫省肅然立髙氏為皇后后侍中瓊之曽孫祖太尉繼勲父北作坊副使遵甫母曹氏太后姊也故少育于宫中與帝同年生又俱撫鞠于太后仁宗甞曰異日必以為配既長遂成婚生三子至是冊為后五月以富弼為樞宻使秋七月帝疾瘳帝疾甚舉措或改常度遇宦者尤少恩左右多不悦乃共為䜛間兩宫遂成嫌隙内外洶懼知諫院吕誨上書兩宫開陳大義詞㫖深切多人所難言者然兩宫猶未釋然一日韓𤦺歐陽修奏事簾前太后嗚咽流涕具道所以𤦺曰此病故爾病已必不然子疾母可不容之乎后意不解修進曰太后事先帝數十年仁徳著于天下昔温成之寵太后處之裕如今母子之間反不能容耶后意稍和修復曰先帝在位久德澤在人故一日晏駕天下奉戴嗣君無敢異同者今太后一婦人臣等五六書生耳非先帝遺意天下誰肯聽從后黙然久之琦進曰臣等在外聖躬若夫調䕶太后不得辭其責后驚曰是何言我心更切也同列聞者莫不流汗後數日𤦺獨見帝帝曰太后待我少恩𤦺對曰自古聖帝明王不為少矣獨稱舜為大孝豈其餘盡不孝哉父母慈而子孝此常事不足道惟父母不慈而子不失孝乃為可稱但恐陛下事之未至耳父母豈有不慈者哉帝大感悟帝自六月不御殿七月壬子初御紫宸殿見百官琦因請乗輿禱雨具素服以出人情大安契丹太叔重元反耶律仁先敗之重元自殺契丹主尊寵太叔重元甚至賜以金劵免拜不名而重元隂懐異圖是月契丹主田于灤水之太子山重元子楚國王尼嚕古與陳國王辰禄衛王特布等四百人謀作亂敦睦宫使耶律良上變契丹主召南院樞宻使許王耶律仁先語之且急召尼嚕古仁先曰此曹凶逆臣固疑之陛下宜謹為備臣請帥衛士以討焉尼嚕古聞召知事泄遂誘脅弩手軍陣于行宫外仁先出未及介馬賊黨已犯帷殿契丹主急欲走南北院仁先曰陛下若捨扈從而行賊必躡其後且南北大王心未可知乃止仁先環車為營拆行馬為兵仗帥官屬近侍三十餘騎陣柢枑外使北院樞宻使趙王耶律伊遜等率宿衛士卒庖夫弩手傘子等三百餘人與尼嚕古戰方合賊衆多降尼嚕古知事不濟躍馬突出為近侍渤海阿蘇等射殺之重元被傷而退其黨殿前㸃檢耶律徹爾謂樞宻同知蕭呼圖克曰行宫無備宜乗夜刼之庶或有濟若俟明日外援必至其誰與我呼圖克曰第圍之勿令外軍得入彼何能為黎明而發何遲之有重元從之令四面廵警待旦遂奉重元僣位以呼圖克為樞宻使而率奚人二千薄行宫五院部節度蕭塔拉兵適至仁先俟賊氣沮背營而陣乘便奮撃塔拉自外擾之賊徒大奔追殺二十餘里重元走大漢嘆曰尼嚕古使我至此乃自殺黨與皆伏誅契丹主執仁先手曰平亂皆卿之力也加尚父進封宋王伊遜等加賞有差伊遜五院部人美風儀外和内狡家素貧為人牧羊稍長為文班吏掌太保印得入宮仁懿皇后見其詳雅如素宦者令補筆硯吏興宗亦愛之遂累擢至樞宻與北府宰相張孝傑貴寵用事于國冬十月葬永昭陵十二月命侍臣講讀經史于邇英閣翰林侍讀學士劉敞進讀史記至堯授舜以天下拱而言曰舜至側㣲堯禪之以位天地享之百姓戴之非有他道惟孝友之德光于上下耳帝悚然改容太后聞之亦大喜兩宫之疑漸釋作寶文閣藏仁宗御集也甲辰英宗皇帝治平元年契丹清寧十年夏四月放宫女還其父家凡三百二十五人從知諌院司馬光之言也五月浚五股河河流派别于魏州之第六埽名曰二股河其廣二百尺距魏恩德博之境百三十里東至德滄入海轉運使韓贄請浚之以紓恩冀之患至是詔併五股河治之皇太后還政于帝封韓琦為魏國公帝疾大瘳韓琦欲太后撤簾還政乃取十餘事禀帝帝裁决悉當琦即詣太后覆奏后每事稱善𤦺因白后求去后曰相公不可去我當居深宫耳遂起𤦺即厲聲命撤簾簾既落猶於御屏後見后衣也帝親政加琦右僕射封魏國公作孝嚴殿于景靈宫奉仁宗御容也秋八月録周世宗後内侍任守忠有罪蘄州安置初章獻太后臨朝守忠與都知江德明等交通請謁權寵過盛累擢内侍入内都知仁宗以未有儲嗣屬意于帝守忠建議欲援立昏弱以邀大利及帝即位又乘帝疾語言誕妄交搆兩宫知諌院司馬光論守忠大姦陞下為皇子非守忠意沮壊大䇿離間百端頼先帝不聽及陛下嗣位反覆交搆國之大賊乞斬于都市以謝天下吕誨亦上疏論之然猶未即加罪一日韓琦出空頭敕一道歐陽修已簽趙槩難之問修曰如何修曰第書之韓公必自有説槩不敢違既而琦坐政事堂召守忠立庭下曰汝罪當死遂貶保信軍節度副使蘄州安置取空頭敕填與之即日押行𤦺意以為少緩則中變也其黨史昭錫等悉竄南方中外咸快之九月復武舉冬十一月刺陜西民為義勇軍韓𤦺言三代漢唐以來皆籍民為兵唐置府兵最為近古今之義勇河北幾十五萬河東幾八萬勇悍純實若稍加簡練亦唐之府兵也河東北陜西三路當西北控禦之地事當一體今若于陜西諸州刺手背以為義勇甚便乃命徐億等徃料陜西諸戸三丁之一刺之凡十三萬八千四百六十五人各賜錢二千民情驚擾而紀律疎略不可用知諌院司馬光上疏力諫帝示韓𤦺𤦺曰兵貴先聲諒祚方桀驁使驟聞益兵二十萬豈不震慴光曰兵貴先聲為其無實也獨可欺于一日之聞耳今吾雖益兵實不可用不過十日彼將知其詳尚何懼𤦺曰君但見慶厯間鄉兵刺為保㨗憂今復然已降敕與民約永不充軍遣戍邉矣光曰朝廷甞失信于民未敢以為然𤦺曰吾在此君無憂光曰公長在此地可也異日他人當位用以運糧戍邉反掌問耳𤦺不從竟為陜西之患十二月西蕃木征以河州來附初唃厮囉娶李立遵女生瞎氊及磨氊角又娶喬氏生董氊立遵既與唃厮囉不恊李氏寵亦衰斥為尼于廓州而錮其二子二子乃結母黨李巴全竊母奔宗哥城唃厮囉不能制磨氊角因撫有宗哥寳元中磨氊角死部人立其子瞎撒欺丁李氏懼孤弱不能守乃復請屬唃厮囉瞎氊則居龕谷而死瞎氊二子長曰木征居河州少曰瞎吳叱居銀川而董氊與母别居歴精城號令嚴明人憚服之有衆六萬日以盛强獨有河北之地由是唃厮囉所部分矣至是木征率其衆以河州乞内附吳奎以父喪去位以王疇為樞宻副使乙巳二年契丹咸雍元年春正月契丹立梁王濬為太子濬契丹主長子生八年矣二月王疇卒三月行明天厯周琮所造也夏四月詔議崇奉濮安懿王典禮初知諌院司馬光以帝必將追隆所生甞因奏事言漢宣帝為孝昭後終不追尊衛太子史皇孫光武上繼元帝亦不追尊鉅鹿南頓君此萬世法也既而韓𤦺等奏請下有司議濮安懿王及夫人王氏韓氏仙遊縣君任氏合行典禮葢欲稱為考妣也帝令須大祥後議之至是乃詔禮官與待制以上議翰林學士王珪等相視莫敢先發司馬光獨奮筆曰為人後者為之子不得顧私親王宜凖封贈期親尊屬故事稱為皇伯髙官大國極其尊榮衆以為然議成珪即命吏具以光手藁為按而上奏曰先王制禮尊無二上若恭愛之心分於彼則不得専於此是以秦漢以來帝王有自旁支入承大統者或推尊其父母以為帝后皆見非當時取譏後世臣等不敢引以為聖朝法况前代入繼者多宫車晏駕之後援立之策或出臣下非如仁宗皇帝年齡未衰深惟宗廟之重祗承天地之意於宗室衆多之中簡推聖明授以大業陛下親為先帝之子然後繼體承祧光有天下濮安懿王雖於陛下有天性之親顧復之恩然陛下所以負扆端冕富有四海子子孫孫萬世相承皆先帝徳也臣等竊以為濮王宜凖先朝封贈期親尊屬以髙官大國譙國襄國仙遊並封太夫人攷之古今為宜稱于是中書奏王珪等所議未見詳定濮王當稱何親名與不名珪等議濮王於仁宗為兄于皇帝宜稱皇伯而不名參知政事歐陽修引䘮服大紀以為為人後者為其父母服降三年為期而不沒父母之名以見服可降而名不可没也若本生之親改稱皇伯歴攷前世皆無典據進封大國則又禮無加爵之道請下尚書集三省御史臺議奏詔下而太后手詔詰責執政六月甲寅帝乃詔曰如聞集議不一權宜罷之令有司博求典故以聞五月以陳旭為樞宻副使詔宗室封王者子孫襲爵秋七月富弼罷弼以足疾求解政乃以使相鄭國公判揚州張昪罷昪請老帝曰太尉勤勞王家詎可遽去但命五日一至院進見毋蹈舞司馬光亦疏昪忠謹清直不可于以私請留于朝而昪求去益力乃判許州以文彦博為樞宻使吕公弼為副使彦博自河南入覲帝曰朕之立卿之功也彦博悚然對曰陛下入繼大統乃先帝意皇太后恊賛之力臣何功之有且陛下登儲纂極之時臣方在外皆韓𤦺等承聖志受顧命臣無預焉帝曰備聞始議卿于朕有恩彦博避謝不敢當帝曰蹔煩卿西行即召還矣乃改判永興軍遂召為樞宻使八月京師大雨壞屋漂民詔求直言八月庚寅大雨京師平地涌水壊官私廬舍漂人民畜産不可勝計是日帝御崇元殿宰相而下朝參者十數人而已詔開西華門以洩宫中積水水奔激殿侍班屋皆㩁沒人畜多溺死官為葬祭其無主者千五百八十人乙未下詔責躬乞言且命罷宴減膳禱于山川冬十一月吐蕃唃厮囉卒以其子董氊為保順節度使丙午三年遼咸雍二年春正月契丹復國號曰遼詔立濮安懿王園廟以王子宗懿為濮國公主祠事貶侍御史吕誨等于州縣濮王崇奉之議久而未定翰林學士范鎮上言曰陛下既以仁宗為考又加于濮王則其失非細凡漢之稱皇考稱帝立寢廟序昭穆皆非陛下聖明之所法宜如王珪等議執政惡之侍御史吕誨范純仁趙瞻監察御史吕大防同知諫院傅堯俞等復引義固争以為王珪議是乞從之章七上而不報誨遂劾韓琦不忠五罪曰昭陵之土未乾遽欲追崇濮王使陛下厚所生而薄所繼隆小宗而絶大宗言者論辨累月琦猶遂非不為改正中外憤鬰萬口一辭願黜居外藩以慰士論又與純仁大防共劾歐陽修首開邪議以枉道説人主以近利負先帝陷陛下於過舉而韓𤦺曽公亮趙槩附會不正乞皆貶黜亦不報既而太后手詔中書門下曰吾聞羣臣議講皇帝封崇濮安懿王至今未見施行吾載閲前史乃知自有故事濮安懿王譙國夫人王氏襄國夫人韓氏仙逰縣君任氏可令皇帝稱親濮安懿王稱皇王氏韓氏任氏並稱后事方施行帝即日手詔曰稱親之禮謹遵慈訓追崇之典豈易克當其以塋為園即園立廟俾王子孫主奉祠事如皇太后㫖乃以塋為園置守衛吏即園立廟以王子宗懿為濮國公奉王後詔臣民避王諱吕誨以所論奏不見聽用繳納御史敕告家居待罪帝令閤門以告還之誨力辭臺職且言與輔臣勢難兩立帝以問執政歐陽修對曰御史以為理難並立若臣等有罪當留御史帝猶豫久之命出御史乃下遷誨知蘄州范純仁請同黜遂通判安州吕大防知休寧縣范鎮知陳州于是趙瞻傅堯俞使契丹還即上疏乞同貶乃出瞻通判汾州帝眷注堯俞獨進除侍御史堯俞曰誨等已逐臣義不當止帝不得已命知和州知制誥韓維及司馬光皆上疏乞留誨等不報遂請與俱貶亦不許侍讀吕公著言陛下即位以來納諫之風未彰而屢詘言者何以風天下帝不聽公著乞補外乃出知蔡州誨等既出濮議亦寢夏四月胡宿罷以郭逵同簽書樞宻院事夏主寇大順城趙明敗之先是夏主諒祚遣吳宗來賀即位詔令門見使者不從至順天門且欲佩魚及儀物自從引伴髙宜禁之不可留止廄置一夕絶其供饋宗語不遜宜折之使如故事良久乃聽入及賜食又訴于押伴張覲詔命還赴延州與宜辨之宗度理屈不復乞置對遂詔諒祚懲約宗諒祚不奉詔而出兵秦鳯涇原抄熟戸擾邉塞殺掠人畜以萬計遂寇大順城圍柔逺砦蕃官趙明撃退之知延州陸詵謂由積習致然不加折誚則國威不立因留其請時服使者及嵗賜而移宥州問故帝聞之喜曰固知詵能辦此諒祚聞而懼遂報言邉吏擅興今誅之矣因遣使貢方物以謝罪初諒祚寇大順韓𤦺議停其歳賜絶其和市遣使問罪文彦博難之或舉寶元康定時事𤦺曰諒祚狂童也非有元昊智計而吾邉備過當時逺甚亟詰之必服不從會陸詵䇿與𤦺合而諒祚果歸欵帝顧𤦺曰一如卿料也秋九月戊子朔日有食之冬十月以郭逵為陜西四路㳂邊宣撫使判渭州詔三嵗一試舉人十一月帝有疾十二月立頴王頊為皇太子大赦時帝久疾韓𤦺入問起居因進言曰陛下久不視朝願早建儲以安社稷帝頷之即召學士承㫖張方平至福寧殿帝馮几言言不可辨方平進筆請乃書曰來日降詔立皇太子方平抗言曰必頴王也適長而賢請書其名帝力疾書之方平退草制立太子太子既立帝因泫然下涙文彦博退謂𤦺曰見上顔色否人生至此雖父子亦不能不動也丁未四年遼咸雍三年春正月帝崩于福寧殿皇太子即位大赦帝崩年三十六英宗以明哲之資膺繼統之命臨政必問故事與古治所宜每有裁决皆出羣臣意表雖以疾疢不克大有所為然使後世欽仰髙風詠嘆至德何其盛哉尊皇太后曰太皇太后皇后曰皇太后以吳奎為樞宻副使以韓琦兼侍中文彦博兼中書令宰執羣臣進秩有差二月立妃向氏為皇后后太尉敏中之曽孫定國留後經之女帝為頴王納為妃進封李日尊為南平王三月歐陽修罷修既以議濮王典禮為吕誨所詆惟蔣之竒以修議為是及誨等斥而修薦之竒為御史衆因目為姦邪之竒患焉思所以自解㑹修婦弟薛宗孺有憾于修造帷簿不根之謗摧辱之展轉逹于中丞彭思永思永以告之竒之竒即上章劾修帝初即位欲加深謫訪諸故宫臣孫思恭思恭為修辨釋修亦杜門請推治帝使詰思永之竒所從來皆辭窮乃黜思永知黄州之竒監道州酒税修因力求退乃以觀文殿學士知亳州修天資剛勁見義勇為平生與人盡言無𨼆奬引後進如恐不及賞識之下率為聞人及在政府與韓𤦺同心輔政士大夫有所干請輒面諭可否雖臺諫論事亦必以是非詰之怨誹益衆自五代以來文體卑弱鎪刻駢偶梁周翰髙錫栁開范杲頗尚淳古及楊億劉筠聲偶之辭出學者靡然從之穆修于是獨為古文然力不足以變士習修逰隨州得唐韓愈遺藁於廢書簏中讀而心慕之苦心探頥至忘寢食與尹洙迭相師友遂以文章名冠天下其為文天才自然豐約中度言簡而明信而通引物連類折之於至理以服人心超然獨鶩衆莫能及故天下翕然師尊之崇義公柴詠致仕以其子若訥襲爵以司馬光為翰林學士固辭不許光力辭帝曰古之君子或學而不文或文而不學惟董仲舒揚雄兼之卿有文學何辭為光對曰臣不能為四六帝曰如兩漢制誥可也且卿能進士取髙第而云不能四六何耶是職非卿其誰能堪之光乃就職以吳奎參知政事閏月以王安石知江寧府終英宗之世安石被召未甞起然自以楚士寡援中朝因結韓吕二族以取重於是韓維吕公著兄弟更稱揚之帝在潁邸韓維為記室每講説見稱輒曰此非維之説維之友王安石之説也維遷庶子又薦安石自代帝由是想見其人及即位召之安石不至帝謂輔臣曰安石歴先帝朝召不赴頗以為不恭今又不至果病耶有所要耶吳奎對曰臣甞與安石同領羣牧見其護前自用所為迂濶萬一用之必紊綱紀矣乃命知江寧府夏四月以司馬光為御史中丞光為中丞上疏論心術之要三曰仁明武治國之要三曰官人信賞必罰言甚切至且曰臣獲事三朝皆以此六事獻平生力學所得盡在是矣秋八月葬永厚陵以周後柴貽廓為三班奉職九月召王安石為翰林學士曽公亮疾韓𤦺専因力薦安石覬以間琦也韓琦罷𤦺執政三朝或言其専帝頗不悦中丞王陶料必易置大臣欲自規重位因劾𤦺不押文徳殿常朝班為䟦扈𤦺閉門待罪吳奎以陶為過言詔徙陶為翰林學士奎又執不可陶遂言奎阿附因廷辯不已帝以陶過毀大臣出知陳州而奎亦罷知青州琦求去益力帝不得已以琦為鎮安武勝軍節度使司徒兼侍中判相州入對帝泣曰侍中必欲去今日已降制矣然卿去誰可屬國者王安石何如琦對曰安石為翰林學士則有餘處輔弼之地則不可帝不答琦蚤有盛名識量英偉臨事喜愠不見于色居相位再决大䇿以安社禝當是時朝廷多故琦處危疑之際知無不為或曰公所為誠善萬一蹉跌豈惟身不自保恐家無處所矣琦歎曰是何言耶人臣當盡力事君死生以之至于成敗天也豈可豫憂其不濟遂輒不為哉聞者愧服天資忠厚折節下士無貴賤禮之如一尤以奬㧞人材為急儻公論所與雖意所不悦亦收用之故得人為多選飭羣司皆使奉法循禮其所建請惟顧義之所在無適莫心與富弼並著勲業故時人稱賢相者必曰富韓吳奎陳旭罷奎既罷知青州司馬光諌曰奎名望清重今為王陶絀奎恐大臣皆不自安各求引去陛下新即位于四方觀聽非宜韓維亦以為言帝乃召奎還中書及韓琦罷相奎與旭亦去奎博學清重逹于從政甞言于帝曰陛下在推誠應天天意無他合人心而已若以至誠格物莫不以至誠應則和氣之感自然而至今民力困極國用窘乏必俟順成乃可及他事帝王所職惟在于判正邪使君子常居要近小人不得以害之則自治矣帝因言堯時四凶猶在朝奎曰四凶雖在不能惑堯之聰明聖人以天下為度未有顯過固宜包容但不可使居要近地耳帝然之以吕公弼為樞宻使張方平趙抃參知政事邵亢為樞宻副使抃為政嚴而不苛所至辦治帝聞其名自知成都召知諫院故事近臣召自外州將大用者必更省府不為諌官及命下大臣以為疑帝曰吾賴其言耳茍欲用之無傷也及入謝帝謂曰聞卿匹馬入蜀以一琴一鶴自隨為治簡易亦稱是乎遂拜參知政事抃感顧知遇朝廷有未協者必宻啟聞帝嘉其忠恒褒答之復以司馬光為翰林學士吕公著乞解知通進銀臺司從之光論張方平不恊物望難居政府帝不從還光翰林兼侍讀學士知通進銀臺司吕公著封還除目曰光以舉職賜罷是為有言責者不得盡其言也詔以告直付閤門公著又言制命不由門下則封駁之職因臣而廢願正臣罪遂觧銀臺司而光還翰林冬十月張方平以父䘮去位方平慷慨有氣節平居未嘗以言徇物以色假人名重當時所至有政績然乏公輔之望初御邇英閣召侍臣講讀經史种諤襲夏人嵬名山以歸遂城綏州夏監軍嵬名山部落在故綏州名山弟夷山請降于知青澗城种諤諤使人因夷山以誘名山賂以金盂名山小吏李文喜受之隂許歸欵而名山未之知也諤即以聞且欲因取其河南地知延州陸詵曰數萬之衆納土容可受若但以衆來情偽未可知且安所置之戒諤毋妄動諤持之力詔詵召諤問狀與轉運使薛向議撫納詵言名山誠能據横山以扞敵我以刺史世封之使白為守固為中國之利今無益我而啟西釁非計也乃共畫三䇿令幕府張穆之入奏穆之隂受向指詭言必可成帝意詵不恊力徙之秦鳯諤不待命悉起所部兵長驅而進圍名山之帳名山不得已舉衆從諤而南得首領三百戸萬五千兵萬人遂城其地夏人來争諤撃敗之陸詵劾諤擅興之罪欲捕治之未果而徙秦之命至西方用兵自此始矣通鑑續編卷七
