body:
  text: 通鑑續編卷三元陳桱撰庚申周恭帝宗訓元年宋太祖趙匡胤建隆元年是嵗周亡宋代天下宋北漢南唐南漢蜀遼凡六國吳越荆南凡二鎮春正月周使趙匡胤帥師禦漢至陳橋匡胤自立而還周聞漢遼兵自土門東下正月辛丑朔遣殿前都點檢趙匡胤率禁兵禦之癸卯發汴京殿前散指揮使苖訓善觀天文見日下復有一日黑光摩蕩者久之指示匡胤門吏楚昭輔曰此天命也是夕次陳橋驛殿前都指揮使石守信侍衛親軍都指揮使高懷德張令鐸殿前都虞侯王審琦虎捷右廂都虞侯張光翰龍捷右廂都指揮使趙彥徽相與謀曰主上幼弱我輩出死力破敵誰則知之不如先册點檢為天子然後北征未晚也都押衙李處耘具以事白匡胤弟供奉官都知匡義及歸德掌書記趙普匡義普共以事理譬曉之諸將不可夜五鼓將校軍士集驛門宣言册點撿為天子甲辰黎明逼匡胤寢所勢甚盛匡義普入帳中白之匡胤時被酒卧未起聞其言攬衣徐興將校已露刃列庭曰諸軍無主願册太尉為皇帝匡胤未及對黃袍已加身矣衆即羅拜呼萬嵗掖之上馬還汴匡義進曰夫濟天下者當使百姓戴若父母京師天下根本願號令諸將禁戢攘奪匡胤乃攬轡曰我有言諸將能從乎皆下馬曰願受命匡胤曰太后主上我北面事者不得驚犯公卿皆我比肩不得侵陵朝市府庫不得侵掠用命有重賞違不汝貫也皆應曰諾遂肅隊而行乙巳入汴匡胤令甲士歸營而自退居公署時早朝未罷聞變范質執王漙手曰倉卒遣將吾輩之罪也爪入溥手幾出血溥噤不能對侍衛親軍副都指揮使韓通自禁中遑遽而歸謀帥衆禦之軍校王彥升逐焉通馳入其第未及闔門為彥升所害妻子俱死趙匡胤稱皇帝國號宋廢周主宗訓為鄭王遷之西宫匡胤在公署將士擁范質王漙等至質以義讓匡胤匡胤流涕曰吾受世宗厚恩為六軍所迫一旦至此慙負天地將若之何質等未及對列校羅彥瓌挺劍厲聲曰我輩無主今日必得天子質等相顧不知所為溥降階先拜質不得已亦拜遂奉匡胤入宫召百官至晡時班定猶未有禪詔翰林承旨陶穀出諸袖中遂用之宣徽使引匡胤就庭北面拜受已乃掖升崇元殿服衮冕即皇帝位奉周主為鄭王符太后為周太后遷之西宫大赦改元國號宋遣使遍告郡國藩鎮加官進爵有差命周宗正郭玘祀周陵廟定國運以火德王色尚赤臘用戌論翊戴功以石守信為侍衛親軍馬步軍副都指揮使高懷德為殿前副都點檢張令鐸為侍衛親軍馬步軍都虞侯王審琦為殿前都指揮使張光翰為侍衛親軍馬軍都指揮使趙彥徽為龍捷右廂都指揮使並領節鎮餘領軍者悉進爵華山隱士陳摶聞宋主代周曰天下自此定矣宋贈周副都指揮使韓通為中書令宋主贈通以旌其忠欲加王彥升擅殺之罪羣臣以建國之始乞貫之宋主猶怒故終身不得節鉞宋遣使賑貸于諸州宋主以其弟光義為殿前都虞候趙普為樞密直學士光義即匡義也宋立太廟追帝其祖考宋有司請立宗廟詔下其議兵部尚書張昭等請依隋唐以來立四親廟宋主從之復詔議追尊四代號諡於是判太常寺竇儼上議尊高祖朓為僖祖文獻皇帝曾祖珽為順祖惠元皇帝祖敬為翼祖簡恭皇帝妣皆為皇后考𢎞殷為宣祖昭武皇帝宋主御崇元殿備禮册命因奉安神主于廟定制嵗以四孟月及季冬凡五享朔望薦食薦新三年一祫以孟冬五年一禘以孟夏漢遼師還二月宋主尊其母杜氏為太后后定州安喜人治家嚴而有法生五子曰匡濟匡胤光義光美匡贊匡濟匡贊早卒陳橋之變宋主先遣楚昭輔入汴慰安家人后聞之曰吾兒素有大志今果然矣及尊為皇太后宋主拜於殿上羣臣稱賀后愀然不樂左右進曰臣聞母以子貴今子為天子胡為不樂后曰吾聞為君難天子置身兆庶之上若治得其道則此位可尊茍或失馭求為匹夫不可得是吾所以憂也宋主再拜曰謹受教宋加周宰相范質王溥魏仁浦等官並同中書門下平章事吳廷祚同中書門下二品宋賜貢士楊礪等十九人及第出身有差三月唐吳越遣使如宋賀即位也宋遷周六廟于洛陽廟成遣官奉遷周六廟神主居之仍命郭玘以時饗祀夏四月周昭義節度使李筠會北漢師伐宋宋主即位遣使加筠中書令使者至潞州筠欲拒之賔佐切諌乃延使者置酒既而取周太祖畫像懸于壁涕泣不已賔佐惶駭告使者曰令公被酒失其常性幸勿為訝筠長子守節泣諌筠不聽宋主手詔慰撫且召守節為皇城使北漢主鈞聞之乃以蠟書結筠同舉兵及守節至汴宋主遣歸謂筠曰我未為天子時任汝自為之我既為天子汝獨不能小讓我耶守節歸以白筠筠遂起兵令幕府為檄數宋主罪執監軍周光遜等送于北漢以求濟師又遣人殺澤州刺史張福而據其城北漢主封筠為西平王自帥兵赴之筠見北漢主于太平驛言受周太祖恩不敢愛死北漢主與周世讐不悅其語因使其宣徽使盧贊監其軍筠見漢兵弱少而贊又來監心甚悔謀多不協乃留守節守潞而自引衆南向漢主聞贊與筠異復遣其平章事衛融和解之宋主遣石守信高懷德慕容延釗王全斌分道擊之敗筠兵于長平五月己亥朔日有食之宋主圍澤州六月李筠死之五月宋主自帥大衆討筠山路險峻多石不可行宋主先於馬上負數石將士因爭負之即日平為大道遂與守信等會大敗筠衆於澤州南殺盧贊筠走保澤州宋主列柵圍之六月宋將馬全義帥敢死士數十人攀堞而上遂入其城筠赴火死獲衛融融請死宋主嘉其忠以為太府卿北漢主懼引師歸乙酉宋主進攻潞州守節以城降宋主釋其罪以為單州團練使七月宋主至大梁宋以大梁為東京開封府洛陽為西京河南府秋七月宋選諸州兵入衛宋主詔殿前侍衛二司各閲所掌兵揀其驍勇者升為上軍而命諸州長吏選所部內兵送都下以補禁旅之闕又選強壯卒定為兵樣分送諸道召募教習俟其精練即送闕下由是獷悍之士皆𨽻禁籍矣又懲唐以來藩鎮之弊分遣禁旅戍守邉城立更戍法使往來道路以習勤苦均勞佚自是將不得專其兵而士卒不至于驕惰皆趙普之謀也八月宋立后王氏宋以趙普為樞密副使宋李繼勳侵北漢取石州宋荆南節度使南平王高保融卒弟保勗嗣保融迂緩國事悉委於母弟保勗及卒保勗權知軍府請命于宋宋主授以節度使而諡保融曰正懿九月宋淮南節度使李重進謀反冬十月宋主討之十一月重進自焚死唐主使其子從鎰朝宋主于揚州重進周太祖之甥也與宋主同事周室分掌兵柄常心憚宋主宋主即位加重進中書令既而移鎮青州重進聞命下乃陰懷異志宋主得其情遣六宅使陳思誨齎賜鐵劵以安其心重進欲治裝隨思誨朝汴左右沮之因猶豫不決又自以周室懿親恐不得全遂拘思誨治城繕兵遣人求援于唐唐主以聞宋主遣石守信王審琦李處耘宋偓等分道討之趙普勸宋主自行十月宋主發汴京十一月至廣陵即日拔之城將陷左右欲殺思誨重進曰吾今舉族將赴火死殺此何益即盡室自焚思誨亦被害宋主入城戮同謀者數百人因令諸軍習戰艦于迎鑾鎮唐主大恐遣使犒師且使其子從鎰朝于揚州十二月宋主還汴唐清源節度使留從效入貢于宋遼主殺其叔父魯呼魯呼子宋王舍音輕慓無恆謀反事覺辭連魯呼遂死於獄尋追諡曰章肅皇帝宋以竇儀為翰林學士翰林學士王著以酒失貶官宋主謂宰相曰深嚴之地當使宿儒處之范質等對曰竇儀清介重厚然已自翰林遷端明矣宋主曰非斯人不可卿當諭以朕意勉令就職即日復入翰林宋主嘗召儀草制至苑門儀見宋主岸幘跣足而坐因却立不肯進宋主遽索冠帶而後召入儀遂言曰陛下創業垂統宜以禮示天下恐豪傑聞而解體也宋主斂容謝之故自是對近臣未嘗不冠帶宋初作受命寶宋主既受周二寶又作受命之寶自是遂為故事凡帝即位必作之而文不同宋鑄宋通元寶錢辛酉宋建隆二年凡六國二鎮春正月宋度民田周世宗末年嘗命官詣諸州度民田而使者多不稱至是宋主謂侍臣曰度田蓋欲勤恤下民而民愈弊今當精擇其人遂分遣常參官詣諸州三月宋以慕容延釗為山南東道節度使延釗宋主故人也為殿前都點檢宋主不欲授人以是職故有是命唐徙都洪州宋課民種植每縣定民籍為五等第一種雜木百每等減二十為差桑棗半之男女十嵗以上人種韭一畦闊一步長十步令佐以春秋巡視夏四月癸巳朔日有食之六月宋太后杜氏殂后疾革召趙普入受遺命且問宋主曰汝知所以得天下乎宋主曰祖考及太后之積慶也后曰不然正由周世宗使幼兒主天下耳使周氏有長君天下豈為汝有耶汝百嵗後當傳位于汝弟四海至廣萬幾至衆能立長君社稷之福也宋主泣曰敢不如教后顧謂趙普曰爾同記吾言不可違也普即就榻前為約誓書於紙尾署曰臣普記藏之金匱命謹密宫人掌之甲午后殂宋遣殿前副都點檢髙懷德等五人罷兵就鎮宋主既誅李筠李重進等謂趙普曰天下自唐季以來數十年間帝王凡易八姓鬭戰不息生民塗地其故何也吾欲息天下之兵建國家久長之計其道何如普對曰此無他方鎮太重君弱臣強而已今欲治之宜稍奪其權制其錢穀收其精兵則天下自安矣時石守信王審琦等皆宋主故人有功典禁衛兵普數以為言宋主未之許普乘間復力言之宋主曰彼等必不吾叛卿何憂之深耶普曰臣亦不憂其叛也然熟觀數人者皆非統御才恐不能制伏其下則軍伍間萬一有作孽者彼臨時亦不得自由耳宋主悟一日因晚朝與守信等飲酒酣屏左右謂曰朕非卿等不及此然天子亦大艱難殊不若為節度使之樂朕終夕未嘗敢安枕卧也守信等請其故宋主曰是不難知此位誰不欲為守信等頓首曰陛下何為出此言今天命已定誰復有異心宋主曰卿等固然其如麾下欲富貴何一旦有以黃袍加汝身汝雖欲不為其可得乎守信等泣謝曰臣等愚不及此惟陛下哀矜指示可生之途宋主曰人生如白駒之過隙所以好富貴者不過欲多積金錢厚自娛樂使子孫無貧乏耳卿等何不釋去兵權出守大藩擇便好田宅市之為子孫立永逺不可動之業多買歌兒舞女日夕飲酒相歡以終其天年朕且與卿等約為婚姻君臣之間兩無猜疑上下相安不亦善乎守信等皆謝曰陛下念臣等至此所謂生死而骨肉也明日皆稱疾乞罷典兵於是以高懷德為歸德節度使王審琦為忠正節度使張令鐸為鎮寧節度使張光翰為江寧節度使趙彥徽為武信節度使皆罷宿衛就鎮賜賚甚厚唯石守信居職如故已而欲用天雄節度使符彥卿典禁兵趙普諌曰彥卿名位已盛豈可復委以兵柄宋主曰朕待彥卿厚豈忍相負耶普對曰陛下何以能負周世宗宋主默然秋七月宋主以其弟光義為開封尹光美行興元尹唐主景殂子煜立于江寧景之初年屬中國多故盧文進李金全皇甫暉等又皆歸之跨據江淮三十餘州擅魚鹽之利即山鑄錢物力富盛嘗試貢士以髙祖入關為詩題頗有窺覦中原之志及淮甸入于周寖以衰弱揚州既平宋主日習馬舫戰艦於汴京南池景聞大懼遂徙豫章會其彭澤令薛良避罪奔宋獻平南䇿宋主斬良景始安然終以境土蹙弱憂慮成疾而殂太子煜時留建康遂即位而遣其户部尚書馮謐奉表于宋願追尊帝號宋主許之煜初名從嘉聰悟好學善屬文工書畫明音律冬十月宋葬明憲太后于安陵十一月宋主臨國子監初周世宗命營國子監置學舍未成而殂宋主即位詔增葺祠宇塑繪先聖先師之像自為贊書於孔顔之座端令文臣分撰餘贊屢臨幸焉嘗謂侍臣曰朕欲武臣盡令讀書以知為治之道於是臣庶始貴文學矣宋以李漢超為關南兵馬都監漢超至關南民有訟其強娶己女為妾及貸民錢不償者宋主召謂曰汝女可適何人對曰農家耳又問漢超未至關南時契丹何如對曰嵗苦侵暴曰今復爾耶對曰無也宋主曰漢超朕之貴臣汝女為之妾不猶愈為農婦乎且使漢超不在關南汝家尚能保其所有貨財耶責其人而遣之密使諭漢超曰亟還其女并所貸朕姑貫汝勿復為也不足於用何不以告朕耶漢超感泣由是益修政理齊州吏民愛之宋以郭進為西山巡撿使進至西山威令嚴肅宋主遣戍卒必諭之曰汝輩謹奉法我猶貸汝郭進殺汝矣嘗有軍校自西山詣汴誣訟進不法事宋主詰知其情送進令殺之會北漢來伐進語其人曰汝敢論我信有膽氣今貫汝罪汝能掩殺敵兵當即薦汝如敗可自投河東其人踴躍赴戰大致克捷進即以聞乞遷其職宋主從之宋李繼勳侵北漢遼州壬戌宋建隆三年唐後主煜元年凡六國二鎮春正月宋命州縣長吏勸課農桑自後嵗首必降是詔二月北漢主侵宋晉潞州宋令大辟諸州不得專決宋主謂宰臣曰五代諸侯跋扈有枉法殺人者朝廷置而不問人命至重姑息當如是耶自今諸州決大辟録案聞奏付刑部覆視之夏四月宋太常博士聶崇義上三禮圖自唐以來禮文多缺崇義善禮學朝廷凡有大事多從其議周世宗嘗命參定郊廟祭器崇義因取隋開皇中禮官所撰三禮圖重加考正至是上之宋主詔太子詹事尹拙集儒學之士參議於是翰林學士竇儼詳閲定為十五卷以聞詔頒行焉且圖于國子監講堂之壁唐清源節度使晉江王留從效卒子紹鎡嗣其將陳洪進執紹鎡歸之于江寧以副使張漢思為留後從效卒子紹鎡典留務月餘統軍使陳洪進誣紹鎡將召越人以叛執送建康推副使張漢思為留後而自為副使漢思老而醇謹不能治軍務事皆決于洪進六月宋吳廷祚罷冬十月宋以趙普為樞密使宋主匡胤遷其故主鄭王宗訓于房州宋廣東京城宋主既廣汴城命有司畫洛陽宫殿按圖修之始壯麗矣宋武平節度使周行逢卒子保權嗣行逢卒宋授其子保權節度使而追封行逢汝南郡王保權年十一矣十一月宋初班厯于唐荆南節度使髙保勗卒兄子繼沖嗣繼沖保融子也十二月宋衡州刺史張文表叛襲潭州入之初周行逢病且死召將校屬其子保權曰吾部內凶狠者誅之略盡唯張文表在耳我死文表必亂諸君善佐吾兒無失土宇必不得已當舉族歸朝無令陷于虎口及保權嗣位文表聞之怒曰我與行逢俱起微賤立功名今日安能北面事小兒乎會保權遣兵代永州戍道出衡陽文表遂驅之以襲潭州知留後廖簡素易文表不設備而燕飲文表兵至徑入府中簡醉被殺將趨朗以滅周氏保權遣楊師璠擊之且求援于宋宋以姚內斌為慶州刺史內斌至郡西戎畏服莫敢犯其境髙麗入貢于宋癸亥宋乾德元年是嵗荆南亡凡六國一鎮春正月宋慕容延釗帥師討張文表二月周保權執文表誅之宋以慕容延釗為都部署率十州兵討文表樞密副使李處耘為都監末至楊師璠已破文表于平津亭執文表臠而食之梟首朗陵市宋慕容延釗入江陵髙繼沖以荆南地歸之初宋主遣內酒坊副使盧懷忠使荆南謂之曰江陵人情去就山川向背我欲盡知之懷忠還言于宋主曰高繼沖甲兵雖整而控弦不過三萬年穀雖登而民困于暴斂南邇長沙東距建康西迫巴蜀北奉朝廷其勢日不暇給取之易也及慕容延釗行宋主謂范質等曰江陵四分五裂之國今假道出師因而下之蔑不濟矣乃命延釗假道江陵以討文表李處耘至襄州遣丁德裕諭繼沖以假道之意孫光憲因言于繼沖曰中國自周世宗時已有混一天下之志今宋主規模宏逺不若早以疆土歸之則可免禍而公亦不失富貴矣繼沖乃遣其叔父保寅奉牛酒犒師于荆門且覘強弱處耘待之有加繼沖聞之以為無虞是夕保寅宴于延釗帳中處耘密遣輕騎數千倍道前進繼沖但俟保寅還遽聞宋師奄至即惶怖出迎遇處耘於江陵北十五里處耘揖繼沖令待延釗自率親軍先入城比繼沖還則宋師已分據之矣荆人束手聽命即發江陵卒萬餘同趨湖南繼沖因盡籍其境內三州十七縣户一十四萬二千二百遣客將王昭濟奉表納之于宋宋主受之以王仁贍為荆南都巡撿使而授繼沖馬步軍都指揮使荆南節度使如故髙氏親屬僚佐拜官有差以孫光憲為黃州刺史宋慕容延釗克潭州及周保權戰于澧江敗之三月遂入朗執保權以歸延釗進克潭州將趍朗周保權牙校張從富等以為文表已誅而宋師繼進不止懼為所襲相與拒守延釗至不得入宋主遣使諭之從富等不聽命以兵逆戰于澧江宋師敗之李處耘擇所俘體肥者數十人令左右分啖而黥其少健者令先入朗黥者入城言被擒者為所啖聞者皆恐遂潰延釗因長驅而進遂克其城執從富殺之其大將汪端劫保權及家屬亡匿江南岸僧寺中處耘遣田守琦師師渡江獲之以歸宋主釋其罪以為右千牛衛上將軍汪端猶擁衆冦掠宋師擊殺之湘湖悉平得州十四監一縣六十六户九萬七千三百八十八宋初定折杖法流刑四曰加役流杖三十配役三年流三千里杖二十二千五百里杖十八二千里杖十七並配役一年徒刑五曰徒三年杖二十二年半杖十八二年杖十七一年半杖十五一年杖十二杖刑五曰杖一百為杖二十九十為十八八十為十七七十為十五六十為十三杖皆背受笞刑五曰笞五十為十下四十三十為八下二十十為七下笞皆臀受夏四月宋行應天厯王朴欽天厯推驗稍疏司天少監王處訥製新厯上之賜名應天頒行焉宋置義倉于州縣五季之亂義倉多廢宋主詔曰多事之後義倉廢寢嵗或小歉失於豫備宜令諸州於所屬縣各置義倉自今官所收二稅石别稅一斗貯之以備凶歉給貸唐清源將陳洪進幽其留後張漢思而代之漢思患洪進專因設燕伏甲將殺之酒數行地忽大震棟宇欲壞坐立者不自持同謀者懼因以告洪進洪進亟走出甲士皆散洪進怨之一日洪進袖大鎖安步入府中叱直兵退漢思方坐內齋洪進即合其户而鎖之使人叩户言曰郡中軍吏請副使知軍務衆情不可違幸授之印漢思皇懼不知所為即自門間出印與之洪進遽召將吏曰留後授吾印以蒞事衆皆賀即日遷漢思别墅以兵守之遣使請命于唐唐以為節度使宋以張暉為鳳州團練使初宋主既平澤潞欲事河東問計于暉暉曰澤潞瘡痍未瘳軍旅荐興恐不堪命不若戢兵育民俟富庶而圖之宋主以為然至是欲謀蜀乃以暉鎮鳳州暉盡得蜀虛實險易以聞宋以大理正奚嶼知館陶縣以朝官知縣革藩鎮之弊也秋七月宋主幸武成王廟宋主幸武成王廟歷觀圖壁指白起曰起殺已降不武之甚豈宜受享命去之宋判大理寺竇儼上重定刑統凡三十卷時稱詳允八月宋王全斌侵北漢克樂平縣以為平晉軍遼人救漢不及而還冬十月宋以髙繼沖為武寧節度使鎮徐州十一月宋主有事于南郊赦十二月宋后王氏殂諡曰孝明祔葬安陵陳洪進入貢于宋洪進以宋日強大而懼遣牙將魏仁濟間道奉表自補清源軍節度副使入貢于宋且請制命焉宋初置諸州通判宋主懲五季藩鎮之專頗用文臣知州以分節度刺史之權趙普請設通判于諸州凡軍民之政皆統治之事得專達與長吏均禮大州或置二員又令節鎮所領支郡皆直𨽻京師得自奏事不屬諸藩於是節度使之權始輕矣溪州蠻彭允林附于宋甲子宋乾德二年凡六國一鎮春正月宋范質魏仁浦王溥罷質等自以周朝舊臣稍存形迹屢求避位至是從之自唐以來宰相入見議大政事必命坐面論從容賜茶而退質等憚宋主英武每事輒具劄子進呈且言曰如此庶盡稟承之方免妄庸之失宋主從之由是坐論之禮始廢宋以趙普為門下侍郎同中書門下平章事李崇矩為樞密使普既相以天下為己任宋主倚任之事無大小悉咨決焉宋主數微行過功臣家普每退朝不敢去衣冠一日大雪向夜普意宋主不出久之聞叩門聲普亟出宋主立風雪中普皇恐拜迎宋主曰已約光義矣已而光義至設重裀地坐堂中熾炭燒肉普妻行酒宋主以嫂呼之因與普計下太原普曰太原當西北二面太原既下則我獨當之不如姑俟削平諸國則彈丸黑子之地將安逃乎宋主曰吾意正如此特試卿耳宋主又嘗以幽燕地圖示普問進取之䇿普曰圖必出曹翰宋主曰然因曰翰可取否普曰翰可取孰可守宋主曰以翰守之普曰翰死孰可代宋主默然良久曰卿可謂深慮矣普嘗薦某人為某官宋主不許明日普復奏其人亦不許明日普又以其人奏宋主大怒裂碎奏牘擲地普顔色不變跪而拾之以歸他日補綴舊牘復奏如初宋主乃悟卒用其人又有羣臣當遷官宋主素惡其人不與普堅以為請宋主怒曰朕固不為遷卿若之何普曰刑以懲惡賞以酬功古今通道也且刑賞天下之刑賞陛下豈得以喜怒專之宋主怒甚起普亦隨之宋主入宫普立宫門久之不去竟得俞允其剛毅果斷類如此然從宋主久得志屢以微時所不足于宋主及已者為言宋主曰若塵埃中可識天子宰相則人皆物色之矣自是不復敢言二月宋李繼勳侵北漢遼州克之宋折德扆侵北漢衛州執其刺史楊璘以歸宋以陳洪進為平海軍節度使洪進事宋甚謹宋改清源為平海軍授之以其長子文顯為副使夏四月宋以薛居正吕餘慶參知政事宋主以趙普獨相欲置副而難其名稱問翰林承旨以陶穀曰下宰相一等有何官對曰唐有參知政事乃樞密直學士薛居正兵部侍郎吕餘慶並以本官參知政事不押班宣制知印不預奏事不升政事堂止令就宣徽使廳上事殿廷别設磚位敕尾署銜降宰相月奉雜給半之未欲與普齊也宋以秦再雄為辰州刺史自隋以黔中地置辰州唐分為錦溪巫敘四郡唐末蠻部分據之各保險阻以自固時出寇鈔宋既平湖南思得通蠻情習地勢沈勇智謀者以鎮撫之辰州猺人秦再雄武健有奇略蠻黨畏服宋主召至汴察其可任擢為刺史使自辟吏豫以租賦再雄感恩誓以死報至州日訓土兵得三千人皆能被甲渡水歷山飛塹捷如猿猱又選親校二十人分使諸蠻以傳朝廷懷徠之意莫不從風而靡各得降表以聞自是荆湘無復邉患六月宋主加其弟光義中書令光美同平章事子德昭貴州團練使德昭宋主長子也冬十一月宋永安節度使折德扆卒以其子御勳知府州事德扆鎮府州甚得蕃情契丹畏之宋王全斌劉光義帥師分道伐蜀蜀王曰事奢縱以王昭逺伊審徴韓保正趙崇韜分掌機要總統軍政太后李氏嘗謂蜀主曰吾見莊宗及爾父滅梁定蜀當時主兵者非有功不授故士卒畏服今昭逺乃汝給事左右之人保正又世祿之子素不習兵一旦有警此輩何所用之蜀主不聽及宋下荆湖蜀主欲通使昭逺等固止之宋主詔蜀之邸吏將卒先在江陵者悉放還而蜀主遣趙彥韜孫遇為諜入汴覘強弱彥韜潛以蜀主與北漢約同舉兵濟河蠟書獻之宋主久欲伐蜀而無詞及得書喜曰吾用師有名矣令彥韜等指畫江山曲折之狀及兵寨戍守之處道里逺近俾畫工圖之十一月以王全斌劉光義為西川行營前軍兵馬都部署崔彥進王仁贍劉廷讓曹彬副之將步騎六萬分道伐蜀且命為蜀主治第於汴水之涯凡五百餘間供帳什物備具召全斌以圖授之且謂曰凡克城寨止籍其器甲芻糧悉以財帛分給將士吾所欲得者其土地耳全斌等由鳳州光義等由歸州進十二月宋劉光義克蜀夔州初夔州有鎖江為浮梁上設敵棚三重夾江列炮具光義將行宋主示以地圖指鎖江曰我軍至此泝流而上慎勿以舟師爭勝當先以步騎陸行出其不意擊之俟其勢却即以戰棹夾攻取之必矣及師至夔距鎖江三十里舍舟步進先奪浮梁復牽舟而上破州城蜀守將髙彥儔自焚死悉如宋主計宋王全斌克蜀興州遂及蜀韓保正戰于三泉獲之全斌克萬仞燕子二寨遂下興州拔二十餘寨所向克捷獲糧儲不資蜀主遣韓保正李進等禦之全斌先鋒將史進德與戰于三泉寨禽保正及進等獲糧二十萬宋命判太常寺和峴定雅樂宋主以雅樂聲高近於哀思不合中和詔峴改定峴以王朴律凖較洛陽司天臺影表石尺製律吕樂始和暢焉乙丑宋乾德三年是嵗宋滅蜀凡五國一鎮春正月宋王全斌克蜀劒門獲其樞密使王昭逺蜀主孟昶降全斌等次于成都王全斌等乘勝而前蜀主遣王昭逺趙崇韜等帥兵禦之將行蜀主命左僕射李昊餞于郊昭逺酒酣攘臂言曰是行也非止克敵當領此二三萬雕面惡少兒取中原如反掌耳及行執鐵如意指麾軍中自方諸葛亮宋師至羅川蜀師依江列陳以待崔彥進遣張萬友等奪其橋蜀人退保大漫天寨彥進萬友與康延澤分三道擊之蜀人悉其精鋭逆戰大敗而潰王昭逺等復引兵迎敵三戰皆敗昭逺渡桔柏江焚梁退保劒門宋師進次于益光全斌會諸將議曰劒門天險諸君宜各陳進取之䇿軍校向韜曰降卒牟進言益光江東越大山數重有狹徑名來蘇蜀人於江西置寨對岸有渡自此出劒關南二十里至清強與大路合可於此進兵即劒門不足恃也全斌即欲卷甲赴之康延澤曰來蘇細徑不須主帥親往且蜀人屢敗併兵退守劒門莫若諸帥協力進攻命一偏將趍來蘇若達清強北擊劍閣與大軍夾攻破之必矣全斌乃令史進德趍來蘇而自帥大衆前進進德至來蘇造浮梁于江蜀人見梁成棄寨而遁遂進次清強王昭逺聞之留其偏將守劒門自引衆退屯漢源坡以待全斌未至漢源進德已克劒門昭逺股栗失次甲戌全斌至趙崇韜布陳將戰昭逺據胡床皇懼不能起全斌進擊大破之斬首萬餘級昭逺走投東川匿倉舍下悲嗟流涕目盡腫惟誦羅隱詩云運去英雄不自由俄而宋追者至與崇韜俱被執蜀主聞昭逺敗大懼出金帛募兵令太子玄哲統之李廷圭張惠安等為之副趍劒門以禦宋師玄哲素不習武廷圭又皆庸懦無識玄哲離成都但携姬妾樂器及伶人數十輩晨夜嬉戲不恤軍政至綿州聞已失劒門遂遁還東川所過焚廬舍倉廪而去壬午全斌克利州得其糧八十餘萬斛蜀主皇駭問計于左右有老將石斌對曰宋師逺來勢不能久請聚兵固守以老之蜀主曰吾父子以豐衣美食養士四十年及遇敵不能為我東向發一矢今若固壘何人為我效命甲申全斌進次魏城蜀主命李昊草表請降全斌受之遣康延澤以百騎先入成都諭以恩信留三日盡封府庫而還全斌等乃入城時劉光義克萬施開忠遂五州聞蜀主已降乃引師會全斌于成都宋師自發汴至受降凡六十六日得州四十五縣百九十八户五十三萬四千三十九初全斌之伐蜀也屬汴京大雪宋主設氊帷于講武殿衣紫貂裘帽以視事忽謂左右曰我被服如此體尚覺寒念西征將士衝冒霜雪何以堪處即解裘帽遣中使馳賜全斌仍諭諸將曰不能遍及也全斌拜賜感泣故所向有功二月壬寅朔日當食不虧三月宋兩川兵起王全斌等平之王全斌等在蜀晝夜宴飲不恤軍士部下漁奪無厭蜀人苦之曹彬屢請旋師全斌等不從既而宋主詔發蜀兵赴汴州人給錢十千未行者加兩月廪食全斌等不即奉命蜀兵憤怨思亂兩路隨軍使臣常數十百人全斌崔彥進王仁贍等各保芘之不令部送蜀兵但分遣諸州牙校三月蜀兵行至綿州遂作亂劫屬邑衆至十餘萬自號興國軍獲蜀文州刺史全師雄推以為帥全斌遣米光緒往招撫之光緒盡滅師雄之族納其愛女私其槖裝師雄聞之遂無歸志率衆攻彭州據之自稱興蜀大王開幕府署節帥二十餘人分據要害兩川民爭應之崔彥進高彥暉田欽祚等分道攻討為師雄所敗彥暉戰死全斌又遣張廷翰張煦擊之復不利退保成都師雄勢益張遣兵分守綿漢間斷閣道緣江置寨聲言欲攻成都於是卭蜀眉雅果遂渝合資簡昌普嘉戍榮陵十六州及成都屬縣皆起兵應師雄全斌等大懼時成都城中降兵未遣者尚二萬七千全斌慮其應賊與諸將謀誘致夾城中盡殺之久之曹彬劉廷讓力戰大破師雄于新繁師雄走保郫縣全斌仁贍等復攻之師雄走死于金堂餘黨復推謝行本為主康延澤丁德裕等分道招輯蜀人始定宋置封樁庫宋既平荆湖西蜀儲積充羡乃于講武殿後置內庫以貯金帛為軍旅飢饉之備名曰封樁夏六月宋封孟昶為秦國公尋卒二月宋以吕餘慶權知成都府三月蜀主昶舉族與官屬由峽江而下五月乙亥至汴率子弟素服待罪闕下丙戌宋主御崇元殿備禮見之賜賚甚厚六月甲辰拜昶開府儀同三司檢校大師兼中書令秦國公子玄哲為泰寧軍節度使從臣親屬授官有差庚戌昶卒宋主廢朝五日御正衙備禮册命為尚書令追封楚王諡恭孝昶母李氏本唐莊宗宫妾也至汴宋主命肩輿入宫謂之曰國母善自愛無戚戚懷鄉土異日當送母歸李氏曰妾本太原人倘得歸老并上妾之願也時宋主有志于漢聞之甚喜及昶卒不肯哭以酒酹地曰汝不死社稷貪生以至今日吾所以忍死者以汝在耳今汝既死吾何用生為不食數日亦死宋主聞而傷之初宋主將改元諭宰相曰年號須擇前代所未有者及蜀者平蜀宫人入內宋主見其鏡背有識乾德四年鑄召翰林學士竇儀問之儀對曰此必蜀物蜀主嘗有此號宋主大悅曰作相須用讀書人由是益重儒者宋主嘗見昶寶裝溺器命撞碎之曰汝以七寶飾此當以何器貯食所為如是不亡何待也秋七月宋初置諸路轉運使自唐開元天寶以來藩鎮屯重兵租稅所入皆以自瞻名曰留使留州其上供者甚少五代以降藩鎮益強率令部曲主場務厚斂以入已而輸貢有數宋主素知其弊趙普乞命諸州度支經費外凡金帛悉送汴都無得占留每藩鎮帥缺即令文臣權知所在場務凡一路之財置轉運使掌之雖節度防禦團練觀察諸使及刺史皆不預簽書金穀之籍於是財利盡歸於上矣冬十二月回鶻于闐入貢于宋丙寅宋乾德四年凡五國一鎮春正月宋以孔宜為曲阜主簿奉孔子祀宜孔子四十四代孫而文宣公仁玉之子也五季以來襲封廢絶至是命宜主祀事夏五月宋主策賢良方正之士于紫雲樓宋主承唐制置賢良方正能直言極諌經學優深可為師法詳間吏理達於教化三科以待天下之才傑不限前資見任職官黃衣草澤悉許應詔對䇿三千言詞理俱優者則中選謂之制舉是年宋主親試制科人薑涉等於紫雲樓下占城入貢于宋宋除進羡餘賞令時三司令諸場院主吏有羡餘粟及萬石芻五萬束以上者賞宋主曰茍非倍取民租私減軍食何以致之自今勿復施行秋七月西南夷董皓附于宋丁卯宋乾德五年凡五國一鎮春正月宋召王全斌等還貶官有差以曹彬為宣徽南院使宋主自聞蜀兵亂凡使者至各令陳王全斌等不法事遂盡得其狀乃皆徴還以其初立功不欲屬吏但令中書問狀全斌等具伏黷貨殺降之罪命責授全斌崇義節度留後崔彥進昭化節度留後王仁贍為右衛大將軍以劉光義劉廷讓廉謹並進爵秩復吕餘慶參知政事曹彬自蜀還槖中唯圖書衣裳又能戢下秋毫無犯宋主深嘉之以為宣徽南院使彬辭曰征西將士俱得罪臣何敢獨受賞宋主曰卿有茂功又不矜伐懲勸國之常典又何辭焉二月宋以沈義倫為樞密副使義倫為西川轉運使隨軍入蜀獨居佛寺蔬食及歸篋中唯書卷而已故有是命三月五星聚于奎夏六月戊午朔日有食之宋殿前都指揮使韓重贇免或譛重贇私取親兵為腹心者宋主怒欲誅之謀於趙普普曰陛下必不自將親兵須擇人付之若重贇以讒誅即人人懼罪誰敢為陛下將者宋主然之乃出重贇為彰德節度使而止秋九月宋定難節度使西平王李彞興卒子克睿嗣彞興即彞殷也戊辰宋開寶元年北漢主繼元廣運元年凡五國一鎮春二月宋立后宋氏上將軍偓之女也三月宋初覆試貢士是嵗進士合格者十人陶穀子邴名在第六宋主謂左右曰聞穀不能訓子邴安得登第自今舉人凡關食祿之家委中書覆試宋以董遵誨為通逺軍使遵誨父宗本仕漢為隨州刺史宋主微時客遊至漢東依宗本遵誨憑藉父勢嘗侮之一日謂宋主曰每見城上有紫雲如蓋又夢登高臺遇黑蛇約長百尺餘俄化龍飛騰東北去雷霆隨之是何祥也宋主皆不對他日論兵遵誨理屈拂衣起宋主乃辭宗本去自是紫雲漸散宋主即位召遵誨諭之曰卿尚記曩日紫雲黑龍之事乎遵誨皇恐請死宋主曰朕方赦過賞功豈念舊怨耶乃自驍武指揮使拜馬軍都軍頭至是以夏州近邉授通逺軍使遵誨至鎮召諸族酋長諭以朝廷威德刲羊釃酒宴犒甚至衆皆感悅數月復來擾邊遵誨率兵深入其境俘斬甚衆獲牛馬數萬夷落以定自是各謹封界秋毫不敢犯秋七月北漢主鈞殂養子繼恩立北漢自潞州之敗日懼宋師至以趙文度為相召抱腹山人郭無為及五臺山僧繼顒參預國事既又殺其樞密使假常而以郭無為為相機務悉以委之遼主遣使責之曰爾不稟我命擅改年號助李筠殺段常其罪有三漢主遣使謝曰父為子隱願赦之遼主不報而拘留其使漢主益憂憤成疾殂初護聖營卒薛釗娶世祖女生繼恩及世祖鎮太原爵位通顯釗以微賤罕得見其妻居常怏怏一日乘醉求見即引佩刀刺之妻奮衣得脫釗乃自剄繼恩時幼世祖以漢主鈞無子命養之薛釗妻乃改適何氏生繼元漢主又養為子至是繼恩即位諡鈞曰孝和皇帝初宋主嘗因諜者謂漢主曰君家與周世讐宜於不屈今我與爾無所間何為困此一方人也若有志中國宜下太行以決勝負漢主遣諜者報曰河東土地甲兵不足以當中國然我家世非叛者區區守此蓋懼漢氏之不血食也宋主哀之謂諜者曰為我語鈞開爾一生路故終鈞世不加兵焉八月宋李繼勳帥師侵北漢九月漢侯霸榮弒其主繼恩宋主遣昭化節度使李繼勳帥黨進曹彬何繼筠康延沼趙贊司超李謙溥等以禁軍伐漢九月庚子繼勳敗漢兵于洞渦河初侯霸榮嘗以散指揮使戍樂平及宋克樂平霸榮以衆降之未幾自宋走還太原漢主鈞復用為供奉官及宋師大入霸榮謀持繼恩首以獻宋乃乘無備白晝挺刃入漢主喪室反扄其門時漢主獨處見之繞屛環走霸榮揕胸弒之北漢相郭無為誅侯霸榮漢主繼元立郭無為聞漢主被弒遣卒登梯入室殺霸榮而立繼元遼師救北漢漢主繼元告即位于遼且乞師遼主大發兵遣兵馬總管塔拉將而赴之冬十一月宋主有事于太廟宋主享太廟見其所陳籩豆簠簋問曰此何物也左右以禮器對宋主曰吾祖宗寧識此亟命撤去進常膳如平生既而曰古禮不可廢也命復設之遂遵唐故事每室加常食一牙盤云大食入貢于宋己巳宋開寶二年遼景宗賢保寧元年凡五國一鎮春二月遼人弒其主璟于懷州遼主荒鴆于酒好畋嗜殺刑政紊亂嘗以虞死人實喇卜丹偵鵝失期加炮烙鐵梳之刑以又以獲鴨除鷹坊刺面腰斬之法國人怨之至是田于懷州獲熊而飲甚歡夜分近侍霄格盥人華格庖人錫衮等弒之遼主賢立賢小字明扆世宗第二子也聞遼主被弒帥甲騎千人馳赴懷州即位羣臣尊曰天贊皇帝加耶律屋質于越知國事宋主侵北漢三月圍太原宋主命李繼勳等進薄太原復命韓重贇為北面都部署防契丹以光義為上都留守遂發汴三月乙未繼勳敗漢兵于太原城下戊戌宋主至築長連城圍之漢史昭文以憲州趙文度以嵐州降乙巳壅汾水以灌城中遂立寨于城四面繼勳軍於南趙贊軍於西曹彬軍於北黨進軍于東城中大懼然猶恃遼為援四月己未何繼筠逆遼師于陽曲敗之斬首數千宋主命以所獲遼俘示於城下城中由是喪氣五月韓重贇復敗遼師夏五月宋初命諸州獄吏恤繫囚宋主以暑盛詔獄吏三日一檢視灑掃獄户洗滌杻械貧者給食病者給藥小罪即時決遣自是嵗以為常閏月宋師還太原圍解太原圍久遼援不能進宋主詔繼元降許以青州節度使且許郭無為邢州節度使無為得詔色動一日因燕羣臣無為慟哭于庭曰今日以孤城抗宋大衆計將安出引佩刀欲自刺冀動衆心漢主遽降階持其手引升坐而止及南城為汾水所陷水注城中無為請自將夜擊欲自拔降宋值天陰晦不克漢主知其意遂殺無為城中紛耰俄而出兵欲戰又為宋所敗死者萬計至夜半忽傳呼漢主出降宋主將開壁門匠作使趙璲曰受降如受敵詎可中夜輕出已而果諜者時宋師頓于甘草地會暑雨軍士多疾太常博士李光贊言曰蕞爾晉陽豈須親討重勞飛挽取怨黔黎豈若回鑾復都屯兵上黨使夏取其麥秋取其禾既寬力役之征便是蕩平之策宋主從之乃命趙普諭諸將解圍而還秋九月宋初令民典賣田宅者輸錢印契庚午宋開寶三年凡五國一鎮春三月宋賜舉人久不第者出身宋主閲進士諸科得十五舉以上司馬浦等百六人心憐之並賜本科出身特進名科自此始宋徵處士王昭素為國子博士昭素有學行宋主召見便殿年已七十餘矣問以治世養身之術對曰治世莫若愛民養身莫若寡欲宋主愛其言書于屛几夏四月辛卯朔日有食之五月宋置便錢務宋取唐飛錢故事許民入錢于左藏庫以諸州錢給之至是始置務汴京令入錢者即日輦致而受劵付諸州給之秋九月宋詔修前朝諸陵被盜發者詔洛陽鳳翔雍耀等州周文成康王秦始皇漢高文景武元成哀後魏孝文西魏文帝後周太祖唐高祖太宗中宗肅宗代德武宣懿僖昭諸帝凡二十七陵嘗被盜發者有司備法服常服各一襲具棺槨重葬所在長吏致祭宋潘美帥師伐南漢冬十二月克韶州南漢主委政宦者龔澄樞尤貴幸用事作燒煮剝剔刀山劒樹之刑賦斂煩重雍民入城者人輸一錢瓊州米斗稅四五錢置媚川都定其課令入海採珠所居宫殿以珠玳瑁飾之內官陳延受作諸淫巧日費數萬金宫城左右離宫數十鋹遊幸無度以豪民為課户供宴犒之費宋主聞之歎曰吾當救此一方民乃令南唐主為書諭鋹使稱臣歸所侵湖南諸州鋹囚唐使而驛書答唐主言甚不遜唐主上其言宋主乃以潘美為桂州道行營都部署尹從珂為副以伐之時漢舊將多以讒搆誅死宗室剪滅殆盡掌兵者惟宦官數輩自漢主晟以來耽於遊宴城壁濠隍往往飾為宫館池沼樓艦皆毁兵器又腐及聞有宋師內外震恐乃遣龔澄樞往賀州郭崇嶽往桂州李托往韶州畫守禦之策九月宋師至富州克之斬其將伍彥柔澄樞遁還十月宋師克賀州十一月進攻昭桂下之十二月克連州大敗漢兵斬首萬餘乘勝遂下韶州韶漢之北門也鋹聞韶破窮蹙不知為計始令塹廣州東壕遣郭崇嶽屯馬徑以禦宋崇嶽無謀勇唯日禱于鬼神而已辛未宋開寶四年是嵗宋滅南漢凡四國一鎮春二月宋潘美滅南漢執漢主劉鋹以歸正月潘美克英雄州漢都統潘崇徹以其衆降宋師進次瀧頭漢主遣王圭請和且求緩師美不許進兵馬徑去廣城十里寨于雙女山下漢主聞之取舶船十餘載金寶妃嬪欲入海未及發宦者樂範與衛兵千餘盜舶船走宋師將薄城漢主懼遣其左僕射蕭漼奉表詣軍門乞降美諭以宋主意以為能戰則戰不能戰則守不能守則降不能降則死不能死則亡此五者唯所行之他不敢聞也乃令殿直冉彥衮送蕭漼赴汴而次師城外漢主欲遣其弟保興率百官以迎宋師郭崇嶽止之乃復為扞禦之備美遂進攻保興迎戰而敗崇嶽為亂兵所殺城遂陷龔澄樞等謀曰宋師利吾寶貨耳乃盡焚其府庫宫殿美入城擒漢主及保興澄樞李托薛崇譽與其宗屬文武九十七人部送汴京有宦者百餘請見美曰是椓人多矣吾奉詔伐罪正為此等悉斬之凡得州六十縣二百四十户一十七萬二百六十二夏六月宋封劉鋹為恩赦侯五月乙未朔鋹至汴宋主遣吕餘慶問鋹反覆及焚府庫之罪鋹歸罪于龔澄樞明日有司以帛繫鋹及其官僚獻于廟社宋主御明德門遣刑部尚書盧多遜宣詔責鋹鋹對曰臣年十六僣偽位澄樞等皆先臣舊人每事臣不得專在國時臣是臣下澄樞是國主因伏地待罪宋主命大理卿髙繼申引澄樞李托薛崇譽斬于千秋門外釋鋹罪賜襲衣冠帶器幣鞍馬授金紫光祿大夫檢校太保右千牛衛大將軍封恩赦侯鋹體質豐碩眉目俱疏有口辨性絶巧嘗以珠結鞍勒為戲龍之狀極其精妙以獻宋主謂左右曰鋹好工巧習以成性倘能以習巧之勤移於治國豈至滅亡哉一日從宋主幸講武池從官未集鋹先至賜以巵酒鋹疑有毒捧杯泣曰臣承祖父基業違拒朝廷勞王師致討罪固當誅陛下既待臣以不死願為大梁布衣觀太平之盛未敢飲此酒宋主笑謂之曰朕推赤心於人腹中安有此事耶命取鋹酒自飲而别酌以賜鋹鋹大慙謝宋御史中丞劉溫叟卒溫叟重厚清介好古執禮為中丞十二年屢求解職宋主難其代不許及卒有司請除中丞宋主曰必得純厚如溫叟者乃可命太子賔客邉光範兼判御史臺事居半嵗始授中丞其不輕任人如此冬十月癸亥朔日有食之宋知英州董元吉有罪棄市元吉守英月餘受贓至七十餘萬宋主以嶺表初平欲懲掊克之吏特詔棄市十一月唐主使其弟從善朝于宋乞降號稱名宋主許之唐主事宋甚謹每聞宋有嘉慶吉凶之事必遣人貢獻弔賀外示畏服內實修備及南漢亡懼甚上表於宋乞去國號為江南國主且請賜詔呼名宋生許之唐主乃貶損制度下書稱教改中書門下為左右內史府尚書省為司會府其餘官稱多所更定先是唐主以銀五萬兩遺趙普普以白宋主宋主曰此不可不受但以書答謝少賂其使者可也普辭宋主曰大國之體不可自為削弱當使之弗測及從善來朝常賜外密賚白金如遺普之數唐君臣皆服宋主之偉度壬申宋開寶五年凡四國一鎮春二月宋以劉熙古參知政事夏五月大雨河決宋主放其宫女百人秋九月丁巳朔日有食之宋李崇矩罷崇矩女為趙普子承宗妻三人相厚善宋主聞之不悅會崇矩客鄭伸以崇矩待之薄上書告其陰事崇矩不能自明遂罷而普由是見疑癸酉宋開寶六年凡四國一鎮春二月髙麗王昭卒子胄立三月宋鄭王郭宗訓卒于房州諡曰周恭帝葬于順陵鄭王殂宋主素服發哀輟朝十日諡曰周恭帝還葬慶陵之側號曰順陵焉宋主覆試貢士于講武殿宋承唐制禮部貢舉設進士九經五經開元禮三史三禮三傳學究明經明法等科是年翰林學士李昉知貢舉取宋準以下十一人而進士武濟川三傳劉睿材質最陋對問失次宋主黜之而濟川乃昉鄉人會有訴昉用情取舍宋主乃籍終場下第姓名得三百六十人皆召見擇其一百九十三人并準以下親御殿給紙筆别試命殿中侍御史李瑩等為考官得進士諸科百二十五人皆賜及第且賜錢二十萬以張宴會而責昉為太常少卿殿試遂為永制宋主語近臣曰昔者科名多為勢家所取朕親臨試盡革其弊矣夏四月宋命薛居正監修五代史五月宋劉熙古致仕交州丁璉入貢于宋宋封璉為交址郡王梁末交州土豪曲承美乘中國之亂據有十二州之地南漢攻執之仍置交址節度使乾德初歡州刺史丁公著之子部領攻節度使吳處玶而據其位自號大勝王以其子璉為節度使漢既亡璉入貢于宋宋授璉靜海軍節度使安南都護交址郡王遼裕恱耶律烏哲卒宋武寧節度使髙繼沖卒繼沖鎮彭門幾十年委任僚佐部內亦治宋使錢文贄還吳越吳越事宋極謹宋主命有司造大第於薰風門外連亘數坊棟宇宏麗儲偫什物無不悉具因召吳越進奏使錢文贄謂之曰朕數年前命陶穀草詔比來城南建離宫今賜名禮賢宅以待李煜及汝主先來朝者居之以詔示文贄遣還諭旨秋八月宋趙普免普獨相十年為政頗專嘗以私怨誣馮瓉李美李楫以贓論死廷臣多忌之宋主嘗幸其第會吳越遣使致書于普及海物十瓶置于廡下未及發而宋主至倉卒不暇屛宋主顧問何物普以實對宋主曰海物必佳即命啓之皆瓜子金也普皇恐謝曰臣未發書賔不知宋主曰第受之彼謂國家事皆由汝書生爾時官禁私販秦隴大木普遣親吏詣市屋材聯巨筏至汴治第吏因之竊貨大木冒稱普市貨粥都下三司使趙玭以聞宋主大怒即欲逐普王溥力為救解得止普又以隙地私易尚食蔬園以廣其居多營邸店以規利翰林學士盧多遜方以文學得幸而與普不協數因入對短普宋主滋不悅初判大理寺雷德驤以其官屬與堂吏附會普擅增刑名見宋主言之宋主怒德驤誣毁大臣黜為商州司户知州奚嶼希普意奏德驤怨望坐削籍流靈武其子有鄰意普害之擊登聞鼓訟普親信堂吏胡贊李可度受賕骫法普復芘二人宋主怒杖贊可度而召德驤為祕書丞擢有鄰祕書正字普恩益替會詔參知政事與普更知印押班奏事以分其權普不自安求罷政遂出為河陽三城節度使普至河陽上表自訴曰外人謂臣輕議皇弟開封尹皇弟忠孝全德豈有間然矧昭憲皇太后大漸之際臣實預聞顧命知臣者君願賜昭鑒宋主手封其表藏諸宫中九月宋吕餘慶罷宋主封其弟光義為晉王兼侍中班宰相上宋主加其子德昭同平章事宋以薛居正沈義倫平章事盧多遜參知政事多遜博學善文敏給任數謀多竒中以翰林學士判史館宋主好讀書每取書館中多遜預戒吏必令白已知所取因通夕閲覽及召對宋主問書中事應答無滯同列皆伏由是有寵冬十二月宋行開寶通禮宋主命李昉劉溫叟本開元禮損益為書二百卷號通禮行之甲戌宋開寶七年凡四國一鎮春二月庚辰朔日有食之三月宋遣使如遼夏四月遼使耶律昌珠如宋始通也三佛齊入貢于宋秋七月南丹州蠻莫洪燕附于宋九月宋曹彬帥師侵唐宋主欲伐唐而無名乃遣知制誥李穆使唐諭唐主入朝唐主辭以疾且言事大朝冀全濟也今若此有死而已穆曰朝與否國主自處之然朝廷甲兵精鋭物力富雄恐不易當也宜熟思之無貽後悔唐主不從而遣使求封册宋主不許命梁逈復使諷之入朝唐主不答逈還具言江南可取之狀宋主與趙普定計伐之且曰王全斌平蜀多殺降人吾思之常耿耿不可用也普曰全斌殺降唯曹彬不從請用之會普免事已至是乃命曹彬為西南路行營都部署潘美為都監曹翰為先鋒都指揮使將兵十萬以伐唐將行宋主戒彬曰江南之事一以委卿切勿暴掠生民務廣威信使自歸順不煩急擊也又曰城陷之日慎勿殺戮設若困鬭則李煜一門不可加害且以劒授彬曰副將而下不用命者斬之潘美等皆失色十月彬等發江陵水陸並進閏月克池州敗唐兵于銅陵遂次采石磯初唐池州人樊若水以舉進士下第因謀歸宋乃漁釣於采石江上數月乘小舟載絲繩緣南岸疾棹抵北岸以度江之廣狹因詣汴上書言江南可取狀請造浮梁以濟師宋主然之遣內侍石全振往荆湖造黃黑龍船數千艘又以大艦載巨竹絙自荆渚而下議者以為自古未有作浮梁渡江者宋主不聽擢若水右贊善大夫及師南下以若水為鄉導既克池即用為知州十一月若水請試舟于石牌口遂移置采石三日梁成不差尺寸宋師因以濟江若履平地與唐師遇輒敗之時唐主委兵柄于皇甫繼勳機事於張洎張喬以徐元楀為傳詔每軍書告急多不時通冬十月宋五代史成凡百五十卷宋主覽之謂宰相曰梁太祖暴亂若此宜其賊虐于子也十二月吳越王俶圍唐常州宋令也宋命宰輔日録時政送史館從史館修撰扈蒙之請也日厯自是修矣乙亥宋開寶八年國是嵗宋滅唐凡三一鎮春正月宋曹彬圍唐江寧曹彬再敗唐師于白鷺洲遂薄江寧圍之三月遼使克實克舒蘇如宋結成也夏四月宋以衛德仁為太樂署令教坊使衛德仁以老援同光故事求領郡宋主曰伶人為刺史唐莊宗之失也豈可效之宰相擬州司馬宋主曰上佐乃士人所處不可但當于樂部遷轉耳故有是命吳越王俶克唐常州歸之于宋秋七月辛未朔日有食之宋使郝崇信如遼報使也東印度酋長使其子穰結説囉朝于宋八月遼使耶律霸德如宋致方物也西南蕃順化王入貢于宋九月宋主狩于郊宋主狩于近郊逐兔馬蹶墜地因引佩刀刺馬殺之既而悔曰吾為天下主輕事田獵又何罪馬哉自是不復獵宋師克唐潤州冬十月唐主使徐鉉求成于宋宋主不許曹彬屢敗唐師于城下潤州復降唐主危迫乃遣其吏部尚書徐鉉等貢方物于宋手書上表以求緩師鉉至言于宋主曰李煜無罪陛下兵出無名煜以小事大如子事父未有過失奈何見伐宋主曰爾謂父子為兩家可乎鉉不能對而還踰月唐主復遣鉉乞緩師以全一邦之命鉉見宋主反覆論辨不已宋主怒曰不須多言江南亦有何罪但天下一家卧榻之側豈容人鼾睡耶鉉乃辭歸宋詔察民孝弟力田竒材異行文武可用者以聞十一月宋曹彬滅唐唐主李煜降彬圍唐日久唐主猶不知之一日登城見列柵于外旌旗遍野始大懼知為近習所蔽遂殺皇甫繼勳召朱令贇于上江命連巨筏載甲士十五萬順流而下以斷采石浮梁彬聞之遣戰棹都部署王明密令人樹長木于洲渚間若帆檣之狀令贇望見逗撓不敢進明因移檄諸將掎角帥兵襲之令贇至皖口明合劉遇逆戰大破之擒令贇衆赴水者十五六唐人益懼求成不許彬頓師城下俟唐兵出則與之戰未嘗急攻而城中日迫彬遣人謂唐主曰事勢如此所惜者一城生聚耳若能歸命策之上也唐陳喬張洎等每引符命謂玄象無變金湯之固未易取也北軍旦夕當自引退茍一旦不虞即臣當先死唐主深倚洎喬故無降意及城將陷彬忽稱疾不視事諸將皆來問疾彬曰余之疾非藥石所能愈惟須諸君誠心自誓以克城之日不妄殺一人則自愈矣諸將許諾共焚香為誓明日彬稍愈又明日城陷陳喬徑入白唐主曰今日國亡願加顯戮以謝國人唐主曰此乃厯數卿死無益也喬曰縱不殺臣臣何面目以見士人乎遂自經死唐主率臣僚詣軍門請罪彬慰安之待以賓禮請煜入宫治裝彬以數騎待宫門外左右密謂彬曰煜入或不測奈何彬笑曰煜素愞無斷既已降必不能自引決煜治裝畢遂與其宰相湯悅等四十八人赴汴京彬自出師至凱旋士衆畏服無敢輕肆者江南賴以安全凡得州十九軍三縣一百八十户六十五萬五千六十五捷至羣臣稱賀宋主泣曰宇縣分割民受其禍攻城之際必有橫罹鋒刃者實可哀也命出米十萬賑恤之宋使宋準如遼十二月遼使耶律烏哲如宋賀正旦也自是嵗以為常宋進封劉鋹為彭城郡公丙子宋開寶九年十月以後太宗炅太平興國元年凡三國一鎮春正月宋封李煜為違命侯正月辛未宋主御明德門以唐主煜嘗奉正朔命勿宣露布止令煜君臣白衣紗帽至樓下待罪宋主見而釋之賜冠帶器幣鞍馬有差授煜為光祿大夫檢校太傅右千牛衛上將軍封違命侯子姓從官皆録用之因赦天下宋主召徐鉉責鉉不早勸煜降鉉對曰臣為江南大臣國滅當死不當問其他宋主曰忠臣也又責張洎曰汝教煜不降使至今日因出洎所草召上江援兵蠟丸書示之洎謝曰犬吠非其主此其一爾他尚多有今得死臣之分也辭色不變宋主奇之以為太子中允二月宋以曹彬為樞密使初彬之總師伐唐也宋主謂曰俟克李煜當以卿為使相潘美預以為賀彬曰不然夫是行也仗天威遵廟謨乃能成事吾何功哉况使相極品乎美曰何謂也彬曰太原未平耳及還獻俘宋主謂曰本授卿使相然劉繼恩未下姑少待之美視彬微笑宋主詰之美以實對宋主亦大笑乃賜彬錢二十萬彬退曰人生何必使相好官不過多得錢耳踰月拜彬樞密使吳越王俶朝于宋俶聞唐亡而懼乃與妻孫氏子惟濬孫承祐入朝于宋宋主賜禮賢宅以居親幸宴之賞賚甚厚三月賜俶劒履上殿書詔不名命與晉王敘昆弟之禮封孫氏為王妃留兩月遣還三月宋主以其子德芳為貴州團練使德芳宋主少子也宋主如洛陽宋主如西京遂拜安陵賜河南今年田租之半宋主生于洛陽樂其風土意欲留居之晉王光義言其非便宋主曰遷河南未已終當居長安耳光義問其故宋主曰長安據山河之勝且可去冗兵光義力請還汴宋主不得已從之因嘆曰不出百年天下民力殫矣四月遂還汴宋曹翰屠江州殺唐守將胡則唐州郡皆降宋獨江州指揮使胡則殺刺史謝彥實集衆為唐固守宋曹翰闡之四月餘則力屈被執翰殺之因縱兵悉取資財而盡屠其民夏五月宋使田守竒如遼賀遼主生辰也自是嵗以為常秋八月宋黨進帥師侵漢九月敗漢師于太原遼使耶律舒救漢宋主命黨進潘美楊光美牛思進米文義率兵分五道以攻太原又遣郭進郝崇信王政忠閻彥進齊超孫晏宣安守忠齊延琛穆彥璋等分攻欣代汾沁遼石等州諸將所向克捷進敗漢兵于太原城北漢主急求救于遼遼主遣其相耶律舒救之冬十月宋主有疾壬子召其弟晉王光義入侍是夕宋主匡胤殂甲寅宋主光義立赦十月宋主不豫壬子夜召晉王入寢殿屬以後事宦官宫婢皆不得近但遙見燭影下晉王離席若有遜避之狀既而宋主引柱斧㪬地大聲曰好為之俄而宋主殂年五十宋后見晉王遽呼曰吾母子之命皆託于王王泣曰共保富貴無憂也甲寅晉王即位號宋后為開寶皇后遷之西宫大赦天下宋主性孝友節儉質任自然不事矯飾即位之初頗好微行或諌其輕出宋主笑曰帝王之興自有天命求之亦不可得拒之亦不能止周世宗見諸將方面大耳者皆殺之我終日侍側不能害也我若應為天下主誰能圖之不應為天下主雖深居閉門何益既而微行愈數有諌者輒語之曰有天命者任自為之不汝禁也一日罷朝坐便殿不樂者久之左右請其故曰爾謂天子容易為耶早作乘快誤決一事故不樂耳汴京新宫成御正殿坐令洞開諸門謂左右曰此如我心少有邪曲人皆見之矣嘗謂宰相薛居正等曰朕觀為臣者比多不能有終豈忠孝薄而無以享厚福耶宫中葦簾緣用青布常服之衣浣濯至再永康公主嘗衣貼繡鋪翠襦宋主曰汝服此衆必相俲禁之主一日勸宋主以黃金飾肩輿宋主曰我以四海之富宫殿飾以金銀力亦可辦但念我為天下守財耳豈可妄用又嘗謂侍臣曰古之人君解能正身自致無過之地如唐太宗受人諌疏直詆其失曾不愧耻豈若不為之而使下無間言哉尤注意刑辟哀矜無辜嘗讀二典嘆曰堯舜之時四凶止從投竄何近代法網之密耶故自開寶以來犯大辟非情理深害者多得貸死惟贓吏棄市則未嘗容貫也晉王嘗病亟親往視之自為灼艾晉王覺痛宋主亦取艾自炙每對近臣言晉王龍行虎步他日必為太平天子福德吾所不及也善於任使即位之初交廣劒南太原荆湖江表遼夏皆敵國也因注意謀帥命李漢超屯關南馬仁瑀守瀛州韓令坤鎮常州賀惟忠守易州何繼筠領棣州郭進控西山武守琪戍晉州李謙溥守隰州李繼勳鎮昭義以禦太原趙贊屯延州姚內斌守慶州董遵誨屯環州王彥升守原州馮繼業鎮靈武以備西夏其族屬在汴京者撫之甚厚郡中管𣙜之利悉以與之恣其貿易免其所過征稅許其召募亡命以為爪牙凡軍中事皆得便宜每入朝必召對命坐厚為錫賚以遣之由是邊臣富資能養死士使為間諜洞知敵情及其入侵設伏掩擊多致克捷二十年間無西北之憂以至平蜀楚拓越吳所向遂志蓋能推赤心以馭羣下之所致也元年有州百一十一縣六百三十八户九十六萬七千三百五十三末年有府州二百九十七縣一千八十六户三百九萬五百四云史臣曰太祖起介胄之中踐九五之位原其得國視晉漢周亦豈甚相絶哉及其發號施令名藩大將俯首聽命四方列國次第削平此豈人力也耶觀其釋藩鎮兵權繩贓吏重法以塞禍亂之源州郡司牧下至令録幕職躬自引對務農興學慎罰薄斂與世休息迄於丕平治定功成制禮作樂傳之子孫世有典則遂使三代而降考論聲明文物之治道德仁義之風無讓於漢唐規模可謂逺矣宋主以其弟廷美為開封尹封齊王兄子德昭為永興軍節度使兼侍中封武功郡王德芳為山南西道節度使同平章事興元尹廷美即光美也初太祖以德昭德芳年幼欲其漸進故不加封爵宋主即位始封德昭拜德芳使相云尋遵杜太后遺教詔太祖廷美子女並稱皇子皇女以示一體宋以盧多遜平章事楚昭輔為樞密使宋進封李煜隴西郡公劉鋹衛國公十一月宋封髙麗王胄為髙麗國王宋使馮正如遼告哀也十二月宋大赦改元宋主御乾元殿受朝樂縣而不作大赦改元宋始令諸道轉運使察舉部內官吏遼使郎官旺祿蕭庫濟如宋郎官旺祿弔慰也蕭庫濟賀即位也丁丑宋太平興國二年凡三國一鎮春正月宋宴貢士于開寶寺宋主思振淹滯謂侍臣曰朕欲博求俊彥于科場中非敢望拔十得五止得一二亦可為致治之具矣及親試舉人閲其十舉至十五舉者百二十人并進士吕蒙正以下一百九人諸科二百七人並賜及第又詔禮部閲其十五舉以上進士及諸科一百八十四人並賜出身又九經七人不中格宋主憐其老特賜同三傳出身凡五百餘人皆賜緑袍鞾笏錫宴開寶寺自為詩二章賜之初太祖幸洛張齊賢以布衣獻䇿條陳十事內四説稱旨齊賢堅執以為皆善太祖怒令武士拽出之及還語帝曰我幸西都唯得一張齊賢耳我不欲爵之以官異時可使輔汝為相也至是齊賢亦在選中有司失于惀擇置于下第宋主不悅故一榜盡賜及第與京官授將作監丞或大理評事為諸州通判云宋置江南𣙜茶場從轉運使樊若水之請也二月宋主更名炅三月宋加河陽節度使趙普太子少保夏四月宋葬太祖于永昌陵遼遣耶律敞會葬秋八月平海節度使陳洪進朝于宋宋初罷節鎮領支郡之制高保寅知懷州懷故𨽻河陽而保寅與趙普有隙上疏乞罷領支郡之制右拾遺李浣復以為言宋主納之自是節鎮無復領支郡者矣冬十月遼遣使如宋賀生辰也自是嵗以為常宋𣙜酒酤十有一月丁亥朔日有食之既戊寅宋太平興國三年是嵗吳越附宋凡三國春二月宋立崇文院初宋置三館于長慶門北謂之西館宋主即位命於升龍門東北創立三館書院至是賜名崇文院遷西館書貯焉凡八萬卷三月吳越王俶朝于宋夏四月陳洪進以漳泉二州歸于宋宋以洪進為武寧軍節度使洪進朝于汴京因以漳泉二州十四縣户十五萬一千九百七十八獻之宋授洪進武寧節度使同平章事留之汴京諸子皆授近郡遣之官五月吳越王錢俶以其地歸于宋宋封俶為淮海國王俶朝于汴會陳洪進納土而懼上表乞罷所封吳越國王及解天下兵馬大元帥并書詔不名之命歸其甲兵求還宋主不許俶乃籍境內十三州一軍八十六縣户五十五萬六百八十兵一十一萬五千三十六獻之于宋宋以淮南節度管內為淮海國封俶為王授俶弟儀信並觀察使俶子惟濬惟治並節度使惟演惟灝及族屬僚佐授官有差又授其將校孫承祐沈承禮並為節度使賜賚待遇冠絶當時尋令兩浙發俶緦麻以上親及管內官吏悉至汴京凡一千四十四艘以范旻權知兩浙諸州軍事旻上言俶在國日徭賦繁苛凡蔬果箕帚之屬悉收算乞盡釋不取以蠲其弊宋主從之宋定難節度使李克睿卒子繼筠嗣六月宋詔自今職官受贓雖赦不得復敘太祖之世雖大赦不釋贓吏至是復詔諸職官以贓致罪者雖會赦不得敘永為定制秋七月宋隴西郡公李煜卒初曹彬令煜治裝煜方以亡國為念不及多取留汴貧不自給言于宋主宋主命增給月奉仍賜錢三百萬年四十二而卒贈太師追封吳王宋以孔宜襲封文宣公宋主召宜問以孔子世嗣遂命襲封宜因言歷代以聖人之後不預庸調周顯德中均田遂抑本家為編户至今不免詔復其家九月宋宴貢士于迎春苑冬十一月戊申宋主有事于太廟己酉郊赦宋主祀天地于圜丘以太祖配大赦加恩中外自是三年而郊郊必先享太廟禮畢遂肆赦加恩以為常制通鑑續編卷三
